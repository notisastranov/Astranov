      function buildUserSignal(latitude, longitude) {
        return {
          id: appState.userSignalId,
          type: "anchor",
          title: "Your Position",
          summary: "Live operator location shell ready for local zoom, nearby discovery, and order routing.",
          capability: "local reveal",
          actionLabel: "Open Local Area",
          armedLabel: "Local Area Live",
          region: `${Math.abs(latitude).toFixed(2)}${latitude >= 0 ? "N" : "S"} / ${Math.abs(longitude).toFixed(2)}${longitude >= 0 ? "E" : "W"}`,
          lat: latitude,
          lng: longitude,
          alt: 0.15,
          zoom: 1.08,
          demo: false,
          catalog: [],
          tags: ["user", "local", "position", "anchor"],
          metrics: [
            { label: "state", value: "live locate" },
            { label: "reach", value: "nearby" },
            { label: "mode", value: "operator shell" }
          ]
        };
      }

      function centerOnUserLocation() {
        const existingUserSignal = signalStates.get(appState.userSignalId);
        if (existingUserSignal) {
          setActiveSignal(appState.userSignalId, true);
          aimGlobeAtState(existingUserSignal);
          setZoom(1.08);
        }
        if (!navigator.geolocation) {
          query.placeholder = "Geolocation is not available on this device";
          flashNoMatch();
          return;
        }
        query.placeholder = "Finding your location...";
        navigator.geolocation.getCurrentPosition((position) => {
          const signal = buildUserSignal(position.coords.latitude, position.coords.longitude);
          if (signalStates.has(signal.id)) removeSignal(signal.id);
          createSignalState(signal);
          const state = signalStates.get(signal.id);
          if (!state) return;
          setActiveSignal(signal.id, true);
          aimGlobeAtState(state);
          setZoom(1.08);
          pushMessage("system", "Your live position is now attached to the globe so nearby listings, routing, and delivery pricing can use a real origin.", {
            title: "Local reveal",
            pill: "live",
            signalId: signal.id,
            signalName: signal.title,
            status: "locked",
            summary: "User location locked",
            metrics: [
              { label: "lat", value: position.coords.latitude.toFixed(3) },
              { label: "lng", value: position.coords.longitude.toFixed(3) },
              { label: "mode", value: "nearby routing" }
            ],
            demo: false
          });
          query.placeholder = "Zoomed to your location";
          appState.holdUntil = performance.now() + 6800;
        }, () => {
          query.placeholder = "Location permission is needed to zoom to you";
          flashNoMatch();
        }, { enableHighAccuracy: true, maximumAge: 120000, timeout: 10000 });
      }

      function defaultQueryPlaceholder() {
        const profile = viewportProfile();
        if (AI_ENDPOINT) {
          return profile.micro ? "Ask AI" : profile.narrow ? "Ask AI for signals" : "Ask AI for signals or orders";
        }
        return profile.micro ? "Search or order" : profile.narrow ? "Find or order" : "Find signals, products, drivers";
      }

      function focusableSignalState() {
        if (appState.activeId && signalStates.has(appState.activeId) && signalVisible(signalStates.get(appState.activeId)?.signal)) return signalStates.get(appState.activeId);
        if (appState.previewId && signalStates.has(appState.previewId) && signalVisible(signalStates.get(appState.previewId)?.signal)) return signalStates.get(appState.previewId);
        const center = globeCenterScreen();
        const nearest = [...signalStates.values()]
          .filter((state) => signalVisible(state.signal) && frontFacing(state))
          .map((state) => {
            const point = screenPoint(state.world);
            return { state, score: Math.hypot(point.x - center.x, point.y - center.y) };
          })
          .sort((a, b) => a.score - b.score)[0];
        return nearest ? nearest.state : null;
      }

      function ensureFocusSignal() {
        const state = focusableSignalState();
        if (!state) return null;
        if (appState.activeId !== state.signal.id) setActiveSignal(state.signal.id, false);
        return signalStates.get(state.signal.id);
      }

      function applyHudLayout() {
        const profile = viewportProfile();
        const topRect = topBar.getBoundingClientRect();
        const composerRect = composer.getBoundingClientRect();
        document.body.dataset.orientation = profile.orientation;
        document.body.dataset.screen = profile.micro ? "micro" : profile.narrow ? "narrow" : profile.compact ? "compact" : profile.desktop ? "desktop" : "standard";
        const minSize = profile.micro ? 68 : profile.narrow ? 88 : profile.compact ? 106 : profile.landscape ? 118 : 132;
        const maxSize = profile.micro
          ? Math.min(86, appState.width * 0.28, appState.height * 0.19)
          : profile.narrow
            ? Math.min(124, appState.width * 0.34, appState.height * 0.24)
            : profile.compact
              ? Math.min(154, appState.width * 0.34, appState.height * 0.26)
              : profile.landscape
                ? Math.min(160, appState.width * 0.22, appState.height * 0.32)
                : Math.min(236, appState.width * 0.34, appState.height * 0.31);
        const defaultSize = clamp(maxSize, minSize, maxSize);
        appState.hud.size = clamp(appState.hud.size || defaultSize, minSize, maxSize);
        const minTop = topRect.bottom + (profile.micro ? 6 : profile.landscape ? 8 : profile.narrow ? 10 : 14);
        const maxTop = Math.max(minTop, composerRect.top - appState.hud.size - (profile.micro ? 8 : profile.landscape ? 10 : 18));
        appState.hud.top = clamp(appState.hud.top || (minTop + (profile.micro ? 6 : profile.landscape ? 8 : 18)), minTop, maxTop);

        const centerSize = Math.round(appState.hud.size * (profile.micro ? 0.36 : profile.narrow ? 0.37 : 0.38));
        const radarCenterSize = Math.round(centerSize * 0.88);
        const centerIconSize = Math.max(profile.micro ? 12 : 14, Math.round(centerSize * 0.34));
        const centerValueSize = Math.max(profile.micro ? 7.2 : 8.2, +(appState.hud.size * (profile.micro ? 0.076 : 0.082)).toFixed(2));
        const statFont = Math.max(profile.micro ? 5.6 : profile.narrow ? 6.1 : 6.8, +(appState.hud.size * (profile.micro ? 0.062 : 0.055)).toFixed(2));
        const subFont = Math.max(profile.micro ? 4.9 : 5.4, +(statFont * 0.84).toFixed(2));
        const statWidth = Math.max(profile.micro ? 32 : 38, Math.round(appState.hud.size * (profile.micro ? 0.34 : 0.38)));
        const metaFont = Math.max(profile.micro ? 5.2 : 6, +(appState.hud.size * (profile.micro ? 0.048 : 0.052)).toFixed(2));
        const northTop = Math.round(appState.hud.size * (profile.micro ? 0.08 : 0.1));
        const sideTop = Math.round(appState.hud.size * (profile.micro ? 0.28 : 0.29));
        const sideInset = Math.round(appState.hud.size * (profile.micro ? 0.08 : 0.1));
        const southBottom = Math.round(appState.hud.size * (profile.micro ? 0.17 : 0.2));
        const gripSize = Math.max(profile.micro ? 16 : 18, Math.round(appState.hud.size * 0.14));

        [perfWheel, radarWheel].forEach((wheel) => {
          wheel.style.top = `${appState.hud.top}px`;
          wheel.style.width = `${appState.hud.size}px`;
          wheel.style.height = `${appState.hud.size}px`;
          wheel.style.setProperty("--hud-center-size", `${centerSize}px`);
          wheel.style.setProperty("--hud-radar-center-size", `${radarCenterSize}px`);
          wheel.style.setProperty("--hud-center-icon-size", `${centerIconSize}px`);
          wheel.style.setProperty("--hud-center-value-size", `${centerValueSize}px`);
          wheel.style.setProperty("--hud-stat-font", `${statFont}px`);
          wheel.style.setProperty("--hud-stat-sub-font", `${subFont}px`);
          wheel.style.setProperty("--hud-stat-width", `${statWidth}px`);
          wheel.style.setProperty("--hud-meta-font", `${metaFont}px`);
          wheel.style.setProperty("--hud-meta-bottom", `${profile.micro ? 5 : 8}px`);
          wheel.style.setProperty("--hud-north-top", `${northTop}px`);
          wheel.style.setProperty("--hud-side-top", `${sideTop}px`);
          wheel.style.setProperty("--hud-side-inset", `${sideInset}px`);
          wheel.style.setProperty("--hud-south-bottom", `${southBottom}px`);
          wheel.style.setProperty("--hud-grip-size", `${gripSize}px`);
        });
      }

      function updatePerformanceHud(now) {
        const selected = appState.activeId ? signalStates.get(appState.activeId) : null;
        const droneLoad = parseInt(signalStates.get("atlas-drone")?.signal.metrics.find((metric) => metric.label === "load")?.value || "0", 10) || 0;
        const focusLoad = parseInt(selected?.signal.metrics.find((metric) => metric.label === "load")?.value || `${appState.device.load}%`, 10) || appState.device.load;
        const peakLoad = Math.max(appState.device.load, focusLoad, droneLoad);
        appState.performancePeak = Math.max(peakLoad, damp(appState.performancePeak, peakLoad, 0.08));

        perfDevice.firstChild.textContent = appState.device.platform.includes("phone") ? "PHONE" : "DEVICE";
        perfPlatform.textContent = appState.device.platform;
        perfCpuValue.textContent = appState.device.cpu;
        perfRamValue.textContent = appState.device.ram;
        perfTempValue.textContent = appState.device.thermal;
        perfMeta.textContent = `${appState.device.storage} / ${appState.device.battery} / ${appState.device.network}`;
        perfCenterIcon.innerHTML = iconMarkup("inspect");
        perfCenterBtn.setAttribute("aria-label", "Inspect device performance");
        perfCenterBtn.setAttribute("title", "Inspect device performance");
        perfCenterValue.textContent = `${Math.round(appState.performancePeak)}%`;
        perfCenterBtn.classList.toggle("active", appState.performancePeak > 80);

        const endAngle = (-Math.PI / 2) + ((appState.performancePeak / 100) * Math.PI * 1.7);
        perfLoadArc.setAttribute("d", arcPath(60, 60, 33, -Math.PI / 2, endAngle));
      }

      function updateRadarHud(now) {
        const basis = worldViewBasis();
        const profile = viewportProfile();
        appState.radarAngle = (appState.radarAngle + (profile.landscape ? 0.018 : 0.022)) % (Math.PI * 2);
        const sweepRotation = `rotate(${THREE.MathUtils.radToDeg(appState.radarAngle).toFixed(2)} 60 60)`;
        radarSweep.setAttribute("transform", sweepRotation);
        radarSweepCone.setAttribute("transform", sweepRotation);
        const pips = [
          `<circle cx="60" cy="60" r="2.1" fill="#d9fbff" fill-opacity="0.82"></circle>`
        ];
        let signalCount = 0;
        signalStates.forEach((state) => {
          if (!signalVisible(state.signal)) return;
          signalCount += 1;
          const normal = worldNormal(state.local);
          const azimuth = Math.atan2(-normal.dot(basis.up), normal.dot(basis.right));
          const separation = Math.acos(clamp(normal.dot(basis.viewer), -1, 1));
          const radial = 8 + ((separation / Math.PI) * (profile.micro ? 33 : 38));
          const driftX = Math.cos(now * 0.0014 + state.pulsePhase * 1.7) * (state.signal.type === "presence" ? 1.2 : 0.5);
          const driftY = Math.sin(now * 0.0011 + state.pulsePhase * 1.4) * (state.signal.type === "presence" ? 1.2 : 0.5);
          const x = clamp(60 + Math.cos(azimuth) * radial + driftX, 12, 108);
          const y = clamp(60 + Math.sin(azimuth) * radial + driftY, 12, 108);
          if (!areFiniteNumbers(x, y, azimuth, radial, driftX, driftY)) return;
          const sweepDelta = Math.abs(wrapAngle(azimuth - (appState.radarAngle - Math.PI / 2)));
          const sweepEcho = clamp(1 - sweepDelta / 0.42, 0, 1);
          const active = state.signal.id === appState.activeId;
          const radius = active ? 4.2 : state.signal.type === "cloud" ? 3.2 : 2.5 + sweepEcho * 1.3;
          const accent = "#16d9ff";

          if (state.signal.type === "presence") {
            pips.push(`<line x1="${(x - Math.cos(azimuth) * 5.5).toFixed(2)}" y1="${(y - Math.sin(azimuth) * 5.5).toFixed(2)}" x2="${x.toFixed(2)}" y2="${y.toFixed(2)}" stroke="${accent}" stroke-opacity="${(0.22 + sweepEcho * 0.32).toFixed(2)}" stroke-width="1.1" stroke-linecap="round"></line>`);
          }
          pips.push(`<circle cx="${x.toFixed(2)}" cy="${y.toFixed(2)}" r="${radius.toFixed(2)}" fill="${accent}" fill-opacity="${active ? "1" : (0.46 + sweepEcho * 0.42).toFixed(2)}"></circle>`);
          pips.push(`<circle cx="${x.toFixed(2)}" cy="${y.toFixed(2)}" r="${(radius * 0.42).toFixed(2)}" fill="#effcff" fill-opacity="${active ? "0.92" : "0.54"}"></circle>`);
        });
        radarPips.innerHTML = pips.join("");
        const userFocused = appState.activeId === appState.userSignalId && appState.zoomTarget > 0.32;
        radarMeta.textContent = appState.zoomTarget > 0.08 ? "earth compass" : "stellar compass";
        radarCenterValue.textContent = userFocused ? "OUT" : "GPS";
        radarCenterBtn.setAttribute("aria-label", userFocused ? "Return to orbit view" : "Locate and zoom to your position");
        radarCenterBtn.setAttribute("title", userFocused ? "Return to orbit view" : "Locate and zoom to your position");
        radarNorth.textContent = appState.zoomTarget > 0.08 ? "N" : "SUN";
        radarEast.textContent = appState.zoomTarget > 0.08 ? "E" : "ZEN";
        radarSouth.textContent = appState.zoomTarget > 0.08 ? "S" : "GAL";
        radarWest.textContent = appState.zoomTarget > 0.08 ? "W" : "ORB";
        radarGrid.style.opacity = appState.zoomTarget > 0.08 ? "1" : "0.72";
        radarWheel.dataset.active = "true";
        radarWheel.dataset.count = `${signalCount}`;
      }

      function refreshDeviceTelemetry() {
        const platformSource = navigator.userAgentData?.platform || navigator.platform || "web shell";
        const isPhone = /iphone|android|mobile/i.test(navigator.userAgent) || Math.min(window.innerWidth, window.innerHeight) < 720;
        appState.device.platform = isPhone ? "phone shell" : platformSource.toLowerCase();
        appState.device.cpu = navigator.hardwareConcurrency ? `${navigator.hardwareConcurrency}c` : "cpu hook";
        appState.device.ram = navigator.deviceMemory ? `${navigator.deviceMemory}gb` : "ram hook";
        appState.device.network = navigator.connection?.effectiveType ? `${navigator.connection.effectiveType} net` : "network hook";
        appState.device.thermal = "sensor hook";

        if (navigator.storage?.estimate) {
          navigator.storage.estimate().then((estimate) => {
            if (!estimate.quota) return;
            const quotaGb = Math.max(1, Math.round(estimate.quota / 1073741824));
            const usedGb = Math.max(0, Math.round((estimate.usage || 0) / 1073741824));
            appState.device.storage = `${usedGb}/${quotaGb}gb`;
          }).catch(() => {
            appState.device.storage = "storage hook";
          });
        } else {
          appState.device.storage = "storage hook";
        }

        if (navigator.getBattery) {
          navigator.getBattery().then((battery) => {
            appState.device.battery = `${Math.round(battery.level * 100)}% pwr`;
          }).catch(() => {
            appState.device.battery = "power hook";
          });
        }
      }
      function popupMarkup(signal) {
        const metrics = signal.metrics.map((metric) => `
          <div class="metric">
            <span class="metric-label">${metric.label}</span>
            <span class="metric-value">${metric.value}</span>
          </div>
        `).join("");
        const media = signal.previewVideo ? `
          <div class="popup-media">
            <video class="popup-video" src="${signal.previewVideo}" muted loop autoplay playsinline preload="metadata"></video>
          </div>
        ` : "";
        const products = signal.products?.length ? `
          <div class="popup-products">
            ${signal.products.map((product) => `<span class="popup-product">${product}</span>`).join("")}
          </div>
        ` : "";
        return `
          <div class="popup-shell">
            <div class="popup-head">
              <span class="popup-kind">${iconMarkup(signalKindIcon(signal.type))}${signal.type}</span>
              <span class="popup-capability">${signal.capability}</span>
            </div>
            ${media}
            <div class="popup-copy">
              <h2 class="popup-title">${signal.title}</h2>
              <p class="popup-summary">${signal.summary}</p>
            </div>
            ${products}
            <div class="popup-grid">${metrics}</div>
            <div class="popup-foot">
              <span class="popup-region">${signal.region}</span>
              <button class="popup-action" type="button" aria-label="${signal.actionLabel}" title="${signal.actionLabel}" data-armed="false">${popupActionMarkup(signal, false)}</button>
            </div>
          </div>
        `;
      }

      function refreshPopupActionButton(state) {
        const button = state.popup.querySelector(".popup-action");
        if (!button) return;
        const label = state.armed ? state.signal.armedLabel : state.signal.actionLabel;
        button.dataset.armed = state.armed ? "true" : "false";
        button.setAttribute("aria-label", label);
        button.setAttribute("title", label);
        button.innerHTML = popupActionMarkup(state.signal, state.armed);
      }

      function createPopup(signal) {
        const popup = document.createElement("article");
        popup.className = `signal-popup ${signal.type}`;
        popup.dataset.signalId = signal.id;
        popup.innerHTML = popupMarkup(signal);
        popup.addEventListener("pointerdown", (event) => event.stopPropagation());
        popup.addEventListener("click", (event) => {
          event.stopPropagation();
          setActiveSignal(signal.id, true);
        });
        const actionButton = popup.querySelector(".popup-action");
        actionButton.addEventListener("click", (event) => {
          event.stopPropagation();
          const state = signalStates.get(signal.id);
          if (!state) return;
          if (state.orderActive) {
            state.orderActive = false;
            state.armed = false;
            appState.orders = appState.orders.map((order) => order.signalId === signal.id ? { ...order, active: false, status: "closed" } : order);
            pushMessage("system", `${signal.title} is still on the globe, but the active route was closed from the signal tile.`, {
              title: "Route closed",
              pill: "standby",
              signalId: signal.id,
              signalName: signal.title,
              status: "standby",
              summary: `${signal.title} standby`,
              metrics: [
                { label: "signal", value: signal.capability },
                { label: "state", value: "standby" }
              ],
              demo: !!signal.demo
            });
          } else {
            routeSignalAction(state, signal.title, signal.tags.includes("driver") || signal.type === "presence" ? "assign" : "order");
          }
          persistMessages();
          renderMessages();
          refreshPopupActionButton(state);
          popup.classList.toggle("armed", state.armed);
          popup.classList.toggle("active-order", !!state.orderActive);
          setActiveSignal(signal.id, true);
        });
        signalLayer.appendChild(popup);
        return popup;
      }

      function addAnchorVisual(state) {
        const pole = new THREE.Mesh(
          new THREE.CylinderGeometry(0.004, 0.004, 0.08, 8),
          new THREE.MeshBasicMaterial({ color: 0x16d9ff, transparent: true, opacity: 0.72, depthWrite: false })
        );
        pole.position.y = 0.04;
        const core = new THREE.Mesh(
          new THREE.SphereGeometry(0.014, 14, 14),
          new THREE.MeshBasicMaterial({ color: 0xcffcff, transparent: true, opacity: 0.96, depthWrite: false })
        );
        core.position.y = 0.085;
        state.group.add(pole, core);
        state.core = core;
        state.pole = pole;
      }

      function addPresenceVisual(state) {
        const pole = new THREE.Mesh(
          new THREE.CylinderGeometry(0.004, 0.004, 0.074, 8),
          new THREE.MeshBasicMaterial({ color: 0x16d9ff, transparent: true, opacity: 0.6, depthWrite: false })
        );
        pole.position.y = 0.036;
        const core = new THREE.Mesh(
          new THREE.SphereGeometry(0.015, 14, 14),
          new THREE.MeshBasicMaterial({ color: 0xe1fdff, transparent: true, opacity: 1, depthWrite: false })
        );
        core.position.y = 0.086;
        const shell = new THREE.Mesh(
          new THREE.ConeGeometry(0.011, 0.026, 5),
          new THREE.MeshBasicMaterial({ color: 0x9ef8ff, transparent: true, opacity: 0.7, depthWrite: false })
        );
        shell.position.y = 0.11;
        state.group.add(pole, shell, core);
        state.core = core;
        state.pole = pole;
        state.shell = shell;

        const trailCount = 16;
        const trailPositions = new Float32Array(trailCount * 3);
        const trailGeometry = new THREE.BufferGeometry();
        trailGeometry.setAttribute("position", new THREE.BufferAttribute(trailPositions, 3));
        const trailLine = new THREE.Line(
          trailGeometry,
          new THREE.LineBasicMaterial({ color: 0xb4f9ff, transparent: true, opacity: 0.54, depthWrite: false })
        );
        markerGroup.add(trailLine);
        state.trailGeometry = trailGeometry;
        state.trailLine = trailLine;
        state.trailPositions = trailPositions;
        state.trailHistory = Array.from({ length: trailCount }, () => latLngToVector3(state.baseLat, state.baseLng, earthRadius + state.signal.alt));
      }

      function addCloudVisual(state) {
        const latticePoints = [
          0.00, 0.08, -0.10,   0.10, 0.16, 0.00,
          0.10, 0.16, 0.00,    0.00, 0.22, 0.10,
          0.00, 0.22, 0.10,   -0.10, 0.16, 0.00,
         -0.10, 0.16, 0.00,    0.00, 0.08, -0.10,
         -0.10, 0.16, 0.00,    0.10, 0.16, 0.00,
          0.00, 0.08, -0.10,   0.00, 0.22, 0.10
        ];
        const lattice = new THREE.LineSegments(
          new THREE.BufferGeometry(),
          new THREE.LineBasicMaterial({ color: 0x41c6ff, transparent: true, opacity: 0.62, depthWrite: false })
        );
        lattice.geometry.setAttribute("position", new THREE.Float32BufferAttribute(latticePoints, 3));
        const shell = new THREE.Mesh(
          new THREE.OctahedronGeometry(0.02, 0),
          new THREE.MeshBasicMaterial({ color: 0xa2ecff, transparent: true, opacity: 0.34, depthWrite: false })
        );
        shell.position.y = 0.13;
        const core = new THREE.Mesh(
          new THREE.SphereGeometry(0.012, 14, 14),
          new THREE.MeshBasicMaterial({ color: 0xcdf8ff, transparent: true, opacity: 1, depthWrite: false })
        );
        core.position.y = 0.13;
        state.group.add(shell, lattice, core);
        state.core = core;
        state.shell = shell;
        state.lattice = lattice;
      }

      function createSignalState(signal) {
        const state = {
          signal,
          popup: createPopup(signal),
          group: new THREE.Group(),
          baseLat: signal.lat,
          baseLng: signal.lng,
          local: latLngToVector3(signal.lat, signal.lng, earthRadius + signal.alt),
          world: new THREE.Vector3(),
          depth: 1,
          show: 0,
          armed: false,
          pulsePhase: Math.random() * Math.PI * 2,
          activatedAt: performance.now(),
          orderActive: false
        };

        if (signal.type === "anchor") addAnchorVisual(state);
        if (signal.type === "presence") addPresenceVisual(state);
        if (signal.type === "cloud") addCloudVisual(state);

        const hit = new THREE.Mesh(new THREE.SphereGeometry(signal.type === "cloud" ? 0.12 : 0.1, 10, 10), new THREE.MeshBasicMaterial({ visible: false }));
        hit.position.y = signal.type === "cloud" ? 0.13 : signal.type === "presence" ? 0.11 : 0.09;
        hit.userData.signalId = signal.id;
        state.group.add(hit);
        state.hit = hit;

        markerGroup.add(state.group);
        interactive.push(hit);
        signalStates.set(signal.id, state);
        state.group.visible = signalVisible(signal);
        return state;
      }

      function removeSignal(id) {
        const state = signalStates.get(id);
        if (!state) return;
        markerGroup.remove(state.group);
        if (state.trailLine) markerGroup.remove(state.trailLine);
        if (state.popup.parentNode) state.popup.parentNode.removeChild(state.popup);
        const hitIndex = interactive.indexOf(state.hit);
        if (hitIndex >= 0) interactive.splice(hitIndex, 1);
        signalStates.delete(id);
        if (appState.activeId === id) appState.activeId = null;
        if (appState.previewId === id) appState.previewId = null;
        appState.orders = appState.orders.filter((order) => order.signalId !== id);
      }

            summary: `${seedSignal.title} local fallback`,
            demo: false,
            expand: false
          });
        });
      }

      function setActiveSignal(id, holdFocus) {
        if (!signalStates.has(id) || !signalVisible(signalStates.get(id)?.signal)) return;
        appState.activeId = id;
        appState.previewId = null;
        appState.lastCycle = performance.now();
        if (holdFocus) appState.holdUntil = performance.now() + 6400;
        const state = signalStates.get(id);
        state.activatedAt = performance.now();
        if (holdFocus) {
          aimGlobeAtState(state);
          setZoom(Math.max(appState.zoomTarget, clamp((state.signal.zoom || 0.82) + 0.08, 0.54, 1.08)));
        }
      }

      function clearActiveSignal() {
        appState.activeId = null;
        setZoom(0);
        if (!query.value.trim()) appState.previewId = null;
      }

      function frontFacing(state) {
        const normal = worldNormal(state.local);
        const toCamera = camera.position.clone().sub(state.world).normalize();
        return normal.dot(toCamera) > 0.04;
      }

      function syncSignalState(state, now) {
        const signal = state.signal;
        const visibleSignal = signalVisible(signal);
        state.group.visible = visibleSignal;
        state.hit.visible = visibleSignal;
        if (state.trailLine) state.trailLine.visible = visibleSignal;
        if (!visibleSignal) {
          state.popup.style.opacity = "0";
          state.popup.style.pointerEvents = "none";
          return;
        }
        let lat = state.baseLat;
        let lng = state.baseLng;
        let altitude = earthRadius + signal.alt;

        if (signal.movement) {
          const phase = now * 0.00012 * signal.movement.speed + signal.movement.phase;
          lat += Math.sin(phase) * signal.movement.latAmp;
          lng += Math.cos(phase) * signal.movement.lngAmp;
          altitude += signal.type === "cloud" ? Math.sin(phase * 1.1) * 0.04 : Math.sin(phase * 1.5) * 0.02;
        }

        const local = latLngToVector3(lat, lng, altitude);
        const normal = local.clone().normalize();
        state.local.copy(local);
        state.group.position.copy(local);
        state.group.quaternion.setFromUnitVectors(yAxis, normal);
        state.world.copy(local.clone().applyMatrix4(globeGroup.matrixWorld));
        state.depth = screenPoint(state.world).z;

        const pulse = 0.5 + 0.5 * Math.sin(now * 0.004 + state.pulsePhase);
        const highlight = state.signal.id === appState.activeId
          ? 1
          : state.orderActive
            ? 0.88
            : state.signal.id === appState.previewId
              ? 0.72
              : appState.ambientIds.includes(state.signal.id)
                ? 0.4
                : 0.16;
        state.popup.classList.toggle("active-order", !!state.orderActive);

        if (state.pole) {
          state.pole.scale.y = 1 + pulse * 0.04 + highlight * 0.08;
          state.pole.material.opacity = 0.3 + highlight * 0.34;
        }
        if (state.shell) {
          state.shell.scale.setScalar(1 + pulse * 0.04 + highlight * 0.1);
          state.shell.material.opacity = 0.26 + highlight * 0.28;
        }
        if (state.core) {
          state.core.scale.setScalar(1 + highlight * 0.1 + pulse * 0.04);
          state.core.material.opacity = 0.74 + highlight * 0.18;
        }
        if (state.lattice) {
          state.lattice.rotation.y += 0.008;
          state.lattice.material.opacity = 0.24 + highlight * 0.34;
        }
        if (state.trailLine) {
          state.trailHistory.unshift(local.clone());
          state.trailHistory = state.trailHistory.slice(0, state.trailPositions.length / 3);
          for (let i = 0; i < state.trailPositions.length / 3; i += 1) {
            const point = state.trailHistory[i] || state.trailHistory[state.trailHistory.length - 1];
            state.trailPositions[i * 3] = point.x;
            state.trailPositions[i * 3 + 1] = point.y;
            state.trailPositions[i * 3 + 2] = point.z;
          }
          state.trailGeometry.attributes.position.needsUpdate = true;
          state.trailLine.material.opacity = 0.16 + highlight * 0.54;
        }
      }

      function updateAmbientSignals() {
        const center = globeCenterScreen();
        const candidates = [];
        const ambientLimit = appState.zoomed ? 1 : AMBIENT_COUNT;
        signalStates.forEach((state) => {
          if (!signalVisible(state.signal)) return;
          if (state.signal.id === appState.activeId || state.signal.id === appState.previewId || appState.searchIds.includes(state.signal.id)) return;
          if (!frontFacing(state)) return;
          const point = screenPoint(state.world);
          const distance = Math.hypot(point.x - center.x, point.y - center.y);
          const weight = state.signal.type === "cloud" ? 0.16 : state.signal.type === "presence" ? 0.12 : 0.08;
          candidates.push({ id: state.signal.id, score: (1 / (distance + 1)) + weight });
        });
        candidates.sort((a, b) => b.score - a.score);
        appState.ambientIds = candidates.slice(0, ambientLimit).map((entry) => entry.id);
      }

      function renderOverlay(time) {
        const profile = viewportProfile();
        const center = globeCenterScreen();
        const basis = worldViewBasis();
        const globeRadius = globeScreenRadius(center);
        const parts = [];
        const wheelRects = [perfWheel, radarWheel].map((wheel) => {
          const rect = wheel.getBoundingClientRect();
          return {
            x: rect.left - 8,
            y: rect.top - 8,
            w: rect.width + 16,
            h: rect.height + 16
          };
        });
        const placed = [...wheelRects];
        const ambientLimit = appState.zoomed ? 1 : AMBIENT_COUNT;
        const overlaps = (a, b) => a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
        const candidates = [];

        signalStates.forEach((state) => {
          if (!signalVisible(state.signal)) {
            state.popup.style.opacity = "0";
            state.popup.style.pointerEvents = "none";
            return;
          }
          const visible = frontFacing(state);
          const isActive = state.signal.id === appState.activeId;
          const isOrder = state.orderActive;
          const isPreview = state.signal.id === appState.previewId;
          const isSearch = appState.searchIds.includes(state.signal.id);
          const targetShow = visible
            ? isActive
              ? 1
              : isOrder
                ? 0.92
              : isPreview
                ? 0.86
                : isSearch
                  ? 0.54
                  : appState.ambientIds.includes(state.signal.id)
                    ? (ambientLimit > 1 ? 0.38 : 0.26)
                    : 0
            : isActive
              ? 0.72
              : isOrder
                ? 0.68
              : isPreview
                ? 0.48
                : isSearch
                  ? 0.34
                  : 0;
          state.show = damp(state.show, targetShow, state.signal.id === appState.activeId ? 0.16 : 0.11);
          if (state.show > 0.03) {
            candidates.push({
              state,
              priority: isActive ? 3 : isPreview || isSearch ? 2 : 1
            });
          } else {
            state.popup.style.opacity = "0";
            state.popup.style.pointerEvents = "none";
          }
        });

        candidates.sort((a, b) => b.priority - a.priority || b.state.show - a.state.show);
        candidates.forEach(({ state, priority }) => {
          const source = overlaySourcePoint(state, center, basis, globeRadius);
          const dir = signalDirectionFromBasis(state, basis);
          const facing = signalFacingFromBasis(state, basis);
          if (!areFiniteNumbers(source.x, source.y, dir.x, dir.y, facing)) {
            state.popup.style.opacity = "0";
            state.popup.style.pointerEvents = "none";
            return;
          }
          const popupWidth = profile.micro
            ? Math.min(appState.width - 16, 206)
            : profile.narrow
              ? Math.min(appState.width * 0.9, 248)
              : Math.min(appState.width * 0.84, appState.width < 560 ? 308 : 336);
          const popupHeight = (profile.micro ? 154 : profile.narrow ? 184 : 202)
            + (state.signal.type === "cloud" ? 16 : 0)
            + (state.signal.previewVideo ? (profile.micro ? 64 : profile.narrow ? 78 : 92) : 0)
            + (state.signal.products?.length ? 34 : 0);
          const sourceDistance = Math.hypot(source.x - center.x, source.y - center.y);
          const centerAvoid = clamp(1 - (sourceDistance / (Math.min(appState.width, appState.height) * 0.24)), 0, 1);
          const lift = (profile.micro ? POPUP_LIFT - 34 : profile.narrow ? POPUP_LIFT - 18 : POPUP_LIFT) + facing * 36 + centerAvoid * 152 + (appState.zoomed ? 74 : 12) + (state.signal.type === "cloud" ? 18 : state.signal.type === "presence" ? 8 : 0);
          const target = {
            x: source.x + dir.x * lift,
            y: source.y + dir.y * (lift * 0.78) - facing * 18 - centerAvoid * 8
          };
          if (!areFiniteNumbers(target.x, target.y)) {
            state.popup.style.opacity = "0";
            state.popup.style.pointerEvents = "none";
            return;
          }
          const eased = easeOut(state.show);
          const popupCenter = {
            x: THREE.MathUtils.lerp(source.x, target.x, eased),
            y: THREE.MathUtils.lerp(source.y, target.y, eased)
          };

          const sidePad = profile.micro ? 8 : appState.width < 560 ? 10 : 16;
          const topClamp = Math.max(profile.micro ? 108 : appState.height < 760 ? 152 : 168, appState.hud.top + appState.hud.size + (profile.micro ? 6 : 10));
          const bottomClamp = profile.micro ? 76 : appState.height < 760 ? 98 : 110;
          let left = clamp(popupCenter.x - popupWidth * 0.5, sidePad, appState.width - popupWidth - sidePad);
          let top = clamp(popupCenter.y - popupHeight * 0.5, topClamp, appState.height - popupHeight - bottomClamp);
          const perpendicular = { x: -dir.y, y: dir.x };
          const shiftStep = profile.micro ? 30 : appState.width < 560 ? 46 : 58;
          let rect = { x: left, y: top, w: popupWidth, h: popupHeight };
          let attempt = 0;
          while (placed.some((entry) => overlaps(rect, entry)) && attempt < 6) {
            const sign = attempt % 2 === 0 ? 1 : -1;
            left = clamp(left + perpendicular.x * shiftStep * sign, sidePad, appState.width - popupWidth - sidePad);
            top = clamp(top + perpendicular.y * shiftStep * sign + sign * 10, topClamp, appState.height - popupHeight - bottomClamp);
            rect = { x: left, y: top, w: popupWidth, h: popupHeight };
            attempt += 1;
          }
          const centerSafeRadius = appState.zoomed ? Math.min(appState.width, appState.height) * 0.34 : Math.min(appState.width, appState.height) * 0.24;
          if (Math.hypot((left + popupWidth * 0.5) - center.x, (top + popupHeight * 0.5) - center.y) < centerSafeRadius) {
            left = clamp(left + dir.x * centerSafeRadius * 0.88, sidePad, appState.width - popupWidth - sidePad);
            top = clamp(top + dir.y * centerSafeRadius * 0.66, topClamp, appState.height - popupHeight - bottomClamp);
            rect = { x: left, y: top, w: popupWidth, h: popupHeight };
          }
          if (priority < 3 && placed.some((entry) => overlaps(rect, entry))) {
            state.popup.style.opacity = "0";
            state.popup.style.pointerEvents = "none";
            return;
          }
          placed.push(rect);

          const cardCenter = { x: left + popupWidth * 0.5, y: top + popupHeight * 0.5 };
          const tip = rectEdgePoint(cardCenter.x, cardCenter.y, popupWidth * 0.5, popupHeight * 0.5, source.x, source.y);
          if (!areFiniteNumbers(tip.x, tip.y, left, top)) {
            state.popup.style.opacity = "0";
            state.popup.style.pointerEvents = "none";
            return;
          }
          const birth = clamp(1 - (performance.now() - state.activatedAt) / 1100, 0, 1);
          const widthBoost = birth * 1.8;
          const scale = (profile.micro ? 0.76 : 0.68) + eased * 0.22 + facing * 0.16;

          state.popup.dataset.state = priority === 1 ? "ghost" : "live";
          state.popup.style.left = `${left}px`;
          state.popup.style.top = `${top}px`;
          state.popup.style.opacity = `${0.3 + state.show * 0.7}`;
          state.popup.style.transform = `scale(${scale})`;
          state.popup.style.pointerEvents = priority > 1 || state.show > 0.64 ? "auto" : "none";

          parts.push(`
            <g opacity="${(0.2 + state.show * 0.8).toFixed(2)}">
              <line x1="${source.x.toFixed(2)}" y1="${source.y.toFixed(2)}" x2="${tip.x.toFixed(2)}" y2="${tip.y.toFixed(2)}"
                stroke="#16d9ff" stroke-opacity="0.22" stroke-width="${(5.4 + widthBoost).toFixed(2)}" stroke-linecap="round" filter="url(#connectorGlow)"/>
              <line x1="${source.x.toFixed(2)}" y1="${source.y.toFixed(2)}" x2="${tip.x.toFixed(2)}" y2="${tip.y.toFixed(2)}"
                stroke="#16d9ff" stroke-opacity="${(0.94 + state.show * 0.06).toFixed(2)}" stroke-width="${(2.4 + widthBoost * 0.44).toFixed(2)}" stroke-linecap="round"/>
            </g>
          `);
        });

        connectorSvg.innerHTML = `
          <defs>
            <filter id="connectorGlow" x="-60%" y="-60%" width="220%" height="220%">
              <feGaussianBlur stdDeviation="2.8" result="blur1"></feGaussianBlur>
              <feGaussianBlur stdDeviation="8" result="blur2"></feGaussianBlur>
              <feMerge>
                <feMergeNode in="blur2"></feMergeNode>
                <feMergeNode in="blur1"></feMergeNode>
                <feMergeNode in="SourceGraphic"></feMergeNode>
              </feMerge>
            </filter>
          </defs>
          ${parts.join("")}
        `;
      }

      function analyzeCommand(value) {
        const lowered = value.toLowerCase().trim();
        const baseTerms = lowered.split(/\s+/).filter(Boolean);
        const hints = [];
        let intent = "find";
        let preferredType = null;

        if (/(add|post|publish|list|create|open shop|new service)/.test(lowered)) {
          intent = "add";
          hints.push("shop", "service", "video");
        } else if (/(assign|driver|courier|dispatch driver)/.test(lowered)) {
          intent = "assign";
          hints.push("driver", "courier", "dispatch");
        } else if (/(order|book|reserve|buy|get|send|deliver|pay)/.test(lowered)) {
          intent = "order";
          hints.push("booking", "hook", "table", "stay", "menu", "dispatch", "products");
        } else if (/(track|follow|locate|where|watch)/.test(lowered)) {
          intent = "track";
          hints.push("route", "trace", "live");
        } else if (/(open|show|find|bring)/.test(lowered)) {
          hints.push("signal", "local");
        }

        if (/(driver|courier|vehicle|van)/.test(lowered)) {
          preferredType = "presence";
          hints.push("driver", "assign");
        } else if (/(drone|courier|vessel|boat|runner|presence|flight)/.test(lowered)) {
          preferredType = "presence";
          hints.push("presence");
        } else if (/(cloud|mesh|fabric|relay|regional|network)/.test(lowered)) {
          preferredType = "cloud";
          hints.push("cloud");
        } else if (/(hotel|room|stay|restaurant|table|booking|business|menu|event|anchor|shop|service|product|video)/.test(lowered)) {
          preferredType = "anchor";
          hints.push("anchor");
        }

        return { intent, preferredType, terms: [...new Set([...baseTerms, ...hints])] };
      }

      function rankSignals(value) {
        const analysis = analyzeCommand(value);
        const terms = analysis.terms;
        if (!terms.length) return [];
        return [...signalStates.values()].filter((state) => signalVisible(state.signal)).map((state) => {
          const metricText = state.signal.metrics.map((metric) => `${metric.label} ${metric.value}`).join(" ");
          const productText = state.signal.products ? state.signal.products.join(" ") : "";
          const haystack = `${state.signal.title} ${state.signal.summary} ${state.signal.capability} ${state.signal.region} ${metricText} ${productText} ${state.signal.tags.join(" ")} ${state.signal.type}`.toLowerCase();
          let score = 0;
          terms.forEach((term) => {
            if (state.signal.title.toLowerCase().includes(term)) score += 10;
            if (state.signal.capability.toLowerCase().includes(term)) score += 8;
            if (state.signal.region.toLowerCase().includes(term)) score += 6;
            if (state.signal.products?.some((product) => product.toLowerCase().includes(term))) score += 9;
            if (state.signal.tags.some((tag) => tag.includes(term))) score += 5;
            if (state.signal.type.includes(term)) score += 4;
            if (haystack.includes(term)) score += 2;
          });
          if (analysis.preferredType && state.signal.type === analysis.preferredType) score += 7;
          if (analysis.intent === "order" && state.signal.type === "anchor") score += 5;
          if (analysis.intent === "track" && state.signal.type === "presence") score += 5;
          if (analysis.intent === "assign" && state.signal.tags.includes("driver")) score += 12;
          return { id: state.signal.id, score };
        }).filter((entry) => entry.score > 0).sort((a, b) => b.score - a.score);
      }

      function flashNoMatch() {
        query.classList.add("no-match");
        window.setTimeout(() => query.classList.remove("no-match"), 220);
      }

      function updatePreview() {
        const value = query.value.trim();
        if (!value) {
          appState.previewId = null;
          appState.searchIds = [];
          query.classList.remove("no-match");
          return;
        }
        const ranked = rankSignals(value);
        appState.searchIds = ranked.slice(0, 5).map((entry) => entry.id);
        const visible = ranked.find((entry) => {
          const candidate = signalStates.get(entry.id);
          return candidate && frontFacing(candidate);
        });
        appState.previewId = visible ? visible.id : ranked[0] ? ranked[0].id : null;
      }

      function cycleSignal() {
        const ids = [...signalStates.values()].filter((state) => signalVisible(state.signal)).map((state) => state.signal.id);
        if (!ids.length) return;
        const current = appState.activeId ? ids.indexOf(appState.activeId) : -1;
        setActiveSignal(ids[(current + 1 + ids.length) % ids.length], false);
      }

      async function runAiCommand(value) {
        if (!AI_ENDPOINT) return false;
        try {
          const response = await fetch(AI_ENDPOINT, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              lane: "public",
              message: value,
              history: appState.messages.slice(-8).map((entry) => ({
                role: entry.role === "user" ? "user" : "assistant",
                content: entry.body
              })),
              publicProvider: "auto",
              query: value,
              signals: [...signalStates.values()].filter((state) => signalVisible(state.signal)).map((state) => ({
                id: state.signal.id,
                type: state.signal.type,
                title: state.signal.title,
                capability: state.signal.capability,
                region: state.signal.region,
                summary: state.signal.summary,
                products: state.signal.products || [],
                tags: state.signal.tags || [],
                metrics: state.signal.metrics || []
              }))
            })
          });
          if (!response.ok) return false;
          const data = await response.json();
          if (data?.addMode && /^(shop|service|video)$/.test(data.addMode)) {
            setPanel(null);
            setAddMode(data.addMode);
            setAddCycleOpen(true);
            pushMessage("system", data.message || "Choose what to add in the center of the globe and then tap Earth to place it.", {
              title: "Add flow",
              pill: data.addMode,
              summary: `Add ${data.addMode}`
            });
            if (data.message) query.placeholder = data.message;
            return true;
          }
          if (data?.checkoutUrl) {
            window.open(data.checkoutUrl, "_blank", "noopener");
            pushMessage("system", data.message || "Checkout opened in a new tab.", {
              title: "Payments",
              pill: "checkout",
              summary: "Checkout opened"
            });
            query.placeholder = data.message || "Checkout opened";
            return true;
          }
          if (data?.payment === "card" && STRIPE_PAYMENT_LINK) {
            window.open(STRIPE_PAYMENT_LINK, "_blank", "noopener");
            query.placeholder = data.message || "Card checkout opened";
            return true;
          }
          if (data?.payment === "paypal" && paypalAvailable()) {
            const launched = await beginPayPalCheckout();
            if (launched && data.message) query.placeholder = data.message;
            return launched;
          }
          if (data?.signalId && signalStates.has(data.signalId)) {
            const state = signalStates.get(data.signalId);
            setActiveSignal(data.signalId, true);
            setZoom(clamp(Number.isFinite(data.zoom) ? data.zoom : (data.intent === "track" ? 0.92 : 1.02), 0, 1.2));
            if (state && (data.intent === "order" || data.intent === "assign")) {
              routeSignalAction(state, value, data.intent);
            } else if (state) {
              pushMessage("system", data.message || `${state.signal.title} is now the focused signal on the globe.`, {
                title: data.intent === "track" ? "Tracking" : "Signal found",
                pill: state.signal.type,
                signalId: state.signal.id,
                signalName: state.signal.title,
                status: data.intent === "track" ? "live" : "focused",
                summary: `${state.signal.title} focused`,
                metrics: state.signal.metrics.slice(0, 4),
                demo: !!state.signal.demo
              });
            }
            query.placeholder = data.message || `AI routed ${state?.signal.title || "signal"}`;
            return true;
          }
          if (data?.text) {
            pushMessage("system", data.text, {
              title: "AI",
              pill: data.provider || "live",
              summary: data.text.slice(0, 80)
            });
            query.placeholder = "AI answered in the communication drawer";
            return true;
          }
        } catch (error) {
          console.warn("Astranov AI route unavailable", error);
        }
        return false;
      }

      async function submitQuery() {
        const value = query.value.trim();
        if (!value) {
          cycleSignal();
          return;
        }
        pushMessage("user", value, {
          title: "You",
          pill: listening ? "voice" : "command",
          summary: value,
          expand: true,
          demo: false
        });
        query.value = "";
        updatePreview();
        autoSizeQuery();
        if (appState.searchBusy) return;
        appState.searchBusy = true;
        if (await runAiCommand(value)) {
          appState.searchBusy = false;
          return;
        }
        const analysis = analyzeCommand(value);
        if (analysis.intent === "add") {
          setPanel(null);
          setAddCycleOpen(true);
          pushMessage("system", "Choose shop, service, or video from the add ring, then tap the Earth to place the new signal exactly where it belongs.", {
            title: "Add signal",
            pill: "ready",
            summary: "Add flow ready"
          });
          appState.searchBusy = false;
          return;
        }
        const ranked = rankSignals(value);
        if (!ranked.length) {
          flashNoMatch();
          pushMessage("system", "No visible live signal matched that command. Try a nearby product, service, driver, or turn demo mode back on from the user menu.", {
            title: "No match",
            pill: "retry",
            summary: "No signal match",
            demo: false
          });
          appState.searchBusy = false;
          return;
        }
        const picked = ranked.find((entry) => {
          const candidate = signalStates.get(entry.id);
          return candidate && frontFacing(candidate);
        }) || ranked[0];
        const state = signalStates.get(picked.id);
        setActiveSignal(picked.id, true);
        setZoom(analysis.intent === "order" || analysis.intent === "assign" ? 1.02 : 0.78);
        if (!state) return;

        if (analysis.intent === "order") {
          routeSignalAction(state, value, "order");
        } else if (analysis.intent === "assign") {
          routeSignalAction(state, value, "assign");
        } else {
          pushMessage("system", analysis.intent === "track"
            ? `${state.signal.title} is now pinned in the communication drawer, and the globe will keep that location easy to jump back into.`
            : `${state.signal.title} is focused. You can order, track, or assign directly from the emitted tile now.`, {
              title: analysis.intent === "track" ? "Tracking ready" : "Signal ready",
              pill: state.signal.type,
              signalId: state.signal.id,
              signalName: state.signal.title,
              status: analysis.intent === "track" ? "live" : "focused",
              summary: `${state.signal.title} ready`,
              metrics: state.signal.metrics.slice(0, 4),
              demo: !!state.signal.demo
            });
        }

        query.placeholder = analysis.intent === "order"
          ? `${AI_ENDPOINT ? "AI routed" : "Local AI routed"} ${state.signal.title} for ordering`
          : analysis.intent === "assign"
            ? `${AI_ENDPOINT ? "AI assigned" : "Local AI assigned"} ${state.signal.title}`
          : analysis.intent === "track"
            ? `${AI_ENDPOINT ? "AI locked" : "Local AI locked"} ${state.signal.title} for tracking`
            : `${AI_ENDPOINT ? "AI found" : "Local AI found"} ${state.signal.title}`;
        appState.searchBusy = false;
      }

      SIGNALS.forEach(createSignalState);
      bootstrapDatabase().finally(() => handlePayPalReturn());
      let longPressTimer = null;
      let recognition = null;
      let listening = false;

      function resize() {
        appState.width = window.innerWidth;
        appState.height = window.innerHeight;
        const profile = viewportProfile();
        appState.screen.name = profile.micro ? "micro" : profile.narrow ? "narrow" : profile.compact ? "compact" : profile.desktop ? "desktop" : "standard";
        appState.screen.orientation = profile.orientation;
        appState.screen.renderScale = profile.renderScale;
        USER_INFO.mode = `${profile.orientation} ${profile.micro ? "micro" : profile.narrow ? "narrow" : profile.compact ? "compact" : profile.desktop ? "desktop" : "adaptive"} shell`;
        renderer.setPixelRatio(profile.renderScale);
        renderer.setSize(appState.width, appState.height);
        camera.aspect = appState.width / appState.height;
        camera.updateProjectionMatrix();
        refreshDeviceTelemetry();
        updateTopHud();
        applyHudLayout();
        applyDrawerLayout();
        autoSizeQuery();
        if (!query.value.trim() && !listening && !appState.addMode) {
          query.placeholder = defaultQueryPlaceholder();
        }
      }

      function pruneSeeds(now) {
        signalStates.forEach((state) => {
          if (state.signal.transient && now - state.signal.bornAt > 18000) {
            removeSignal(state.signal.id);
            if (appState.seedId === state.signal.id) appState.seedId = null;
          }
        });
      }

      function autoCycle(now) {
        if (query.value.trim() || now < appState.holdUntil || appState.activeId) return;
        if (now - appState.lastCycle > 5200) {
          cycleSignal();
          appState.lastCycle = now;
        }
      }

      function setPointerFromClient(x, y) {
        pointer.x = (x / appState.width) * 2 - 1;
        pointer.y = -(y / appState.height) * 2 + 1;
        raycaster.setFromCamera(pointer, camera);
      }

      function beginHudMotion(mode, event) {
        appState.hud.mode = mode;
        appState.hud.pointerId = event.pointerId;
        appState.hud.startX = event.clientX;
        appState.hud.startY = event.clientY;
        appState.hud.startTop = appState.hud.top;
        appState.hud.startSize = appState.hud.size;
        perfWheel.classList.toggle("dragging", mode === "drag");
        radarWheel.classList.toggle("dragging", mode === "drag");
        perfWheel.classList.toggle("resizing", mode === "resize");
        radarWheel.classList.toggle("resizing", mode === "resize");
        event.preventDefault();
        event.stopPropagation();
      }

      function endHudMotion() {
        appState.hud.mode = null;
        appState.hud.pointerId = null;
        perfWheel.classList.remove("dragging", "resizing");
        radarWheel.classList.remove("dragging", "resizing");
      }

      function beginDrawerMotion(event) {
        appState.drawer.pointerId = event.pointerId;
        appState.drawer.startY = event.clientY;
        appState.drawer.startHeight = appState.drawer.expanded ? appState.drawer.height : appState.drawer.minHeight;
        appState.drawer.moved = false;
        event.preventDefault();
      }

      function endDrawerMotion() {
        if (appState.drawer.pointerId === null) return;
        const expanded = appState.drawer.height > (appState.drawer.minHeight + 52);
        appState.drawer.pointerId = null;
        setDrawerExpanded(expanded);
        persistDrawerHeight();
      }

      function adjustZoom(delta) {
        ensureFocusSignal();
        setZoom(appState.zoomTarget + delta);
        const focus = focusableSignalState();
        query.placeholder = appState.zoomTarget > 0.08 && focus
          ? `Zoom ${Math.round(appState.zoomTarget * 100)}% on ${focus.signal.title}`
          : "World view restored";
        appState.holdUntil = performance.now() + 6400;
      }

      if (!appState.messages.length) {
        pushMessage("system", defaultDrawerMessage(), {
          title: "Astranov ready",
          pill: appState.demoMode ? "demo" : "live",
          summary: defaultDrawerMessage(),
          expand: false,
          demo: appState.demoMode
        });
      } else {
        renderMessages();
      }
      setDrawerExpanded(false);

      query.addEventListener("input", () => {
        updatePreview();
        autoSizeQuery();
        if (query.value.trim()) setDrawerExpanded(true);
      });
      query.addEventListener("focus", () => setDrawerExpanded(true));
      query.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          submitQuery();
        }
      });

      commHandle.addEventListener("click", (event) => {
        event.stopPropagation();
        if (appState.drawer.moved) return;
        setDrawerExpanded(!appState.drawer.expanded);
      });

      commHandle.addEventListener("pointerdown", beginDrawerMotion);

      commFeed.addEventListener("click", (event) => {
        const button = event.target.closest("[data-jump-signal]");
        if (!button) return;
        const signalId = button.getAttribute("data-jump-signal");
        if (!signalId || !signalStates.has(signalId)) return;
        setActiveSignal(signalId, true);
        setZoom(Math.max(appState.zoomTarget, 1.02));
      });

      document.getElementById("composer").addEventListener("submit", (event) => {
        event.preventDefault();
        submitQuery();
      });

      userButton.addEventListener("click", (event) => {
        event.stopPropagation();
        togglePanel("user");
        centerOnUserLocation();
      });

      systemButton.addEventListener("click", (event) => {
        event.stopPropagation();
        togglePanel("system");
      });

      walletButton.addEventListener("click", (event) => {
        event.stopPropagation();
        togglePanel("wallet");
      });

      addBtn.addEventListener("click", (event) => {
        event.stopPropagation();
        setPanel(null);
        setAddCycleOpen(!appState.addCycleOpen);
      });

      perfCenterBtn.addEventListener("click", (event) => {
        event.stopPropagation();
        togglePanel("performance");
      });

      radarCenterBtn.addEventListener("click", (event) => {
        event.stopPropagation();
        if (appState.activeId === appState.userSignalId && appState.zoomTarget > 0.32) {
          setZoom(0);
          query.placeholder = "World view restored";
          return;
        }
        centerOnUserLocation();
      });

      addCycleButtons.forEach((button) => {
        button.addEventListener("click", (event) => {
          event.stopPropagation();
          setAddMode(button.dataset.addKind);
        });
      });

      [perfWheel, radarWheel].forEach((wheel) => {
        wheel.addEventListener("pointerdown", (event) => {
          if (event.target.closest(".wheel-center-btn, .wheel-resize-grip")) return;
          beginHudMotion("drag", event);
        });
      });

      [perfResizeGrip, radarResizeGrip].forEach((grip) => {
        grip.addEventListener("pointerdown", (event) => beginHudMotion("resize", event));
      });

      document.addEventListener("pointerdown", (event) => {
        const target = event.target;
        if (target.closest?.(".add-cycle-btn") || addBtn.contains(target)) return;
        if (commDrawer.contains(target)) return;
        if (topPanel.contains(target) || userButton.contains(target) || systemButton.contains(target) || walletButton.contains(target)) return;
        setAddCycleOpen(false);
        setPanel(null);
      });

      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.lang = "en-US";
        recognition.interimResults = true;
        recognition.continuous = false;
        recognition.onresult = (event) => {
          let text = "";
          for (let index = event.resultIndex; index < event.results.length; index += 1) {
            text += `${event.results[index][0].transcript} `;
          }
          query.value = text.trim();
          updatePreview();
          autoSizeQuery();
          setDrawerExpanded(true);
          if (event.results[event.results.length - 1].isFinal) submitQuery();
        };
        recognition.onend = () => {
          listening = false;
          voiceBtn.dataset.active = "false";
          if (appState.texturesReady) {
            query.placeholder = defaultQueryPlaceholder();
          }
        };
      }

      voiceBtn.addEventListener("click", () => {
        if (!recognition) {
          flashNoMatch();
          return;
        }
        if (listening) {
          recognition.stop();
          return;
        }
        listening = true;
        voiceBtn.dataset.active = "true";
        query.placeholder = "Listening...";
        setDrawerExpanded(true);
        recognition.start();
      });

      renderer.domElement.style.touchAction = "none";
      renderer.domElement.addEventListener("wheel", (event) => {
        event.preventDefault();
        adjustZoom(event.deltaY < 0 ? 0.12 : -0.12);
      }, { passive: false });

      renderer.domElement.addEventListener("pointerdown", (event) => {
        activePointers.set(event.pointerId, { x: event.clientX, y: event.clientY });
        if (activePointers.size === 2) {
          const points = [...activePointers.values()];
          appState.dragging = false;
          window.clearTimeout(longPressTimer);
          appState.pinchStart = Math.hypot(points[0].x - points[1].x, points[0].y - points[1].y);
          appState.pinchZoomStart = appState.zoomTarget;
          ensureFocusSignal();
          return;
        }
        if (activePointers.size > 1) return;
        appState.dragging = true;
        appState.dragMoved = false;
        appState.pointerStartX = appState.lastPointerX = event.clientX;
        appState.pointerStartY = appState.lastPointerY = event.clientY;
        window.clearTimeout(longPressTimer);
      });

      window.addEventListener("pointermove", (event) => {
        if (activePointers.has(event.pointerId)) {
          activePointers.set(event.pointerId, { x: event.clientX, y: event.clientY });
        }
        if (appState.drawer.pointerId === event.pointerId) {
          const delta = appState.drawer.startY - event.clientY;
          if (Math.abs(delta) > 3) appState.drawer.moved = true;
          if (!appState.drawer.expanded && delta > 8) appState.drawer.expanded = true;
          if (appState.drawer.expanded) {
            appState.drawer.height = clamp(appState.drawer.startHeight + delta, 132, appState.drawer.maxHeight);
            commDrawer.dataset.expanded = "true";
            commDrawer.dataset.open = "true";
            applyDrawerLayout();
          }
          return;
        }
        if (appState.hud.mode && appState.hud.pointerId === event.pointerId) {
          if (appState.hud.mode === "drag") {
            appState.hud.top = appState.hud.startTop + (event.clientY - appState.hud.startY);
          } else {
            const delta = ((event.clientX - appState.hud.startX) * 0.4) + ((event.clientY - appState.hud.startY) * 0.7);
            appState.hud.size = appState.hud.startSize + delta;
          }
          applyHudLayout();
          return;
        }
        if (activePointers.size === 2 && activePointers.has(event.pointerId)) {
          const points = [...activePointers.values()];
          const distance = Math.hypot(points[0].x - points[1].x, points[0].y - points[1].y);
          if (!appState.pinchStart) {
            appState.pinchStart = distance;
            appState.pinchZoomStart = appState.zoomTarget;
          }
          setZoom(appState.pinchZoomStart + ((distance - appState.pinchStart) / Math.min(appState.width, appState.height)) * 2.1);
          const focus = focusableSignalState();
          query.placeholder = appState.zoomTarget > 0.08 && focus
            ? `Zoom ${Math.round(appState.zoomTarget * 100)}% on ${focus.signal.title}`
            : "World view restored";
          appState.holdUntil = performance.now() + 6400;
          return;
        }
        if (!appState.dragging) return;
        const dx = event.clientX - appState.lastPointerX;
        const dy = event.clientY - appState.lastPointerY;
        if (Math.hypot(event.clientX - appState.pointerStartX, event.clientY - appState.pointerStartY) > 6) {
          appState.dragMoved = true;
          window.clearTimeout(longPressTimer);
        }
        targetRotation.y += dx * 0.006;
        targetRotation.x = clamp(targetRotation.x + dy * 0.0032, -0.76, 0.76);
        appState.lastPointerX = event.clientX;
        appState.lastPointerY = event.clientY;
        appState.holdUntil = performance.now() + 6800;
      });

      const endPointer = (event) => {
        activePointers.delete(event.pointerId);
        if (appState.drawer.pointerId === event.pointerId) {
          endDrawerMotion();
          return;
        }
        if (appState.hud.mode && appState.hud.pointerId === event.pointerId) {
          endHudMotion();
          return;
        }
        if (activePointers.size < 2) {
          appState.pinchStart = 0;
        }
        if (!appState.dragging) return;
        appState.dragging = false;
        window.clearTimeout(longPressTimer);
        if (appState.dragMoved) return;

        setPointerFromClient(event.clientX, event.clientY);
        const signalHit = raycaster.intersectObjects(interactive, false)[0];
        if (signalHit && signalHit.object.userData.signalId) {
          setActiveSignal(signalHit.object.userData.signalId, true);
          return;
        }

        const earthHit = raycaster.intersectObject(earth, false)[0];
        if (earthHit && appState.addMode) {
          const inverse = new THREE.Matrix4().copy(globeGroup.matrixWorld).invert();
          spawnSeed(earthHit.point.clone().applyMatrix4(inverse));
          return;
        }
        if (earthHit && appState.activeId) {
          clearActiveSignal();
          return;
        }
        if (!earthHit) clearActiveSignal();
      };

      window.addEventListener("pointerup", endPointer);
      window.addEventListener("pointercancel", endPointer);

      function animate(now) {
        requestAnimationFrame(animate);
        pruneSeeds(now);
        autoCycle(now);

        const focusState = signalStates.get(appState.activeId || appState.previewId);
        if (!appState.dragging && activePointers.size < 2) {
          targetRotation.y += EARTH_SPIN;
        }

        rotation.x = damp(rotation.x, targetRotation.x, 0.08);
        rotation.y = dampAngle(rotation.y, targetRotation.y, 0.08);
        globeGroup.rotation.x = rotation.x;
        globeGroup.rotation.y = rotation.y;

        appState.zoomLevel = damp(appState.zoomLevel, appState.zoomTarget, 0.08);
        const zoomDepth = appState.zoomLevel;
        targetCamera.z = CAMERA_BASE.z - zoomDepth * 2.04;
        targetCamera.y = CAMERA_BASE.y - zoomDepth * 0.12;
        targetCamera.fov = CAMERA_BASE.fov - zoomDepth * 12.4;
        cameraState.z = damp(cameraState.z, targetCamera.z, 0.06);
        cameraState.y = damp(cameraState.y, targetCamera.y, 0.06);
        cameraState.fov = damp(cameraState.fov, targetCamera.fov, 0.06);
        camera.position.set(0, cameraState.y, cameraState.z);
        camera.fov = cameraState.fov;
        camera.updateProjectionMatrix();
        globeGroup.updateMatrixWorld();

        earth.rotation.y = 0;
        nightShell.rotation.y = 0;
        stars.rotation.y += 0.00003;
        brightStars.rotation.y -= 0.000018;

        appState.device.load = clamp(Math.round(32 + (focusState ? 12 : 0) + (appState.dragging ? 18 : 0) + appState.ambientIds.length * 4 + Math.abs(Math.sin(now * 0.0014)) * 10), 18, 96);

        nightShell.material.opacity = damp(nightShell.material.opacity, 0.24, 0.05);

        signalStates.forEach((state) => syncSignalState(state, now));
        updateAmbientSignals();
        renderOverlay(now);
        updatePerformanceHud(now);
        updateRadarHud(now);

        renderer.render(scene, camera);
      }

      refreshDeviceTelemetry();
      updateTopHud();
      resize();
      window.addEventListener("resize", resize);
      animate(0);
    })();
  </script>
</body>
</html>
