<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Astranov Planet</title>
  <style>
    :root {
      --bg-0: #02050b;
      --bg-1: #07111a;
      --bg-2: #12273e;
      --surface: rgba(10, 16, 24, 0.76);
      --surface-strong: rgba(11, 18, 28, 0.9);
      --border: rgba(28, 216, 255, 0.14);
      --electric: #16d9ff;
      --electric-strong: #9ff6ff;
      --electric-soft: rgba(22, 217, 255, 0.1);
      --anchor: #4df2c8;
      --presence: #b4f9ff;
      --cloud: #41c6ff;
      --text: #edf2f7;
      --muted: #97a9bb;
      --font-ui: "Segoe UI", "SF Pro Text", system-ui, sans-serif;
      --font-tech: "Segoe UI", "SF Pro Display", system-ui, sans-serif;
      --safe-top: max(14px, env(safe-area-inset-top));
      --safe-right: max(14px, env(safe-area-inset-right));
      --safe-bottom: max(14px, env(safe-area-inset-bottom));
      --safe-left: max(14px, env(safe-area-inset-left));
      --wheel-size: clamp(170px, 42vw, 210px);
      --top-bar-height: 52px;
      --top-edge-btn-size: 48px;
      --comm-collapsed-height: 48px;
      --comm-max-height: min(62vh, 480px);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      max-width: 100vw;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: var(--font-ui);
      color: var(--text);
      background:
        radial-gradient(circle at 50% 14%, rgba(20, 39, 58, 0.14), transparent 30%),
        radial-gradient(circle at 18% 16%, rgba(255, 255, 255, 0.03), transparent 18%),
        linear-gradient(180deg, #05101a 0%, #02060c 64%, #010206 100%);
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    body::before {
      background: radial-gradient(circle at 50% 55%, rgba(255, 255, 255, 0.028), transparent 60%);
      opacity: 0.22;
    }

    body::after {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent 18%);
      opacity: 0.16;
    }

    button,
    input {
      font: inherit;
    }

    #app,
    #scene,
    #overlay,
    #connectorSvg,
    #signalLayer {
      position: fixed;
      inset: 0;
    }

    #scene canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #connectorSvg {
      z-index: 6;
      overflow: visible;
      pointer-events: none;
    }

    #signalLayer {
      z-index: 7;
      pointer-events: none;
    }

    #overlay {
      z-index: 12;
      pointer-events: none;
    }

    #topBar {
      position: absolute;
      top: var(--safe-top);
      left: var(--safe-left);
      right: var(--safe-right);
      display: grid;
      grid-template-columns: var(--top-edge-btn-size) minmax(0, 1fr) var(--top-edge-btn-size);
      gap: clamp(5px, 2vw, 10px);
      align-items: center;
      pointer-events: auto;
      z-index: 14;
    }

    .top-btn {
      min-width: 0;
      min-height: var(--top-bar-height);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 12px;
      border: 1px solid rgba(22, 217, 255, 0.16);
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(18, 24, 33, 0.88), rgba(12, 17, 24, 0.74));
      box-shadow:
        0 10px 24px rgba(0, 0, 0, 0.2),
        inset 0 0 0 1px rgba(255, 255, 255, 0.02);
      color: var(--text);
      backdrop-filter: blur(14px);
      cursor: pointer;
      transition: transform 0.16s ease, border-color 0.16s ease, box-shadow 0.16s ease;
    }

    .top-btn:active {
      transform: scale(0.97);
    }

    .top-btn:hover,
    .top-btn[data-open="true"] {
      border-color: rgba(22, 217, 255, 0.3);
      box-shadow:
        0 16px 36px rgba(0, 0, 0, 0.34),
        0 0 28px rgba(22, 217, 255, 0.14),
        inset 0 0 0 1px rgba(255, 255, 255, 0.03);
    }

    .top-btn.avatar,
    .top-btn.wallet {
      flex: 0 0 var(--top-edge-btn-size);
      padding: 0;
      width: var(--top-edge-btn-size);
      min-height: var(--top-edge-btn-size);
    }

    .top-btn.avatar {
      grid-column: 1;
      justify-self: start;
    }

    .top-btn.system {
      grid-column: 2;
      min-width: 0;
      justify-content: center;
      padding: 8px 14px;
      max-width: 100%;
      overflow: hidden;
    }

    .top-btn.wallet {
      grid-column: 3;
      justify-self: end;
    }

    .top-btn-icon {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.06);
      color: #ecf3fb;
    }

    .top-btn-icon svg {
      width: 15px;
      height: 15px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .avatar-photo {
      width: 28px;
      height: 28px;
      display: block;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background:
        radial-gradient(circle at 50% 34%, #f9ddc5 0 24%, transparent 25%),
        radial-gradient(circle at 50% 78%, #cda185 0 28%, transparent 29%),
        linear-gradient(180deg, #6f7f91 0%, #243342 100%);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
    }

    .top-btn-stack {
      min-width: 0;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 1.05;
      overflow: hidden;
    }

    .top-btn-title {
      font-family: var(--font-tech);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #e9fbff;
      max-width: 100%;
      overflow-wrap: anywhere;
      text-align: center;
    }

    .top-btn-sub {
      margin-top: 3px;
      font-size: 10px;
      color: var(--muted);
      white-space: normal;
      text-align: center;
      line-height: 1.1;
      overflow-wrap: anywhere;
      max-width: 100%;
    }

    #topPanel {
      position: absolute;
      top: calc(var(--safe-top) + var(--top-bar-height) + 10px);
      width: min(86vw, 340px);
      opacity: 0;
      pointer-events: none;
      transform: translateY(-8px) scale(0.98);
      transition: opacity 0.18s ease, transform 0.18s ease;
      z-index: 15;
    }

    #topPanel[data-open="true"] {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0) scale(1);
    }

    #topPanel[data-position="left"] {
      left: var(--safe-left);
    }

    #topPanel[data-position="center"] {
      left: 50%;
      transform: translateX(-50%) translateY(-8px) scale(0.98);
    }

    #topPanel[data-open="true"][data-position="center"] {
      transform: translateX(-50%) translateY(0) scale(1);
    }

    #topPanel[data-position="right"] {
      right: var(--safe-right);
    }

    #commDrawer {
      position: absolute;
      left: var(--safe-left);
      right: var(--safe-right);
      height: var(--comm-collapsed-height);
      border: 1px solid rgba(22, 217, 255, 0.14);
      border-radius: 22px;
      background:
        linear-gradient(180deg, rgba(17, 24, 33, 0.94), rgba(10, 15, 23, 0.86)),
        radial-gradient(circle at 50% 0%, rgba(22, 217, 255, 0.06), transparent 54%);
      box-shadow:
        0 18px 36px rgba(0, 0, 0, 0.26),
        0 0 16px rgba(22, 217, 255, 0.06);
      backdrop-filter: blur(18px);
      pointer-events: auto;
      overflow: hidden;
      z-index: 13;
      transition: height 0.18s ease, border-color 0.16s ease, box-shadow 0.16s ease, transform 0.18s ease;
    }

    #commDrawer[data-expanded="true"] {
      border-color: rgba(22, 217, 255, 0.22);
      box-shadow:
        0 28px 52px rgba(0, 0, 0, 0.32),
        0 0 24px rgba(22, 217, 255, 0.1);
    }

    #commHandle {
      width: 100%;
      height: var(--comm-collapsed-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 0 14px;
      border: 0;
      background: transparent;
      color: #edf7ff;
      cursor: pointer;
    }

    .comm-handle-main {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .comm-handle-grip {
      width: 34px;
      height: 6px;
      border-radius: 999px;
      background: rgba(236, 247, 255, 0.36);
      box-shadow: 0 0 10px rgba(22, 217, 255, 0.16);
      flex: 0 0 auto;
    }

    .comm-handle-label {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    #commHandleTitle {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: #eef7ff;
      text-align: left;
    }

    #commHandleMeta {
      font-size: 10px;
      color: var(--muted);
      text-align: left;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 44vw;
    }

    #commHandleCount {
      min-width: 28px;
      height: 28px;
      padding: 0 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #eaf7ff;
      font-size: 11px;
      font-weight: 600;
      flex: 0 0 auto;
    }

    #commShell {
      position: absolute;
      inset: var(--comm-collapsed-height) 0 0;
      display: flex;
      flex-direction: column;
      min-height: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.16s ease;
    }

    #commDrawer[data-expanded="true"] #commShell {
      opacity: 1;
      pointer-events: auto;
    }

    #commFeed {
      flex: 1;
      min-height: 0;
      padding: 8px 12px 14px;
      overflow-y: auto;
      display: grid;
      align-content: start;
      gap: 10px;
    }

    .comm-empty {
      padding: 10px 12px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .comm-message {
      display: flex;
      gap: 8px;
    }

    .comm-message.user {
      justify-content: flex-end;
    }

    .comm-message.system,
    .comm-message.order {
      justify-content: flex-start;
    }

    .comm-bubble {
      width: min(100%, 420px);
      padding: 12px 13px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.045);
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.02);
    }

    .comm-message.user .comm-bubble {
      background: linear-gradient(180deg, rgba(25, 80, 110, 0.9), rgba(14, 39, 55, 0.88));
      border-color: rgba(22, 217, 255, 0.22);
    }

    .comm-message.order .comm-bubble {
      background: linear-gradient(180deg, rgba(15, 31, 44, 0.96), rgba(10, 18, 28, 0.94));
      border-color: rgba(22, 217, 255, 0.18);
    }

    .comm-bubble-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 6px;
    }

    .comm-bubble-heading {
      min-width: 0;
      color: #eef8ff;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.02em;
      overflow-wrap: anywhere;
    }

    .comm-bubble-pill {
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(22, 217, 255, 0.12);
      color: #b9f5ff;
      font-size: 10px;
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .comm-bubble-copy {
      color: #d1deea;
      font-size: 12.4px;
      line-height: 1.48;
      overflow-wrap: anywhere;
    }

    .comm-order-tile {
      margin-top: 10px;
      width: 100%;
      display: grid;
      gap: 8px;
      padding: 10px 11px;
      border-radius: 16px;
      border: 1px solid rgba(22, 217, 255, 0.18);
      background: rgba(6, 14, 22, 0.72);
      color: inherit;
      cursor: pointer;
      text-align: left;
    }

    .comm-order-tile.active {
      box-shadow: 0 0 22px rgba(22, 217, 255, 0.14);
    }

    .comm-order-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .comm-order-name {
      min-width: 0;
      color: #eefbff;
      font-size: 12px;
      font-weight: 600;
      overflow-wrap: anywhere;
    }

    .comm-order-status {
      color: #9ff6ff;
      font-size: 10px;
      white-space: nowrap;
    }

    .comm-order-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .comm-order-metric {
      min-width: 0;
      display: grid;
      gap: 2px;
    }

    .comm-order-label {
      color: var(--muted);
      font-size: 9px;
      letter-spacing: 0.04em;
    }

    .comm-order-value {
      color: #eaf8ff;
      font-size: 11px;
      overflow-wrap: anywhere;
    }

    .top-panel-shell {
      display: grid;
      gap: 12px;
      padding: 14px;
      border: 1px solid rgba(22, 217, 255, 0.16);
      border-radius: 20px;
      background:
        linear-gradient(180deg, rgba(18, 25, 34, 0.94), rgba(11, 17, 24, 0.86)),
        radial-gradient(circle at 50% 0%, rgba(22, 217, 255, 0.08), transparent 58%);
      box-shadow:
        0 24px 56px rgba(0, 0, 0, 0.4),
        0 0 28px rgba(22, 217, 255, 0.1);
      backdrop-filter: blur(16px);
    }

    .top-panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .top-panel-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #ebfbff;
    }

    .top-panel-sub {
      font-size: 11px;
      color: var(--muted);
      overflow-wrap: anywhere;
    }

    .top-panel-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .top-panel-metric {
      min-width: 0;
      padding: 9px 10px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.035);
    }

    .top-panel-label {
      display: block;
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 8px;
      letter-spacing: 0.04em;
      text-transform: none;
    }

    .top-panel-value {
      display: block;
      color: #eefcff;
      font-size: 12px;
      line-height: 1.2;
      overflow-wrap: anywhere;
    }

    .top-panel-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .top-panel-btn {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      padding: 0;
      border: 1px solid rgba(22, 217, 255, 0.16);
      border-radius: 50%;
      background: rgba(15, 22, 31, 0.92);
      color: #f0fcff;
      cursor: pointer;
      transition: transform 0.16s ease, border-color 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
    }

    .top-panel-btn svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .top-panel-btn:hover,
    .top-panel-btn:focus-visible {
      border-color: rgba(22, 217, 255, 0.3);
      background: rgba(15, 31, 44, 0.96);
      box-shadow: 0 0 16px rgba(22, 217, 255, 0.12);
      transform: translateY(-1px);
    }

    .hud-wheel {
      --hud-center-size: 60px;
      --hud-radar-center-size: 52px;
      --hud-center-icon-size: 20px;
      --hud-center-value-size: 9.6px;
      --hud-stat-font: 7.8px;
      --hud-stat-sub-font: 6.7px;
      --hud-stat-width: 56px;
      --hud-meta-font: 7.6px;
      --hud-meta-bottom: 8px;
      --hud-north-top: 12px;
      --hud-side-top: 34px;
      --hud-side-inset: 14px;
      --hud-south-bottom: 26px;
      --hud-grip-size: 22px;
      position: absolute;
      width: var(--wheel-size);
      height: var(--wheel-size);
      display: block;
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 50%;
      overflow: hidden;
      pointer-events: auto;
      background: linear-gradient(180deg, rgba(16, 22, 30, 0.9), rgba(10, 15, 22, 0.86));
      box-shadow:
        0 18px 42px rgba(0, 0, 0, 0.32),
        inset 0 0 0 1px rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(12px);
      transition: transform 0.16s ease, border-color 0.16s ease, box-shadow 0.16s ease;
    }

    .hud-wheel.left {
      left: var(--safe-left);
    }

    .hud-wheel.right {
      right: var(--safe-right);
    }

    .hud-wheel::before,
    .hud-wheel::after {
      display: none;
    }

    .hud-wheel[data-active="true"] {
      border-color: rgba(22, 217, 255, 0.22);
      box-shadow:
        0 20px 44px rgba(0, 0, 0, 0.34),
        0 0 16px rgba(22, 217, 255, 0.06),
        inset 0 0 0 1px rgba(255, 255, 255, 0.03);
    }

    .hud-wheel.dragging,
    .hud-wheel.resizing {
      border-color: rgba(22, 217, 255, 0.42);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.04) inset,
        0 0 26px rgba(22, 217, 255, 0.14),
        0 20px 40px rgba(0, 0, 0, 0.36);
    }

    .wheel-content {
      position: absolute;
      inset: 0;
    }

    .wheel-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .wheel-meta {
      position: absolute;
      bottom: var(--hud-meta-bottom);
      width: 100%;
      padding: 0 12px;
      color: var(--muted);
      font-size: var(--hud-meta-font);
      letter-spacing: 0.02em;
      text-align: center;
      text-transform: none;
      white-space: normal;
      line-height: 1.2;
      overflow-wrap: anywhere;
    }

    .wheel-stat {
      position: absolute;
      z-index: 2;
      color: #e7f5ff;
      font-size: var(--hud-stat-font);
      font-weight: 600;
      letter-spacing: 0.03em;
      line-height: 1.15;
      text-transform: none;
      text-align: center;
      white-space: normal;
      max-width: var(--hud-stat-width);
    }

    .perf-wheel .wheel-stat {
      padding: 4px 6px;
      border-radius: 10px;
      background: rgba(7, 13, 19, 0.34);
      backdrop-filter: blur(4px);
    }

    .wheel-stat small {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: var(--hud-stat-sub-font);
      letter-spacing: 0.02em;
      overflow-wrap: anywhere;
    }

    .wheel-stat.north {
      top: var(--hud-north-top);
      left: 50%;
      transform: translateX(-50%);
    }

    .wheel-stat.west {
      top: var(--hud-side-top);
      left: var(--hud-side-inset);
      text-align: left;
    }

    .wheel-stat.east {
      top: var(--hud-side-top);
      right: var(--hud-side-inset);
      text-align: right;
    }

    .wheel-stat.south {
      bottom: var(--hud-south-bottom);
      left: 50%;
      transform: translateX(-50%);
    }

    .wheel-center-btn {
      z-index: 2;
      position: absolute;
      left: 50%;
      top: 50%;
      width: var(--hud-center-size);
      height: var(--hud-center-size);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      transform: translate(-50%, -50%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 50%;
      background: rgba(9, 15, 21, 0.96);
      box-shadow:
        0 10px 18px rgba(0, 0, 0, 0.18),
        inset 0 0 0 1px rgba(255, 255, 255, 0.02);
      color: #eefcff;
      cursor: pointer;
    }

    .wheel-center-btn:active {
      transform: translate(-50%, -50%) scale(0.96);
    }

    .radar-wheel .wheel-center-btn {
      width: var(--hud-radar-center-size);
      height: var(--hud-radar-center-size);
    }

    .wheel-center-icon {
      width: var(--hud-center-icon-size);
      height: var(--hud-center-icon-size);
      display: grid;
      place-items: center;
    }

    .wheel-center-icon svg {
      width: var(--hud-center-icon-size);
      height: var(--hud-center-icon-size);
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .wheel-center-value {
      font-size: var(--hud-center-value-size);
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    .perf-wheel .wheel-center-btn.active {
      border-color: rgba(77, 242, 200, 0.24);
      box-shadow:
        0 10px 24px rgba(0, 0, 0, 0.24),
        inset 0 0 0 1px rgba(77, 242, 200, 0.08);
    }

    .wheel-resize-grip {
      position: absolute;
      right: max(8px, calc(var(--hud-grip-size) * 0.45));
      bottom: max(8px, calc(var(--hud-grip-size) * 0.45));
      width: var(--hud-grip-size);
      height: var(--hud-grip-size);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 50%;
      background: rgba(10, 18, 26, 0.92);
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.12);
      cursor: nwse-resize;
    }

    .wheel-resize-grip::before,
    .wheel-resize-grip::after {
      content: "";
      position: absolute;
      background: rgba(234, 252, 255, 0.72);
      border-radius: 999px;
    }

    .wheel-resize-grip::before {
      left: 22%;
      top: 42%;
      width: 40%;
      height: 2px;
      transform: rotate(-38deg);
    }

    .wheel-resize-grip::after {
      left: 41%;
      top: 22%;
      width: 2px;
      height: 40%;
      transform: rotate(-38deg);
    }

    #radarSweep {
      transform-origin: 60px 60px;
    }

    #radarSweepCone {
      transform-origin: 60px 60px;
    }

    .radar-compass {
      fill: rgba(222, 235, 245, 0.68);
      font-size: 5.5px;
      letter-spacing: 0.03em;
      text-transform: none;
    }

    #composer {
      position: absolute;
      left: var(--safe-left);
      right: var(--safe-right);
      bottom: var(--safe-bottom);
      min-height: 72px;
      display: grid;
      grid-template-columns: 48px minmax(0, 1fr) 48px;
      align-items: flex-end;
      gap: 8px;
      padding: 10px 8px 8px;
      border: 1px solid rgba(22, 217, 255, 0.16);
      border-radius: 24px;
      background:
        linear-gradient(180deg, rgba(18, 25, 34, 0.92), rgba(11, 17, 24, 0.8)),
        radial-gradient(circle at 50% -18%, rgba(22, 217, 255, 0.08), transparent 46%);
      box-shadow:
        0 20px 44px rgba(0, 0, 0, 0.28),
        0 0 18px rgba(22, 217, 255, 0.08),
        inset 0 0 0 1px rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(16px);
      pointer-events: auto;
    }

    #composerField {
      position: relative;
      flex: 1;
      min-width: 0;
      padding-top: 24px;
    }

    .composer-btn {
      width: 48px;
      height: 48px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      border: 1px solid rgba(22, 217, 255, 0.14);
      border-radius: 17px;
      background: rgba(255, 255, 255, 0.045);
      color: #ddeaf8;
      cursor: pointer;
      transition: transform 0.16s ease, border-color 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
    }

    .composer-btn:active {
      transform: scale(0.96);
    }

    .composer-btn[data-active="true"] {
      border-color: rgba(22, 217, 255, 0.38);
      background:
        radial-gradient(circle at 50% 35%, rgba(22, 217, 255, 0.26), rgba(22, 217, 255, 0.08) 65%),
        rgba(22, 217, 255, 0.08);
      box-shadow: 0 0 24px rgba(22, 217, 255, 0.2);
      animation: listenPulse 1.5s ease-in-out infinite;
    }

    #query {
      flex: 1;
      width: 100%;
      min-height: 52px;
      max-height: min(28vh, 220px);
      padding: 14px 16px;
      border: 1px solid rgba(22, 217, 255, 0.12);
      border-radius: 17px;
      outline: none;
      background: rgba(255, 255, 255, 0.045);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.02);
      color: var(--text);
      font-size: 16px;
      line-height: 1.4;
      resize: none;
      overflow-y: hidden;
      transition: border-color 0.16s ease, box-shadow 0.16s ease, transform 0.16s ease;
    }

    #addBtn {
      position: absolute;
      top: -34px;
      right: -2px;
      width: 52px;
      min-width: 52px;
      height: 52px;
      padding: 0;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      background: rgba(12, 19, 27, 0.96);
      color: #ebf6ff;
      font-size: 28px;
      font-weight: 400;
      line-height: 1;
      display: grid;
      place-items: center;
      cursor: pointer;
      box-shadow: 0 14px 28px rgba(0, 0, 0, 0.26);
    }

    #addCycle {
      position: fixed;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease;
      z-index: 14;
    }

    #addCycle::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 50%, rgba(8, 16, 24, 0.16), transparent 28%);
      opacity: 0;
      transition: opacity 0.18s ease;
    }

    #addCycle[data-open="true"] {
      opacity: 1;
      pointer-events: auto;
    }

    #addCycle[data-open="true"]::before {
      opacity: 1;
    }

    .add-cycle-btn {
      --add-x: 0px;
      --add-y: 0px;
      --add-scale: 0.84;
      position: absolute;
      left: 50%;
      top: 50%;
      width: 58px;
      height: 58px;
      display: grid;
      place-items: center;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(10, 16, 24, 0.96);
      color: #e9faff;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.28);
      cursor: pointer;
      opacity: 0;
      transform: translate(-50%, -50%) translate(var(--add-x), var(--add-y)) scale(var(--add-scale));
      transition: transform 0.18s ease, border-color 0.16s ease, box-shadow 0.16s ease, background 0.16s ease, opacity 0.18s ease;
    }

    .add-cycle-btn svg {
      width: 22px;
      height: 22px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .add-cycle-btn[data-active="true"],
    .add-cycle-btn:hover {
      border-color: rgba(22, 217, 255, 0.28);
      background: rgba(14, 30, 42, 0.96);
      box-shadow: 0 0 14px rgba(22, 217, 255, 0.14), 0 14px 24px rgba(0, 0, 0, 0.32);
      transform: translate(-50%, -50%) translate(var(--add-x), calc(var(--add-y) - 2px)) scale(var(--add-scale));
    }

    #addCycle[data-open="true"] .add-cycle-btn {
      opacity: 1;
    }

    #addCycle[data-open="true"] .add-cycle-btn:nth-child(1) {
      --add-x: 0px;
      --add-y: -102px;
      --add-scale: 1;
    }

    #addCycle[data-open="true"] .add-cycle-btn:nth-child(2) {
      --add-x: -88px;
      --add-y: 34px;
      --add-scale: 1;
    }

    #addCycle[data-open="true"] .add-cycle-btn:nth-child(3) {
      --add-x: 88px;
      --add-y: 34px;
      --add-scale: 1;
    }

    #query::placeholder {
      color: #7e9bb0;
    }

    #query:focus {
      border-color: rgba(22, 217, 255, 0.34);
      box-shadow:
        0 0 0 1px rgba(22, 217, 255, 0.12),
        0 0 18px rgba(22, 217, 255, 0.08);
    }

    #query.no-match {
      border-color: rgba(255, 116, 156, 0.38);
      box-shadow: 0 0 0 1px rgba(255, 116, 156, 0.14);
      transform: translateX(-2px);
    }
    .signal-popup {
      position: absolute;
      width: min(86vw, 352px);
      min-width: min(78vw, 236px);
      border: 1px solid rgba(22, 217, 255, 0.14);
      border-radius: 22px;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(10, 14, 20, 0.98), rgba(13, 18, 25, 0.96));
      box-shadow:
        0 24px 52px rgba(0, 0, 0, 0.42),
        0 0 14px rgba(22, 217, 255, 0.05),
        inset 0 0 0 1px rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(24px);
      opacity: 0;
      transform: scale(0.72);
      pointer-events: none;
      will-change: left, top, opacity, transform;
    }

    .signal-popup::before,
    .signal-popup::after {
      content: "";
      position: absolute;
      pointer-events: none;
    }

    .signal-popup::before {
      inset: 0;
      background:
        linear-gradient(140deg, transparent 0%, rgba(255, 255, 255, 0.04) 22%, transparent 46%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.024), transparent 28%);
    }

    .signal-popup::after {
      display: none;
    }

    .signal-popup.anchor {
      --popup-accent: var(--anchor);
      --popup-glow: rgba(77, 242, 200, 0.22);
    }

    .signal-popup.presence {
      --popup-accent: var(--presence);
      --popup-glow: rgba(180, 249, 255, 0.22);
    }

    .signal-popup.cloud {
      --popup-accent: var(--cloud);
      --popup-glow: rgba(65, 198, 255, 0.24);
      background: linear-gradient(180deg, rgba(10, 14, 20, 0.98), rgba(13, 18, 25, 0.96));
    }

    .signal-popup[data-state="ghost"] {
      filter: saturate(0.86);
    }

    .signal-popup.armed {
      border-color: rgba(22, 217, 255, 0.32);
      box-shadow:
        0 28px 60px rgba(0, 0, 0, 0.44),
        0 0 34px rgba(22, 217, 255, 0.2),
        inset 0 0 0 1px rgba(255, 255, 255, 0.03);
    }

    .signal-popup.active-order .popup-title {
      color: #9ff6ff;
      text-shadow: 0 0 12px rgba(22, 217, 255, 0.22);
    }

    .popup-shell {
      position: relative;
      display: grid;
      gap: 12px;
      padding: 16px;
    }

    .popup-shell::before {
      display: none;
    }

    .popup-shell::after {
      display: none;
    }

    .signal-popup.presence .popup-shell::after {
      border-color: rgba(180, 249, 255, 0.08);
    }

    .signal-popup.cloud .popup-shell::after {
      border-color: rgba(65, 198, 255, 0.1);
    }

    .popup-head,
    .popup-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .popup-kind,
    .popup-capability,
    .popup-region,
    .metric-label {
      font-family: var(--font-tech);
    }

    .popup-kind,
    .popup-capability,
    .popup-region {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
      padding: 5px 9px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      font-size: 10px;
      line-height: 1;
      letter-spacing: 0.04em;
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .popup-kind svg,
    .popup-capability svg,
    .popup-region svg {
      width: 12px;
      height: 12px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.7;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex: 0 0 auto;
    }

    .popup-kind {
      background: rgba(255, 255, 255, 0.05);
      color: #effbff;
    }

    .popup-capability {
      max-width: 100%;
      background: var(--popup-glow);
      color: var(--popup-accent);
    }

    .popup-title {
      margin: 0;
      color: #eefcff;
      font-size: 17px;
      line-height: 1.18;
      letter-spacing: 0.01em;
      overflow-wrap: anywhere;
    }

    .popup-summary {
      margin: 0;
      color: #c6d4e2;
      font-size: 12.4px;
      line-height: 1.52;
      overflow-wrap: anywhere;
    }

    .popup-media {
      margin-top: -2px;
      overflow: hidden;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      background: rgba(255, 255, 255, 0.03);
      aspect-ratio: 16 / 9;
    }

    .popup-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .popup-products {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .popup-product {
      padding: 6px 9px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #e7f3fd;
      font-size: 11px;
    }

    .popup-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .metric {
      min-width: 0;
      padding: 9px 10px 8px;
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.035);
    }

    .metric-label {
      display: block;
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 8.5px;
      letter-spacing: 0.16em;
    }

    .metric-value {
      display: block;
      color: #ebfbff;
      font-size: 11px;
      line-height: 1.15;
      word-break: break-word;
    }

    .popup-region {
      background: rgba(255, 255, 255, 0.04);
      color: var(--muted);
    }

    .popup-action {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      padding: 0;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      background: rgba(12, 19, 27, 0.94);
      color: #f2fdff;
      cursor: pointer;
      transition: transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s ease;
    }

    .popup-action svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .popup-action[data-armed="true"] {
      border-color: rgba(22, 217, 255, 0.34);
      background: rgba(14, 34, 48, 0.96);
      box-shadow: 0 0 18px rgba(22, 217, 255, 0.16);
    }

    .popup-action:active {
      transform: scale(0.97);
    }

    .popup-action:hover {
      border-color: rgba(255, 255, 255, 0.18);
      box-shadow: 0 0 22px var(--popup-glow);
    }

    @media (min-width: 900px) {
      #composer {
        left: 50%;
        right: auto;
        width: min(760px, calc(100vw - 32px));
        transform: translateX(-50%);
      }

      #commDrawer {
        left: 50%;
        right: auto;
        width: min(760px, calc(100vw - 32px));
        transform: translateX(-50%);
      }

      .signal-popup {
        width: min(340px, 32vw);
      }

      .popup-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 560px) {
      .top-btn-sub {
        font-size: 9px;
      }

      .signal-popup {
        width: min(86vw, 308px);
      }

      .popup-title {
        font-size: 16px;
      }

      .popup-grid {
        gap: 6px;
      }
    }

    @media (max-width: 360px) {
      :root {
        --top-bar-height: 44px;
        --top-edge-btn-size: 40px;
      }

      .top-btn {
        padding: 0 8px;
        border-radius: 14px;
      }

      .top-btn.system {
        padding: 6px 8px;
      }

      .top-btn-icon,
      .avatar-photo {
        width: 22px;
        height: 22px;
      }

        font-size: 9px;
      }

      .top-btn-sub {
        font-size: 8px;
        line-height: 1;
      }

        border-radius: 20px;
        grid-template-columns: 42px minmax(0, 1fr) 42px;
      }

      #composerField {
        padding-top: 18px;
      }

      .composer-btn {
        width: 42px;
        border-radius: 14px;
      }

      #query {
        min-height: 42px;
        padding: 10px 12px;
        font-size: 14px;
      }

      #addBtn {
        top: -28px;
        right: 0;
        width: 46px;
        min-width: 46px;
        height: 46px;
        border-radius: 16px;
        font-size: 26px;
      }

      .signal-popup {
        width: min(92vw, 236px);
        min-width: min(86vw, 210px);
        border-radius: 18px;
      }

      #commHandleMeta {
        max-width: 34vw;

      .comm-bubble,
      .comm-order-tile {
        width: min(100%, 100%);
      }

      .popup-shell {
        gap: 10px;
        padding: 12px;
      }

      .popup-title {
        font-size: 15px;
      }

      .popup-summary {
        font-size: 11px;
        line-height: 1.45;
      }

      .metric {
        padding: 7px 8px 6px;
        border-radius: 12px;
      }

      .metric-label {
        font-size: 7px;
      }

      .metric-value {
        font-size: 10px;
      }

      .popup-action {
        width: 36px;
        height: 36px;
      }

      .add-cycle-btn {
        width: 52px;
        height: 52px;
        border-radius: 16px;
      }

      #addCycle[data-open="true"] .add-cycle-btn:nth-child(1) {
        --add-y: -90px;
      }

      #addCycle[data-open="true"] .add-cycle-btn:nth-child(2) {
        --add-x: -78px;
        --add-y: 26px;
      }

      #addCycle[data-open="true"] .add-cycle-btn:nth-child(3) {
        --add-x: 78px;
        --add-y: 26px;
      }
    }

    @media (max-width: 280px) {
      :root {
        --safe-top: max(10px, env(safe-area-inset-top));
        --safe-right: max(8px, env(safe-area-inset-right));
        --safe-bottom: max(10px, env(safe-area-inset-bottom));
        --safe-left: max(8px, env(safe-area-inset-left));
        --top-bar-height: 36px;
        --top-edge-btn-size: 32px;
      }

      #topBar {
        gap: 4px;
      }

      .top-btn {
        padding: 0 4px;
        border-radius: 10px;
      }

      .top-btn.system {
        padding: 4px 4px;
      }

      .top-btn-title {
        font-size: 7px;
      }

      .top-btn-sub {
        font-size: 6px;
        margin-top: 1px;
      }

      .top-btn-icon,
      .avatar-photo {
        width: 18px;
        height: 18px;
      }

      #query {
        font-size: 12px;
        padding: 8px 10px;

      .wheel-meta {
        display: none;
      }

      .wheel-stat {
        padding: 2px 4px;
        border-radius: 8px;
      }

      .popup-shell {
        gap: 8px;
        padding: 10px;
      }

      .popup-media {
        max-height: 88px;
      }

      .popup-summary {
        font-size: 10.2px;
        line-height: 1.4;
      }

      .popup-kind,
      .popup-capability,
      .popup-region {
        font-size: 9px;
        padding: 4px 7px;
      }

      .metric-value {
        font-size: 9.5px;
      }

      .signal-popup {
        width: min(94vw, 206px);
        min-width: min(90vw, 186px);
      }

      #commHandle {
        padding: 0 10px;
      }

      #commHandleTitle {
        font-size: 10px;
      }

      #commHandleMeta {
        font-size: 8px;
      }
    }

    @media (max-height: 760px) {
      :root {
        --wheel-size: 152px;
        --top-bar-height: 48px;
      }

      .wheel-meta {
        font-size: 8px;
      }

       .top-btn-title {
        font-size: 9px;
      }

      #composer {
        min-height: 66px;
      }

      .composer-btn,
      #query {
        min-height: 44px;
      }

    @media (orientation: landscape) and (max-height: 540px) {

        --top-bar-height: 40px;
        --top-edge-btn-size: 38px;
      }

      #topBar {
        gap: 6px;
      }

      #composer {
        left: 50%;
        right: auto;
        width: min(620px, calc(100vw - 32px));
        transform: translateX(-50%);
      }

      #commDrawer {
        left: 50%;
        right: auto;
        width: min(620px, calc(100vw - 32px));
        transform: translateX(-50%);
      }
    }

    @keyframes hudSpin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes listenPulse {
      0%, 100% {
        box-shadow: 0 0 0 0 rgba(22, 217, 255, 0.08), 0 0 22px rgba(22, 217, 255, 0.18);
      }
      50% {
        box-shadow: 0 0 0 8px rgba(22, 217, 255, 0), 0 0 30px rgba(22, 217, 255, 0.28);
      }
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="scene"></div>
    <svg id="connectorSvg" aria-hidden="true"></svg>
    <div id="signalLayer" aria-hidden="true"></div>

    <div id="overlay">
      <div id="topBar">
        <button class="top-btn avatar" id="userButton" type="button" aria-label="Open user details">
          <span class="avatar-photo" aria-hidden="true"></span>
        </button>
        <button class="top-btn system" id="systemButton" type="button" aria-label="Open Astranov system status">
          <span class="top-btn-stack">
            <span class="top-btn-title">Astranov Planet</span>
            <span class="top-btn-sub" id="systemVersionBadge">v3.7.2 / v3.8.0</span>
          </span>
        </button>
        <button class="top-btn wallet" id="walletButton" type="button" aria-label="Open wallet and economics">
          <span class="top-btn-icon" aria-hidden="true"></span>
        </button>
      </div>

      <div id="topPanel" data-open="false" data-position="center"></div>
      <div id="commDrawer" data-open="false" data-expanded="false" aria-label="Communication drawer">
        <button id="commHandle" type="button" aria-label="Expand communication drawer">
          <span class="comm-handle-main">
            <span class="comm-handle-grip" aria-hidden="true"></span>
            <span class="comm-handle-label">
              <span id="commHandleTitle">Signal feed</span>
              <span id="commHandleMeta">AI routing quiet</span>

        }
        const dx = tx - cx;
        const dy = ty - cy;
        const scale = 1 / Math.max(Math.abs(dx) / hw || 0, Math.abs(dy) / hh || 0, 1);
        return { x: cx + dx * scale, y: cy + dy * scale };

        if (length < 0.001) return { x: 0, y: -1 };
        return { x: dx / length, y: dy / length };

      function haversineKm(lat1, lng1, lat2, lng2) {
        const toRad = (value) => value * (Math.PI / 180);
        const dLat = toRad(lat2 - lat1);
        const dLng = toRad(lng2 - lng1);
        const a =
          Math.sin(dLat / 2) * Math.sin(dLat / 2)
          + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng / 2) * Math.sin(dLng / 2);
        return 6371 * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

        volumeLiters = 0,

        subtotal = 0,
        requestedAt = new Date(),
        weather = weatherMode()

        const normalizedDistance = Math.max(0, distanceKm);
        const distanceCharge = roundMoney(normalizedDistance * DELIVERY_RULES.perKm);
        const timeCharge = isNightWindow(requestedAt) ? DELIVERY_RULES.offHoursSurcharge : 0;
        const weatherCharge = /bad_weather|cold_rain|extreme_heat|storm|snow|heavy_rain/.test(weather) ? DELIVERY_RULES.weatherSurcharge : 0;
        const loadBasis = Math.max(weightKg || 0, volumeLiters || 0);
        const extraBands = Math.max(0, Math.ceil(Math.max(0, loadBasis - DELIVERY_RULES.extraBandSize) / DELIVERY_RULES.extraBandSize));

          timeCharge,
          weatherCharge,
          loadCharge,
          priorityCharge,
          extraBands,
          deliveryBase,

          ownerFee,

            ? `<div class="comm-bubble-title"><span class="comm-bubble-heading">${escapeHtml(message.title)}</span>${message.pill ? `<span class="comm-bubble-pill">${escapeHtml(message.pill)}</span>` : ""}</div>`
            : "";
          const tile = message.signalId
            ? `
              <button class="comm-order-tile ${message.active ? "active" : ""}" type="button" data-jump-signal="${escapeHtml(message.signalId)}">
                <div class="comm-order-head">
                  <span class="comm-order-name">${escapeHtml(message.signalName || message.title || "Signal")}</span>
                  <span class="comm-order-status">${escapeHtml(message.status || "jump back")}</span>
                </div>
                <div class="comm-order-grid">
                  ${(message.metrics || []).map((metric) => `
                    <div class="comm-order-metric">
                      <span class="comm-order-label">${escapeHtml(metric.label)}</span>
                      <span class="comm-order-value">${escapeHtml(metric.value)}</span>
                    </div>
                  `).join("")}
                </div>
              </button>
            `
            : "";
          return `
            <div class="comm-message ${escapeHtml(message.role)}">
              <div class="comm-bubble">
                ${title}
                <div class="comm-bubble-copy">${escapeHtml(message.body)}</div>
                ${tile}
              </div>
            </div>
          `;
        }).join("");
        updateDrawerHandle();
        commFeed.scrollTop = commFeed.scrollHeight;
      }

      function pushMessage(role, body, options = {}) {
        const message = {
          id: options.id || `msg-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
          role,
          body,
          title: options.title || "",
          pill: options.pill || "",
          signalId: options.signalId || "",
          signalName: options.signalName || "",
          status: options.status || "",
          summary: options.summary || body,
          metrics: options.metrics || [],
          active: !!options.active,
          demo: options.demo !== false
        };
        appState.messages = [...appState.messages.slice(-35), message];
        persistMessages();
        renderMessages();
        if (options.expand !== false) setDrawerExpanded(true);
        return message;
      }

      function removeDemoMessagesAndOrders() {
        appState.orders = appState.orders.filter((order) => !order.demo);
        appState.messages = appState.messages.filter((message) => !message.demo);
        signalStates.forEach((state) => {
          if (state.signal.demo) {
            state.orderActive = false;
            state.armed = false;
            refreshPopupActionButton(state);
            state.popup.classList.remove("armed", "active-order");

      function toggleDemoMode() {
        appState.demoMode = !appState.demoMode;
        try {
          window.localStorage.setItem(DEMO_MODE_KEY, String(appState.demoMode));

      function setDatabaseStatus({
        connected = appState.db.connected,
        schemaReady = appState.db.schemaReady,
        signalCount = appState.db.signalCount,
        source = appState.db.source,
        lastSync = appState.db.lastSync,
        error = appState.db.error
      } = {}) {
        appState.db.connected = !!connected;
        appState.db.schemaReady = !!schemaReady;
        appState.db.signalCount = Math.max(0, Math.round(signalCount || 0));
        appState.db.source = source || appState.db.source;
        appState.db.lastSync = lastSync || appState.db.lastSync;
        appState.db.error = error || "";
        APP_INFO.sync = appState.db.schemaReady
          ? `supabase live / ${appState.db.signalCount} signals`
          : appState.db.connected
            ? "supabase pending"
            : "local fallback";
        APP_INFO.build = appState.db.schemaReady
          ? "database connected"
          : appState.db.connected
            ? "schema pending"
            : "planetary signal shell";
      }

      function normalizeJsonArray(value) {
        if (Array.isArray(value)) return value;
        if (typeof value === "string" && value.trim()) {
          try {
            const parsed = JSON.parse(value);
            return Array.isArray(parsed) ? parsed : [];
          } catch (_error) {
            return [];
          }
        }
        return [];
      }

      function normalizeTextArray(value) {
        return normalizeJsonArray(value)
          .map((entry) => String(entry || "").trim())
          .filter(Boolean);
      }

      function normalizeMetricArray(value) {
        return normalizeJsonArray(value)
          .map((entry) => ({
            label: String(entry?.label || "").trim(),
            value: String(entry?.value || "").trim()
          }))
          .filter((entry) => entry.label && entry.value)
          .slice(0, 6);
      }

      function normalizeCatalog(value) {
        return normalizeJsonArray(value)
          .map((entry) => ({
            id: String(entry?.id || "").trim(),
            title: String(entry?.title || "").trim(),
            price: Number(entry?.priceEur ?? entry?.price ?? 0) || 0,
            volumeLiters: Number(entry?.volumeLiters ?? 0) || 0,
            weightKg: Number(entry?.weightKg ?? 0) || 0,
            temperatureState: String(entry?.temperatureState || "ambient").trim() || "ambient",
            capacityPerHour: Number(entry?.capacityPerHour ?? 0) || 0,
            priority: !!entry?.priority,
            offeringType: String(entry?.offeringType || "product").trim() || "product",
            previewVideo: String(entry?.previewVideo || "").trim(),
            tags: normalizeTextArray(entry?.tags)
          }))
          .filter((entry) => entry.title);
      }

      async function callDatabaseRpc(name, args = {}) {
        if (!supabaseClient) return { data: null, error: new Error("Supabase client unavailable") };
        try {
          return await supabaseClient.rpc(name, args);
        } catch (error) {
          return { data: null, error };
        }
      }

      function databaseSignalFromRow(row) {
        if (!row?.id) return null;
        const catalog = normalizeCatalog(row.catalog);
        const products = normalizeTextArray(row.products);
        const metrics = normalizeMetricArray(row.metrics);
        const type = row.signal_kind === "presence" || row.signal_kind === "cloud" ? row.signal_kind : "anchor";
        const capacityPerHour = Number(row.live_capacity_per_hour ?? row.capacity_per_hour ?? 0) || 0;
        return {
          id: String(row.id),
          type,
          title: String(row.title || "Signal"),
          summary: String(row.summary || `${row.title || "Signal"} live signal`),
          capability: String(row.capability || (type === "presence" ? "dispatch trace" : "signal hook")),
          actionLabel: String(row.action_label || "Open Signal"),
          armedLabel: String(row.armed_label || "Signal Active"),
          region: String(row.region_label || "Astranov"),
          lat: Number(row.latitude ?? 0) || 0,
          lng: Number(row.longitude ?? 0) || 0,
          alt: Number(row.signal_altitude ?? (type === "cloud" ? 0.46 : type === "presence" ? 0.21 : 0.16)) || 0.16,
          zoom: Number(row.signal_zoom ?? 1) || 1,
          previewVideo: String(row.preview_video_url || catalog.find((entry) => entry.previewVideo)?.previewVideo || "").trim(),
          products: products.length ? products : catalog.map((entry) => entry.title).filter(Boolean),
          catalog,
          tags: [...new Set([
            ...normalizeTextArray(row.tags),
            type,
            ...(products.length ? ["products"] : [])
          ])],
          metrics: metrics.length ? metrics : [
            { label: "capacity", value: `${capacityPerHour || 0}/h` },
            { label: "state", value: "live" }
          ],
          demo: !!row.is_demo,
          capacityPerHour,
          dbSynced: true
        };
      }

      function applyDatabaseSignalFeed(rows) {
        const remoteSignals = (Array.isArray(rows) ? rows : [])
          .map(databaseSignalFromRow)
          .filter(Boolean);
        const remoteIds = new Set(remoteSignals.map((signal) => signal.id));

        [...signalStates.values()]
          .filter((state) => state.signal.dbSynced && !remoteIds.has(state.signal.id))
          .forEach((state) => removeSignal(state.signal.id));

        remoteSignals.forEach((signal) => {
          if (signalStates.has(signal.id)) removeSignal(signal.id);
          createSignalState(signal);
        });

        setDatabaseStatus({
          connected: true,
          schemaReady: true,
          signalCount: remoteSignals.length,
          source: `${remoteSignals.length} signal rows`,
          lastSync: new Date().toISOString(),
          error: ""
        });
        updatePreview();
        return remoteSignals;
      }

      function applyMarketSnapshot(snapshot) {
        if (!snapshot || typeof snapshot !== "object") return null;
        const ownerFee = Number(snapshot.ownerFee30d);
        const transactions = Number(snapshot.transactions30d);
        const activeOrders = Number(snapshot.ordersActive);
        const vendors = Number(snapshot.vendorsLive);
        const offerings = Number(snapshot.offeringsLive);

        if (Number.isFinite(ownerFee)) WALLET_INFO.balance = formatEuro(ownerFee);
        if (Number.isFinite(activeOrders)) WALLET_INFO.pending = `${activeOrders} active orders`;
        if (Number.isFinite(transactions)) WALLET_INFO.ledger = `${transactions} tx / 30d`;
        if (Number.isFinite(vendors) && Number.isFinite(offerings)) {
          WALLET_INFO.economics = `${vendors} vendors / ${offerings} offers`;
        }

        setDatabaseStatus({
          connected: true,
          schemaReady: appState.db.schemaReady,
          signalCount: appState.db.signalCount,
          source: WALLET_INFO.economics,
          lastSync: snapshot.lastSync ? new Date(snapshot.lastSync).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }) : appState.db.lastSync,
          error: appState.db.error
        });
        updateTopHud();
        return snapshot;
      }

      async function fetchDatabaseSignals() {
        if (!supabaseClient) {
          setDatabaseStatus({
            connected: false,
            schemaReady: false,
            signalCount: 0,
            source: "local shell fallback",
            error: ""
          });
          return null;
        }
        const { data, error } = await callDatabaseRpc("public_signal_feed", { p_include_demo: true });
        if (error) {
          const message = String(error?.message || error || "Supabase signal feed unavailable");
          const reachable = !/failed to fetch|networkerror|load failed/i.test(message);
          setDatabaseStatus({
            connected: reachable,
            schemaReady: false,
            signalCount: 0,
            source: reachable ? "supabase schema pending" : "supabase offline",
            error: message
          });
          return null;
        }
        return applyDatabaseSignalFeed(data);
      }

      async function fetchMarketSnapshot() {
        if (!supabaseClient) return null;
        const { data, error } = await callDatabaseRpc("market_snapshot", { p_include_demo: appState.demoMode });
        if (error) return null;
        const snapshot = Array.isArray(data) ? data[0] : data;
        return applyMarketSnapshot(snapshot);
      }

      function paypalAvailable() {
        return !!(PAYPAL_FUNCTION_URL || PAYPAL_CHECKOUT_URL);
      }

      function activePayableOrder() {
        return [...appState.orders].reverse().find((order) => order.active) || null;
      }

      function looksLikeUuid(value) {
        return /^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i.test(String(value || "").trim());
      }

      function cleanPayPalQueryParams() {
        const url = new URL(window.location.href);
        ["paypal_status", "token", "PayerID", "payerId"].forEach((key) => url.searchParams.delete(key));
        const next = `${url.pathname}${url.search}${url.hash}`;
        window.history.replaceState({}, "", next || "/");
      }

      function paypalReturnUrls() {
        const base = new URL(window.location.href);
        ["paypal_status", "token", "PayerID", "payerId"].forEach((key) => base.searchParams.delete(key));
        const success = new URL(base.toString());
        const cancel = new URL(base.toString());
        success.searchParams.set("paypal_status", "success");
        cancel.searchParams.set("paypal_status", "cancel");
        return {
          returnUrl: success.toString(),
          cancelUrl: cancel.toString()
        };
      }

      async function beginPayPalCheckout(source = "wallet") {
        const liveOrder = activePayableOrder();
        const payingOrder = source !== "wallet-topup" && liveOrder && looksLikeUuid(liveOrder.id) ? liveOrder : null;
        if (liveOrder && !payingOrder && source !== "wallet-topup") {
          pushMessage("system", "That order is still syncing to the database. Give it a moment, then open PayPal again so the captured payment can be tied to the correct order.", {
            title: "PayPal",
            pill: "syncing",
            summary: "Order syncing before payment",
            expand: false,
            demo: liveOrder.demo
          });
          query.placeholder = "Order syncing before PayPal payment";
          return false;
        }

        if (PAYPAL_CHECKOUT_URL && !PAYPAL_FUNCTION_URL) {
          window.open(PAYPAL_CHECKOUT_URL, "_blank", "noopener");
          query.placeholder = "PayPal checkout opened";
          return true;
        }

        if (!PAYPAL_FUNCTION_URL) {
          query.placeholder = "Add window.ASTRANOV_PAYPAL_FUNCTION_URL";
          return false;
        }

        const { returnUrl, cancelUrl } = paypalReturnUrls();
        const amount = payingOrder ? payingOrder.quote.total : PAYPAL_DEFAULT_TOPUP_EUR;
        const body = {
          action: "create",
          kind: payingOrder ? "purchase" : "top_up",
          amount,
          currency: "EUR",
          description: payingOrder
            ? `${payingOrder.itemTitle} / ${payingOrder.title}`
            : "Astranov wallet top up",
          orderId: payingOrder ? payingOrder.id : "",
          reference: payingOrder ? payingOrder.signalId : `wallet-topup-${Date.now()}`,
          signalId: payingOrder ? payingOrder.signalId : "",
          returnUrl,
          cancelUrl
        };

        try {
          query.placeholder = payingOrder ? "Opening PayPal for active order..." : "Opening PayPal top up...";
          const response = await fetch(PAYPAL_FUNCTION_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body)
          });
          const data = await response.json();
          if (!response.ok || !data?.approveUrl) {
            throw new Error(data?.error || "PayPal checkout could not be created");
          }

          pushMessage("system", payingOrder
            ? `PayPal is opening for ${payingOrder.itemTitle}. After approval, Astranov will return here and capture the payment.`
            : `PayPal is opening for a ${formatEuro(amount)} wallet top up. After approval, Astranov will return here and capture it.`, {
              title: "PayPal",
              pill: payingOrder ? formatEuro(payingOrder.quote.total) : formatEuro(amount),
              signalId: payingOrder?.signalId || "",
              signalName: payingOrder?.title || "Wallet",
              status: "approval",
              summary: payingOrder ? `${payingOrder.title} approval` : "Wallet top up approval",
              demo: payingOrder ? payingOrder.demo : false,
              expand: false
            });
          window.location.assign(data.approveUrl);
          return true;
        } catch (error) {
          console.warn("Astranov PayPal create unavailable", error);
          pushMessage("system", "PayPal checkout could not be started from the live function. The credentials stay local and the shell is ready, but the deployed function must be available too.", {
            title: "PayPal",
            pill: "unavailable",
            summary: "PayPal create failed",
            expand: false,
            demo: false
          });
          query.placeholder = "PayPal function unavailable";
          return false;
        }
      }

      async function handlePayPalReturn() {
        const url = new URL(window.location.href);
        const status = url.searchParams.get("paypal_status");
        const token = url.searchParams.get("token");
        if (!status) return;

        if (status === "cancel") {
          pushMessage("system", "PayPal approval was cancelled, so Astranov kept the order or wallet action in standby.", {
            title: "PayPal",
            pill: "cancelled",
            summary: "PayPal approval cancelled",
            expand: false,
            demo: false
          });
          query.placeholder = "PayPal approval cancelled";
          cleanPayPalQueryParams();
          return;
        }

        if (status !== "success" || !token || !PAYPAL_FUNCTION_URL) {
          cleanPayPalQueryParams();
          return;
        }

        try {
          query.placeholder = "Capturing PayPal payment...";
          const response = await fetch(PAYPAL_FUNCTION_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              action: "capture",
              orderId: token
            })
          });
          const data = await response.json();
          if (!response.ok || !data?.ok) {
            throw new Error(data?.error || "PayPal capture failed");
          }

          if (data.kind === "purchase" && looksLikeUuid(data.reference)) {
            const order = appState.orders.find((entry) => entry.id === data.reference);
            if (order) {
              order.status = "paid";
              order.active = true;
            }
          }

          if (data.sync?.kind === "top_up" && data.sync?.db) {
            WALLET_INFO.pending = "top up captured";
          }

          pushMessage("system", data.kind === "purchase"
            ? `PayPal captured ${formatEuro(data.amount)} and Astranov bound the capture to the active order ledger.`
            : `PayPal captured ${formatEuro(data.amount)} for wallet top up. The 3% owner fee logic was applied on the credit transaction.`, {
              title: "PayPal",
              pill: "captured",
              summary: data.kind === "purchase" ? "Order payment captured" : "Wallet top up captured",
              demo: false,
              expand: false,
              metrics: [
                { label: "amount", value: formatEuro(data.amount) },
                { label: "capture", value: String(data.captureId || "live").slice(0, 10) },
                { label: "db", value: data.sync?.synced ? "synced" : "capture only" }
              ]
            });
          query.placeholder = data.kind === "purchase" ? "PayPal order payment captured" : "PayPal wallet top up captured";
          if (appState.db.schemaReady) await fetchMarketSnapshot();
        } catch (error) {
          console.warn("Astranov PayPal capture unavailable", error);
          pushMessage("system", "PayPal approved the order, but Astranov could not finish capture from the live function yet.", {
            title: "PayPal",
            pill: "capture failed",
            summary: "PayPal capture failed",
            expand: false,
            demo: false
          });
          query.placeholder = "PayPal capture failed";
        } finally {
          cleanPayPalQueryParams();
        }
      }

      async function bootstrapDatabase() {
        if (!supabaseClient) {
          setDatabaseStatus({
            connected: false,
            schemaReady: false,
            signalCount: 0,
            source: "local shell fallback",
            error: ""
          });
          updateTopHud();
          return false;
        }

        const remoteSignals = await fetchDatabaseSignals();
        if (!remoteSignals) {
          pushMessage("system", "Supabase is reachable, but the Astranov market schema is not live on this project yet. Run the repo migrations so listings, orders, and wallet flow can sync for real.", {
            title: "Database",
            pill: "pending",
            summary: "Supabase schema pending",
            expand: false,
            demo: false
          });
          query.placeholder = "Supabase schema pending";
          updateTopHud();
          return false;
        }

        await fetchMarketSnapshot();
        pushMessage("system", `Supabase is live. ${remoteSignals.length} signal records loaded from the database.`, {
          title: "Database",
          pill: "live",
          summary: `${remoteSignals.length} signal records synced`,
          expand: false,
          demo: false
        });
        query.placeholder = defaultQueryPlaceholder();
        updateTopHud();
        return true;
      }

      async function persistListingToDatabase(signal, mode) {
        if (!supabaseClient || !appState.db.schemaReady) return null;
        const leadItem = signal.catalog?.[0] || {};
        const payload = {
          kind: signal.type,
          mode,
          title: signal.title,
          summary: signal.summary,
          capability: signal.capability,
          actionLabel: signal.actionLabel,
          armedLabel: signal.armedLabel,
          region: signal.region,
          lat: signal.lat,
          lng: signal.lng,
          alt: signal.alt,
          zoom: signal.zoom,
          previewVideo: signal.previewVideo || "",
          tags: signal.tags || [],
          metrics: signal.metrics || [],
          catalog: signal.catalog || [],
          capacityPerHour: leadItem.capacityPerHour || signal.capacityPerHour || 24,
          liveCapacityPerHour: leadItem.capacityPerHour || signal.capacityPerHour || 24,
          acceptsPriority: true,
          priceEur: leadItem.price || 0,
          weightKg: leadItem.weightKg || 0,
          volumeLiters: leadItem.volumeLiters || 0,
          temperatureState: leadItem.temperatureState || "ambient",
          priority: !!leadItem.priority,
          demo: false
        };
        const { data, error } = await callDatabaseRpc("create_public_listing", { p_payload: payload });
        if (error) throw error;
        const remoteSignal = databaseSignalFromRow(Array.isArray(data) ? data[0] : data);
        if (!remoteSignal) return null;
        if (signalStates.has(signal.id)) removeSignal(signal.id);
        if (signalStates.has(remoteSignal.id)) removeSignal(remoteSignal.id);
        createSignalState(remoteSignal);
        persistCustomSignals();
        updatePreview();
        await fetchMarketSnapshot();
        return remoteSignal;
      }

      async function persistOrderToDatabase(order) {
        if (!supabaseClient || !appState.db.schemaReady) return null;
        const payload = {
          vendorSlug: order.signalId,
          offeringSlug: order.offeringId || "",
          itemTitle: order.itemTitle,
          distanceKm: order.quote.distanceKm,
          weatherCode: order.weatherCode || weatherMode(),
          weightKg: order.weightKg || 0,
          volumeLiters: order.volumeLiters || 0,
          isPriority: !!order.priority,
          itemSubtotalEur: order.quote.subtotal,
          requestedAt: order.requestedAt || new Date().toISOString(),
          isDemo: !!order.demo
        };
        const { data, error } = await callDatabaseRpc("create_public_order", { p_payload: payload });
        if (error) throw error;
        const stored = Array.isArray(data) ? data[0] : data;
        if (!stored || typeof stored !== "object") return null;
        const nextOrder = {
          ...order,
          id: stored.id || order.id,
          status: stored.status || order.status,
          capacityPerHour: Number(stored.capacityPerHour ?? order.capacityPerHour) || order.capacityPerHour,
          priority: typeof stored.priority === "boolean" ? stored.priority : order.priority,
          demo: typeof stored.demo === "boolean" ? stored.demo : order.demo,
          quote: {
            ...order.quote,
            distanceKm: Number(stored.quote?.distanceKm ?? order.quote.distanceKm) || order.quote.distanceKm,
            distanceCharge: Number(stored.quote?.distanceCharge ?? order.quote.distanceCharge) || order.quote.distanceCharge,
            timeCharge: Number(stored.quote?.timeCharge ?? order.quote.timeCharge) || order.quote.timeCharge,
            weatherCharge: Number(stored.quote?.weatherCharge ?? order.quote.weatherCharge) || order.quote.weatherCharge,
            loadCharge: Number(stored.quote?.loadCharge ?? order.quote.loadCharge) || order.quote.loadCharge,
            priorityCharge: Number(stored.quote?.priorityCharge ?? order.quote.priorityCharge) || order.quote.priorityCharge,
            deliveryBase: Number(stored.quote?.deliveryBase ?? order.quote.deliveryBase) || order.quote.deliveryBase,
            subtotal: Number(stored.quote?.subtotal ?? order.quote.subtotal) || order.quote.subtotal,
            serviceSubtotal: Number(stored.quote?.serviceSubtotal ?? order.quote.serviceSubtotal) || order.quote.serviceSubtotal,
            ownerFee: Number(stored.quote?.ownerFee ?? order.quote.ownerFee) || order.quote.ownerFee,
            total: Number(stored.quote?.total ?? order.quote.total) || order.quote.total
          }
        };
        appState.orders = appState.orders.map((entry) => entry.signalId === order.signalId ? nextOrder : entry);
        await fetchMarketSnapshot();
        return nextOrder;
      }

      function pickCatalogItem(signal, rawQuery = "") {
        if (!signal?.catalog?.length) return null;
        const lowered = rawQuery.toLowerCase();
        return signal.catalog.find((item) => lowered.includes(item.title.toLowerCase())) || signal.catalog[0];
      }

      function activeUserCoords() {
        const userState = signalStates.get(appState.userSignalId);
        if (!userState) return null;
        return { lat: userState.signal.lat, lng: userState.signal.lng };
      }

      function createOrderFromSignal(state, rawQuery = "", intent = "order") {
        const signal = state.signal;
        const item = pickCatalogItem(signal, rawQuery);
        const userCoords = activeUserCoords();
        const distanceKm = userCoords ? haversineKm(signal.lat, signal.lng, userCoords.lat, userCoords.lng) : 2.8;
        const priority = !!item?.priority || /priority|instant|hot|fast|urgent/.test(rawQuery.toLowerCase());
        const requestedAt = new Date();
        const weatherCode = weatherMode();
        const quote = calculateDeliveryQuote({
          distanceKm,
          weightKg: item?.weightKg || 0,
          volumeLiters: item?.volumeLiters || 0,
          priority,
          subtotal: item?.price || (intent === "assign" ? 0 : 12),
          requestedAt,
          weather: weatherCode
        });
        return {
          id: `ord-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`,
          signalId: signal.id,
          title: signal.title,
          itemTitle: item?.title || (intent === "assign" ? "Driver dispatch" : signal.capability),
          offeringId: item?.id || "",
          status: intent === "assign" ? "driver assigned" : "routing",
          quote,
          capacityPerHour: item?.capacityPerHour || signal.capacityPerHour || 18,
          weightKg: item?.weightKg || 0,
          volumeLiters: item?.volumeLiters || 0,
          weatherCode,
          requestedAt: requestedAt.toISOString(),
          priority,
          demo: !!signal.demo,
          active: true
        };
      }

      function activateOrderState(order) {
        appState.orders = [
          ...appState.orders.filter((entry) => entry.id !== order.id && entry.signalId !== order.signalId),
          order
        ].slice(-8);
        const state = signalStates.get(order.signalId);
        if (state) {
          state.armed = true;
          state.orderActive = true;
          refreshPopupActionButton(state);
          state.popup.classList.add("armed", "active-order");
        }
        return order;
      }

      function routeSignalAction(state, rawQuery = "", intent = "order") {
        const order = activateOrderState(createOrderFromSignal(state, rawQuery, intent));
        pushMessage("order", `${order.itemTitle} is now linked to ${order.title}. The drawer stays active so you can jump back to the place on the globe at any moment.`, {
          title: intent === "assign" ? "Dispatch active" : "Order active",
          pill: formatEuro(order.quote.total),
          signalId: order.signalId,
          signalName: order.title,
          status: order.status,
          demo: order.demo,
          active: true,
          metrics: [
            { label: "delivery", value: formatEuro(order.quote.deliveryBase) },
            { label: "owner fee", value: formatEuro(order.quote.ownerFee) },
            { label: "capacity", value: `${order.capacityPerHour}/h` },
            { label: "distance", value: `${order.quote.distanceKm} km` }
          ],
          summary: `${order.title} ${order.status}`
        });
        persistOrderToDatabase(order).then((storedOrder) => {
          if (!storedOrder) return;
          pushMessage("system", `${storedOrder.itemTitle} was saved to Supabase and is now part of the live order ledger.`, {
            title: "Database",
            pill: "order live",
            signalId: storedOrder.signalId,
            signalName: storedOrder.title,
            status: storedOrder.status,
            summary: `${storedOrder.title} stored`,
            metrics: [
              { label: "total", value: formatEuro(storedOrder.quote.total) },
              { label: "owner fee", value: formatEuro(storedOrder.quote.ownerFee) },
              { label: "distance", value: `${storedOrder.quote.distanceKm} km` }
            ],
            demo: storedOrder.demo,
            active: true,
            expand: false
          });
        }).catch((error) => {
          console.warn("Astranov order sync unavailable", error);
          pushMessage("system", "Order routing stayed local because the database write did not complete.", {
            title: "Database",
            pill: "local only",
            signalId: order.signalId,
            signalName: order.title,
            status: "local",
            summary: `${order.title} local fallback`,
            demo: order.demo,
            expand: false
          });
        });
        return order;
      }

              } else {
                query.placeholder = "Add window.ASTRANOV_REVOLUT_CHECKOUT_URL";
              }
              setPanel(null);
              return;
            }
            if (action === "investigate") {
              query.placeholder = `Peak load ${Math.round(appState.performancePeak)}% / ${appState.device.cpu} / ${appState.device.ram}`;
              setPanel(null);
              return;
            }
            if (action === "drone") {
              setActiveSignal("atlas-drone", true);
              setZoom(0.98);
              setPanel(null);
              return;
            }
            setPanel(null);
          });
        });

      function persistCustomSignals() {
        try {
          const customSignals = [...signalStates.values()]
            .map((state) => state.signal)
            .filter((signal) => signal.customListing)
            .map((signal) => ({
              id: signal.id,
              type: signal.type,
              title: signal.title,
              summary: signal.summary,
              capability: signal.capability,
              actionLabel: signal.actionLabel,
              armedLabel: signal.armedLabel,
              region: signal.region,
              lat: signal.lat,
              lng: signal.lng,
              alt: signal.alt,
              zoom: signal.zoom,
              previewVideo: signal.previewVideo || "",
              products: signal.products || [],
              catalog: signal.catalog || [],
              tags: signal.tags || [],
              metrics: signal.metrics || [],
              customListing: true,
              demo: false
            }));
          window.localStorage.setItem(CUSTOM_SIGNALS_KEY, JSON.stringify(customSignals));
        } catch (error) {
          console.warn("Astranov listings cache write failed", error);
