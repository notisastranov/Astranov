<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>Astranov Internet Operating System</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
<style>
:root{
  --bg:#04111b;
  --bg2:#071b2b;
  --panel:rgba(7,19,31,.28);
  --line:rgba(0,200,255,.22);
  --line-strong:rgba(0,200,255,.42);
  --cyan:#00c8ff;
  --cyan-soft:#8fefff;
  --text:#d9f9ff;
  --muted:#80b9c9;
  --green:#00db84;
  --red:#ff405d;
  --shadow:0 18px 42px rgba(0,0,0,.28),0 0 24px rgba(0,200,255,.08);
  --hud-size:clamp(126px,12vw,162px);
  --hud-btn:clamp(34px,3vw,40px);
  --composer-w:min(62vw,720px);
  --font:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:radial-gradient(circle at top,#0d2740 0%,#071726 45%,#040c13 100%);color:var(--text);font-family:var(--font)}
button,input,select,textarea{font:inherit}
body{user-select:none}
#app{position:fixed;inset:0;overflow:hidden}
#topbrand{
  position:fixed;top:10px;left:50%;transform:translateX(-50%);z-index:40;
  padding:7px 14px;border:1px solid rgba(0,200,255,.18);border-radius:999px;
  background:rgba(4,13,22,.2);backdrop-filter:blur(14px) saturate(130%);
  -webkit-backdrop-filter:blur(14px) saturate(130%);
  color:var(--cyan-soft);letter-spacing:.12em;font-size:11px;text-transform:uppercase;
  box-shadow:var(--shadow)
}
#world{position:absolute;inset:0 0 0 0;overflow:hidden}
#stars,#globeLayer,#mapLayer,#addOrbit{position:absolute;inset:0}
#stars{background:
  radial-gradient(circle at 20% 25%, rgba(255,255,255,.18) 0 1px, transparent 1.5px) 0 0/120px 120px,
  radial-gradient(circle at 70% 15%, rgba(255,255,255,.16) 0 1px, transparent 1.4px) 0 0/140px 140px,
  radial-gradient(circle at 35% 75%, rgba(0,200,255,.18) 0 1px, transparent 1.5px) 0 0/160px 160px,
  radial-gradient(circle at 85% 80%, rgba(255,255,255,.14) 0 1px, transparent 1.4px) 0 0/180px 180px,
  radial-gradient(circle at center, rgba(0,120,255,.08), transparent 52%);
  opacity:.9
}
#globeLayer{display:grid;place-items:center;transition:opacity .35s ease,transform .35s ease}
#globeShell{
  position:relative;width:min(56vw,640px);aspect-ratio:1/1;display:grid;place-items:center;
  filter:drop-shadow(0 0 50px rgba(0,180,255,.12))
}
#globeHalo{position:absolute;inset:-12%;border-radius:50%;background:radial-gradient(circle,rgba(0,200,255,.1),transparent 64%);filter:blur(18px);animation:pulse 5s ease-in-out infinite}
#globe{
  position:relative;width:100%;aspect-ratio:1/1;border-radius:50%;overflow:hidden;
  background:
    radial-gradient(circle at 30% 30%, rgba(100,220,255,.28), transparent 35%),
    radial-gradient(circle at 65% 65%, rgba(0,90,255,.22), transparent 32%),
    linear-gradient(160deg,#0e8bd5 0%,#0d6eae 18%,#08496f 42%,#082942 72%,#041520 100%);
  box-shadow:inset -26px -26px 54px rgba(0,0,0,.34), inset 14px 14px 38px rgba(255,255,255,.08), 0 0 0 1px rgba(135,226,255,.14)
}
#globe::before{
  content:"";position:absolute;inset:0;border-radius:50%;opacity:.26;
  background:
   radial-gradient(circle at 28% 33%, transparent 0 16%, rgba(170,255,210,.7) 16.5% 22%, transparent 22.5%),
   radial-gradient(circle at 60% 42%, transparent 0 11%, rgba(170,255,210,.6) 11.5% 15.5%, transparent 16%),
   radial-gradient(circle at 54% 66%, transparent 0 13%, rgba(170,255,210,.6) 13.5% 18.5%, transparent 19%),
   radial-gradient(circle at 37% 64%, transparent 0 9%, rgba(170,255,210,.58) 9.5% 13.5%, transparent 14%),
   radial-gradient(circle at 73% 59%, transparent 0 8%, rgba(170,255,210,.55) 8.5% 12%, transparent 12.5%);
  mix-blend-mode:screen
}
#globe::after{content:"";position:absolute;inset:0;border-radius:50%;background:linear-gradient(90deg, rgba(255,255,255,.16), transparent 28%, transparent 68%, rgba(0,0,0,.26));}
#orbitDots{position:absolute;inset:0;pointer-events:none}
.orbitDot{position:absolute;width:10px;height:10px;border-radius:50%;background:radial-gradient(circle,#fff 0%,#7beeff 45%,rgba(0,200,255,.1) 75%,transparent 76%);box-shadow:0 0 16px rgba(0,200,255,.5)}
#globeLegend{
  position:absolute;bottom:7%;left:50%;transform:translateX(-50%);
  padding:8px 14px;border-radius:999px;border:1px solid rgba(0,200,255,.18);
  background:rgba(7,19,31,.22);backdrop-filter:blur(12px);
  color:var(--cyan-soft);font-size:12px;white-space:nowrap;box-shadow:var(--shadow)
}
#mapLayer{display:none}
#map{position:absolute;inset:0;filter:saturate(.88) brightness(.88) hue-rotate(168deg)}
.leaflet-container{background:#07131f}
.leaflet-control-container{display:none}
.leaflet-tile{filter:brightness(.8) saturate(.74) hue-rotate(150deg)}
#addOrbit{pointer-events:none;z-index:18}
#addOrbit.open{pointer-events:auto}
.addNode{
  position:absolute;width:112px;height:112px;border-radius:50%;display:grid;place-items:center;
  text-align:center;padding:12px;border:1px solid var(--line);color:var(--text);cursor:pointer;
  background:radial-gradient(circle at 32% 28%, rgba(0,200,255,.28), rgba(7,19,31,.88) 68%);
  backdrop-filter:blur(12px) saturate(135%);-webkit-backdrop-filter:blur(12px) saturate(135%);
  box-shadow:var(--shadow);opacity:0;transform:translate(-50%,-50%) scale(.76);transition:transform .2s ease,opacity .2s ease,border-color .2s ease;
}
.addNode.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
.addNode:hover{border-color:var(--line-strong);transform:translate(-50%,-50%) scale(1.04)}
.addNode strong{display:block;font-size:12px;line-height:1.1;letter-spacing:.02em}
.addNode span{display:block;font-size:10px;color:var(--muted);margin-top:4px;line-height:1.25}
#hudLeft,#hudRight{
  position:fixed;bottom:118px;width:var(--hud-size);height:var(--hud-size);z-index:24;
  border-radius:50%;display:grid;place-items:center;
  background:radial-gradient(circle at center, rgba(0,200,255,.04), transparent 62%);
}
#hudLeft{left:16px}
#hudRight{right:16px}
.hudSvg{position:absolute;inset:0;width:100%;height:100%;overflow:visible;filter:drop-shadow(0 0 14px rgba(0,200,255,.16))}
.hudBtn{
  position:relative;z-index:2;width:var(--hud-btn);height:var(--hud-btn);border-radius:50%;
  border:1px solid var(--line);background:radial-gradient(circle at 30% 25%, rgba(0,200,255,.26), rgba(7,19,31,.9) 72%);
  color:var(--text);display:grid;place-items:center;cursor:pointer;box-shadow:0 0 16px rgba(0,200,255,.16);transition:transform .16s ease,border-color .16s ease
}
.hudBtn:hover{transform:scale(1.06);border-color:var(--line-strong)}
.hudBtn svg{width:18px;height:18px}
#zoomArrowUp,#zoomArrowDown{display:none}
body.globe-view #zoomArrowDown{display:block}
body.map-view #zoomArrowUp{display:block}
#grabOpen,#grabClosed{display:none}
body.unloaded #grabOpen{display:block}
body.loaded #grabClosed{display:block}
#helperDock{position:fixed;left:12px;bottom:10px;z-index:28;width:86px;height:92px;display:grid;place-items:end center}
#helperBtn{position:relative;width:74px;height:86px;background:none;border:none;padding:0;cursor:pointer;filter:drop-shadow(0 8px 20px rgba(0,200,255,.18))}
#helperBtn svg{width:74px;height:86px;display:block}
#helperBtn:hover{transform:translateY(-2px)}
#composer{
  position:fixed;left:50%;bottom:10px;transform:translateX(-50%);z-index:26;width:var(--composer-w);
  min-width:min(320px,calc(100vw - 164px));max-width:calc(100vw - 164px);
  display:flex;flex-direction:column;gap:8px
}
#drawer{
  width:100%;max-height:0;overflow:hidden;border-radius:22px 22px 14px 14px;
  background:linear-gradient(180deg, rgba(7,19,31,.26), rgba(7,19,31,.18));
  border:1px solid transparent;backdrop-filter:blur(18px) saturate(135%);-webkit-backdrop-filter:blur(18px) saturate(135%);
  transition:max-height .22s ease,border-color .22s ease,padding .22s ease;box-shadow:var(--shadow)
}
#drawer.open{max-height:min(38vh,320px);border-color:var(--line);padding:10px 12px}
#thread{display:flex;flex-direction:column;gap:8px;overflow:auto;max-height:min(38vh,300px);padding-right:4px}
.msg{padding:10px 12px;border-radius:16px;background:rgba(0,200,255,.06);border:1px solid rgba(0,200,255,.12);color:var(--cyan-soft);font-size:12px;line-height:1.45;word-break:break-word}
.msg.user{align-self:flex-end;color:#dffcff;background:rgba(0,200,255,.11)}
.msg.ai{align-self:flex-start}
.msg.sys{align-self:center;color:var(--muted);background:rgba(255,255,255,.03)}
#composerBar{
  width:100%;display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:24px;
  background:linear-gradient(180deg, rgba(7,19,31,.24), rgba(7,19,31,.14));border:1px solid var(--line);
  box-shadow:var(--shadow);backdrop-filter:blur(18px) saturate(135%);-webkit-backdrop-filter:blur(18px) saturate(135%);
  touch-action:none
}
#micBtn,#sendBtn,#channelAdd,#addBtn{
  flex:0 0 auto;width:42px;height:42px;border:none;border-radius:50%;cursor:pointer;color:var(--text);
  display:grid;place-items:center;background:radial-gradient(circle at 30% 25%, rgba(0,200,255,.28), rgba(7,19,31,.9) 70%);
  box-shadow:0 12px 24px rgba(0,0,0,.24),0 0 16px rgba(0,200,255,.08);border:1px solid var(--line);transition:transform .16s ease,border-color .16s ease
}
#micBtn:hover,#sendBtn:hover,#channelAdd:hover,#addBtn:hover{transform:scale(1.05);border-color:var(--line-strong)}
#sendBtn svg,#micBtn svg,#addBtn svg{width:20px;height:20px}
#channelWrap{position:relative;display:flex;align-items:center;min-width:170px;max-width:220px;height:42px;padding:0 8px 0 34px;border-radius:999px;border:1px solid var(--line);background:rgba(0,200,255,.05)}
#channelArrow{position:absolute;left:12px;color:var(--cyan-soft);font-size:12px;pointer-events:none}
#channelSelect{appearance:none;-webkit-appearance:none;-moz-appearance:none;width:100%;height:100%;border:none;background:transparent;color:var(--cyan-soft);outline:none;font-size:12px;padding-right:4px}
#channelSelect option{background:#08141f;color:var(--text)}
#channelAdd{width:34px;height:34px}
#promptInput{flex:1;min-width:80px;height:42px;border:none;background:transparent;color:var(--cyan-soft);outline:none;font-size:14px;text-shadow:0 0 10px rgba(0,200,255,.2)}
#promptInput::placeholder{color:rgba(143,239,255,.6)}
#addDock{position:fixed;right:12px;bottom:10px;z-index:28}
#addBtn{width:58px;height:58px}
#addBtn.open{transform:scale(1.05);border-color:var(--line-strong)}
#cardHost{position:fixed;right:16px;top:58px;z-index:30;display:flex;flex-direction:column;gap:10px;max-width:min(360px,calc(100vw - 24px));pointer-events:none}
.card{
  pointer-events:auto;border-radius:22px;padding:14px;background:linear-gradient(180deg, rgba(7,19,31,.28), rgba(7,19,31,.16));border:1px solid var(--line);
  box-shadow:var(--shadow);backdrop-filter:blur(18px) saturate(135%);-webkit-backdrop-filter:blur(18px) saturate(135%);color:var(--text)
}
.cardHead{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px}
.cardTitle{font-size:14px;font-weight:700;color:var(--cyan-soft)}
.cardClose{width:34px;height:34px;border:none;border-radius:50%;cursor:pointer;background:rgba(255,255,255,.04);border:1px solid var(--line);color:var(--text)}
.cardHint{font-size:11px;color:var(--muted);line-height:1.4;margin-bottom:10px}
.formGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.formGrid .full{grid-column:1 / -1}
.formGrid label{display:grid;gap:6px;font-size:11px;color:var(--muted)}
.formGrid input,.formGrid select,.formGrid textarea{
  width:100%;border:none;outline:none;border-radius:14px;padding:10px 12px;background:rgba(0,200,255,.06);border:1px solid rgba(0,200,255,.12);color:var(--text)
}
.formGrid textarea{min-height:88px;resize:vertical}
.formActions{display:flex;justify-content:flex-end;gap:8px;margin-top:12px}
.softBtn,.solidBtn{
  border:none;cursor:pointer;border-radius:999px;padding:10px 14px;border:1px solid var(--line);color:var(--text)
}
.softBtn{background:rgba(255,255,255,.04)}
.solidBtn{background:radial-gradient(circle at 30% 25%, rgba(0,200,255,.28), rgba(7,19,31,.9) 68%)}
#miniStatus{position:fixed;left:50%;top:52px;transform:translateX(-50%);z-index:29;padding:8px 12px;border-radius:999px;background:rgba(7,19,31,.24);border:1px solid var(--line);color:var(--cyan-soft);font-size:11px;backdrop-filter:blur(14px);opacity:0;pointer-events:none;transition:opacity .18s ease}
#miniStatus.show{opacity:1}
.listingPin{width:14px;height:14px;border-radius:50%;background:radial-gradient(circle,#fff 0 20%, #79efff 24% 44%, rgba(0,200,255,.18) 68%, transparent 70%);box-shadow:0 0 14px rgba(0,200,255,.55)}
.scrollbar::-webkit-scrollbar{width:5px}
.scrollbar::-webkit-scrollbar-thumb{background:rgba(0,200,255,.22);border-radius:999px}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.82}50%{transform:scale(1.04);opacity:1}}
@media (max-width: 820px){
  #globeShell{width:min(70vw,520px)}
  #composer{width:calc(100vw - 164px);max-width:calc(100vw - 164px)}
  #channelWrap{min-width:132px;max-width:168px}
}
@media (max-width: 640px){
  #helperDock{left:8px}
  #addDock{right:8px}
  #composer{width:calc(100vw - 124px);max-width:calc(100vw - 124px)}
  #composerBar{gap:6px;padding:8px 10px}
  #channelWrap{min-width:112px;max-width:124px;padding-left:30px}
  #channelAdd{display:none}
  #promptInput{font-size:13px}
  #hudLeft,#hudRight{bottom:88px}
  .addNode{width:92px;height:92px;padding:10px}
  .addNode strong{font-size:11px}
  .addNode span{font-size:9px}
  #cardHost{left:8px;right:8px;max-width:none}
}
</style>
</head>
<body class="globe-view unloaded">
<div id="app">
  <div id="topbrand">Astranov Internet Operating System</div>
  <div id="miniStatus"></div>

  <main id="world">
    <div id="stars"></div>
    <section id="globeLayer" aria-label="Globe view">
      <div id="globeShell">
        <div id="globeHalo"></div>
        <div id="globe"></div>
        <div id="orbitDots">
          <div class="orbitDot" style="left:20%;top:38%"></div>
          <div class="orbitDot" style="left:61%;top:26%"></div>
          <div class="orbitDot" style="left:70%;top:61%"></div>
          <div class="orbitDot" style="left:31%;top:70%"></div>
        </div>
        <div id="globeLegend">Earth, city, and listings live here</div>
      </div>
    </section>
    <section id="mapLayer" aria-label="Map view"><div id="map"></div></section>
    <div id="addOrbit"></div>
  </main>

  <div id="hudLeft" aria-label="Performance HUD">
    <svg class="hudSvg" viewBox="0 0 200 200" aria-hidden="true">
      <circle cx="100" cy="100" r="84" fill="none" stroke="rgba(0,200,255,.14)" stroke-width="3" />
      <circle cx="100" cy="100" r="72" fill="none" stroke="rgba(0,200,255,.18)" stroke-dasharray="18 14" stroke-width="6" stroke-linecap="round" />
      <circle cx="100" cy="100" r="56" fill="none" stroke="rgba(0,200,255,.14)" stroke-dasharray="10 10" stroke-width="2" />
      <g font-size="10" fill="rgba(143,239,255,.84)" font-family="Inter,system-ui,sans-serif" text-anchor="middle">
        <text x="100" y="28">LOAD</text>
        <text x="100" y="188">STATE</text>
        <text x="26" y="104">GRIP</text>
        <text x="174" y="104">DRONE</text>
      </g>
    </svg>
    <button id="loadBtn" class="hudBtn" aria-label="Load or unload">
      <svg id="grabOpen" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M15.5 6c-2.4 0-4.2 1.3-5.7 3.1-1.4 1.7-2.4 3.8-2.4 5.9 0 2.1 1.1 3.5 3.2 3.5 2.6 0 4.3-1.5 5.9-3.2"/>
        <path d="M17.8 7.4v9.2"/>
      </svg>
      <svg id="grabClosed" viewBox="0 0 24 24" fill="none" stroke="var(--red)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M7.3 9.2c1.5-1.8 3.4-3.2 5.7-3.2 2.2 0 3.7 1.4 3.7 3.4 0 2-1 4-2.6 5.8-1.6 1.8-3.3 3.1-5.8 3.1-2 0-3.3-1.3-3.3-3.3 0-1.8.8-3.7 2.3-5.8z"/>
        <circle cx="17.6" cy="17.2" r="2.1" fill="var(--red)" stroke="none"/>
      </svg>
    </button>
  </div>

  <div id="hudRight" aria-label="Radar HUD">
    <svg class="hudSvg" viewBox="0 0 200 200" aria-hidden="true">
      <circle cx="100" cy="100" r="84" fill="none" stroke="rgba(0,200,255,.14)" stroke-width="3" />
      <circle cx="100" cy="100" r="72" fill="none" stroke="rgba(0,200,255,.18)" stroke-dasharray="18 14" stroke-width="6" stroke-linecap="round" />
      <circle cx="100" cy="100" r="56" fill="none" stroke="rgba(0,200,255,.14)" stroke-dasharray="10 10" stroke-width="2" />
      <path d="M100 18v30M100 152v30M18 100h30M152 100h30" stroke="rgba(0,200,255,.12)" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <button id="zoomBtn" class="hudBtn" aria-label="Zoom to your location or back to globe">
      <svg id="zoomArrowDown" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M12 5v13"/><path d="M6.8 13.4 12 18.7l5.2-5.3"/>
      </svg>
      <svg id="zoomArrowUp" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M12 19V6"/><path d="M17.2 10.6 12 5.3 6.8 10.6"/>
      </svg>
    </button>
  </div>

  <div id="helperDock">
    <button id="helperBtn" aria-label="Toggle Astranov Collective Intelligence hands-free mode">
      <svg viewBox="0 0 120 140" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M20 72c-7-3-12-10-14-18 9 0 16 3 23 8-1 3-4 7-9 10zm80 0c7-3 12-10 14-18-9 0-16 3-23 8 1 3 4 7 9 10z" fill="rgba(143,239,255,.24)" stroke="rgba(143,239,255,.5)" stroke-width="2"/>
        <path d="M34 36c2-14 12-22 26-22s24 8 26 22c3 0 7 4 7 9 0 4-3 8-7 9-2 11-9 19-18 24v14H52V78c-9-5-16-13-18-24-4-1-7-5-7-9 0-5 4-9 7-9z" fill="rgba(8,18,30,.92)" stroke="rgba(143,239,255,.72)" stroke-width="2.4"/>
        <path d="M41 22 32 6l18 11m29 5 9-16-18 11" stroke="rgba(143,239,255,.8)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="50" cy="44" r="4" fill="#8fefff"/>
        <circle cx="70" cy="44" r="4" fill="#8fefff"/>
        <path d="M49 59c6 4 16 4 22 0" stroke="#8fefff" stroke-width="3" stroke-linecap="round"/>
        <path d="M60 90v26" stroke="rgba(143,239,255,.8)" stroke-width="4" stroke-linecap="round"/>
        <path d="M60 114 49 132m11-18 11 18" stroke="rgba(143,239,255,.8)" stroke-width="4" stroke-linecap="round"/>
        <path d="M84 74 104 118" stroke="rgba(143,239,255,.8)" stroke-width="4" stroke-linecap="round"/>
        <path d="M99 107 111 112l-9 12" stroke="rgba(143,239,255,.8)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <section id="composer" aria-label="Composer">
    <div id="drawer" class="scrollbar">
      <div id="thread" class="scrollbar"></div>
    </div>
    <div id="composerBar">
      <button id="micBtn" aria-label="Voice typing">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15a4 4 0 0 0 4-4V7a4 4 0 1 0-8 0v4a4 4 0 0 0 4 4Z"/><path d="M19 11a7 7 0 0 1-14 0"/><path d="M12 18v4"/><path d="M8 22h8"/></svg>
      </button>
      <div id="channelWrap">
        <span id="channelArrow">▾</span>
        <select id="channelSelect" aria-label="Channel selector">
          <option>Astranov Collective Intelligence</option>
          <option>Global</option>
          <option>Local</option>
          <option>Drivers</option>
          <option>Vendors</option>
        </select>
      </div>
      <button id="channelAdd" aria-label="Add channel">+</button>
      <input id="promptInput" type="text" placeholder="Tell Astranov what to do" autocomplete="off" />
      <button id="sendBtn" aria-label="Send command">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 3 10 14"/><path d="m21 3-7 18-4-7-7-4 18-7Z"/></svg>
      </button>
    </div>
  </section>

  <div id="addDock">
    <button id="addBtn" aria-label="Add listing or post">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
    </button>
  </div>

  <div id="cardHost"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script>
(() => {
  const state = {
    view: 'globe',
    handsFree: false,
    loaded: false,
    drawerOpen: false,
    radialOpen: false,
    pendingAction: null,
    recognitionMode: null,
    userLoc: { lat: 37.9838, lng: 23.7275, label: 'Athens, Greece' },
    map: null,
    currentForm: null,
    listings: [],
    listening: false,
  };

  const els = {
    body: document.body,
    globeLayer: document.getElementById('globeLayer'),
    mapLayer: document.getElementById('mapLayer'),
    map: document.getElementById('map'),
    addOrbit: document.getElementById('addOrbit'),
    zoomBtn: document.getElementById('zoomBtn'),
    loadBtn: document.getElementById('loadBtn'),
    helperBtn: document.getElementById('helperBtn'),
    composer: document.getElementById('composer'),
    composerBar: document.getElementById('composerBar'),
    drawer: document.getElementById('drawer'),
    thread: document.getElementById('thread'),
    micBtn: document.getElementById('micBtn'),
    sendBtn: document.getElementById('sendBtn'),
    addBtn: document.getElementById('addBtn'),
    channelSelect: document.getElementById('channelSelect'),
    channelAdd: document.getElementById('channelAdd'),
    input: document.getElementById('promptInput'),
    cardHost: document.getElementById('cardHost'),
    miniStatus: document.getElementById('miniStatus'),
    world: document.getElementById('world'),
    globeShell: document.getElementById('globeShell')
  };

  const ACTIONS = [
    { id:'product', title:'List product', hint:'Item, price, quantity, temperature' },
    { id:'service', title:'List service', hint:'Hotel, rent-a-car, diving, appointment' },
    { id:'location', title:'Delivery spot', hint:'Receive offers and deliveries here' },
    { id:'driver', title:'Driver base', hint:'Activate delivery driver base location' },
    { id:'media', title:'Photo / video', hint:'Post media to this place' }
  ];

  function showMiniStatus(text, ms = 1800) {
    els.miniStatus.textContent = text;
    els.miniStatus.classList.add('show');
    clearTimeout(showMiniStatus.t);
    showMiniStatus.t = setTimeout(() => els.miniStatus.classList.remove('show'), ms);
  }

  function setDrawer(open) {
    state.drawerOpen = open;
    els.drawer.classList.toggle('open', open);
  }

  function addMessage(kind, text) {
    const div = document.createElement('div');
    div.className = `msg ${kind}`;
    div.textContent = text;
    els.thread.appendChild(div);
    setDrawer(true);
    requestAnimationFrame(() => { els.thread.scrollTop = els.thread.scrollHeight; });
  }

  function setView(view) {
    state.view = view;
    els.body.classList.toggle('globe-view', view === 'globe');
    els.body.classList.toggle('map-view', view === 'map');
    const onMap = view === 'map';
    els.globeLayer.style.display = onMap ? 'none' : 'grid';
    els.mapLayer.style.display = onMap ? 'block' : 'none';
    if (onMap) ensureMap();
    if (state.radialOpen) layoutRadial();
  }

  function setLoadState(loaded) {
    state.loaded = loaded;
    els.body.classList.toggle('loaded', loaded);
    els.body.classList.toggle('unloaded', !loaded);
  }

  function ensureLocation(forceFresh = false) {
    return new Promise(resolve => {
      if (!navigator.geolocation) return resolve(state.userLoc);
      if (!forceFresh && state.userLoc && state.userLoc.lat) return resolve(state.userLoc);
      navigator.geolocation.getCurrentPosition(pos => {
        state.userLoc = {
          lat: pos.coords.latitude,
          lng: pos.coords.longitude,
          label: 'Your location'
        };
        resolve(state.userLoc);
      }, () => resolve(state.userLoc), { enableHighAccuracy: true, timeout: 7000, maximumAge: 120000 });
    });
  }

  function ensureMap() {
    if (state.map || !window.L) return state.map;
    state.map = L.map('map', { zoomControl:false, attributionControl:false, preferCanvas:true, inertia:true }).setView([state.userLoc.lat, state.userLoc.lng], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(state.map);
    state.userMarker = L.circleMarker([state.userLoc.lat, state.userLoc.lng], {
      radius: 8,
      color: '#8fefff',
      weight: 2,
      fillColor: '#00c8ff',
      fillOpacity: 0.35
    }).addTo(state.map).bindTooltip('You');
    state.map.on('click', e => {
      if (!state.currentForm || !state.currentForm.locationTarget) return;
      state.currentForm.locationTarget.value = `${e.latlng.lat.toFixed(6)}, ${e.latlng.lng.toFixed(6)}`;
      showMiniStatus('Location pinned on map');
    });
    return state.map;
  }

  async function toggleZoom() {
    if (state.view === 'globe') {
      const loc = await ensureLocation(true);
      setView('map');
      const map = ensureMap();
      setTimeout(() => map.setView([loc.lat, loc.lng], 15, { animate:true }), 40);
      if (state.userMarker) state.userMarker.setLatLng([loc.lat, loc.lng]);
      showMiniStatus('Zoomed to your location');
      if (state.pendingAction) openForm(state.pendingAction, { requestedAfterZoom:true });
    } else {
      setView('globe');
      closeCard();
      showMiniStatus('Returned to globe');
    }
  }

  function getWorldCenter() {
    if (state.view === 'globe') {
      const r = els.globeShell.getBoundingClientRect();
      return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
    }
    const r = els.world.getBoundingClientRect();
    return { x: r.left + r.width / 2, y: r.top + r.height / 2 - 28 };
  }

  function buildRadial() {
    els.addOrbit.innerHTML = '';
    ACTIONS.forEach((a, i) => {
      const btn = document.createElement('button');
      btn.className = 'addNode';
      btn.type = 'button';
      btn.dataset.action = a.id;
      btn.innerHTML = `<div><strong>${a.title}</strong><span>${a.hint}</span></div>`;
      btn.addEventListener('click', e => {
        e.stopPropagation();
        chooseAction(a.id);
      });
      els.addOrbit.appendChild(btn);
    });
  }

  function layoutRadial() {
    const center = getWorldCenter();
    const radius = state.view === 'globe' ? Math.min(window.innerWidth, window.innerHeight) * 0.22 : Math.min(window.innerWidth, window.innerHeight) * 0.18;
    const nodes = [...els.addOrbit.querySelectorAll('.addNode')];
    nodes.forEach((node, i) => {
      const angle = -90 + (360 / nodes.length) * i;
      const rad = angle * Math.PI / 180;
      const x = center.x + Math.cos(rad) * radius;
      const y = center.y + Math.sin(rad) * radius;
      node.style.left = `${x}px`;
      node.style.top = `${y}px`;
    });
  }

  function toggleAddOrbit(force) {
    state.radialOpen = force != null ? force : !state.radialOpen;
    els.addOrbit.classList.toggle('open', state.radialOpen);
    els.addBtn.classList.toggle('open', state.radialOpen);
    const nodes = [...els.addOrbit.querySelectorAll('.addNode')];
    if (state.radialOpen) {
      layoutRadial();
      requestAnimationFrame(() => nodes.forEach((n, i) => setTimeout(() => n.classList.add('show'), i * 18)));
    } else {
      nodes.forEach(n => n.classList.remove('show'));
    }
  }

  function chooseAction(action) {
    toggleAddOrbit(false);
    if (state.view === 'globe' && action !== 'media') {
      state.pendingAction = action;
      addMessage('ai', `Astranov Collective Intelligence: zoom down to your city or listing area, then I will open the ${action} form.`);
      showMiniStatus('Zoom in to define location');
      return;
    }
    state.pendingAction = null;
    openForm(action);
  }

  function closeCard() {
    els.cardHost.innerHTML = '';
    state.currentForm = null;
  }

  function getMapPointString() {
    if (!state.map) return `${state.userLoc.lat.toFixed(6)}, ${state.userLoc.lng.toFixed(6)}`;
    const c = state.map.getCenter();
    return `${c.lat.toFixed(6)}, ${c.lng.toFixed(6)}`;
  }

  function formSpec(action) {
    const common = `<label class="full">Title<input name="title" placeholder="Title" required></label>
      <label>Description<textarea name="description" placeholder="Describe it"></textarea></label>
      <label>Location<input name="location" placeholder="Lat, lng" value="${getMapPointString()}"></label>`;
    switch(action) {
      case 'product': return {
        title: 'List product',
        hint: 'Product, inventory, pricing, and delivery limits.',
        fields: `${common}
          <label>Price<input name="price" placeholder="€0.00"></label>
          <label>Quantity<input name="quantity" placeholder="Available quantity"></label>
          <label>Temperature<select name="temperature"><option>neutral</option><option>cold</option><option>hot</option></select></label>
          <label>Max transport minutes<input name="transport" placeholder="30"></label>
          <label class="full">Photo or video URL<input name="media" placeholder="https://..."></label>`
      };
      case 'service': return {
        title: 'List service',
        hint: 'Service type, booking hours, and appointment capacity.',
        fields: `${common}
          <label>Service type<select name="type"><option>hotel</option><option>rent-a-car</option><option>diving school</option><option>restaurant</option><option>other</option></select></label>
          <label>Price / rate<input name="price" placeholder="€ per hour, night, day"></label>
          <label>Bookable hours<input name="hours" placeholder="09:00-18:00"></label>
          <label>Slots per hour<input name="slots" placeholder="2"></label>
          <label class="full">Photo or video URL<input name="media" placeholder="https://..."></label>`
      };
      case 'location': return {
        title: 'Delivery location',
        hint: 'Where Astranov should route deliveries to you.',
        fields: `<label>Address<input name="address" placeholder="Street, number"></label>
          <label>Door / floor<input name="door" placeholder="Floor, bell"></label>
          <label>Phone<input name="phone" placeholder="Phone number"></label>
          <label class="full">Notes<textarea name="notes" placeholder="Be quiet, call first, etc."></textarea></label>
          <label class="full">Map point<input name="location" placeholder="Lat, lng" value="${getMapPointString()}"></label>`
      };
      case 'driver': return {
        title: 'Driver base',
        hint: 'Activate delivery readiness from this base.',
        fields: `<label>Driver name<input name="name" placeholder="Driver or team name"></label>
          <label>Vehicle<input name="vehicle" placeholder="Scooter, car, bike"></label>
          <label>Coverage radius km<input name="radius" placeholder="5"></label>
          <label>Status<select name="status"><option>available</option><option>busy</option><option>offline</option></select></label>
          <label class="full">Base point<input name="location" placeholder="Lat, lng" value="${getMapPointString()}"></label>
          <label class="full">Notes<textarea name="notes" placeholder="Shift notes"></textarea></label>`
      };
      case 'media': return {
        title: 'Post photo or video',
        hint: 'Attach media to the current place or map area.',
        fields: `<label>Caption<input name="title" placeholder="Caption"></label>
          <label>Media URL<input name="media" placeholder="https://..."></label>
          <label class="full">Description<textarea name="description" placeholder="What is happening here?"></textarea></label>
          <label class="full">Location<input name="location" placeholder="Lat, lng" value="${getMapPointString()}"></label>`
      };
    }
  }

  function openForm(action, opts = {}) {
    closeCard();
    const spec = formSpec(action);
    if (!spec) return;
    const card = document.createElement('section');
    card.className = 'card';
    card.innerHTML = `
      <div class="cardHead">
        <div>
          <div class="cardTitle">${spec.title}</div>
        </div>
        <button class="cardClose" aria-label="Close">✕</button>
      </div>
      <div class="cardHint">${spec.hint}${state.view === 'map' ? ' Tap the map to change the location field.' : ''}</div>
      <form id="activeForm" class="formGrid">${spec.fields}</form>
      <div class="formActions">
        <button class="softBtn" type="button" id="useCenterBtn">Use map center</button>
        <button class="solidBtn" type="button" id="saveBtn">Save</button>
      </div>`;
    els.cardHost.appendChild(card);
    const form = card.querySelector('#activeForm');
    const locationInput = form.querySelector('input[name="location"]');
    state.currentForm = { action, node: card, form, locationTarget: locationInput };
    card.querySelector('.cardClose').addEventListener('click', closeCard);
    card.querySelector('#useCenterBtn').addEventListener('click', () => {
      if (locationInput) locationInput.value = getMapPointString();
      showMiniStatus('Using current map center');
    });
    card.querySelector('#saveBtn').addEventListener('click', () => saveForm(action, form));
    if (opts.requestedAfterZoom) showMiniStatus(`${spec.title} ready`);
  }

  function saveForm(action, form) {
    const data = Object.fromEntries(new FormData(form).entries());
    const listing = { action, data, id: `${action}-${Date.now()}` };
    state.listings.push(listing);
    if (data.location) {
      const [lat, lng] = data.location.split(',').map(v => parseFloat(v.trim()));
      if (Number.isFinite(lat) && Number.isFinite(lng) && state.map) {
        const marker = L.marker([lat, lng], {
          icon: L.divIcon({ className:'', html:'<div class="listingPin"></div>', iconSize:[16,16], iconAnchor:[8,8] })
        }).addTo(state.map);
        marker.bindTooltip(data.title || data.name || action);
      }
    }
    addMessage('ai', `Astranov Collective Intelligence: ${action} saved${data.title ? ` for ${data.title}` : ''}.`);
    showMiniStatus(`${action} saved`);
    closeCard();
  }

  function sendInput() {
    const text = els.input.value.trim();
    if (!text) return;
    addMessage('user', text);
    els.input.value = '';
    const lower = text.toLowerCase();
    if (lower.includes('zoom')) {
      toggleZoom();
      return;
    }
    if (lower.includes('product')) {
      chooseAction('product');
      return;
    }
    if (lower.includes('service')) {
      chooseAction('service');
      return;
    }
    if (lower.includes('driver')) {
      chooseAction('driver');
      return;
    }
    if (lower.includes('delivery')) {
      chooseAction('location');
      return;
    }
    addMessage('ai', 'Astranov Collective Intelligence: command received. Use the add button for listings, the radar wheel to zoom, or tell me the next action.');
  }

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const recognition = SR ? new SR() : null;
  if (recognition) {
    recognition.lang = 'en-US';
    recognition.interimResults = true;
    recognition.continuous = false;
    let finalText = '';
    recognition.onstart = () => {
      state.listening = true;
      showMiniStatus(state.recognitionMode === 'voice' ? 'Voice typing on' : 'Hands-free listening on', 1200);
    };
    recognition.onresult = e => {
      let transcript = '';
      finalText = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        transcript += e.results[i][0].transcript;
        if (e.results[i].isFinal) finalText += e.results[i][0].transcript + ' ';
      }
      if (state.recognitionMode === 'voice') els.input.value = transcript.trim();
      else if (state.recognitionMode === 'handsfree') els.input.value = transcript.trim();
    };
    recognition.onend = () => {
      state.listening = false;
      if (state.recognitionMode === 'handsfree' && els.input.value.trim()) sendInput();
      state.recognitionMode = null;
    };
    recognition.onerror = () => {
      state.listening = false;
      state.recognitionMode = null;
      addMessage('sys', 'Voice capture was not available. You can still type manually.');
    };
  }

  function startVoice(mode) {
    if (!recognition) {
      addMessage('sys', 'Speech input is not supported in this browser.');
      return;
    }
    if (state.listening) {
      recognition.stop();
      return;
    }
    els.input.value = '';
    state.recognitionMode = mode;
    recognition.start();
  }

  function toggleHandsFree() {
    state.handsFree = !state.handsFree;
    if (state.handsFree) {
      addMessage('ai', 'Astranov Collective Intelligence: switching to AI hands-free mode.');
      startVoice('handsfree');
    } else {
      if (state.listening && recognition) recognition.stop();
      addMessage('ai', 'Astranov Collective Intelligence: switching back to manual typing mode.');
    }
  }

  function promptDragSetup() {
    let drag = null;
    els.input.addEventListener('pointerdown', e => {
      drag = { id:e.pointerId, y:e.clientY, moved:false, startedAt:Date.now() };
    });
    els.input.addEventListener('pointermove', e => {
      if (!drag || drag.id !== e.pointerId) return;
      const dy = e.clientY - drag.y;
      if (Math.abs(dy) > 18) {
        drag.moved = true;
        e.preventDefault();
        setDrawer(dy < 0);
      }
    });
    const clear = () => drag = null;
    els.input.addEventListener('pointerup', e => {
      if (!drag || drag.id !== e.pointerId) return;
      if (!drag.moved) setTimeout(() => els.input.focus(), 0);
      clear();
    });
    els.input.addEventListener('pointercancel', clear);
  }

  els.zoomBtn.addEventListener('click', toggleZoom);
  els.loadBtn.addEventListener('click', () => {
    setLoadState(!state.loaded);
    showMiniStatus(state.loaded ? 'Payload secured' : 'Grip ready');
  });
  els.helperBtn.addEventListener('click', toggleHandsFree);
  els.micBtn.addEventListener('click', () => startVoice('voice'));
  els.sendBtn.addEventListener('click', sendInput);
  els.input.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); sendInput(); } });
  els.addBtn.addEventListener('click', e => { e.stopPropagation(); toggleAddOrbit(); });
  els.channelAdd.addEventListener('click', () => {
    const name = prompt('New channel name');
    if (!name) return;
    const opt = document.createElement('option');
    opt.textContent = name;
    els.channelSelect.appendChild(opt);
    els.channelSelect.value = name;
    addMessage('sys', `Channel added: ${name}`);
  });
  window.addEventListener('resize', () => { if (state.radialOpen) layoutRadial(); });
  document.addEventListener('click', e => {
    if (state.radialOpen && !e.target.closest('#addBtn') && !e.target.closest('.addNode')) toggleAddOrbit(false);
  });

  buildRadial();
  promptDragSetup();
  setView('globe');
  setLoadState(false);
  ensureLocation();
})();
</script>
</body>
</html>
