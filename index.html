# ASTRANOV LAW

Build ASTRANOV as one complete mobile-first `index.html` using clean HTML, CSS, and JavaScript only. No build tools, no fragmented edits, no pseudocode, no placeholder theater, and no symbolic substitutes. Output exactly one fully reconstructed runnable `index.html`. This law is one whole law, not multiple laws.

ASTRANOV is a real world-first Internet Operating System and collective reality system. It must remain just, clear, implementable, truthful, auditable, and simple enough to execute without hidden bias, hidden agenda, obscure complexity, fake originality, or theft of credit.

## Primary Purpose

Build a fun, glowing, blue, starry, commercial world interface where the real globe and the real map become the application. Earth, space, maps, live objects, feeds, communication, routing, roles, transactions, and user data must become usable realities. The app must feel alive and welcoming, not dark, ritualistic, horror-themed, fake sci-fi, or decorative theater. The mission is orchestration of real infrastructure into a simpler collective reality operating layer, not isolated reinvention.

## Infrastructure Respect Law

ASTRANOV does not pretend to reinvent the internet, maps, globes, video platforms, social platforms, payments, routing, or AI. It builds on existing infrastructure, public standards, APIs, open-source libraries, commercial services, and user-owned accounts, while giving appropriate credit and respecting terms of use. Innovation comes from orchestration: grouping existing powers into a new collective reality interface where humans, AI, services, maps, marketplaces, feeds, and real-world activity cooperate in one operating layer.

## Collective Reality Law

ASTRANOV is beyond plain AI chat and beyond isolated virtual reality. It is a collective reality system: real Earth, real maps, real users, real services, real transactions, real feeds, and AI assistance combined into one shared world interface. The app must not trap users inside fake screens; it must help them act in the real world.

## Zero-UI Dormant Interface Law

ASTRANOV must open with no visible operational interface except the centered top name: ASTRANOV, in electric glowing blue letters.

No permanent buttons. No permanent text fields. No permanent menus. No permanent drawers. No permanent login icon. No permanent wallet balance. No permanent control panels. No decorative UI furniture.

The world is the interface. Controls appear only when required by real user intent, system need, permission need, authentication need, payment need, protected action, selected world object, or failed hands-free communication.

If hands-free AI communication works, no text input appears. If hands-free communication fails or the user asks to type, the AI input field appears. If the user attempts a protected action, login and user identity controls appear. If the user enters marketplace, delivery, payment, or transaction context, balance and money controls appear. If the user taps or selects a world object, only that object’s necessary actions appear. If the user leaves the context, those controls disappear again.

Default state: only Earth, space, real signals, lawful infrastructure attribution, and ASTRANOV.

## Core Pillars

1. Internet-connected AI research and retrieval.
2. Marketplace linking client, vendor, and driver.
3. Map-native social and media interaction built from lines, triangles, circles, and polygons, including Social Circles and global news/friend feeds.

## Frozen Foundations

- Earth-first macro interface.
- Real globe engine as the core substrate.
- Zero-UI by default.
- Smooth trackball-style globe control.
- Multi-layer altitude navigation.
- Staged descent from space to local street radius.
- Astranov City Map as the final street-level map layer.
- Environment-first interaction instead of menu-first interaction.
- Mobile portrait priority.
- Truthful implementation.
- Single-file delivery.
- Full-file reconstruction each cycle.
- Collective intelligence triangle loop.
- No fake core systems.
- Credit and respect for external infrastructure.

## Real Substrate Law

Use proven infrastructure wherever possible. The globe must be powered by a real web globe engine such as CesiumJS or an equivalent real 3D globe library. The local map must use real map or satellite tiles where available. Routing, login, payments, databases, AI, feeds, media, and messaging must be designed as adapters to real services. If something is not connected yet, represent it honestly as connection-ready, never as fake live behavior. External libraries, map tiles, and service adapters must be treated as respected infrastructure with visible or preserved attribution where required.

## No Fakery Law

Do not fake the globe, map, routing, login, marketplace states, user activity, voice behavior, backend readiness, payments, or communication. A flat map inside a circle is forbidden. Handmade fake Earth experiments are forbidden when a real globe engine is available. Decorative orbit rings, slogans, dashboards, and symbolic shells do not count as product behavior.

## Globe Artifact Law

The globe artifact is the core design of the application. The globe is not decoration. It is the main navigation surface, feed surface, social surface, marketplace surface, and zoom ladder between cosmos, Earth, region, city, and street. Because the globe is foundational, it must be implemented by proven globe infrastructure, not by symbolic graphics.

## Trackball Law

The globe must rotate by direct swipe with natural inertia and real movement. It must feel smoother and easier than old stiff globe controls. Pinch or wheel gestures must control altitude smoothly. The user should drag the world directly, not operate a separate joystick. The real globe engine must be configured for natural mobile gestures and must not be left in a stiff default state if smoother controls are possible.

## Multi-Layer Zoom Law

Zoom is an altitude ladder, not a jump: solar layer, orbital Earth layer, global feed layer, regional layer, local layer, and Astranov City Map layer.

## Astranov City Map Law

The final zoom-down layer is the Astranov City Map. It must be based on real satellite/street map data wherever available, then darkened and styled for smartphone readability day and night. Astranov overlays must stay clearly visible: glowing blue routes, lines, Social Circles, triangles, polygons, shops, vehicles, client delivery points, news, feeds, prices, and task details. It must remain realistic first, with Astranov’s blue operating-system layer on top.

## Smooth Descent Law

Moving from globe to Astranov City Map must happen through staged altitude descent. No abrupt teleport. The selected location must be preserved. The user should feel a camera descent from orbit toward a chosen local radius, then street-level interaction. Camera flights, altitude pulses, and visible overlays must make the descent understandable without blocking the globe or map.

## Zoom-Out Law

Zooming out from Astranov City Map must return through local, regional, global, orbital, and optional solar layers. It must never end on a giant square world map.

## First Render Law

On first render the app must show a real globe engine rendering Earth in visible blue starry space, with live world signals at appropriate altitude. It must feel like a finished product, not a black label screen, compass sculpture, dashboard, fake Earth, or fake space ornament. It must not show persistent buttons or input fields on first render.

## Visual Doctrine

Use a fun, glowing, blue, starry, friendly, commercial tone. Clear, lively, and premium. Not oppressive, ceremonial, militaristic, haunted, abstract, or fake sci-fi.

## Environment Law

Most interaction lives in the world itself. Prices, tasks, status, chat entry, preferences, actions, news, and feeds should appear on the object, line, circle, triangle, polygon, route, tile, or altitude layer involved. Unneeded detail fades when zooming away.

## No Face-Blocking Law

Do not place giant windows, drawers, sheets, or menus on the user’s face. The map and globe must stay visible and usable. Context may appear as small anchored cards, glowing labels, route text, or slim temporary ribbons only after context requires it.

## Voice-First Law

The app should request needed permissions through user-safe interaction and try natural AI communication first. It may speak after user gesture. It may claim listening only when microphone access and speech capture are actually active. Manual typing is fallback only and must appear only when voice fails, protected actions require precise input, or the user explicitly asks to type.

## Geometry Law

A direct relation may be a line. A three-party relation may be a triangle. A social or operational group may be a circle. Larger collaborations may form polygons. Tapping geometry opens context such as chat, preferences, status, tasks, or economic data. Price or task data should glow on the line or inside the shape.

## Social Circles Law

Social Circles are literal circles on the map and globe. Users can discover, adjust, hide, reveal, enter, and communicate through circles. Circles may appear, disappear, expand, or shrink by altitude and preference.

## Media and News Law

Global news, creator posts, friend feeds, marketplace heat, and social signals must appear on the globe and map as live world signals. The user browses what is happening by place and altitude, not only by old list feeds. External platforms may be linked or embedded through lawful adapters instead of duplicated wastefully.

## Marketplace Law

Marketplace activity is map-native. Roles are client, vendor, and driver. One user may activate any or all roles. Vendors may upload products from Google Sheets and may also edit menus from their own shop tile. Vendors and drivers have on/off availability. Orders, routes, preparation load, and delivery coordination appear through world geometry and live objects.

## Delivery Charging Law

Base delivery fee is 1 euro per kilometer, equal to 1 Astran coin per kilometer. Add 1 euro for each extra condition: night hours from 21:00 to 09:00, bad weather, and first load above 13 kilos or liters. Add 1 extra euro for each additional 13 kilos or liters up to 33 kilos or liters maximum per driver. Above 33, split into multiple drivers.

## Economic Balancing Law

Dynamically rebalance driver pay, customer delivery price, and vendor product pricing to spread demand across hours, reduce scarcity stress, reduce idle waste, reduce overload, and avoid destructive spikes. The platform keeps 3 percent of completed transactions.

## Single-File Dormant Execution Law

Ship as one universal file but behave internally as dormant modules. Only startup-critical systems may run at launch. Noncritical systems activate only by user action, altitude, mode, visibility, context, or verified need. Hidden systems suspend loops, polling, listeners, rendering work, and heavy calculations where possible. External libraries may be called from CDN or service endpoints when they are respected infrastructure rather than fake local reinvention.

## AI Authority and Backend Law

AI may evolve the app and shape connected backend structures only through scoped, auditable, rollback-safe adapters or APIs. Stable baseline, reversibility, and truth outrank speed. The AI should orchestrate services, not seize unrestricted power.

## Collective Intelligence Triangle Law

ASTRANOV evolves through a permanent triangle loop: law, implementation, user data. The AI must learn from repeated user friction, repeated complaints, repeated demands, repeated confusion, repeated operational pain, and repeated infrastructure failures. Compatible repeated signals refine the law and trigger the next rebuild. Noise, sabotage, contradiction, manipulation, and clutter-seeking feedback are rejected.

## User Effort Law

Do not waste user effort with weak beta builds. Only release builds that are honest enough to collect valuable user data. If an existing infrastructure can solve a core layer better than a handmade prototype, use the infrastructure and preserve attribution.

## Reconstructive Cycle Law

Rewrite the law from scratch as one whole each cycle. Rebuild the app from scratch as one whole each cycle. Keep only the strongest stable version. Do not reconcile with failure by making it prettier. When a failed cycle proves that handmade implementation is inferior to available infrastructure, the next cycle must move that layer onto the real infrastructure.

## Acceptance Law

A build is acceptable only if it visibly behaves like a real product; uses a real globe engine or equivalent real substrate; shows a believable Earth-first world; starts with zero persistent operational UI except the centered glowing ASTRANOV name; supports smooth trackball motion; supports altitude-based zoom layers; preserves staged globe-to-Astranov-City-Map descent and map-to-globe return; uses a darkened real satellite/street map with glowing blue overlays at street level; avoids blocking windows; uses world objects and geometry as the interface; preserves client/vendor/driver logic; includes Social Circles, news/feed signals, delivery and balancing logic; respects external infrastructure with credit; and rejects fake completion, symbolism, clutter, debug residue, and handcrafted globe experiments that imitate what a real engine already does better.

## Filename Law

Every produced HTML artifact must be named exactly `index.html` so it can be uploaded directly to the server without renaming.

## Output Law

Output only the full final `index.html`.

Zoom is an altitude ladder, not a jump: solar layer, orbital Earth layer, global feed layer, regional layer, local layer, and Astranov City Map layer.

## Astranov City Map Law

The final zoom-down layer is the Astranov City Map. It must be based on real satellite/street map data wherever available, then darkened and styled for smartphone readability day and night. Astranov overlays must stay clearly visible: glowing blue routes, lines, Social Circles, triangles, polygons, shops, vehicles, client delivery points, news, feeds, prices, and task details. It must remain realistic first, with Astranov’s blue operating-system layer on top.

## Smooth Descent Law

Moving from globe to Astranov City Map must happen through staged altitude descent. No abrupt teleport. The selected location must be preserved. The user should feel a camera descent from orbit toward a chosen local radius, then street-level interaction. Camera flights, altitude pulses, and visible overlays must make the descent understandable without blocking the globe or map.

## Zoom-Out Law

Zooming out from Astranov City Map must return through local, regional, global, orbital, and optional solar layers. It must never end on a giant square world map.

## First Render Law

On first render the app must show a real globe engine rendering Earth in visible blue starry space, with live world signals at appropriate altitude. It must feel like a finished product, not a black label screen, compass sculpture, dashboard, fake Earth, or fake space ornament. It must not show persistent buttons or input fields on first render.

## Visual Doctrine

Use a fun, glowing, blue, starry, friendly, commercial tone. Clear, lively, and premium. Not oppressive, ceremonial, militaristic, haunted, abstract, or fake sci-fi.

## Environment Law

Most interaction lives in the world itself. Prices, tasks, status, chat entry, preferences, actions, news, and feeds should appear on the object, line, circle, triangle, polygon, route, tile, or altitude layer involved. Unneeded detail fades when zooming away.

## No Face-Blocking Law

Do not place giant windows, drawers, sheets, or menus on the user’s face. The map and globe must stay visible and usable. Context may appear as small anchored cards, glowing labels, route text, or slim temporary ribbons only after context requires it.

## Voice-First Law

The app should request needed permissions through user-safe interaction and try natural AI communication first. It may speak after user gesture. It may claim listening only when microphone access and speech capture are actually active. Manual typing is fallback only and must appear only when voice fails, protected actions require precise input, or the user explicitly asks to type.

## Geometry Law

A direct relation may be a line. A three-party relation may be a triangle. A social or operational group may be a circle. Larger collaborations may form polygons. Tapping geometry opens context such as chat, preferences, status, tasks, or economic data. Price or task data should glow on the line or inside the shape.

## Social Circles Law

Social Circles are literal circles on the map and globe. Users can discover, adjust, hide, reveal, enter, and communicate through circles. Circles may appear, disappear, expand, or shrink by altitude and preference.

## Media and News Law

Global news, creator posts, friend feeds, marketplace heat, and social signals must appear on the globe and map as live world signals. The user browses what is happening by place and altitude, not only by old list feeds. External platforms may be linked or embedded through lawful adapters instead of duplicated wastefully.

## Marketplace Law

Marketplace activity is map-native. Roles are client, vendor, and driver. One user may activate any or all roles. Vendors may upload products from Google Sheets and may also edit menus from their own shop tile. Vendors and drivers have on/off availability. Orders, routes, preparation load, and delivery coordination appear through world geometry and live objects.

## Delivery Charging Law

Base delivery fee is 1 euro per kilometer, equal to 1 Astran coin per kilometer. Add 1 euro for each extra condition: night hours from 21:00 to 09:00, bad weather, and first load above 13 kilos or liters. Add 1 extra euro for each additional 13 kilos or liters up to 33 kilos or liters maximum per driver. Above 33, split into multiple drivers.

## Economic Balancing Law

Dynamically rebalance driver pay, customer delivery price, and vendor product pricing to spread demand across hours, reduce scarcity stress, reduce idle waste, reduce overload, and avoid destructive spikes. The platform keeps 3 percent of completed transactions.

## Single-File Dormant Execution Law

Ship as one universal file but behave internally as dormant modules. Only startup-critical systems may run at launch. Noncritical systems activate only by user action, altitude, mode, visibility, context, or verified need. Hidden systems suspend loops, polling, listeners, rendering work, and heavy calculations where possible. External libraries may be called from CDN or service endpoints when they are respected infrastructure rather than fake local reinvention.

## AI Authority and Backend Law

AI may evolve the app and shape connected backend structures only through scoped, auditable, rollback-safe adapters or APIs. Stable baseline, reversibility, and truth outrank speed. The AI should orchestrate services, not seize unrestricted power.

## Collective Intelligence Triangle Law

ASTRANOV evolves through a permanent triangle loop: law, implementation, user data. The AI must learn from repeated user friction, repeated complaints, repeated demands, repeated confusion, repeated operational pain, and repeated infrastructure failures. Compatible repeated signals refine the law and trigger the next rebuild. Noise, sabotage, contradiction, manipulation, and clutter-seeking feedback are rejected.

## User Effort Law

Do not waste user effort with weak beta builds. Only release builds that are honest enough to collect valuable user data. If an existing infrastructure can solve a core layer better than a handmade prototype, use the infrastructure and preserve attribution.

## Reconstructive Cycle Law

Rewrite the law from scratch as one whole each cycle. Rebuild the app from scratch as one whole each cycle. Keep only the strongest stable version. Do not reconcile with failure by making it prettier. When a failed cycle proves that handmade implementation is inferior to available infrastructure, the next cycle must move that layer onto the real infrastructure.

## Acceptance Law

A build is acceptable only if it visibly behaves like a real product; uses a real globe engine or equivalent real substrate; shows a believable Earth-first world; starts with zero persistent operational UI except the centered glowing ASTRANOV name; supports smooth trackball motion; supports altitude-based zoom layers; preserves staged globe-to-Astranov-City-Map descent and map-to-globe return; uses a darkened real satellite/street map with glowing blue overlays at street level; avoids blocking windows; uses world objects and geometry as the interface; preserves client/vendor/driver logic; includes Social Circles, news/feed signals, delivery and balancing logic; respects external infrastructure with credit; and rejects fake completion, symbolism, clutter, debug residue, and handcrafted globe experiments that imitate what a real engine already does better.

## Filename Law

Every produced HTML artifact must be named exactly `index.html` so it can be uploaded directly to the server without renaming.

## Output Law

Output only the full final `index.html`.

function deliveryQuote(km,opts){

function layerName(h){
  if(h>90000000)return 'Solar Layer';

function cameraHeight(){

}
function cameraLonLat(){
  const c=viewer.camera.pickEllipsoid(new Cesium.Cartesian2(viewer.scene.canvas.clientWidth/2,viewer.scene.canvas.clientHeight/2),viewer.scene.globe.ellipsoid);

function entityPositionLonLat(entity){
  try{
    if(entity.properties&&entity.properties.lon&&entity.properties.lat){
      return {lon:entity.properties.lon.getValue(),lat:entity.properties.lat.getValue()};
    }
    const pos=entity.position&&entity.position.getValue(Cesium.JulianDate.now());
    if(pos){
      const c=Cesium.Cartographic.fromCartesian(pos);
      return {lon:Cesium.Math.toDegrees(c.longitude),lat:Cesium.Math.toDegrees(c.latitude)};
    }
  }catch(e){}
  return cameraLonLat();
}
function pickWorld(movement){
  const picked=viewer.scene.pick(movement.position);
  if(Cesium.defined(picked)&&picked.id&&picked.id.properties){
    const e=picked.id,p=e.properties,pos=entityPositionLonLat(e);
    state.selected={...pos,title:p.title?p.title.getValue():'Astranov object'};
    const ctx=contextFor({
      title:p.title?p.title.getValue():'Astranov object',
      kind:p.kind?p.kind.getValue():'object'
    });
    setContext(ctx.title,ctx.meta,ctx.detail,ctx.actions,ctx.kind);

  }
  const cart=viewer.camera.pickEllipsoid(movement.position,viewer.scene.globe.ellipsoid);

    const c=Cesium.Cartographic.fromCartesian(cart);
    state.selected={lon:Cesium.Math.toDegrees(c.longitude),lat:Cesium.Math.toDegrees(c.latitude),title:'selected Earth point'};

  }
}

  ui.brand.classList.add('awake');
  speak('Voice waking. Browser may require microphone permission.',1600);
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
    ui.brand.classList.remove('awake');
    showComposer('Voice unavailable. Type to Astranov.');
    return;
  }
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    stream.getTracks().forEach(t=>t.stop());
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){
      ui.brand.classList.remove('awake');
      showComposer('Microphone granted, speech recognition unavailable. Type to Astranov.');
      return;
    }
    const rec=new SR();
    rec.lang='en-US';rec.interimResults=true;rec.continuous=false;
    state.voiceLive=true;
    rec.onstart=()=>{ui.brand.classList.add('awake');speak('Listening.',1200)};
    rec.onresult=e=>{
      const heard=Array.from(e.results).map(r=>r[0].transcript).join(' ').trim();
      if(heard) handleIntent(heard);
    };
    rec.onerror=()=>{state.voiceLive=false;ui.brand.classList.remove('awake');showComposer('Voice failed. Type to Astranov.')};
    rec.onend=()=>{state.voiceLive=false;ui.brand.classList.remove('awake')};
    rec.start();
  }catch(e){
    state.voiceLive=false;ui.brand.classList.remove('awake');
    showComposer('Voice blocked or unavailable. Type to Astranov.');
  }
}
function handleIntent(text){
  const raw=text.trim(),t=raw.toLowerCase();
  speak('Heard: '+raw,2200);
  if(t.includes('order')||t.includes('buy')||t.includes('delivery')||t.includes('market')){
    showWallet();
    if(t.includes('order')||t.includes('buy')||t.includes('delivery'))needLogin(t.includes('delivery')?'delivery':'order');
    return;
  }
  if(t.includes('login')||t.includes('account')){needLogin('account');return}
  if(t.includes('balance')||t.includes('wallet')||t.includes('money')){showWallet();return}
  if(t.includes('type')||t.includes('keyboard')){showComposer('Manual AI fallback');return}
  if(t.includes('globe')||t.includes('orbit')||t.includes('space')){orbit();return}
  if(t.includes('city')||t.includes('down')||t.includes('map')){descend(state.selected||cameraLonLat());return}
  if(t.includes('hide')||t.includes('clean')||t.includes('clear')){hideAll();return}
  setContext('AI intent · adapter-ready','Voice intent received','The frontend captured intent. Live AI answer requires backend AI adapter. '+adapters.ai,[
    {label:'Type more',primary:true,run:()=>showComposer('Continue with AI')},
    {label:'Clear',run:hideAll},
    {label:'Orbit',run:orbit}
  ],'ai');
}
ui.composer.addEventListener('submit',e=>{
  e.preventDefault();
  const text=ui.input.value.trim();
  if(!text)return;
  ui.input.value='';
  handleIntent(text);
  wake(ui.composer,false);state.manualOpen=false;
});
ui.input.addEventListener('input',()=>{
  ui.input.style.height='auto';
  ui.input.style.height=Math.min(ui.input.scrollHeight,120)+'px';
});

let lastAutoCity=0;
viewer.scene.postRender.addEventListener(()=>{
  const h=cameraHeight(),name=layerName(h);
  ui.shade.classList.toggle('on',h<95000);
  state.cityEntities.forEach(e=>e.show=h<170000);
  if(name!==state.lastLayer){
    state.lastLayer=name;
    if(name==='Astranov City Map'&&!state.hasCity){
      const c=cameraLonLat();renderCity(c.lon,c.lat);
      speak('Astranov City Map layer. Objects appear on the real map.',2000);
    }
  }
  if(h<78000&&!state.hasCity&&Date.now()-lastAutoCity>2400){
    lastAutoCity=Date.now();
    const c=cameraLonLat();renderCity(c.lon,c.lat);
  }
});

document.addEventListener('keydown',e=>{
  if(e.key==='Escape')hideAll();
  if(e.key==='/'&&!state.manualOpen){e.preventDefault();showComposer('Manual AI fallback')}
});

})();
</script>
