/*
ASTRANOV CYBERNETICS ARCHITECTURE — FRONT-END CORE v0.6.0
Founder / Cybernetics Architect: Notis Astranov
Founded: 12/04/2026

This single index.html is the core front-end shell and embedded rule carrier. It is not the whole business, not the whole backend, not the database, not payment infrastructure, and not the full production system. It is the visible operating skin, prototype runtime, and executable law for all future services that connect behind it.

NON-NEGOTIABLE LAW
1. Rebuild whole file when architecture changes. No patch ghosts, duplicate HUDs, or layered leftovers.
2. Zero UI by default: no static button flood, no side rails, no permanent menus, no bottom command bar. The user sees reality first: space, Earth, clouds, city.
3. AI activates and deactivates interface only when intent requires it. Manual controls appear as temporary context tools, then disappear.
4. Three levels:
   GLOBAL: real-looking Earth in space with stars, ISS, sun, moon, planets/comets, global news/offers/teams/cities/friend videos.
   CLOUD: country-wide layer with major cities, teams, shops, national social circles, national news, friend video posts.
   CITY: operational core. Real street map around user; account/login held by user icon; shops with menus/photos/prices/volumes/descriptions; friends; delivery drivers; social circles; real routing; teams chat; video posting; transaction lines, triangles and polygons.
5. Global and Cloud are decorative/expansion layers for now. City is the business engine.
6. Build on existing infrastructure with credit: Three.js for globe, Leaflet/OpenStreetMap/Carto tiles for map, OSRM for routing, Supabase/API backend hooks later.
7. UI grammar: line = request or relation; triangle = client/vendor/driver order; polygon = multi-party or multi-driver coordination; glow = active; grey = history.
8. Delivery law: 1 €/km baseline, +1 night 21:00-09:00, +1 bad weather, +1 per additional 13 kg/liters, above 33 kg/liters triggers multi-driver polygon; 3% platform owner fee.
9. Never expose the law as a visible public panel. Keep it in source comments/text only.
*/

function km(a,b,c,d){const R=6371;const p=Math.PI/180;const x=(c-a)*p;const y=(d-b)*p;const z=Math.sin(x/2)**2+Math.cos(a*p)*Math.cos(c*p)*Math.sin(y/2)**2;return R*2*Math.atan2(Math.sqrt(z),Math.sqrt(1-z))}
function calcDelivery(dist,kg=0,badWeather=false){let extra=0;let parts=[`${dist.toFixed(2)} km × 1 €/km`];const h=new Date().getHours();if(h>=21||h<9){extra++;parts.push('+1 night')}if(badWeather){extra++;parts.push('+1 weather')}if(kg>13){extra+=Math.ceil((kg-13)/13);parts.push(`+${Math.ceil((kg-13)/13)} load`)}const total=+(Math.max(1,dist)+extra).toFixed(2);const fee=+(total*.03).toFixed(2);return{total,fee,driver:+(total-fee).toFixed(2),multi:kg>33,drivers:kg>33?Math.ceil(kg/33):1,parts}}
function latLngVector(lat,lng,r=1){const phi=lat*Math.PI/180,lam=lng*Math.PI/180;return new THREE.Vector3(Math.cos(phi)*Math.sin(lam)*r,Math.sin(phi)*r,Math.cos(phi)*Math.cos(lam)*r)}

function checkout(){if(!S.cart.length)return;const shop=S.cartShop;const items=S.cart.reduce((a,x)=>a+x.item[3]*x.qty,0);const weight=S.cart.reduce((a,x)=>a+x.item[4]*x.qty,0);const dist=km(S.city.lat,S.city.lng,shop.lat,shop.lng);const del=calcDelivery(dist,weight);qs('checkoutBody').innerHTML=`<div class="cards"><div class="personCard"><div class="photo">${shop.emoji}</div><div><b>${esc(shop.name)}</b><div class="meta">Items: €${items.toFixed(2)}<br>Weight/volume: ${weight.toFixed(2)} kg/L<br>Delivery: ${del.parts.join(' · ')}<br>Platform fee 3%: €${del.fee.toFixed(2)} · Driver: €${del.driver.toFixed(2)}${del.multi?'<br>Multi-driver polygon required':''}</div></div><div class="price">€${(items+del.total).toFixed(2)}</div></div></div>`;openSheet('checkoutSheet')}
async function osrm(a,b,c,d){const url=`${OSRM}/${b},${a};${d},${c}?overview=full&geometries=geojson`;try{const r=await fetch(url);if(!r.ok)throw Error('route');const j=await r.json();if(!j.routes||!j.routes[0])throw Error('empty');return{coords:j.routes[0].geometry.coordinates.map(x=>[x[1],x[0]]),km:j.routes[0].distance/1000}}catch(e){return{coords:[[a,b],[c,d]],km:km(a,b,c,d)}}}
async function confirmOrder(){if(!S.cart.length)return;closeSheets();qs('cartBar').classList.remove('on');clearRoutes();toast('ROUTING THROUGH STREETS…',1600);const shop=S.cartShop,driver=S.drivers[0];const r1=await osrm(driver.lat,driver.lng,shop.lat,shop.lng);const r2=await osrm(shop.lat,shop.lng,S.city.lat,S.city.lng);const pick=L.polyline(r1.coords,{color:'#c8a84a',weight:3,opacity:.82,dashArray:'8 7',className:'routeGold'}).addTo(S.map);const drop=L.polyline(r2.coords,{color:'#00d6ff',weight:5,opacity:.94,className:'routeActive'}).addTo(S.map);const poly=L.polygon([[S.city.lat,S.city.lng],[shop.lat,shop.lng],[driver.lat,driver.lng]],{color:'#00d6ff',weight:1,fillColor:'#00d6ff',fillOpacity:.045,dashArray:'5 8'}).addTo(S.map);S.routes.push(pick,drop,poly);S.map.fitBounds(L.featureGroup([pick,drop,poly]).getBounds().pad(.25));const items=S.cart.reduce((a,x)=>a+x.item[3]*x.qty,0);const weight=S.cart.reduce((a,x)=>a+x.item[4]*x.qty,0);const del=calcDelivery(r2.km,weight);S.wallet=Math.max(0,S.wallet-(items+del.total));S.transactions.push({at:Date.now(),type:'order',amount:-(items+del.total),text:`${shop.name} delivery`},{at:Date.now(),type:'platform',amount:del.fee,text:'3% platform fee'});saveProfile();S.cart=[];refreshCart();say(`Order triangle created: you, ${shop.name}, ${driver.name}. Delivery €${del.total.toFixed(2)}, platform fee €${del.fee.toFixed(2)}.`,true)}
function openPeople(kind){let data=[];let title='TEAMS & CIRCLES';if(kind==='drivers'){title='DELIVERY DRIVERS';data=S.drivers.map(d=>({icon:d.emoji,name:d.name,meta:`Online · capacity ${d.kg} kg · team chat ready`}))}else if(kind==='friends'){title='FRIENDS & VIDEO POSTS';data=S.friends.map(f=>({icon:f.emoji,name:f.name,meta:f.text+' · tap post tool to publish'}))}else{data=S.circles.map(c=>({icon:'◯',name:c.name,meta:`${c.members} members · local team chat`}))}qs('peopleTitle').textContent=title;qs('peopleCards').innerHTML=data.map(x=>`<div class="personCard"><div class="photo">${x.icon}</div><div><b>${esc(x.name)}</b><div class="meta">${esc(x.meta)}</div></div><button class="addBtn">CHAT</button></div>`).join('');openSheet('peopleSheet')}
function openAccount(){qs('userCore').textContent=(S.profile.name||'Guest')[0].toUpperCase();qs('loginEmail').value=S.profile.email||'';qs('loginPhone').value=S.profile.phone||'';qs('loginName').value=S.profile.name||'';renderTx();openSheet('accountSheet')}
function renderTx(){qs('txCards').innerHTML=S.transactions.slice(-8).reverse().map(t=>`<div class="personCard"><div class="photo">${t.amount<0?'−':'+'}</div><div><b>${esc(t.text)}</b><div class="meta">${new Date(t.at).toLocaleString()}</div></div><div class="price">${t.amount<0?'-':'+'}€${Math.abs(t.amount).toFixed(2)}</div></div>`).join('')||'<div class="meta">No transactions yet.</div>'}
function submitPost(){if(!S.city){toast('ENTER CITY FIRST');return}const title=qs('postTitle').value.trim();if(!title){toast('TITLE REQUIRED');return}const p={city:S.city.k,title,desc:qs('postDesc').value.trim(),url:qs('postUrl').value.trim(),team:qs('postTeam').value.trim(),lat:S.city.lat+(Math.random()-.5)*.006,lng:S.city.lng+(Math.random()-.5)*.006};S.posts.push(p);closeSheets();drawCity();toast('VIDEO SIGNAL POSTED');say('Post dropped on the city map. Backend will later store the real media and permissions.',true)}
function openSheet(id){document.querySelectorAll('.sheet').forEach(s=>s.classList.toggle('on',s.id===id));S.lastAction=Date.now()}function closeSheets(){document.querySelectorAll('.sheet').forEach(s=>s.classList.remove('on'))}
function openIntent(){S.commandOpen=true;qs('intentPanel').classList.add('on');qs('intentOrb').classList.add('on');refreshQuickActions();setTimeout(()=>qs('cmd').focus(),80)}function closeIntent(){S.commandOpen=false;qs('intentPanel').classList.remove('on');qs('intentOrb').classList.remove('on')}
function say(t,subtle=false){const log=qs('aiLog');const m=document.createElement('div');m.className='msg ai';m.textContent=t;log.appendChild(m);log.scrollTop=log.scrollHeight;if(!subtle)openIntent()}
function userMsg(t){const log=qs('aiLog');const m=document.createElement('div');m.className='msg user';m.textContent=t;log.appendChild(m);log.scrollTop=log.scrollHeight}
function refreshQuickActions(){const qa=qs('quickActions');let list=[];if(S.level==='global')list=[['Open Greece cloud','cloud:GR',''],['Enter Rhodes','city:rho','gold'],['Enter Athens','city:ath','gold']];else if(S.level==='cloud')list=[['Back to global','global',''],...COUNTRIES[S.country].cities.map(k=>['Enter '+CITIES.find(c=>c.k===k).name,'city:'+k,'gold'])];else list=[['Shops','shops','gold'],['Post video','post','purple'],['Teams','teams',''],['Account','account',''],['Back globe','global','']];qa.innerHTML=list.map(a=>`<button class="chip ${a[2]}" data-action="${a[1]}">${a[0]}</button>`).join('');qa.querySelectorAll('[data-action]').forEach(b=>b.addEventListener('click',()=>doAction(b.dataset.action)))}
function doAction(a){if(a.startsWith('cloud:'))openCloud(a.split(':')[1]);else if(a.startsWith('city:'))enterCity(a.split(':')[1]);else if(a==='global')goGlobal();else if(a==='shops')renderShops();else if(a==='post')openSheet('postSheet');else if(a==='teams')openPeople('circles');else if(a==='account')openAccount()}
function handleCommand(){const raw=qs('cmd').value.trim();if(!raw)return;qs('cmd').value='';userMsg(raw);const t=raw.toLowerCase();if(t.includes('global')||t.includes('globe')||t.includes('earth')||t.includes('back')){goGlobal();return}for(const c of CITIES){if(t.includes(c.name.toLowerCase())){enterCity(c.k);return}}if(t.includes('greece')||t.includes('cloud')){openCloud('GR');return}if(t.includes('post')||t.includes('video')){if(S.level!=='city'){say('Enter a city first, then I will open the posting tool.');return}openSheet('postSheet');return}if(t.includes('account')||t.includes('login')||t.includes('wallet')){openAccount();return}if(t.includes('team')||t.includes('circle')||t.includes('friend')||t.includes('chat')){openPeople(t.includes('friend')?'friends':'circles');return}if(t.includes('driver')){openPeople('drivers');return}if(t.includes('shop')||t.includes('order')||t.includes('buy')||t.includes('pizza')||t.includes('milk')||t.includes('sushi')||t.includes('medicine')||t.includes('pharmacy')||t.includes('food')){if(S.level!=='city'){say('City level is required for real shops and routing. Choose Athens or Rhodes.');return}renderShops(t);return}say('I can open cloud level, enter a city, show shops, post video, open teams, account, drivers, or return to globe.')}
function bind(){qs('brand').addEventListener('click',openIntent);qs('intentOrb').addEventListener('click',()=>S.commandOpen?closeIntent():openIntent());qs('closeIntent').addEventListener('click',closeIntent);qs('cmdGo').addEventListener('click',handleCommand);qs('cmd').addEventListener('keydown',e=>{if(e.key==='Enter')handleCommand()});qs('backGlobe').addEventListener('click',()=>S.level==='city'?openCloud(S.city.country):goGlobal());qs('userCore').addEventListener('click',openAccount);document.querySelectorAll('[data-close]').forEach(b=>b.addEventListener('click',()=>openSheet('none')));qs('checkoutBtn').addEventListener('click',checkout);qs('confirmOrder').addEventListener('click',confirmOrder);qs('postBtn').addEventListener('click',submitPost);qs('loginBtn').addEventListener('click',()=>{S.profile={email:qs('loginEmail').value.trim(),phone:qs('loginPhone').value.trim(),name:qs('loginName').value.trim()||'User'};saveProfile();qs('userCore').textContent=S.profile.name[0].toUpperCase();toast('PROFILE SAVED')});qs('walletBtn').addEventListener('click',()=>{S.wallet+=20;S.transactions.push({at:Date.now(),type:'topup',amount:20,text:'Demo wallet top-up'});saveProfile();renderTx();toast('+20 ASTRAN DEMO CREDIT')});document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeSheets();closeIntent()}})}
async function boot(){setProgress(15,'LOADING SPACE');while(!window.THREE&&performance.now()<8000)await wait(80);setProgress(36,'BUILDING GLOBE');initThree();setProgress(60,'BINDING AI INTENT');bind();setProgress(80,'READYING CITY MAP');refreshQuickActions();setProgress(100,'ONLINE');qs('userCore').textContent=(S.profile.name||'Guest')[0].toUpperCase();setTimeout(()=>document.body.classList.add('loaded'),400);say('Global level online. Tap a glowing city signal or tap ASTRANOV for the AI command.',true)}
window.Astranov={state:S,enterCity,openCloud,goGlobal,shops:()=>S.shops,drivers:()=>S.drivers,calcDelivery};if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',boot);else boot();
})();
</script>
</body>
