<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Astranov Internet Operating System</title>
<style>
:root{
  --bg:#031018;
  --bg2:#071d2b;
  --panel:rgba(6,18,29,.62);
  --panel-2:rgba(6,18,29,.84);
  --line:rgba(0,197,255,.22);
  --line-strong:rgba(0,197,255,.48);
  --blue:#00c5ff;
  --blue-2:#8be8ff;
  --green:#2df58f;
  --red:#ff4f6d;
  --text:#dcf8ff;
  --text-dim:#7db2c4;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --composer-h:78px;
  --helper-size:92px;
  --hud-size:116px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;overflow:hidden;background:radial-gradient(circle at top,#09304c 0%,#041521 34%,#020c13 100%);color:var(--text);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
button,input,select,textarea{font:inherit}
body{position:fixed;inset:0;user-select:none}

/* Spartan Script lock */
/*
SPARTAN SCRIPT — ASTRANOV RECONSTRUCTION LOCK v5
MISSION: full reconstruction of index.html only.
NO PATCHES. NO LEFTOVERS. NO DUPLICATE CONTROLS. MOBILE-FIRST FOR SMALL PORTRAIT PHONES.
World view first. Composer text only. No floating assistant chatter outside composer.
Real app, not demo shell. Serious helper. Responsive HUD. Hidden contextual actions only.
*/

#app{position:relative;height:100%;overflow:hidden}
#topbar{
  position:absolute;left:0;right:0;top:0;padding:calc(8px + var(--safe-top)) 12px 8px;z-index:30;
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  background:linear-gradient(180deg,rgba(2,10,15,.72),rgba(2,10,15,.15));
}
.brand-pill,.user-pill{
  height:38px;border-radius:20px;padding:0 14px;display:flex;align-items:center;gap:10px;
  background:linear-gradient(180deg,rgba(6,18,29,.82),rgba(6,18,29,.52));
  border:1px solid var(--line);box-shadow:0 0 0 1px rgba(255,255,255,.02) inset,0 8px 26px rgba(0,0,0,.22);
  backdrop-filter:blur(16px) saturate(125%);
}
.brand-pill{min-width:150px;justify-content:center}
.brand-main{font-size:13px;font-weight:800;letter-spacing:.22em;color:var(--blue);text-shadow:0 0 16px rgba(0,197,255,.35)}
.brand-sub{font-size:11px;color:var(--text-dim);font-weight:600}
.user-dot{width:12px;height:12px;border-radius:50%;background:radial-gradient(circle,var(--blue-2),var(--blue));box-shadow:0 0 16px rgba(0,197,255,.45)}
.user-pill span{font-size:14px;font-weight:700}

#stage{position:absolute;inset:0;padding-top:88px;padding-bottom:160px}
#world-wrap{position:absolute;inset:88px 0 154px;display:flex;align-items:center;justify-content:center;overflow:hidden}
#globe-view,#map-view{position:absolute;inset:0}
#map-view{display:none}
#globe-view{
  display:flex;align-items:center;justify-content:center;pointer-events:auto;
  background:
    radial-gradient(circle at 50% 42%,rgba(18,88,136,.2),transparent 35%),
    radial-gradient(circle at 50% 120%,rgba(0,164,255,.12),transparent 30%),
    radial-gradient(circle at 50% 50%,rgba(255,255,255,.04),transparent 70%);
}
#stars,#hud-stars{position:absolute;inset:0;pointer-events:none}
#stars::before,#stars::after,#hud-stars::before,#hud-stars::after{
  content:"";position:absolute;inset:0;
  background-image:
    radial-gradient(circle,rgba(255,255,255,.9) 0 1px,transparent 1.4px),
    radial-gradient(circle,rgba(139,232,255,.8) 0 1px,transparent 1.6px),
    radial-gradient(circle,rgba(255,222,138,.55) 0 1px,transparent 1.8px);
  background-size:180px 180px,260px 260px,320px 320px;
  background-position:0 0,40px 80px,100px 20px;
  opacity:.32;
}
#globe{
  position:relative;width:min(92vw,650px);aspect-ratio:1/1;border-radius:50%;overflow:hidden;
  background:
    radial-gradient(circle at 40% 35%,rgba(255,255,255,.28),transparent 18%),
    radial-gradient(circle at 55% 50%,rgba(0,0,0,.02),transparent 32%),
    radial-gradient(circle at 44% 36%,rgba(255,255,255,.08),transparent 12%),
    url('https://upload.wikimedia.org/wikipedia/commons/8/80/Equirectangular_projection_SW.jpg') center/cover;
  box-shadow:0 0 0 2px rgba(0,197,255,.08),0 0 60px rgba(0,197,255,.18),0 40px 110px rgba(0,0,0,.48), inset -40px -30px 80px rgba(0,0,0,.38);
  transform:translateY(12px);
}
#globe::before{
  content:"";position:absolute;inset:-6%;border-radius:50%;
  background:radial-gradient(circle,transparent 60%,rgba(0,197,255,.18) 72%,transparent 78%);
  filter:blur(16px);opacity:.8;pointer-events:none
}
#globe::after{
  content:"";position:absolute;inset:0;border-radius:50%;
  background:linear-gradient(120deg,rgba(255,255,255,.24),transparent 22%,transparent 55%,rgba(0,0,0,.38) 78%);
  pointer-events:none
}
.globe-marker{position:absolute;width:8px;height:8px;border-radius:50%;background:var(--blue-2);box-shadow:0 0 14px rgba(0,197,255,.8)}
.globe-marker.orange{background:#ffb454;box-shadow:0 0 14px rgba(255,180,84,.8)}
.globe-marker.red{background:#ff6174;box-shadow:0 0 14px rgba(255,97,116,.8)}

#map{position:absolute;inset:0;background:#07131b}
.map-fake{position:absolute;inset:0;background:
  radial-gradient(circle at 50% 30%,rgba(0,197,255,.08),transparent 30%),
  linear-gradient(180deg,rgba(9,27,40,.95),rgba(5,18,28,.95)),
  repeating-linear-gradient(90deg,transparent 0 59px,rgba(0,197,255,.05) 59px 60px),
  repeating-linear-gradient(180deg,transparent 0 59px,rgba(0,197,255,.05) 59px 60px);
}
.map-road,.map-marker{position:absolute}
.map-road{height:2px;background:linear-gradient(90deg,transparent,rgba(115,213,255,.35),transparent);box-shadow:0 0 8px rgba(0,197,255,.2)}
.map-marker{width:15px;height:15px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);background:radial-gradient(circle at 32% 32%,#fff,#5fe4ff 58%,#019fd6);box-shadow:0 0 20px rgba(0,197,255,.4)}
.map-marker::after{content:"";position:absolute;left:4px;top:4px;width:7px;height:7px;border-radius:50%;background:#032130}

.hud{
  position:absolute;top:calc(92px + var(--safe-top));width:var(--hud-size);height:var(--hud-size);border-radius:50%;z-index:20;
  background:radial-gradient(circle at 50% 50%,rgba(8,27,40,.9) 0 46%,rgba(6,18,29,.78) 47% 100%);
  border:1px solid var(--line);box-shadow:0 0 0 1px rgba(255,255,255,.03) inset,0 18px 32px rgba(0,0,0,.28),0 0 36px rgba(0,197,255,.1);
  backdrop-filter:blur(12px) saturate(130%);
}
#perf-hud{left:10px}
#radar-hud{right:10px}
.hud-ring{position:absolute;inset:7px;border-radius:50%;border:1px solid rgba(0,197,255,.18)}
.hud-ring::before,.hud-ring::after{content:"";position:absolute;inset:10px;border-radius:50%;border:1px solid rgba(0,197,255,.1)}
.hud-center{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:42px;height:42px;border-radius:50%;border:1px solid var(--line-strong);
  background:radial-gradient(circle at 35% 30%,rgba(139,232,255,.18),rgba(6,18,29,.96));display:grid;place-items:center;color:var(--blue-2);cursor:pointer;
  box-shadow:0 0 16px rgba(0,197,255,.24),inset 0 0 12px rgba(0,197,255,.08)
}
.hud-center:active{transform:translate(-50%,-50%) scale(.96)}
.hud-label{position:absolute;font-size:9px;font-weight:700;letter-spacing:.08em;color:var(--text-dim);text-transform:uppercase}
.hud-value{position:absolute;font-size:11px;font-weight:700;color:var(--blue-2)}
#perf-hud .hud-label:nth-of-type(1){left:18px;top:18px} #perf-hud .hud-value:nth-of-type(1){left:18px;top:31px}
#perf-hud .hud-label:nth-of-type(2){right:16px;top:18px} #perf-hud .hud-value:nth-of-type(2){right:16px;top:31px}
#perf-hud .hud-label:nth-of-type(3){left:18px;bottom:18px} #perf-hud .hud-value:nth-of-type(3){left:18px;bottom:6px}
#perf-hud .hud-label:nth-of-type(4){right:16px;bottom:18px} #perf-hud .hud-value:nth-of-type(4){right:16px;bottom:6px}
#radar-hud .radar-sweep{position:absolute;inset:10px;border-radius:50%;background:conic-gradient(from 0deg,rgba(0,197,255,.0),rgba(0,197,255,.0) 62%,rgba(0,197,255,.24) 86%,rgba(0,197,255,.0) 100%);mix-blend-mode:screen;animation:sweep 4s linear infinite}
#radar-hud .cardinals{position:absolute;inset:0;font-size:11px;font-weight:800;color:var(--blue-2)}
#radar-hud .cardinals span{position:absolute}
#radar-hud .cardinals .n{left:50%;top:10px;transform:translateX(-50%)}
#radar-hud .cardinals .e{right:12px;top:50%;transform:translateY(-50%)}
#radar-hud .cardinals .s{left:50%;bottom:10px;transform:translateX(-50%)}
#radar-hud .cardinals .w{left:12px;top:50%;transform:translateY(-50%)}
#radar-caption{position:absolute;right:26px;top:calc(92px + var(--safe-top) + var(--hud-size) + 10px);z-index:21;font-size:10px;color:var(--text-dim);font-weight:700;letter-spacing:.08em}
#perf-caption{position:absolute;left:22px;top:calc(92px + var(--safe-top) + var(--hud-size) + 10px);z-index:21;font-size:10px;color:var(--text-dim);font-weight:700;letter-spacing:.08em}
@keyframes sweep{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

#result-card{
  position:absolute;left:50%;top:54%;transform:translate(-50%,-50%);z-index:18;width:min(78vw,360px);display:none;
  background:linear-gradient(180deg,rgba(6,18,29,.88),rgba(6,18,29,.7));border:1px solid var(--line);border-radius:18px;padding:14px 14px 12px;
  box-shadow:0 18px 42px rgba(0,0,0,.28);backdrop-filter:blur(16px) saturate(130%)
}
#result-card.show{display:block}
.result-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px}
.result-title{font-size:16px;font-weight:800}
.result-type{font-size:11px;color:var(--blue-2);text-transform:uppercase;letter-spacing:.12em;font-weight:700}
.result-body{font-size:14px;line-height:1.45;color:#cfefff}
.result-meta{display:flex;gap:12px;flex-wrap:wrap;margin-top:10px;font-size:12px;color:var(--text-dim)}
.close-chip{width:32px;height:32px;border-radius:50%;border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--text);display:grid;place-items:center;cursor:pointer}

#helper-dock{position:absolute;left:10px;bottom:calc(12px + var(--safe-bottom));z-index:26;width:var(--helper-size);height:var(--helper-size);display:grid;place-items:end center}
#helper-btn{background:transparent;border:none;padding:0;cursor:pointer;width:var(--helper-size);height:var(--helper-size)}
#helper-svg{width:100%;height:100%;filter:drop-shadow(0 10px 20px rgba(0,0,0,.34)) drop-shadow(0 0 22px rgba(0,197,255,.15))}
#helper-btn:active{transform:translateY(1px) scale(.99)}

#composer-shell{
  position:absolute;left:110px;right:96px;bottom:calc(14px + var(--safe-bottom));height:var(--composer-h);z-index:28;
  background:linear-gradient(180deg,rgba(7,21,33,.78),rgba(7,21,33,.56));border:1px solid var(--line);border-radius:24px;padding:8px 10px;
  box-shadow:0 12px 34px rgba(0,0,0,.26),inset 0 0 22px rgba(0,197,255,.04);backdrop-filter:blur(18px) saturate(130%);
  display:flex;flex-direction:column;gap:8px
}
#composer-top{display:flex;align-items:center;gap:8px;min-width:0}
#channel-wrap{position:relative;display:flex;align-items:center;flex:1;min-width:0;height:30px;border-radius:14px;border:1px solid rgba(0,197,255,.18);background:rgba(255,255,255,.03);overflow:hidden}
#channel-arrow{width:30px;display:grid;place-items:center;color:var(--blue-2);font-size:11px;pointer-events:none}
#channel{appearance:none;-webkit-appearance:none;flex:1;background:transparent;border:none;outline:none;color:var(--blue-2);font-weight:700;padding:0 8px 0 0;font-size:13px;min-width:0}
#channel-add{width:30px;height:30px;border:none;border-left:1px solid rgba(0,197,255,.14);background:rgba(255,255,255,.02);color:var(--blue-2);font-size:18px;cursor:pointer}
#composer-inputrow{display:flex;align-items:center;gap:8px;flex:1}
.icon-btn{width:38px;height:38px;flex:0 0 38px;border-radius:50%;border:1px solid rgba(0,197,255,.18);background:rgba(255,255,255,.03);color:var(--blue-2);display:grid;place-items:center;cursor:pointer}
#text-box{flex:1;min-width:0;height:38px;border-radius:16px;border:1px solid rgba(0,197,255,.18);background:transparent;padding:0 14px;color:var(--blue-2);font-size:14px;box-shadow:inset 0 0 14px rgba(0,197,255,.04)}
#text-box::placeholder{color:#70bfd4}
#text-box:focus{outline:none;border-color:var(--line-strong)}
#send-btn{width:42px;height:38px;border-radius:16px;border:1px solid rgba(0,197,255,.24);background:radial-gradient(circle at 35% 30%,rgba(139,232,255,.16),rgba(7,21,33,.94));color:var(--blue-2);display:grid;place-items:center;cursor:pointer}

#chat-drawer{
  position:absolute;left:110px;right:96px;bottom:calc(var(--composer-h) + 20px + var(--safe-bottom));z-index:25;max-height:min(42vh,320px);display:none;
  background:linear-gradient(180deg,rgba(6,18,29,.9),rgba(6,18,29,.74));border:1px solid var(--line);border-radius:20px 20px 10px 10px;
  box-shadow:0 18px 34px rgba(0,0,0,.3);overflow:hidden;backdrop-filter:blur(18px) saturate(130%)
}
#chat-drawer.show{display:flex;flex-direction:column}
#chat-log{overflow:auto;padding:10px 12px 12px;display:flex;flex-direction:column;gap:8px}
.msg{padding:10px 12px;border-radius:16px;max-width:88%;font-size:13px;line-height:1.4}
.msg.assistant{align-self:flex-start;background:rgba(0,197,255,.08);border:1px solid rgba(0,197,255,.14);color:#d7f8ff}
.msg.user{align-self:flex-end;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:#f0fbff}
.msg.system{align-self:center;background:rgba(0,0,0,.14);border:1px solid rgba(0,197,255,.08);color:var(--text-dim);font-size:12px}

#add-bubble{
  position:absolute;right:12px;bottom:calc(18px + var(--safe-bottom));width:76px;height:76px;border-radius:50%;z-index:29;
  border:1px solid var(--line-strong);background:radial-gradient(circle at 35% 30%,rgba(139,232,255,.18),rgba(6,18,29,.92));
  display:grid;place-items:center;color:var(--blue-2);font-size:32px;cursor:pointer;box-shadow:0 16px 30px rgba(0,0,0,.26),0 0 22px rgba(0,197,255,.12)
}
#add-bubble:active{transform:scale(.97)}

#radial-layer{position:absolute;inset:0;z-index:24;display:none;pointer-events:none}
#radial-layer.show{display:block}
.radial-option{
  position:absolute;width:96px;height:96px;border-radius:50%;pointer-events:auto;cursor:pointer;
  border:1px solid rgba(0,197,255,.2);background:radial-gradient(circle at 35% 30%,rgba(139,232,255,.14),rgba(6,18,29,.92));
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;text-align:center;padding:8px;color:#e0faff;
  box-shadow:0 16px 30px rgba(0,0,0,.26)
}
.radial-option strong{font-size:14px;line-height:1.05}
.radial-option span{font-size:11px;color:var(--text-dim)}
.radial-icon{font-size:18px;color:var(--blue-2)}

#form-sheet{
  position:absolute;left:12px;right:12px;top:calc(88px + var(--safe-top));bottom:calc(112px + var(--safe-bottom));z-index:32;display:none;
  background:linear-gradient(180deg,rgba(6,18,29,.94),rgba(6,18,29,.82));border:1px solid var(--line);border-radius:22px;
  box-shadow:0 22px 44px rgba(0,0,0,.34);backdrop-filter:blur(18px) saturate(130%);overflow:hidden
}
#form-sheet.show{display:flex;flex-direction:column}
.sheet-head{display:flex;align-items:center;justify-content:space-between;padding:14px 14px 12px;border-bottom:1px solid rgba(0,197,255,.12)}
.sheet-title{font-size:18px;font-weight:800}
.sheet-sub{font-size:12px;color:var(--text-dim);margin-top:4px}
.sheet-close{width:40px;height:40px;border-radius:50%;border:1px solid rgba(0,197,255,.18);background:rgba(255,255,255,.03);color:var(--text);display:grid;place-items:center;cursor:pointer;font-size:22px}
#form-body{padding:14px;overflow:auto;display:grid;grid-template-columns:1fr 1fr;gap:12px 10px}
.field{display:flex;flex-direction:column;gap:6px}
.field.full{grid-column:1/-1}
.field label{font-size:12px;color:var(--text-dim);font-weight:700;letter-spacing:.04em}
.field input,.field select,.field textarea{
  width:100%;border-radius:14px;border:1px solid rgba(0,197,255,.16);background:rgba(255,255,255,.03);padding:12px 12px;color:var(--text);outline:none
}
.field textarea{min-height:92px;resize:vertical}
#form-actions{display:flex;gap:10px;padding:14px;border-top:1px solid rgba(0,197,255,.12)}
.primary-btn,.ghost-btn{height:44px;border-radius:16px;padding:0 16px;font-weight:800;cursor:pointer}
.primary-btn{flex:1;border:1px solid rgba(0,197,255,.26);background:radial-gradient(circle at 35% 30%,rgba(139,232,255,.14),rgba(7,21,33,.94));color:var(--blue-2)}
.ghost-btn{border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);color:var(--text)}

#listings-strip{
  position:absolute;left:10px;right:10px;top:calc(88px + var(--safe-top) + 10px);z-index:19;display:flex;gap:10px;overflow:auto;padding-bottom:6px;scrollbar-width:none
}
#listings-strip:empty{display:none}
.listing-chip{
  min-width:170px;max-width:220px;background:linear-gradient(180deg,rgba(6,18,29,.76),rgba(6,18,29,.58));border:1px solid rgba(0,197,255,.16);border-radius:18px;padding:12px;box-shadow:0 12px 22px rgba(0,0,0,.22);backdrop-filter:blur(16px)
}
.listing-chip h4{margin:0 0 4px;font-size:15px}
.listing-chip p{margin:0;font-size:12px;color:var(--text-dim);line-height:1.35}
.listing-chip .price{display:block;margin-top:8px;color:var(--blue-2);font-weight:800}

.hidden{display:none !important}

@media (max-width:420px){
  :root{--helper-size:84px;--hud-size:104px}
  .brand-main{font-size:11px}
  .user-pill span{font-size:13px}
  #composer-shell{left:96px;right:88px}
  #chat-drawer{left:96px;right:88px}
  #result-card{width:min(84vw,340px)}
  .radial-option{width:88px;height:88px}
}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div class="brand-pill">
      <div class="brand-main">ASTRANOV</div>
      <div class="brand-sub">v1</div>
    </div>
    <div class="user-pill"><div class="user-dot"></div><span>Guest</span></div>
  </div>

  <div id="stage">
    <div id="world-wrap">
      <div id="stars"></div>
      <div id="globe-view">
        <div id="globe">
          <div class="globe-marker" style="left:58%;top:48%"></div>
          <div class="globe-marker orange" style="left:64%;top:56%"></div>
          <div class="globe-marker" style="left:43%;top:44%"></div>
          <div class="globe-marker red" style="left:37%;top:53%"></div>
          <div class="globe-marker orange" style="left:71%;top:39%"></div>
        </div>
      </div>
      <div id="map-view">
        <div id="map" class="map-fake">
          <div class="map-road" style="left:6%;top:38%;width:58%;transform:rotate(18deg)"></div>
          <div class="map-road" style="left:30%;top:56%;width:48%;transform:rotate(-12deg)"></div>
          <div class="map-road" style="left:18%;top:18%;width:36%;transform:rotate(-4deg)"></div>
          <div class="map-road" style="left:54%;top:22%;width:28%;transform:rotate(24deg)"></div>
          <div class="map-marker" id="map-focus" style="left:52%;top:46%"></div>
        </div>
      </div>
    </div>

    <div id="listings-strip"></div>

    <div id="perf-hud" class="hud">
      <div class="hud-ring"></div>
      <div class="hud-label">Signal</div><div class="hud-value" id="perf-signal">84%</div>
      <div class="hud-label">Battery</div><div class="hud-value" id="perf-battery">81%</div>
      <div class="hud-label">Storage</div><div class="hud-value" id="perf-storage">64GB</div>
      <div class="hud-label">Load</div><div class="hud-value" id="perf-state">Open</div>
      <button class="hud-center" id="load-toggle" aria-label="Load or unload">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
          <path id="claw-shape" d="M7 7c0 0-2 2-2 5s2 5 5 5h4c3 0 5-2 5-5 0-2-1-4-2-5"></path>
          <circle id="claw-dot" cx="12" cy="12" r="0" fill="currentColor"></circle>
        </svg>
      </button>
    </div>
    <div id="perf-caption">Performance</div>

    <div id="radar-hud" class="hud">
      <div class="hud-ring"></div>
      <div class="radar-sweep"></div>
      <div class="cardinals"><span class="n">N</span><span class="e">E</span><span class="s">S</span><span class="w">W</span></div>
      <button class="hud-center" id="zoom-toggle" aria-label="Zoom to location or globe">
        <svg id="zoom-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 6v12"></path><path d="M7 11l5-5 5 5"></path>
        </svg>
      </button>
    </div>
    <div id="radar-caption">Radar</div>

    <div id="result-card">
      <div class="result-head">
        <div>
          <div class="result-type" id="result-type">Product</div>
          <div class="result-title" id="result-title">Listing ready</div>
        </div>
        <button class="close-chip" id="close-result">×</button>
      </div>
      <div class="result-body" id="result-body"></div>
      <div class="result-meta" id="result-meta"></div>
    </div>

    <div id="radial-layer"></div>

    <div id="form-sheet">
      <div class="sheet-head">
        <div>
          <div class="sheet-title" id="sheet-title">Create listing</div>
          <div class="sheet-sub" id="sheet-sub">Use current focus location or map center.</div>
        </div>
        <button class="sheet-close" id="close-sheet">×</button>
      </div>
      <div id="form-body"></div>
      <div id="form-actions">
        <button class="ghost-btn" id="cancel-sheet">Cancel</button>
        <button class="primary-btn" id="save-sheet">Save listing</button>
      </div>
    </div>
  </div>

  <div id="chat-drawer"><div id="chat-log"></div></div>

  <div id="helper-dock">
    <button id="helper-btn" aria-label="Astranov Collective Intelligence">
      <svg id="helper-svg" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="wingG" x1="0" x2="1">
            <stop offset="0" stop-color="#1d3a4a"/>
            <stop offset="1" stop-color="#8be8ff"/>
          </linearGradient>
          <linearGradient id="bodyG" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0" stop-color="#0f3448"/>
            <stop offset="1" stop-color="#0a1822"/>
          </linearGradient>
        </defs>
        <path d="M20 74c8-16 18-24 30-26-6 6-10 14-12 24-6 1-12 1-18 2z" fill="url(#wingG)" opacity=".9"/>
        <path d="M100 74c-8-16-18-24-30-26 6 6 10 14 12 24 6 1 12 1 18 2z" fill="url(#wingG)" opacity=".9"/>
        <path d="M36 38l10-12 12 9-10 8z" fill="#243948"/>
        <path d="M84 38l-10-12-12 9 10 8z" fill="#243948"/>
        <path d="M60 18c16 0 29 11 29 26 0 11-7 20-17 24v10H48V68C38 64 31 55 31 44c0-15 13-26 29-26z" fill="url(#bodyG)" stroke="#8be8ff" stroke-opacity=".24"/>
        <path d="M47 27l-10 10 8 7" fill="none" stroke="#9defff" stroke-width="3.2" stroke-linecap="round"/>
        <path d="M73 27l10 10-8 7" fill="none" stroke="#9defff" stroke-width="3.2" stroke-linecap="round"/>
        <ellipse cx="60" cy="46" rx="18" ry="16" fill="#f1d2b5"/>
        <circle cx="53" cy="45" r="2.3" fill="#06131b"/>
        <circle cx="67" cy="45" r="2.3" fill="#06131b"/>
        <path d="M54 53c2 2 10 2 12 0" fill="none" stroke="#6a3c38" stroke-width="2" stroke-linecap="round"/>
        <path d="M46 39c2-3 6-5 14-5 9 0 13 2 15 5" fill="none" stroke="#e5f7ff" stroke-opacity=".4"/>
        <path d="M42 70h36l8 24H34z" fill="url(#bodyG)" stroke="#8be8ff" stroke-opacity=".22"/>
        <path d="M57 72l-6 14 8 7 10-10-4-10z" fill="#8be8ff" opacity=".2"/>
        <path d="M60 67l18 5-12 6z" fill="none" stroke="#d7f8ff" stroke-width="3" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <div id="composer-shell">
    <div id="composer-top">
      <div id="channel-wrap">
        <div id="channel-arrow">▾</div>
        <select id="channel">
          <option>Astranov Collective Intelligence</option>
          <option>Marketplace</option>
          <option>Planet Operations</option>
          <option>Astranov Racing</option>
        </select>
        <button id="channel-add" aria-label="Add channel">+</button>
      </div>
    </div>
    <div id="composer-inputrow">
      <button class="icon-btn" id="mic-btn" aria-label="Voice typing">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="3" width="6" height="11" rx="3"></rect><path d="M5 10a7 7 0 0 0 14 0"></path><path d="M12 17v4"></path><path d="M8 21h8"></path></svg>
      </button>
      <input id="text-box" type="text" placeholder='Tell Astranov what to do…' />
      <button id="send-btn" aria-label="Send">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"></path><path d="M22 2l-7 20-4-9-9-4 20-7z"></path></svg>
      </button>
    </div>
  </div>

  <button id="add-bubble" aria-label="Add something">+</button>
</div>

<script>
(() => {
  const app = document.getElementById('app');
  const textBox = document.getElementById('text-box');
  const sendBtn = document.getElementById('send-btn');
  const micBtn = document.getElementById('mic-btn');
  const helperBtn = document.getElementById('helper-btn');
  const addBubble = document.getElementById('add-bubble');
  const radialLayer = document.getElementById('radial-layer');
  const chatDrawer = document.getElementById('chat-drawer');
  const chatLog = document.getElementById('chat-log');
  const zoomToggle = document.getElementById('zoom-toggle');
  const zoomIcon = document.getElementById('zoom-icon');
  const loadToggle = document.getElementById('load-toggle');
  const clawShape = document.getElementById('claw-shape');
  const clawDot = document.getElementById('claw-dot');
  const perfState = document.getElementById('perf-state');
  const globeView = document.getElementById('globe-view');
  const mapView = document.getElementById('map-view');
  const mapFocus = document.getElementById('map-focus');
  const formSheet = document.getElementById('form-sheet');
  const formBody = document.getElementById('form-body');
  const sheetTitle = document.getElementById('sheet-title');
  const sheetSub = document.getElementById('sheet-sub');
  const closeSheet = document.getElementById('close-sheet');
  const cancelSheet = document.getElementById('cancel-sheet');
  const saveSheet = document.getElementById('save-sheet');
  const resultCard = document.getElementById('result-card');
  const closeResult = document.getElementById('close-result');
  const resultType = document.getElementById('result-type');
  const resultTitle = document.getElementById('result-title');
  const resultBody = document.getElementById('result-body');
  const resultMeta = document.getElementById('result-meta');
  const listingsStrip = document.getElementById('listings-strip');
  const channelAdd = document.getElementById('channel-add');
  const channel = document.getElementById('channel');

  const state = {
    mode: 'globe',
    handsFree: false,
    loadState: 'open',
    radialOpen: false,
    formType: null,
    currentCenter: { lat: 36.4346, lng: 28.2176, label: 'Rhodes' },
    chatOpen: false,
    listings: JSON.parse(localStorage.getItem('astranov.listings.v1') || '[]')
  };

  const radialConfig = [
    { key: 'product', icon: '▣', title: 'Product', sub: 'shop item' },
    { key: 'service', icon: '◌', title: 'Service', sub: 'hotel, tour' },
    { key: 'delivery', icon: '⌖', title: 'Delivery', sub: 'my location' },
    { key: 'driver', icon: '◈', title: 'Driver', sub: 'base location' },
    { key: 'media', icon: '▤', title: 'Media', sub: 'photo or video' }
  ];

  const fieldSets = {
    product: [
      ['name','Product name','text','full'],['category','Category','text'],['price','Price (€)','number'],['quantity','Quantity','number'],['description','Description','textarea','full'],['photo','Photo or video URL','url','full'],['temperature','Temperature','select','',['Cold','Hot','Neutral']],['maxMinutes','Max transport minutes','number'],['locationLabel','Location label','text','full']
    ],
    service: [
      ['name','Service name','text','full'],['serviceType','Service type','select','',['Hotel','Rent-a-car','Restaurant','Diving school','Tour','Other']],['price','Base price (€)','number'],['hours','Hours','text'],['description','Description','textarea','full'],['photo','Photo or video URL','url','full'],['locationLabel','Location label','text','full']
    ],
    delivery: [
      ['name','Delivery point name','text','full'],['street','Street','text'],['number','Number','text'],['floor','Floor','text'],['doorbell','Doorbell name','text'],['phone','Phone','tel'],['notes','Notes','textarea','full'],['locationLabel','Location label','text','full']
    ],
    driver: [
      ['name','Driver base name','text','full'],['phone','Phone','tel'],['vehicle','Vehicle','text'],['rangeKm','Range (km)','number'],['hours','Hours','text'],['notes','Notes','textarea','full'],['locationLabel','Location label','text','full']
    ],
    media: [
      ['name','Post title','text','full'],['mediaType','Media type','select','',['Photo','Video']],['mediaUrl','Media URL','url','full'],['caption','Caption','textarea','full'],['locationLabel','Location label','text','full']
    ]
  };

  function saveListings(){
    localStorage.setItem('astranov.listings.v1', JSON.stringify(state.listings));
  }

  function addMessage(text, who='assistant'){
    const div = document.createElement('div');
    div.className = `msg ${who}`;
    div.textContent = text;
    chatLog.appendChild(div);
    chatLog.scrollTop = chatLog.scrollHeight;
    openChat();
  }

  function openChat(){
    state.chatOpen = true;
    chatDrawer.classList.add('show');
  }
  function closeChat(){
    state.chatOpen = false;
    chatDrawer.classList.remove('show');
  }

  function applyLoadState(){
    if(state.loadState === 'open'){
      perfState.textContent = 'Open';
      clawShape.setAttribute('d','M7 7c0 0-2 2-2 5s2 5 5 5h4c3 0 5-2 5-5 0-2-1-4-2-5');
      clawDot.setAttribute('r','0');
      loadToggle.style.borderColor = 'rgba(45,245,143,.5)';
      loadToggle.style.boxShadow = '0 0 16px rgba(45,245,143,.24), inset 0 0 12px rgba(45,245,143,.08)';
    } else {
      perfState.textContent = 'Loaded';
      clawShape.setAttribute('d','M7 8c1 4 3 7 5 8h0c2 0 4-1 5-3 1-1 2-3 2-5');
      clawDot.setAttribute('r','2.6');
      loadToggle.style.borderColor = 'rgba(255,79,109,.54)';
      loadToggle.style.boxShadow = '0 0 16px rgba(255,79,109,.26), inset 0 0 12px rgba(255,79,109,.08)';
    }
  }

  function applyMode(){
    const isMap = state.mode === 'map';
    globeView.style.display = isMap ? 'none' : 'flex';
    mapView.style.display = isMap ? 'block' : 'none';
    zoomIcon.innerHTML = isMap
      ? '<path d="M12 18V6"></path><path d="M7 13l5 5 5-5"></path>'
      : '<path d="M12 6v12"></path><path d="M7 11l5-5 5 5"></path>';
  }

  function setMapFocus(lat, lng){
    state.currentCenter.lat = lat;
    state.currentCenter.lng = lng;
    const x = ((lng + 180) / 360) * 100;
    const y = ((90 - lat) / 180) * 100;
    mapFocus.style.left = `${Math.max(8, Math.min(92, x))}%`;
    mapFocus.style.top = `${Math.max(8, Math.min(92, y))}%`;
  }

  function goToUserLocation(){
    if(navigator.geolocation){
      navigator.geolocation.getCurrentPosition(pos => {
        state.currentCenter = { lat: pos.coords.latitude, lng: pos.coords.longitude, label: 'My location' };
        setMapFocus(pos.coords.latitude, pos.coords.longitude);
        state.mode = 'map';
        applyMode();
        addMessage('Zoomed to your location on the city map.');
      }, () => {
        state.mode = 'map';
        applyMode();
        setMapFocus(state.currentCenter.lat, state.currentCenter.lng);
        addMessage('Location permission was unavailable, so I zoomed to the saved focus location.');
      }, { enableHighAccuracy: true, timeout: 6000, maximumAge: 120000 });
    } else {
      state.mode = 'map';
      applyMode();
      addMessage('Your browser does not expose live geolocation here, so I used the saved focus location.');
    }
  }

  function toggleZoom(){
    if(state.mode === 'globe') goToUserLocation();
    else {
      state.mode = 'globe';
      applyMode();
      addMessage('Returned to global view.');
    }
  }

  function placeRadial(){
    radialLayer.innerHTML = '';
    const rect = app.getBoundingClientRect();
    const cx = rect.width * 0.5;
    const cy = rect.height * 0.47;
    const radius = Math.min(rect.width * 0.24, 130);
    radialConfig.forEach((item, i) => {
      const angle = (-90 + i * 72) * Math.PI / 180;
      const x = cx + Math.cos(angle) * radius - 48;
      const y = cy + Math.sin(angle) * radius - 48;
      const el = document.createElement('button');
      el.className = 'radial-option';
      el.style.left = `${x}px`;
      el.style.top = `${y}px`;
      el.innerHTML = `<div class="radial-icon">${item.icon}</div><strong>${item.title}</strong><span>${item.sub}</span>`;
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        openForm(item.key);
        toggleRadial(false);
      });
      radialLayer.appendChild(el);
    });
  }

  function toggleRadial(force){
    const next = typeof force === 'boolean' ? force : !state.radialOpen;
    state.radialOpen = next;
    radialLayer.classList.toggle('show', next);
    if(next) placeRadial();
    else radialLayer.innerHTML = '';
  }

  function openForm(type){
    state.formType = type;
    formBody.innerHTML = '';
    sheetTitle.textContent = `Create ${type}`;
    sheetSub.textContent = state.mode === 'globe'
      ? 'You are in global view. Save now or zoom down later to refine the place.'
      : 'Using the current map focus as the place for this listing.';

    (fieldSets[type] || []).forEach(([name,label,kind,size,options]) => {
      const wrap = document.createElement('div');
      wrap.className = `field ${size === 'full' ? 'full' : ''}`;
      const lab = document.createElement('label');
      lab.textContent = label;
      let input;
      if(kind === 'textarea'){
        input = document.createElement('textarea');
      } else if(kind === 'select'){
        input = document.createElement('select');
        options.forEach(op => {
          const opt = document.createElement('option');
          opt.value = op; opt.textContent = op;
          input.appendChild(opt);
        });
      } else {
        input = document.createElement('input');
        input.type = kind;
      }
      input.name = name;
      if(name === 'locationLabel') input.value = state.currentCenter.label || 'Current focus';
      wrap.appendChild(lab);
      wrap.appendChild(input);
      formBody.appendChild(wrap);
    });
    formSheet.classList.add('show');
  }

  function closeForm(){
    formSheet.classList.remove('show');
    state.formType = null;
  }

  function gatherForm(){
    const data = { type: state.formType, lat: state.currentCenter.lat, lng: state.currentCenter.lng, channel: channel.value };
    formBody.querySelectorAll('[name]').forEach(el => data[el.name] = el.value);
    data.createdAt = new Date().toISOString();
    data.id = Date.now().toString(36);
    return data;
  }

  function showResult(item){
    resultType.textContent = item.type.toUpperCase();
    resultTitle.textContent = item.name || item.serviceType || 'Listing saved';
    const bits = [];
    if(item.description) bits.push(item.description);
    if(item.caption) bits.push(item.caption);
    if(item.hours) bits.push(`Hours: ${item.hours}`);
    if(item.locationLabel) bits.push(`Location: ${item.locationLabel}`);
    resultBody.textContent = bits.join(' · ') || 'Ready in Astranov.';
    const meta = [];
    if(item.price) meta.push(`€${item.price}`);
    if(item.quantity) meta.push(`Qty ${item.quantity}`);
    if(item.rangeKm) meta.push(`${item.rangeKm} km`);
    if(item.temperature) meta.push(item.temperature);
    if(item.vehicle) meta.push(item.vehicle);
    resultMeta.innerHTML = meta.map(m => `<span>${m}</span>`).join('');
    resultCard.classList.add('show');
  }

  function renderListings(){
    listingsStrip.innerHTML = '';
    state.listings.slice(-5).reverse().forEach(item => {
      const chip = document.createElement('button');
      chip.className = 'listing-chip';
      chip.innerHTML = `<h4>${item.name || item.serviceType || item.type}</h4><p>${item.locationLabel || 'Current focus'} · ${item.channel || 'Marketplace'}</p>${item.price ? `<span class="price">€${item.price}</span>` : ''}`;
      chip.addEventListener('click', () => showResult(item));
      listingsStrip.appendChild(chip);
    });
  }

  function saveCurrentForm(){
    const item = gatherForm();
    state.listings.push(item);
    saveListings();
    renderListings();
    closeForm();
    showResult(item);
    addMessage(`${item.type} saved in ${item.channel}.`, 'system');
  }

  function sendInput(){
    const text = textBox.value.trim();
    if(!text){
      toggleRadial();
      return;
    }
    addMessage(text, 'user');
    textBox.value = '';
    const reply = routeText(text);
    if(reply) addMessage(reply, 'assistant');
  }

  function routeText(text){
    const t = text.toLowerCase();
    if(t.includes('zoom')) { toggleZoom(); return ''; }
    if(t.includes('product')) { openForm('product'); return 'Opening the product listing form.'; }
    if(t.includes('service')) { openForm('service'); return 'Opening the service listing form.'; }
    if(t.includes('driver')) { openForm('driver'); return 'Opening the driver base form.'; }
    if(t.includes('delivery')) { openForm('delivery'); return 'Opening the delivery location form.'; }
    if(t.includes('show') || t.includes('listing')) {
      renderListings();
      return state.listings.length ? 'I brought your latest listings to the strip above the world view.' : 'No saved listings yet. Use the add bubble to create the first one.';
    }
    return 'Use the add bubble to create something, or tell me product, service, driver, delivery, or zoom.';
  }

  function toggleHandsFree(){
    state.handsFree = !state.handsFree;
    addMessage(state.handsFree
      ? 'Astranov Collective Intelligence switched to AI hands-free mode.'
      : 'Switched back to manual typing mode.');
  }

  function startVoiceTyping(){
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!SR){
      addMessage('Voice typing is not available in this browser. Use the keyboard mode.', 'system');
      return;
    }
    const rec = new SR();
    rec.lang = 'en-US';
    rec.interimResults = false;
    rec.maxAlternatives = 1;
    rec.onresult = (e) => {
      const txt = e.results[0][0].transcript;
      textBox.value = txt;
      addMessage('Voice typed into the composer.', 'system');
    };
    rec.onerror = () => addMessage('There was too much noise or the browser stopped voice input.', 'system');
    rec.start();
  }

  let dragState = null;
  function onInputPointerDown(e){
    dragState = { y: e.clientY, open: state.chatOpen, moved: false };
  }
  function onInputPointerMove(e){
    if(!dragState) return;
    if(Math.abs(e.clientY - dragState.y) > 16) dragState.moved = true;
  }
  function onInputPointerUp(e){
    if(!dragState) return;
    const delta = e.clientY - dragState.y;
    if(dragState.moved){
      if(delta < -16) openChat();
      if(delta > 16) closeChat();
    } else {
      textBox.focus();
    }
    dragState = null;
  }

  sendBtn.addEventListener('click', sendInput);
  textBox.addEventListener('keydown', e => { if(e.key === 'Enter') sendInput(); });
  addBubble.addEventListener('click', () => {
    if(textBox.value.trim()) sendInput();
    else toggleRadial();
  });
  helperBtn.addEventListener('click', toggleHandsFree);
  micBtn.addEventListener('click', startVoiceTyping);
  zoomToggle.addEventListener('click', toggleZoom);
  loadToggle.addEventListener('click', () => {
    state.loadState = state.loadState === 'open' ? 'loaded' : 'open';
    applyLoadState();
    addMessage(state.loadState === 'open' ? 'Grip opened and ready to load.' : 'Grip closed and cargo locked.', 'system');
  });
  closeSheet.addEventListener('click', closeForm);
  cancelSheet.addEventListener('click', closeForm);
  saveSheet.addEventListener('click', saveCurrentForm);
  closeResult.addEventListener('click', () => resultCard.classList.remove('show'));
  channelAdd.addEventListener('click', () => addMessage('Channel creation is reserved for the full backend workflow.', 'system'));
  radialLayer.addEventListener('click', (e) => { if(e.target === radialLayer) toggleRadial(false); });
  app.addEventListener('click', (e) => {
    if(state.radialOpen && !radialLayer.contains(e.target) && e.target !== addBubble) toggleRadial(false);
  });
  document.getElementById('map').addEventListener('click', (e) => {
    const rect = e.currentTarget.getBoundingClientRect();
    const x = (e.clientX - rect.left) / rect.width;
    const y = (e.clientY - rect.top) / rect.height;
    const lat = 90 - y * 180;
    const lng = x * 360 - 180;
    state.currentCenter = { lat, lng, label: 'Selected map point' };
    setMapFocus(lat, lng);
    addMessage('Map focus updated. Use the add flow to attach something here.', 'system');
  });
  textBox.addEventListener('pointerdown', onInputPointerDown);
  textBox.addEventListener('pointermove', onInputPointerMove);
  textBox.addEventListener('pointerup', onInputPointerUp);
  textBox.addEventListener('pointercancel', () => dragState = null);

  applyMode();
  applyLoadState();
  renderListings();
  addMessage('Astranov is ready. Use the add bubble for listings, or tell me product, service, driver, delivery, or zoom.', 'assistant');
})();
</script>
</body>
</html>
