<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Astranov</title>
<script>window.CESIUM_BASE_URL="https://cdn.jsdelivr.net/npm/cesium@1.123.1/Build/Cesium/";</script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cesium@1.123.1/Build/Cesium/Widgets/widgets.css">
<script src="https://cdn.jsdelivr.net/npm/cesium@1.123.1/Build/Cesium/Cesium.js"></script>
<style>
:root{--blue:#5ecbff;--text:#effbff;--border:rgba(128,225,255,.25);--glow:0 0 22px rgba(94,203,255,.38)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body,#app,#cesium{width:100%;height:100%;margin:0;overflow:hidden;background:#020713;color:var(--text);font-family:Inter,system-ui,Segoe UI,Arial,sans-serif}#cesium{position:absolute;inset:0}.cesium-viewer-bottom{font-size:10px;opacity:.65}#cityShade{position:absolute;inset:0;pointer-events:none;background:linear-gradient(180deg,rgba(0,22,52,.05),rgba(0,8,20,.08));mix-blend-mode:multiply;opacity:0;transition:opacity .7s ease;z-index:5}#cityShade.on{opacity:.72}
#top{position:absolute;top:10px;left:10px;right:10px;display:flex;justify-content:space-between;gap:8px;z-index:20;pointer-events:none}.chip,.btn{pointer-events:auto;border:1px solid var(--border);background:linear-gradient(180deg,rgba(7,24,55,.72),rgba(6,16,35,.43));box-shadow:var(--glow);backdrop-filter:blur(14px);color:var(--text);border-radius:999px;padding:10px 13px;font-size:12px;letter-spacing:.09em;text-transform:uppercase}#brand{font-weight:900;letter-spacing:.22em}#alt{font-size:11px;color:#e1f7ff}
#bottom{position:absolute;left:50%;bottom:12px;transform:translateX(-50%);z-index:20;display:flex;align-items:center;gap:9px;max-width:min(95vw,780px);border:1px solid var(--border);border-radius:999px;padding:9px 12px;background:linear-gradient(180deg,rgba(7,24,55,.75),rgba(6,16,35,.52));box-shadow:var(--glow);backdrop-filter:blur(16px)}#orb{width:17px;height:17px;border-radius:50%;flex:0 0 auto;background:radial-gradient(circle,#c9fbff 0%,#63d9ff 46%,rgba(99,217,255,.12) 78%);box-shadow:0 0 16px rgba(99,217,255,.9)}#hint{font-size:12px;line-height:1.2;min-width:0;color:#eaf9ff}#controls{display:flex;gap:7px;flex:0 0 auto}.btn{padding:8px 11px;letter-spacing:0;text-transform:none}
#ribbon{position:absolute;left:10px;right:10px;bottom:68px;z-index:22;display:none;align-items:center;justify-content:space-between;gap:8px;border:1px solid var(--border);border-radius:18px;padding:10px 12px;background:linear-gradient(180deg,rgba(7,24,55,.84),rgba(6,16,35,.58));box-shadow:var(--glow);backdrop-filter:blur(14px)}#ribbon.show{display:flex}#ribbonText{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}#ribbonBtns{display:flex;gap:7px}
#manual{position:absolute;left:10px;right:10px;bottom:12px;z-index:30;display:none;gap:8px;border:1px solid var(--border);border-radius:18px;padding:9px;background:rgba(7,22,49,.92);box-shadow:var(--glow);backdrop-filter:blur(15px)}#manual.show{display:flex}#manual input{flex:1;border:none;outline:none;border-radius:12px;background:rgba(255,255,255,.07);color:var(--text);font-size:15px;padding:12px}#manual button{border:none;border-radius:12px;padding:0 16px;font-weight:800;color:#061227;background:linear-gradient(180deg,#95efff,#55a7ff)}#stageFlash{position:absolute;left:50%;top:50%;width:90px;height:90px;border-radius:50%;z-index:18;pointer-events:none;transform:translate(-50%,-50%) scale(.6);opacity:0;border:1px solid rgba(155,239,255,.46);box-shadow:0 0 28px rgba(95,204,255,.58),inset 0 0 22px rgba(95,204,255,.18)}#stageFlash.go{animation:flash .9s ease forwards}@keyframes flash{0%{opacity:0;transform:translate(-50%,-50%) scale(.5)}30%{opacity:.9}100%{opacity:0;transform:translate(-50%,-50%) scale(2.2)}}@media(max-width:560px){#bottom{max-width:96vw}#hint{font-size:11.5px}.chip{padding:9px 11px}}
</style>
</head>
<body>
<div id="app"><div id="cesium"></div><div id="cityShade"></div><div id="stageFlash"></div><div id="top"><div class="chip" id="brand">Astranov</div><div class="chip" id="alt">Real Globe Engine</div></div><div id="ribbon"><div id="ribbonText"></div><div id="ribbonBtns"><button class="btn" id="openBtn">Open</button><button class="btn" id="chatBtn">Chat</button><button class="btn" id="closeBtn">Close</button></div></div><div id="bottom"><div id="orb"></div><div id="hint">Cesium real Earth. Swipe to trackball the globe. Pinch or wheel to change altitude. Tap signals or descend to Astranov City Map.</div><div id="controls"><button class="btn" id="voiceBtn">Voice</button><button class="btn" id="globeBtn">Globe</button></div></div><div id="manual"><input id="manualText" placeholder="Manual fallback only"/><button id="manualSend">Send</button></div></div>
<script>
(function(){const el=id=>document.getElementById(id);const ui={alt:el('alt'),hint:el('hint'),cityShade:el('cityShade'),flash:el('stageFlash'),ribbon:el('ribbon'),ribbonText:el('ribbonText'),openBtn:el('openBtn'),chatBtn:el('chatBtn'),closeBtn:el('closeBtn'),voiceBtn:el('voiceBtn'),globeBtn:el('globeBtn'),manual:el('manual'),manualText:el('manualText'),manualSend:el('manualSend')};const state={selected:{lon:28.222,lat:36.441,title:'Rhodes local radius'},context:null,cityEntities:[]};
if(!window.Cesium){ui.alt.textContent='Cesium failed to load';ui.hint.textContent='Real globe engine could not load. Check network/CDN.';return}
const viewer=new Cesium.Viewer('cesium',{animation:false,timeline:false,geocoder:false,homeButton:false,sceneModePicker:false,baseLayerPicker:false,navigationHelpButton:false,fullscreenButton:false,vrButton:false,infoBox:false,selectionIndicator:false,shadows:false,shouldAnimate:true,imageryProvider:new Cesium.UrlTemplateImageryProvider({url:'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',credit:'Imagery © Esri'}),terrainProvider:new Cesium.EllipsoidTerrainProvider()});
viewer.scene.globe.enableLighting=true;viewer.scene.skyAtmosphere.show=true;viewer.scene.screenSpaceCameraController.inertiaSpin=.92;viewer.scene.screenSpaceCameraController.inertiaZoom=.86;viewer.scene.screenSpaceCameraController.inertiaTranslate=.82;viewer.scene.screenSpaceCameraController.minimumZoomDistance=650;viewer.scene.screenSpaceCameraController.maximumZoomDistance=260000000;viewer.camera.setView({destination:Cesium.Cartesian3.fromDegrees(22,22,26000000),orientation:{heading:0,pitch:-Cesium.Math.PI_OVER_TWO,roll:0}});
const signals=[['sig_news_ny','news','World news · New York',-74.006,40.7128,220000,Cesium.Color.CYAN],['sig_friend_rhodes','friend','Friend feed · Rhodes',28.222,36.441,180000,Cesium.Color.AQUA],['sig_market_london','market','Marketplace heat · London',-0.1276,51.5072,200000,Cesium.Color.DEEPSKYBLUE],['sig_circle_tokyo','circle','Social Circle · Tokyo',139.6503,35.6762,230000,Cesium.Color.LIGHTSKYBLUE],['sig_news_paris','news','Global brief · Paris',2.3522,48.8566,190000,Cesium.Color.SKYBLUE],['sig_delivery_dubai','delivery','Delivery demand · Dubai',55.2708,25.2048,210000,Cesium.Color.CORNFLOWERBLUE]];
signals.forEach(s=>viewer.entities.add({id:s[0],position:Cesium.Cartesian3.fromDegrees(s[3],s[4],s[5]),point:{pixelSize:11,color:s[6],outlineColor:Cesium.Color.WHITE.withAlpha(.8),outlineWidth:1.2,scaleByDistance:new Cesium.NearFarScalar(1e6,1.6,5e7,.55)},label:{text:s[2],font:'13px system-ui',fillColor:Cesium.Color.WHITE,outlineColor:Cesium.Color.DEEPSKYBLUE,outlineWidth:3,style:Cesium.LabelStyle.FILL_AND_OUTLINE,pixelOffset:new Cesium.Cartesian2(0,-26),scaleByDistance:new Cesium.NearFarScalar(1e6,1,4e7,.35),distanceDisplayCondition:new Cesium.DistanceDisplayCondition(0,45000000)},polyline:{positions:[Cesium.Cartesian3.fromDegrees(s[3],s[4],0),Cesium.Cartesian3.fromDegrees(s[3],s[4],s[5])],width:1.5,material:Cesium.Color.CYAN.withAlpha(.65)},properties:{id:s[0],type:s[1],title:s[2],lon:s[3],lat:s[4]}}));
function h(){return Cesium.Cartographic.fromCartesian(viewer.camera.position).height}function layer(x){if(x>9e7)return['Solar Layer','Solar view. Earth in context. Zoom in to return to Earth.'];if(x>2e7)return['Orbital Earth','Trackball the real globe. Signals are anchored to real places.'];if(x>6e6)return['Global Feed','Global news, friends, social signals, and market heat.'];if(x>9e5)return['Regional Layer','Cities, larger Social Circles, teams, and demand zones.'];if(x>9e4)return['Local Descent','Local objects are waking up. Continue down to city radius.'];return['Astranov City Map','Dark real satellite map with glowing Astranov overlays.']}
viewer.scene.postRender.addEventListener(()=>{const a=h(),l=layer(a);ui.alt.textContent=l[0];ui.hint.textContent=l[1];ui.cityShade.classList.toggle('on',a<90000);state.cityEntities.forEach(e=>e.show=a<150000)});
function flash(){ui.flash.classList.remove('go');void ui.flash.offsetWidth;ui.flash.classList.add('go')}function fly(lon,lat,height,dur,done){viewer.camera.flyTo({destination:Cesium.Cartesian3.fromDegrees(lon,lat,height),orientation:{heading:0,pitch:-Cesium.Math.PI_OVER_TWO,roll:0},duration:dur||1,easingFunction:Cesium.EasingFunction.QUADRATIC_IN_OUT,complete:done})}
function descent(t){t=t||state.selected;flash();fly(t.lon,t.lat,6500000,.9,()=>fly(t.lon,t.lat,1200000,.85,()=>{renderCity(t.lon,t.lat);fly(t.lon,t.lat,120000,.75,()=>fly(t.lon,t.lat,3800,.85))}))}function globe(){hideRibbon();fly(state.selected.lon,state.selected.lat,26000000,1.25)}
function q(km,o){let total=Math.ceil(km);if(o.night)total++;if(o.badWeather)total++;if(o.load>13){total++;total+=Math.floor((Math.min(o.load,33)-13)/13)}return{total,platform:+(total*.03).toFixed(2),parties:+(total*.97).toFixed(2)}}function clearCity(){state.cityEntities.forEach(e=>viewer.entities.remove(e));state.cityEntities=[]}function add(e){const x=viewer.entities.add(e);state.cityEntities.push(x);return x}
function renderCity(lon,lat){clearCity();const p={vendor:{lon:lon+.006,lat:lat+.004},driver:{lon:lon-.007,lat:lat-.004},client:{lon:lon-.003,lat:lat+.008},news:{lon:lon+.008,lat:lat-.006},friend:{lon:lon-.009,lat:lat+.004}};const mk=(txt,color)=>({point:{pixelSize:12,color,outlineColor:Cesium.Color.WHITE.withAlpha(.75),outlineWidth:1.2},label:{text:txt,font:'13px system-ui',fillColor:Cesium.Color.WHITE,outlineColor:Cesium.Color.DEEPSKYBLUE,outlineWidth:3,style:Cesium.LabelStyle.FILL_AND_OUTLINE,pixelOffset:new Cesium.Cartesian2(0,-24)}});[['vendor','Vendor tile · menu and Google Sheets adapter',Cesium.Color.DEEPSKYBLUE],['driver','Driver tile · available · 26 kg/L',Cesium.Color.CYAN],['client','Client delivery point · preferences on tile',Cesium.Color.LIGHTCYAN],['news','News signal · place feed',Cesium.Color.SKYBLUE],['friend','Friend feed · nearby story',Cesium.Color.AQUA]].forEach(r=>{const pt=p[r[0]];add({id:'city_'+r[0],position:Cesium.Cartesian3.fromDegrees(pt.lon,pt.lat,35),...mk(r[0],r[2]),properties:{title:r[1],type:r[0]}})});const qq=q(3.6,{night:true,badWeather:false,load:18}),m={lon:(p.vendor.lon+p.client.lon)/2,lat:(p.vendor.lat+p.client.lat)/2};add({id:'route_line',polyline:{positions:Cesium.Cartesian3.fromDegreesArrayHeights([p.vendor.lon,p.vendor.lat,35,p.client.lon,p.client.lat,35]),width:5,material:Cesium.Color.CYAN.withAlpha(.9),clampToGround:false},properties:{title:`Route line · ${qq.total} Astran coins · 3% platform split`,type:'route'}});add({id:'route_price',position:Cesium.Cartesian3.fromDegrees(m.lon,m.lat,60),label:{text:`${qq.total} ASTRAN`,font:'bold 15px system-ui',fillColor:Cesium.Color.WHITE,outlineColor:Cesium.Color.DEEPSKYBLUE,outlineWidth:4,style:Cesium.LabelStyle.FILL_AND_OUTLINE},properties:{title:`Delivery quote ${qq.total} Astran coins. Platform ${qq.platform}`,type:'route'}});add({id:'social_circle',position:Cesium.Cartesian3.fromDegrees(lon+.009,lat-.009,40),ellipse:{semiMajorAxis:420,semiMinorAxis:420,material:Cesium.Color.CYAN.withAlpha(.10),outline:true,outlineColor:Cesium.Color.CYAN},label:{text:'Social Circle',font:'13px system-ui',fillColor:Cesium.Color.WHITE,outlineColor:Cesium.Color.DEEPSKYBLUE,outlineWidth:3,style:Cesium.LabelStyle.FILL_AND_OUTLINE},properties:{title:'Social Circle · open group chat and preferences',type:'circle'}})}
function show(t,type){state.context=type;ui.ribbonText.textContent=t;ui.ribbon.classList.add('show')}function hideRibbon(){ui.ribbon.classList.remove('show')}
const handler=new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);handler.setInputAction(m=>{const picked=viewer.scene.pick(m.position);if(Cesium.defined(picked)&&picked.id&&picked.id.properties){const p=picked.id.properties,title=p.title?p.title.getValue():'Astranov object',type=p.type?p.type.getValue():'object';if(p.lon&&p.lat)state.selected={lon:p.lon.getValue(),lat:p.lat.getValue(),title};else if(picked.id.position){const c=Cesium.Cartographic.fromCartesian(picked.id.position.getValue(Cesium.JulianDate.now()));state.selected={lon:Cesium.Math.toDegrees(c.longitude),lat:Cesium.Math.toDegrees(c.latitude),title}}show(title+' · context lives here',type);return}const cart=viewer.camera.pickEllipsoid(m.position,viewer.scene.globe.ellipsoid);if(cart){const c=Cesium.Cartographic.fromCartesian(cart);state.selected={lon:Cesium.Math.toDegrees(c.longitude),lat:Cesium.Math.toDegrees(c.latitude),title:'selected Earth point'};descent(state.selected)}},Cesium.ScreenSpaceEventType.LEFT_CLICK);
ui.openBtn.onclick=()=>descent(state.selected);ui.chatBtn.onclick=()=>ui.alt.textContent='Chat · '+(state.context||'object');ui.closeBtn.onclick=hideRibbon;ui.globeBtn.onclick=globe;ui.voiceBtn.onclick=async()=>{try{const stream=await navigator.mediaDevices.getUserMedia({audio:true});stream.getTracks().forEach(t=>t.stop());const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(SR){const r=new SR();r.lang='en-US';r.interimResults=true;r.onstart=()=>ui.alt.textContent='Listening live';r.onresult=e=>{const t=Array.from(e.results).map(x=>x[0].transcript).join(' ');if(t)ui.alt.textContent='Heard · '+t};r.onerror=()=>ui.alt.textContent='Voice unavailable';r.start()}else ui.alt.textContent='Mic granted · speech unavailable'}catch(e){ui.alt.textContent='Voice blocked · long press for manual'}};let hold=null;addEventListener('pointerdown',e=>{if(e.target.closest('#manual')||e.target.closest('#ribbon')||e.target.closest('.btn'))return;hold=setTimeout(()=>{ui.manual.classList.add('show');ui.manualText.focus()},720)});['pointerup','pointermove','pointercancel'].forEach(ev=>addEventListener(ev,()=>clearTimeout(hold)));ui.manualSend.onclick=()=>{const v=ui.manualText.value.trim();if(!v)return;ui.alt.textContent='Manual · '+v;ui.manualText.value='';ui.manual.classList.remove('show')};
})();
</script>
</body>
</html>
