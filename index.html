<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Astranov</title>
<link rel="preconnect" href="https://unpkg.com">
<link rel="preconnect" href="https://server.arcgisonline.com">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="anonymous">
<style>
:root{--blue:#62c8ff;--blue2:#9af1ff;--text:#eefaff;--border:rgba(139,226,255,.25);--glow:0 0 22px rgba(98,200,255,.38)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;margin:0;overflow:hidden;background:radial-gradient(circle at 50% 18%,#12396e 0%,#07152c 36%,#020611 100%);color:var(--text);font-family:Inter,system-ui,Segoe UI,Arial,sans-serif}
#app,#globeStage,#cityStage,#cityMap{position:absolute;inset:0}
#globeCanvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none}
#cityStage{opacity:0;pointer-events:none;transition:opacity .9s ease;background:#050b16}
#cityStage.active{opacity:1;pointer-events:auto}
#cityMap{filter:brightness(.42) saturate(.82) contrast(1.18)}
#cityTint{position:absolute;inset:0;pointer-events:none;background:linear-gradient(180deg,rgba(0,20,48,.28),rgba(0,0,8,.38));mix-blend-mode:multiply;z-index:410}
.leaflet-control-container{display:none}
#hudTop{position:absolute;left:10px;right:10px;top:10px;z-index:80;display:flex;justify-content:space-between;align-items:center;gap:8px;pointer-events:none}
.hudChip,.miniBtn{pointer-events:auto;border:1px solid var(--border);background:linear-gradient(180deg,rgba(7,24,55,.72),rgba(6,16,35,.43));box-shadow:var(--glow);backdrop-filter:blur(14px);color:var(--text);border-radius:999px;padding:10px 13px;font-size:12px;letter-spacing:.1em;text-transform:uppercase}
#brand{font-weight:900;letter-spacing:.22em}#altitude{font-size:11px;color:#dff7ff}
#hudBottom{position:absolute;left:50%;bottom:12px;transform:translateX(-50%);z-index:82;display:flex;align-items:center;gap:9px;max-width:min(95vw,760px);border:1px solid var(--border);border-radius:999px;padding:9px 12px;background:linear-gradient(180deg,rgba(7,24,55,.74),rgba(6,16,35,.50));box-shadow:var(--glow);backdrop-filter:blur(16px)}
#pulseOrb{width:17px;height:17px;border-radius:50%;background:radial-gradient(circle,#c8fbff 0%,#62d8ff 45%,rgba(98,216,255,.12) 76%);box-shadow:0 0 16px rgba(98,216,255,.9);flex:0 0 auto}
#hint{font-size:12px;line-height:1.22;color:#eaf9ff;min-width:0}#hudButtons{display:flex;gap:7px;flex:0 0 auto}.miniBtn{padding:8px 11px;letter-spacing:0;text-transform:none}
#ribbon{position:absolute;left:10px;right:10px;bottom:68px;z-index:90;display:none;align-items:center;justify-content:space-between;gap:8px;border:1px solid var(--border);border-radius:18px;padding:10px 12px;background:linear-gradient(180deg,rgba(7,24,55,.82),rgba(6,16,35,.56));box-shadow:var(--glow);backdrop-filter:blur(14px)}
#ribbon.show{display:flex}#ribbonText{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}#ribbonActions{display:flex;gap:7px}
#manual{position:absolute;left:10px;right:10px;bottom:12px;z-index:100;display:none;gap:8px;border:1px solid var(--border);border-radius:18px;padding:9px;background:rgba(7,22,49,.9);box-shadow:var(--glow);backdrop-filter:blur(15px)}
#manual.show{display:flex}#manual input{flex:1;border:none;outline:none;border-radius:12px;background:rgba(255,255,255,.07);color:var(--text);font-size:15px;padding:12px}#manual button{border:none;border-radius:12px;padding:0 16px;font-weight:800;color:#061227;background:linear-gradient(180deg,#95efff,#55a7ff)}
.geo-label{color:#eefdff;background:rgba(3,15,36,.75);border:1px solid rgba(153,235,255,.32);border-radius:999px;padding:6px 10px;font-size:12px;white-space:nowrap;box-shadow:0 0 18px rgba(98,200,255,.35)}
.leaflet-div-icon{background:transparent;border:0}
@media(max-width:560px){#hudBottom{max-width:96vw}#hint{font-size:11.5px}.hudChip{padding:9px 11px}}
</style>
</head>
<body>
<div id="app">
<div id="globeStage"><canvas id="globeCanvas"></canvas></div>
<div id="cityStage"><div id="cityMap"></div><div id="cityTint"></div></div>
<div id="hudTop"><div class="hudChip" id="brand">Astranov</div><div class="hudChip" id="altitude">Orbital Earth</div></div>
<div id="ribbon"><div id="ribbonText"></div><div id="ribbonActions"><button class="miniBtn" id="ribbonOpen">Open</button><button class="miniBtn" id="ribbonChat">Chat</button><button class="miniBtn" id="ribbonClose">Close</button></div></div>
<div id="hudBottom"><div id="pulseOrb"></div><div id="hint">Drag Earth like a trackball. Wheel or pinch changes altitude. Tap a glowing world signal or descend into Astranov City Map.</div><div id="hudButtons"><button class="miniBtn" id="voiceBtn">Voice</button><button class="miniBtn" id="backBtn">Globe</button></div></div>
<div id="manual"><input id="manualText" placeholder="Manual fallback only"/><button id="manualSend">Send</button></div>
</div>
<script src="https://unpkg.com/three@0.159.0/build/three.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin="anonymous"></script>
<script>
(()=>{const state={zoom:.46,targetZoom:.46,dragging:false,moved:false,lastX:0,lastY:0,inertiaX:0,inertiaY:0,selected:{lat:36.441,lng:28.222,title:"Rhodes local radius"},cityReady:false,cityActive:false,context:null};
const layers=[["solar","Solar Layer",10.2,"Solar layer. Pinch or wheel in toward Earth."],["orbital","Orbital Earth",5.3,"Orbital Earth. Swipe the real globe. Tap signals or zoom down."],["global","Global Feed",4.15,"Global feeds, news, friends, market heat. Signals ride on Earth."],["regional","Regional Layer",3.18,"Regional layer. Larger circles, city signals, demand zones."],["local","Local Descent",2.45,"Local descent. Keep zooming to enter Astranov City Map."],["city","Astranov City Map",1.95,"Astranov City Map. Dark real map, glowing blue operating layer."]];
const $=id=>document.getElementById(id), els={canvas:$("globeCanvas"),cityStage:$("cityStage"),altitude:$("altitude"),hint:$("hint"),ribbon:$("ribbon"),ribbonText:$("ribbonText"),ribbonOpen:$("ribbonOpen"),ribbonChat:$("ribbonChat"),ribbonClose:$("ribbonClose"),voiceBtn:$("voiceBtn"),backBtn:$("backBtn"),manual:$("manual"),manualText:$("manualText"),manualSend:$("manualSend")};
const renderer=new THREE.WebGLRenderer({canvas:els.canvas,antialias:true,alpha:true});renderer.setPixelRatio(Math.min(devicePixelRatio||1,2));const scene=new THREE.Scene(),camera=new THREE.PerspectiveCamera(42,innerWidth/innerHeight,.1,1000);camera.position.z=5.3;scene.add(new THREE.AmbientLight(0x8ec8ff,1.05));const sun=new THREE.DirectionalLight(0xffffff,1.55);sun.position.set(6,2,5);scene.add(sun);
const starGeo=new THREE.BufferGeometry(),starCount=3300,starPos=new Float32Array(starCount*3);for(let i=0;i<starCount;i++){const r=60+Math.random()*140,t=Math.random()*Math.PI*2,p=Math.acos(2*Math.random()-1);starPos[i*3]=r*Math.sin(p)*Math.cos(t);starPos[i*3+1]=r*Math.cos(p);starPos[i*3+2]=r*Math.sin(p)*Math.sin(t)}starGeo.setAttribute("position",new THREE.BufferAttribute(starPos,3));scene.add(new THREE.Points(starGeo,new THREE.PointsMaterial({size:.34,color:0xa9e8ff})));
const solarGroup=new THREE.Group();scene.add(solarGroup);solarGroup.add(new THREE.Mesh(new THREE.SphereGeometry(.38,32,32),new THREE.MeshBasicMaterial({color:0xffd26b})));const planets=[{r:1.1,s:.035,c:0x8bc5ff,a:0},{r:1.7,s:.055,c:0x77d7ff,a:1.5},{r:2.35,s:.06,c:0x54b8ff,a:3.1},{r:3.0,s:.05,c:0xb4edff,a:4.2}].map(p=>{const m=new THREE.Mesh(new THREE.SphereGeometry(p.s,18,18),new THREE.MeshBasicMaterial({color:p.c}));m.userData=p;solarGroup.add(m);return m});
const globeGroup=new THREE.Group();scene.add(globeGroup);const loader=new THREE.TextureLoader(),earthTex=loader.load("https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg");earthTex.colorSpace=THREE.SRGBColorSpace;const earth=new THREE.Mesh(new THREE.SphereGeometry(1.5,96,96),new THREE.MeshPhongMaterial({map:earthTex,shininess:8,specular:0x224466}));globeGroup.add(earth);const clouds=new THREE.Mesh(new THREE.SphereGeometry(1.518,64,64),new THREE.MeshPhongMaterial({map:loader.load("https://threejs.org/examples/textures/planets/earth_clouds_1024.png"),transparent:true,opacity:.22,depthWrite:false}));globeGroup.add(clouds);globeGroup.add(new THREE.Mesh(new THREE.SphereGeometry(1.62,64,64),new THREE.MeshBasicMaterial({color:0x67c8ff,transparent:true,opacity:.1,side:THREE.BackSide})));
const signalGroup=new THREE.Group();globeGroup.add(signalGroup);const signals=[["news","World news · live update",40.7128,-74.006,0x9fe8ff,.2,.8],["friend","Friend feed · nearby story",36.441,28.222,0xc9fbff,.25,1],["market","Market heat · vendors active",51.5072,-0.1276,0x71dfff,.3,.95],["circle","Social Circle · crew online",35.6762,139.6503,0x7fc8ff,.35,.9],["news","Global brief · trending now",48.8566,2.3522,0xa7ebff,.2,.75],["delivery","Delivery demand · rising",25.2048,55.2708,0x58c7ff,.42,1]];
function latLngToVec(lat,lng,r){const phi=(90-lat)*Math.PI/180,theta=(lng+180)*Math.PI/180;return new THREE.Vector3(-r*Math.sin(phi)*Math.cos(theta),r*Math.cos(phi),r*Math.sin(phi)*Math.sin(theta))}
signals.forEach(s=>{const o={kind:s[0],title:s[1],lat:s[2],lng:s[3],color:s[4],min:s[5],max:s[6]};const m=new THREE.Mesh(new THREE.SphereGeometry(.035,16,16),new THREE.MeshBasicMaterial({color:o.color}));m.position.copy(latLngToVec(o.lat,o.lng,1.64));m.userData=o;signalGroup.add(m);const line=new THREE.Line(new THREE.BufferGeometry().setFromPoints([latLngToVec(o.lat,o.lng,1.51),latLngToVec(o.lat,o.lng,1.64)]),new THREE.LineBasicMaterial({color:0x8ee8ff,transparent:true,opacity:.62}));line.userData={stem:true,signal:o};signalGroup.add(line)});
function layer(){return state.targetZoom<.14?layers[0]:state.targetZoom<.33?layers[1]:state.targetZoom<.52?layers[2]:state.targetZoom<.70?layers[3]:state.targetZoom<.88?layers[4]:layers[5]}function clamp(v,a,b){return Math.max(a,Math.min(b,v))}function resize(){renderer.setSize(innerWidth,innerHeight,false);camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();if(cityMap)cityMap.invalidateSize()}addEventListener("resize",resize);resize();
function updateUI(){const l=layer();els.altitude.textContent=l[1];els.hint.textContent=l[3];if(l[0]==="city"&&!state.cityActive)enterCity();if(l[0]!=="city"&&state.cityActive)exitCity();signalGroup.children.forEach(o=>{const s=o.userData.signal||o.userData;if(!s||!s.kind)return;o.visible=state.targetZoom>=s.min&&state.targetZoom<=s.max})}
function anim(){requestAnimationFrame(anim);state.zoom+=(state.targetZoom-state.zoom)*.075;camera.position.z+=(layer()[2]-camera.position.z)*.07;if(!state.dragging&&!state.cityActive){globeGroup.rotation.y+=.0011+state.inertiaX;globeGroup.rotation.x+=state.inertiaY;state.inertiaX*=.95;state.inertiaY*=.95}clouds.rotation.y+=.0017;solarGroup.visible=state.targetZoom<.2;planets.forEach((p,i)=>{const u=p.userData;u.a+=.002/(i+1);p.position.set(Math.cos(u.a)*u.r,0,Math.sin(u.a)*u.r)});globeGroup.visible=!state.cityActive||state.zoom<.96;globeGroup.scale.setScalar(state.targetZoom<.18?.42:1);signalGroup.children.forEach((o,i)=>{if(o.isMesh)o.scale.setScalar(1+Math.sin(Date.now()*.004+i)*.12)});renderer.render(scene,camera)}anim();
const pointer=new THREE.Vector2(),raycaster=new THREE.Raycaster();function setPointer(e){const r=els.canvas.getBoundingClientRect();pointer.x=((e.clientX-r.left)/r.width)*2-1;pointer.y=-((e.clientY-r.top)/r.height)*2+1}
els.canvas.addEventListener("pointerdown",e=>{state.dragging=true;state.moved=false;state.lastX=e.clientX;state.lastY=e.clientY;try{els.canvas.setPointerCapture(e.pointerId)}catch{}});els.canvas.addEventListener("pointermove",e=>{if(!state.dragging)return;const dx=e.clientX-state.lastX,dy=e.clientY-state.lastY;if(Math.abs(dx)+Math.abs(dy)>3)state.moved=true;globeGroup.rotation.y+=dx*.0068;globeGroup.rotation.x=clamp(globeGroup.rotation.x+dy*.0034,-.82,.82);state.inertiaX=dx*.000065;state.inertiaY=dy*.000034;state.lastX=e.clientX;state.lastY=e.clientY});els.canvas.addEventListener("pointerup",e=>{state.dragging=false;if(state.moved)return;setPointer(e);raycaster.setFromCamera(pointer,camera);const hits=raycaster.intersectObjects(signalGroup.children.filter(o=>o.isMesh&&o.visible),true);if(hits.length){const s=hits[0].object.userData;state.selected={lat:s.lat,lng:s.lng,title:s.title};showRibbon(`${s.title} · tap Open to descend`,s.kind);return}const gh=raycaster.intersectObject(earth,true);if(gh.length){state.selected={lat:36.441,lng:28.222,title:"selected Earth point"};stagedDescent()}});
els.canvas.addEventListener("wheel",e=>{e.preventDefault();state.targetZoom=clamp(state.targetZoom+(e.deltaY>0?.08:-.08),0,1);updateUI()},{passive:false});
let pinch=null;els.canvas.addEventListener("touchstart",e=>{if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;pinch=Math.hypot(dx,dy)}},{passive:true});els.canvas.addEventListener("touchmove",e=>{if(e.touches.length===2&&pinch){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY,d=Math.hypot(dx,dy);state.targetZoom=clamp(state.targetZoom+(d-pinch)*.0018,0,1);pinch=d;updateUI()}},{passive:true});
function stagedDescent(){[.55,.72,.86,1].forEach((z,i)=>setTimeout(()=>{state.targetZoom=z;updateUI()},i*360))}
let cityMap,cityLayer;function initCity(){if(state.cityReady)return;cityMap=L.map("cityMap",{zoomControl:false,attributionControl:false,preferCanvas:true}).setView([state.selected.lat,state.selected.lng],15);L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",{maxZoom:19,crossOrigin:true}).addTo(cityMap);cityLayer=L.layerGroup().addTo(cityMap);cityMap.on("click",hideRibbon);state.cityReady=true}
function enterCity(){initCity();state.cityActive=true;els.cityStage.classList.add("active");setTimeout(()=>{cityMap.invalidateSize();cityMap.setView([state.selected.lat,state.selected.lng],15,{animate:true,duration:.7});renderCity()},80)}
function exitCity(){state.cityActive=false;els.cityStage.classList.remove("active");hideRibbon()}
function divLabel(t){return L.divIcon({html:`<div class="geo-label">${t}</div>`,className:"",iconSize:[12,12]})}function centroid(a){let x=0,y=0;a.forEach(p=>{x+=p[0];y+=p[1]});return[x/a.length,y/a.length]}function quote(km,o){let t=Math.ceil(km);if(o.night)t++;if(o.badWeather)t++;if(o.load>13){t++;t+=Math.floor((Math.min(o.load,33)-13)/13)}return t}
function renderCity(){cityLayer.clearLayers();const c=state.selected,v=[c.lat+.0022,c.lng+.003],d=[c.lat-.0025,c.lng-.0035],cl=[c.lat+.0047,c.lng-.0016],news=[c.lat-.0048,c.lng+.0045],friend=[c.lat+.0055,c.lng+.0048],style={color:"#94edff",weight:2,fillColor:"#176dcc",fillOpacity:.84};[[v,"vendor","Vendor tile · menu and Google Sheet connection-ready"],[d,"driver","Driver tile · available · 26 kg/L capacity"],[cl,"client","Client delivery point · preferences live on tile"],[news,"news","News signal · place-based feed"],[friend,"friend","Friend feed · nearby story"]].forEach(x=>{L.circleMarker(x[0],{...style,radius:8}).addTo(cityLayer).on("click",e=>{L.DomEvent.stop(e);showRibbon(x[2],x[1])});L.marker(x[0],{icon:divLabel(x[1])}).addTo(cityLayer)});const q=quote(3.6,{night:true,badWeather:false,load:18});L.polyline([v,cl],{color:"#92f1ff",weight:4,opacity:.95}).addTo(cityLayer).on("click",e=>{L.DomEvent.stop(e);showRibbon(`Route line · ${q} Astran coins · 3% platform split`,"route")});L.marker([(v[0]+cl[0])/2,(v[1]+cl[1])/2],{icon:divLabel(`${q} ASTRAN`)}).addTo(cityLayer);const tri=[[v[0]+.001,v[1]+.006],[d[0]-.001,d[1]+.006],[cl[0]+.001,cl[1]+.0025]];L.polygon(tri,{color:"#8be8ff",weight:2,fillColor:"#2360b9",fillOpacity:.14}).addTo(cityLayer).on("click",e=>{L.DomEvent.stop(e);showRibbon("Triangle task · client vendor driver chat in shape","triangle")});L.marker(centroid(tri),{icon:divLabel("triangle task")}).addTo(cityLayer);L.circle([c.lat-.0058,c.lng+.0052],{radius:360,color:"#99f4ff",weight:2,fillColor:"#2e68df",fillOpacity:.09}).addTo(cityLayer).on("click",e=>{L.DomEvent.stop(e);showRibbon("Social Circle · open group chat and preferences","circle")});L.marker([c.lat-.0058,c.lng+.0052],{icon:divLabel("social circle")}).addTo(cityLayer)}
function showRibbon(t,k){state.context=k;els.ribbonText.textContent=t;document.getElementById("ribbon").classList.add("show")}function hideRibbon(){document.getElementById("ribbon").classList.remove("show")}els.ribbonClose.onclick=hideRibbon;els.ribbonOpen.onclick=()=>{if(!state.cityActive)stagedDescent();else els.altitude.textContent=`Open · ${state.context||"object"}`};els.ribbonChat.onclick=()=>{els.altitude.textContent=`Chat · ${state.context||"object"}`};els.backBtn.onclick=()=>{state.targetZoom=.46;updateUI()};
els.voiceBtn.onclick=async()=>{try{const stream=await navigator.mediaDevices.getUserMedia({audio:true});stream.getTracks().forEach(t=>t.stop());const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(SR){const r=new SR();r.lang="en-US";r.interimResults=true;r.onstart=()=>els.altitude.textContent="Listening live";r.onresult=e=>{const t=Array.from(e.results).map(x=>x[0].transcript).join(" ");if(t)els.altitude.textContent=`Heard · ${t}`};r.onerror=()=>els.altitude.textContent="Voice unavailable";r.start()}else els.altitude.textContent="Mic granted · speech unavailable"}catch(e){els.altitude.textContent="Voice blocked · long press for manual"}};
let hold=null;addEventListener("pointerdown",e=>{if(e.target.closest("#manual")||e.target.closest("#ribbon"))return;hold=setTimeout(()=>{els.manual.classList.add("show");els.manualText.focus()},700)});["pointerup","pointermove","pointercancel"].forEach(ev=>addEventListener(ev,()=>clearTimeout(hold)));els.manualSend.onclick=()=>{const v=els.manualText.value.trim();if(!v)return;els.altitude.textContent=`Manual · ${v}`;els.manualText.value="";els.manual.classList.remove("show")};updateUI();
})();
</script>
</body>
</html>
