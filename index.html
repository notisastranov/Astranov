<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ASTRANOV</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.344.0/dist/umd/lucide.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root {
            --astr-blue: #00f2ff;
            --astr-blue-glow: rgba(0, 242, 255, 0.5);
            --astr-space: #00040a;
            --astr-glass: rgba(0, 10, 20, 0.85);
            --astr-border: rgba(0, 242, 255, 0.15);
            --font-main: 'Orbitron', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: var(--astr-space);
            color: #fff;
            overflow: hidden;
            font-family: var(--font-main);
            position: fixed;
        }

        #astr-kernel {
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* NAVIGATION LAYERS */
        #globe-layer, #map-layer {
            position: absolute;
            inset: 0;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #globe-layer { z-index: 1; }
        #map-layer { z-index: 2; opacity: 0; pointer-events: none; background: #000; }

        #map-layer.active { opacity: 1; pointer-events: auto; }

        /* MULTIFUNCTION COMPASS INSTRUMENT */
        #astr-compass {
            position: absolute;
            width: 300px;
            height: 300px;
            left: 50%;
            top: 40%;
            transform: translate(-50%, -50%);
            z-index: 100;
            pointer-events: auto;
            touch-action: none;
            cursor: grab;
            user-select: none;
        }
        #astr-compass.minimized { width: 140px; height: 140px; }

        .compass-outer-bezel {
            position: absolute;
            inset: -10px;
            border-radius: 50%;
            border: 1px dashed var(--astr-border);
            animation: rotate-slow 120s linear infinite;
        }

        .compass-ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 1px solid var(--astr-border);
            background: radial-gradient(circle, transparent 50%, rgba(0, 242, 255, 0.03) 100%);
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .cardinal {
            position: absolute;
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--astr-blue);
            opacity: 0.4;
            font-family: var(--font-mono);
        }
        .n { top: -25px; left: 50%; transform: translateX(-50%); }
        .s { bottom: -25px; left: 50%; transform: translateX(-50%); }
        .e { right: -35px; top: 50%; transform: translateY(-50%); }
        .w { left: -35px; top: 50%; transform: translateY(-50%); }

        .compass-celestial {
            position: absolute;
            inset: 0;
            transition: transform 1s linear;
        }
        .sun-pos, .moon-pos {
            position: absolute;
            width: 20px;
            height: 20px;
            left: 50%;
            transform: translateX(-50%);
        }
        .sun-pos { top: -65px; color: #ffcc00; filter: drop-shadow(0 0 10px #ffcc00); }
        .moon-pos { bottom: -65px; color: #88aaff; filter: drop-shadow(0 0 8px #88aaff); }

        .compass-core {
            position: absolute;
            inset: 65px;
            border-radius: 50%;
            background: var(--astr-glass);
            border: 1px solid var(--astr-blue);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(15px);
            box-shadow: inset 0 0 20px var(--astr-blue-glow), 0 0 30px rgba(0, 242, 255, 0.2);
            transition: inset 0.3s ease;
        }
        #astr-compass.minimized .compass-core { inset: 30px; }

        .compass-brand { font-size: 10px; font-weight: bold; letter-spacing: 3px; margin-bottom: 10px; }
        .compass-controls { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; max-width: 120px; }
        .comp-btn {
            background: none;
            border: none;
            color: var(--astr-blue);
            padding: 5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }
        .comp-btn:active { transform: scale(0.9); }
        .comp-btn svg { width: 18px; height: 18px; filter: drop-shadow(0 0 5px var(--astr-blue)); }

        .compass-telemetry {
            position: absolute;
            bottom: -90px;
            left: 50%;
            transform: translateX(-50%);
            width: 180px;
            text-align: center;
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--astr-blue);
            background: rgba(0,0,0,0.4);
            padding: 6px;
            border-radius: 5px;
            border: 1px solid var(--astr-border);
        }

        /* BOTTOM COMMAND BAR */
        #astr-bottom-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px 15px calc(25px + var(--safe-bottom));
            z-index: 200;
            pointer-events: none;
        }

        .bar-shell {
            pointer-events: auto;
            max-width: 600px;
            margin: 0 auto;
            background: var(--astr-glass);
            border: 1px solid var(--astr-border);
            border-radius: 20px;
            backdrop-filter: blur(25px);
            box-shadow: 0 -15px 50px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            max-height: 75px;
        }
        .bar-shell.active { max-height: 85vh; border-color: var(--astr-blue); }

        .tab-strip {
            display: flex;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            height: 0;
            opacity: 0;
            transition: all 0.3s;
        }
        .bar-shell.active .tab-strip { height: 45px; opacity: 1; }

        .tab-item {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            letter-spacing: 1.5px;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            cursor: pointer;
        }
        .tab-item.active { color: var(--astr-blue); background: rgba(0, 242, 255, 0.05); font-weight: bold; }

        .pill-content {
            flex: 1;
            overflow-y: auto;
            padding: 0;
            display: none;
        }
        .bar-shell.active .pill-content { display: block; }

        .command-input-layer {
            height: 75px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 15px;
        }
        #main-cmd-input {
            flex: 1;
            background: none;
            border: none;
            color: #fff;
            font-family: var(--font-main);
            font-size: 15px;
            letter-spacing: 0.5px;
        }
        #main-cmd-input::placeholder { color: rgba(255,255,255,0.2); font-size: 13px; }

        .cmd-icon-btn {
            background: rgba(0, 242, 255, 0.1);
            border: 1px solid var(--astr-border);
            color: var(--astr-blue);
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* PILLAR CONTENT UI */
        .module-body { padding: 25px; }
        .data-panel {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
        }
        .panel-label { font-size: 9px; color: var(--astr-blue); opacity: 0.5; margin-bottom: 10px; letter-spacing: 2px; text-transform: uppercase; }

        .marketplace-grid { display: grid; gap: 15px; grid-template-columns: 1fr 1fr; }
        .role-tile {
            padding: 15px;
            border: 1px solid var(--astr-border);
            border-radius: 12px;
            text-align: center;
            background: rgba(0, 242, 255, 0.03);
            cursor: pointer;
        }
        .role-tile.active { background: var(--astr-blue); color: #000; border-color: #fff; }

        /* PRICING TABLE SKELETON */
        .pricing-list { font-family: var(--font-mono); font-size: 11px; line-height: 1.8; }
        .price-row { display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.03); padding: 5px 0; }
        .price-val { color: var(--astr-blue); font-weight: bold; }

        /* SOCIAL MEDIA SKELETON */
        .social-feed { display: flex; flex-direction: column; gap: 15px; }
        .feed-video { aspect-ratio: 16/9; background: #111; border-radius: 10px; overflow: hidden; position: relative; }
        .video-meta { position: absolute; bottom: 10px; left: 10px; font-size: 10px; opacity: 0.7; }

        @keyframes rotate-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* MAP CUSTOMS */
        .leaflet-tile { filter: brightness(0.4) contrast(1.1) grayscale(1) sepia(1) hue-rotate(150deg) saturate(3) !important; }
        .leaflet-container { background: #000 !important; }

        .astr-marker {
            width: 30px;
            height: 30px;
            background: var(--astr-blue);
            border-radius: 50%;
            border: 2px solid #fff;
            box-shadow: 0 0 15px var(--astr-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
        }

        /* RESPONSIVE */
        @media (max-width: 400px) {
            #astr-compass { transform: translate(-50%, -50%) scale(0.85); top: 35%; }
        }

    </style>
</head>
<body>

    <div id="astr-kernel">
        <div id="globe-layer"></div>
        <div id="map-layer"></div>

        <div class="hud-overlay">
            
            <div id="astr-compass">
                <div class="compass-outer-bezel"></div>
                <div class="compass-ring"></div>
                <div class="cardinal n">NORTH</div>
                <div class="cardinal s">SOUTH</div>
                <div class="cardinal e">EAST</div>
                <div class="cardinal w">WEST</div>

                <div class="compass-celestial" id="celestial-bezel">
                    <div class="sun-pos"><i data-lucide="sun"></i></div>
                    <div class="moon-pos"><i data-lucide="moon"></i></div>
                </div>

                <div class="compass-core" id="compass-drag-target">
                    <div class="compass-brand">ASTRANOV</div>
                    <div class="compass-controls">
                        <button class="comp-btn" id="ctrl-zoom-in" title="Zoom In"><i data-lucide="plus"></i></button>
                        <button class="comp-btn" id="ctrl-locate" title="Locate"><i data-lucide="crosshair"></i></button>
                        <button class="comp-btn" id="ctrl-zoom-out" title="Zoom Out"><i data-lucide="minus"></i></button>
                        <button class="comp-btn" id="ctrl-vector" title="Vector Search"><i data-lucide="brain"></i></button>
                        <button class="comp-btn" id="ctrl-resize" title="Resize"><i data-lucide="maximize"></i></button>
                    </div>
                </div>

                <div class="compass-telemetry">
                    <div id="tele-utc">00:00:00 UTC</div>
                    <div id="tele-loc" style="opacity: 0.5;">00:00:00 LOC</div>
                </div>
            </div>

            <div id="astr-bottom-bar">
                <div class="bar-shell" id="cmd-bar">
                    <div class="tab-strip">
                        <div class="tab-item active" data-mod="ai">Research</div>
                        <div class="tab-item" data-mod="market">Market</div>
                        <div class="tab-item" data-mod="social">Social</div>
                    </div>

                    <div class="pill-content" id="mod-viewport">
                        <!-- Dynamic Module Injection Here -->
                    </div>

                    <div class="command-input-layer">
                        <i data-lucide="command" style="width: 20px; color: var(--astr-blue); opacity: 0.5;"></i>
                        <input type="text" id="main-cmd-input" placeholder="Initiate research or command...">
                        <div class="bar-actions">
                            <button class="cmd-icon-btn"><i data-lucide="mic"></i></button>
                            <button class="cmd-icon-btn" id="btn-submit-cmd"><i data-lucide="chevron-up"></i></button>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        /**
         * ASTRANOV INTERFACE CORE (VERIFIED VERSION)
         * Governed by Astranov Law
         */
        const Astranov = {
            state: {
                appMode: 'globe', // 'globe' | 'map'
                zoom: 1,
                activeModule: 'ai',
                pos: { lat: 20, lng: 0 },
                userRole: 'client',
                isDrifting: true,
                registry: {}
            },

            // --- KERNEL BOOT ---
            init() {
                console.log("ASTRANOV: Booting Subsystems...");
                lucide.createIcons();
                
                this.initGlobe();
                this.initCompass();
                this.initBottomBar();
                this.initPricingAlgorithm();
                
                // Dormant Activation on Mode Change
                window.addEventListener('astr_mode_change', (e) => this.handleModeTransition(e.detail));
            },

            // --- GLOBE SUBSYSTEM (THREE.JS) ---
            initGlobe() {
                const container = document.getElementById('globe-layer');
                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
                const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                
                renderer.setSize(window.innerWidth, window.innerHeight);
                container.appendChild(renderer.domElement);

                // Planet Construction
                const geo = new THREE.SphereGeometry(100, 64, 64);
                const mat = new THREE.MeshPhongMaterial({
                    color: 0x011627,
                    emissive: 0x000205,
                    specular: 0x333333,
                    shininess: 5,
                });
                const earth = new THREE.Mesh(geo, mat);
                scene.add(earth);

                // Atmosphere Glow
                const ambient = new THREE.AmbientLight(0xffffff, 0.2);
                scene.add(ambient);
                const sun = new THREE.DirectionalLight(0xffffff, 1.2);
                sun.position.set(5, 3, 5);
                scene.add(sun);

                // Starfield
                const starGeo = new THREE.BufferGeometry();
                const starPoints = [];
                for(let i=0; i<3000; i++) {
                    starPoints.push((Math.random()-0.5)*2000, (Math.random()-0.5)*2000, (Math.random()-0.5)*2000);
                }
                starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPoints, 3));
                const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.7 });
                scene.add(new THREE.Points(starGeo, starMat));

                camera.position.z = 250;

                const animate = () => {
                    requestAnimationFrame(animate);
                    if(this.state.isDrifting) {
                        earth.rotation.y += 0.0004;
                        earth.rotation.x += 0.0001;
                    }
                    renderer.render(scene, camera);
                };
                animate();

                window.addEventListener('resize', () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                });

                this.state.registry.earth = earth;
                this.state.registry.camera = camera;
            },

            // --- MAP SUBSYSTEM (LEAFLET) ---
            initMap() {
                if(this.state.registry.map) return;

                const mapLayer = document.getElementById('map-layer');
                const map = L.map(mapLayer, {
                    zoomControl: false,
                    attributionControl: false
                }).setView([this.state.pos.lat, this.state.pos.lng], 13);

                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                    maxZoom: 20
                }).addTo(map);

                this.state.registry.map = map;
                this.syncMapActivity();
            },

            syncMapActivity() {
                // Truthful Implementation: Mock signals
                const signals = [
                    { lat: 20.01, lng: 0.01, type: 'vendor', label: 'HUB_0' },
                    { lat: 20.02, lng: -0.01, type: 'driver', label: 'V_1' }
                ];

                signals.forEach(s => {
                    const icon = L.divIcon({ className: 'astr-marker', html: `<i data-lucide="package" style="width:14px"></i>` });
                    L.marker([s.lat, s.lng], { icon }).addTo(this.state.registry.map);
                });
                lucide.createIcons();
            },

            // --- COMPASS & HUD CONTROLS ---
            initCompass() {
                const compass = document.getElementById('astr-compass');
                const target = document.getElementById('compass-drag-target');
                const bezel = document.getElementById('celestial-bezel');

                // 1. Time & Celestial Synchronization
                const updateHUD = () => {
                    const now = new Date();
                    document.getElementById('tele-utc').textContent = now.toISOString().split('T')[1].split('.')[0] + " UTC";
                    document.getElementById('tele-loc').textContent = now.toLocaleTimeString() + " LOC";
                    
                    const seconds = now.getUTCHours() * 3600 + now.getUTCMinutes() * 60 + now.getUTCSeconds();
                    const rotation = (seconds / 86400) * 360;
                    bezel.style.transform = `rotate(${rotation}deg)`;
                };
                setInterval(updateHUD, 1000);
                updateHUD();

                // 2. Draggable/Resizable Implementation
                let isDragging = false;
                let startX, startY;

                const onStart = (e) => {
                    isDragging = true;
                    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                    startX = clientX - compass.offsetLeft;
                    startY = clientY - compass.offsetTop;
                };

                const onMove = (e) => {
                    if(!isDragging) return;
                    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                    compass.style.left = (clientX - startX) + 'px';
                    compass.style.top = (clientY - startY) + 'px';
                    compass.style.transform = `translate(0, 0)`; // Clear translate on move
                };

                const onEnd = () => isDragging = false;

                target.addEventListener('mousedown', onStart);
                document.addEventListener('mousemove', onMove);
                document.addEventListener('mouseup', onEnd);
                target.addEventListener('touchstart', onStart, { passive: false });
                document.addEventListener('touchmove', onMove, { passive: false });
                document.addEventListener('touchend', onEnd);

                // 3. Zoom Logic (Universal Controller)
                document.getElementById('ctrl-zoom-in').onclick = () => this.handleZoom(1);
                document.getElementById('ctrl-zoom-out').onclick = () => this.handleZoom(-1);
                document.getElementById('ctrl-resize').onclick = () => compass.classList.toggle('minimized');
                document.getElementById('ctrl-locate').onclick = () => this.requestLocation();
            },

            // --- NAVIGATION ENGINE ---
            handleZoom(delta) {
                const cam = this.state.registry.camera;
                
                if(this.state.appMode === 'globe') {
                    cam.position.z -= delta * 30;
                    if(cam.position.z < 130) {
                        this.handleModeTransition('map');
                    }
                } else if(this.state.appMode === 'map') {
                    const zoom = this.state.registry.map.getZoom();
                    this.state.registry.map.setZoom(zoom + delta);
                    if(zoom + delta < 10) {
                        this.handleModeTransition('globe');
                    }
                }
            },

            handleModeTransition(mode) {
                if(mode === this.state.appMode) return;
                
                const mapLayer = document.getElementById('map-layer');
                if(mode === 'map') {
                    this.state.appMode = 'map';
                    this.state.isDrifting = false;
                    this.initMap();
                    mapLayer.classList.add('active');
                } else {
                    this.state.appMode = 'globe';
                    this.state.isDrifting = true;
                    this.state.registry.camera.position.z = 180;
                    mapLayer.classList.remove('active');
                }
            },

            requestLocation() {
                if(navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(pos => {
                        this.state.pos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                        if(this.state.appMode === 'map') {
                            this.state.registry.map.setView([this.state.pos.lat, this.state.pos.lng], 15);
                        } else {
                            this.handleModeTransition('map');
                        }
                    });
                }
            },

            // --- BOTTOM COMMAND BAR & PILLARS ---
            initBottomBar() {
                const shell = document.getElementById('cmd-bar');
                const input = document.getElementById('main-cmd-input');
                const tabs = document.querySelectorAll('.tab-item');

                input.onfocus = () => {
                    shell.classList.add('active');
                    this.renderModule(this.state.activeModule);
                };

                tabs.forEach(tab => {
                    tab.onclick = () => {
                        tabs.forEach(t => t.classList.remove('active'));
                        tab.classList.add('active');
                        this.state.activeModule = tab.dataset.mod;
                        this.renderModule(this.state.activeModule);
                    };
                });
            },

            renderModule(id) {
                const view = document.getElementById('mod-viewport');
                view.innerHTML = `<div class="module-body">${this.getModuleContent(id)}</div>`;
                lucide.createIcons();
            },

            getModuleContent(id) {
                if(id === 'ai') return `
                    <div class="panel-label">Research Kernel [AI]</div>
                    <div class="data-panel">
                        <p style="font-size: 13px; font-weight: bold;">System ready for internet extraction.</p>
                        <p style="font-size: 11px; opacity:0.6;">Analyze markets, code patterns, and logistics data in real-time.</p>
                    </div>
                `;
                if(id === 'market') return `
                    <div class="panel-label">Marketplace Dynamics</div>
                    <div class="marketplace-grid">
                        <div class="role-tile">Client</div>
                        <div class="role-tile">Vendor</div>
                        <div class="role-tile active">Driver</div>
                    </div>
                    <div class="panel-label" style="margin-top:20px;">Pricing Algorithm [Truthful]</div>
                    <div class="data-panel pricing-list">
                        <div class="price-row"><span>Base Rate</span><span class="price-val">1.00 ASTR/km</span></div>
                        <div class="price-row"><span>Night Surcharge</span><span class="price-val">+1.00 ASTR</span></div>
                        <div class="price-row"><span>Weight (>13kg)</span><span class="price-val">+1.00 ASTR</span></div>
                        <div class="price-row" style="border:none; margin-top:5px;"><span>Platform Fee</span><span class="price-val">3%</span></div>
                    </div>
                `;
                if(id === 'social') return `
                    <div class="panel-label">Global Social Map</div>
                    <div class="social-feed">
                        <div class="feed-video"><img src="https://picsum.photos/seed/truck/400/225" style="width:100%;"><div class="video-meta">@TRANSPORT_LOGS - City Flow [YT]</div></div>
                        <div class="feed-video"><img src="https://picsum.photos/seed/data/400/225" style="width:100%;"><div class="video-meta">@DATA_KERNEL - Algorithm Insight [INSTA]</div></div>
                    </div>
                `;
            },

            // --- ALGORITHM IMPLEMENTATION (PRICING & BALANCING) ---
            initPricingAlgorithm() {
                /**
                 * TRUTHFUL IMPLEMENTATION OF ASTRANOV PRICING
                 * Logic: distance * base + (night?1) + (weather?1) + floor(weight/13)
                 */
                this.calculateDelivery = (dist, weight, isNight, hasBadWeather) => {
                    let total = dist * 1; // 1 Astran per km
                    if(isNight) total += 1;
                    if(hasBadWeather) total += 1;
                    if(weight > 13) {
                        const extraSteps = Math.floor((weight - 0.01) / 13);
                        total += extraSteps;
                    }
                    return total.toFixed(2);
                };

                this.getMarketBalance = (driverCount, orderCount) => {
                    const ratio = orderCount / driverCount;
                    if(ratio > 2) return "Raised Earnings (Scarcity)";
                    if(ratio < 0.5) return "Reduced Pressure (Surplus)";
                    return "Stable Equilibrium";
                };
            }
        };

        // --- KERNEL LAUNCH ---
        window.addEventListener('load', () => Astranov.init());

    </script>
