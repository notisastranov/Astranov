<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Astranov Internet Operating System</title>
<link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
:root{
  --bg:#030913;
  --bg2:#07101d;
  --panel:rgba(6,16,30,.52);
  --panel-2:rgba(8,20,38,.72);
  --line:rgba(0,200,255,.24);
  --line-strong:rgba(0,200,255,.52);
  --blue:#00c8ff;
  --blue-soft:#7be4ff;
  --text:#d9f5ff;
  --dim:#8eb6c9;
  --good:#16e07a;
  --warn:#ffd44d;
  --bad:#ff5668;
  --shadow:0 18px 36px rgba(0,0,0,.32), 0 0 24px rgba(0,200,255,.08);
  --r:18px;
  --top-h:46px;
  --dock-h:86px;
  --safe-b:max(env(safe-area-inset-bottom), 10px);
  --safe-l:max(env(safe-area-inset-left), 10px);
  --safe-r:max(env(safe-area-inset-right), 10px);
  --hud-size:86px;
  --helper-w:78px;
  --composer-h:58px;
  --font:Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:radial-gradient(circle at top, #0d1830 0%, var(--bg2) 36%, var(--bg) 100%);color:var(--text);font-family:var(--font)}
button,input,select,textarea{font:inherit}
.hidden{display:none !important}
.glass{
  background:linear-gradient(180deg, rgba(9,22,42,.62), rgba(5,15,30,.42));
  border:1px solid var(--line);
  box-shadow:var(--shadow);
  backdrop-filter:blur(18px) saturate(130%);
  -webkit-backdrop-filter:blur(18px) saturate(130%);
}
body{position:fixed;inset:0;touch-action:manipulation}

/*
SPARTAN SCRIPT — ASTRANOV RECONSTRUCTION LOCK v6
MISSION
Rebuild the entire Astranov index.html from zero as one coherent operational file.

ABSOLUTE BUILD LAW
Never patch.
Never layer new systems over old systems.
Never keep obsolete code alive under new code.
Every structural change requires full reconstruction of the whole index.html.

MOBILE-FIRST LAW
Primary target = small phones in portrait.
Desktop is secondary.
Everything must remain sharp, readable, and operable on dense mobile screens.

DEFAULT-SCREEN LAW
At load only essentials may be visible:
1. world view
2. helper bottom-left
3. composer bottom-center
4. add bubble bottom-right
5. compact radar/performance HUDs
No always-open add flow.
No giant center card.
No floating status labels.

ANTI-FAKE LAW
No fake buttons.
No fake helper.
No decorative mascot.
No floating tutorial chatter.
All assistant/status text stays inside the chat drawer only.

WORLD-VIEW PRIORITY LAW
The globe/map stays dominant.
UI must not suffocate the world surface.

OUTPUT LAW
Single fully reconstructed index.html only.
Final filename = index.html.
*/

#topbar{
  position:fixed;left:0;right:0;top:0;height:var(--top-h);
  display:flex;align-items:center;justify-content:space-between;
  padding:8px calc(var(--safe-r) + 8px) 8px calc(var(--safe-l) + 8px);
  z-index:60;background:linear-gradient(180deg, rgba(4,12,24,.72), rgba(4,12,24,.18));
  border-bottom:1px solid rgba(0,200,255,.1);backdrop-filter:blur(14px);
}
.brand-wrap{display:flex;align-items:center;gap:10px;min-width:0}
.brand-dot{width:10px;height:10px;border-radius:50%;background:var(--blue);box-shadow:0 0 14px var(--blue)}
.brand-text{font-size:12px;font-weight:700;letter-spacing:.08em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brand-sub{font-size:10px;color:var(--dim)}
.mode-pill{padding:7px 12px;border-radius:999px;border:1px solid var(--line);font-size:11px;color:var(--blue-soft);background:rgba(0,200,255,.07);white-space:nowrap}

#stage{
  position:fixed;inset:var(--top-h) 0 calc(var(--dock-h) + var(--safe-b)) 0;
  overflow:hidden;
}
#globe-wrap,#map-wrap{position:absolute;inset:0}
#globeCanvas{width:100%;height:100%;display:block}
#map{width:100%;height:100%}
#map-wrap{display:none}
body.map #map-wrap{display:block}
body.map #globe-wrap{display:none}

#scene-gradient{
  position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(circle at 50% 75%, rgba(0,200,255,.06), transparent 30%), linear-gradient(180deg, transparent 60%, rgba(3,9,19,.38));
}

.hud{
  position:absolute;z-index:35;width:var(--hud-size);height:var(--hud-size);
  border-radius:50%;display:grid;place-items:center;overflow:hidden;
}
#perfHud{left:calc(var(--safe-l) + 10px);top:10px}
#radarHud{right:calc(var(--safe-r) + 10px);top:10px}
.hud svg{width:100%;height:100%;position:absolute;inset:0}
.hud .center-btn{
  position:relative;z-index:2;width:36px;height:36px;border-radius:50%;
  border:1px solid var(--line-strong);background:radial-gradient(circle at 35% 30%, rgba(0,200,255,.26), rgba(7,19,34,.92) 72%);
  color:var(--blue-soft);display:grid;place-items:center;cursor:pointer;box-shadow:0 0 16px rgba(0,200,255,.14)
}
.hud .center-btn svg{position:static;width:18px;height:18px}
.hud .micro{
  position:absolute;z-index:2;font-size:9px;color:#9edcf0;letter-spacing:.06em
}
.hud .micro.top{top:12px}
.hud .micro.bottom{bottom:12px}
.hud .micro.left{left:8px;top:50%;transform:translateY(-50%) rotate(-90deg)}
.hud .micro.right{right:8px;top:50%;transform:translateY(-50%) rotate(90deg)}
#perfHud .micro{display:none}
#cargo-dot{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  width:8px;height:8px;border-radius:50%;background:var(--good);z-index:3;display:none;
  box-shadow:0 0 10px currentColor;
}
body.cargo-loaded #cargo-dot{display:block;background:var(--bad)}
#cargo-center-icon-open,#cargo-center-icon-closed{position:absolute;inset:0;display:grid;place-items:center}
body.cargo-loaded #cargo-center-icon-open{display:none}
body:not(.cargo-loaded) #cargo-center-icon-closed{display:none}
#radar-center-icon-out{display:none}
body.map #radar-center-icon-in{display:none}
body.map #radar-center-icon-out{display:block}

#helper{
  position:fixed;left:calc(var(--safe-l) + 8px);bottom:calc(var(--safe-b) + 6px);
  width:var(--helper-w);height:92px;z-index:70;display:flex;align-items:flex-end;justify-content:center;
  background:none;border:none;padding:0;cursor:pointer;
}
#helper figure{
  margin:0;width:100%;height:100%;display:flex;align-items:flex-end;justify-content:center;
  filter:drop-shadow(0 18px 18px rgba(0,0,0,.3)) drop-shadow(0 0 16px rgba(0,200,255,.16));
}
#helper svg{width:76px;height:90px}
#helper:hover svg{transform:translateY(-1px)}
#helper-status{
  position:fixed;left:calc(var(--safe-l) + 92px);bottom:calc(var(--safe-b) + 54px);
  max-width:min(58vw,240px);padding:10px 12px;border-radius:16px;z-index:69;display:none;
  font-size:11px;line-height:1.35;color:var(--text)
}
#helper-status.on{display:block}

#composer{
  position:fixed;left:calc(var(--safe-l) + 96px);right:calc(var(--safe-r) + 86px);
  bottom:calc(var(--safe-b) + 12px);height:var(--dock-h);z-index:68;
  display:flex;flex-direction:column;gap:8px;padding:8px 10px 10px;border-radius:22px;
}
#composer-top{display:flex;align-items:center;gap:8px;min-height:28px}
#channel-wrap{
  flex:1;display:flex;align-items:center;gap:8px;min-width:0;padding:0 12px;height:30px;border-radius:999px;
  border:1px solid var(--line);background:rgba(0,200,255,.05)
}
#channel-arrow{font-size:12px;color:var(--blue-soft);flex:0 0 auto}
#channel-select{
  appearance:none;border:none;background:transparent;color:var(--blue-soft);min-width:0;flex:1;outline:none;font-size:12px
}
#channel-add{
  width:28px;height:28px;border-radius:50%;display:grid;place-items:center;border:1px solid var(--line);
  background:rgba(0,200,255,.06);color:var(--blue-soft);cursor:pointer;font-size:18px;line-height:1
}
#composer-bottom{display:grid;grid-template-columns:42px 1fr 42px;gap:8px;align-items:center}
.icon-btn{
  width:42px;height:42px;border-radius:14px;border:1px solid var(--line);background:rgba(0,200,255,.05);
  color:var(--blue-soft);display:grid;place-items:center;cursor:pointer
}
.icon-btn svg{width:18px;height:18px}
#cmd-input{
  height:42px;border-radius:14px;border:1px solid var(--line);background:rgba(0,0,0,.04);
  padding:0 14px;color:var(--text);outline:none;font-size:14px
}
#cmd-input::placeholder{color:#8bb9ce}
#cmd-input:focus{border-color:var(--line-strong);box-shadow:0 0 14px rgba(0,200,255,.12)}
#send-btn{background:radial-gradient(circle at 35% 30%, rgba(0,200,255,.22), rgba(7,19,34,.92) 72%)}
#send-btn.has-text{border-color:rgba(0,200,255,.48);box-shadow:0 0 16px rgba(0,200,255,.16)}

#drawer{
  position:fixed;left:calc(var(--safe-l) + 96px);right:calc(var(--safe-r) + 86px);
  bottom:calc(var(--safe-b) + 104px);max-height:min(40dvh,280px);z-index:67;
  border-radius:20px 20px 12px 12px;display:none;flex-direction:column;overflow:hidden
}
#drawer.open{display:flex}
#drawer-messages{overflow:auto;display:flex;flex-direction:column;gap:8px;padding:10px 12px}
.msg{max-width:88%;padding:9px 12px;border-radius:16px;font-size:12px;line-height:1.4}
.msg.user{align-self:flex-end;background:rgba(0,200,255,.12);border:1px solid rgba(0,200,255,.22)}
.msg.ai{align-self:flex-start;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1)}
.msg.system{align-self:center;background:rgba(0,200,255,.05);border:1px solid rgba(0,200,255,.15);color:var(--blue-soft);max-width:94%}

#add-btn{
  position:fixed;right:calc(var(--safe-r) + 12px);bottom:calc(var(--safe-b) + 12px);
  width:64px;height:64px;border-radius:50%;z-index:69;border:1px solid rgba(0,200,255,.38);
  background:radial-gradient(circle at 35% 30%, rgba(0,200,255,.3), rgba(7,19,34,.92) 72%);
  color:var(--text);display:grid;place-items:center;cursor:pointer;box-shadow:var(--shadow)
}
#add-btn svg{width:26px;height:26px}
body.radial-open #add-btn{box-shadow:0 0 24px rgba(0,200,255,.22), var(--shadow)}

#radial{
  position:absolute;inset:0;pointer-events:none;z-index:40
}
.radial-item{
  position:absolute;width:88px;height:88px;border-radius:50%;pointer-events:auto;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;text-align:center;
  padding:10px;background:radial-gradient(circle at 35% 30%, rgba(0,200,255,.28), rgba(7,19,34,.94) 72%);
  border:1px solid rgba(0,200,255,.3);color:var(--text);font-size:11px;line-height:1.15;
  box-shadow:var(--shadow);opacity:0;transform:scale(.78);transition:opacity .18s ease, transform .18s ease
}
.radial-item svg{width:18px;height:18px}
body.radial-open .radial-item{opacity:1;transform:scale(1)}

#sheet{
  position:absolute;left:12px;right:12px;bottom:12px;z-index:45;display:none;pointer-events:none
}
#sheet.show{display:block}
.sheet-card{
  pointer-events:auto;border-radius:22px;padding:14px;background:linear-gradient(180deg, rgba(8,20,38,.86), rgba(6,16,30,.9));
  border:1px solid rgba(0,200,255,.22);box-shadow:var(--shadow)
}
.sheet-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.sheet-title{font-size:16px;font-weight:700}
.sheet-sub{font-size:12px;color:var(--dim);margin-top:4px}
.sheet-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.chip{padding:6px 10px;border-radius:999px;border:1px solid rgba(0,200,255,.16);background:rgba(0,200,255,.06);font-size:11px;color:var(--blue-soft)}
.sheet-actions{display:flex;gap:8px;margin-top:14px}
.action{
  flex:1;height:42px;border-radius:14px;border:1px solid var(--line);cursor:pointer;
  background:rgba(0,200,255,.06);color:var(--text)
}
.action.primary{background:rgba(0,200,255,.16);border-color:rgba(0,200,255,.34)}

#form-modal{
  position:fixed;inset:0;z-index:90;background:rgba(0,0,0,.48);display:none;align-items:flex-end;justify-content:center;
  backdrop-filter:blur(8px)
}
#form-modal.open{display:flex}
#form-card{
  width:min(100%,560px);max-height:min(80dvh,720px);border-radius:24px 24px 0 0;padding:14px 14px calc(var(--safe-b) + 14px);
  overflow:auto
}
.form-top{display:flex;align-items:center;justify-content:space-between;gap:12px;position:sticky;top:0;padding-bottom:10px;background:linear-gradient(180deg, rgba(8,20,38,.98), rgba(8,20,38,.9))}
.form-title{font-size:18px;font-weight:700}
#form-close{
  width:40px;height:40px;border-radius:50%;display:grid;place-items:center;border:1px solid var(--line);background:rgba(255,255,255,.05);color:var(--text);cursor:pointer;font-size:24px;line-height:1
}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-field{display:flex;flex-direction:column;gap:6px}
.form-field.full{grid-column:1 / -1}
.form-label{font-size:11px;color:var(--blue-soft)}
.form-input,.form-select,.form-textarea{
  width:100%;border-radius:14px;border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--text);outline:none;padding:12px
}
.form-textarea{min-height:92px;resize:vertical}
.form-footer{display:flex;gap:10px;margin-top:14px}
.form-footer .action{height:46px}

.map-marker{
  width:16px;height:16px;border-radius:50%;border:2px solid #fff;background:var(--blue);
  box-shadow:0 0 12px rgba(0,200,255,.65)
}
.map-marker.driver{background:#ff9b2f}
.map-marker.delivery{background:#7ae4ff}
.map-marker.product{background:#00c8ff}
.map-marker.service{background:#8d5bff}

.leaflet-control-attribution,.leaflet-control-container .leaflet-top,.leaflet-control-zoom{display:none !important}
.leaflet-container{background:#07101d}

@media (max-width:420px){
  :root{--hud-size:78px;--helper-w:74px}
  #composer{left:calc(var(--safe-l) + 84px);right:calc(var(--safe-r) + 78px)}
  #drawer{left:calc(var(--safe-l) + 84px);right:calc(var(--safe-r) + 78px)}
  .radial-item{width:78px;height:78px;font-size:10px}
  .form-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="topbar">
  <div class="brand-wrap">
    <div class="brand-dot"></div>
    <div>
      <div class="brand-text">Astranov Internet Operating System</div>
      <div class="brand-sub">planet-first marketplace</div>
    </div>
  </div>
  <div class="mode-pill" id="modePill">Globe</div>
</div>

<div id="stage">
  <div id="globe-wrap">
    <canvas id="globeCanvas"></canvas>
  </div>
  <div id="map-wrap">
    <div id="map"></div>
  </div>
  <div id="scene-gradient"></div>

  <div id="perfHud" class="hud glass" aria-label="Performance">
    <svg viewBox="0 0 100 100" aria-hidden="true">
      <circle cx="50" cy="50" r="42" fill="none" stroke="rgba(0,200,255,.18)" stroke-width="2"/>
      <circle cx="50" cy="50" r="34" fill="none" stroke="rgba(0,200,255,.08)" stroke-width="10" stroke-dasharray="44 12 28 12 34 12 26 16"/>
      <path d="M50 8 A42 42 0 0 1 89 38" fill="none" stroke="rgba(22,224,122,.72)" stroke-width="4" stroke-linecap="round"/>
      <path d="M92 50 A42 42 0 0 1 62 89" fill="none" stroke="rgba(255,212,77,.72)" stroke-width="4" stroke-linecap="round"/>
      <path d="M38 89 A42 42 0 0 1 8 50" fill="none" stroke="rgba(0,200,255,.72)" stroke-width="4" stroke-linecap="round"/>
      <path d="M11 38 A42 42 0 0 1 50 8" fill="none" stroke="rgba(141,91,255,.72)" stroke-width="4" stroke-linecap="round"/>
    </svg>
    <button class="center-btn" id="cargoBtn" title="Load / unload">
      <span id="cargo-dot"></span>
      <span id="cargo-center-icon-open" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M15 6c-2 0-4 1-5 3v6c1 2 3 3 5 3"/><path d="M15 6c2 0 3 1 3 3v6c0 2-1 3-3 3"/></svg>
      </span>
      <span id="cargo-center-icon-closed" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M8 9c0-2 2-3 4-3s4 1 4 3v6c0 2-2 3-4 3s-4-1-4-3V9z"/><circle cx="12" cy="12" r="1.7" fill="currentColor" stroke="none"/></svg>
      </span>
    </button>
  </div>

  <div id="radarHud" class="hud glass" aria-label="Radar">
    <svg viewBox="0 0 100 100" aria-hidden="true">
      <circle cx="50" cy="50" r="42" fill="none" stroke="rgba(0,200,255,.18)" stroke-width="2"/>
      <circle cx="50" cy="50" r="30" fill="none" stroke="rgba(0,200,255,.12)" stroke-width="1.5"/>
      <circle cx="50" cy="50" r="18" fill="none" stroke="rgba(0,200,255,.08)" stroke-width="1.5"/>
      <path d="M50 8 L50 92 M8 50 L92 50" stroke="rgba(0,200,255,.08)" stroke-width="1"/>
      <path d="M50 50 L78 32" stroke="rgba(0,200,255,.5)" stroke-width="2.4" stroke-linecap="round"/>
    </svg>
    <button class="center-btn" id="radarBtn" title="Zoom to my location / globe">
      <span id="radar-center-icon-in" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M12 4v12"/><path d="M7 11l5 5 5-5"/></svg>
      </span>
      <span id="radar-center-icon-out" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M12 20V8"/><path d="M7 13l5-5 5 5"/></svg>
      </span>
    </button>
  </div>

  <div id="radial"></div>

  <div id="sheet">
    <div class="sheet-card">
      <div class="sheet-top">
        <div>
          <div class="sheet-title" id="sheetTitle">Listing</div>
          <div class="sheet-sub" id="sheetSub">Details</div>
          <div class="sheet-meta" id="sheetMeta"></div>
        </div>
        <button class="icon-btn" id="sheetClose" title="Close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 6l12 12"/><path d="M18 6L6 18"/></svg>
        </button>
      </div>
      <div class="sheet-actions">
        <button class="action primary" id="sheetAction">Open</button>
        <button class="action" id="sheetSecondary">Route</button>
      </div>
    </div>
  </div>
</div>

<button id="helper" aria-label="Astranov Collective Intelligence">
  <figure>
    <svg viewBox="0 0 120 140" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <defs>
        <linearGradient id="wing" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#a9f2ff" stop-opacity=".9"/>
          <stop offset="100%" stop-color="#00c8ff" stop-opacity=".18"/>
        </linearGradient>
        <linearGradient id="armor" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#183550"/>
          <stop offset="100%" stop-color="#07111d"/>
        </linearGradient>
      </defs>
      <path d="M18 70c-9 0-15-9-12-18 5-14 22-22 35-27-4 8-4 19 0 28-8 8-14 17-23 17z" fill="url(#wing)" stroke="rgba(180,240,255,.45)" stroke-width="1.4"/>
      <path d="M102 70c9 0 15-9 12-18-5-14-22-22-35-27 4 8 4 19 0 28 8 8 14 17 23 17z" fill="url(#wing)" stroke="rgba(180,240,255,.45)" stroke-width="1.4"/>
      <path d="M60 18c10 0 20 7 24 18v9c0 17-11 30-24 30S36 62 36 45v-9c4-11 14-18 24-18z" fill="url(#armor)" stroke="#62dfff" stroke-width="2"/>
      <path d="M47 16c-6-10-17-16-30-15 11 3 19 11 23 20" fill="none" stroke="#8ff1ff" stroke-width="4" stroke-linecap="round"/>
      <path d="M73 16c6-10 17-16 30-15-11 3-19 11-23 20" fill="none" stroke="#8ff1ff" stroke-width="4" stroke-linecap="round"/>
      <path d="M38 46c0-17 10-28 22-28s22 11 22 28" fill="none" stroke="#9aefff" stroke-width="2" opacity=".7"/>
      <path d="M46 88c8 5 20 5 28 0l8 28H38l8-28z" fill="url(#armor)" stroke="#62dfff" stroke-width="2"/>
      <path d="M58 76l-8 44" stroke="#9aefff" stroke-width="3" stroke-linecap="round"/>
      <path d="M62 76l8 44" stroke="#9aefff" stroke-width="3" stroke-linecap="round"/>
      <circle cx="52" cy="47" r="3" fill="#9ff7ff"/>
      <circle cx="68" cy="47" r="3" fill="#9ff7ff"/>
      <path d="M53 58c4 3 10 3 14 0" fill="none" stroke="#9ff7ff" stroke-width="2" stroke-linecap="round"/>
      <path d="M90 74l9 46" stroke="#9ff7ff" stroke-width="4" stroke-linecap="round"/>
      <path d="M84 74l12 0 8 8-22 0z" fill="#0d2033" stroke="#62dfff" stroke-width="2"/>
      <path d="M90 118l18 0" stroke="#9ff7ff" stroke-width="3" stroke-linecap="round"/>
      <path d="M95 112l13 0" stroke="#9ff7ff" stroke-width="2" stroke-linecap="round"/>
    </svg>
  </figure>
</button>

        <option value="ai">Astranov Collective Intelligence</option>
        <option value="global">Global</option>

      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v1a7 7 0 0 1-14 0v-1"/><path d="M12 18v4"/><path d="M8 22h8"/></svg>

  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14"/><path d="M5 12h14"/></svg>

  <div id="form-card" class="glass">

    </div>

      <div class="form-grid" id="form-grid"></div>
      <div class="form-footer">
        <button type="button" class="action" id="form-cancel">Cancel</button>
        <button type="submit" class="action primary">Save</button>
      </div>
    </form>
  </div>
</div>

<textarea id="spartan-script" class="hidden">
SPARTAN SCRIPT — ASTRANOV RECONSTRUCTION LOCK v6
MISSION
Rebuild the entire Astranov index.html from zero as one coherent operational file.

LOCKS
- mobile first for small phones in portrait
- no patches, no ghost controls, no duplicate buttons
- default screen clean
- no floating chatter outside composer
- globe/map dominant
- helper serious, not decorative
- add flow hidden until requested
- no giant blocking overlay
- all status text inside chat drawer only
- final output = one full index.html
</textarea>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
(() => {
  const $ = s => document.querySelector(s);
  const stage = $('#stage');
  const drawer = $('#drawer');
  const drawerMessages = $('#drawer-messages');
  const input = $('#cmd-input');
  const sendBtn = $('#send-btn');
  const addBtn = $('#add-btn');
  const helper = $('#helper');
  const helperStatus = $('#helper-status');
  const modePill = $('#modePill');
  const radial = $('#radial');
  const formModal = $('#form-modal');
  const formGrid = $('#form-grid');
  const formTitle = $('#form-title');
  const formClose = $('#form-close');
  const listingForm = $('#listing-form');
  const micBtn = $('#mic-btn');
  const channelSelect = $('#channel-select');
  const sheet = $('#sheet');
  const sheetClose = $('#sheetClose');
  const sheetTitle = $('#sheetTitle');
  const sheetSub = $('#sheetSub');
  const sheetMeta = $('#sheetMeta');
  const radarBtn = $('#radarBtn');
  const cargoBtn = $('#cargoBtn');

  const state = {
    view: 'globe',
    cargoLoaded: false,
    drawerOpen: false,
    radialOpen: false,
    handsFree: false,
    pendingType: null,
    userLocation: { lat: 36.4349, lng: 28.2176, label: 'Rhodes' },
    mapReady: false,
    currentChannel: 'ai',
    listings: [],
    markers: [],
    remote: { shops: [], drivers: [], products: [], news: [] }
  };

  const API = {
    shops: '/api/shops_list.php',
    products: '/api/products_list.php',
    drivers: '/api/drivers_state.php',
    news: '/api/news_top.php',
    users: '/api/users_list.php'
  };

  const STORAGE_KEY = 'astranov.mobile.listings.v2';
  let map, globe, globeScene, globeCamera, globeRenderer, globeSignals = [];
  let recognition = null;
  let addOrigin = null;
  let selectedListing = null;

  function appendMessage(role, text) {
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.textContent = text;
    drawerMessages.appendChild(div);
    drawerMessages.scrollTop = drawerMessages.scrollHeight;
    if(role !== 'user') openDrawer();
  }

  function openDrawer(){ state.drawerOpen = true; drawer.classList.add('open'); }
  function closeDrawer(){ state.drawerOpen = false; drawer.classList.remove('open'); }

  function showHelperStatus(text){
    helperStatus.textContent = text;
    helperStatus.classList.add('on');
    clearTimeout(showHelperStatus.t);
    showHelperStatus.t = setTimeout(()=>helperStatus.classList.remove('on'), 2200);
  }

  function updateModeUI(){
    document.body.classList.toggle('map', state.view === 'map');
    document.body.classList.toggle('cargo-loaded', state.cargoLoaded);
    document.body.classList.toggle('radial-open', state.radialOpen);
    modePill.textContent = state.view === 'map' ? 'Map' : 'Globe';
    sendBtn.classList.toggle('has-text', !!input.value.trim());
  }

  function saveLocalListings(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state.listings.filter(x => x.source !== 'remote')));
  }

  function loadLocalListings(){
    try{
      const arr = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      state.listings = Array.isArray(arr) ? arr : [];
    }catch(e){ state.listings = []; }
  }

  function normalizeLatLng(v1, v2){
    const lat = parseFloat(v1); const lng = parseFloat(v2);
    if(Number.isFinite(lat) && Number.isFinite(lng)) return {lat, lng};
    return null;
  }

  function normalizeShop(item){
    const ll = normalizeLatLng(item.lat ?? item.latitude, item.lon ?? item.lng ?? item.longitude);
    if(!ll) return null;
    return {
      id: 'shop-' + (item.id ?? Math.random().toString(36).slice(2)),
      type: item.category === 'hotel' ? 'service' : (item.category || 'service'),
      title: item.name || item.title || 'Listing',
      category: item.category || 'service',
      description: item.description || '',
      price: item.price || '',
      lat: ll.lat, lng: ll.lng,
      phone: item.phone || '',
      website: item.website || '',
      source: 'remote'
    };
  }

  function normalizeDriver(item){
    const ll = normalizeLatLng(item.lat ?? item.last_lat ?? item.latitude, item.lng ?? item.lon ?? item.last_lng ?? item.longitude);
    if(!ll) return null;
    return {
      id: 'driver-' + (item.id ?? Math.random().toString(36).slice(2)),
      type: 'driver',
      title: item.name || item.username || 'Driver',
      category: 'driver',
      description: item.status || 'Available for deliveries',
      price: '',
      lat: ll.lat, lng: ll.lng,
      source: 'remote'
    };
  }

  async function fetchJson(url){
    try{
      const res = await fetch(url, { credentials:'same-origin' });
      if(!res.ok) throw new Error('HTTP ' + res.status);
      return await res.json();
    }catch(e){ return []; }
  }

  async function loadRemoteData(){
    const [shops, products, drivers, news] = await Promise.all([
      fetchJson(API.shops), fetchJson(API.products), fetchJson(API.drivers), fetchJson(API.news)
    ]);
    state.remote.shops = Array.isArray(shops) ? shops.map(normalizeShop).filter(Boolean) : [];
    state.remote.drivers = Array.isArray(drivers) ? drivers.map(normalizeDriver).filter(Boolean) : [];
    state.remote.products = Array.isArray(products) ? products : [];
    state.remote.news = Array.isArray(news) ? news : [];
    const locals = state.listings.filter(x => x.source !== 'remote');
    state.listings = [...state.remote.shops, ...state.remote.drivers, ...locals];
    renderMapMarkers();
    buildGlobeSignals();
  }

  function renderMapMarkers(){
    if(!state.mapReady || !map) return;
    state.markers.forEach(m => map.removeLayer(m));
    state.markers = [];
    state.listings.forEach(item => {
      if(!Number.isFinite(item.lat) || !Number.isFinite(item.lng)) return;
      const el = document.createElement('div');
      el.className = 'map-marker ' + (item.type === 'driver' ? 'driver' : item.type);
      const icon = L.divIcon({ className:'', html: el.outerHTML, iconSize:[16,16], iconAnchor:[8,8] });
      const marker = L.marker([item.lat, item.lng], { icon }).addTo(map);
      marker.on('click', () => showListing(item));
      state.markers.push(marker);
    });
  }

  function showListing(item){
    selectedListing = item;
    sheetTitle.textContent = item.title;
    sheetSub.textContent = item.description || (item.type === 'driver' ? 'Driver base' : item.category || item.type);
    sheetMeta.innerHTML = '';
    [['Type', item.type], ['Price', item.price || '—'], ['Area', item.lat.toFixed(4)+', '+item.lng.toFixed(4)]].forEach(([k,v]) => {
      const chip = document.createElement('div');
      chip.className = 'chip';
      chip.textContent = k + ': ' + v;
      sheetMeta.appendChild(chip);
    });
    $('#sheetAction').textContent = item.type === 'driver' ? 'Use driver' : 'Open';
    $('#sheetSecondary').textContent = 'Route';
    sheet.classList.add('show');
  }

  function hideListing(){
    sheet.classList.remove('show');
    selectedListing = null;
  }

  sheetClose.addEventListener('click', hideListing);
  $('#sheetAction').addEventListener('click', () => {
    if(!selectedListing) return;
    appendMessage('ai', `${selectedListing.title} selected on ${channelSelect.options[channelSelect.selectedIndex].text}.`);
  });
  $('#sheetSecondary').addEventListener('click', () => {
    if(!selectedListing) return;
    if(state.view !== 'map') toggleMapView(true);
    if(state.mapReady) map.flyTo([selectedListing.lat, selectedListing.lng], 16, { duration: .8 });
    appendMessage('system', `Routing focus moved to ${selectedListing.title}.`);
  });

  function buildGlobe(){
    const canvas = $('#globeCanvas');
    globeRenderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:true, powerPreference:'high-performance' });
    globeRenderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
    globeScene = new THREE.Scene();
    globeCamera = new THREE.PerspectiveCamera(42, 1, 0.1, 100);
    globeCamera.position.set(0,0,3.5);

    const amb = new THREE.AmbientLight(0x356b9c, 1.2);
    globeScene.add(amb);
    const dir = new THREE.DirectionalLight(0xaedfff, 1.8);
    dir.position.set(4,3,5);
    globeScene.add(dir);

    const stars = new THREE.BufferGeometry();
    const count = 1600;
    const pos = new Float32Array(count * 3);
    for(let i=0;i<count;i++){
      pos[i*3] = (Math.random()-.5) * 22;
      pos[i*3+1] = (Math.random()-.5) * 18;
      pos[i*3+2] = (Math.random()-.5) * 22;
    }
    stars.setAttribute('position', new THREE.BufferAttribute(pos,3));
    globeScene.add(new THREE.Points(stars, new THREE.PointsMaterial({ color:0xb8e8ff, size:.03, transparent:true, opacity:.7 })));

    const earth = new THREE.Group();
    globe = earth;
    const sphere = new THREE.Mesh(
      new THREE.SphereGeometry(1.05, 64, 64),
      new THREE.MeshStandardMaterial({ color:0x183d72, metalness:.08, roughness:.74 })
    );
    earth.add(sphere);

    const glow = new THREE.Mesh(
      new THREE.SphereGeometry(1.12, 48, 48),
      new THREE.MeshBasicMaterial({ color:0x2dd4ff, transparent:true, opacity:.08 })
    );
    earth.add(glow);

    const grid = new THREE.Group();
    const lineMaterial = new THREE.LineBasicMaterial({ color:0x7fdfff, transparent:true, opacity:.14 });
    for(let lat=-60; lat<=60; lat+=20){
      const pts = [];
      for(let lon=0; lon<=360; lon+=10){
        const p = latLonToVector(lat, lon, 1.055);
        pts.push(p);
      }
      const geo = new THREE.BufferGeometry().setFromPoints(pts);
      grid.add(new THREE.Line(geo, lineMaterial));
    }
    for(let lon=0; lon<180; lon+=20){
      const pts = [];
      for(let lat=-90; lat<=90; lat+=4){
        const p = latLonToVector(lat, lon, 1.055);
        pts.push(p);
      }
      const geo = new THREE.BufferGeometry().setFromPoints(pts);
      grid.add(new THREE.Line(geo, lineMaterial));
    }
    earth.add(grid);
    globeScene.add(earth);

    function onResize(){
      const r = $('#globe-wrap').getBoundingClientRect();
      globeRenderer.setSize(r.width, r.height, false);
      globeCamera.aspect = r.width / Math.max(1, r.height);
      globeCamera.updateProjectionMatrix();
    }
    onResize();
    window.addEventListener('resize', onResize);

    function loop(){
      requestAnimationFrame(loop);
      earth.rotation.y += 0.0018;
      globeSignals.forEach((s, i) => { s.scale.setScalar(1 + Math.sin(performance.now() * .002 + i) * .08); });
      globeRenderer.render(globeScene, globeCamera);
    }
    loop();
  }

  function latLonToVector(lat, lon, radius){
    const phi = (90 - lat) * Math.PI / 180;
    const theta = (lon + 180) * Math.PI / 180;
    return new THREE.Vector3(
      -(radius * Math.sin(phi) * Math.cos(theta)),
      radius * Math.cos(phi),
      radius * Math.sin(phi) * Math.sin(theta)
    );
  }

  function buildGlobeSignals(){
    if(!globeScene || !globe) return;
    globeSignals.forEach(s => globe.remove(s));
    globeSignals = [];
    state.listings.slice(0,18).forEach((item, index) => {
      const p = latLonToVector(item.lat, item.lng, 1.13);
      const m = new THREE.Mesh(
        new THREE.SphereGeometry(item.type === 'driver' ? .018 : .022, 12, 12),
        new THREE.MeshBasicMaterial({ color: item.type === 'driver' ? 0xff9b2f : 0x00c8ff })
      );
      m.position.copy(p);
      globe.add(m);
      globeSignals.push(m);
    });
  }

  function initMap(){
    if(state.mapReady) return;
    map = L.map('map', { zoomControl:false, attributionControl:false, tap:true, tapTolerance:18 }).setView([state.userLocation.lat, state.userLocation.lng], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom:19 }).addTo(map);
    map.on('click', (e) => {
      if(state.pendingType){
        openForm(state.pendingType, { lat:e.latlng.lat, lng:e.latlng.lng });
        state.pendingType = null;
        closeRadial();
      }
    });
    state.mapReady = true;
    renderMapMarkers();
  }

  function toggleMapView(forceToMap){
    const goMap = forceToMap === true ? true : state.view !== 'map';
    if(goMap){
      initMap();
      state.view = 'map';
      updateModeUI();
      map.invalidateSize();
      map.flyTo([state.userLocation.lat, state.userLocation.lng], 14, { duration:.8 });
      appendMessage('system', 'Zoomed to your location. Tap the map to work locally.');
    } else {
      state.view = 'globe';
      updateModeUI();
      appendMessage('system', 'Returned to globe view.');
    }
  }

  async function ensureLocation(){
    if(navigator.geolocation){
      return new Promise(resolve => {
        navigator.geolocation.getCurrentPosition(pos => {
          state.userLocation = { lat:pos.coords.latitude, lng:pos.coords.longitude, label:'My location' };
          resolve(state.userLocation);
        }, () => resolve(state.userLocation), { enableHighAccuracy:true, timeout:4500, maximumAge:60000 });
      });
    }
    return state.userLocation;
  }

  radarBtn.addEventListener('click', async () => {
    await ensureLocation();
    toggleMapView();
  });

  cargoBtn.addEventListener('click', () => {
    state.cargoLoaded = !state.cargoLoaded;
    updateModeUI();
    appendMessage('system', state.cargoLoaded ? 'Cargo locked. Ready to unload.' : 'Cargo open. Ready to load.');
  });

  helper.addEventListener('click', () => {
    state.handsFree = !state.handsFree;
    const txt = state.handsFree ? 'Astranov Collective Intelligence in hands-free mode.' : 'Astranov Collective Intelligence back to manual typing mode.';
    showHelperStatus(txt);
    appendMessage('system', txt);
  });

  channelSelect.addEventListener('change', () => {
    appendMessage('system', 'Channel switched to ' + channelSelect.options[channelSelect.selectedIndex].text + '.');
  });

  $('#channel-add').addEventListener('click', () => {
    appendMessage('system', 'Use Support & Ideas or Team to propose a new channel.');
  });

  function updateAddOrigin(){
    const rect = stage.getBoundingClientRect();
    addOrigin = { x: rect.width * .5, y: rect.height * .46 };
    if(state.view === 'map' && map){
      const c = map.latLngToContainerPoint(map.getCenter());
      addOrigin = { x: c.x, y: c.y };
    }
  }

  const radialActions = [
    ['product', 'List product', 'Sell an item'],
    ['service', 'List service', 'Offer a service'],
    ['delivery', 'Delivery spot', 'Receive orders here'],
    ['driver', 'Driver base', 'Start delivery mode'],
    ['media', 'Photo / video', 'Post media here']
  ];

  function buildRadial(){
    radial.innerHTML = '';
    radialActions.forEach(([type, title, sub], i) => {
      const btn = document.createElement('button');
      btn.className = 'radial-item';
      btn.type = 'button';
      btn.dataset.type = type;
      btn.innerHTML = `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          ${type==='product' ? '<path d="M4 7h16M7 7V5h10v2M6 7l1 11h10l1-11"/>' :
            type==='service' ? '<path d="M8 4h8l1 4-5 5-5-5 1-4z"/><circle cx="12" cy="12" r="1.5"/>' :
            type==='delivery' ? '<path d="M12 21s7-5.5 7-11a7 7 0 1 0-14 0c0 5.5 7 11 7 11z"/><circle cx="12" cy="10" r="2.5"/>' :
            type==='driver' ? '<path d="M3 15h18"/><path d="M6 15l1.5-6h9L18 15"/><circle cx="8" cy="17.5" r="1.5"/><circle cx="16" cy="17.5" r="1.5"/>' :
            '<rect x="4" y="6" width="16" height="12" rx="2"/><circle cx="9" cy="11" r="2"/><path d="M20 15l-4-4-4 4-2-2-4 4"/>'}
        </svg>
        <strong>${title}</strong><span>${sub}</span>`;
      btn.addEventListener('click', () => chooseAddAction(type));
      radial.appendChild(btn);
    });
  }

  function positionRadial(){
    updateAddOrigin();
    const rect = stage.getBoundingClientRect();
    const r = Math.min(rect.width, rect.height) < 520 ? 108 : 126;
    [...radial.children].forEach((el, i) => {
      const angle = (-90 + i * (360 / radial.children.length)) * Math.PI / 180;
      const x = addOrigin.x + Math.cos(angle) * r - el.offsetWidth / 2;
      const y = addOrigin.y + Math.sin(angle) * r - el.offsetHeight / 2;
      el.style.left = Math.max(10, Math.min(rect.width - el.offsetWidth - 10, x)) + 'px';
      el.style.top = Math.max(10, Math.min(rect.height - el.offsetHeight - 10, y)) + 'px';
    });
  }

  function openRadial(){
    state.radialOpen = true;
    updateModeUI();
    buildRadial();
    requestAnimationFrame(positionRadial);
  }

  function closeRadial(){
    state.radialOpen = false;
    radial.innerHTML = '';
    updateModeUI();
  }

  addBtn.addEventListener('click', () => state.radialOpen ? closeRadial() : openRadial());
  stage.addEventListener('click', (e) => {
    if(state.radialOpen && !e.target.closest('.radial-item') && !e.target.closest('#add-btn')) closeRadial();
  });

  function chooseAddAction(type){
    hideListing();
    if(state.view === 'globe'){
      state.pendingType = type;
      appendMessage('ai', `Zooming to your area. Tap the map where you want to ${type === 'delivery' ? 'set your delivery location' : type === 'driver' ? 'set your driver base' : 'list this'}.`);
      ensureLocation().then(() => toggleMapView(true));
      return;
    }
    const center = map ? map.getCenter() : { lat:state.userLocation.lat, lng:state.userLocation.lng };
    openForm(type, { lat:center.lat, lng:center.lng });
    closeRadial();
  }

  function field(label, name, type='text', full=false, placeholder=''){
    return `<label class="form-field ${full?'full':''}">
      <span class="form-label">${label}</span>
      <input class="form-input" name="${name}" type="${type}" placeholder="${placeholder}">
    </label>`;
  }
  function selectField(label, name, options, full=false){
    return `<label class="form-field ${full?'full':''}">
      <span class="form-label">${label}</span>
      <select class="form-select" name="${name}">${options.map(o=>`<option value="${o}">${o}</option>`).join('')}</select>
    </label>`;
  }
  function textareaField(label, name, full=true, placeholder=''){
    return `<label class="form-field ${full?'full':''}">
      <span class="form-label">${label}</span>
      <textarea class="form-textarea" name="${name}" placeholder="${placeholder}"></textarea>
    </label>`;
  }

  function openForm(type, loc){
    formGrid.innerHTML = '';
    formTitle.textContent = {
      product:'List product',
      service:'List service',
      delivery:'My delivery location',
      driver:'Driver base',
      media:'Post photo or video'
    }[type] || 'Create listing';

    const common = `
      ${field('Title','title','text',true, type==='product' ? 'Pizza Margherita' : type==='service' ? 'Hotel' : 'Name')}
      ${field('Latitude','lat','text',false,String((loc?.lat ?? state.userLocation.lat).toFixed(6)))}
      ${field('Longitude','lng','text',false,String((loc?.lng ?? state.userLocation.lng).toFixed(6)))}
      ${textareaField('Description','description',true,'Describe what people will get')}
    `;

    if(type === 'product'){
      formGrid.innerHTML = common +
        selectField('Category','category',['food','market','coffee','retail','rental']) +
        field('Price (€)','price','number',false,'9.90') +
        field('Quantity','quantity','number',false,'12') +
        field('Volume / size','volume','text',false,'500ml') +
        selectField('Temperature','temperature',['neutral','cold','hot']) +
        field('Max transport minutes','transport','number',false,'30') +
        field('Media URL','media','text',true,'https://...');
    } else if(type === 'service'){
      formGrid.innerHTML = common +
        selectField('Service type','category',['hotel','rent-a-car','diving','restaurant','repair','delivery']) +
        field('Price from (€)','price','number',false,'30') +
        field('Bookable slots per hour','slots','number',false,'4') +
        field('Phone','phone','text',false,'+30') +
        field('Website','website','text',true,'https://...');
    } else if(type === 'delivery'){
      formGrid.innerHTML =
        field('Doorbell name','title','text',true,'My place') +
        field('Latitude','lat','text',false,String((loc?.lat ?? state.userLocation.lat).toFixed(6))) +
        field('Longitude','lng','text',false,String((loc?.lng ?? state.userLocation.lng).toFixed(6))) +
        field('Street','street','text',false,'Street') +
        field('Number','number','text',false,'12') +
        field('Floor','floor','text',false,'2') +
        field('Phone','phone','text',false,'+30') +
        textareaField('Remarks','description',true,'Be quiet, leave at the door...');
    } else if(type === 'driver'){
      formGrid.innerHTML =
        field('Base name','title','text',true,'Driver base') +
        field('Latitude','lat','text',false,String((loc?.lat ?? state.userLocation.lat).toFixed(6))) +
        field('Longitude','lng','text',false,String((loc?.lng ?? state.userLocation.lng).toFixed(6))) +
        field('Vehicle','vehicle','text',false,'Motorbike') +
        field('Range (km)','range','number',false,'8') +
        field('Phone','phone','text',false,'+30') +
        textareaField('Availability','description',true,'Available now');
    } else {
      formGrid.innerHTML =
        field('Title','title','text',true,'Photo or video post') +
        field('Latitude','lat','text',false,String((loc?.lat ?? state.userLocation.lat).toFixed(6))) +
        field('Longitude','lng','text',false,String((loc?.lng ?? state.userLocation.lng).toFixed(6))) +
        field('Media URL','media','text',true,'https://...') +
        textareaField('Caption','description',true,'What is this post about?');
    }

    listingForm.dataset.type = type;
    formModal.classList.add('open');
  }

  function closeForm(){ formModal.classList.remove('open'); }
  formClose.addEventListener('click', closeForm);
  $('#form-cancel').addEventListener('click', closeForm);

  listingForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const fd = new FormData(listingForm);
    const type = listingForm.dataset.type;
    const item = {
      id: Date.now().toString(36),
      type,
      title: (fd.get('title') || '').trim() || type,
      category: (fd.get('category') || type).trim(),
      description: (fd.get('description') || '').trim(),
      price: (fd.get('price') || '').toString(),
      lat: parseFloat(fd.get('lat')),
      lng: parseFloat(fd.get('lng')),
      transport: fd.get('transport') || '',
      quantity: fd.get('quantity') || '',
      volume: fd.get('volume') || '',
      temperature: fd.get('temperature') || '',
      vehicle: fd.get('vehicle') || '',
      range: fd.get('range') || '',
      phone: fd.get('phone') || '',
      website: fd.get('website') || '',
      street: fd.get('street') || '',
      number: fd.get('number') || '',
      floor: fd.get('floor') || '',
      media: fd.get('media') || '',
      source: 'local'
    };
    if(!Number.isFinite(item.lat) || !Number.isFinite(item.lng)){
      appendMessage('system', 'Valid map coordinates are required.');
      return;
    }
    state.listings = state.listings.filter(x => !(x.source === 'local' && x.id === item.id)).concat(item);
    saveLocalListings();
    renderMapMarkers();
    buildGlobeSignals();
    closeForm();
    closeRadial();
    showListing(item);
    appendMessage('ai', `${item.title} saved locally and is now visible on the map.`);
  });

  function sendCommand(){
    const text = input.value.trim();
    if(!text) return;
    appendMessage('user', text);
    input.value = '';
    updateModeUI();

    const lower = text.toLowerCase();
    if(lower.includes('zoom') || lower.includes('location') || lower.includes('my place')){
      ensureLocation().then(() => toggleMapView(true));
      return;
    }
    if(lower.includes('product')){ chooseAddAction('product'); return; }
    if(lower.includes('service') || lower.includes('hotel') || lower.includes('rent') || lower.includes('restaurant')){ chooseAddAction('service'); return; }
    if(lower.includes('delivery')){ chooseAddAction('delivery'); return; }
    if(lower.includes('driver')){ chooseAddAction('driver'); return; }
    if(lower.includes('video') || lower.includes('photo') || lower.includes('media')){ chooseAddAction('media'); return; }

    appendMessage('ai', 'I can zoom to your area, open the add flow, or help you list a product, service, delivery location, or driver base.');
  }

  sendBtn.addEventListener('click', sendCommand);
  input.addEventListener('keydown', e => { if(e.key === 'Enter') sendCommand(); });
  input.addEventListener('input', updateModeUI);

  let dragInfo = null;
  input.addEventListener('pointerdown', e => {
    dragInfo = { y:e.clientY, open:state.drawerOpen, moved:false, id:e.pointerId };
    try{ input.setPointerCapture(e.pointerId); }catch(err){}
  });
  input.addEventListener('pointermove', e => {
    if(!dragInfo || e.pointerId !== dragInfo.id) return;
    const dy = e.clientY - dragInfo.y;
    if(Math.abs(dy) > 18) dragInfo.moved = true;
    if(dy < -22){ openDrawer(); dragInfo = null; }
    if(dy > 22){ closeDrawer(); dragInfo = null; }
  });
  input.addEventListener('pointerup', e => {
    if(dragInfo && e.pointerId === dragInfo.id && !dragInfo.moved) input.focus();
    dragInfo = null;
  });

  function initVoice(){
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!SR) return;
    recognition = new SR();
    recognition.lang = 'en-US';
    recognition.interimResults = true;
    recognition.onresult = ev => {
      let txt = '';
      for(let i=ev.resultIndex; i<ev.results.length; i++) txt += ev.results[i][0].transcript;
      input.value = txt.trim();
      updateModeUI();
    };
    recognition.onend = () => micBtn.classList.remove('has-text');
  }
  micBtn.addEventListener('click', () => {
    if(!recognition){
      initVoice();
      if(!recognition){ appendMessage('system', 'Voice typing is not available in this browser.'); return; }
    }
    try{
      recognition.start();
      appendMessage('system', 'Voice typing active. Speak now.');
    }catch(e){}
  });

  function bootMessages(){
    appendMessage('ai', 'Astranov Collective Intelligence online. The world is clear. Use the add bubble only when you want to create something.');
    closeDrawer();
  }

  window.addEventListener('resize', () => {
    positionRadial();
    if(map) map.invalidateSize();
  });

  buildGlobe();
  loadLocalListings();
  updateModeUI();
  bootMessages();
  loadRemoteData();
})();
</script>
</body>
</html>
