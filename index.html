<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASTRANOV — Internet Replacement OS</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap');

  :root {
    --cosmic-primary: #0a1628; --cosmic-accent: #00b4ff; --cosmic-glow: #0077cc; --cosmic-text: #c8e6ff; --cosmic-border: rgba(0,180,255,0.25); --cosmic-bg: rgba(10,22,40,0.85);
    --terra-primary: #1a1a2e; --terra-accent: #e6a919; --terra-glow: #cc8800; --terra-text: #f0e6cc; --terra-border: rgba(230,169,25,0.25); --terra-bg: rgba(26,26,46,0.85);
    --abyss-primary: #041a1a; --abyss-accent: #00e5cc; --abyss-glow: #009988; --abyss-text: #b0f0e6; --abyss-border: rgba(0,229,204,0.25); --abyss-bg: rgba(4,26,26,0.85);
    --hud-primary: var(--cosmic-primary); --hud-accent: var(--cosmic-accent); --hud-glow: var(--cosmic-glow); --hud-text: var(--cosmic-text); --hud-border: var(--cosmic-border); --hud-bg: var(--cosmic-bg);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; background:#000; font-family:'Rajdhani',sans-serif; color:var(--hud-text); cursor:crosshair; }

  #scene-cosmic { position:fixed; inset:0; z-index:1; transition:opacity 0.8s ease; }
  #scene-terrestrial { position:fixed; inset:0; z-index:2; opacity:0; pointer-events:none; transition:opacity 0.8s ease; }
  #scene-abyssal { position:fixed; inset:0; z-index:3; opacity:0; pointer-events:none; transition:opacity 0.8s ease; }

  #hud { position:fixed; inset:0; z-index:100; pointer-events:none; }
  #hud > * { pointer-events:auto; }

  #top-bar { position:absolute; top:0; left:0; right:0; height:48px; background:var(--hud-bg); border-bottom:1px solid var(--hud-border); display:flex; align-items:center; justify-content:space-between; padding:0 16px; backdrop-filter:blur(12px); font-family:'Share Tech Mono',monospace; font-size:12px; letter-spacing:0.5px; }
  #top-bar .logo { font-family:'Orbitron',sans-serif; font-weight:900; font-size:16px; color:var(--hud-accent); text-shadow:0 0 20px var(--hud-glow); letter-spacing:4px; }
  .status-group { display:flex; gap:20px; align-items:center; }
  .status-item { display:flex; align-items:center; gap:6px; opacity:0.7; }
  .status-dot { width:6px; height:6px; border-radius:50%; background:var(--hud-accent); box-shadow:0 0 8px var(--hud-glow); animation:pulse-dot 2s ease infinite; }
  @keyframes pulse-dot { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
  .layer-indicator { font-family:'Orbitron',sans-serif; font-weight:700; font-size:11px; padding:3px 10px; border:1px solid var(--hud-accent); border-radius:2px; color:var(--hud-accent); text-shadow:0 0 10px var(--hud-glow); letter-spacing:2px; }
  #auth-status { cursor:pointer; padding:3px 10px; border:1px solid var(--hud-accent); border-radius:2px; font-family:'Orbitron',sans-serif; font-size:10px; color:var(--hud-accent); letter-spacing:1px; background:transparent; transition:all 0.3s; }
  #auth-status:hover { background:rgba(255,255,255,0.05); }

  #left-rail { position:absolute; top:48px; left:0; bottom:44px; width:56px; background:var(--hud-bg); border-right:1px solid var(--hud-border); display:flex; flex-direction:column; align-items:center; padding:12px 0; gap:4px; backdrop-filter:blur(12px); }
  .rail-btn { width:40px; height:40px; display:flex; align-items:center; justify-content:center; border:1px solid transparent; border-radius:4px; background:transparent; color:var(--hud-text); cursor:pointer; transition:all 0.3s; font-size:18px; position:relative; }
  .rail-btn:hover,.rail-btn.active { border-color:var(--hud-accent); background:rgba(255,255,255,0.04); color:var(--hud-accent); text-shadow:0 0 12px var(--hud-glow); }
  .rail-btn.active::after { content:''; position:absolute; left:-9px; top:50%; transform:translateY(-50%); width:3px; height:20px; background:var(--hud-accent); box-shadow:0 0 8px var(--hud-glow); border-radius:0 2px 2px 0; }
  .rail-sep { width:28px; height:1px; background:var(--hud-border); margin:6px 0; }

  #right-rail { position:absolute; top:48px; right:0; bottom:44px; width:56px; background:var(--hud-bg); border-left:1px solid var(--hud-border); display:flex; flex-direction:column; align-items:center; padding:12px 0; gap:4px; backdrop-filter:blur(12px); }
  #zoom-track { width:3px; flex:1; max-height:200px; background:var(--hud-border); border-radius:2px; position:relative; margin:8px 0; }
  #zoom-thumb { width:16px; height:16px; border-radius:50%; border:2px solid var(--hud-accent); background:var(--hud-primary); box-shadow:0 0 10px var(--hud-glow); position:absolute; left:50%; transform:translateX(-50%); top:0; transition:top 0.3s ease; }
  .zoom-label { font-family:'Share Tech Mono',monospace; font-size:9px; color:var(--hud-accent); letter-spacing:1px; writing-mode:vertical-rl; opacity:0.6; }

  #bottom-bar { position:absolute; bottom:0; left:0; right:0; height:44px; background:var(--hud-bg); border-top:1px solid var(--hud-border); display:flex; align-items:center; padding:0 16px; gap:8px; backdrop-filter:blur(12px); }
  #cmd-prefix { font-family:'Share Tech Mono',monospace; font-size:13px; color:var(--hud-accent); text-shadow:0 0 8px var(--hud-glow); flex-shrink:0; }
  #cmd-input { flex:1; background:transparent; border:none; outline:none; font-family:'Share Tech Mono',monospace; font-size:13px; color:var(--hud-text); letter-spacing:0.5px; caret-color:var(--hud-accent); }
  #cmd-input::placeholder { color:rgba(255,255,255,0.2); }
  .cmd-hint { font-family:'Share Tech Mono',monospace; font-size:10px; opacity:0.35; flex-shrink:0; }

  #layer-label { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); font-family:'Orbitron',sans-serif; font-weight:900; font-size:48px; letter-spacing:12px; color:var(--hud-accent); text-shadow:0 0 60px var(--hud-glow),0 0 120px var(--hud-glow); opacity:0; z-index:50; pointer-events:none; }
  #layer-label.visible { animation:label-flash 1.8s ease forwards; }
  @keyframes label-flash { 0%{opacity:0;transform:translate(-50%,-50%) scale(0.8);} 20%{opacity:1;transform:translate(-50%,-50%) scale(1);} 80%{opacity:1;} 100%{opacity:0;transform:translate(-50%,-50%) scale(1.05);} }

  #scanlines { position:fixed; inset:0; z-index:99; pointer-events:none; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px); }
  #map-container { width:100%; height:100%; }
  .leaflet-control-zoom,.leaflet-control-attribution { display:none !important; }
  #abyss-canvas { width:100%; height:100%; }
  #vignette { position:fixed; inset:0; z-index:98; pointer-events:none; background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,0.6) 100%); }

  /* SEARCH PANEL */
  #search-panel { position:fixed; top:48px; left:56px; bottom:44px; width:360px; background:var(--hud-bg); border-right:1px solid var(--hud-border); backdrop-filter:blur(16px); z-index:110; overflow-y:auto; transform:translateX(-420px); transition:transform 0.4s ease; }
  #search-panel.open { transform:translateX(0); }
  .panel-header { padding:14px 16px; border-bottom:1px solid var(--hud-border); font-family:'Orbitron',sans-serif; font-size:12px; letter-spacing:2px; color:var(--hud-accent); display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; background:var(--hud-bg); z-index:2; }
  .panel-close { background:none; border:none; color:var(--hud-text); cursor:pointer; font-size:18px; opacity:0.6; }
  .panel-close:hover { opacity:1; color:var(--hud-accent); }
  .signal-card { padding:14px 16px; border-bottom:1px solid var(--hud-border); cursor:pointer; transition:background 0.2s; }
  .signal-card:hover { background:rgba(255,255,255,0.03); }
  .signal-card .sc-title { font-weight:600; font-size:15px; margin-bottom:4px; }
  .signal-card .sc-shop { font-size:11px; opacity:0.5; font-family:'Share Tech Mono',monospace; }
  .signal-card .sc-desc { font-size:13px; opacity:0.7; margin:6px 0; line-height:1.4; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .signal-card .sc-meta { display:flex; gap:12px; font-size:12px; font-family:'Share Tech Mono',monospace; }
  .sc-price { color:var(--hud-accent); font-weight:700; }
  .sc-votes { opacity:0.6; }
  .sc-category { opacity:0.5; text-transform:uppercase; letter-spacing:1px; font-size:10px; }
  .no-results { padding:40px 16px; text-align:center; opacity:0.4; font-family:'Share Tech Mono',monospace; }

  /* MODALS */
  .modal-overlay { position:fixed; inset:0; z-index:200; background:rgba(0,0,0,0.7); backdrop-filter:blur(8px); display:none; align-items:center; justify-content:center; }
  .modal-overlay.active { display:flex; }
  .modal-box { background:var(--hud-primary); border:1px solid var(--hud-border); border-radius:6px; padding:28px 32px; width:400px; max-width:90vw; max-height:85vh; overflow-y:auto; }
  .modal-title { font-family:'Orbitron',sans-serif; font-size:16px; font-weight:700; color:var(--hud-accent); letter-spacing:3px; margin-bottom:20px; text-shadow:0 0 12px var(--hud-glow); }
  .modal-field { margin-bottom:14px; }
  .modal-field label { display:block; font-size:11px; font-family:'Share Tech Mono',monospace; letter-spacing:1px; opacity:0.6; margin-bottom:6px; text-transform:uppercase; }
  .modal-field input,.modal-field textarea,.modal-field select { width:100%; background:rgba(255,255,255,0.04); border:1px solid var(--hud-border); border-radius:3px; padding:10px 12px; color:var(--hud-text); font-family:'Rajdhani',sans-serif; font-size:14px; outline:none; transition:border-color 0.3s; }
  .modal-field input:focus,.modal-field textarea:focus,.modal-field select:focus { border-color:var(--hud-accent); }
  .modal-field textarea { resize:vertical; min-height:70px; }
  .modal-field select option { background:var(--hud-primary); color:var(--hud-text); }
  .modal-actions { display:flex; gap:10px; margin-top:20px; }
  .btn { flex:1; padding:10px 16px; border-radius:3px; font-family:'Orbitron',sans-serif; font-size:11px; font-weight:700; letter-spacing:2px; cursor:pointer; transition:all 0.3s; text-transform:uppercase; border:1px solid var(--hud-border); }
  .btn-primary { background:var(--hud-accent); color:var(--hud-primary); border-color:var(--hud-accent); }
  .btn-primary:hover { box-shadow:0 0 20px var(--hud-glow); }
  .btn-secondary { background:transparent; color:var(--hud-text); }
  .btn-secondary:hover { border-color:var(--hud-accent); }
  .modal-error { color:#ff5252; font-size:12px; font-family:'Share Tech Mono',monospace; margin-top:8px; display:none; }
  .modal-success { color:#00e676; font-size:12px; font-family:'Share Tech Mono',monospace; margin-top:8px; display:none; }

  /* TOASTS */
  #toast-container { position:fixed; top:56px; right:64px; z-index:300; display:flex; flex-direction:column; gap:8px; }
  .toast { background:var(--hud-bg); border:1px solid var(--hud-accent); border-radius:4px; padding:10px 16px; font-family:'Share Tech Mono',monospace; font-size:12px; color:var(--hud-text); backdrop-filter:blur(12px); box-shadow:0 0 20px rgba(0,0,0,0.4); animation:toast-in 0.3s ease forwards; max-width:320px; }
  .toast.fade-out { animation:toast-out 0.3s ease forwards; }
  @keyframes toast-in { from{opacity:0;transform:translateX(40px);} to{opacity:1;transform:translateX(0);} }
  @keyframes toast-out { from{opacity:1;} to{opacity:0;transform:translateX(40px);} }

  .signal-popup { font-family:'Rajdhani',sans-serif; color:#1a1a2e; min-width:200px; }
  .signal-popup .sp-title { font-weight:700; font-size:15px; margin-bottom:2px; }
  .signal-popup .sp-shop { font-size:11px; opacity:0.5; }
  .signal-popup .sp-price { font-weight:700; color:#cc8800; margin:4px 0; }
  .signal-popup .sp-desc { font-size:12px; opacity:0.7; margin-bottom:6px; }
  .signal-popup .sp-btn { display:inline-block; background:#e6a919; color:#1a1a2e; border:none; padding:5px 12px; border-radius:3px; font-family:'Orbitron',sans-serif; font-size:9px; font-weight:700; letter-spacing:1px; cursor:pointer; }
</style>

<script>
(function(){
'use strict';

// ═══════════════════════════════════════════
// SUPABASE
// ═══════════════════════════════════════════
const SB_URL='https://kzlabcrlrpbnfiiyrjvl.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt6bGFiY3JscnBibmZpaXlyanZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxNjg3OTAsImV4cCI6MjA4OTc0NDc5MH0.TyshChfsIkc-k357FGME-8TnZn-zxeD74jL-GYRVlkg';
const sb=supabase.createClient(SB_URL,SB_KEY);

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
const S={layer:1,coords:{lat:36.4,lon:28.22},user:null};

// ═══════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════
function toast(m){const c=document.getElementById('toast-container'),t=document.createElement('div');t.className='toast';t.textContent=m;c.appendChild(t);setTimeout(()=>{t.classList.add('fade-out');setTimeout(()=>t.remove(),300)},4000);}

// ═══════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════
let authMode='login';
const $=id=>document.getElementById(id);
function showAuth(){$('auth-modal').classList.add('active');$('auth-error').style.display='none';$('auth-success').style.display='none';}
function hideAuth(){$('auth-modal').classList.remove('active');}
function requireAuth(cb){if(S.user){cb();return;}showAuth();$('auth-modal')._cb=cb;}

$('auth-status').onclick=()=>{if(S.user){sb.auth.signOut();S.user=null;$('auth-status').textContent='LOGIN';toast('Logged out');}else showAuth();};
$('auth-cancel').onclick=hideAuth;
$('auth-toggle').onclick=()=>{authMode=authMode==='login'?'signup':'login';$('auth-modal-title').textContent=authMode==='login'?'LOGIN':'SIGN UP';$('auth-submit').textContent=authMode==='login'?'LOGIN':'SIGN UP';$('auth-toggle').textContent=authMode==='login'?'SIGN UP':'LOGIN';};

$('auth-submit').onclick=async()=>{
  const email=$('auth-email').value.trim(),pass=$('auth-pass').value;
  $('auth-error').style.display='none';$('auth-success').style.display='none';
  if(!email||!pass){$('auth-error').textContent='Email and password required';$('auth-error').style.display='block';return;}
  try{
    let r;
    if(authMode==='login') r=await sb.auth.signInWithPassword({email,password:pass});
    else r=await sb.auth.signUp({email,password:pass});
    if(r.error) throw r.error;
    if(authMode==='signup'){$('auth-success').textContent='Account created! Check email then login.';$('auth-success').style.display='block';return;}
    S.user=r.data.user;$('auth-status').textContent=email.split('@')[0].toUpperCase();
    toast('Logged in as '+email);hideAuth();
    if($('auth-modal')._cb){$('auth-modal')._cb();$('auth-modal')._cb=null;}
  }catch(e){$('auth-error').textContent=e.message;$('auth-error').style.display='block';}
};

sb.auth.getSession().then(({data})=>{if(data.session?.user){S.user=data.session.user;$('auth-status').textContent=data.session.user.email.split('@')[0].toUpperCase();}});
sb.auth.onAuthStateChange((_,session)=>{if(session?.user){S.user=session.user;$('auth-status').textContent=session.user.email.split('@')[0].toUpperCase();}else{S.user=null;$('auth-status').textContent='LOGIN';}});

// ═══════════════════════════════════════════
// CLOCK
// ═══════════════════════════════════════════
setInterval(()=>{$('clock').textContent=new Date().toUTCString().split(' ')[4]+' UTC';},1000);

// ═══════════════════════════════════════════
// LAYERS
// ═══════════════════════════════════════════
const scenes={1:$('scene-cosmic'),2:$('scene-terrestrial'),3:$('scene-abyssal')};
const lNames={1:'COSMIC',2:'TERRESTRIAL',3:'ABYSSAL'};
const lColors={1:{a:'#00b4ff',g:'#0077cc',t:'#c8e6ff',b:'rgba(0,180,255,0.25)',bg:'rgba(10,22,40,0.85)',p:'#0a1628'},2:{a:'#e6a919',g:'#cc8800',t:'#f0e6cc',b:'rgba(230,169,25,0.25)',bg:'rgba(26,26,46,0.85)',p:'#1a1a2e'},3:{a:'#00e5cc',g:'#009988',t:'#b0f0e6',b:'rgba(0,229,204,0.25)',bg:'rgba(4,26,26,0.85)',p:'#041a1a'}};

function switchLayer(n){
  if(n===S.layer)return;S.layer=n;
  Object.keys(scenes).forEach(k=>{scenes[k].style.opacity=+k===n?'1':'0';scenes[k].style.pointerEvents=+k===n?'auto':'none';});
  const c=lColors[n],r=document.documentElement;
  r.style.setProperty('--hud-accent',c.a);r.style.setProperty('--hud-glow',c.g);r.style.setProperty('--hud-text',c.t);r.style.setProperty('--hud-border',c.b);r.style.setProperty('--hud-bg',c.bg);r.style.setProperty('--hud-primary',c.p);
  $('layer-badge').textContent=lNames[n];
  const lb=$('layer-label');lb.textContent=lNames[n];lb.classList.remove('visible');void lb.offsetWidth;lb.classList.add('visible');
  document.querySelectorAll('.rail-btn[data-layer]').forEach(b=>b.classList.toggle('active',+b.dataset.layer===n));
  $('zoom-level-label').textContent='L'+n;$('zoom-thumb').style.top=((n-1)/2)*100+'%';
  if(n===2&&!mapInit)initMap();
  if(n===3&&!abyssInit)initAbyss();
}

document.querySelectorAll('.rail-btn[data-layer]').forEach(b=>b.onclick=()=>switchLayer(+b.dataset.layer));
$('btn-zoom-in').onclick=()=>{if(S.layer<3)switchLayer(S.layer+1);};
$('btn-zoom-out').onclick=()=>{if(S.layer>1)switchLayer(S.layer-1);};
$('btn-fs').onclick=()=>{if(!document.fullscreenElement)document.documentElement.requestFullscreen();else document.exitFullscreen();};
let sa=0;window.addEventListener('wheel',e=>{if(S.layer===2)return;sa+=e.deltaY;if(sa>300){sa=0;if(S.layer<3)switchLayer(S.layer+1);}if(sa<-300){sa=0;if(S.layer>1)switchLayer(S.layer-1);}},{passive:true});

// SEARCH
// ═══════════════════════════════════════════
const sPanel=$('search-panel'),sResults=$('search-results'),sTitle=$('search-panel-title');
$('search-close').onclick=()=>sPanel.classList.remove('open');

async function searchSignals(term){
  sTitle.textContent='SEARCHING...';sResults.innerHTML='';sPanel.classList.add('open');
  let data,error;
  ({data,error}=await sb.rpc('search_signals',{search_term:term}));
  if(error||!data||!data.length){
    ({data,error}=await sb.from('signals').select('*,shops(name)').or(`title.ilike.%${term}%,description.ilike.%${term}%,category.ilike.%${term}%`).eq('is_available',true).order('created_at',{ascending:false}).limit(50));
  }
  if(error){sResults.innerHTML='<div class="no-results">'+error.message+'</div>';sTitle.textContent='ERROR';return;}
  if(!data||!data.length){sResults.innerHTML='<div class="no-results">No results for "'+term+'"</div>';sTitle.textContent='0 RESULTS';return;}
  sTitle.textContent=data.length+' RESULT'+(data.length!==1?'S':'');
  const vm={};
  const ids=data.map(s=>s.id);
  const{data:vt}=await sb.from('votes').select('target_id,vote_type').in('target_id',ids);
  if(vt)vt.forEach(v=>{if(!vm[v.target_id])vm[v.target_id]={u:0,d:0};vm[v.target_id][v.vote_type==='up'?'u':'d']++;});
  renderCards(data,vm);
}

async function browseAll(){
  sTitle.textContent='LOADING...';sResults.innerHTML='';sPanel.classList.add('open');
  const{data,error}=await sb.from('signals').select('*,shops(name)').eq('is_available',true).order('created_at',{ascending:false}).limit(50);
  if(error){sResults.innerHTML='<div class="no-results">'+error.message+'</div>';return;}
  sTitle.textContent='MARKETPLACE — '+(data?.length||0)+' SIGNALS';
  const vm={};
  if(data?.length){const{data:vt}=await sb.from('votes').select('target_id,vote_type').in('target_id',data.map(s=>s.id));if(vt)vt.forEach(v=>{if(!vm[v.target_id])vm[v.target_id]={u:0,d:0};vm[v.target_id][v.vote_type==='up'?'u':'d']++;});}
  renderCards(data||[],vm);
}

function renderCards(data,vm){
  data.forEach(sig=>{
    const sn=sig.shops?.name||'',vc=vm[sig.id]||{u:0,d:0};
    const card=document.createElement('div');card.className='signal-card';
    card.innerHTML=`<div class="sc-category">${sig.category||''}</div><div class="sc-title">${sig.title}</div><div class="sc-shop">${sn}</div><div class="sc-desc">${sig.description||''}</div><div class="sc-meta"><span class="sc-price">${sig.price?'€'+parseFloat(sig.price).toFixed(2):'Free'}</span><span class="sc-votes">▲${vc.u} ▼${vc.d}</span></div>`;
    card.onclick=()=>{if(sig.location_lat&&sig.location_lon){switchLayer(2);setTimeout(()=>{if(leafletMap)leafletMap.setView([sig.location_lat,sig.location_lon],16);},500);}};
    sResults.appendChild(card);
  });
}

$('btn-marketplace').onclick=browseAll;

// ═══════════════════════════════════════════
// POST SIGNAL
// ═══════════════════════════════════════════
function showPost(){
  requireAuth(async()=>{
    $('post-modal').classList.add('active');$('post-error').style.display='none';$('post-success').style.display='none';
    const sel=$('post-shop');sel.innerHTML='<option value="">Loading...</option>';
    const{data:shops}=await sb.from('shops').select('id,name').eq('owner_id',S.user.id);
    sel.innerHTML='';
    if(!shops||!shops.length){sel.innerHTML='<option value="">No shops yet</option>';}
    else shops.forEach(s=>{const o=document.createElement('option');o.value=s.id;o.textContent=s.name;sel.appendChild(o);});
  });
}

$('btn-post').onclick=showPost;
$('post-cancel').onclick=()=>$('post-modal').classList.remove('active');

$('post-submit').onclick=async()=>{
  const shopId=$('post-shop').value,title=$('post-title').value.trim(),desc=$('post-desc').value.trim(),cat=$('post-category').value,price=parseFloat($('post-price').value)||0;
  $('post-error').style.display='none';$('post-success').style.display='none';
  if(!shopId){$('post-error').textContent='Select a shop';$('post-error').style.display='block';return;}
  if(!title){$('post-error').textContent='Title required';$('post-error').style.display='block';return;}
  const{data:shop}=await sb.from('shops').select('location_lat,location_lon').eq('id',shopId).single();
  const{error}=await sb.from('signals').insert({shop_id:shopId,author_id:S.user.id,title,description:desc,category:cat,price,currency:'EUR',location_lat:shop?.location_lat||S.coords.lat,location_lon:shop?.location_lon||S.coords.lon,is_available:true});
  if(error){$('post-error').textContent=error.message;$('post-error').style.display='block';return;}
  $('post-success').textContent='Signal published!';$('post-success').style.display='block';
  toast('Signal posted: '+title);
  $('post-title').value='';$('post-desc').value='';$('post-price').value='';
  setTimeout(()=>$('post-modal').classList.remove('active'),1500);
};

// ═══════════════════════════════════════════
// COMMAND BAR
// ═══════════════════════════════════════════
const cmd=$('cmd-input');
cmd.onkeydown=e=>{
  if(e.key==='Escape'){cmd.value='';cmd.blur();sPanel.classList.remove('open');}
  if(e.key==='Enter'){
    const v=cmd.value.trim();if(!v)return;const lo=v.toLowerCase();
    if(lo==='/layer 1'||lo==='/cosmic')switchLayer(1);
    else if(lo==='/layer 2'||lo==='/map')switchLayer(2);
    else if(lo==='/layer 3'||lo==='/deep')switchLayer(3);
    else if(lo==='/post')showPost();
    else if(lo==='/browse'||lo==='/marketplace')browseAll();
    else if(lo.startsWith('/goto ')){const p=lo.replace('/goto ','').split(/[,\s]+/);if(p.length>=2){S.coords.lat=+p[0];S.coords.lon=+p[1];if(leafletMap)leafletMap.setView([S.coords.lat,S.coords.lon],14);switchLayer(2);}}
    else if(lo==='/help')toast('/post /browse /goto lat,lon /layer 1-3 /cosmic /map /deep — or just type to search');
    else searchSignals(v);
    cmd.value='';
  }
};

window.onkeydown=e=>{
  const ae=document.activeElement;if(ae===cmd||ae.tagName==='INPUT'||ae.tagName==='TEXTAREA'||ae.tagName==='SELECT')return;
  if(e.key==='1')switchLayer(1);if(e.key==='2')switchLayer(2);if(e.key==='3')switchLayer(3);
  if(e.key==='/'){e.preventDefault();cmd.focus();}
};

// ═══════════════════════════════════════════
// LEAFLET — TERRESTRIAL (LIVE DATA)
// ═══════════════════════════════════════════
let leafletMap=null,mapInit=false;
const mG={shops:null,signals:null,drivers:null};

async function initMap(){
  if(mapInit)return;mapInit=true;
  leafletMap=L.map('map-container',{center:[S.coords.lat,S.coords.lon],zoom:13,zoomControl:false});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(leafletMap);
  mG.shops=L.layerGroup().addTo(leafletMap);mG.signals=L.layerGroup().addTo(leafletMap);mG.drivers=L.layerGroup().addTo(leafletMap);
  leafletMap.on('moveend',()=>{const c=leafletMap.getCenter();$('coord-display').textContent='LAT '+c.lat.toFixed(4)+' LON '+c.lng.toFixed(4);});
  await loadMap();setTimeout(()=>leafletMap.invalidateSize(),300);
}

async function loadMap(){
  // Shops
  const{data:shops}=await sb.from('shops').select('*').eq('is_active',true);
  if(shops){mG.shops.clearLayers();shops.forEach(s=>{if(!s.location_lat||!s.location_lon)return;
    const ic={diving:'🤿',food:'🍕',salon:'💇',wellness:'🧘',photography:'📷',shop:'🛍'}[s.category]||'🏪';
    L.circleMarker([s.location_lat,s.location_lon],{radius:10,fillColor:'#e6a919',color:'#cc8800',weight:2,opacity:0.9,fillOpacity:0.7})
    .bindPopup(`<div class="signal-popup"><div class="sp-title">${ic} ${s.name}</div><div class="sp-desc">${s.description||''}</div><div class="sp-shop">${s.address||''}</div><div style="margin-top:6px;font-size:11px">⭐ ${s.rating} (${s.rating_count})</div></div>`)
    .addTo(mG.shops);});}

  // Signals
  const{data:sigs}=await sb.from('signals').select('*,shops(name)').eq('is_available',true);
  if(sigs){mG.signals.clearLayers();sigs.forEach(sig=>{if(!sig.location_lat||!sig.location_lon)return;
    L.circleMarker([sig.location_lat,sig.location_lon],{radius:6,fillColor:'#00e5cc',color:'#009988',weight:1.5,opacity:0.8,fillOpacity:0.6})
    .bindPopup(`<div class="signal-popup"><div class="sp-title">${sig.title}</div><div class="sp-shop">${sig.shops?.name||''}</div><div class="sp-price">${sig.price?'€'+parseFloat(sig.price).toFixed(2):'Free'}</div><div class="sp-desc">${sig.description||''}</div><button class="sp-btn" onclick="window._order('${sig.id}')">ORDER</button></div>`)
    .addTo(mG.signals);});}

  // Drivers
  const{data:drvs}=await sb.from('drivers').select('*,users(display_name)').eq('is_available',true);
  if(drvs){mG.drivers.clearLayers();drvs.forEach(d=>{if(!d.current_lat||!d.current_lon)return;
    const vi={car:'🚗',bike:'🏍',boat:'🚤'}[d.vehicle_type]||'🚗';
    L.circleMarker([d.current_lat,d.current_lon],{radius:6,fillColor:'#00e676',color:'#00c853',weight:2,opacity:1,fillOpacity:0.9})
    .bindPopup(`<div class="signal-popup"><div class="sp-title">${vi} ${d.users?.display_name||'Driver'}</div><div class="sp-shop">⭐ ${d.rating} · ${d.total_deliveries} deliveries</div></div>`)
    .addTo(mG.drivers);});}
}

window._order=id=>{requireAuth(()=>toast('Order flow coming — signal '+id.substring(0,8)));};

let abyssInit=false;
function initAbyss(){
  if(abyssInit)return;abyssInit=true;
  const cv=$('abyss-canvas'),aR=new THREE.WebGLRenderer({canvas:cv,antialias:true,alpha:true});
  aR.setSize(innerWidth,innerHeight);aR.setPixelRatio(Math.min(devicePixelRatio,2));aR.setClearColor(0x041a1a,1);
  const aS=new THREE.Scene(),aC2=new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.1,1000);aC2.position.z=5;
  const i1=new THREE.Mesh(new THREE.IcosahedronGeometry(1.5,1),new THREE.MeshBasicMaterial({color:0x00e5cc,wireframe:true,transparent:true,opacity:0.4}));aS.add(i1);
  const i2=new THREE.Mesh(new THREE.IcosahedronGeometry(0.8,2),new THREE.MeshBasicMaterial({color:0x009988,wireframe:true,transparent:true,opacity:0.2}));aS.add(i2);
  const pG2=new THREE.BufferGeometry(),pP2=new Float32Array(3000*3);for(let i=0;i<3000;i++){pP2[i*3]=(Math.random()-0.5)*20;pP2[i*3+1]=(Math.random()-0.5)*20;pP2[i*3+2]=(Math.random()-0.5)*20;}
  pG2.setAttribute('position',new THREE.BufferAttribute(pP2,3));aS.add(new THREE.Points(pG2,new THREE.PointsMaterial({color:0x00e5cc,size:0.04,transparent:true,opacity:0.5})));
  const ring=new THREE.Mesh(new THREE.TorusGeometry(2.5,0.01,8,100),new THREE.MeshBasicMaterial({color:0x009988,transparent:true,opacity:0.3}));ring.rotation.x=Math.PI/2;aS.add(ring);
  let at2=0;(function aA(){requestAnimationFrame(aA);at2+=0.003;i1.rotation.x=at2*0.5;i1.rotation.y=at2*0.3;i2.rotation.x=-at2*0.3;i2.rotation.y=at2*0.5;ring.rotation.z=at2*0.1;aC2.position.x=Math.sin(at2*0.2)*0.5;aC2.position.y=Math.cos(at2*0.15)*0.3;aC2.lookAt(0,0,0);aR.render(aS,aC2);})();
  window.addEventListener('resize',()=>{aC2.aspect=innerWidth/innerHeight;aC2.updateProjectionMatrix();aR.setSize(innerWidth,innerHeight);});
}
