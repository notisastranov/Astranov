<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Astranov Signal Operating System</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap");

    :root {
      --bg-0: #02050b;
      --bg-1: #07111a;
      --bg-2: #12273e;
      --surface: rgba(10, 16, 24, 0.76);
      --surface-strong: rgba(11, 18, 28, 0.9);
      --border: rgba(28, 216, 255, 0.14);
      --electric: #16d9ff;
      --electric-strong: #9ff6ff;
      --electric-soft: rgba(22, 217, 255, 0.1);
      --anchor: #4df2c8;
      --presence: #b4f9ff;
      --cloud: #41c6ff;
      --text: #edf2f7;
      --muted: #97a9bb;
      --font-ui: "Inter", system-ui, sans-serif;
      --font-tech: "Inter", system-ui, sans-serif;
      --safe-top: max(14px, env(safe-area-inset-top));
      --safe-right: max(14px, env(safe-area-inset-right));
      --safe-bottom: max(14px, env(safe-area-inset-bottom));
      --safe-left: max(14px, env(safe-area-inset-left));
      --wheel-size: clamp(136px, 32vw, 168px);
      --top-bar-height: 52px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: var(--font-ui);
      color: var(--text);
      background:
        radial-gradient(circle at 50% 14%, rgba(20, 39, 58, 0.14), transparent 30%),
        radial-gradient(circle at 18% 16%, rgba(255, 255, 255, 0.03), transparent 18%),
        linear-gradient(180deg, #05101a 0%, #02060c 64%, #010206 100%);
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    body::before {
      background: radial-gradient(circle at 50% 55%, rgba(255, 255, 255, 0.028), transparent 60%);
      opacity: 0.22;
    }

    body::after {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent 18%);
      opacity: 0.16;
    }

    button,
    input {
      font: inherit;
    }

    #app,
    #scene,
    #overlay,
    #connectorSvg,
    #signalLayer {
      position: fixed;
      inset: 0;
    }

    #scene canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #connectorSvg {
      z-index: 6;
      overflow: visible;
      pointer-events: none;
    }

    #signalLayer {
      z-index: 7;
      pointer-events: none;
    }

    #overlay {
      z-index: 12;
      pointer-events: none;
    }

    #topBar {
      position: absolute;
      top: var(--safe-top);
      left: var(--safe-left);
      right: var(--safe-right);
      display: grid;
      grid-template-columns: 48px minmax(0, 1fr) 48px;
      gap: 10px;
      align-items: center;
      pointer-events: auto;
      z-index: 14;
    }

    .top-btn {
      min-width: 0;
      height: var(--top-bar-height);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 12px;
      border: 1px solid rgba(22, 217, 255, 0.16);
      border-radius: 16px;
      background:
        linear-gradient(180deg, rgba(17, 24, 33, 0.9), rgba(11, 17, 24, 0.7)),
        radial-gradient(circle at 50% 0%, rgba(22, 217, 255, 0.1), transparent 54%);
      box-shadow:
        0 12px 30px rgba(0, 0, 0, 0.24),
        0 0 16px rgba(22, 217, 255, 0.06),
        inset 0 0 0 1px rgba(255, 255, 255, 0.02);
      color: var(--text);
      backdrop-filter: blur(14px);
      cursor: pointer;
      transition: transform 0.16s ease, border-color 0.16s ease, box-shadow 0.16s ease;
    }

    .top-btn:active {
      transform: scale(0.97);
    }

    .top-btn:hover,
    .top-btn[data-open="true"] {
      border-color: rgba(22, 217, 255, 0.3);
      box-shadow:
        0 16px 36px rgba(0, 0, 0, 0.34),
        0 0 28px rgba(22, 217, 255, 0.14),
        inset 0 0 0 1px rgba(255, 255, 255, 0.03);
    }

    .top-btn.avatar,
    .top-btn.wallet {
      padding: 0;
      width: 48px;
    }

    .top-btn.system {
      justify-content: center;
      padding: 0 14px;
    }

    .top-btn-icon {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.06);
      color: #ecf3fb;
      font-size: 12px;
      font-weight: 600;
    }

    .avatar-photo {
      width: 28px;
      height: 28px;
      display: block;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background:
        radial-gradient(circle at 50% 34%, #f9ddc5 0 24%, transparent 25%),
        radial-gradient(circle at 50% 78%, #cda185 0 28%, transparent 29%),
        linear-gradient(180deg, #6f7f91 0%, #243342 100%);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
    }

    .top-btn-stack {
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 1.05;
    }

    .top-btn-title {
      font-family: var(--font-tech);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: #e9fbff;
    }

    .top-btn-sub {
      margin-top: 3px;
      font-size: 10px;
      color: var(--muted);
      white-space: nowrap;
    }

    #topPanel {
      position: absolute;
      top: calc(var(--safe-top) + var(--top-bar-height) + 10px);
      width: min(86vw, 340px);
      opacity: 0;
      pointer-events: none;
      transform: translateY(-8px) scale(0.98);
      transition: opacity 0.18s ease, transform 0.18s ease;
      z-index: 15;
    }

    #topPanel[data-open="true"] {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0) scale(1);
    }

    #topPanel[data-position="left"] {
      left: var(--safe-left);
    }

    #topPanel[data-position="center"] {
      left: 50%;
      transform: translateX(-50%) translateY(-8px) scale(0.98);
    }

    #topPanel[data-open="true"][data-position="center"] {
      transform: translateX(-50%) translateY(0) scale(1);
    }

    #topPanel[data-position="right"] {
      right: var(--safe-right);
    }

    .top-panel-shell {
      display: grid;
      gap: 12px;
      padding: 14px;
      border: 1px solid rgba(22, 217, 255, 0.16);
      border-radius: 20px;
      background:
        linear-gradient(180deg, rgba(18, 25, 34, 0.94), rgba(11, 17, 24, 0.86)),
        radial-gradient(circle at 50% 0%, rgba(22, 217, 255, 0.08), transparent 58%);
      box-shadow:
        0 24px 56px rgba(0, 0, 0, 0.4),
        0 0 28px rgba(22, 217, 255, 0.1);
      backdrop-filter: blur(16px);
    }

    .top-panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .top-panel-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #ebfbff;
    }

    .top-panel-sub {
      font-size: 11px;
      color: var(--muted);
    }

    .top-panel-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .top-panel-metric {
      min-width: 0;
      padding: 9px 10px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.035);
    }

    .top-panel-label {
      display: block;
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 8px;
      letter-spacing: 0.04em;
      text-transform: none;
    }

    .top-panel-value {
      display: block;
      color: #eefcff;
      font-size: 12px;
      line-height: 1.2;
    }

    .top-panel-actions {
      display: flex;
      gap: 8px;
    }

    .top-panel-btn {
      flex: 1;
      padding: 11px 12px;
      border: 1px solid rgba(22, 217, 255, 0.16);
      border-radius: 13px;
      background: rgba(22, 217, 255, 0.08);
      color: #f0fcff;
      font-family: var(--font-tech);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
    }

    .hud-wheel {
      --wheel-scale: 1;
      position: absolute;
      width: var(--wheel-size);
      height: var(--wheel-size);
      display: block;
      border: 1px solid var(--border);
      border-radius: 50%;
      overflow: hidden;
      pointer-events: auto;
      background:
        radial-gradient(circle at 50% 40%, rgba(255, 255, 255, 0.06), rgba(22, 217, 255, 0.03) 44%, transparent 68%),
        linear-gradient(180deg, rgba(17, 24, 33, 0.9), rgba(11, 17, 24, 0.78));
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.03) inset,
        0 0 18px rgba(22, 217, 255, 0.06),
        0 16px 34px rgba(0, 0, 0, 0.26);
      backdrop-filter: blur(14px);
      transition: transform 0.16s ease, border-color 0.16s ease, box-shadow 0.16s ease;
    }

    .hud-wheel.left {
      left: var(--safe-left);
    }

    .hud-wheel.right {
      right: var(--safe-right);
    }

    .hud-wheel::before,
    .hud-wheel::after {
      content: "";
      position: absolute;
      border-radius: 50%;
    }

    .hud-wheel::before {
      inset: 10px;
      border: 1px solid rgba(22, 217, 255, 0.16);
    }

    .hud-wheel::after {
      inset: 19px;
      border: 1px solid rgba(22, 217, 255, 0.08);
    }

    .hud-wheel[data-active="true"] {
      border-color: rgba(22, 217, 255, 0.32);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.03) inset,
        0 0 20px rgba(22, 217, 255, 0.1),
        0 18px 36px rgba(0, 0, 0, 0.32);
    }

    .hud-wheel.dragging,
    .hud-wheel.resizing {
      border-color: rgba(22, 217, 255, 0.42);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.04) inset,
        0 0 26px rgba(22, 217, 255, 0.14),
        0 20px 40px rgba(0, 0, 0, 0.36);
    }

    .wheel-content {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 120px;
      height: 120px;
      transform: translate(-50%, -50%) scale(var(--wheel-scale));
      transform-origin: center;
    }

    .wheel-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .wheel-meta {
      position: absolute;
      bottom: 8px;
      width: 100%;
      padding: 0 12px;
      color: var(--muted);
      font-size: 8px;
      letter-spacing: 0.08em;
      text-align: center;
      text-transform: none;
      white-space: nowrap;
    }

    .wheel-stat {
      position: absolute;
      color: #dffaff;
      font-size: 7px;
      font-weight: 600;
      letter-spacing: 0.04em;
      line-height: 1.15;
      text-transform: none;
      text-align: center;
      white-space: nowrap;
      text-shadow: 0 0 10px rgba(22, 217, 255, 0.26);
    }

    .wheel-stat small {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 7px;
      letter-spacing: 0.08em;
    }

    .wheel-stat.north {
      top: 15px;
      left: 50%;
      transform: translateX(-50%);
    }

    .wheel-stat.west {
      top: 44px;
      left: 8px;
      text-align: left;
    }

    .wheel-stat.east {
      top: 44px;
      right: 8px;
      text-align: right;
    }

    .wheel-stat.south {
      bottom: 26px;
      left: 50%;
      transform: translateX(-50%);
    }

    .wheel-center-btn {
      z-index: 2;
      position: absolute;
      left: 50%;
      top: 50%;
      width: 48px;
      height: 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1px;
      transform: translate(-50%, -50%);
      border: 1px solid rgba(22, 217, 255, 0.26);
      border-radius: 50%;
      background: rgba(4, 18, 31, 0.9);
      box-shadow:
        inset 0 0 18px rgba(22, 217, 255, 0.1),
        0 0 18px rgba(22, 217, 255, 0.16);
      color: #eefcff;
      cursor: pointer;
    }

    .wheel-center-btn:active {
      transform: translate(-50%, -50%) scale(0.96);
    }

    .wheel-center-label {
      font-size: 8px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: none;
    }

    .wheel-center-value {
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .perf-wheel .wheel-center-btn.active {
      border-color: rgba(77, 242, 200, 0.28);
      box-shadow:
        inset 0 0 18px rgba(77, 242, 200, 0.1),
        0 0 20px rgba(77, 242, 200, 0.16);
    }

    .wheel-resize-grip {
      position: absolute;
      right: 10px;
      bottom: 10px;
      width: 24px;
      height: 24px;
      border: 1px solid rgba(22, 217, 255, 0.16);
      border-radius: 50%;
      background: rgba(10, 18, 26, 0.86);
      box-shadow: 0 0 14px rgba(22, 217, 255, 0.12);
      cursor: nwse-resize;
    }

    .wheel-resize-grip::before,
    .wheel-resize-grip::after {
      content: "";
      position: absolute;
      background: rgba(234, 252, 255, 0.72);
      border-radius: 999px;
    }

    .wheel-resize-grip::before {
      left: 7px;
      top: 11px;
      width: 10px;
      height: 2px;
      transform: rotate(-38deg);
    }

    .wheel-resize-grip::after {
      left: 10px;
      top: 7px;
      width: 2px;
      height: 10px;
      transform: rotate(-38deg);
    }

    #radarSweep {
      transform-origin: 60px 60px;
    }

    .radar-compass {
      fill: #8daac0;
      font-size: 6px;
      letter-spacing: 0.04em;
      text-transform: none;
    }

    #composer {
      position: absolute;
      left: var(--safe-left);
      right: var(--safe-right);
      bottom: var(--safe-bottom);
      min-height: 72px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 8px 8px;
      border: 1px solid rgba(22, 217, 255, 0.16);
      border-radius: 24px;
      background:
        linear-gradient(180deg, rgba(18, 25, 34, 0.92), rgba(11, 17, 24, 0.8)),
        radial-gradient(circle at 50% -18%, rgba(22, 217, 255, 0.08), transparent 46%);
      box-shadow:
        0 20px 44px rgba(0, 0, 0, 0.28),
        0 0 18px rgba(22, 217, 255, 0.08),
        inset 0 0 0 1px rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(16px);
      pointer-events: auto;
    }

    #composerField {
      position: relative;
      flex: 1;
      min-width: 0;
      padding-top: 18px;
    }

    .composer-btn {
      width: 48px;
      height: 48px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      border: 1px solid rgba(22, 217, 255, 0.14);
      border-radius: 17px;
      background: rgba(255, 255, 255, 0.045);
      color: #ddeaf8;
      cursor: pointer;
      transition: transform 0.16s ease, border-color 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
    }

    .composer-btn:active {
      transform: scale(0.96);
    }

    .composer-btn[data-active="true"] {
      border-color: rgba(22, 217, 255, 0.38);
      background:
        radial-gradient(circle at 50% 35%, rgba(22, 217, 255, 0.26), rgba(22, 217, 255, 0.08) 65%),
        rgba(22, 217, 255, 0.08);
      box-shadow: 0 0 24px rgba(22, 217, 255, 0.2);
      animation: listenPulse 1.5s ease-in-out infinite;
    }

    #query {
      flex: 1;
      width: 100%;
      height: 50px;
      padding: 0 16px;
      border: 1px solid rgba(22, 217, 255, 0.12);
      border-radius: 17px;
      outline: none;
      background: rgba(255, 255, 255, 0.045);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.02);
      color: var(--text);
      font-size: 16px;
      transition: border-color 0.16s ease, box-shadow 0.16s ease, transform 0.16s ease;
    }

    #addBtn {
      position: absolute;
      top: -2px;
      right: 8px;
      min-width: 56px;
      height: 30px;
      padding: 0 12px;
      border: 1px solid rgba(22, 217, 255, 0.14);
      border-radius: 999px;
      background: rgba(22, 217, 255, 0.08);
      color: #ebf6ff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      line-height: 1;
      display: grid;
      place-items: center;
      cursor: pointer;
      text-transform: uppercase;
    }

    #query::placeholder {
      color: #7e9bb0;
    }

    #query:focus {
      border-color: rgba(22, 217, 255, 0.34);
      box-shadow:
        0 0 0 1px rgba(22, 217, 255, 0.12),
        0 0 18px rgba(22, 217, 255, 0.08);
    }

    #query.no-match {
      border-color: rgba(255, 116, 156, 0.38);
      box-shadow: 0 0 0 1px rgba(255, 116, 156, 0.14);
      transform: translateX(-2px);
    }
    .signal-popup {
      position: absolute;
      width: min(84vw, 340px);
      min-width: min(78vw, 236px);
      border: 1px solid rgba(22, 217, 255, 0.14);
      border-radius: 22px;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(18, 24, 33, 0.96), rgba(11, 16, 23, 0.88)),
        radial-gradient(circle at 16% -10%, rgba(22, 217, 255, 0.08), transparent 46%);
      box-shadow:
        0 22px 46px rgba(0, 0, 0, 0.32),
        0 0 16px rgba(22, 217, 255, 0.08),
        inset 0 0 0 1px rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(18px);
      opacity: 0;
      transform: scale(0.72);
      pointer-events: none;
      will-change: left, top, opacity, transform;
    }

    .signal-popup::before,
    .signal-popup::after {
      content: "";
      position: absolute;
      pointer-events: none;
    }

    .signal-popup::before {
      inset: 0;
      background:
        linear-gradient(140deg, transparent 0%, rgba(255, 255, 255, 0.04) 22%, transparent 46%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.024), transparent 28%);
    }

    .signal-popup::after {
      width: 58%;
      aspect-ratio: 1;
      right: -12%;
      bottom: -42%;
      border-radius: 50%;
      background: radial-gradient(circle, var(--popup-glow), transparent 72%);
      filter: blur(20px);
    }

    .signal-popup.anchor {
      --popup-accent: var(--anchor);
      --popup-glow: rgba(77, 242, 200, 0.22);
    }

    .signal-popup.presence {
      --popup-accent: var(--presence);
      --popup-glow: rgba(180, 249, 255, 0.22);
    }

    .signal-popup.cloud {
      --popup-accent: var(--cloud);
      --popup-glow: rgba(65, 198, 255, 0.24);
      background:
        linear-gradient(180deg, rgba(18, 24, 33, 0.96), rgba(11, 16, 23, 0.88)),
        radial-gradient(circle at 78% 0%, rgba(65, 198, 255, 0.1), transparent 34%);
    }

    .signal-popup[data-state="ghost"] {
      filter: saturate(0.86);
    }

    .signal-popup.armed {
      border-color: rgba(22, 217, 255, 0.32);
      box-shadow:
        0 28px 60px rgba(0, 0, 0, 0.44),
        0 0 34px rgba(22, 217, 255, 0.2),
        inset 0 0 0 1px rgba(255, 255, 255, 0.03);
    }

    .popup-shell {
      position: relative;
      display: grid;
      gap: 12px;
      padding: 16px;
    }

    .popup-shell::before {
      content: "";
      position: absolute;
      left: 16px;
      right: 16px;
      top: 0;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, var(--popup-accent), transparent);
      box-shadow: 0 0 18px var(--popup-glow);
    }

    .popup-shell::after {
      content: "";
      position: absolute;
      inset: 12px;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.04);
      pointer-events: none;
    }

    .signal-popup.presence .popup-shell::after {
      border-color: rgba(180, 249, 255, 0.08);
    }

    .signal-popup.cloud .popup-shell::after {
      border-color: rgba(65, 198, 255, 0.1);
    }

    .popup-head,
    .popup-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .popup-kind,
    .popup-capability,
    .popup-region,
    .metric-label {
      font-family: var(--font-tech);
    }

    .popup-kind,
    .popup-capability,
    .popup-region {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
      padding: 5px 9px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      font-size: 10px;
      line-height: 1;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .popup-kind {
      background: rgba(255, 255, 255, 0.05);
      color: #effbff;
    }

    .popup-capability {
      max-width: 52%;
      overflow: hidden;
      text-overflow: ellipsis;
      background: var(--popup-glow);
      color: var(--popup-accent);
    }

    .popup-title {
      margin: 0;
      color: #eefcff;
      font-size: 17px;
      line-height: 1.04;
      letter-spacing: 0.01em;
    }

    .popup-summary {
      margin: 0;
      color: #c6d4e2;
      font-size: 12px;
      line-height: 1.5;
    }

    .popup-media {

      function latLngToVector3(lat, lng, radius) {
        const phi = (90 - lat) * (Math.PI / 180);
        const theta = (lng + 180) * (Math.PI / 180);
        return new THREE.Vector3(
          -(radius * Math.sin(phi) * Math.cos(theta)),
          radius * Math.cos(phi),
          radius * Math.sin(phi) * Math.sin(theta)
        );
      }

      function vectorToLatLng(vector) {
        const normal = vector.clone().normalize();
        return {
          lat: THREE.MathUtils.radToDeg(Math.asin(normal.y)),
          lng: THREE.MathUtils.radToDeg(Math.atan2(normal.z, -normal.x)) - 90
        };
      }

      function worldNormal(localVector) {
        return localVector.clone().normalize().applyQuaternion(globeGroup.quaternion);
      }

      function screenPoint(worldVector) {
        const projected = worldVector.clone().project(camera);
        return {
          x: (projected.x * 0.5 + 0.5) * appState.width,
          y: (-projected.y * 0.5 + 0.5) * appState.height,
          z: projected.z
        };
      }

      function globeCenterScreen() {
        return screenPoint(zero.clone().applyMatrix4(globeGroup.matrixWorld));
      }

      function directionFromGlobe(point, center) {
        const dx = point.x - center.x;
        const dy = point.y - center.y;
        const length = Math.hypot(dx, dy);
        return length < 1 ? { x: point.x < appState.width * 0.5 ? -0.92 : 0.92, y: -0.18 } : { x: dx / length, y: dy / length };
      }

      function rectEdgePoint(cx, cy, hw, hh, tx, ty) {
        const dx = tx - cx;
        const dy = ty - cy;
        const scale = 1 / Math.max(Math.abs(dx) / hw || 0, Math.abs(dy) / hh || 0, 1);
        return { x: cx + dx * scale, y: cy + dy * scale };
      }

      function cubicPoint(t, p0, p1, p2, p3) {
        const inv = 1 - t;
        return {
          x: inv * inv * inv * p0.x + 3 * inv * inv * t * p1.x + 3 * inv * t * t * p2.x + t * t * t * p3.x,
          y: inv * inv * inv * p0.y + 3 * inv * inv * t * p1.y + 3 * inv * t * t * p2.y + t * t * t * p3.y
        };
      }

      function rotationForSignal(state) {
        const target = state.local.clone().normalize();
        const lon = Math.atan2(target.z, -target.x);
        const lat = Math.asin(target.y);
        return { x: clamp(lat * 0.5, -0.72, 0.72), y: -(lon - Math.PI / 2) };
      }

      function arcPath(cx, cy, radius, startAngle, endAngle) {
        const start = {
          x: cx + radius * Math.cos(startAngle),
          y: cy + radius * Math.sin(startAngle)
        };
        const end = {
          x: cx + radius * Math.cos(endAngle),
          y: cy + radius * Math.sin(endAngle)
        };
        const largeArc = endAngle - startAngle <= Math.PI ? 0 : 1;
        return `M ${start.x.toFixed(2)} ${start.y.toFixed(2)} A ${radius} ${radius} 0 ${largeArc} 1 ${end.x.toFixed(2)} ${end.y.toFixed(2)}`;
      }

      function focusableSignalState() {
        if (appState.activeId && signalStates.has(appState.activeId)) return signalStates.get(appState.activeId);
        if (appState.previewId && signalStates.has(appState.previewId)) return signalStates.get(appState.previewId);
        const center = globeCenterScreen();
        const nearest = [...signalStates.values()]
          .filter((state) => frontFacing(state))
          .map((state) => {
            const point = screenPoint(state.world);
            return { state, score: Math.hypot(point.x - center.x, point.y - center.y) };
          })
          .sort((a, b) => a.score - b.score)[0];
        return nearest ? nearest.state : null;
      }

      function ensureFocusSignal() {
        const state = focusableSignalState();
        if (!state) return null;
        if (appState.activeId !== state.signal.id) setActiveSignal(state.signal.id, false);
        return signalStates.get(state.signal.id);
      }

      function applyHudLayout() {

        const peakLoad = Math.max(appState.device.load, focusLoad, droneLoad);

      function updateRadarHud(now) {
        appState.radarAngle = (appState.radarAngle + 0.03) % (Math.PI * 2);
        radarSweep.setAttribute("transform", `rotate(${THREE.MathUtils.radToDeg(appState.radarAngle).toFixed(2)} 60 60)`);
        const center = globeCenterScreen();
        const pips = [
          `<circle cx="60" cy="60" r="2.1" fill="#d9fbff" fill-opacity="0.82"></circle>`
        ];
        let visibleCount = 0;
        signalStates.forEach((state) => {
          if (!frontFacing(state)) return;
          visibleCount += 1;
          const point = screenPoint(state.world);
          const dx = clamp((point.x - center.x) / (appState.width * 0.24), -1, 1);
          const dy = clamp((point.y - center.y) / (appState.height * 0.24), -1, 1);
          const driftX = Math.cos(now * 0.0014 + state.pulsePhase * 1.7) * (state.signal.type === "presence" ? 1.9 : 0.8);
          const driftY = Math.sin(now * 0.0011 + state.pulsePhase * 1.4) * (state.signal.type === "presence" ? 1.9 : 0.8);
          const x = clamp(60 + dx * 24 + driftX, 12, 108);
          const y = clamp(60 + dy * 24 + driftY, 12, 108);
          const angle = Math.atan2(y - 60, x - 60);
          const sweepDelta = Math.abs(wrapAngle(angle - (appState.radarAngle - Math.PI / 2)));
          const sweepEcho = clamp(1 - sweepDelta / 0.42, 0, 1);
          const active = state.signal.id === appState.activeId;
          const radius = active ? 4.2 : state.signal.type === "cloud" ? 3 : 2.2 + sweepEcho * 1.6;
          const accent = typeHex(state.signal.type);

          if (sweepEcho > 0.04) {
            pips.push(`<circle cx="${x.toFixed(2)}" cy="${y.toFixed(2)}" r="${(radius + 4 + sweepEcho * 4.5).toFixed(2)}" fill="none" stroke="${accent}" stroke-opacity="${(0.08 + sweepEcho * 0.34).toFixed(2)}" stroke-width="1"></circle>`);
          }
          if (state.signal.type === "presence") {
            pips.push(`<line x1="${(x - dx * 5).toFixed(2)}" y1="${(y - dy * 5).toFixed(2)}" x2="${x.toFixed(2)}" y2="${y.toFixed(2)}" stroke="${accent}" stroke-opacity="${(0.2 + sweepEcho * 0.3).toFixed(2)}" stroke-width="1.1" stroke-linecap="round"></line>`);
          }
          pips.push(`<circle cx="${x.toFixed(2)}" cy="${y.toFixed(2)}" r="${radius.toFixed(2)}" fill="${accent}" fill-opacity="${active ? "1" : (0.46 + sweepEcho * 0.42).toFixed(2)}"></circle>`);
          pips.push(`<circle cx="${x.toFixed(2)}" cy="${y.toFixed(2)}" r="${(radius * 0.42).toFixed(2)}" fill="#effcff" fill-opacity="${active ? "0.92" : "0.54"}"></circle>`);
        });
        radarPips.innerHTML = pips.join("");
        radarMeta.textContent = visibleCount ? `${visibleCount} live around view` : "scanning";
        radarFetchValue.textContent = appState.zoomTarget > 0.08 ? `${Math.round(appState.zoomTarget * 100)}%` : "World";
        radarWheel.dataset.active = "true";
      }

      function refreshDeviceTelemetry() {
        const platformSource = navigator.userAgentData?.platform || navigator.platform || "web shell";
        const isPhone = /iphone|android|mobile/i.test(navigator.userAgent) || Math.min(window.innerWidth, window.innerHeight) < 720;
        appState.device.platform = isPhone ? "phone shell" : platformSource.toLowerCase();
        appState.device.cpu = navigator.hardwareConcurrency ? `${navigator.hardwareConcurrency}c` : "cpu hook";
        appState.device.ram = navigator.deviceMemory ? `${navigator.deviceMemory}gb` : "ram hook";
        appState.device.network = navigator.connection?.effectiveType ? `${navigator.connection.effectiveType} net` : "network hook";
        appState.device.thermal = "web estimate";

        if (navigator.storage?.estimate) {
          navigator.storage.estimate().then((estimate) => {
            if (!estimate.quota) return;
            appState.device.storage = `${Math.round(estimate.quota / 1073741824)}gb store`;
          }).catch(() => {
            appState.device.storage = "storage hook";
          });
        } else {
          appState.device.storage = "storage hook";
        }

        if (navigator.getBattery) {
          navigator.getBattery().then((battery) => {
            appState.device.battery = `${Math.round(battery.level * 100)}% pwr`;
          }).catch(() => {
            appState.device.battery = "power hook";
          });
        }
      }

            </div>
            ${products}
            <div class="popup-grid">${metrics}</div>
            <div class="popup-foot">
              <span class="popup-region">${signal.region}</span>
              <button class="popup-action" type="button">${signal.actionLabel}</button>
            </div>
          </div>
        `;
      }

      function createPopup(signal) {
        const popup = document.createElement("article");
        popup.className = `signal-popup ${signal.type}`;
        popup.dataset.signalId = signal.id;
        popup.innerHTML = popupMarkup(signal);
        popup.addEventListener("pointerdown", (event) => event.stopPropagation());
        popup.addEventListener("click", (event) => {
          event.stopPropagation();
          setActiveSignal(signal.id, true);
        });
        const actionButton = popup.querySelector(".popup-action");
        actionButton.addEventListener("click", (event) => {
          event.stopPropagation();
          const state = signalStates.get(signal.id);
          if (!state) return;
          state.armed = !state.armed;
          actionButton.textContent = state.armed ? signal.armedLabel : signal.actionLabel;
          popup.classList.toggle("armed", state.armed);
          setActiveSignal(signal.id, true);
        });
        signalLayer.appendChild(popup);
        return popup;
      }

      function addAnchorVisual(state) {
        const ring = new THREE.Mesh(
          new THREE.TorusGeometry(0.13, 0.01, 10, 44),
          new THREE.MeshBasicMaterial({ color: 0x4df2c8, transparent: true, opacity: 0.78, depthWrite: false })
        );
        ring.rotation.x = Math.PI / 2;
        const shaft = new THREE.Mesh(
          new THREE.CylinderGeometry(0.012, 0.012, 0.18, 10),
          new THREE.MeshBasicMaterial({ color: 0x4df2c8, transparent: true, opacity: 0.52, depthWrite: false })
        );
        shaft.position.y = 0.09;
        const core = new THREE.Mesh(
          new THREE.SphereGeometry(0.045, 18, 18),
          new THREE.MeshBasicMaterial({ color: 0xbefee9, transparent: true, opacity: 1, depthWrite: false })
        );
        core.position.y = 0.18;
        const wave = new THREE.Mesh(
          new THREE.RingGeometry(0.15, 0.24, 40),
          new THREE.MeshBasicMaterial({ color: 0x4df2c8, transparent: true, opacity: 0.24, side: THREE.DoubleSide, depthWrite: false })
        );
        wave.rotation.x = -Math.PI / 2;
        state.group.add(wave, ring, shaft, core);
        state.core = core;
        state.ring = ring;
        state.wave = wave;
      }

      function addPresenceVisual(state) {
        const base = new THREE.Mesh(
          new THREE.TorusGeometry(0.11, 0.009, 10, 36),
          new THREE.MeshBasicMaterial({ color: 0xb4f9ff, transparent: true, opacity: 0.5, depthWrite: false })
        );
        base.rotation.x = Math.PI / 2;
        const shaft = new THREE.Mesh(
          new THREE.CylinderGeometry(0.009, 0.009, 0.16, 8),
          new THREE.MeshBasicMaterial({ color: 0xb4f9ff, transparent: true, opacity: 0.28, depthWrite: false })
        );
        shaft.position.y = 0.08;
        const core = new THREE.Mesh(
          new THREE.SphereGeometry(0.05, 18, 18),
          new THREE.MeshBasicMaterial({ color: 0xe1fdff, transparent: true, opacity: 1, depthWrite: false })
        );
        core.position.y = 0.2;
        const halo = new THREE.Mesh(
          new THREE.RingGeometry(0.08, 0.125, 32),
          new THREE.MeshBasicMaterial({ color: 0xb4f9ff, transparent: true, opacity: 0.22, side: THREE.DoubleSide, depthWrite: false })
        );
        halo.rotation.x = -Math.PI / 2;
        halo.position.y = 0.02;
        state.group.add(base, shaft, halo, core);
        state.core = core;
        state.ring = base;
        state.wave = halo;

        const trailCount = 16;
        const trailPositions = new Float32Array(trailCount * 3);
        const trailGeometry = new THREE.BufferGeometry();
        trailGeometry.setAttribute("position", new THREE.BufferAttribute(trailPositions, 3));
        const trailLine = new THREE.Line(
          trailGeometry,
          new THREE.LineBasicMaterial({ color: 0xb4f9ff, transparent: true, opacity: 0.54, depthWrite: false })
        );
        markerGroup.add(trailLine);
        state.trailGeometry = trailGeometry;
        state.trailLine = trailLine;
        state.trailPositions = trailPositions;
        state.trailHistory = Array.from({ length: trailCount }, () => latLngToVector3(state.baseLat, state.baseLng, earthRadius + state.signal.alt));
      }

      function addCloudVisual(state) {
        const latticePoints = [
          -0.16, 0.22, -0.16,  0.16, 0.22, -0.16,
          -0.16, 0.22, 0.00,   0.16, 0.22, 0.00,
          -0.16, 0.22, 0.16,   0.16, 0.22, 0.16,
          -0.16, 0.22, -0.16, -0.16, 0.22, 0.16,
           0.00, 0.22, -0.16,  0.00, 0.22, 0.16,
           0.16, 0.22, -0.16,  0.16, 0.22, 0.16,
          -0.12, 0.14, -0.12, -0.12, 0.30, -0.12,
           0.12, 0.14, -0.12,  0.12, 0.30, -0.12,
          -0.12, 0.14, 0.12,  -0.12, 0.30, 0.12,
           0.12, 0.14, 0.12,   0.12, 0.30, 0.12
        ];
        const lattice = new THREE.LineSegments(
          new THREE.BufferGeometry(),
          new THREE.LineBasicMaterial({ color: 0x41c6ff, transparent: true, opacity: 0.48, depthWrite: false })
        );
        lattice.geometry.setAttribute("position", new THREE.Float32BufferAttribute(latticePoints, 3));
        const lower = new THREE.Mesh(
          new THREE.RingGeometry(0.12, 0.18, 36),
          new THREE.MeshBasicMaterial({ color: 0x41c6ff, transparent: true, opacity: 0.22, side: THREE.DoubleSide, depthWrite: false })
        );
        lower.rotation.x = -Math.PI / 2;
        lower.position.y = 0.08;
        const upper = new THREE.Mesh(
          new THREE.RingGeometry(0.1, 0.14, 28),
          new THREE.MeshBasicMaterial({ color: 0xa2ecff, transparent: true, opacity: 0.18, side: THREE.DoubleSide, depthWrite: false })
        );
        upper.rotation.x = -Math.PI / 2;
        upper.position.y = 0.28;
        const core = new THREE.Mesh(
          new THREE.SphereGeometry(0.045, 18, 18),
          new THREE.MeshBasicMaterial({ color: 0xcdf8ff, transparent: true, opacity: 1, depthWrite: false })
        );
        core.position.y = 0.22;
        state.group.add(lower, upper, lattice, core);
        state.core = core;
        state.ring = lower;
        state.wave = upper;
        state.lattice = lattice;
      }

      function createSignalState(signal) {
        const state = {
          signal,
          popup: createPopup(signal),
          group: new THREE.Group(),
          baseLat: signal.lat,
          baseLng: signal.lng,
          local: latLngToVector3(signal.lat, signal.lng, earthRadius + signal.alt),
          world: new THREE.Vector3(),
          depth: 1,
          show: 0,
          armed: false,
          pulsePhase: Math.random() * Math.PI * 2,
          activatedAt: performance.now()
        };

        if (signal.type === "anchor") addAnchorVisual(state);
        if (signal.type === "presence") addPresenceVisual(state);
        if (signal.type === "cloud") addCloudVisual(state);

        const hit = new THREE.Mesh(new THREE.SphereGeometry(signal.type === "cloud" ? 0.28 : 0.22, 12, 12), new THREE.MeshBasicMaterial({ visible: false }));
        hit.position.y = signal.type === "cloud" ? 0.22 : signal.type === "presence" ? 0.2 : 0.16;
        hit.userData.signalId = signal.id;
        state.group.add(hit);
        state.hit = hit;

        markerGroup.add(state.group);
        interactive.push(hit);
        signalStates.set(signal.id, state);
        return state;
      }

      function removeSignal(id) {
        const state = signalStates.get(id);
        if (!state) return;
        markerGroup.remove(state.group);
        if (state.trailLine) markerGroup.remove(state.trailLine);
        if (state.popup.parentNode) state.popup.parentNode.removeChild(state.popup);
        const hitIndex = interactive.indexOf(state.hit);
        if (hitIndex >= 0) interactive.splice(hitIndex, 1);
        signalStates.delete(id);
        if (appState.activeId === id) appState.activeId = null;
        if (appState.previewId === id) appState.previewId = null;
      }

      function spawnSeed(localPoint) {
        if (appState.seedId && signalStates.has(appState.seedId)) removeSignal(appState.seedId);
        const coords = vectorToLatLng(localPoint);
        const mode = appState.addMode || "shop";
        const seedProfile = mode === "video"
          ? {
            title: "Video Post Seed",
            summary: "Fresh location-bound video post ready for preview, captioning, and local distribution.",
            capability: "video post",
            actionLabel: "Post Video",
            armedLabel: "Video Live",
            tags: ["video", "post", "creator", "anchor"],
            metrics: [
              { label: "state", value: "clip ready" },
              { label: "reach", value: "local feed" },
              { label: "shell", value: "previewable" }
            ],
            previewVideo: "https://www.w3schools.com/html/mov_bbb.mp4"
          }
          : mode === "service"
            ? {
              title: "Service Seed",
              summary: "New service signal ready for pricing, schedule, and dispatch hooks from this exact place.",
              capability: "service shell",
              actionLabel: "Add Service",
              armedLabel: "Service Live",
              tags: ["service", "booking", "local", "anchor"],
              metrics: [
                { label: "state", value: "service draft" },
                { label: "reach", value: "nearby users" },
                { label: "shell", value: "bookable" }
              ]
            }
            : {
              title: "Shop Seed",
              summary: "New shop signal pinned to this Earth point, ready for products, pricing, and local orders.",
              capability: "shop shell",
              actionLabel: "Add Shop",
              armedLabel: "Shop Live",
              tags: ["shop", "products", "order", "anchor"],
              metrics: [
                { label: "state", value: "shop draft" },
                { label: "reach", value: "walk-in zone" },
                { label: "shell", value: "orderable" }
              ]
            };
        const seedSignal = {
          id: `seed-${Date.now()}`,
          type: "anchor",
          title: seedProfile.title,
          summary: seedProfile.summary,
          capability: seedProfile.capability,
          actionLabel: seedProfile.actionLabel,
          armedLabel: seedProfile.armedLabel,
          region: `${Math.abs(coords.lat).toFixed(2)}${coords.lat >= 0 ? "N" : "S"} / ${Math.abs(coords.lng).toFixed(2)}${coords.lng >= 0 ? "E" : "W"}`,
          lat: coords.lat,
          lng: coords.lng,
          alt: 0.15,
          zoom: 1,
          previewVideo: seedProfile.previewVideo,
          tags: ["seed", "origin", "signal", "anchor", ...seedProfile.tags],
          metrics: seedProfile.metrics,
          transient: true,
          bornAt: performance.now()
        };
        appState.seedId = seedSignal.id;
        createSignalState(seedSignal);
        setActiveSignal(seedSignal.id, true);
        appState.addMode = null;
        setZoom(1.02);
        query.placeholder = `${seedSignal.title} placed on the map`;
      }

      function setActiveSignal(id, holdFocus) {
        if (!signalStates.has(id)) return;
        appState.activeId = id;
        appState.previewId = null;
        appState.lastCycle = performance.now();
        if (holdFocus) appState.holdUntil = performance.now() + 6400;
        const state = signalStates.get(id);
        state.activatedAt = performance.now();
        if (holdFocus) {
          setZoom(Math.max(appState.zoomTarget, clamp((state.signal.zoom || 0.82) + 0.08, 0.54, 1.08)));
        }
      }

      function clearActiveSignal() {
        appState.activeId = null;
        setZoom(0);
        if (!query.value.trim()) appState.previewId = null;
      }

      function frontFacing(state) {
        const normal = worldNormal(state.local);
        const toCamera = camera.position.clone().sub(state.world).normalize();
        return normal.dot(toCamera) > 0.1;
      }

      function syncSignalState(state, now) {
        const signal = state.signal;
        let lat = state.baseLat;
        let lng = state.baseLng;
        let altitude = earthRadius + signal.alt;

        if (signal.movement) {
          const phase = now * 0.00012 * signal.movement.speed + signal.movement.phase;
          lat += Math.sin(phase) * signal.movement.latAmp;
          lng += Math.cos(phase) * signal.movement.lngAmp;
          altitude += signal.type === "cloud" ? Math.sin(phase * 1.1) * 0.04 : Math.sin(phase * 1.5) * 0.02;
        }

        const local = latLngToVector3(lat, lng, altitude);
        const normal = local.clone().normalize();
        state.local.copy(local);
        state.group.position.copy(local);
        state.group.quaternion.setFromUnitVectors(yAxis, normal);
        state.world.copy(local.clone().applyMatrix4(globeGroup.matrixWorld));
        state.depth = screenPoint(state.world).z;

        const pulse = 0.5 + 0.5 * Math.sin(now * 0.004 + state.pulsePhase);
        const highlight = state.signal.id === appState.activeId ? 1 : state.signal.id === appState.previewId ? 0.72 : appState.ambientIds.includes(state.signal.id) ? 0.4 : 0.16;

        if (state.ring) {
          const baseScale = signal.type === "cloud" ? 1.08 : 1;
          state.ring.scale.setScalar(baseScale + pulse * 0.06 + highlight * 0.08);
          state.ring.material.opacity = 0.22 + highlight * 0.46;
        }
        if (state.wave) {
          state.wave.scale.setScalar(1 + pulse * 0.36 + highlight * 0.22);
          state.wave.material.opacity = signal.type === "cloud" ? 0.12 + highlight * 0.22 : 0.1 + highlight * 0.28;
        }
        if (state.core) {
          state.core.scale.setScalar(1 + highlight * 0.18 + pulse * 0.08);
          state.core.material.opacity = 0.72 + highlight * 0.28;
        }
        if (state.lattice) {
          state.lattice.rotation.y += 0.012;
          state.lattice.material.opacity = 0.46 + highlight * 0.42;
        }
        if (state.trailLine) {
          state.trailHistory.unshift(local.clone());
          state.trailHistory = state.trailHistory.slice(0, state.trailPositions.length / 3);
          for (let i = 0; i < state.trailPositions.length / 3; i += 1) {
            const point = state.trailHistory[i] || state.trailHistory[state.trailHistory.length - 1];
            state.trailPositions[i * 3] = point.x;
            state.trailPositions[i * 3 + 1] = point.y;
            state.trailPositions[i * 3 + 2] = point.z;
          }
          state.trailGeometry.attributes.position.needsUpdate = true;
          state.trailLine.material.opacity = 0.16 + highlight * 0.54;
        }
      }

      function updateAmbientSignals() {
        const center = globeCenterScreen();
        const candidates = [];
        const ambientLimit = appState.zoomed ? 1 : AMBIENT_COUNT;
        signalStates.forEach((state) => {
          if (state.signal.id === appState.activeId || state.signal.id === appState.previewId || appState.searchIds.includes(state.signal.id)) return;
          if (!frontFacing(state)) return;
          const point = screenPoint(state.world);
          const distance = Math.hypot(point.x - center.x, point.y - center.y);
          const weight = state.signal.type === "cloud" ? 0.16 : state.signal.type === "presence" ? 0.12 : 0.08;
          candidates.push({ id: state.signal.id, score: (1 / (distance + 1)) + weight });
        });
        candidates.sort((a, b) => b.score - a.score);
        appState.ambientIds = candidates.slice(0, ambientLimit).map((entry) => entry.id);
      }

      function renderOverlay(time) {
        const center = globeCenterScreen();
        const parts = [];
        const placed = [];
        const ambientLimit = appState.zoomed ? 1 : AMBIENT_COUNT;
        const overlaps = (a, b) => a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
        const candidates = [];

        signalStates.forEach((state) => {
          const visible = frontFacing(state);
          const targetShow = !visible
            ? 0
            : state.signal.id === appState.activeId
              ? 1
              : state.signal.id === appState.previewId
                ? 0.84
                : appState.ambientIds.includes(state.signal.id)
                  ? (ambientLimit > 1 ? 0.38 : 0.26)
                  : 0;
          state.show = damp(state.show, targetShow, state.signal.id === appState.activeId ? 0.16 : 0.11);
          if (state.show > 0.03) {
            candidates.push({
              state,
              priority: state.signal.id === appState.activeId ? 3 : state.signal.id === appState.previewId ? 2 : 1
            });
          } else {
            state.popup.style.opacity = "0";
            state.popup.style.pointerEvents = "none";
          }
        });

        candidates.sort((a, b) => b.priority - a.priority || b.state.show - a.state.show);
        candidates.forEach(({ state, priority }) => {
          const source = screenPoint(state.world);
          const dir = directionFromGlobe(source, center);
          const visibility = clamp((1 - state.depth) * 0.5, 0, 1);
          const popupWidth = Math.min(appState.width * 0.84, appState.width < 560 ? 308 : 336);
          const popupHeight = 202
            + (state.signal.type === "cloud" ? 16 : 0)
            + (state.signal.previewVideo ? 92 : 0)
            + (state.signal.products?.length ? 34 : 0);
          const sourceDistance = Math.hypot(source.x - center.x, source.y - center.y);
          const centerAvoid = clamp(1 - (sourceDistance / (Math.min(appState.width, appState.height) * 0.24)), 0, 1);
          const lift = POPUP_LIFT + visibility * 24 + centerAvoid * 152 + (appState.zoomed ? 74 : 12) + (state.signal.type === "cloud" ? 18 : state.signal.type === "presence" ? 8 : 0);
          const target = {
            x: source.x + dir.x * lift,
            y: source.y + dir.y * (lift * 0.78) - visibility * 18 - centerAvoid * 8
          };
          const eased = easeOut(state.show);
          const popupCenter = {
            x: THREE.MathUtils.lerp(source.x, target.x, eased),
            y: THREE.MathUtils.lerp(source.y, target.y, eased)
          };

          const sidePad = appState.width < 560 ? 10 : 16;
          const topClamp = appState.height < 760 ? 152 : 168;
          const bottomClamp = appState.height < 760 ? 98 : 110;
          let left = clamp(popupCenter.x - popupWidth * 0.5, sidePad, appState.width - popupWidth - sidePad);
          let top = clamp(popupCenter.y - popupHeight * 0.5, topClamp, appState.height - popupHeight - bottomClamp);
          const perpendicular = { x: -dir.y, y: dir.x };
          const shiftStep = appState.width < 560 ? 46 : 58;
          let rect = { x: left, y: top, w: popupWidth, h: popupHeight };
          let attempt = 0;
          while (placed.some((entry) => overlaps(rect, entry)) && attempt < 6) {
            const sign = attempt % 2 === 0 ? 1 : -1;
            left = clamp(left + perpendicular.x * shiftStep * sign, sidePad, appState.width - popupWidth - sidePad);
            top = clamp(top + perpendicular.y * shiftStep * sign + sign * 10, topClamp, appState.height - popupHeight - bottomClamp);
            rect = { x: left, y: top, w: popupWidth, h: popupHeight };
            attempt += 1;
          }
          const centerSafeRadius = appState.zoomed ? Math.min(appState.width, appState.height) * 0.34 : Math.min(appState.width, appState.height) * 0.24;
          if (Math.hypot((left + popupWidth * 0.5) - center.x, (top + popupHeight * 0.5) - center.y) < centerSafeRadius) {
            left = clamp(left + dir.x * centerSafeRadius * 0.88, sidePad, appState.width - popupWidth - sidePad);
            top = clamp(top + dir.y * centerSafeRadius * 0.66, topClamp, appState.height - popupHeight - bottomClamp);
            rect = { x: left, y: top, w: popupWidth, h: popupHeight };
          }
          if (priority < 3 && placed.some((entry) => overlaps(rect, entry))) {
            state.popup.style.opacity = "0";
            state.popup.style.pointerEvents = "none";
            return;
          }
          placed.push(rect);

          const cardCenter = { x: left + popupWidth * 0.5, y: top + popupHeight * 0.5 };
          const tip = rectEdgePoint(cardCenter.x, cardCenter.y, popupWidth * 0.5, popupHeight * 0.5, source.x, source.y);
          const pull = 42 + state.show * 66;
          const c1 = { x: source.x + dir.x * pull, y: source.y + dir.y * pull };
          const c2 = { x: tip.x - dir.x * pull * 0.62, y: tip.y - dir.y * pull * 0.62 };
          const pulseA = cubicPoint((time * 0.00042 * PULSE_SPEED + state.pulsePhase * 0.07) % 1, source, c1, c2, tip);
          const pulseB = cubicPoint((time * 0.00042 * PULSE_SPEED + 0.36 + state.pulsePhase * 0.05) % 1, source, c1, c2, tip);
          const accent = typeHex(state.signal.type);
          const birth = clamp(1 - (performance.now() - state.activatedAt) / 1100, 0, 1);
          const widthBoost = birth * 2.4;
          const scale = 0.72 + eased * 0.24 + visibility * 0.1;

          state.popup.dataset.state = priority === 1 ? "ghost" : "live";
          state.popup.style.left = `${left}px`;
          state.popup.style.top = `${top}px`;
          state.popup.style.opacity = `${0.12 + state.show * 0.92}`;
          state.popup.style.transform = `scale(${scale})`;
          state.popup.style.pointerEvents = priority > 1 || state.show > 0.64 ? "auto" : "none";

          parts.push(`
            <g opacity="${(0.2 + state.show * 0.8).toFixed(2)}">
              <path d="M ${source.x.toFixed(2)} ${source.y.toFixed(2)} C ${c1.x.toFixed(2)} ${c1.y.toFixed(2)}, ${c2.x.toFixed(2)} ${c2.y.toFixed(2)}, ${tip.x.toFixed(2)} ${tip.y.toFixed(2)}"
                fill="none" stroke="${accent}" stroke-opacity="0.22" stroke-width="${(5.8 + widthBoost).toFixed(2)}" stroke-linecap="round" filter="url(#connectorGlow)"/>
              <path d="M ${source.x.toFixed(2)} ${source.y.toFixed(2)} C ${c1.x.toFixed(2)} ${c1.y.toFixed(2)}, ${c2.x.toFixed(2)} ${c2.y.toFixed(2)}, ${tip.x.toFixed(2)} ${tip.y.toFixed(2)}"
                fill="none" stroke="#16d9ff" stroke-opacity="${(0.82 + state.show * 0.18).toFixed(2)}" stroke-width="${(3.4 + widthBoost).toFixed(2)}" stroke-linecap="round" filter="url(#connectorGlow)"/>
              <path d="M ${source.x.toFixed(2)} ${source.y.toFixed(2)} C ${c1.x.toFixed(2)} ${c1.y.toFixed(2)}, ${c2.x.toFixed(2)} ${c2.y.toFixed(2)}, ${tip.x.toFixed(2)} ${tip.y.toFixed(2)}"
                fill="none" stroke="#eafcff" stroke-opacity="0.42" stroke-width="${(1.18 + widthBoost * 0.18).toFixed(2)}" stroke-linecap="round"/>
              <circle cx="${source.x.toFixed(2)}" cy="${source.y.toFixed(2)}" r="${(5.6 + state.show * 1.6).toFixed(2)}" fill="#16d9ff" fill-opacity="${(0.64 + state.show * 0.24).toFixed(2)}" filter="url(#connectorGlow)"/>
              <circle cx="${source.x.toFixed(2)}" cy="${source.y.toFixed(2)}" r="${(2.4 + state.show * 0.7).toFixed(2)}" fill="${accent}" fill-opacity="1"/>
              <circle cx="${pulseA.x.toFixed(2)}" cy="${pulseA.y.toFixed(2)}" r="${(2.4 + state.show).toFixed(2)}" fill="#d7fbff" fill-opacity="${(0.46 + state.show * 0.4).toFixed(2)}" filter="url(#pulseGlow)"/>
              <circle cx="${pulseB.x.toFixed(2)}" cy="${pulseB.y.toFixed(2)}" r="${(1.9 + state.show * 0.8).toFixed(2)}" fill="#7fe6ff" fill-opacity="${(0.34 + state.show * 0.34).toFixed(2)}" filter="url(#pulseGlow)"/>
            </g>
          `);
        });

        connectorSvg.innerHTML = `
          <defs>
            <filter id="connectorGlow" x="-60%" y="-60%" width="220%" height="220%">
              <feGaussianBlur stdDeviation="2.8" result="blur1"></feGaussianBlur>
              <feGaussianBlur stdDeviation="8" result="blur2"></feGaussianBlur>
              <feMerge>
                <feMergeNode in="blur2"></feMergeNode>
                <feMergeNode in="blur1"></feMergeNode>
                <feMergeNode in="SourceGraphic"></feMergeNode>
              </feMerge>
            </filter>
            <filter id="pulseGlow" x="-80%" y="-80%" width="260%" height="260%">
              <feGaussianBlur stdDeviation="6"></feGaussianBlur>
            </filter>
          </defs>
          ${parts.join("")}
        `;
      }

      function analyzeCommand(value) {
        const lowered = value.toLowerCase().trim();
        const baseTerms = lowered.split(/\s+/).filter(Boolean);
        const hints = [];
        let intent = "find";
        let preferredType = null;

        if (/(add|post|publish|list|create|open shop|new service)/.test(lowered)) {
          intent = "add";
          hints.push("shop", "service", "video");
        } else if (/(assign|driver|courier|dispatch driver)/.test(lowered)) {
          intent = "assign";
          hints.push("driver", "courier", "dispatch");
        } else if (/(order|book|reserve|buy|get|send|deliver|pay)/.test(lowered)) {
          intent = "order";
          hints.push("booking", "hook", "table", "stay", "menu", "dispatch", "products");
        } else if (/(track|follow|locate|where|watch)/.test(lowered)) {
          intent = "track";
          hints.push("route", "trace", "live");
        } else if (/(open|show|find|bring)/.test(lowered)) {
          hints.push("signal", "local");
        }

        if (/(driver|courier|vehicle|van)/.test(lowered)) {
          preferredType = "presence";
          hints.push("driver", "assign");
        } else if (/(drone|courier|vessel|boat|runner|presence|flight)/.test(lowered)) {
          preferredType = "presence";
          hints.push("presence");
        } else if (/(cloud|mesh|fabric|relay|regional|network)/.test(lowered)) {
          preferredType = "cloud";
          hints.push("cloud");
        } else if (/(hotel|room|stay|restaurant|table|booking|business|menu|event|anchor|shop|service|product|video)/.test(lowered)) {
          preferredType = "anchor";
          hints.push("anchor");
        }

        return { intent, preferredType, terms: [...new Set([...baseTerms, ...hints])] };
      }

      function rankSignals(value) {
        const analysis = analyzeCommand(value);
        const terms = analysis.terms;
        if (!terms.length) return [];
        return [...signalStates.values()].map((state) => {
          const metricText = state.signal.metrics.map((metric) => `${metric.label} ${metric.value}`).join(" ");
          const productText = state.signal.products ? state.signal.products.join(" ") : "";
          const haystack = `${state.signal.title} ${state.signal.summary} ${state.signal.capability} ${state.signal.region} ${metricText} ${productText} ${state.signal.tags.join(" ")} ${state.signal.type}`.toLowerCase();
          let score = 0;
          terms.forEach((term) => {
            if (state.signal.title.toLowerCase().includes(term)) score += 10;
            if (state.signal.capability.toLowerCase().includes(term)) score += 8;
            if (state.signal.region.toLowerCase().includes(term)) score += 6;
            if (state.signal.products?.some((product) => product.toLowerCase().includes(term))) score += 9;
            if (state.signal.tags.some((tag) => tag.includes(term))) score += 5;
            if (state.signal.type.includes(term)) score += 4;
            if (haystack.includes(term)) score += 2;
          });
          if (analysis.preferredType && state.signal.type === analysis.preferredType) score += 7;
          if (analysis.intent === "order" && state.signal.type === "anchor") score += 5;
          if (analysis.intent === "track" && state.signal.type === "presence") score += 5;
          if (analysis.intent === "assign" && state.signal.tags.includes("driver")) score += 12;
          return { id: state.signal.id, score };
        }).filter((entry) => entry.score > 0).sort((a, b) => b.score - a.score);
      }

      function flashNoMatch() {
        query.classList.add("no-match");
        window.setTimeout(() => query.classList.remove("no-match"), 220);
      }

      function updatePreview() {
        const value = query.value.trim();
        if (!value) {
          appState.previewId = null;
          appState.searchIds = [];
          query.classList.remove("no-match");
          return;
        }
        const ranked = rankSignals(value);
        appState.searchIds = ranked.slice(0, 5).map((entry) => entry.id);
        const visible = ranked.find((entry) => {
          const candidate = signalStates.get(entry.id);
          return candidate && frontFacing(candidate);
        });
        appState.previewId = visible ? visible.id : ranked[0] ? ranked[0].id : null;
      }

      function cycleSignal() {
        const ids = [...signalStates.keys()].filter((id) => id !== appState.seedId);
        if (!ids.length) return;
        const current = appState.activeId ? ids.indexOf(appState.activeId) : -1;
        setActiveSignal(ids[(current + 1 + ids.length) % ids.length], false);
      }

      function submitQuery() {
        const value = query.value.trim();
        if (!value) {
          cycleSignal();
          return;
        }
        const analysis = analyzeCommand(value);
        if (analysis.intent === "add") {
          setPanel("add");
          return;
        }
        const ranked = rankSignals(value);
        if (!ranked.length) {
          flashNoMatch();
          return;
        }
        const picked = ranked.find((entry) => {
          const candidate = signalStates.get(entry.id);
          return candidate && frontFacing(candidate);
        }) || ranked[0];
        const state = signalStates.get(picked.id);
        setActiveSignal(picked.id, true);
        setZoom(analysis.intent === "order" || analysis.intent === "assign" ? 1.02 : 0.78);
        if (!state) return;

        if (analysis.intent === "order") {
          state.armed = true;
          state.popup.classList.add("armed");
          const button = state.popup.querySelector(".popup-action");
          if (button) button.textContent = "AI Route Live";
        } else if (analysis.intent === "assign") {
          state.armed = true;
          state.popup.classList.add("armed");
          const button = state.popup.querySelector(".popup-action");
          if (button) button.textContent = "Driver Assigned";
        } else if (analysis.intent === "track") {
          const button = state.popup.querySelector(".popup-action");
          if (button) button.textContent = "Track Live";
        }

        query.placeholder = analysis.intent === "order"
          ? `AI routed ${state.signal.title} for ordering`
          : analysis.intent === "assign"
            ? `AI assigned ${state.signal.title}`
          : analysis.intent === "track"
            ? `AI locked ${state.signal.title} for tracking`
            : `AI found ${state.signal.title}`;
      }

      SIGNALS.forEach(createSignalState);
      let longPressTimer = null;
      let recognition = null;
      let listening = false;

      function resize() {
        appState.width = window.innerWidth;
        appState.height = window.innerHeight;
        renderer.setSize(appState.width, appState.height);
        camera.aspect = appState.width / appState.height;
        camera.updateProjectionMatrix();
        refreshDeviceTelemetry();
        applyHudLayout();
      }

      function pruneSeeds(now) {
        signalStates.forEach((state) => {
          if (state.signal.transient && now - state.signal.bornAt > 18000) {
            removeSignal(state.signal.id);
            if (appState.seedId === state.signal.id) appState.seedId = null;
          }
        });
      }

      function autoCycle(now) {
        if (query.value.trim() || now < appState.holdUntil || appState.activeId) return;
        if (now - appState.lastCycle > 5200) {
          cycleSignal();
          appState.lastCycle = now;
        }
      }

      function setPointerFromClient(x, y) {
        pointer.x = (x / appState.width) * 2 - 1;
        pointer.y = -(y / appState.height) * 2 + 1;
        raycaster.setFromCamera(pointer, camera);
      }

      function triggerSeedAt(clientX, clientY) {
        setPointerFromClient(clientX, clientY);
        const earthHit = raycaster.intersectObject(earth, false)[0];
        if (!earthHit) return;
        const inverse = new THREE.Matrix4().copy(globeGroup.matrixWorld).invert();
        spawnSeed(earthHit.point.clone().applyMatrix4(inverse));
        appState.longPressTriggered = true;
      }

      function beginHudMotion(mode, event) {
        appState.hud.mode = mode;
        appState.hud.pointerId = event.pointerId;
        appState.hud.startX = event.clientX;
        appState.hud.startY = event.clientY;
        appState.hud.startTop = appState.hud.top;
        appState.hud.startSize = appState.hud.size;
        perfWheel.classList.toggle("dragging", mode === "drag");
        radarWheel.classList.toggle("dragging", mode === "drag");
        perfWheel.classList.toggle("resizing", mode === "resize");
        radarWheel.classList.toggle("resizing", mode === "resize");
        event.preventDefault();
        event.stopPropagation();
      }

      function endHudMotion() {
        appState.hud.mode = null;
        appState.hud.pointerId = null;
        perfWheel.classList.remove("dragging", "resizing");
        radarWheel.classList.remove("dragging", "resizing");
      }

      function adjustZoom(delta) {
        ensureFocusSignal();
        setZoom(appState.zoomTarget + delta);
        const focus = focusableSignalState();
        query.placeholder = appState.zoomTarget > 0.08 && focus
          ? `Zoom ${Math.round(appState.zoomTarget * 100)}% on ${focus.signal.title}`
          : "World view restored";
        appState.holdUntil = performance.now() + 6400;
      }

      query.addEventListener("input", updatePreview);
      query.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          submitQuery();
        }
      });

      document.getElementById("composer").addEventListener("submit", (event) => {
        event.preventDefault();
        submitQuery();
      });

      function zoomToLocation(step = 1) {
        const focus = ensureFocusSignal();
        if (!focus) {
          setZoom(0);
          return;
        }
        if (step < 0) {
          setZoom(Math.max(0, appState.zoomTarget - 0.28));
        } else if (appState.zoomTarget < 0.18) {
          setZoom(clamp((focus.signal.zoom || 0.82) + 0.08, 0.56, 1.02));
        } else if (appState.zoomTarget < 1.02) {
          setZoom(Math.min(1.34, appState.zoomTarget + 0.26));
        } else {
          setZoom(0);
        }
        query.placeholder = appState.zoomTarget > 0.08
          ? `Zoom ${Math.round(appState.zoomTarget * 100)}% on ${focus.signal.title}`
          : "World view restored";
        appState.holdUntil = performance.now() + 6400;
      }

      userButton.addEventListener("click", (event) => {
        event.stopPropagation();
        togglePanel("user");
      });

      systemButton.addEventListener("click", (event) => {
        event.stopPropagation();
        togglePanel("system");
      });

      walletButton.addEventListener("click", (event) => {
        event.stopPropagation();
        togglePanel("wallet");
      });

      addBtn.addEventListener("click", (event) => {
        event.stopPropagation();
        togglePanel("add");
      });

      perfCenterBtn.addEventListener("click", (event) => {
        event.stopPropagation();
        togglePanel("performance");
      });

      radarFetchBtn.addEventListener("click", (event) => {
        event.stopPropagation();
        zoomToLocation();
      });

      [perfWheel, radarWheel].forEach((wheel) => {
        wheel.addEventListener("pointerdown", (event) => {
          if (event.target.closest(".wheel-center-btn, .wheel-resize-grip")) return;
          beginHudMotion("drag", event);
        });
      });

      [perfResizeGrip, radarResizeGrip].forEach((grip) => {
        grip.addEventListener("pointerdown", (event) => beginHudMotion("resize", event));
      });

      document.addEventListener("pointerdown", (event) => {
        const target = event.target;
        if (topPanel.contains(target) || userButton.contains(target) || systemButton.contains(target) || walletButton.contains(target)) return;
        setPanel(null);
      });

      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.lang = "en-US";
        recognition.interimResults = true;
        recognition.continuous = false;
        recognition.onresult = (event) => {
          let text = "";
          for (let index = event.resultIndex; index < event.results.length; index += 1) {
            text += `${event.results[index][0].transcript} `;
          }
          query.value = text.trim();
          updatePreview();
          if (event.results[event.results.length - 1].isFinal) submitQuery();
        };
        recognition.onend = () => {
          listening = false;
          voiceBtn.dataset.active = "false";
          if (appState.texturesReady) {
            query.placeholder = "Ask AI to find signals, products, drivers, or orders...";
          }
        };
      }

      voiceBtn.addEventListener("click", () => {
        if (!recognition) {
          flashNoMatch();
          return;
        }
        if (listening) {
          recognition.stop();
          return;
        }
        listening = true;
        voiceBtn.dataset.active = "true";
        query.placeholder = "Listening for a signal...";
        recognition.start();
      });

      renderer.domElement.style.touchAction = "none";
      renderer.domElement.addEventListener("wheel", (event) => {
        event.preventDefault();
        adjustZoom(event.deltaY < 0 ? 0.12 : -0.12);
      }, { passive: false });

      renderer.domElement.addEventListener("pointerdown", (event) => {
        activePointers.set(event.pointerId, { x: event.clientX, y: event.clientY });
        if (activePointers.size === 2) {
          const points = [...activePointers.values()];
          appState.dragging = false;
          window.clearTimeout(longPressTimer);
          appState.pinchStart = Math.hypot(points[0].x - points[1].x, points[0].y - points[1].y);
          appState.pinchZoomStart = appState.zoomTarget;
          ensureFocusSignal();
          return;
        }
        if (activePointers.size > 1) return;
        appState.dragging = true;
        appState.dragMoved = false;
        appState.longPressTriggered = false;
        appState.pointerStartX = appState.lastPointerX = event.clientX;
        appState.pointerStartY = appState.lastPointerY = event.clientY;
        window.clearTimeout(longPressTimer);
        longPressTimer = window.setTimeout(() => {
          if (!appState.dragging || appState.dragMoved) return;
          triggerSeedAt(appState.lastPointerX, appState.lastPointerY);
        }, 460);
      });

      window.addEventListener("pointermove", (event) => {
        if (activePointers.has(event.pointerId)) {
          activePointers.set(event.pointerId, { x: event.clientX, y: event.clientY });
        }
        if (appState.hud.mode && appState.hud.pointerId === event.pointerId) {
          if (appState.hud.mode === "drag") {
            appState.hud.top = appState.hud.startTop + (event.clientY - appState.hud.startY);
          } else {
            const delta = ((event.clientX - appState.hud.startX) * 0.4) + ((event.clientY - appState.hud.startY) * 0.7);
            appState.hud.size = appState.hud.startSize + delta;
          }
          applyHudLayout();
          return;
        }
        if (activePointers.size === 2 && activePointers.has(event.pointerId)) {
          const points = [...activePointers.values()];
          const distance = Math.hypot(points[0].x - points[1].x, points[0].y - points[1].y);
          if (!appState.pinchStart) {
            appState.pinchStart = distance;
            appState.pinchZoomStart = appState.zoomTarget;
          }
          setZoom(appState.pinchZoomStart + ((distance - appState.pinchStart) / Math.min(appState.width, appState.height)) * 2.1);
          const focus = focusableSignalState();
          query.placeholder = appState.zoomTarget > 0.08 && focus
            ? `Zoom ${Math.round(appState.zoomTarget * 100)}% on ${focus.signal.title}`
            : "World view restored";
          appState.holdUntil = performance.now() + 6400;
          return;
        }
        if (!appState.dragging) return;
        const dx = event.clientX - appState.lastPointerX;
        const dy = event.clientY - appState.lastPointerY;
        if (Math.hypot(event.clientX - appState.pointerStartX, event.clientY - appState.pointerStartY) > 6) {
          appState.dragMoved = true;
          window.clearTimeout(longPressTimer);
        }
        targetRotation.y += dx * 0.006;
        targetRotation.x = clamp(targetRotation.x + dy * 0.0032, -0.76, 0.76);
        appState.lastPointerX = event.clientX;
        appState.lastPointerY = event.clientY;
        appState.holdUntil = performance.now() + 6800;
      });

      const endPointer = (event) => {
        activePointers.delete(event.pointerId);
        if (appState.hud.mode && appState.hud.pointerId === event.pointerId) {
          endHudMotion();
          return;
        }
        if (activePointers.size < 2) {
          appState.pinchStart = 0;
        }
        if (!appState.dragging) return;
        appState.dragging = false;
        window.clearTimeout(longPressTimer);
        if (appState.longPressTriggered || appState.dragMoved) return;

        setPointerFromClient(event.clientX, event.clientY);
        const signalHit = raycaster.intersectObjects(interactive, false)[0];
        if (signalHit && signalHit.object.userData.signalId) {
          setActiveSignal(signalHit.object.userData.signalId, true);
          return;
        }

        const earthHit = raycaster.intersectObject(earth, false)[0];
        if (earthHit && appState.activeId) {
          clearActiveSignal();
          return;
        }
        if (!earthHit) clearActiveSignal();
      };

      window.addEventListener("pointerup", endPointer);
      window.addEventListener("pointercancel", endPointer);

      function animate(now) {
        requestAnimationFrame(animate);
        pruneSeeds(now);
        autoCycle(now);

        const focusState = signalStates.get(appState.activeId || appState.previewId);
        if (!appState.dragging && activePointers.size < 2) {
          targetRotation.y += EARTH_SPIN;
        }

        rotation.x = damp(rotation.x, targetRotation.x, 0.08);
        rotation.y = dampAngle(rotation.y, targetRotation.y, 0.08);
        globeGroup.rotation.x = rotation.x;
        globeGroup.rotation.y = rotation.y;

        appState.zoomLevel = damp(appState.zoomLevel, appState.zoomTarget, 0.08);
        const zoomDepth = focusState ? appState.zoomLevel : 0;
        targetCamera.z = CAMERA_BASE.z - zoomDepth * 2.04;
        targetCamera.y = CAMERA_BASE.y - zoomDepth * 0.12;
        targetCamera.fov = CAMERA_BASE.fov - zoomDepth * 12.4;
        cameraState.z = damp(cameraState.z, targetCamera.z, 0.06);
        cameraState.y = damp(cameraState.y, targetCamera.y, 0.06);
        cameraState.fov = damp(cameraState.fov, targetCamera.fov, 0.06);
        camera.position.set(0, cameraState.y, cameraState.z);
        camera.fov = cameraState.fov;
        camera.updateProjectionMatrix();
        globeGroup.updateMatrixWorld();

        earth.rotation.y = 0;
        nightShell.rotation.y = 0;
        cloudShell.rotation.y += 0.00008;
        stars.rotation.y += 0.00003;
        brightStars.rotation.y -= 0.000018;
        satellites.forEach((satellite) => {
          const orbit = now * 0.00015 * satellite.speed + satellite.phase;
          satellite.mesh.position.set(
            Math.cos(orbit) * satellite.radius,
            Math.sin(orbit * 1.1 + satellite.tilt) * 0.22 + Math.sin(satellite.tilt) * 0.3,
            Math.sin(orbit) * satellite.radius
          );
          satellite.mesh.rotation.y = orbit + Math.PI * 0.5;
          satellite.mesh.rotation.z = satellite.tilt;
        });

        appState.device.load = clamp(Math.round(32 + (focusState ? 12 : 0) + (appState.dragging ? 18 : 0) + appState.ambientIds.length * 4 + Math.abs(Math.sin(now * 0.0014)) * 10), 18, 96);

        nightShell.material.opacity = damp(nightShell.material.opacity, 0.24, 0.05);
        cloudShellMaterial.opacity = damp(cloudShellMaterial.opacity, appState.texturesReady ? 0.12 : 0.08, 0.05);

        signalStates.forEach((state) => syncSignalState(state, now));
        updateAmbientSignals();
        renderOverlay(now);
        updatePerformanceHud(now);
        updateRadarHud(now);

        renderer.render(scene, camera);
      }

      refreshDeviceTelemetry();
      updateTopHud();
      resize();
      window.addEventListener("resize", resize);
      animate(0);
    })();
  </script>
</body>
</html>
