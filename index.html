<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ASTRANOV</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap');
:root{--a:#00d4ff;--g:#0088cc;--t:#d0eaff;--td:rgba(208,234,255,0.4);--gl:rgba(0,8,20,0.72);--gb:rgba(0,212,255,0.1);--gbo:rgba(0,212,255,0.08);}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Rajdhani',sans-serif;color:var(--t);-webkit-user-select:none;user-select:none;}
#scene-cosmic{position:fixed;inset:0;z-index:1;transition:opacity 1.2s}
#scene-terrestrial{position:fixed;inset:0;z-index:2;opacity:0;pointer-events:none;transition:opacity 1.2s}
#scene-abyssal{position:fixed;inset:0;z-index:3;opacity:0;pointer-events:none;transition:opacity 1.2s}
#hud{position:fixed;inset:0;z-index:100;pointer-events:none}
#hud>*{pointer-events:auto}
/* TOP BAR */
#top-bar{position:absolute;top:0;left:0;right:0;height:44px;background:var(--gl);border-bottom:1px solid var(--gbo);display:flex;align-items:center;justify-content:space-between;padding:0 16px;backdrop-filter:blur(20px);font-family:'Share Tech Mono',monospace;font-size:11px}
.logo{font-family:'Orbitron',sans-serif;font-weight:900;font-size:15px;color:var(--a);text-shadow:0 0 24px var(--g);letter-spacing:5px}
.top-r{display:flex;gap:14px;align-items:center}
.sdot{width:5px;height:5px;border-radius:50%;background:var(--a);box-shadow:0 0 6px var(--g);display:inline-block;animation:pulse 2.5s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
#auth-btn{cursor:pointer;padding:4px 12px;border:1px solid var(--gbo);border-radius:3px;font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--td);letter-spacing:1px;background:0 0;transition:.3s}
#auth-btn:hover{border-color:var(--a);color:var(--a)}
/* CATEGORY TABS */
#cat-bar{position:absolute;top:44px;left:0;right:0;height:38px;background:var(--gl);border-bottom:1px solid var(--gbo);backdrop-filter:blur(16px);display:flex;align-items:center;gap:0;padding:0 8px;overflow-x:auto;scrollbar-width:none;opacity:0;transition:opacity .6s;pointer-events:none}
#cat-bar.show{opacity:1;pointer-events:auto}
#cat-bar::-webkit-scrollbar{display:none}
.cat-tab{padding:6px 14px;font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1.5px;color:var(--td);background:0 0;border:none;cursor:pointer;white-space:nowrap;transition:.2s;border-bottom:2px solid transparent;text-transform:uppercase}
.cat-tab:hover,.cat-tab.on{color:var(--a);border-bottom-color:var(--a)}
/* SEARCH BAR */
#search-bar{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);width:min(540px,92vw);height:44px;background:var(--gl);border:1px solid var(--gbo);border-radius:22px;backdrop-filter:blur(20px);display:flex;align-items:center;padding:0 18px;gap:10px;transition:.3s;z-index:120}
#search-bar:focus-within{border-color:rgba(0,212,255,.3);box-shadow:0 0 30px rgba(0,212,255,.06)}
#si{flex:1;background:0 0;border:none;outline:none;font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--t);caret-color:var(--a)}
#si::placeholder{color:var(--td)}
/* RESULTS PANEL */
#rpanel{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);width:min(540px,92vw);max-height:55vh;background:var(--gl);border:1px solid var(--gbo);border-radius:10px;backdrop-filter:blur(24px);overflow-y:auto;z-index:115;opacity:0;pointer-events:none;transition:.3s;scrollbar-width:thin;scrollbar-color:var(--g) transparent}
#rpanel.open{opacity:1;pointer-events:auto}
.rh{padding:10px 16px;font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:2px;color:var(--a);border-bottom:1px solid var(--gbo);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--gl);backdrop-filter:blur(24px);z-index:2}
.rx{background:0 0;border:none;color:var(--td);cursor:pointer;font-size:16px}.rx:hover{color:var(--a)}
.rc{padding:12px 16px;border-bottom:1px solid var(--gbo);cursor:pointer;transition:.15s}
.rc:hover{background:rgba(0,212,255,.04)}
.rc-cat{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--td)}
.rc-t{font-weight:600;font-size:15px;margin:2px 0}
.rc-s{font-size:11px;color:var(--td);font-family:'Share Tech Mono',monospace}
.rc-d{font-size:12px;opacity:.55;margin:4px 0;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.rc-p{font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--a);font-weight:700}
.rc-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.rc-tag{font-size:9px;padding:2px 8px;border:1px solid var(--gbo);border-radius:10px;color:var(--td);font-family:'Share Tech Mono',monospace}
.r-empty{padding:40px 16px;text-align:center;color:var(--td);font-family:'Share Tech Mono',monospace;font-size:12px}
/* DETAIL PANEL (shop or signal detail) */
#detail{position:fixed;bottom:0;left:0;right:0;max-height:85vh;background:rgba(0,6,16,.92);border-top:1px solid var(--gbo);backdrop-filter:blur(24px);z-index:130;transform:translateY(100%);transition:transform .4s ease;overflow-y:auto;border-radius:16px 16px 0 0;scrollbar-width:thin;scrollbar-color:var(--g) transparent}
#detail.open{transform:translateY(0)}
.det-handle{width:40px;height:4px;background:rgba(255,255,255,.15);border-radius:2px;margin:10px auto}
.det-head{padding:0 20px 12px;display:flex;justify-content:space-between;align-items:flex-start}
.det-title{font-family:'Orbitron',sans-serif;font-size:16px;font-weight:700;color:#fff;letter-spacing:1px}
.det-cat{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--a);font-family:'Share Tech Mono',monospace;margin-top:2px}
.det-close{background:0 0;border:none;color:var(--td);font-size:22px;cursor:pointer;padding:4px 8px}.det-close:hover{color:var(--a)}
.det-info{padding:0 20px 16px;font-size:13px;opacity:.65;line-height:1.5}
.det-meta{display:flex;gap:16px;padding:0 20px 14px;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--td);flex-wrap:wrap}
.det-meta span{display:flex;align-items:center;gap:4px}
/* Media strip */
.det-media{display:flex;gap:8px;padding:0 20px 16px;overflow-x:auto;scrollbar-width:none}
.det-media::-webkit-scrollbar{display:none}
.det-media img,.det-media video{height:140px;border-radius:8px;object-fit:cover;border:1px solid var(--gbo);flex-shrink:0}
/* Menu / catalog items */
.det-section{padding:0 20px 8px;font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:2px;color:var(--a);margin-top:8px}
.menu-item{display:flex;justify-content:space-between;align-items:center;padding:10px 20px;border-bottom:1px solid var(--gbo);cursor:pointer;transition:.15s}
.menu-item:hover{background:rgba(0,212,255,.03)}
.mi-left{flex:1}
.mi-name{font-weight:600;font-size:14px}
.mi-desc{font-size:11px;opacity:.45;margin-top:2px}
.mi-right{display:flex;align-items:center;gap:12px}
.mi-price{font-family:'Share Tech Mono',monospace;font-size:14px;color:var(--a);font-weight:700}
.mi-add{width:30px;height:30px;border-radius:50%;border:1px solid var(--gbo);background:0 0;color:var(--a);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
.mi-add:hover{background:var(--a);color:#000;border-color:var(--a)}
/* CART / ORDER PANEL */
#cart{position:fixed;bottom:0;left:0;right:0;max-height:70vh;background:rgba(0,6,16,.95);border-top:1px solid var(--gbo);backdrop-filter:blur(24px);z-index:140;transform:translateY(100%);transition:transform .4s ease;overflow-y:auto;border-radius:16px 16px 0 0}
#cart.open{transform:translateY(0)}
.cart-head{padding:16px 20px 10px;display:flex;justify-content:space-between;align-items:center}
.cart-title{font-family:'Orbitron',sans-serif;font-size:14px;color:var(--a);letter-spacing:2px}
.cart-item{display:flex;justify-content:space-between;align-items:center;padding:10px 20px;border-bottom:1px solid var(--gbo)}
.ci-name{font-size:14px;font-weight:600}
.ci-qty{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--td)}
.ci-price{font-family:'Share Tech Mono',monospace;font-size:14px;color:var(--a)}
.ci-rm{background:0 0;border:none;color:#ff4466;cursor:pointer;font-size:14px;padding:0 4px}
.cart-route{padding:12px 20px;border-bottom:1px solid var(--gbo)}
.cr-label{font-size:11px;color:var(--td);font-family:'Share Tech Mono',monospace;letter-spacing:1px}
.cr-val{font-size:14px;font-weight:600;margin-top:2px}
.cart-total{padding:14px 20px;display:flex;justify-content:space-between;align-items:center}
.ct-label{font-size:12px;color:var(--td);text-transform:uppercase;letter-spacing:1px;font-family:'Share Tech Mono',monospace}
.ct-val{font-family:'Share Tech Mono',monospace;font-size:20px;color:var(--a);font-weight:700}
.cart-breakdown{padding:0 20px 12px;font-size:11px;font-family:'Share Tech Mono',monospace;color:var(--td);line-height:1.8}
.cart-btn{margin:8px 20px 20px;padding:14px;border-radius:6px;background:var(--a);color:#000;border:none;font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;cursor:pointer;width:calc(100% - 40px);transition:.3s}
.cart-btn:hover{box-shadow:0 0 30px var(--g)}
.cart-btn:disabled{opacity:.3;cursor:not-allowed}
/* CART BADGE */
#cart-badge{position:absolute;bottom:68px;right:calc(50% - 260px);width:44px;height:44px;border-radius:50%;background:var(--a);color:#000;display:none;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-size:13px;font-weight:900;cursor:pointer;z-index:125;box-shadow:0 0 20px var(--g);transition:.3s}
#cart-badge.show{display:flex}
#cart-badge:hover{transform:scale(1.1)}
/* MODALS */
.mbg{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.6);backdrop-filter:blur(10px);display:none;align-items:center;justify-content:center}.mbg.open{display:flex}
.mdl{background:rgba(0,8,20,.88);border:1px solid var(--gbo);border-radius:10px;padding:24px 28px;width:380px;max-width:92vw;backdrop-filter:blur(20px);max-height:85vh;overflow-y:auto}
.mdl h2{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;color:var(--a);letter-spacing:3px;margin-bottom:16px}
.mdl label{display:block;font-size:10px;font-family:'Share Tech Mono',monospace;letter-spacing:1px;color:var(--td);margin-bottom:4px;text-transform:uppercase}
.mdl input,.mdl textarea,.mdl select{width:100%;background:rgba(255,255,255,.03);border:1px solid var(--gbo);border-radius:4px;padding:9px 11px;color:var(--t);font-family:'Rajdhani',sans-serif;font-size:14px;outline:none;margin-bottom:10px;transition:.3s}
.mdl input:focus,.mdl textarea:focus,.mdl select:focus{border-color:var(--a)}
.mdl textarea{resize:vertical;min-height:50px}
.mdl select option{background:#0a1628;color:var(--t)}
.mb{display:flex;gap:8px;margin-top:8px}
.btn{flex:1;padding:10px;border-radius:4px;font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;cursor:pointer;transition:.3s;text-transform:uppercase}
.btn-go{background:var(--a);color:#000;border:none}.btn-go:hover{box-shadow:0 0 20px var(--g)}
.btn-x{background:0 0;color:var(--td);border:1px solid var(--gbo)}.btn-x:hover{border-color:var(--a);color:var(--a)}
.merr{color:#ff4466;font-size:11px;font-family:'Share Tech Mono',monospace;display:none;margin-top:4px}
.mok{color:var(--a);font-size:11px;font-family:'Share Tech Mono',monospace;display:none;margin-top:4px}
/* TOASTS */
#toasts{position:fixed;top:50px;right:16px;z-index:300;display:flex;flex-direction:column;gap:6px}
.toast{background:var(--gl);border:1px solid var(--gbo);border-radius:6px;padding:9px 14px;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--t);backdrop-filter:blur(16px);max-width:280px;animation:ti .3s ease}
.toast.out{animation:to .3s ease forwards}
@keyframes ti{from{opacity:0;transform:translateX(30px)}to{opacity:1}}
@keyframes to{to{opacity:0;transform:translateX(30px)}}
/* MAP */
#map-container{width:100%;height:100%}
.leaflet-control-zoom,.leaflet-control-attribution{display:none!important}
#abyss-canvas{width:100%;height:100%}
#vignette{position:fixed;inset:0;z-index:98;pointer-events:none;background:radial-gradient(ellipse at center,transparent 40%,rgba(0,0,0,.7) 100%)}
/* Map popups */
.leaflet-popup-content-wrapper{background:rgba(0,8,20,.92)!important;color:var(--t)!important;border:1px solid var(--gbo)!important;border-radius:8px!important;backdrop-filter:blur(12px)!important;box-shadow:0 4px 30px rgba(0,0,0,.5)!important}
.leaflet-popup-tip{background:rgba(0,8,20,.92)!important}
.leaflet-popup-close-button{color:rgba(0,212,255,.4)!important}
.sp{font-family:'Rajdhani',sans-serif;min-width:180px}
.sp-t{font-weight:700;font-size:14px;color:#fff}
.sp-s{font-size:10px;color:var(--td);font-family:'Share Tech Mono',monospace}
.sp-p{font-weight:700;color:var(--a);margin:3px 0;font-family:'Share Tech Mono',monospace}
.sp-d{font-size:11px;opacity:.55}
.sp-b{display:inline-block;background:var(--a);color:#000;border:none;padding:5px 14px;border-radius:3px;font-family:'Orbitron',sans-serif;font-size:8px;font-weight:700;letter-spacing:1px;cursor:pointer;margin-top:5px}
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
</head>
<body>
<div id="scene-cosmic"></div>
<div id="scene-terrestrial"><div id="map-container"></div></div>
<div id="scene-abyssal"><canvas id="abyss-canvas"></canvas></div>

<div id="hud">
  <div id="top-bar">
    <span class="logo">ASTRANOV</span>
    <div class="top-r">
      <span style="color:var(--td)"><span class="sdot"></span> <span id="rt-stat">LIVE</span></span>
      <span style="color:var(--td)" id="coords"></span>
      <button id="auth-btn">LOGIN</button>
    </div>
  </div>
  <div id="cat-bar">
    <button class="cat-tab on" data-cat="all">ALL</button>
    <button class="cat-tab" data-cat="food">FOOD & MARKET</button>
    <button class="cat-tab" data-cat="hotel">HOTELS</button>
    <button class="cat-tab" data-cat="sports">SPORTS</button>
    <button class="cat-tab" data-cat="rental">RENTALS</button>
    <button class="cat-tab" data-cat="wellness">WELLNESS</button>
    <button class="cat-tab" data-cat="photography">MEDIA</button>
    <button class="cat-tab" data-cat="salon">STYLE</button>
  </div>
  <div id="search-bar">
    <span style="color:var(--td);font-size:14px">&#x1F50D;</span>
    <input id="si" type="text" placeholder="Search shops, services, products..." autocomplete="off" spellcheck="false">
  </div>
</div>

<!-- RESULTS -->
<div id="rpanel"><div class="rh"><span id="rt">RESULTS</span><button class="rx" id="rcl">&times;</button></div><div id="rlist"></div></div>

<!-- SHOP/SIGNAL DETAIL -->
<div id="detail">
  <div class="det-handle"></div>
  <div class="det-head"><div><div class="det-cat" id="d-cat"></div><div class="det-title" id="d-title"></div></div><button class="det-close" id="d-close">&times;</button></div>
  <div class="det-meta" id="d-meta"></div>
  <div class="det-media" id="d-media"></div>
  <div class="det-info" id="d-info"></div>
  <div class="det-section" id="d-menu-label" style="display:none">MENU / CATALOG</div>
  <div id="d-menu"></div>
</div>

<!-- CART -->
<div id="cart-badge"></div>
<div id="cart">
  <div class="det-handle"></div>
  <div class="cart-head"><span class="cart-title">YOUR ORDER</span><button class="det-close" id="cart-close">&times;</button></div>
  <div id="cart-items"></div>
  <div class="cart-route" id="cart-route" style="display:none">
    <div class="cr-label">DELIVERY ROUTE</div>
    <div class="cr-val" id="cart-dist"></div>
  </div>
  <div class="cart-breakdown" id="cart-bd"></div>
  <div class="cart-total"><span class="ct-label">TOTAL</span><span class="ct-val" id="cart-tot">€0.00</span></div>
  <button class="cart-btn" id="cart-order" disabled>PLACE ORDER</button>
</div>

<!-- AUTH -->
<div class="mbg" id="auth-m"><div class="mdl"><h2 id="at">LOGIN</h2>
<label>Email</label><input type="email" id="ae" placeholder="you@astranov.eu">
<label>Password</label><input type="password" id="ap" placeholder="••••••••">
<div class="merr" id="aerr"></div><div class="mok" id="aok"></div>
<div class="mb"><button class="btn btn-x" id="ac">CANCEL</button><button class="btn btn-x" id="atg">SIGN UP</button><button class="btn btn-go" id="as">LOGIN</button></div></div></div>

<!-- POST -->
<div class="mbg" id="post-m"><div class="mdl"><h2>POST SIGNAL</h2>
<label>Shop</label><select id="ps"></select>
<label>Title</label><input type="text" id="pt" placeholder="What are you offering?">
<label>Description</label><textarea id="pd" placeholder="Details..."></textarea>
<label>Category</label><select id="pc"><option value="service">Service</option><option value="product">Product</option><option value="offer">Offer</option></select>
<label>Price (EUR)</label><input type="number" id="pp" placeholder="0.00" step="0.01" min="0">
<div class="merr" id="perr"></div><div class="mok" id="pok"></div>
<div class="mb"><button class="btn btn-x" id="pca">CANCEL</button><button class="btn btn-go" id="psu">PUBLISH</button></div></div></div>

<div id="vignette"></div>
<div id="toasts"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
(function(){
'use strict';
const sb=supabase.createClient('https://kzlabcrlrpbnfiiyrjvl.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt6bGFiY3JscnBibmZpaXlyanZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxNjg3OTAsImV4cCI6MjA4OTc0NDc5MH0.TyshChfsIkc-k357FGME-8TnZn-zxeD74jL-GYRVlkg');
const $=id=>document.getElementById(id);

const S={user:null,depth:0,coords:{lat:36.4,lon:28.22},cart:[],cartShop:null,activeCat:'all'};
let singleTouchX=null,singleTouchY=null,globeDragX=0,globeDragY=0;

// ═══ TOAST ═══
function toast(m){const t=document.createElement('div');t.className='toast';t.textContent=m;$('toasts').appendChild(t);setTimeout(()=>{t.classList.add('out');setTimeout(()=>t.remove(),300)},4000);}

// ═══ AUTH ═══
let authMode='login';
function showAuth(){$('auth-m').classList.add('open');$('aerr').style.display='none';$('aok').style.display='none';}
function hideAuth(){$('auth-m').classList.remove('open');}
function requireAuth(cb){if(S.user){cb();return;}showAuth();$('auth-m')._cb=cb;}
$('auth-btn').onclick=()=>{if(S.user){sb.auth.signOut();S.user=null;$('auth-btn').textContent='LOGIN';toast('Logged out');}else showAuth();};
$('ac').onclick=hideAuth;
$('atg').onclick=()=>{authMode=authMode==='login'?'signup':'login';$('at').textContent=authMode==='login'?'LOGIN':'SIGN UP';$('as').textContent=authMode==='login'?'LOGIN':'SIGN UP';$('atg').textContent=authMode==='login'?'SIGN UP':'LOGIN';};
$('as').onclick=async()=>{
  const e=$('ae').value.trim(),p=$('ap').value;$('aerr').style.display='none';$('aok').style.display='none';
  if(!e||!p){$('aerr').textContent='Email and password required';$('aerr').style.display='block';return;}
  try{let r=authMode==='login'?await sb.auth.signInWithPassword({email:e,password:p}):await sb.auth.signUp({email:e,password:p});
  if(r.error)throw r.error;
  if(authMode==='signup'){$('aok').textContent='Account created — check email';$('aok').style.display='block';return;}
  S.user=r.data.user;$('auth-btn').textContent=e.split('@')[0].toUpperCase();toast('Logged in');hideAuth();
  if($('auth-m')._cb){$('auth-m')._cb();$('auth-m')._cb=null;}}catch(err){$('aerr').textContent=err.message;$('aerr').style.display='block';}
};
sb.auth.getSession().then(({data})=>{if(data.session?.user){S.user=data.session.user;$('auth-btn').textContent=data.session.user.email.split('@')[0].toUpperCase();}});
sb.auth.onAuthStateChange((_,s)=>{if(s?.user){S.user=s.user;$('auth-btn').textContent=s.user.email.split('@')[0].toUpperCase();}else{S.user=null;$('auth-btn').textContent='LOGIN';}});

// ═══ ZOOM ═══
let overOcean=false,targetDepth=0,autoZooming=false;
function updateLayers(){
  const d=S.depth;
  $('scene-cosmic').style.opacity=d<1?1-d:0;
  const tOp=d<.3?0:d<1?(d-.3)/.7:1;

    return;

// ═══ OSRM ROUTING ═══
async function getRoute(fromLat,fromLon,toLat,toLon){
  try{const r=await fetch(`https://router.project-osrm.org/route/v1/driving/${fromLon},${fromLat};${toLon},${toLat}?overview=false`);
  const d=await r.json();if(d.routes&&d.routes[0]){const m=d.routes[0].distance;const km=m/1000;return{distKm:km,costEur:Math.ceil(km)};}
  }catch(e){}
  // Fallback: straight-line Haversine
  const R=6371,dLat=(toLat-fromLat)*Math.PI/180,dLon=(toLon-fromLon)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(fromLat*Math.PI/180)*Math.cos(toLat*Math.PI/180)*Math.sin(dLon/2)**2;
  const km=R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
  return{distKm:km,costEur:Math.ceil(km)};
}

      const meta=item.metadata||{};
      const extraInfo=[];
      if(meta.duration_hours)extraInfo.push(meta.duration_hours+'h');
      if(meta.duration_minutes)extraInfo.push(meta.duration_minutes+'min');

// ═══ CART ═══
function addToCart(item,shop){
  // Can only order from one shop at a time
  if(S.cartShop&&S.cartShop.id!==shop.id){
    if(!confirm('Clear cart from '+S.cartShop.name+' and start new order from '+shop.name+'?'))return;
    S.cart=[];
  }
  S.cartShop=shop;
  const existing=S.cart.find(c=>c.item.id===item.id);
  if(existing)existing.qty++;
  else S.cart.push({item,qty:1});
  toast('Added: '+item.title);
  updateCartBadge();
}

function updateCartBadge(){
  const total=S.cart.reduce((s,c)=>s+c.qty,0);
  const badge=$('cart-badge');
  if(total>0){badge.textContent=total;badge.classList.add('show');}
  else badge.classList.remove('show');
}

$('cart-badge').onclick=()=>openCart();
$('cart-close').onclick=()=>$('cart').classList.remove('open');

async function openCart(){
  if(!S.cart.length){toast('Cart is empty');return;}
  const el=$('cart-items');el.innerHTML='';
  let subtotal=0;
  S.cart.forEach((c,i)=>{
    const price=parseFloat(c.item.price)||0;
    subtotal+=price*c.qty;
    const row=document.createElement('div');row.className='cart-item';
    row.innerHTML=`<div><div class="ci-name">${c.item.title}</div><div class="ci-qty">×${c.qty}</div></div><div style="display:flex;align-items:center;gap:10px"><div class="ci-price">€${(price*c.qty).toFixed(2)}</div><button class="ci-rm" data-i="${i}">✕</button></div>`;
    row.querySelector('.ci-rm').onclick=()=>{S.cart.splice(i,1);if(!S.cart.length)S.cartShop=null;updateCartBadge();openCart();};
    el.appendChild(row);
  });

  // Calculate delivery route
  let deliveryCost=0,distKm=0;
  const routeEl=$('cart-route');
  if(S.cartShop&&S.cartShop.location_lat&&S.coords.lat){
    routeEl.style.display='block';
    $('cart-dist').textContent='Calculating route...';
    const route=await getRoute(S.cartShop.location_lat,S.cartShop.location_lon,S.coords.lat,S.coords.lon);
    distKm=route.distKm;
    deliveryCost=route.costEur; // €1/km rounded up
    $('cart-dist').textContent=distKm.toFixed(1)+' km — €'+deliveryCost.toFixed(2)+' delivery';
  }else{routeEl.style.display='none';}

  const total=subtotal+deliveryCost;
  $('cart-bd').innerHTML=`Products/Services: €${subtotal.toFixed(2)}<br>Delivery (${distKm.toFixed(1)}km × €1/km): €${deliveryCost.toFixed(2)}<br><span style="color:var(--td);font-size:10px">Shop receives: €${subtotal.toFixed(2)} · Driver receives: €${deliveryCost.toFixed(2)}</span>`;
  $('cart-tot').textContent='€'+total.toFixed(2);
  $('cart-order').disabled=false;
  $('cart').classList.add('open');
}

$('cart-order').onclick=()=>{
  requireAuth(async()=>{
    $('cart-order').disabled=true;$('cart-order').textContent='PLACING ORDER...';
    // Create delivery in database
    const firstItem=S.cart[0].item;
    const route=S.cartShop?await getRoute(S.cartShop.location_lat,S.cartShop.location_lon,S.coords.lat,S.coords.lon):{distKm:0,costEur:0};
    const{error}=await sb.from('deliveries').insert({
      signal_id:firstItem.id,customer_id:S.user.id,
      status:'pending',
      pickup_lat:S.cartShop?.location_lat,pickup_lon:S.cartShop?.location_lon,
      dropoff_lat:S.coords.lat,dropoff_lon:S.coords.lon,
      cost:route.costEur,currency:'EUR',
      payment_status:'pending',payment_method:'stripe',
      metadata:{items:S.cart.map(c=>({id:c.item.id,title:c.item.title,qty:c.qty,price:c.item.price})),subtotal:S.cart.reduce((s,c)=>s+(parseFloat(c.item.price)||0)*c.qty,0)}
    });
    if(error){toast('Error: '+error.message);$('cart-order').disabled=false;$('cart-order').textContent='PLACE ORDER';return;}

    $('cart').classList.remove('open');$('detail').classList.remove('open');
    $('cart-order').textContent='PLACE ORDER';
  });
};

let leafletMap=null,mapInit=false;
const mG={shops:null,signals:null,drivers:null};
async function initMap(){
  if(mapInit)return;mapInit=true;
  leafletMap=L.map('map-container',{center:[S.coords.lat,S.coords.lon],zoom:13,zoomControl:false,attributionControl:false});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(leafletMap);
  mG.shops=L.layerGroup().addTo(leafletMap);mG.signals=L.layerGroup().addTo(leafletMap);mG.drivers=L.layerGroup().addTo(leafletMap);
  leafletMap.on('moveend',()=>{const c=leafletMap.getCenter();$('coords').textContent=c.lat.toFixed(3)+'° '+c.lng.toFixed(3)+'°';detectOcean();});
  leafletMap.on('zoomend',detectOcean);
  await loadMap();setTimeout(()=>{leafletMap.invalidateSize();leafletMap.flyTo([S.coords.lat,S.coords.lon],14,{duration:2});},300);
}
function detectOcean(){
  if(!leafletMap)return;try{const z=leafletMap.getZoom(),b=leafletMap.getBounds();let n=0;
  if(mG.signals)mG.signals.eachLayer(m=>{if(b.contains(m.getLatLng()))n++;});
  if(mG.shops)mG.shops.eachLayer(m=>{if(b.contains(m.getLatLng()))n++;});
  overOcean=(z>=14&&n===0);}catch(e){overOcean=false;}
}
async function loadMap(){
  const{data:shops}=await sb.from('shops').select('*').eq('is_active',true);
  if(shops){mG.shops.clearLayers();shops.forEach(s=>{if(!s.location_lat||!s.location_lon)return;
    const m=L.circleMarker([s.location_lat,s.location_lon],{radius:8,fillColor:'#00d4ff',color:'#0088cc',weight:1.5,opacity:.8,fillOpacity:.45});
    m.on('click',async()=>{
      const{data:sigs}=await sb.from('signals').select('*').eq('shop_id',s.id).eq('is_available',true).limit(1);
      openDetail(sigs?.[0]||{title:s.name,description:s.description,category:s.category},s);
    });
    m.bindTooltip(s.name,{permanent:false,direction:'top',className:'',offset:[0,-10]});
    mG.shops.addLayer(m);});}
  const{data:sigs}=await sb.from('signals').select('*,shops(*)').eq('is_available',true);
  if(sigs){mG.signals.clearLayers();sigs.forEach(sig=>{if(!sig.location_lat||!sig.location_lon)return;
    L.circleMarker([sig.location_lat,sig.location_lon],{radius:4,fillColor:'#00d4ff',color:'#005588',weight:1,opacity:.5,fillOpacity:.25})
    .on('click',()=>openDetail(sig,sig.shops||{}))
    .addTo(mG.signals);});}
  const{data:drvs}=await sb.from('drivers').select('*,users(display_name)').eq('is_available',true);
  if(drvs){mG.drivers.clearLayers();drvs.forEach(d=>{if(!d.current_lat||!d.current_lon)return;
    L.circleMarker([d.current_lat,d.current_lon],{radius:4,fillColor:'#44e0ff',color:'#00aadd',weight:2,opacity:1,fillOpacity:.8})
    .bindPopup(`<div class="sp"><div class="sp-t">${d.users?.display_name||'Driver'}</div><div class="sp-s">${d.vehicle_type||''} · ${d.total_deliveries||0} deliveries</div></div>`)
    .addTo(mG.drivers);});}
}

// ═══ ABYSSAL ═══
let abyssInit=false;
function initAbyss(){
  if(abyssInit)return;abyssInit=true;
  const cv=$('abyss-canvas'),aR=new THREE.WebGLRenderer({canvas:cv,antialias:true,alpha:true});
  aR.setSize(innerWidth,innerHeight);aR.setPixelRatio(Math.min(devicePixelRatio,2));aR.setClearColor(0x000a14,1);
  const aS=new THREE.Scene(),aC=new THREE.PerspectiveCamera(50,innerWidth/innerHeight,.1,1000);aC.position.z=5;
  aS.add(new THREE.Mesh(new THREE.IcosahedronGeometry(1.5,1),new THREE.MeshBasicMaterial({color:0x00d4ff,wireframe:true,transparent:true,opacity:.25})));
  aS.add(new THREE.Mesh(new THREE.IcosahedronGeometry(.8,2),new THREE.MeshBasicMaterial({color:0x0066aa,wireframe:true,transparent:true,opacity:.12})));
  const pG=new THREE.BufferGeometry(),pP=new Float32Array(2500*3);for(let i=0;i<2500;i++){pP[i*3]=(Math.random()-.5)*20;pP[i*3+1]=(Math.random()-.5)*20;pP[i*3+2]=(Math.random()-.5)*20;}
  pG.setAttribute('position',new THREE.BufferAttribute(pP,3));
  aS.add(new THREE.Points(pG,new THREE.PointsMaterial({color:0x00d4ff,size:.03,transparent:true,opacity:.35})));
  let at=0;(function a(){requestAnimationFrame(a);at+=.002;aS.children[0].rotation.x=at*.4;aS.children[0].rotation.y=at*.25;aS.children[1].rotation.x=-at*.25;aS.children[1].rotation.y=at*.4;aC.position.x=Math.sin(at*.15)*.4;aC.position.y=Math.cos(at*.1)*.25;aC.lookAt(0,0,0);aR.render(aS,aC);})();
  window.addEventListener('resize',()=>{aC.aspect=innerWidth/innerHeight;aC.updateProjectionMatrix();aR.setSize(innerWidth,innerHeight);});
}

// ═══ REALTIME ═══
sb.channel('rt-sig').on('postgres_changes',{event:'INSERT',schema:'public',table:'signals'},p=>{toast('New: '+p.new.title);if(mapInit)loadMap();}).on('postgres_changes',{event:'*',schema:'public',table:'signals'},()=>{if(mapInit)loadMap();}).subscribe(s=>{$('rt-stat').textContent=s==='SUBSCRIBED'?'LIVE':'...';});
sb.channel('rt-drv').on('postgres_changes',{event:'UPDATE',schema:'public',table:'drivers'},()=>{if(mapInit)loadMap();}).subscribe();
sb.channel('rt-msg').on('postgres_changes',{event:'INSERT',schema:'public',table:'messages'},p=>{if(S.user&&p.new.recipient_id===S.user.id)toast('New message');}).subscribe();

// ═══ RESIZE ═══
window.addEventListener('resize',()=>{cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();ren.setSize(innerWidth,innerHeight);if(leafletMap)leafletMap.invalidateSize();});

})();
