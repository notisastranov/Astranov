<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Astranov Internet Operating System</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<style>
:root{
  --bg:#030913;
  --panel:rgba(8,16,28,.44);
  --panel-strong:rgba(8,16,28,.72);
  --line:rgba(84,199,255,.30);
  --line-strong:rgba(84,199,255,.55);
  --text:#d8f3ff;
  --muted:#84a9bf;
  --blue:#33cfff;
  --blue-soft:rgba(51,207,255,.12);
  --green:#26e27c;
  --red:#ff5a6d;
  --shadow:0 16px 40px rgba(0,0,0,.35);
  --safe-bottom: max(12px, env(safe-area-inset-bottom));
  --safe-top: max(12px, env(safe-area-inset-top));
  --hud-size: clamp(84px, 22vw, 112px);
  --helper-size: clamp(56px, 16vw, 72px);
  --composer-width:min(60vw, 560px);
  --composer-height:60px;
  --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden;background:radial-gradient(circle at 50% 22%, #10263d 0%, #07111b 38%, #02060c 100%);color:var(--text);font-family:var(--font)}
button,input,select,textarea{font:inherit}
button{cursor:pointer}
#app{position:fixed;inset:0;overflow:hidden}
#world{position:absolute;inset:0}
#map{position:absolute;inset:0;display:none;z-index:2}
#globe{position:absolute;inset:0;z-index:1;display:block}
#stars{position:absolute;inset:0;background:
  radial-gradient(circle at 18% 22%, rgba(255,255,255,.9) 0 1px, transparent 1.6px),
  radial-gradient(circle at 72% 14%, rgba(255,255,255,.75) 0 1px, transparent 1.4px),
  radial-gradient(circle at 82% 62%, rgba(255,255,255,.85) 0 1px, transparent 1.8px),
  radial-gradient(circle at 28% 78%, rgba(255,255,255,.7) 0 1px, transparent 1.3px),
  radial-gradient(circle at 58% 86%, rgba(255,255,255,.8) 0 1px, transparent 1.6px),
  radial-gradient(circle at 44% 10%, rgba(255,255,255,.4) 0 1px, transparent 1.2px),
  radial-gradient(circle at 9% 65%, rgba(255,255,255,.45) 0 1px, transparent 1.2px),
  radial-gradient(circle at 94% 36%, rgba(255,255,255,.45) 0 1px, transparent 1.2px);
  opacity:.85;pointer-events:none;z-index:0}
#topPill{position:fixed;top:calc(var(--safe-top) + 8px);left:50%;transform:translateX(-50%);z-index:9;padding:7px 14px;border:1px solid var(--line);border-radius:999px;background:rgba(5,12,22,.36);backdrop-filter:blur(12px);box-shadow:var(--shadow);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#b7ebff}
#statusTiny{font-size:10px;color:var(--muted);margin-left:8px;letter-spacing:.04em;text-transform:none}
.hud{position:fixed;top:calc(var(--safe-top) + 54px);width:var(--hud-size);height:var(--hud-size);z-index:10;pointer-events:auto}
.hud.left{left:10px}.hud.right{right:10px}
.hud .ring{position:absolute;inset:0;border-radius:50%;border:1px solid rgba(51,207,255,.28);background:radial-gradient(circle at 30% 20%, rgba(51,207,255,.15), rgba(8,14,24,.74) 58%, rgba(3,8,14,.9) 100%);backdrop-filter:blur(10px);box-shadow:inset 0 0 24px rgba(51,207,255,.08), 0 16px 30px rgba(0,0,0,.28)}
.hud canvas{position:absolute;inset:0;width:100%;height:100%;border-radius:50%}
.hud .centerBtn{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:34%;height:34%;border-radius:50%;border:1px solid var(--line-strong);background:radial-gradient(circle at 30% 24%, rgba(51,207,255,.22), rgba(10,18,30,.95) 70%);display:grid;place-items:center;color:#e3f8ff;box-shadow:inset 0 0 14px rgba(51,207,255,.12), 0 0 20px rgba(51,207,255,.12)}
.hud .centerBtn svg{width:50%;height:50%;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.hudLabel{position:absolute;left:50%;bottom:-18px;transform:translateX(-50%);font-size:10px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;display:none}
#signalsLayer{position:absolute;inset:0;z-index:3;pointer-events:none}
#detailSheet{position:fixed;left:10px;right:10px;bottom:calc(var(--safe-bottom) + 86px);z-index:12;border:1px solid var(--line);border-radius:24px;background:linear-gradient(180deg, rgba(8,16,28,.86), rgba(8,16,28,.74));backdrop-filter:blur(18px);box-shadow:var(--shadow);padding:14px 14px 16px;display:none;max-height:min(42vh, 320px);overflow:auto}
#detailSheet.show{display:block}
#detailTitle{font-size:16px;font-weight:700;margin:0 0 4px}
#detailMeta{font-size:12px;color:var(--muted);margin-bottom:10px}
#detailBody{font-size:14px;line-height:1.45;color:#d9f6ff;margin-bottom:12px}
#detailActions{display:flex;gap:8px;flex-wrap:wrap}
.sheetBtn{border:1px solid var(--line);background:var(--blue-soft);color:#dff8ff;border-radius:14px;padding:10px 14px;min-height:44px}
.sheetBtn.primary{border-color:rgba(38,226,124,.35);background:rgba(38,226,124,.12);color:#dfffe9}
#bottomDock{position:fixed;left:8px;right:8px;bottom:calc(var(--safe-bottom) + 8px);z-index:20;pointer-events:none}
#helperBtn,#addBtn,#composer{pointer-events:auto}
#helperBtn{position:absolute;left:0;bottom:0;width:var(--helper-size);height:var(--helper-size);border-radius:20px;border:1px solid var(--line);background:linear-gradient(180deg, rgba(8,16,28,.86), rgba(8,16,28,.66));backdrop-filter:blur(14px);box-shadow:var(--shadow);display:grid;place-items:center;padding:4px}
#helperBtn svg{width:100%;height:100%}
#addBtn{position:absolute;right:0;bottom:0;width:60px;height:60px;border-radius:50%;border:1px solid var(--line-strong);background:radial-gradient(circle at 30% 24%, rgba(51,207,255,.22), rgba(8,16,28,.96) 68%);box-shadow:var(--shadow), inset 0 0 14px rgba(51,207,255,.10);display:grid;place-items:center;color:#e9fbff}
#addBtn svg{width:28px;height:28px;stroke:currentColor;fill:none;stroke-width:2.4;stroke-linecap:round}
#composer{position:absolute;left:calc(var(--helper-size) + 10px);right:70px;bottom:0;border:1px solid var(--line);border-radius:24px;background:linear-gradient(180deg, rgba(8,16,28,.54), rgba(8,16,28,.42));backdrop-filter:blur(18px);box-shadow:var(--shadow);overflow:hidden}
#drawer{max-height:0;overflow:auto;transition:max-height .2s ease;padding:0 12px}
#composer.open #drawer{max-height:min(34vh, 240px);padding-top:12px;padding-bottom:8px;border-bottom:1px solid rgba(51,207,255,.12)}
.msg{padding:10px 12px;border-radius:16px;margin:0 0 8px;font-size:13px;line-height:1.38}
.msg.user{background:rgba(51,207,255,.10);border:1px solid rgba(51,207,255,.16);margin-left:28px}
.msg.ai{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);margin-right:28px}
#bar{display:flex;align-items:center;gap:8px;padding:10px}
#micBtn,#sendBtn,#channelAdd{width:42px;height:42px;border-radius:14px;border:1px solid var(--line);background:rgba(7,14,24,.52);color:#ecfbff;display:grid;place-items:center;flex:0 0 auto}
#micBtn.active{border-color:rgba(38,226,124,.4);background:rgba(38,226,124,.12);color:#dffff0}
#sendBtn svg,#micBtn svg,#channelAdd svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2.1;stroke-linecap:round;stroke-linejoin:round}
#inputWrap{display:flex;align-items:center;gap:8px;flex:1;min-width:0;border:1px solid rgba(51,207,255,.18);border-radius:16px;background:rgba(4,10,18,.22);padding:0 10px}
#channelWrap{display:flex;align-items:center;gap:6px;min-width:0;flex:0 1 148px}
#channelArrow{color:#a4dfff;font-size:12px;line-height:1;flex:0 0 auto}
#channelSelect{appearance:none;background:transparent;border:none;color:#c7f4ff;height:42px;min-width:0;flex:1;font-size:12px;outline:none}
#textInput{flex:1;min-width:0;height:42px;background:transparent;border:none;color:#eaffff;outline:none;font-size:14px}
#textInput::placeholder{color:#7ca2bb}
#radial{position:fixed;inset:0;z-index:18;pointer-events:none}
.radialOption{position:absolute;width:88px;height:88px;border-radius:50%;border:1px solid var(--line);background:radial-gradient(circle at 30% 24%, rgba(51,207,255,.22), rgba(8,16,28,.92) 68%);box-shadow:var(--shadow);display:none;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:10px;color:#e6fbff;font-size:11px;line-height:1.2;pointer-events:auto}
.radialOption.show{display:flex}
.radialOption strong{font-size:12px;display:block;margin-bottom:3px}
#formModal{position:fixed;inset:0;z-index:30;background:rgba(2,6,10,.42);backdrop-filter:blur(8px);display:none;align-items:flex-end}
#formModal.show{display:flex}
#formSheet{width:100%;max-height:88vh;border-top-left-radius:28px;border-top-right-radius:28px;background:linear-gradient(180deg, rgba(8,16,28,.95), rgba(8,16,28,.88));border-top:1px solid var(--line);box-shadow:var(--shadow);padding:14px 14px 18px;overflow:auto}
#formHeader{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
#formHeader h2{margin:0;font-size:18px}
#closeForm{width:42px;height:42px;border-radius:14px;border:1px solid var(--line);background:var(--blue-soft);color:#effcff;font-size:26px;line-height:1}
.formGrid{display:grid;gap:10px}
.formGrid.two{grid-template-columns:1fr 1fr}
label{display:grid;gap:6px;font-size:12px;color:#b2ddef}
input,select,textarea{width:100%;min-height:44px;border-radius:14px;border:1px solid rgba(51,207,255,.18);background:rgba(255,255,255,.04);color:#ecfcff;padding:10px 12px;outline:none}
textarea{min-height:88px;resize:vertical}
#saveListing{margin-top:12px;width:100%;min-height:48px;border-radius:16px;border:1px solid rgba(38,226,124,.35);background:rgba(38,226,124,.14);color:#eaffef;font-weight:700}
#mapTapPill{position:fixed;left:50%;top:calc(var(--safe-top) + 48px);transform:translateX(-50%);z-index:11;padding:9px 14px;border-radius:999px;border:1px solid var(--line);background:rgba(8,16,28,.68);backdrop-filter:blur(12px);font-size:12px;color:#dbf7ff;display:none}
#mapTapPill.show{display:block}
.leaflet-control-attribution,.leaflet-control-zoom{display:none !important}
.listing-dot{width:14px;height:14px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 14px rgba(0,0,0,.25)}
@media (max-width:420px){
  :root{--helper-size:58px;--hud-size:88px}
  #channelWrap{flex-basis:126px}
  #composer{left:68px;right:66px}
  #bar{gap:6px;padding:8px}
  #micBtn,#sendBtn,#channelAdd{width:40px;height:40px}
}
</style>
</head>
<body>
<div id="app">
  <div id="world">
    <div id="stars"></div>
    <canvas id="globe"></canvas>
    <div id="map"></div>
    <canvas id="signalsLayer"></canvas>
    <div id="topPill">Astranov <span id="statusTiny">world online</span></div>
    <div id="mapTapPill">Tap the map to place your listing</div>

    <div class="hud left" id="perfHud">
      <div class="ring"></div>
      <canvas id="perfCanvas"></canvas>
      <button class="centerBtn" id="gripBtn" aria-label="Load or unload">
        <svg viewBox="0 0 24 24" id="gripOpen"><path d="M16 7c-1.5 0-3 1.2-3 3v7"></path><path d="M9 8c-1.2.5-2 1.7-2 3v4c0 2.2 1.8 4 4 4h1"></path></svg>
        <svg viewBox="0 0 24 24" id="gripClosed" style="display:none"><path d="M8 8v5c0 2.8 2.2 5 5 5h2"></path><circle cx="12" cy="12" r="2.2" fill="currentColor" stroke="none"></circle></svg>
      </button>
    </div>

    <div class="hud right" id="radarHud">
      <div class="ring"></div>
      <canvas id="radarCanvas"></canvas>
      <button class="centerBtn" id="zoomBtn" aria-label="Zoom to location or globe">
        <svg viewBox="0 0 24 24" id="zoomInIcon"><path d="M12 17V7"></path><path d="M8 11l4-4 4 4"></path></svg>
        <svg viewBox="0 0 24 24" id="zoomOutIcon" style="display:none"><path d="M12 7v10"></path><path d="M8 13l4 4 4-4"></path></svg>
      </button>
    </div>

    <div id="detailSheet">
      <h3 id="detailTitle"></h3>
      <div id="detailMeta"></div>
      <div id="detailBody"></div>
      <div id="detailActions"></div>
    </div>
  </div>

  <div id="radial"></div>

  <div id="formModal">
    <div id="formSheet">
      <div id="formHeader">
        <h2 id="formTitle">Create listing</h2>
        <button id="closeForm" aria-label="Close">×</button>
      </div>
      <form id="listingForm">
        <div id="formFields" class="formGrid"></div>
        <button type="submit" id="saveListing">Save listing</button>
      </form>
    </div>
  </div>

  <div id="bottomDock">
    <button id="helperBtn" aria-label="Astranov helper">
      <svg viewBox="0 0 88 88">
        <defs>
          <linearGradient id="g1" x1="0" x2="1">
            <stop offset="0%" stop-color="#9beaff" stop-opacity=".9"/>
            <stop offset="100%" stop-color="#33cfff" stop-opacity=".95"/>
          </linearGradient>
        </defs>
        <path d="M16 52c5-7 11-12 16-15-4-7-2-15 6-20 1 6 4 9 6 10 2-1 5-4 6-10 8 5 10 13 6 20 6 3 11 8 16 15-8-2-13-5-17-9v17c0 4-3 8-7 8h-10c-4 0-7-4-7-8V43c-4 4-9 7-17 9Z" fill="none" stroke="url(#g1)" stroke-width="3.2" stroke-linejoin="round"/>
        <path d="M30 30 22 18M58 30l8-12" stroke="url(#g1)" stroke-width="4" stroke-linecap="round"/>
        <path d="M43 22 61 6M45 22 27 6" stroke="url(#g1)" stroke-width="3.5" stroke-linecap="round"/>
        <path d="M63 54 74 32" stroke="url(#g1)" stroke-width="4" stroke-linecap="round"/>
        <path d="M72 35 78 28" stroke="url(#g1)" stroke-width="3.2" stroke-linecap="round"/>
      </svg>
    </button>

    <div id="composer">
      <div id="drawer"></div>
      <div id="bar">
        <button id="micBtn" aria-label="Voice typing">
          <svg viewBox="0 0 24 24"><path d="M12 4a3 3 0 0 1 3 3v4a3 3 0 1 1-6 0V7a3 3 0 0 1 3-3Z"></path><path d="M6 10a6 6 0 0 0 12 0"></path><path d="M12 16v4"></path><path d="M9 20h6"></path></svg>
        </button>
        <div id="inputWrap">
          <div id="channelWrap">
            <span id="channelArrow">▾</span>
            <select id="channelSelect" aria-label="Channel">
              <option>Astranov Collective Intelligence</option>
              <option>Marketplace</option>
              <option>Planet Operations</option>
              <option>Astranov Racing</option>
            </select>
            <button id="channelAdd" type="button" aria-label="Add channel">
              <svg viewBox="0 0 24 24"><path d="M12 5v14"></path><path d="M5 12h14"></path></svg>
            </button>
          </div>
          <input id="textInput" placeholder="Tell Astranov what to do" />
        </div>
        <button id="sendBtn" aria-label="Send">
          <svg viewBox="0 0 24 24"><path d="m4 12 15-7-4 14-3-5-8-2Z"></path></svg>
        </button>
      </div>
    </div>

    <button id="addBtn" aria-label="Add listing or action">
      <svg viewBox="0 0 24 24"><path d="M12 5v14"></path><path d="M5 12h14"></path></svg>
    </button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
(() => {
  const $ = s => document.querySelector(s)
  const globe = $('#globe')
  const globeCtx = globe.getContext('2d')
  const signalsCanvas = $('#signalsLayer')
  const signalsCtx = signalsCanvas.getContext('2d')
  const radarCanvas = $('#radarCanvas')
  const radarCtx = radarCanvas.getContext('2d')
  const perfCanvas = $('#perfCanvas')
  const perfCtx = perfCanvas.getContext('2d')
  const mapEl = $('#map')
  const drawer = $('#drawer')
  const composer = $('#composer')
  const textInput = $('#textInput')
  const statusTiny = $('#statusTiny')
  const zoomBtn = $('#zoomBtn')
  const zoomInIcon = $('#zoomInIcon')
  const zoomOutIcon = $('#zoomOutIcon')
  const gripBtn = $('#gripBtn')
  const gripOpen = $('#gripOpen')
  const gripClosed = $('#gripClosed')
  const addBtn = $('#addBtn')
  const helperBtn = $('#helperBtn')
  const radial = $('#radial')
  const formModal = $('#formModal')
  const formFields = $('#formFields')
  const formTitle = $('#formTitle')
  const listingForm = $('#listingForm')
  const detailSheet = $('#detailSheet')
  const detailTitle = $('#detailTitle')
  const detailMeta = $('#detailMeta')
  const detailBody = $('#detailBody')
  const detailActions = $('#detailActions')
  const mapTapPill = $('#mapTapPill')
  const micBtn = $('#micBtn')
  const sendBtn = $('#sendBtn')
  const channelAdd = $('#channelAdd')
  let map, markersLayer
  let view = 'globe'
  let rotation = 0
  let pendingType = null
  let currentFormType = null
  let currentCoords = null
  let radialOpen = false
  let drawerHeight = 0
  let gripLoaded = false
  let userLocation = null
  let recognition = null
  let markers = []
  const LS_KEY = 'astranov.recovery.listings.v1'
  const MSG_KEY = 'astranov.recovery.messages.v1'
  const seeded = [
    {id:'s1',type:'service',category:'diving',title:'Blue Reef Diving',description:'Daily dives, training, equipment and boat pickup.',price:'From €55',lat:36.446,lng:28.227,temp:'neutral'},
    {id:'s2',type:'product',category:'coffee',title:'Harbor Coffee',description:'Coffee, sandwiches and delivery-ready breakfast packs.',price:'From €3.50',lat:36.444,lng:28.219,temp:'hot',maxTransport:'30'},
    {id:'s3',type:'service',category:'rent a car',title:'Island Wheels',description:'Small cars, scooters and airport pickup.',price:'From €29/day',lat:36.434,lng:28.214,temp:'neutral'},
    {id:'s4',type:'driver',category:'driver base',title:'North Hub Driver Base',description:'Fast rider coverage across the center and harbor.',price:'Driver base',lat:36.439,lng:28.233,temp:'neutral'}
  ]
  let listings = loadListings()
  let messages = loadMessages()

  function loadListings(){
    try{ const local = JSON.parse(localStorage.getItem(LS_KEY) || '[]'); return [...seeded, ...local] }catch(e){ return [...seeded] }
  }
  function saveLocalListings(){
    const locals = listings.filter(x => !String(x.id).startsWith('s'))
    localStorage.setItem(LS_KEY, JSON.stringify(locals))
  }
  function loadMessages(){
    try{ return JSON.parse(localStorage.getItem(MSG_KEY) || '[]') }catch(e){ return [] }
  }
  function saveMessages(){ localStorage.setItem(MSG_KEY, JSON.stringify(messages.slice(-40))) }
  function pushMessage(role, text){
    messages.push({role, text})
    saveMessages()
    renderMessages()
    openDrawer(Math.min(220, Math.max(120, drawer.scrollHeight + 8)))
  }
  function renderMessages(){
    drawer.innerHTML = messages.map(m => `<div class="msg ${m.role}">${escapeHtml(m.text)}</div>`).join('')
    drawer.scrollTop = drawer.scrollHeight
  }
  function escapeHtml(s){ return String(s).replace(/[&<>\"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])) }
  function openDrawer(h=170){ drawerHeight = Math.max(100, Math.min(h, Math.min(window.innerHeight*0.34, 240))); composer.classList.add('open'); drawer.style.maxHeight = drawerHeight + 'px' }
  function closeDrawer(){ drawerHeight = 0; composer.classList.remove('open'); drawer.style.maxHeight = '0px' }

  function sizeCanvases(){
    for(const c of [globe, signalsCanvas]){
      c.width = innerWidth * devicePixelRatio
      c.height = innerHeight * devicePixelRatio
      c.style.width = innerWidth + 'px'
      c.style.height = innerHeight + 'px'
      c.getContext('2d').setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0)
    }
    for(const c of [radarCanvas, perfCanvas]){
      const r = c.getBoundingClientRect()
      c.width = r.width * devicePixelRatio
      c.height = r.height * devicePixelRatio
      c.getContext('2d').setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0)
    }
    renderHud()
  }

  function renderHud(){
    renderRadar()
    renderPerf()
  }
  function renderRadar(){
    const r = radarCanvas.getBoundingClientRect(); const w = r.width, h = r.height, cx=w/2, cy=h/2
    radarCtx.clearRect(0,0,w,h)
    radarCtx.strokeStyle = 'rgba(51,207,255,.22)'; radarCtx.lineWidth = 1
    for(let i=1;i<=3;i++){ radarCtx.beginPath(); radarCtx.arc(cx,cy,(w*.5)*(i/3)-6,0,Math.PI*2); radarCtx.stroke() }
    radarCtx.beginPath(); radarCtx.moveTo(cx,10); radarCtx.lineTo(cx,h-10); radarCtx.moveTo(10,cy); radarCtx.lineTo(w-10,cy); radarCtx.stroke()
    radarCtx.strokeStyle = 'rgba(51,207,255,.38)'; radarCtx.beginPath(); radarCtx.arc(cx,cy,w*.18,0,Math.PI*2); radarCtx.stroke()
  }
  function renderPerf(){
    const r = perfCanvas.getBoundingClientRect(); const w = r.width, h = r.height, cx=w/2, cy=h/2
    perfCtx.clearRect(0,0,w,h)
    const arcs = [
      {from:Math.PI*.12,to:Math.PI*.72,color:'rgba(38,226,124,.68)'},
      {from:Math.PI*.82,to:Math.PI*1.42,color:'rgba(51,207,255,.68)'},
      {from:Math.PI*1.52,to:Math.PI*1.92,color:'rgba(255,90,109,.64)'}
    ]
    perfCtx.lineWidth = 5
    arcs.forEach(a=>{ perfCtx.strokeStyle=a.color; perfCtx.beginPath(); perfCtx.arc(cx,cy,w*.34,a.from,a.to); perfCtx.stroke() })
    perfCtx.strokeStyle = 'rgba(51,207,255,.16)'; perfCtx.lineWidth=1.2; perfCtx.beginPath(); perfCtx.arc(cx,cy,w*.24,0,Math.PI*2); perfCtx.stroke()
  }

  function normalizeType(type){
    return ({'photo/video':'media','delivery location':'delivery','driver base':'driver'})[type] || type
  }
  function categoryColor(item){
    const t = item.type
    if(t==='driver') return '#ff9d3f'
    if(t==='delivery') return '#9a7cff'
    if(t==='service') return '#39d89a'
    if(t==='media') return '#ff5a6d'
    return '#33cfff'
  }
  function mergedSignals(){
    return listings.slice(0,24)
  }
  function ensureMap(){
    if(map) return
    map = L.map('map', {zoomControl:false, attributionControl:false}).setView([36.434,28.217], 13)
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom:19}).addTo(map)
    markersLayer = L.layerGroup().addTo(map)
    map.on('click', e => {
      if(pendingType){
        currentCoords = {lat:e.latlng.lat, lng:e.latlng.lng}
        mapTapPill.classList.remove('show')
        openForm(pendingType, currentCoords)
      }
    })
    renderMarkers()
  }
  function renderMarkers(){
    if(!markersLayer) return
    markersLayer.clearLayers(); markers=[]
    listings.forEach(item => {
      if(!(item.lat && item.lng)) return
      const div = L.divIcon({className:'', html:`<div class="listing-dot" style="background:${categoryColor(item)}"></div>`, iconSize:[14,14], iconAnchor:[7,7]})
      const marker = L.marker([item.lat, item.lng], {icon:div}).addTo(markersLayer)
      marker.on('click', () => showDetail(item))
      markers.push(marker)
    })
  }
  function showMap(center){
    view='map'; mapEl.style.display='block'; globe.style.display='none'; signalsCanvas.style.display='none'; statusTiny.textContent='city map online'; zoomInIcon.style.display='none'; zoomOutIcon.style.display='block'; ensureMap(); setTimeout(()=>map.invalidateSize(),60)
    if(center) map.setView(center, 15, {animate:true})
  }
  function showGlobe(){
    view='globe'; mapEl.style.display='none'; globe.style.display='block'; signalsCanvas.style.display='block'; statusTiny.textContent='world online'; zoomInIcon.style.display='block'; zoomOutIcon.style.display='none'; pendingType = null; mapTapPill.classList.remove('show')
  }
  async function locateUser(){
    if(userLocation) return userLocation
    try{
      userLocation = await new Promise((resolve, reject) => navigator.geolocation.getCurrentPosition(pos => resolve([pos.coords.latitude, pos.coords.longitude]), reject, {enableHighAccuracy:true, timeout:5000, maximumAge:60000}))
    }catch(e){ userLocation = [36.434, 28.217] }
    return userLocation
  }
  async function toggleZoom(){
    if(view==='globe'){
      const center = await locateUser()
      showMap(center)
      pushMessage('ai', 'Zoomed to your area. Tap the map to inspect or place a listing.')
    }else{
      showGlobe()
      pushMessage('ai', 'Returned to global view.')
    }
  }
  function toggleGrip(){
    gripLoaded = !gripLoaded
    gripOpen.style.display = gripLoaded ? 'none' : 'block'
    gripClosed.style.display = gripLoaded ? 'block' : 'none'
    gripBtn.style.borderColor = gripLoaded ? 'rgba(255,90,109,.58)' : 'rgba(38,226,124,.40)'
    pushMessage('ai', gripLoaded ? 'Load engaged.' : 'Unload ready.')
  }

  function showDetail(item){
    detailTitle.textContent = item.title || 'Astranov item'
    detailMeta.textContent = [item.type, item.category, item.price].filter(Boolean).join(' • ')
    detailBody.textContent = item.description || 'No details yet.'
    detailActions.innerHTML = ''
    const actions = [
      {label:'Route here', primary:true, onClick: async() => { showMap(await locateUser()); if(item.lat && item.lng) map.flyTo([item.lat,item.lng],16,{animate:true}) }},
      {label:item.type==='product'?'Order':'Open', primary:false, onClick:() => pushMessage('ai', `${item.title} is ready. Continue through Astranov chat or contact the seller.`)}
    ]
    actions.forEach(a => {
      const b=document.createElement('button'); b.className='sheetBtn'+(a.primary?' primary':''); b.textContent=a.label; b.onclick=a.onClick; detailActions.appendChild(b)
    })
    detailSheet.classList.add('show')
  }
  function hideDetail(){ detailSheet.classList.remove('show') }

  function makeRadialOption(type, label, sub){
    const btn = document.createElement('button')
    btn.className='radialOption'
    btn.innerHTML = `<strong>${label}</strong><span>${sub}</span>`
    btn.addEventListener('click', async e => {
      e.stopPropagation()
      radialOpen = false; layoutRadial()
      pendingType = type
      hideDetail()
      const center = await locateUser()
      showMap(center)
      mapTapPill.classList.add('show')
      pushMessage('ai', `Tap the map to place your ${label.toLowerCase()}.`)
    })
    radial.appendChild(btn)
    return btn
  }
  const radialButtons = [
    makeRadialOption('product','Product','Menu item or goods'),
    makeRadialOption('service','Service','Hotel, rent-a-car, diving'),
    makeRadialOption('delivery','Delivery spot','Receive offers here'),
    makeRadialOption('driver','Driver base','Activate coverage zone'),
    makeRadialOption('media','Photo / video','Post a visual signal')
  ]
  function layoutRadial(){
    const anchor = addBtn.getBoundingClientRect();
    const cx = anchor.left + anchor.width/2; const cy = anchor.top + anchor.height/2
    const radius = Math.min(132, innerWidth * 0.28)
    radialButtons.forEach((btn,i) => {
      if(!radialOpen){ btn.classList.remove('show'); return }
      const angle = (-155 + i*35) * Math.PI/180
      const x = cx + Math.cos(angle) * radius - 44
      const y = cy + Math.sin(angle) * radius - 44
      btn.style.left = Math.max(10, Math.min(innerWidth-98, x)) + 'px'
      btn.style.top = Math.max(60, Math.min(innerHeight-160, y)) + 'px'
      btn.classList.add('show')
    })
  }
  function closeRadial(){ radialOpen=false; layoutRadial() }
  addBtn.addEventListener('click', e => { e.stopPropagation(); radialOpen=!radialOpen; layoutRadial(); hideDetail() })
  radial.addEventListener('click', e => { if(e.target===radial) closeRadial() })
  document.addEventListener('click', e => { if(!e.target.closest('#addBtn') && !e.target.closest('.radialOption')) closeRadial() })
  window.addEventListener('resize', layoutRadial)

  function openForm(type, coords){
    currentFormType = type
    currentCoords = coords
    formTitle.textContent = ({product:'List product',service:'List service',delivery:'Delivery location',driver:'Driver base',media:'Photo / video'})[type]
    formFields.innerHTML = ''
    const f = []
    const addField = (label, name, kind='input', attrs='') => f.push({label,name,kind,attrs})
    addField('Title', 'title')
    if(type==='service') addField('Service type', 'category', 'select', '<option>Hotel</option><option>Rent a car</option><option>Diving school</option><option>Restaurant</option><option>Other service</option>')
    if(type==='product') addField('Category', 'category', 'select', '<option>Food</option><option>Coffee</option><option>Grocery</option><option>Product</option>')
    if(type==='driver') addField('Coverage radius (km)', 'radius')
    if(type==='delivery') { addField('Street', 'street'); addField('Number', 'number'); addField('Floor', 'floor'); addField('Doorbell', 'doorbell') }
    addField('Price / note', 'price')
    addField('Description', 'description', 'textarea')
    if(type==='product'){ addField('Quantity', 'quantity'); addField('Temperature', 'temp', 'select', '<option>cold</option><option>hot</option><option>neutral</option>'); addField('Max transport minutes', 'maxTransport') }
    if(type==='service'){ addField('Appointment slots / hour', 'slots'); addField('Bookable hours', 'bookHours') }
    if(type==='media'){ addField('Media URL', 'mediaUrl'); addField('Caption', 'description', 'textarea') }
    addField('Photo / video link', 'photoUrl')
    f.forEach((field, idx) => {
      const wrap = document.createElement('label')
      wrap.innerHTML = `<span>${field.label}</span>`
      let node
      if(field.kind==='textarea'){ node = document.createElement('textarea') }
      else if(field.kind==='select'){ node = document.createElement('select'); node.innerHTML = field.attrs }
      else { node = document.createElement('input'); node.type='text' }
      node.name = field.name
      wrap.appendChild(node)
      formFields.appendChild(wrap)
    })
    formModal.classList.add('show')
  }
  function closeForm(){ formModal.classList.remove('show'); currentFormType = null; pendingType = null; mapTapPill.classList.remove('show') }
  $('#closeForm').addEventListener('click', closeForm)
  formModal.addEventListener('click', e => { if(e.target===formModal) closeForm() })
  listingForm.addEventListener('submit', e => {
    e.preventDefault()
    const fd = new FormData(listingForm)
    const data = Object.fromEntries(fd.entries())
    const id = 'l' + Date.now().toString(36)
    const item = { id, type:currentFormType, ...data, lat: currentCoords?.lat, lng: currentCoords?.lng, createdAt: Date.now() }
    listings.unshift(item)
    saveLocalListings(); renderMarkers(); closeForm(); showDetail(item)
    pushMessage('ai', `${item.title || 'Listing'} saved and placed on Astranov.`)
  })

  sendBtn.addEventListener('click', handleSend)
  textInput.addEventListener('keydown', e => { if(e.key==='Enter'){ e.preventDefault(); handleSend() } })
  function handleSend(){
    const text = textInput.value.trim(); if(!text) return
    pushMessage('user', text)
    const lower = text.toLowerCase()
    if(lower.includes('zoom')) toggleZoom()
    else if(lower.includes('product') || lower.includes('service') || lower.includes('delivery') || lower.includes('driver')) { radialOpen = true; layoutRadial(); pushMessage('ai', 'Choose what to place, then tap the map.') }
    else if(lower.includes('globe')) { showGlobe() }
    else { pushMessage('ai', 'Use Add to place a product, service, delivery location or driver base. Use the radar to jump between globe and map.') }
    textInput.value = ''
  }

  helperBtn.addEventListener('click', () => {
    openDrawer(180)
    pushMessage('ai', 'Astranov Collective Intelligence ready. Use Add to place services and goods. Use the radar to jump to your area.')
  })
  channelAdd.addEventListener('click', () => {
    const name = prompt('New channel name')
    if(!name) return
    const option = document.createElement('option'); option.textContent = name; $('#channelSelect').appendChild(option); $('#channelSelect').value = name
    pushMessage('ai', `${name} added.`)
  })

  zoomBtn.addEventListener('click', toggleZoom)
  gripBtn.addEventListener('click', toggleGrip)
  detailSheet.addEventListener('click', e => { if(e.target===detailSheet) hideDetail() })

  function setupVoice(){
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition
    if(!SR) return
    recognition = new SR(); recognition.lang = 'en-US'; recognition.interimResults = true; recognition.maxAlternatives = 1
    let finalText=''
    recognition.onstart = () => micBtn.classList.add('active')
    recognition.onresult = e => {
      let text=''
      for(let i=e.resultIndex;i<e.results.length;i++) text += e.results[i][0].transcript
      textInput.value = text
      if(e.results[e.results.length-1].isFinal) finalText = text
    }
    recognition.onend = () => { micBtn.classList.remove('active'); if(finalText){ textInput.value = finalText; finalText=''; } }
    micBtn.addEventListener('click', () => {
      if(micBtn.classList.contains('active')) recognition.stop(); else recognition.start()
    })
  }

  function wireDrawerGesture(){
    let startY = 0, active = false, startedAt = 0
    const target = $('#inputWrap')
    target.addEventListener('pointerdown', e => { active = true; startY = e.clientY; startedAt = Date.now() })
    target.addEventListener('pointermove', e => {
      if(!active) return
      const dy = startY - e.clientY
      if(Math.abs(dy) < 18) return
      if(dy > 0) openDrawer(Math.min(240, 120 + dy))
      else if(dy < -24) closeDrawer()
    })
    const end = () => { active = false }
    target.addEventListener('pointerup', end)
    target.addEventListener('pointercancel', end)
  }

  async function fetchOptionalFeeds(){
    const endpoints = [
      ['/api/shops_list.php','service'],
      ['/api/products_list.php','product'],
      ['/api/drivers_state.php','driver'],
      ['/api/news_top.php','media']
    ]
    for(const [url, type] of endpoints){
      try{
        const res = await fetch(url, {cache:'no-store'})
        if(!res.ok) continue
        const data = await res.json()
        if(!Array.isArray(data)) continue
        data.slice(0,8).forEach((row, idx) => {
          const lat = parseFloat(row.lat ?? row.latitude ?? row.last_lat)
          const lng = parseFloat(row.lng ?? row.longitude ?? row.last_lng)
          if(!Number.isFinite(lat) || !Number.isFinite(lng)) return
          listings.push({
            id:`api-${type}-${idx}-${Date.now()}`,
            type,
            category: row.category || row.kind || type,
            title: row.name || row.title || row.shop_name || row.user_name || `${type} signal`,
            description: row.description || row.summary || row.snippet || '',
            price: row.price || row.status || '',
            lat,lng,
            temp: row.temp || row.temperature || 'neutral'
          })
        })
      }catch(e){}
    }
    renderMarkers()
  }

  function animate(){
    const t = performance.now() * 0.001
    drawEarth(t)
    requestAnimationFrame(animate)
  }
  function drawEarth(t){
    const w = innerWidth, h = innerHeight
    globeCtx.clearRect(0,0,w,h); signalsCtx.clearRect(0,0,w,h)
    const cx = w/2, cy = h*0.42, r = Math.min(w*0.34, h*0.24)
    rotation = (t * 0.18) % (Math.PI*2)
    globeCtx.save()
    globeCtx.translate(cx, cy)
    const g = globeCtx.createRadialGradient(-r*0.28,-r*0.34, r*0.16, 0,0,r)
    g.addColorStop(0,'rgba(32,133,255,.88)'); g.addColorStop(.45,'rgba(19,80,160,.95)'); g.addColorStop(1,'rgba(6,18,42,1)')
    globeCtx.fillStyle = g; globeCtx.beginPath(); globeCtx.arc(0,0,r,0,Math.PI*2); globeCtx.fill()
    globeCtx.strokeStyle='rgba(124,222,255,.18)'; globeCtx.lineWidth=1
    for(let i=-2;i<=2;i++){
      globeCtx.beginPath(); globeCtx.ellipse(0,0,r*Math.cos(i*.26),r,0,0,Math.PI*2); globeCtx.stroke()
      globeCtx.beginPath(); globeCtx.ellipse(0,0,r,r*Math.cos(i*.26),0,0,Math.PI*2); globeCtx.stroke()
    }
    drawContinents(globeCtx, r, rotation)
    const atmo = globeCtx.createRadialGradient(0,0,r*.75,0,0,r*1.2)
    atmo.addColorStop(0,'rgba(51,207,255,0)'); atmo.addColorStop(.8,'rgba(51,207,255,.12)'); atmo.addColorStop(1,'rgba(51,207,255,.01)')
    globeCtx.fillStyle = atmo; globeCtx.beginPath(); globeCtx.arc(0,0,r*1.18,0,Math.PI*2); globeCtx.fill()
    globeCtx.restore()

    const sigs = mergedSignals()
    sigs.forEach((item, idx) => {
      const lat = ((parseFloat(item.lat)||0) * Math.PI/180)
      const lng = ((parseFloat(item.lng)||0) * Math.PI/180) + rotation
      const x3 = Math.cos(lat) * Math.sin(lng)
      const y3 = Math.sin(lat)
      const z3 = Math.cos(lat) * Math.cos(lng)
      if(z3 < -0.15) return
      const x = cx + x3 * r
      const y = cy - y3 * r
      const lift = 12 + ((idx % 4) * 8) + (Math.sin(t*2 + idx) + 1) * 6
      signalsCtx.strokeStyle = categoryColor(item)
      signalsCtx.lineWidth = 1.4
      signalsCtx.beginPath(); signalsCtx.moveTo(x,y); signalsCtx.lineTo(x, y - lift); signalsCtx.stroke()
      signalsCtx.fillStyle = categoryColor(item)
      signalsCtx.beginPath(); signalsCtx.arc(x, y - lift, 3.3 + (Math.sin(t*3 + idx)+1)*.8, 0, Math.PI*2); signalsCtx.fill()
      signalsCtx.fillStyle = 'rgba(255,255,255,.75)'; signalsCtx.beginPath(); signalsCtx.arc(x,y,1.6,0,Math.PI*2); signalsCtx.fill()
    })
  }
  function drawContinents(ctx, r, rot){
    ctx.save(); ctx.rotate(rot*.25)
    ctx.fillStyle = 'rgba(46,186,120,.36)'
    blob(ctx, -r*0.26,-r*0.02, r*0.28, r*0.22)
    blob(ctx, r*0.14, -r*0.12, r*0.24, r*0.18)
    blob(ctx, r*0.02, r*0.18, r*0.20, r*0.14)
    ctx.fillStyle = 'rgba(78,220,160,.18)'
    blob(ctx, -r*0.14,-r*0.24, r*0.12, r*0.08)
    ctx.restore()
  }
  function blob(ctx,x,y,rx,ry){
    ctx.beginPath(); ctx.ellipse(x,y,rx,ry,0,0,Math.PI*2); ctx.fill()
  }

  function boot(){
    sizeCanvases(); renderMessages(); closeDrawer(); showGlobe(); setupVoice(); wireDrawerGesture(); animate(); fetchOptionalFeeds(); renderMarkers()
    window.addEventListener('resize', sizeCanvases)
  }
  boot()
})()
</script>
</body>
