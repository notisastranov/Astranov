<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Astranov Internet Operating System</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
<style>
/*
SPARTAN SCRIPT — ASTRANOV RECONSTRUCTION LOCK v5

MISSION
Rebuild the entire Astranov index.html from zero as one coherent operational file.

ABSOLUTE BUILD LAW
Never patch.
Never layer new systems over old systems.
Never keep obsolete code alive under new code.
Every structural change requires full reconstruction of the whole index.html.

RECONSTRUCTION LAW
On every rebuild:
- rebuild the whole file from scratch
- keep only the live mission systems
- delete replaced implementations completely
- remove obsolete HTML, CSS, JS, handlers, state, menus, labels, icons, overlays, ribbons, toggles, fallbacks, and dead branches
- leave no ghost controls, duplicate controls, hidden parallel systems, or compatibility leftovers

SPARTANIZATION LAW
On every rebuild take every reasonable step to Spartanize the code:
- reduce duplication
- merge repeated logic
- compress architecture
- remove dead code
- remove decorative complexity without function
- keep one source of truth per behavior
- keep code as small, efficient, and maintainable as possible
Do not sacrifice any required feature, mission-critical behavior, core usability, visual integrity, commercial readiness, or essential readability.

CONTROL LAW
One control per role.
If a feature is replaced, the previous version must be deleted completely.
Visible controls must always match real behavior.
No fake toggles. No fake buttons. No duplicate action paths.

ANTI-STRIP-DOWN LAW
Do not strip the app down into a demo shell, toy shell, placeholder shell, simplified mock shell, or reduced proof-of-concept.
Do not skin the app alive in the name of cleanup.
Reconstruction must preserve the real Astranov identity, operational density, and production intent.
Clean does not mean empty.
Spartan does not mean weak.
Reduction is forbidden if it removes required Astranov character, workflow, world interface, or commercial readiness.

FAILURE-LOCK LAW
Every time a rebuild fails, the Spartan Script must be updated immediately.
The update must explicitly name the failure pattern and forbid it on future rebuilds.
Each failure becomes a new hard restriction.
Do not repeat a previously observed failure class.

POST-MORTEM LAW
After a failed rebuild, identify exactly:
- what was stripped too far
- what was duplicated
- what stayed obsolete
- what behavior was fake or broken
- what visual or workflow identity was lost
Then convert those findings into new restrictions inside this Spartan Script before the next rebuild begins.

MOBILE-FIRST LAW
Astranov is a mobile application first.
Primary target is portrait orientation on small phones.
Desktop is secondary.
All layout, spacing, control scale, typography, card size, and interaction flow must be designed first for small-phone portrait view.
Nothing may assume desktop width.
Nothing may require large-screen hover logic to be usable.

SMALL-PHONE LAW
The UI must remain usable on small phones with limited width and height.
No critical control may be clipped, hidden below fold without clear access, or compressed into unreadable density.
No giant overlays may block the world view.
No bottom control cluster may become too cramped to tap accurately.
No floating widget may occupy space that breaks the main interaction path.

RESOLUTION AND CLARITY LAW
Use high-resolution rendering assumptions.
Everything must depict correctly on dense mobile screens.
Icons, text, helper, wheels, buttons, and cards must remain sharp, readable, and correctly proportioned.
Do not let fixed pixel sizes create toy-like or blurry results.
Use responsive sizing based on viewport width, height, and safe visual limits.

ANTI-DESKTOP-SHAPE LAW
Do not rebuild the UI as a desktop-shaped shell squeezed onto a phone.
Do not compress multiple desktop controls into a narrow bottom strip.
Do not preserve wide-layout assumptions in portrait mode.
No desktop-style fragmentation of controls on mobile.

ANTI-MASCOT-LAW
The AI helper must never look like a joke, toy, sticker, or decorative mascot.
It must read as a serious Astranov control character.
Scale, placement, silhouette, and detail must support authority and clarity.
Do not make it tiny, cramped, weak, childish, or visually disposable.

ANTI-FLOATING-TEXT LAW
No floating greetings, role labels, teaching labels, assistant chatter, status pills, or system prompts may live outside the composer flow.
All assistant, status, and guidance text must appear inside the composer or its linked chat drawer only.
No separate floating lines such as online notices, tutorial prompts, or mode-switch text are allowed on the world view.

ANTI-FRAGMENTATION LAW
The bottom interaction system must feel like one deliberate mobile control architecture.
Do not scatter the core workflow into disconnected pills, strips, and floating fragments.
The user must immediately understand left, center, and right roles.

WORLD-VIEW PRIORITY LAW
The globe or city map remains the main operating surface.
UI must not suffocate, cover, crowd, or visually dominate the world view.
Cards, prompts, and controls must respect the visibility of the globe or map.
Do not let oversized cards or labels block the planet.

COMPOSER LAW
All conversational, status, and assistant text belongs inside the composer or its linked drawer.
Composer must feel like the primary mobile command line.
Composer must contain:
- microphone button on the left for voice typing
- channel selector with visible left-side dropdown arrow
- channel add button
- text input
- separate send button
The add button remains a separate right-side control outside the composer.
Composer and drawer must scale cleanly on small phones.
Keyboard opening must not make the interface collapse into clutter.

CHAT LAW
No visible handle bars.
Chat expansion and retraction must be controlled by gesture inside the text area or by compact explicit drawer logic that does not waste screen space.
The drawer must remain compact and subordinate to the composer.
No desktop-like drawer chrome.

HUD LAW
Radar and performance HUDs must remain readable and proportional on small phones.
They must not fight the helper, composer, or action button for the same corner space.
HUD sizing must be responsive, sharp, and operational.

ZOOM LAW
Radar center button must perform a real navigation toggle:
- globe to user location or city map
- map back to globe
No visual-only zoom state is allowed.

ADD FLOW LAW
The add button must not open a giant blocking overlay.
The globe or map must remain visible.
Options appear around the world view as clear bubble actions.
No unnecessary central bubble.
No obsolete close systems.
No stuck actions left on screen.
Bubble layout must respect small-phone reach and visibility.

FAITHFULNESS LAW
A rebuild must remain faithful to the latest decent Astranov state.
Do not rebuild from an abstract template when a richer valid app state exists.
Use the latest decent app shell as the reconstruction anchor, then clean and reconstruct from there.

OUTPUT LAW
Every future Astranov rebuild must be delivered as one freshly reconstructed full index.html only.
No patches.
No layered overrides.
No versioned HTML names.
Final filename must be exactly index.html.
*/

:root{
  --bg:#040914;
  --bg2:#071424;
  --panel:rgba(6,14,28,.64);
  --panel-2:rgba(6,14,28,.88);
  --line:rgba(84,194,255,.24);
  --line-strong:rgba(84,194,255,.48);
  --glow:rgba(0,200,255,.38);
  --blue:#77d8ff;
  --blue-2:#00c7ff;
  --text:#dff7ff;
  --text-dim:#92b9d0;
  --green:#53f09a;
  --red:#ff5f70;
  --yellow:#ffd76a;
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-t:env(safe-area-inset-top,0px);
  --hud-size:clamp(98px, 26vw, 122px);
  --helper-w:clamp(68px, 19vw, 90px);
  --action-size:clamp(60px, 16vw, 72px);
  --composer-h:clamp(68px, 12vh, 88px);
  --composer-w:min(62vw, 430px);
  --font:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:radial-gradient(circle at 50% 0%, #0c1e35 0%, #07111e 38%, #040914 100%);font-family:var(--font);color:var(--text)}
body{position:relative}
button,input,select,textarea{font:inherit}
button{border:none;background:none;color:inherit}

#app{position:relative;width:100%;height:100dvh;overflow:hidden}
#topbar{
  position:absolute;top:0;left:0;right:0;z-index:40;
  display:flex;align-items:center;justify-content:space-between;
  padding:calc(10px + var(--safe-t)) 12px 8px;
  pointer-events:none;
}
#brandChip,#modeChip{
  pointer-events:auto;
  display:flex;align-items:center;gap:8px;
  min-height:32px;padding:0 12px;border-radius:999px;
  border:1px solid var(--line);
  background:linear-gradient(180deg, rgba(7,20,37,.72), rgba(7,20,37,.38));
  box-shadow:0 10px 24px rgba(0,0,0,.22), inset 0 0 18px rgba(0,200,255,.05);
  backdrop-filter:blur(12px) saturate(130%);
}
#brandChip strong{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--blue)}
#brandChip span,#modeChip span{font-size:11px;color:var(--text-dim)}
#modeChip span strong{color:var(--blue)}

#world{position:absolute;inset:0;overflow:hidden}
#spaceView,#mapView{position:absolute;inset:0}
#mapView{opacity:0;pointer-events:none;transition:opacity .32s ease}
#mapView.active{opacity:1;pointer-events:auto}
#map{position:absolute;inset:0;background:#0a1222}
.leaflet-container{background:#07111e}
.leaflet-tile{filter:saturate(.75) brightness(.82) hue-rotate(8deg)}

#spaceView{
  display:flex;align-items:center;justify-content:center;
  background:
    radial-gradient(circle at 20% 12%, rgba(88,43,180,.22), transparent 22%),
    radial-gradient(circle at 78% 18%, rgba(0,194,255,.17), transparent 26%),
    radial-gradient(circle at 50% 110%, rgba(0,80,130,.14), transparent 34%);
}
#stars,#signals{position:absolute;inset:0;pointer-events:none}
.star{position:absolute;width:2px;height:2px;border-radius:50%;background:rgba(255,255,255,.88);box-shadow:0 0 10px rgba(255,255,255,.55);opacity:.8;animation:twinkle calc(3s + var(--d)) ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:.25;transform:scale(.8)}50%{opacity:.95;transform:scale(1.35)}}
.signal{position:absolute;width:10px;height:10px;border-radius:50%;border:1px solid rgba(144,232,255,.56);box-shadow:0 0 16px rgba(0,200,255,.28)}
.signal::after{content:"";position:absolute;inset:-8px;border-radius:50%;border:1px solid rgba(144,232,255,.18);animation:pulse 2.8s linear infinite}
@keyframes pulse{0%{transform:scale(.65);opacity:.9}100%{transform:scale(1.55);opacity:0}}

#globeWrap{
  position:relative;
  width:min(76vw, 390px);
  aspect-ratio:1;
  display:flex;align-items:center;justify-content:center;
}
#globeHalo{
  position:absolute;inset:-10%;border-radius:50%;
  background:radial-gradient(circle, rgba(0,200,255,.18) 0%, rgba(0,200,255,.08) 36%, transparent 66%);
  filter:blur(18px);
}
#globe{
  position:relative;z-index:1;
  width:100%;height:100%;border-radius:50%;overflow:hidden;
  box-shadow:0 0 0 1px rgba(122,234,255,.32), 0 0 36px rgba(0,186,255,.18), 0 30px 60px rgba(0,0,0,.32);
  background:
    radial-gradient(circle at 35% 26%, rgba(160,240,255,.22), transparent 16%),
    radial-gradient(circle at 72% 64%, rgba(65,177,255,.22), transparent 18%),
    radial-gradient(circle at 50% 50%, rgba(10,30,66,.56), rgba(3,10,22,.94) 70%),
    linear-gradient(135deg, #0f4b77, #0c2144 52%, #071124 100%);
  animation:earthFloat 6s ease-in-out infinite;
}
@keyframes earthFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
#globe::before{
  content:"";position:absolute;inset:0;
  background:
    radial-gradient(ellipse at 35% 40%, rgba(88,255,208,.28) 0 16%, transparent 17%),
    radial-gradient(ellipse at 42% 58%, rgba(92,255,196,.24) 0 12%, transparent 13%),
    radial-gradient(ellipse at 56% 36%, rgba(92,255,196,.2) 0 14%, transparent 15%),
    radial-gradient(ellipse at 62% 60%, rgba(92,255,196,.2) 0 11%, transparent 12%),
    radial-gradient(ellipse at 28% 58%, rgba(92,255,196,.18) 0 9%, transparent 10%);
  filter:blur(8px);
  opacity:.95;
}
#globe::after{
  content:"";position:absolute;inset:0;border-radius:50%;
  background:
    repeating-linear-gradient(0deg, rgba(255,255,255,.09) 0 1px, transparent 1px 16px),
    repeating-linear-gradient(90deg, rgba(255,255,255,.08) 0 1px, transparent 1px 20px),
    radial-gradient(circle at 28% 25%, rgba(255,255,255,.16), transparent 24%),
    radial-gradient(circle at 54% 44%, transparent 0 56%, rgba(255,255,255,.08) 56% 57%, transparent 57%);
  mix-blend-mode:screen;
  opacity:.46;
}
#globeRim{position:absolute;inset:4%;border-radius:50%;border:1px solid rgba(145,232,255,.16);z-index:2;pointer-events:none}
#worldCaption{
  position:absolute;left:50%;bottom:clamp(150px, 22vh, 220px);transform:translateX(-50%);
  width:min(80vw, 320px);text-align:center;z-index:12;pointer-events:none;
}
#worldCaption strong{display:block;font-size:clamp(20px, 5vw, 28px);color:var(--text);letter-spacing:.04em}
#worldCaption span{display:block;margin-top:6px;font-size:12px;color:rgba(223,247,255,.8)}

.hud{
  position:absolute;z-index:30;width:var(--hud-size);height:var(--hud-size);border-radius:50%;
  border:1px solid var(--line);backdrop-filter:blur(10px) saturate(135%);
  background:
    radial-gradient(circle at 50% 50%, rgba(3,14,28,.88) 0 38%, transparent 38.5%),
    conic-gradient(from 0deg, rgba(0,200,255,.16), rgba(0,200,255,.03), rgba(0,200,255,.18), rgba(0,200,255,.03), rgba(0,200,255,.16));
  box-shadow:0 14px 28px rgba(0,0,0,.26), inset 0 0 18px rgba(0,200,255,.05);
  overflow:hidden;
}
.hud::before{content:"";position:absolute;inset:10%;border-radius:50%;border:1px dashed rgba(131,229,255,.14)}
.hud::after{content:"";position:absolute;inset:22%;border-radius:50%;border:1px solid rgba(131,229,255,.1)}
#perfHud{top:calc(58px + var(--safe-t));left:12px}
#radarHud{top:calc(58px + var(--safe-t));right:12px}
.hud-title{
  position:absolute;left:50%;top:10px;transform:translateX(-50%);
  font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--blue)
}
.hud-sub{position:absolute;left:50%;bottom:10px;transform:translateX(-50%);font-size:10px;color:var(--text-dim)}
#radarSweep{position:absolute;inset:0;border-radius:50%;background:conic-gradient(from 90deg, transparent 0 72%, rgba(0,200,255,.24) 88%, transparent 100%);mix-blend-mode:screen;animation:sweep 3.4s linear infinite}
@keyframes sweep{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
#perfMetrics,
#radarTicks{position:absolute;inset:0;pointer-events:none}
.metric{position:absolute;font-size:10px;color:var(--text-dim)}
.metric strong{display:block;color:var(--text);font-size:11px}
.metric.top{top:8px;left:50%;transform:translateX(-50%);text-align:center}
.metric.right{top:50%;right:6px;transform:translateY(-50%);text-align:right}
.metric.bottom{left:50%;bottom:8px;transform:translateX(-50%);text-align:center}
.metric.left{top:50%;left:6px;transform:translateY(-50%)}
.tick{position:absolute;left:50%;top:50%;width:1px;height:40%;background:linear-gradient(180deg, rgba(146,234,255,.12), transparent 55%);transform-origin:bottom center}
.tick:nth-child(1){transform:translate(-50%,-100%) rotate(0deg)}
.tick:nth-child(2){transform:translate(-50%,-100%) rotate(30deg)}
.tick:nth-child(3){transform:translate(-50%,-100%) rotate(60deg)}
.tick:nth-child(4){transform:translate(-50%,-100%) rotate(90deg)}
.tick:nth-child(5){transform:translate(-50%,-100%) rotate(120deg)}
.tick:nth-child(6){transform:translate(-50%,-100%) rotate(150deg)}
.hud-center-btn{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  width:clamp(30px, 8.4vw, 38px);height:clamp(30px, 8.4vw, 38px);border-radius:50%;
  border:1px solid rgba(131,229,255,.36);
  background:radial-gradient(circle at 30% 25%, rgba(0,200,255,.28), rgba(5,16,30,.95) 70%);
  color:#e8fcff;display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 18px rgba(0,200,255,.18), inset 0 0 12px rgba(0,200,255,.08);
  cursor:pointer;z-index:3;
}
.hud-center-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
#zoomOutIcon{display:none}
body.map-mode #zoomInIcon{display:none}
body.map-mode #zoomOutIcon{display:block}
#grabOpen{display:block}
#grabClosed{display:none}
body.loaded-state #grabOpen{display:none}
body.loaded-state #grabClosed{display:block}

#radialMenu{position:absolute;inset:0;z-index:25;pointer-events:none}
.radial-item{
  position:absolute;display:flex;flex-direction:column;align-items:center;justify-content:center;
  width:clamp(74px, 19vw, 92px);height:clamp(74px, 19vw, 92px);padding:10px;border-radius:50%;
  border:1px solid rgba(131,229,255,.28);background:radial-gradient(circle at 35% 25%, rgba(0,200,255,.24), rgba(6,16,30,.92) 72%);
  color:var(--text);box-shadow:0 16px 32px rgba(0,0,0,.28), 0 0 18px rgba(0,200,255,.08);
  text-align:center;pointer-events:auto;cursor:pointer;opacity:0;transform:translate(-50%,-50%) scale(.72);
  transition:opacity .18s ease, transform .22s ease, border-color .18s ease;
}
.radial-item strong{display:block;font-size:11px;line-height:1.15}
.radial-item span{display:block;margin-top:4px;font-size:10px;line-height:1.2;color:var(--text-dim)}
.radial-item.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
.radial-item:active{border-color:var(--line-strong)}

#sheetLayer{position:absolute;inset:0;z-index:35;pointer-events:none}
#sheetBackdrop{position:absolute;inset:0;background:linear-gradient(180deg, rgba(2,7,14,.04), rgba(2,7,14,.22));opacity:0;transition:opacity .2s ease}
.sheet-open #sheetBackdrop{opacity:1;pointer-events:auto}
#sheetCard{
  position:absolute;left:50%;bottom:calc(var(--composer-h) + 22px + var(--safe-b));transform:translate(-50%, 110%);
  width:min(94vw, 430px);max-height:min(58vh, 480px);overflow:auto;pointer-events:auto;
  border-radius:26px;border:1px solid var(--line);background:linear-gradient(180deg, rgba(6,14,28,.94), rgba(6,14,28,.82));
  box-shadow:0 22px 50px rgba(0,0,0,.34), inset 0 0 18px rgba(0,200,255,.05);backdrop-filter:blur(16px) saturate(135%);
  transition:transform .24s ease;
}
.sheet-open #sheetCard{transform:translate(-50%, 0)}
.sheet-header{position:sticky;top:0;display:flex;align-items:center;justify-content:space-between;padding:16px 18px 12px;background:linear-gradient(180deg, rgba(6,14,28,.98), rgba(6,14,28,.9));z-index:2}
.sheet-title{font-size:17px;font-weight:700;color:var(--text)}
.sheet-sub{font-size:11px;color:var(--text-dim);margin-top:4px}
.sheet-close{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1px solid var(--line);background:rgba(255,255,255,.03);font-size:20px;cursor:pointer}
.sheet-body{padding:0 18px 18px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-grid .full{grid-column:1 / -1}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:11px;color:var(--blue)}
.field input,.field select,.field textarea{
  width:100%;min-height:44px;padding:12px 14px;border-radius:16px;border:1px solid rgba(131,229,255,.18);
  background:rgba(255,255,255,.04);color:var(--text);outline:none
}
.field textarea{min-height:96px;resize:vertical}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--line-strong);box-shadow:0 0 0 1px rgba(0,200,255,.12)}
.form-actions{display:flex;gap:10px;margin-top:16px}
.primary,.secondary{
  flex:1;min-height:46px;border-radius:18px;display:flex;align-items:center;justify-content:center;
  border:1px solid var(--line);cursor:pointer
}
.primary{background:linear-gradient(180deg, rgba(0,200,255,.16), rgba(0,200,255,.08));color:var(--text)}
.secondary{background:rgba(255,255,255,.03);color:var(--text-dim)}

#bottomDock{
  position:absolute;left:0;right:0;bottom:0;z-index:50;
  padding:12px 12px calc(10px + var(--safe-b));display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:end;
}
#helperBtn,
#addBtn{
  width:var(--helper-w);height:calc(var(--helper-w) + 8px);border-radius:26px;border:1px solid var(--line);
  background:linear-gradient(180deg, rgba(6,14,28,.88), rgba(6,14,28,.6));
  box-shadow:0 16px 36px rgba(0,0,0,.3), inset 0 0 16px rgba(0,200,255,.05);
  backdrop-filter:blur(12px) saturate(130%);
  display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;position:relative;
}
#addBtn{width:var(--action-size);height:var(--action-size);border-radius:50%;background:radial-gradient(circle at 35% 25%, rgba(0,200,255,.28), rgba(6,16,30,.94) 70%)}
#addBtn svg{width:28px;height:28px;stroke:var(--text);fill:none;stroke-width:2.1;stroke-linecap:round}
#helperBtn svg{width:82%;height:82%}

#composer{
  min-width:0;position:relative;
  display:flex;flex-direction:column;justify-content:flex-end;gap:8px;
}
#drawer{
  width:100%;height:0;overflow:hidden;
  border-radius:22px 22px 18px 18px;border:1px solid rgba(131,229,255,.16);
  background:linear-gradient(180deg, rgba(6,14,28,.8), rgba(6,14,28,.66));
  box-shadow:0 18px 36px rgba(0,0,0,.22), inset 0 0 16px rgba(0,200,255,.04);
  backdrop-filter:blur(14px) saturate(130%);
  transition:height .18s ease;
}
#drawerMessages{height:100%;overflow:auto;padding:12px 12px 10px;display:flex;flex-direction:column;gap:8px}
.msg{max-width:88%;padding:10px 12px;border-radius:16px;line-height:1.35;font-size:12px;word-break:break-word}
.msg.user{align-self:flex-end;background:rgba(0,200,255,.12);border:1px solid rgba(0,200,255,.14)}
.msg.ai{align-self:flex-start;background:rgba(255,255,255,.05);border:1px solid rgba(131,229,255,.12)}
.msg.system{align-self:center;background:rgba(0,200,255,.06);border:1px solid rgba(131,229,255,.12);color:var(--blue);text-align:center;font-size:11px}
#composerBar{
  height:var(--composer-h);border-radius:26px;border:1px solid var(--line);
  background:linear-gradient(180deg, rgba(6,14,28,.9), rgba(6,14,28,.66));
  box-shadow:0 16px 36px rgba(0,0,0,.28), inset 0 0 18px rgba(0,200,255,.05);
  backdrop-filter:blur(16px) saturate(140%);
  display:grid;grid-template-columns:auto auto auto 1fr auto;gap:8px;align-items:center;padding:10px;
}
.iconBtn{
  width:42px;height:42px;border-radius:50%;border:1px solid rgba(131,229,255,.2);background:rgba(255,255,255,.04);
  display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text)
}
.iconBtn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
#channelWrap{position:relative;display:flex;align-items:center;min-width:0;height:42px;border-radius:16px;border:1px solid rgba(131,229,255,.18);background:rgba(255,255,255,.035);padding-left:24px;padding-right:6px}
#channelArrow{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--blue)}
#channelSelect{appearance:none;-webkit-appearance:none;background:transparent;border:none;color:var(--text);width:min(104px, 24vw);min-width:80px;outline:none;font-size:12px}
#channelAdd{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(0,200,255,.08);border:1px solid rgba(131,229,255,.18);font-size:18px;cursor:pointer}
#commandInput{width:100%;height:42px;border-radius:16px;border:1px solid rgba(131,229,255,.18);background:rgba(255,255,255,.03);color:var(--text);padding:0 14px;outline:none;font-size:13px}
#commandInput::placeholder{color:rgba(223,247,255,.58)}
#sendBtn{width:46px;height:42px;border-radius:16px;border:1px solid rgba(131,229,255,.22);background:linear-gradient(180deg, rgba(0,200,255,.16), rgba(0,200,255,.06));display:flex;align-items:center;justify-content:center;cursor:pointer}
#sendBtn svg{width:18px;height:18px;stroke:var(--text);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

@media (max-width: 420px){
  #composerBar{grid-template-columns:auto auto 1fr auto;grid-template-areas:"mic channel channel add" "input input input send";height:auto;padding:10px}
  #micBtn{grid-area:mic}
  #channelWrap{grid-area:channel;width:100%}
  #channelAdd{grid-area:add;justify-self:end}
  #commandInput{grid-area:input;height:40px}
  #sendBtn{grid-area:send;height:40px}
  #channelSelect{width:100%}
}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div id="brandChip"><strong>Astranov</strong><span>Internet Operating System</span></div>
    <div id="modeChip"><span>Mode <strong id="modeLabel">Manual</strong></span></div>
  </div>

  <div id="world">
    <div id="spaceView">
      <div id="stars"></div>
      <div id="signals"></div>
      <div id="globeWrap">
        <div id="globeHalo"></div>
        <div id="globe"></div>
        <div id="globeRim"></div>
      </div>
      <div id="worldCaption"><strong>Planet Operations</strong><span>Zoom in to act on a city. Use + to list products, services, drivers, or delivery points.</span></div>
    </div>
    <div id="mapView"><div id="map"></div></div>

    <div id="perfHud" class="hud">
      <div class="hud-title">Performance</div>
      <div id="perfMetrics">
        <div class="metric top"><span>Signal</span><strong id="signalVal">88%</strong></div>
        <div class="metric right"><span>Battery</span><strong id="batteryVal">94%</strong></div>
        <div class="metric bottom"><span>Load</span><strong id="loadState">Open</strong></div>
        <div class="metric left"><span>Cargo</span><strong id="cargoVal">Ready</strong></div>
      </div>
      <button id="grabBtn" class="hud-center-btn" aria-label="Load or unload">
        <svg id="grabOpen" viewBox="0 0 24 24"><path d="M15 6c-4 0-7 2.8-7 6s3 6 7 6"/><path d="M15 6v12"/></svg>
        <svg id="grabClosed" viewBox="0 0 24 24"><path d="M8 7c0-1.3 1.2-2.4 2.5-2.4v6.4"/><path d="M11 5c0-1.3 1.1-2.3 2.4-2.3V11"/><path d="M14 4c0-1.2 1-2.2 2.2-2.2V11"/><path d="M17 5.2c1.1 0 2 .9 2 2v4.2c0 4-3 7.1-6.8 7.1H12"/><circle cx="16.6" cy="15.8" r="1.7" fill="var(--red)" stroke="none"/></svg>
      </button>
    </div>

    <div id="radarHud" class="hud">
      <div class="hud-title">Radar</div>
      <div id="radarSweep"></div>
      <div id="radarTicks">
        <div class="tick"></div><div class="tick"></div><div class="tick"></div><div class="tick"></div><div class="tick"></div><div class="tick"></div>
      </div>
      <div class="hud-sub" id="radarSub">Local zoom</div>
      <button id="zoomBtn" class="hud-center-btn" aria-label="Zoom in or out">
        <svg id="zoomInIcon" viewBox="0 0 24 24"><path d="M12 6v12"/><path d="M6 12h12"/><path d="M7 9l5-5 5 5" opacity=".68"/></svg>
        <svg id="zoomOutIcon" viewBox="0 0 24 24"><path d="M6 12h12"/><path d="M7 15l5 5 5-5" opacity=".72"/></svg>
      </button>
    </div>

    <div id="radialMenu"></div>

    <div id="sheetLayer">
      <div id="sheetBackdrop"></div>
      <div id="sheetCard"></div>
    </div>
  </div>

  <div id="bottomDock">
    <button id="helperBtn" aria-label="Astranov helper">
      <svg viewBox="0 0 120 140" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
          <linearGradient id="armor" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#9feeff" stop-opacity=".22"/>
            <stop offset="100%" stop-color="#052436" stop-opacity=".96"/>
          </linearGradient>
          <linearGradient id="helm" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#dcfbff" stop-opacity=".75"/>
            <stop offset="100%" stop-color="#0d3046" stop-opacity=".95"/>
          </linearGradient>
        </defs>
        <g fill="none" stroke="#8eeaff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 48c4-12 14-21 28-25-6 12-6 22 0 30" opacity=".85"/>
          <path d="M104 48c-4-12-14-21-28-25 6 12 6 22 0 30" opacity=".85"/>
          <path d="M44 27l16-10 16 10" opacity=".65"/>
          <path d="M38 54c0-17 10-31 22-31s22 14 22 31v8H38z" fill="url(#helm)"/>
          <path d="M46 54h28" opacity=".7"/>
          <path d="M52 70c0-5 4-9 8-9s8 4 8 9v9H52z" fill="#061927"/>
          <path d="M44 111c3-18 11-27 16-27s13 9 16 27" fill="url(#armor)"/>
          <path d="M32 121c8-10 18-15 28-15s20 5 28 15" opacity=".82"/>
          <path d="M87 76l10 14" opacity=".6"/>
          <path d="M97 90l-4 22" opacity=".84"/>
          <path d="M89 112l8 0" opacity=".84"/>
          <path d="M53 72c1 3 3 4 7 4s6-1 7-4" opacity=".72"/>
          <path d="M53 65h2"/>
          <path d="M65 65h2"/>
          <path d="M26 102c7 2 13 7 18 13" opacity=".34"/>
          <path d="M94 102c-7 2-13 7-18 13" opacity=".34"/>
        </g>
      </svg>
    </button>

    <div id="composer">
      <div id="drawer"><div id="drawerMessages"></div></div>
      <div id="composerBar">
        <button id="micBtn" class="iconBtn" aria-label="Voice typing">
          <svg viewBox="0 0 24 24"><path d="M12 15a4 4 0 0 0 4-4V7a4 4 0 0 0-8 0v4a4 4 0 0 0 4 4Z"/><path d="M5 11a7 7 0 0 0 14 0"/><path d="M12 18v4"/></svg>
        </button>
        <div id="channelWrap">
          <span id="channelArrow">▾</span>
          <select id="channelSelect" aria-label="Select channel">
            <option>Global</option>
            <option>Local</option>
            <option>Team</option>
            <option>Vendors</option>
          </select>
        </div>
        <button id="channelAdd" aria-label="Add channel">+</button>
        <input id="commandInput" type="text" placeholder="Tell Astranov what to do" />
        <button id="sendBtn" aria-label="Send message">
          <svg viewBox="0 0 24 24"><path d="M5 12 19 5l-4 14-3.5-5.5L5 12Z"/></svg>
        </button>
      </div>
    </div>

    <button id="addBtn" aria-label="Add something">
      <svg viewBox="0 0 24 24"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
    </button>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script>
(() => {
  const $ = (s, root = document) => root.querySelector(s);
  const state = {
    view: 'globe',
    mode: 'manual',
    loaded: false,
    addOpen: false,
    map: null,
    userLoc: [37.9838, 23.7275],
    markers: [],
    listings: [],
    drawerHeight: 0,
    recognition: null,
    speaking: false,
  };

  const els = {
    mapView: $('#mapView'),
    mapNode: $('#map'),
    zoomBtn: $('#zoomBtn'),
    radarSub: $('#radarSub'),
    grabBtn: $('#grabBtn'),
    modeLabel: $('#modeLabel'),
    loadState: $('#loadState'),
    cargoVal: $('#cargoVal'),
    helperBtn: $('#helperBtn'),
    addBtn: $('#addBtn'),
    radialMenu: $('#radialMenu'),
    sheetLayer: $('#sheetLayer'),
    sheetCard: $('#sheetCard'),
    sheetBackdrop: $('#sheetBackdrop'),
    drawer: $('#drawer'),
    drawerMessages: $('#drawerMessages'),
    composer: $('#composer'),
    commandInput: $('#commandInput'),
    sendBtn: $('#sendBtn'),
    micBtn: $('#micBtn'),
    channelAdd: $('#channelAdd'),
    channelSelect: $('#channelSelect'),
    signalVal: $('#signalVal'),
    batteryVal: $('#batteryVal')
  };

  const RADIAL_ITEMS = [
    {key:'product', title:'Product', sub:'Item or menu'},
    {key:'service', title:'Service', sub:'Hotel, rent-a-car'},
    {key:'delivery', title:'Delivery', sub:'My location'},
    {key:'driver', title:'Driver', sub:'Base location'},
    {key:'media', title:'Photo/Video', sub:'Post to this place'}
  ];

  const FALLBACK_LOCATION = [36.4342, 28.2176];

  function initStars(){
    const stars = $('#stars');
    const signals = $('#signals');
    const count = 42;
    for(let i=0;i<count;i++){
      const s = document.createElement('span');
      s.className = 'star';
      s.style.left = Math.random()*100 + '%';
      s.style.top = Math.random()*100 + '%';
      s.style.setProperty('--d', (Math.random()*3).toFixed(2)+'s');
      stars.appendChild(s);
    }
    [
      [18,36],[73,32],[30,68],[82,61],[57,21],[49,77]
    ].forEach(([x,y])=>{
      const n = document.createElement('span');
      n.className='signal';
      n.style.left = x+'%';
      n.style.top = y+'%';
      signals.appendChild(n);
    });
  }

  function saveListings(){
    localStorage.setItem('astranov.listings.v1', JSON.stringify(state.listings));
  }
  function loadListings(){
    try{ state.listings = JSON.parse(localStorage.getItem('astranov.listings.v1') || '[]') || []; }
    catch{ state.listings = []; }
  }

  function addMessage(kind, text){
    const node = document.createElement('div');
    node.className = `msg ${kind}`;
    node.textContent = text;
    els.drawerMessages.appendChild(node);
    els.drawerMessages.scrollTop = els.drawerMessages.scrollHeight;
    if(state.drawerHeight < 120) setDrawerHeight(Math.min(156, Math.round(window.innerHeight * 0.24)));
  }

  function setDrawerHeight(next){
    state.drawerHeight = Math.max(0, Math.min(Math.round(window.innerHeight * 0.42), next));
    els.drawer.style.height = state.drawerHeight + 'px';
  }

  function speak(text){
    if(state.mode !== 'handsfree' || !('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 1.02;
    u.pitch = 0.92;
    u.volume = 0.88;
    window.speechSynthesis.speak(u);
  }

  function updateModeLabel(){
    els.modeLabel.textContent = state.mode === 'handsfree' ? 'Hands-free' : 'Manual';
  }

  function toggleHelperMode(){
    state.mode = state.mode === 'manual' ? 'handsfree' : 'manual';
    updateModeLabel();
    const text = state.mode === 'handsfree'
      ? 'Astranov Collective Intelligence · hands-free mode on.'
      : 'Astranov Collective Intelligence · manual typing mode on.';
    addMessage('system', text);
    speak(text);
  }

  function initMap(){
    if(state.map || !window.L) return;
    state.map = L.map(els.mapNode, {
      zoomControl: false,
      attributionControl: false,
      worldCopyJump: true
    }).setView(state.userLoc, 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom: 19}).addTo(state.map);
    state.map.on('moveend zoomend', () => {
      if(state.view === 'map'){
        els.radarSub.textContent = 'Global return';
      }
    });
    renderMarkers();
  }

  function gotoMap(focus = true){
    document.body.classList.add('map-mode');
    state.view = 'map';
    els.mapView.classList.add('active');
    initMap();
    requestAnimationFrame(() => {
      state.map.invalidateSize();
      if(focus) state.map.setView(state.userLoc, 14, {animate:true});
    });
    els.radarSub.textContent = 'Global return';
    closeRadial();
  }

  function gotoGlobe(){
    document.body.classList.remove('map-mode');
    state.view = 'globe';
    els.mapView.classList.remove('active');
    els.radarSub.textContent = 'Local zoom';
    closeRadial();
  }

  function toggleZoom(){
    if(state.view === 'globe'){
      addMessage('system', 'Zooming to your local map.');
      gotoMap(true);
    } else {
      addMessage('system', 'Returning to globe view.');
      gotoGlobe();
    }
  }

  function toggleLoad(){
    state.loaded = !state.loaded;
    document.body.classList.toggle('loaded-state', state.loaded);
    els.loadState.textContent = state.loaded ? 'Loaded' : 'Open';
    els.cargoVal.textContent = state.loaded ? 'Cargo on' : 'Ready';
    addMessage('system', state.loaded ? 'Cargo grip closed. Load secured.' : 'Cargo grip opened. Ready to load.');
  }

  function getAnchor(){
    if(state.view === 'map'){
      const r = els.mapView.getBoundingClientRect();
      return {x:r.left + r.width/2, y:r.top + r.height/2};
    }
    const r = $('#globeWrap').getBoundingClientRect();
    return {x:r.left + r.width/2, y:r.top + r.height/2};
  }

  function closeRadial(){
    state.addOpen = false;
    [...els.radialMenu.children].forEach(n => n.remove());
  }

  function openRadial(){
    closeRadial();
    state.addOpen = true;
    const anchor = getAnchor();
    const radius = Math.min(window.innerWidth * 0.28, 118);
    RADIAL_ITEMS.forEach((item, i) => {
      const angle = (-90 + i * (360 / RADIAL_ITEMS.length)) * (Math.PI / 180);
      const x = anchor.x + Math.cos(angle) * radius;
      const y = anchor.y + Math.sin(angle) * radius;
      const btn = document.createElement('button');
      btn.className = 'radial-item';
      btn.innerHTML = `<strong>${item.title}</strong><span>${item.sub}</span>`;
      btn.style.left = x + 'px';
      btn.style.top = y + 'px';
      btn.addEventListener('click', () => chooseAdd(item.key));
      els.radialMenu.appendChild(btn);
      requestAnimationFrame(() => btn.classList.add('show'));
    });
  }

  function toggleRadial(){
    state.addOpen ? closeRadial() : openRadial();
  }

  function chooseAdd(kind){
    closeRadial();
    if(state.view === 'globe'){
      addMessage('system', 'Zooming closer so you can define where to place this listing.');
      gotoMap(true);
    }
    setTimeout(() => openSheet(kind), state.view === 'globe' ? 260 : 0);
  }

  function currentCoords(){
    if(state.map && state.view === 'map'){
      const c = state.map.getCenter();
      return [c.lat, c.lng];
    }
    return state.userLoc;
  }

  function openSheet(kind){
    const headers = {
      product:['List product','Create a product or menu item for this map position.'],
      service:['List service','Create a service for this map position.'],
      delivery:['Delivery location','Save where offers and deliveries should come.'],
      driver:['Driver base','Pin an available driver base on the map.'],
      media:['Photo or video','Post visual media tied to this place.']
    };
    const [title, sub] = headers[kind];
    const form = buildForm(kind);
    els.sheetCard.innerHTML = `
      <div class="sheet-header">
        <div><div class="sheet-title">${title}</div><div class="sheet-sub">${sub}</div></div>
        <button class="sheet-close" type="button" aria-label="Close">×</button>
      </div>
      <div class="sheet-body">${form}</div>`;
    document.body.classList.add('sheet-open');
    els.sheetCard.querySelector('.sheet-close').addEventListener('click', closeSheet);
    els.sheetCard.querySelector('form').addEventListener('submit', (e) => submitForm(e, kind));
    els.sheetCard.querySelector('[data-cancel]').addEventListener('click', closeSheet);
  }

  function closeSheet(){
    document.body.classList.remove('sheet-open');
    setTimeout(() => { if(!document.body.classList.contains('sheet-open')) els.sheetCard.innerHTML = ''; }, 220);
  }

  function buildForm(kind){
    const commonFooter = `
      <div class="form-actions full">
        <button class="secondary" type="button" data-cancel>Cancel</button>
        <button class="primary" type="submit">Save</button>
      </div>`;
    if(kind === 'product') return `
      <form class="form-grid">
        <div class="field full"><label>Name<input name="title" required placeholder="Pizza, coffee, helmet, engine oil" /></label></div>
        <div class="field"><label>Price<input name="price" placeholder="€12.50" /></label></div>
        <div class="field"><label>Quantity<input name="qty" placeholder="20" /></label></div>
        <div class="field full"><label>Description<textarea name="description" placeholder="Describe the item, menu, or stock."></textarea></label></div>
        <div class="field"><label>Temperature<select name="temperature"><option>Neutral</option><option>Cold</option><option>Hot</option></select></label></div>
        <div class="field"><label>Max transport min<input name="transport" placeholder="30" /></label></div>
        <div class="field full"><label>Image or video URL<input name="media" placeholder="https://..." /></label></div>
        ${commonFooter}
      </form>`;
    if(kind === 'service') return `
      <form class="form-grid">
        <div class="field full"><label>Service name<input name="title" required placeholder="Hotel, rent-a-car, diving school" /></label></div>
        <div class="field"><label>Category<select name="category"><option>Hotel</option><option>Rent-a-car</option><option>Diving</option><option>Restaurant</option><option>Other</option></select></label></div>
        <div class="field"><label>From price<input name="price" placeholder="€40" /></label></div>
        <div class="field full"><label>Description<textarea name="description" placeholder="Describe the service and what is included."></textarea></label></div>
        <div class="field"><label>Hours<input name="hours" placeholder="09:00-21:00" /></label></div>
        <div class="field"><label>Bookable slots<input name="slots" placeholder="4 per hour" /></label></div>
        <div class="field full"><label>Image or video URL<input name="media" placeholder="https://..." /></label></div>
        ${commonFooter}
      </form>`;
    if(kind === 'delivery') return `
      <form class="form-grid">
        <div class="field full"><label>Name<input name="title" required placeholder="Home, office, marina gate" /></label></div>
        <div class="field"><label>Street<input name="street" placeholder="Street" /></label></div>
        <div class="field"><label>Number / Floor<input name="number" placeholder="12 / 3rd" /></label></div>
        <div class="field full"><label>Remarks<textarea name="description" placeholder="Doorbell name, be quiet, parking, gate code."></textarea></label></div>
        <div class="field full"><label>Phone<input name="phone" placeholder="Phone" /></label></div>
        ${commonFooter}
      </form>`;
    if(kind === 'driver') return `
      <form class="form-grid">
        <div class="field full"><label>Driver base name<input name="title" required placeholder="North gate driver base" /></label></div>
        <div class="field"><label>Vehicle<select name="vehicle"><option>Bike</option><option>Scooter</option><option>Car</option><option>Drone</option></select></label></div>
        <div class="field"><label>Range km<input name="range" placeholder="8" /></label></div>
        <div class="field full"><label>Status<textarea name="description" placeholder="Available now, chilled transport, fast lane."></textarea></label></div>
        <div class="field full"><label>Phone<input name="phone" placeholder="Phone" /></label></div>
        ${commonFooter}
      </form>`;
    return `
      <form class="form-grid">
        <div class="field full"><label>Post title<input name="title" required placeholder="Photo or video title" /></label></div>
        <div class="field full"><label>Media URL<input name="media" required placeholder="https://..." /></label></div>
        <div class="field full"><label>Caption<textarea name="description" placeholder="Say what is happening here."></textarea></label></div>
        ${commonFooter}
      </form>`;
  }

  function submitForm(e, kind){
    e.preventDefault();
    const fd = new FormData(e.currentTarget);
    const entry = {kind, coords: currentCoords(), createdAt: Date.now()};
    for(const [k,v] of fd.entries()) entry[k] = String(v || '').trim();
    state.listings.push(entry);
    saveListings();
    renderMarkers();
    closeSheet();
    addMessage('system', `${labelFor(kind)} saved at the current map position.`);
  }

  function labelFor(kind){
    return ({product:'Product', service:'Service', delivery:'Delivery location', driver:'Driver base', media:'Photo/video'})[kind] || 'Listing';
  }

  function markerColor(kind){
    return ({product:'#53f09a', service:'#77d8ff', delivery:'#ffd76a', driver:'#ff875f', media:'#d78cff'})[kind] || '#77d8ff';
  }

  function renderMarkers(){
    if(!state.map || !window.L) return;
    state.markers.forEach(m => m.remove());
    state.markers = [];
    state.listings.forEach(item => {
      if(!Array.isArray(item.coords)) return;
      const marker = L.circleMarker(item.coords, {
        radius: 7,
        color: markerColor(item.kind),
        fillColor: markerColor(item.kind),
        fillOpacity: .85,
        weight: 2
      }).addTo(state.map);
      const body = `
        <div style="min-width:150px;color:#102234;line-height:1.35">
          <strong>${item.title || labelFor(item.kind)}</strong><br>
          <span style="font-size:12px">${item.price || item.category || item.vehicle || item.street || item.media || ''}</span><br>
          <span style="font-size:12px">${item.description || item.phone || item.hours || ''}</span>
        </div>`;
      marker.bindPopup(body);
      state.markers.push(marker);
    });
  }

  function tryCommand(command){
    const q = command.toLowerCase();
    if(q.includes('zoom')) return toggleZoom();
    if(q.includes('product')) return openSheet('product');
    if(q.includes('service') || q.includes('hotel') || q.includes('rent')) return openSheet('service');
    if(q.includes('driver')) return openSheet('driver');
    if(q.includes('delivery')) return openSheet('delivery');
    if(q.includes('photo') || q.includes('video')) return openSheet('media');
    addMessage('ai', 'Use the + button to list something, or ask me to zoom, add a product, service, driver, or delivery location.');
  }

  function sendInput(){
    const text = els.commandInput.value.trim();
    if(!text) return;
    addMessage('user', text);
    els.commandInput.value = '';
    tryCommand(text);
  }

  function initVoiceTyping(){
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!SR){
      addMessage('system', 'Voice typing is not available in this browser.');
      return;
    }
    if(!state.recognition){
      state.recognition = new SR();
      state.recognition.lang = 'en-US';
      state.recognition.interimResults = true;
      state.recognition.continuous = false;
      state.recognition.onresult = (event) => {
        const transcript = Array.from(event.results).map(r => r[0].transcript).join(' ');
        els.commandInput.value = transcript;
      };
      state.recognition.onend = () => els.micBtn.classList.remove('active');
      state.recognition.onerror = () => {
        els.micBtn.classList.remove('active');
        addMessage('system', 'Voice typing stopped. Use manual typing or try again.');
      };
    }
    els.micBtn.classList.add('active');
    state.recognition.start();
  }

  function initGeolocation(){
    if(!navigator.geolocation) {
      state.userLoc = FALLBACK_LOCATION;
      return;
    }
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        state.userLoc = [pos.coords.latitude, pos.coords.longitude];
        if(state.map && state.view === 'map') state.map.setView(state.userLoc, 14, {animate:true});
      },
      () => { state.userLoc = FALLBACK_LOCATION; },
      {enableHighAccuracy:true, maximumAge:15000, timeout:12000}
    );
  }

  function initGestureDrawer(){
    let startY = 0, startHeight = 0, moved = false, pointerId = null;
    els.commandInput.addEventListener('pointerdown', (ev) => {
      pointerId = ev.pointerId;
      startY = ev.clientY;
      startHeight = state.drawerHeight;
      moved = false;
      els.commandInput.setPointerCapture(ev.pointerId);
    });
    els.commandInput.addEventListener('pointermove', (ev) => {
      if(ev.pointerId !== pointerId) return;
      const dy = startY - ev.clientY;
      if(Math.abs(dy) > 8) moved = true;
      if(!moved) return;
      ev.preventDefault();
      setDrawerHeight(startHeight + dy);
    });
    const finish = (ev) => {
      if(ev.pointerId !== pointerId) return;
      els.commandInput.releasePointerCapture(ev.pointerId);
      pointerId = null;
      if(!moved) els.commandInput.focus();
      if(state.drawerHeight < 50) setDrawerHeight(0);
      if(state.drawerHeight > 50 && state.drawerHeight < 110) setDrawerHeight(132);
    };
    els.commandInput.addEventListener('pointerup', finish);
    els.commandInput.addEventListener('pointercancel', finish);
  }

  function init(){
    initStars();
    loadListings();
    initGeolocation();
    updateModeLabel();
    addMessage('system', 'Astranov Collective Intelligence ready. Use the radar to zoom or the + bubble to list something.');
    setDrawerHeight(92);
    setTimeout(() => setDrawerHeight(0), 900);

    els.zoomBtn.addEventListener('click', toggleZoom);
    els.grabBtn.addEventListener('click', toggleLoad);
    els.helperBtn.addEventListener('click', toggleHelperMode);
    els.addBtn.addEventListener('click', toggleRadial);
    els.sendBtn.addEventListener('click', sendInput);
    els.commandInput.addEventListener('keydown', (ev) => { if(ev.key === 'Enter') sendInput(); });
    els.micBtn.addEventListener('click', initVoiceTyping);
    els.channelAdd.addEventListener('click', () => addMessage('system', 'Channel creation can be wired next. Current selector is ready.'));
    els.sheetBackdrop.addEventListener('click', closeSheet);
    window.addEventListener('resize', () => { if(state.addOpen) openRadial(); if(state.map) state.map.invalidateSize(); });
    document.addEventListener('click', (ev) => {
      if(state.addOpen && !ev.target.closest('#addBtn') && !ev.target.closest('.radial-item')) closeRadial();
    });
    initGestureDrawer();
  }

  init();
})();
</script>
</body>
</html>
