<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Astranov</title>
<style>
:root{
  --bg:#030b14;
  --bg2:#061423;
  --panel:rgba(7,17,30,.72);
  --panel-strong:rgba(9,20,36,.9);
  --line:rgba(0,200,255,.22);
  --line-strong:rgba(0,200,255,.42);
  --text:#dff4ff;
  --muted:#7fa8be;
  --blue:#00c8ff;
  --green:#00e59b;
  --orange:#ffae4a;
  --shadow:0 16px 40px rgba(0,0,0,.35);
  --safe-bottom:env(safe-area-inset-bottom, 0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;overflow:hidden;background:radial-gradient(circle at 50% 15%, #0d2740 0%, var(--bg2) 28%, var(--bg) 68%, #01050a 100%);color:var(--text);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
button,input{font:inherit}
#app{position:fixed;inset:0;overflow:hidden}
#stars{position:absolute;inset:0;pointer-events:none;opacity:.7}
#scene{position:absolute;inset:0;display:grid;place-items:center;padding:20px 12px 94px}
#globe-wrap{position:relative;width:min(92vw,92vh);height:min(92vw,92vh);max-width:680px;max-height:680px;display:grid;place-items:center}
#glow{position:absolute;width:86%;height:86%;border-radius:50%;background:radial-gradient(circle, rgba(0,200,255,.18) 0%, rgba(0,200,255,.08) 28%, rgba(0,200,255,.02) 54%, transparent 70%);filter:blur(24px);pointer-events:none}
#globe-canvas{position:relative;width:100%;height:100%;touch-action:none;display:block}
#top-hud{position:fixed;top:12px;left:12px;right:12px;display:flex;align-items:center;justify-content:space-between;gap:10px;z-index:20;pointer-events:none}
#brand-chip,#hint-chip{pointer-events:auto;backdrop-filter:blur(16px) saturate(130%);background:rgba(5,14,26,.34);border:1px solid rgba(0,200,255,.14);box-shadow:var(--shadow);border-radius:16px;padding:10px 14px}
#brand-chip{display:flex;flex-direction:column;gap:2px}
#brand-chip strong{font-size:12px;letter-spacing:.22em;color:var(--blue)}
#brand-chip span{font-size:11px;color:var(--muted)}
#hint-chip{font-size:11px;color:var(--muted);max-width:50vw;text-align:right}
#signal-pill{position:absolute;top:20px;left:50%;transform:translateX(-50%);z-index:15;display:flex;gap:8px;align-items:center;backdrop-filter:blur(16px);background:rgba(7,17,30,.44);border:1px solid rgba(0,200,255,.14);border-radius:999px;padding:8px 12px;box-shadow:var(--shadow)}
#signal-pill .dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 14px var(--green)}
#signal-pill span{font-size:11px;color:var(--muted)}
#drawer-shell{position:fixed;left:0;right:0;bottom:0;z-index:40;pointer-events:none}
#drawer{pointer-events:auto;position:relative;margin:0 10px calc(10px + var(--safe-bottom));border:1px solid var(--line);background:linear-gradient(180deg, rgba(7,17,30,.78), rgba(7,17,30,.9));backdrop-filter:blur(18px) saturate(140%);border-radius:22px;box-shadow:0 20px 60px rgba(0,0,0,.44);overflow:hidden;height:64px;min-height:64px;max-height:66vh;display:flex;flex-direction:column}
#drawer.dragging{transition:none}
#bar{height:64px;min-height:64px;display:grid;grid-template-columns:48px 1fr 48px;align-items:center;gap:8px;padding:8px 10px}
.icon-btn{height:44px;width:44px;border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.04);color:var(--text);display:grid;place-items:center;cursor:pointer}
.icon-btn:active{transform:scale(.98)}
#composer{position:relative;height:48px;border:1px solid var(--line);border-radius:16px;background:rgba(255,255,255,.04);display:flex;align-items:center;padding:0 14px;overflow:hidden}
#composer input{width:100%;background:transparent;border:none;outline:none;color:var(--text);font-size:14px}
#composer input::placeholder{color:#84a7bb}
#drag-handle{position:absolute;top:6px;left:50%;transform:translateX(-50%);width:42px;height:4px;border-radius:999px;background:rgba(255,255,255,.18);pointer-events:none}
#drawer-body{flex:1;min-height:0;border-top:1px solid rgba(0,200,255,.08);display:flex;flex-direction:column;background:linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,0))}
#messages{flex:1;overflow:auto;padding:10px 12px 12px;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth}
.msg{max-width:84%;display:flex;flex-direction:column;gap:6px}
.msg.system{align-self:flex-start}
.msg.user{align-self:flex-end}
.bubble{padding:10px 12px;border-radius:18px;font-size:13px;line-height:1.45;border:1px solid rgba(255,255,255,.06);word-break:break-word}
.system .bubble{background:rgba(0,200,255,.08);border-color:rgba(0,200,255,.14)}
.user .bubble{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.12)}
.meta{font-size:10px;color:var(--muted);padding:0 4px}
.card{overflow:hidden;border-radius:16px;border:1px solid rgba(0,200,255,.12);background:rgba(255,255,255,.03)}
.card-media{height:130px;background:linear-gradient(135deg, rgba(0,200,255,.18), rgba(255,255,255,.04));position:relative}
.card-media img{width:100%;height:100%;object-fit:cover;display:block}
.card-body{padding:12px}
.card-title{font-size:14px;font-weight:700;color:#f2fbff;margin-bottom:4px}
.card-sub{font-size:11px;color:var(--muted);margin-bottom:8px}
.card-actions{display:flex;gap:8px;flex-wrap:wrap}
.pill-btn{padding:9px 12px;border-radius:12px;border:1px solid var(--line);background:rgba(0,200,255,.08);color:var(--text);cursor:pointer}
.pill-btn.alt{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.1)}
#voice-status{display:none;padding:0 14px 12px;font-size:11px;color:var(--green)}
#voice-status.on{display:block}
.signal-tag{display:inline-flex;gap:6px;align-items:center;font-size:10px;padding:5px 8px;border-radius:999px;background:rgba(0,200,255,.08);border:1px solid rgba(0,200,255,.14);color:var(--blue);text-transform:uppercase;letter-spacing:.08em}
.empty-state{height:100%;display:grid;place-items:center;padding:18px;text-align:center;color:var(--muted);font-size:13px}
.badge{display:inline-flex;align-items:center;gap:6px;padding:5px 8px;border-radius:999px;background:rgba(0,229,155,.08);border:1px solid rgba(0,229,155,.18);color:var(--green);font-size:10px}
@media (max-width:640px){
  #hint-chip{display:none}
  #brand-chip strong{font-size:11px}
  #brand-chip span{font-size:10px}
  #drawer{margin-left:8px;margin-right:8px}
}
</style>
</head>
<body>
<div id="app">
  <canvas id="stars"></canvas>
  <div id="top-hud">
    <div id="brand-chip"><strong>ASTRANOV</strong><span>Globe-first operating surface</span></div>
    <div id="hint-chip">Drag the globe. Tap a signal. Everything opens in the bottom operating drawer.</div>
  </div>
  <div id="scene">
    <div id="globe-wrap">
      <div id="signal-pill"><div class="dot"></div><span id="signal-count">6 active signals</span></div>
      <div id="glow"></div>
      <canvas id="globe-canvas"></canvas>
    </div>
  </div>

  <div id="drawer-shell">
    <div id="drawer" aria-label="Operating drawer">
      <div id="bar">
        <button id="voice-btn" class="icon-btn" aria-label="Hands free mode" title="Hands-free mode">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 11v1a7 7 0 0 1-14 0v-1"/><path d="M12 19v3"/><path d="M8 22h8"/></svg>
        </button>
        <div id="composer">
          <div id="drag-handle"></div>
          <input id="search-input" type="text" placeholder="Search signals, businesses, offers, places…" />
        </div>
        <button id="send-btn" class="icon-btn" aria-label="Send" title="Send">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
        </button>
      </div>
      <div id="drawer-body">
        <div id="messages"></div>
        <div id="voice-status">Hands-free mode armed.</div>
      </div>
    </div>
  </div>
</div>

<script>
const state = {
  rotation: { lon: -20, lat: 8 },
  dragging: false,
  lastX: 0,
  lastY: 0,
  selectedSignal: null,
  drawerOpen: false,
  drawerHeight: 64,
  minDrawerHeight: 64,
  maxDrawerHeight: Math.min(window.innerHeight * 0.66, 560),
  drawerDrag: null,
  voiceOn: false,
  signals: [
    { id:'s1', type:'shop', title:'Blue Harbor Café', subtitle:'Coffee • Snacks • Delivery', description:'A seaside café signal ready for menu uploads, orders, and local traffic.', lat:36.445, lng:28.227, color:'#00e59b', image:'https://images.unsplash.com/photo-1509042239860-f550ce710b93?auto=format&fit=crop&w=900&q=80', actions:['Open reservation','View menu','Message business'] },
    { id:'s2', type:'offer', title:'Diving Trip Offer', subtitle:'Half-day reef trip • 4 seats left', description:'A commercial activity signal. Later this becomes real inventory, booking, waivers, and payment.', lat:36.438, lng:28.214, color:'#00c8ff', image:'https://images.unsplash.com/photo-1544551763-46a013bb70d5?auto=format&fit=crop&w=900&q=80', actions:['Reserve seats','Ask details','Share to team'] },
    { id:'s3', type:'job', title:'Driver Needed Tonight', subtitle:'Local delivery route • urgent', description:'A logistics signal that can later route to verified drivers and real availability.', lat:36.452, lng:28.221, color:'#ffae4a', image:'https://images.unsplash.com/photo-1519003722824-194d4455a60c?auto=format&fit=crop&w=900&q=80', actions:['Apply','Open route','Notify drivers'] },
    { id:'s4', type:'team', title:'Harbor Team Chat', subtitle:'8 people active now', description:'A team signal. The same drawer will later host the full team conversation, files, and tasks.', lat:36.441, lng:28.235, color:'#8f7dff', image:'https://images.unsplash.com/photo-1522202176988-66273c2fd55f?auto=format&fit=crop&w=900&q=80', actions:['Open team chat','View members','Pin update'] },
    { id:'s5', type:'post', title:'Villa Signal', subtitle:'Short-term stay • 2 bedrooms', description:'A property/booking signal. This drawer can later host the reservation and booking flow.', lat:36.448, lng:28.208, color:'#ff6b8f', image:'https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?auto=format&fit=crop&w=900&q=80', actions:['Open listing','Request dates','Message owner'] },
    { id:'s6', type:'news', title:'Port Event Tonight', subtitle:'Live music • local signal', description:'A public place-based signal for events, news, and local attention routing.', lat:36.435, lng:28.229, color:'#4fd1ff', image:'https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?auto=format&fit=crop&w=900&q=80', actions:['Open event','Invite team','Navigate there'] },
  ]
};

const globeCanvas = document.getElementById('globe-canvas');
const gctx = globeCanvas.getContext('2d');
const starsCanvas = document.getElementById('stars');
const sctx = starsCanvas.getContext('2d');
const drawer = document.getElementById('drawer');
const messages = document.getElementById('messages');
const searchInput = document.getElementById('search-input');
const voiceBtn = document.getElementById('voice-btn');
const sendBtn = document.getElementById('send-btn');
const voiceStatus = document.getElementById('voice-status');
const signalCount = document.getElementById('signal-count');

signalCount.textContent = `${state.signals.length} active signals`;

function resizeAll(){
  const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
  starsCanvas.width = innerWidth * dpr;
  starsCanvas.height = innerHeight * dpr;
  starsCanvas.style.width = innerWidth + 'px';
  starsCanvas.style.height = innerHeight + 'px';
  sctx.setTransform(dpr,0,0,dpr,0,0);

  const rect = globeCanvas.getBoundingClientRect();
  globeCanvas.width = rect.width * dpr;
  globeCanvas.height = rect.height * dpr;
  gctx.setTransform(dpr,0,0,dpr,0,0);

  state.maxDrawerHeight = Math.min(window.innerHeight * 0.66, 560);
  if(state.drawerHeight > state.maxDrawerHeight) state.drawerHeight = state.maxDrawerHeight;
  applyDrawerHeight();
  drawStars();
  drawGlobe();
}

function drawStars(){
  sctx.clearRect(0,0,innerWidth,innerHeight);
  for(let i=0;i<160;i++){
    const x = (Math.sin(i*91.73)+1)/2 * innerWidth;
    const y = (Math.sin(i*13.11+4)+1)/2 * innerHeight;
    const r = (i%7===0?1.6: i%5===0?1.2:.8);
    sctx.beginPath(); sctx.arc(x,y,r,0,Math.PI*2);
    sctx.fillStyle = i%9===0 ? 'rgba(0,200,255,.8)' : 'rgba(255,255,255,.55)';
    sctx.fill();
  }
}

function project(lat,lng,rotLon,rotLat,R,cx,cy){
  const phi = lat * Math.PI/180;
  const lam = lng * Math.PI/180;
  const lon0 = rotLon * Math.PI/180;
  const lat0 = rotLat * Math.PI/180;
  const cosc = Math.sin(lat0)*Math.sin(phi) + Math.cos(lat0)*Math.cos(phi)*Math.cos(lam-lon0);
  if(cosc <= 0) return null;
  const x = R * Math.cos(phi) * Math.sin(lam-lon0);
  const y = -R * (Math.cos(lat0)*Math.sin(phi) - Math.sin(lat0)*Math.cos(phi)*Math.cos(lam-lon0));
  return { x: cx + x, y: cy + y, z: cosc };
}

function drawGlobe(){
  const rect = globeCanvas.getBoundingClientRect();
  const w = rect.width, h = rect.height;
  const cx = w/2, cy = h/2;
  const R = Math.min(w,h)*0.42;
  gctx.clearRect(0,0,w,h);

  const ocean = gctx.createRadialGradient(cx-R*0.2, cy-R*0.35, R*0.2, cx, cy, R);
  ocean.addColorStop(0, '#1ca8ff');
  ocean.addColorStop(.22, '#1166b0');
  ocean.addColorStop(.58, '#0a3258');
  ocean.addColorStop(1, '#031423');
  gctx.beginPath(); gctx.arc(cx,cy,R,0,Math.PI*2); gctx.fillStyle = ocean; gctx.fill();

  const ring = gctx.createRadialGradient(cx, cy, R*0.78, cx, cy, R*1.14);
  ring.addColorStop(0, 'rgba(0,200,255,0)');
  ring.addColorStop(.8, 'rgba(0,200,255,.14)');
  ring.addColorStop(1, 'rgba(0,200,255,0)');
  gctx.beginPath(); gctx.arc(cx,cy,R*1.09,0,Math.PI*2); gctx.fillStyle = ring; gctx.fill();

  drawGraticule(R,cx,cy);
  drawSignals(R,cx,cy);

  gctx.beginPath(); gctx.arc(cx,cy,R,0,Math.PI*2);
  gctx.lineWidth = 1.3;
  gctx.strokeStyle = 'rgba(190,240,255,.22)';
  gctx.stroke();

  const shade = gctx.createRadialGradient(cx+R*0.34, cy-R*0.34, R*0.08, cx, cy, R);
  shade.addColorStop(0, 'rgba(255,255,255,.22)');
  shade.addColorStop(.24, 'rgba(255,255,255,.05)');
  shade.addColorStop(1, 'rgba(0,0,0,.36)');
  gctx.beginPath(); gctx.arc(cx,cy,R,0,Math.PI*2); gctx.fillStyle = shade; gctx.fill();
}

function drawGraticule(R,cx,cy){
  gctx.save();
  gctx.beginPath(); gctx.arc(cx,cy,R,0,Math.PI*2); gctx.clip();
  gctx.lineWidth = 1;
  for(let lat=-60; lat<=60; lat+=30){
    gctx.beginPath();
    let started = false;
    for(let lon=-180; lon<=180; lon+=4){
      const p = project(lat, lon, state.rotation.lon, state.rotation.lat, R, cx, cy);
      if(!p){ started = false; continue; }
      if(!started){ gctx.moveTo(p.x,p.y); started=true; } else gctx.lineTo(p.x,p.y);
    }
    gctx.strokeStyle = 'rgba(180,235,255,.14)';
    gctx.stroke();
  }
  for(let lon=-150; lon<=180; lon+=30){
    gctx.beginPath();
    let started = false;
    for(let lat=-86; lat<=86; lat+=3){
      const p = project(lat, lon, state.rotation.lon, state.rotation.lat, R, cx, cy);
      if(!p){ started = false; continue; }
      if(!started){ gctx.moveTo(p.x,p.y); started=true; } else gctx.lineTo(p.x,p.y);
    }
    gctx.strokeStyle = 'rgba(180,235,255,.11)';
    gctx.stroke();
  }
  gctx.restore();
}

function drawSignals(R,cx,cy){
  state._projectedSignals = [];
  const ordered = [...state.signals].sort((a,b)=> {
    const pa = project(a.lat,a.lng,state.rotation.lon,state.rotation.lat,R,cx,cy);
    const pb = project(b.lat,b.lng,state.rotation.lon,state.rotation.lat,R,cx,cy);
    return (pa?.z||0) - (pb?.z||0);
  });
  ordered.forEach(sig=>{
    const p = project(sig.lat, sig.lng, state.rotation.lon, state.rotation.lat, R, cx, cy);
    if(!p) return;
    state._projectedSignals.push({ ...sig, px:p.x, py:p.y, z:p.z });
    const pulse = 1 + Math.sin(Date.now()/260 + p.x*.02)*0.08;
    gctx.beginPath();
    gctx.arc(p.x,p.y, 10*pulse, 0, Math.PI*2);
    gctx.fillStyle = sig.color + '22';
    gctx.fill();
    gctx.beginPath();
    gctx.arc(p.x,p.y, 4.6, 0, Math.PI*2);
    gctx.fillStyle = sig.color;
    gctx.shadowBlur = 14;
    gctx.shadowColor = sig.color;
    gctx.fill();
    gctx.shadowBlur = 0;
    if(state.selectedSignal?.id === sig.id){
      gctx.beginPath(); gctx.arc(p.x,p.y, 14, 0, Math.PI*2);
      gctx.strokeStyle = 'rgba(255,255,255,.8)'; gctx.lineWidth = 1.3; gctx.stroke();
    }
  });
}

function animate(){
  if(!state.dragging){
    state.rotation.lon += 0.06;
    if(state.rotation.lon > 180) state.rotation.lon -= 360;
  }
  drawGlobe();
  requestAnimationFrame(animate);
}

function addMessage(role, content){
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;
  if(typeof content === 'string'){
    const meta = document.createElement('div');
    meta.className = 'meta';
    meta.textContent = role === 'user' ? 'You' : 'Astranov';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = content;
    wrap.append(meta,bubble);
  } else {
    const meta = document.createElement('div');
    meta.className = 'meta';
    meta.textContent = role === 'user' ? 'You' : 'Astranov';
    wrap.appendChild(meta);
    wrap.appendChild(content);
  }
  messages.appendChild(wrap);
  messages.scrollTop = messages.scrollHeight;
}

function signalCard(sig){
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="card-media">${sig.image ? `<img src="${sig.image}" alt="">` : ''}</div>
    <div class="card-body">
      <div class="signal-tag">${sig.type}</div>
      <div class="card-title">${sig.title}</div>
      <div class="card-sub">${sig.subtitle}</div>
      <div class="bubble" style="padding:0;border:none;background:none;color:var(--text);font-size:13px">${sig.description}</div>
      <div class="card-actions" style="margin-top:10px"></div>
    </div>`;
  const actions = card.querySelector('.card-actions');
  sig.actions.forEach(label=>{
    const btn = document.createElement('button');
    btn.className = 'pill-btn';
    btn.textContent = label;
    btn.onclick = ()=> addMessage('system', `Action placeholder: “${label}” for ${sig.title}. This is where reservations, ordering, team chat, or vendor flows will open.`);
    actions.appendChild(btn);
  });
  return card;
}

function openSignal(sig){
  state.selectedSignal = sig;
  state.drawerOpen = true;
  state.drawerHeight = Math.max(state.drawerHeight, Math.min(320, state.maxDrawerHeight));
  applyDrawerHeight();
  addMessage('system', signalCard(sig));
}

function applyDrawerHeight(){
  drawer.style.height = `${state.drawerHeight}px`;
}

function expandDrawer(toHeight){
  state.drawerOpen = true;
  state.drawerHeight = Math.max(state.minDrawerHeight, Math.min(state.maxDrawerHeight, toHeight));
  applyDrawerHeight();
}

function collapseDrawer(){
  state.drawerOpen = false;
  state.drawerHeight = state.minDrawerHeight;
  applyDrawerHeight();
}

function handleSubmit(){
  const text = searchInput.value.trim();
  if(!text) return;
  addMessage('user', text);
  expandDrawer(Math.max(state.drawerHeight, Math.min(280, state.maxDrawerHeight)));
  const q = text.toLowerCase();
  searchInput.value = '';
  const match = state.signals.find(s => (s.title + ' ' + s.subtitle + ' ' + s.type).toLowerCase().includes(q));
  if(match){
    addMessage('system', `Matched signal: ${match.title}`);
    openSignal(match);
    return;
  }
  addMessage('system', 'Search placeholder ready. Next step is to connect real businesses, live offers, and money flows to this operating drawer.');
}

function pointerPos(evt){
  const r = globeCanvas.getBoundingClientRect();
  const touch = evt.touches ? evt.touches[0] : evt;
  return { x: touch.clientX - r.left, y: touch.clientY - r.top };
}

function hitSignal(x,y){
  if(!state._projectedSignals) return null;
  for(let i=state._projectedSignals.length-1;i>=0;i--){
    const s = state._projectedSignals[i];
    const d = Math.hypot(x-s.px, y-s.py);
    if(d < 18) return s;
  }
  return null;
}

globeCanvas.addEventListener('pointerdown', e=>{
  state.dragging = true;
  state.lastX = e.clientX;
  state.lastY = e.clientY;
  globeCanvas.setPointerCapture(e.pointerId);
});
globeCanvas.addEventListener('pointermove', e=>{
  if(!state.dragging) return;
  const dx = e.clientX - state.lastX;
  const dy = e.clientY - state.lastY;
  state.rotation.lon -= dx * 0.35;
  state.rotation.lat += dy * 0.25;
  state.rotation.lat = Math.max(-70, Math.min(70, state.rotation.lat));
  state.lastX = e.clientX;
  state.lastY = e.clientY;
  drawGlobe();
});
globeCanvas.addEventListener('pointerup', e=>{
  const pos = pointerPos(e);
  const moved = Math.hypot(e.clientX - state.lastX, e.clientY - state.lastY);
  if(moved < 10){
    const sig = hitSignal(pos.x,pos.y);
    if(sig) openSignal(sig);
  }
  state.dragging = false;
});
globeCanvas.addEventListener('pointercancel', ()=> state.dragging = false);

function startDrawerDrag(e){
  const startY = (e.touches ? e.touches[0].clientY : e.clientY);
  state.drawerDrag = { startY, startHeight: state.drawerHeight };
  drawer.classList.add('dragging');
}
function moveDrawerDrag(e){
  if(!state.drawerDrag) return;
  const y = (e.touches ? e.touches[0].clientY : e.clientY);
  const next = state.drawerDrag.startHeight + (state.drawerDrag.startY - y);
  state.drawerHeight = Math.max(state.minDrawerHeight, Math.min(state.maxDrawerHeight, next));
  applyDrawerHeight();
}
function endDrawerDrag(){
  if(!state.drawerDrag) return;
  drawer.classList.remove('dragging');
  const threshold = Math.max(150, state.maxDrawerHeight * 0.3);
  if(state.drawerHeight < threshold) collapseDrawer(); else expandDrawer(state.drawerHeight);
  state.drawerDrag = null;
}

document.getElementById('bar').addEventListener('pointerdown', startDrawerDrag);
window.addEventListener('pointermove', moveDrawerDrag, { passive:true });
window.addEventListener('pointerup', endDrawerDrag);
document.getElementById('bar').addEventListener('touchstart', startDrawerDrag, { passive:true });
window.addEventListener('touchmove', moveDrawerDrag, { passive:true });
window.addEventListener('touchend', endDrawerDrag);

searchInput.addEventListener('focus', ()=> expandDrawer(Math.max(state.drawerHeight, 260)));
searchInput.addEventListener('keydown', e=>{ if(e.key === 'Enter') handleSubmit(); });
sendBtn.addEventListener('click', handleSubmit);
voiceBtn.addEventListener('click', ()=>{
  state.voiceOn = !state.voiceOn;
  voiceBtn.style.borderColor = state.voiceOn ? 'rgba(0,229,155,.36)' : 'var(--line)';
  voiceBtn.style.background = state.voiceOn ? 'rgba(0,229,155,.1)' : 'rgba(255,255,255,.04)';
  voiceStatus.classList.toggle('on', state.voiceOn);
  expandDrawer(Math.max(state.drawerHeight, 220));
  addMessage('system', state.voiceOn ? 'Hands-free mode placeholder enabled. Later this will drive voice-first operations.' : 'Hands-free mode disabled.');
});

window.addEventListener('resize', resizeAll);

messages.innerHTML = '';
addMessage('system', 'Clean baseline loaded. Tap a globe signal or type into the bottom operating bar.');
addMessage('system', 'This version is intentionally stripped down so we can start filling it with real businesses, offers, reservations, and revenue flows.');
resizeAll();
applyDrawerHeight();
animate();
</script>
</body>
