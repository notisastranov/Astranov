#checkoutRibbon{position:sticky;top:48px;z-index:3;background:linear-gradient(180deg,rgba(80,58,7,.97),rgba(40,28,5,.98));border:1px solid var(--gold2);border-radius:14px;margin:8px 10px 10px;padding:7px;display:flex;flex-wrap:wrap;align-items:center;gap:5px;overflow:visible}.rchip{display:inline-flex;align-items:center;gap:4px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);border-radius:10px;padding:5px 7px;min-height:36px;font-size:11px;white-space:nowrap}.rchip b{color:#ffe7a4}.rchip.slim{max-width:116px;overflow:hidden;text-overflow:ellipsis}.rchip input,.rchip select{max-width:90px;min-height:30px;border:0;border-radius:8px;background:rgba(255,255,255,.1);color:var(--text);padding:4px 6px}.orderAction{order:-10;min-width:126px;min-height:42px;border:1px solid rgba(255,235,160,.72);background:linear-gradient(180deg,#ffe389,#c79a2a);color:#261800;border-radius:13px;padding:8px 10px;font-size:12px;font-weight:1000;letter-spacing:.05em;box-shadow:0 0 14px rgba(215,182,80,.4)}.orderAction.empty{background:rgba(215,182,80,.13);color:#ffe7a4;animation:glowBtn 1.4s infinite}.rToggle{margin-left:auto;min-width:38px}.rDetails{display:none}.expanded .rDetails{display:inline-flex}@keyframes glowBtn{0%,100%{box-shadow:0 0 8px rgba(215,182,80,.25)}50%{box-shadow:0 0 20px rgba(215,182,80,.72)}}@media(max-width:420px){#checkoutRibbon{gap:4px}.rchip{font-size:10px;min-height:34px;padding:4px 6px}.orderAction{flex:1 1 100%;width:100%}.rToggle{margin-left:0}.rchip input,.rchip select{max-width:76px}}
#productList{max-height:calc(66vh - 126px);overflow:auto;-webkit-overflow-scrolling:touch;padding:0 10px 12px}.productRow{display:grid;grid-template-columns:52px minmax(0,1fr) auto;gap:9px;align-items:center;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.035);border-radius:14px;padding:7px;margin-bottom:7px}.pimg{width:52px;height:52px;border-radius:12px;object-fit:cover;background:#10223b}.pname{font-weight:850;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.pdesc{font-size:10px;color:var(--muted);line-height:1.25;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.pmeta{font-size:11px;color:var(--gold);font-weight:900}.qtyBox{display:flex;align-items:center;gap:4px}.qbtn{width:36px;height:36px;border-radius:11px;border:1px solid var(--blue2);background:var(--blue3);color:var(--blue);font-size:18px;font-weight:900}.qtyInput{width:48px;height:36px;border-radius:10px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.06);color:var(--text);text-align:center;font-weight:900}.editBtn{width:36px;height:36px;border-radius:11px;border:1px solid var(--gold2);background:var(--gold3);color:#ffe7a4}.vendorMode .editBtn{display:inline-block}.editBtn{display:none}
#pickBanner{position:fixed;left:50%;top:calc(var(--safeTop) + 58px);transform:translateX(-50%);z-index:92;display:none;border:1px solid var(--gold2);background:rgba(50,36,4,.92);color:#ffe7a4;border-radius:22px;padding:9px 14px;font-size:12px;font-weight:900;box-shadow:0 0 18px rgba(215,182,80,.33)}#pickBanner.on{display:block}
.txRow{border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.035);border-radius:14px;padding:9px;margin-bottom:8px}.txTop{display:flex;justify-content:space-between;gap:8px;font-weight:900}.txActions{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.chatLog{min-height:88px;max-height:180px;overflow:auto;border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:8px;background:rgba(0,0,0,.15);margin:8px 0}.msg{font-size:12px;line-height:1.35;margin:4px 0}.msg b{color:var(--blue)}.chatInputRow{display:flex;gap:6px}.chatInputRow input{flex:1}.ledgerLine{display:grid;grid-template-columns:1fr auto;gap:8px;border-bottom:1px solid rgba(255,255,255,.07);padding:7px 0;font-size:12px}.ledgerLine b{color:var(--gold)}
</style>

<body class="global">
<div id="starfield"></div>
<button id="brand" aria-label="ASTRANOV command">ASTRANOV</button>
<section id="globeLayer" class="layer on"><div id="globeHost"></div><div id="spaceAnchors"><div class="celestial sun"><span>☉</span><b>SUN</b></div><div class="celestial moon"><span>☾</span><b>MOON</b></div><div class="celestial mars"><span>●</span><b>MARS</b></div><div class="celestial jupiter"><span>●</span><b>JUPITER</b></div><div class="celestial iss"><span>◇</span><b>ISS</b></div></div></section>
<section id="nationalLayer" class="layer"><div id="nationalMap"></div></section>
<section id="cityLayer" class="layer"><div id="cityMap"></div></section>
<div id="brightness"><span>☀</span><input id="brightnessInput" type="range" min="0" max="2" step="1" value="0"><span>☾</span></div>
<div id="pickBanner">Tap the map to set the delivery address</div>
<div id="toast"></div>

<div id="commandPanel" class="drawer">
  <div class="drawerHead"><div class="drawerTitle">COMMAND</div><button class="xbtn" data-close="commandPanel">×</button></div>
  <div class="drawerBody">
    <div class="cmdGrid">
      <button class="btn" data-cmd="voice">Voice</button>
      <button class="btn" data-cmd="greece">Greece</button>
      <button class="btn" data-cmd="accounting">Accounting Office</button>
      <button class="btn" data-cmd="vendor">Vendor mode</button>
      <button class="btn" data-cmd="global">Global</button>
      <button class="btn" data-cmd="space">Space</button>
      <button class="btn wide gold" data-cmd="rhodes">Personal · Rhodes</button>
    </div>
    <p class="tiny" style="margin-top:10px">Controls appear only when needed. Cash on delivery only. Owner 3% ledger is recorded per transaction.</p>
  </div>
</div>

<div id="vendorSheet" class="drawer">
  <div class="drawerHead" id="vendorHead"><div class="drawerTitle" id="vendorTitle">VENDOR</div><button class="xbtn" data-close="vendorSheet">×</button></div>
  <div id="checkoutRibbon">
    <button id="orderButton" class="orderAction empty">↓ ADD ITEMS</button>
    <span class="rchip slim">🏪 <b id="ribVendor">Vendor</b></span>
    <span class="rchip">📍 <select id="destSelect"><option value="user">User</option><option value="other">Other address</option></select></span>
    <span class="rchip">⚖ <input id="kgInput" type="number" min="0" step="0.1" placeholder="kg/L"></span>
    <span class="rchip">🚚 <select id="assignSelect"><option value="auto">Automatic</option><option value="choose">Choose driver</option><option value="pickup">Self-pickup</option></select></span>
    <span class="rchip rDetails">👤 <select id="driverSelect"></select></span>
    <span class="rchip">↔ <b id="ribKm">0.0km</b></span>
    <span class="rchip">🚚 <b id="ribDelivery">€0.00</b></span>
    <span class="rchip rDetails">🧺 <b id="ribBasket">€0.00</b></span>
    <span class="rchip">💶 <b id="ribTotal">€0.00 COD</b></span>
    <span class="rchip rDetails">👥 <b id="ribDrivers">1 driver</b></span>
    <span class="rchip rDetails">⏱ <input id="prepInput" type="time"><input id="pickupInput" type="time"><input id="arrivalInput" type="time"></span>
    <button class="btn gold rToggle" id="ribbonToggle">▾</button>
  </div>
  <div id="productList"></div>
</div>

<div id="panelSheet" class="drawer">
  <div class="drawerHead"><div class="drawerTitle" id="panelTitle">PANEL</div><button class="xbtn" data-close="panelSheet">×</button></div>
  <div class="drawerBody" id="panelBody"></div>
</div>

<script src="https://unpkg.com/three@0.155.0/build/three.min.js"></script>
<script src="https://unpkg.com/globe.gl@2.29.0/dist/globe.gl.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin></script>
<script>
(function(){'use strict';
const $=id=>document.getElementById(id);
const TILES={dark:'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',light:'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'};
const COUNTRIES=[{id:'gr',name:'Greece',lat:39.0742,lng:21.8243,alt:1.6,cities:[{id:'ath',name:'Athens',lat:37.9838,lng:23.7275,z:13},{id:'rho',name:'Rhodes',lat:36.4349,lng:28.2176,z:14},{id:'the',name:'Thessaloniki',lat:40.6401,lng:22.9444,z:13},{id:'pat',name:'Patras',lat:38.2466,lng:21.7346,z:13},{id:'her',name:'Heraklion',lat:35.3387,lng:25.1442,z:13}]},{id:'uk',name:'United Kingdom',lat:54.4,lng:-2.7,alt:1.85,cities:[{id:'lon',name:'London',lat:51.5074,lng:-0.1278,z:13},{id:'edi',name:'Edinburgh',lat:55.9533,lng:-3.1883,z:13}]},{id:'fr',name:'France',lat:46.2,lng:2.2,alt:1.85,cities:[{id:'par',name:'Paris',lat:48.8566,lng:2.3522,z:13},{id:'mar',name:'Marseille',lat:43.2965,lng:5.3698,z:13}]}];
const DATA={vendorMode:false,view:'global',country:null,city:null,globe:null,nationalMap:null,cityMap:null,darkLayer:null,lightLayer:null,vendors:[],drivers:[],markers:[],routes:[],currentVendor:null,cart:{},selectedDest:null,selectedDriver:null,pickingDest:false,orders:[],ledger:[],messages:{},navLock:0};
const baseProducts=[{name:'Pizza Margherita',desc:'Tomato, mozzarella, basil',price:9,kg:0.65,img:'https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?auto=format&fit=crop&w=160&q=70'},{name:'Greek salad',desc:'Tomato, cucumber, feta, olives',price:6.5,kg:0.55,img:'https://images.unsplash.com/photo-1540420773420-3366772f4999?auto=format&fit=crop&w=160&q=70'},{name:'Milk 1L',desc:'Fresh milk bottle',price:1.8,kg:1,img:'https://images.unsplash.com/photo-1563636619-e9143da7973b?auto=format&fit=crop&w=160&q=70'},{name:'Olive oil 500ml',desc:'Extra virgin olive oil',price:8,kg:.5,img:'https://images.unsplash.com/photo-1474979266404-7eaacbcd87c5?auto=format&fit=crop&w=160&q=70'},{name:'Water pack 6×1.5L',desc:'Heavy pack, counts for driver capacity',price:3.2,kg:9,img:'https://images.unsplash.com/photo-1523362628745-0c100150b504?auto=format&fit=crop&w=160&q=70'}];
function toast(m,d=2200){const t=$('toast');t.textContent=m;t.classList.add('on');clearTimeout(toast.t);toast.t=setTimeout(()=>t.classList.remove('on'),d)}
function km(a,b,c,d){const R=6371,la1=a*Math.PI/180,la2=c*Math.PI/180,dl=(c-a)*Math.PI/180,dn=(d-b)*Math.PI/180;const x=Math.sin(dl/2)**2+Math.cos(la1)*Math.cos(la2)*Math.sin(dn/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))}
function openDrawer(id){$(id).classList.add('open');$(id).classList.remove('collapsed')}function closeDrawer(id){$(id).classList.remove('open','collapsed')}function minimizeVendor(){if($('vendorSheet').classList.contains('open'))$('vendorSheet').classList.add('collapsed')}function setBodyMode(v){document.body.className=v+(DATA.vendorMode?' vendorMode':'')}function setView(v){DATA.view=v;setBodyMode(v);['globeLayer','nationalLayer','cityLayer'].forEach(id=>$(id).classList.remove('on'));if(v==='global'||v==='space')$('globeLayer').classList.add('on');if(v==='national')$('nationalLayer').classList.add('on');if(v==='personal')$('cityLayer').classList.add('on');if(DATA.globe){const ctl=DATA.globe.controls();ctl.autoRotate=(v==='global');DATA.globe.pointOfView({lat:DATA.country?DATA.country.lat:37,lng:DATA.country?DATA.country.lng:23,altitude:v==='space'?3.8:2.05},650)}closeDrawer('commandPanel')}
function altitudeNav(dir){const now=Date.now();if(now-DATA.navLock<700)return;DATA.navLock=now;const country=DATA.country||COUNTRIES[0];if(dir==='in'){if(DATA.view==='space')return setView('global');if(DATA.view==='global')return openNational(country);if(DATA.view==='national')return openPersonal(country.cities[0]);}else{if(DATA.view==='personal')return openNational(country);if(DATA.view==='national')return setView('global');if(DATA.view==='global')return setView('space');}}
function bindAltitudeGestures(el){if(!el||el.dataset.altBound)return;el.dataset.altBound='1';let pinchStart=0,pinched=false;el.addEventListener('wheel',e=>{if(e.target.closest&&e.target.closest('.drawer'))return;const dy=e.deltaY;if(Math.abs(dy)<22)return;if(DATA.view==='national'&&DATA.nationalMap&&DATA.nationalMap.getZoom()>6&&dy>0)return;if(DATA.view==='personal'&&DATA.cityMap&&DATA.cityMap.getZoom()>8&&dy>0)return;e.preventDefault();altitudeNav(dy<0?'in':'out')},{passive:false});el.addEventListener('touchstart',e=>{if(e.touches&&e.touches.length===2){const a=e.touches[0],b=e.touches[1];pinchStart=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);pinched=false}},{passive:true});el.addEventListener('touchmove',e=>{if(!pinchStart||!e.touches||e.touches.length!==2||pinched)return;const a=e.touches[0],b=e.touches[1];const d=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);if(Math.abs(d-pinchStart)>42){pinched=true;altitudeNav(d>pinchStart?'in':'out')}},{passive:true});el.addEventListener('touchend',()=>{pinchStart=0;pinched=false},{passive:true})}
function makeStars(){const f=$('starfield');for(let i=0;i<130;i++){const s=document.createElement('i');s.className='star';s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';s.style.opacity=.28+Math.random()*.7;f.appendChild(s)}}
function initGlobe(){if(!window.Globe){toast('Globe engine not loaded');return}DATA.globe=Globe()($('globeHost')).backgroundColor('rgba(0,0,0,0)').globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg').bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png').showAtmosphere(true).atmosphereColor('#00d8ff').atmosphereAltitude(.18).pointsData(COUNTRIES).pointLat('lat').pointLng('lng').pointAltitude(.018).pointRadius(.42).pointColor(()=> '#00d8ff').pointResolution(20).onPointClick(c=>openNational(c));const ctl=DATA.globe.controls();ctl.autoRotate=true;ctl.autoRotateSpeed=.12;ctl.enableDamping=true;ctl.dampingFactor=.08;DATA.globe.pointOfView({lat:37,lng:23,altitude:2.05},0);window.addEventListener('resize',()=>DATA.globe.width(innerWidth).height(innerHeight));bindAltitudeGestures($('globeHost'));$('globeHost').addEventListener('dblclick',e=>{if(DATA.view==='global'){e.preventDefault();openNational(DATA.country||COUNTRIES[0])}})}
function openNational(country){DATA.country=country;setView('national');setTimeout(()=>initNational(country),80)}
function initNational(country){if(!DATA.nationalMap){DATA.nationalMap=L.map('nationalMap',{zoomControl:false,attributionControl:false,scrollWheelZoom:true});L.tileLayer(TILES.dark,{maxZoom:19}).addTo(DATA.nationalMap);DATA.nationalMap.on('zoomend',()=>{if(DATA.view==='national'&&DATA.nationalMap.getZoom()<=5)altitudeNav('out')});bindAltitudeGestures(DATA.nationalMap.getContainer())}DATA.nationalMap.eachLayer(l=>{if(l instanceof L.Marker)DATA.nationalMap.removeLayer(l)});const bounds=country.cities.map(c=>[c.lat,c.lng]);setTimeout(()=>{DATA.nationalMap.invalidateSize();DATA.nationalMap.fitBounds(bounds,{padding:[54,54],maxZoom:7});},60);country.cities.forEach((c,i)=>{const icon=L.divIcon({className:'',iconSize:[80,40],iconAnchor:[9,9],html:`<div class="nationalBeacon ${i===0?'gold':''}"></div><div class="beaconLabel">${c.name}</div>`});L.marker([c.lat,c.lng],{icon}).addTo(DATA.nationalMap).on('click',()=>openPersonal(c))})}
function openPersonal(city){DATA.city=city;setView('personal');closeDrawer('vendorSheet');setTimeout(()=>initCity(city),80)}
function genVendors(city){return[{id:'v1',name:'Aegean Market',emoji:'🥬',lat:city.lat+.003,lng:city.lng+.004,products:structuredClone(baseProducts)},{id:'v2',name:'Napoli Pizza',emoji:'🍕',lat:city.lat-.0035,lng:city.lng+.002,products:structuredClone(baseProducts.slice(0,3))},{id:'v3',name:'Rhodes Pharmacy',emoji:'⚕',lat:city.lat+.002,lng:city.lng-.004,products:[{name:'Vitamin C',desc:'1000mg tablets',price:6,kg:.12,img:'https://images.unsplash.com/photo-1584308666744-24d5c474f2ae?auto=format&fit=crop&w=160&q=70'},{name:'Bandages',desc:'Basic pack',price:2.5,kg:.05,img:'https://images.unsplash.com/photo-1603398938378-e54eab446dde?auto=format&fit=crop&w=160&q=70'}]}]}
function genDrivers(city){return[{id:'d1',name:'Nikos',lat:city.lat+.005,lng:city.lng-.002,icon:'🛵'},{id:'d2',name:'Maria',lat:city.lat-.004,lng:city.lng-.005,icon:'🚗'},{id:'d3',name:'Theo',lat:city.lat+.001,lng:city.lng+.007,icon:'🛵'},{id:'d4',name:'Eleni',lat:city.lat-.006,lng:city.lng+.004,icon:'🚲'}]}
function initCity(city){if(!DATA.cityMap){DATA.cityMap=L.map('cityMap',{zoomControl:false,attributionControl:false,scrollWheelZoom:true}).setView([city.lat,city.lng],city.z||13);DATA.darkLayer=L.tileLayer(TILES.dark,{maxZoom:19}).addTo(DATA.cityMap);DATA.lightLayer=L.tileLayer(TILES.light,{maxZoom:19,opacity:0});DATA.lightLayer.addTo(DATA.cityMap);DATA.cityMap.on('zoomend',()=>{if(DATA.view==='personal'&&DATA.cityMap.getZoom()<=7)altitudeNav('out')});DATA.cityMap.on('click',e=>{if(DATA.pickingDest){finishDestPick(e.latlng);return}minimizeVendor()});bindAltitudeGestures(DATA.cityMap.getContainer())}DATA.cityMap.setView([city.lat,city.lng],city.z||13);DATA.markers.forEach(m=>m.remove());DATA.routes.forEach(r=>r.remove());DATA.markers=[];DATA.routes=[];DATA.vendors=genVendors(city);DATA.drivers=genDrivers(city);L.marker([city.lat,city.lng],{icon:divIcon('mkUser','U')}).addTo(DATA.cityMap);DATA.vendors.forEach(v=>{const m=L.marker([v.lat,v.lng],{icon:divIcon('mkVendor',v.emoji)}).addTo(DATA.cityMap).on('click',()=>openVendor(v));m.bindTooltip(v.name);DATA.markers.push(m)});DATA.drivers.forEach(d=>{const m=L.marker([d.lat,d.lng],{icon:divIcon('mkDriver',d.icon)}).addTo(DATA.cityMap).on('click',()=>selectDriver(d));m.bindTooltip(d.name);DATA.markers.push(m)});setTimeout(()=>DATA.cityMap.invalidateSize(),120)}
function divIcon(cls,html){return L.divIcon({className:'',iconSize:[46,46],iconAnchor:[23,23],html:`<div class="roundMarker ${cls}">${html}</div>`})}
function setBrightness(v){document.body.classList.remove('tileBrightLow','tileBrightMid','tileBrightHigh');document.body.classList.add(['tileBrightLow','tileBrightMid','tileBrightHigh'][+v]);if(DATA.lightLayer)DATA.lightLayer.setOpacity(+v===0?0:+v===1?.35:.82);localStorage.setItem('as_brightness',v)}
function openVendor(v){DATA.currentVendor=v;DATA.cart={};DATA.selectedDriver=null;DATA.selectedDest=null;$('vendorTitle').textContent=v.name;$('ribVendor').textContent=v.emoji+' '+v.name;renderProducts();fillDrivers();updateRibbon();openDrawer('vendorSheet');closeDrawer('panelSheet')}
function renderProducts(){const v=DATA.currentVendor;if(!v)return;$('productList').innerHTML=v.products.map((p,i)=>`<div class="productRow"><img class="pimg" src="${p.img}" alt=""><div><div class="pname">${p.name}</div><div class="pdesc">${p.desc}</div><div class="pmeta">€${p.price.toFixed(2)} · ${p.kg} kg/L</div></div><div class="qtyBox"><button class="qbtn" data-minus="${i}">−</button><input class="qtyInput" inputmode="numeric" type="number" min="0" step="1" value="${DATA.cart[i]||0}" data-qty="${i}"><button class="qbtn" data-plus="${i}">+</button><button class="editBtn" data-edit="${i}">✎</button></div></div>`).join('');$('productList').querySelectorAll('[data-plus]').forEach(b=>b.onclick=()=>{const i=+b.dataset.plus;DATA.cart[i]=(DATA.cart[i]||0)+1;renderProducts();updateRibbon()});$('productList').querySelectorAll('[data-minus]').forEach(b=>b.onclick=()=>{const i=+b.dataset.minus;DATA.cart[i]=Math.max(0,(DATA.cart[i]||0)-1);renderProducts();updateRibbon()});$('productList').querySelectorAll('[data-qty]').forEach(inp=>inp.onchange=()=>{DATA.cart[+inp.dataset.qty]=Math.max(0,parseInt(inp.value||0));updateRibbon()});$('productList').querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>editProduct(+b.dataset.edit))}
function calc(){const v=DATA.currentVendor;if(!v)return null;const items=Object.entries(DATA.cart).map(([i,q])=>({p:v.products[+i],q:+q})).filter(x=>x.q>0);const basket=items.reduce((s,x)=>s+x.p.price*x.q,0);const autoKg=items.reduce((s,x)=>s+x.p.kg*x.q,0);const manual=parseFloat($('kgInput').value||0);const kg=manual>0?manual:autoKg;const pickup=$('assignSelect').value==='pickup';const dest=currentDest();const dist=pickup?0:km(v.lat,v.lng,dest.lat,dest.lng);const base=pickup?0:(dist<=3?3:3+(dist-3));const drivers=pickup?0:Math.max(1,Math.ceil(Math.max(.01,kg)/13));const load=pickup?0:Math.max(0,drivers-1);const delivery=+(base+load).toFixed(2);const total=+(basket+delivery).toFixed(2);return{items,basket,kg,dist,drivers,delivery,total,pickup,dest,load}}
function currentDest(){return DATA.selectedDest||{lat:DATA.city.lat,lng:DATA.city.lng,label:'User'}}
function updateRibbon(){const c=calc();if(!c)return;$('ribKm').textContent=c.dist.toFixed(1)+'km';$('ribDelivery').textContent='€'+c.delivery.toFixed(2);$('ribBasket').textContent='€'+c.basket.toFixed(2);$('ribTotal').textContent='€'+c.total.toFixed(2)+' COD';$('ribDrivers').textContent=c.pickup?'self-pickup':c.drivers+' driver'+(c.drivers>1?'s':'');const btn=$('orderButton');if(!c.items.length){btn.textContent='↓ ADD ITEMS';btn.classList.add('empty')}else{btn.textContent=c.pickup?'PLACE CASH ORDER':'PLACE CASH ORDER · '+c.drivers+' DRIVER'+(c.drivers>1?'S':'');btn.classList.remove('empty')}if(c.drivers>1&&!c.pickup)toast(c.drivers+' drivers required for '+c.kg.toFixed(1)+' kg/L',1400)}
function fillDrivers(){const sel=$('driverSelect');sel.innerHTML='<option value="">Auto</option>'+DATA.drivers.map(d=>`<option value="${d.id}">${d.icon} ${d.name}</option>`).join('')}
function selectDriver(d){DATA.selectedDriver=d;$('assignSelect').value='choose';$('driverSelect').value=d.id;updateRibbon();toast('Driver selected: '+d.name);if(DATA.currentVendor)openDrawer('vendorSheet')}
function startDestPick(){DATA.pickingDest=true;$('pickBanner').classList.add('on');minimizeVendor();toast('Tap the delivery address on the map')}
function finishDestPick(latlng){DATA.pickingDest=false;$('pickBanner').classList.remove('on');DATA.selectedDest={lat:latlng.lat,lng:latlng.lng,label:'Selected'};L.marker([latlng.lat,latlng.lng],{icon:divIcon('mkDest','⌖')}).addTo(DATA.cityMap);openDrawer('vendorSheet');updateRibbon()}
function placeOrder(){const c=calc();if(!c||!c.items.length){$('productList').scrollTop=0;toast('Add items first');return}const drivers=c.pickup?[]:chooseDrivers(c.drivers);if(!c.pickup&&drivers.length<c.drivers){toast('Not enough drivers nearby');return}const id='ORD-'+(DATA.orders.length+1);const order={id,vendor:DATA.currentVendor,calc:c,drivers,status:'active',driverConfirmed:false,clientConfirmed:false,created:Date.now()};DATA.orders.push(order);DATA.messages[id]=[{who:'System',text:'Cash order placed. Driver and client must both confirm completion.'}];drawOrder(order);recordLedger(order);renderTransaction(order);toast(c.pickup?'Cash order created':drivers.length+' driver(s) assigned');closeDrawer('vendorSheet')}
function chooseDrivers(n){if($('assignSelect').value==='choose'&&$('driverSelect').value){const d=DATA.drivers.find(x=>x.id===$('driverSelect').value);return d?[d]:[]}return DATA.drivers.slice(0,n)}
function drawOrder(o){const v=o.vendor,dest=o.calc.dest,drivers=o.drivers;drivers.forEach((dr,i)=>{const pickup=L.polyline([[dr.lat,dr.lng],[v.lat,v.lng]],{color:'#d7b650',weight:5,opacity:.9,className:'routePickup'}).addTo(DATA.cityMap).on('click',()=>renderTransaction(o));const deliver=L.polyline([[v.lat,v.lng],[dest.lat,dest.lng]],{color:'#00d8ff',weight:6,opacity:.95,className:'routeDelivery'}).addTo(DATA.cityMap).on('click',()=>renderTransaction(o));DATA.routes.push(pickup,deliver)});const pts=[[dest.lat,dest.lng],[v.lat,v.lng],...drivers.map(d=>[d.lat,d.lng])];if(pts.length>2){const poly=L.polygon(pts,{color:'#00d8ff',fillColor:'#00d8ff',fillOpacity:.08,weight:4,opacity:.9,className:'orderPolygon'}).addTo(DATA.cityMap).on('click',()=>renderTransaction(o));DATA.routes.push(poly)}const spiral=DATA.orders.filter(x=>x.vendor.id===v.id).length;const ang=spiral*0.9,rad=.00055*spiral;const bubble=L.marker([v.lat+Math.sin(ang)*rad,v.lng+Math.cos(ang)*rad],{icon:L.divIcon({className:'',iconSize:[40,40],iconAnchor:[20,20],html:`<div class="orderBubble">${spiral}</div>`})}).addTo(DATA.cityMap).on('click',()=>renderTransaction(o));const mid=[(v.lat+dest.lat)/2,(v.lng+dest.lng)/2];const chat=L.marker(mid,{icon:L.divIcon({className:'',iconSize:[120,32],iconAnchor:[60,16],html:'<div class="mkChat">ORDER CHAT</div>'})}).addTo(DATA.cityMap).on('click',()=>renderTransaction(o));DATA.routes.push(bubble,chat)}
function recordLedger(o){const fee=+(o.calc.total*.03).toFixed(2);DATA.ledger.push({type:'Cash goods invoice',from:'Client',to:o.vendor.name,amount:o.calc.basket},{type:'Delivery cash payment',from:'Client',to:o.drivers.map(d=>d.name).join(' + ')||'Self-pickup',amount:o.calc.delivery},{type:'Owner daily 3% payable',from:'Transaction parties',to:'ASTRANOV Owner',amount:fee})}
function renderTransaction(o){$('panelTitle').textContent=o.id+' · TRANSACTION';const msgs=DATA.messages[o.id]||[];$('panelBody').innerHTML=`<div class="txRow"><div class="txTop"><span>${o.vendor.name}</span><b>€${o.calc.total.toFixed(2)} COD</b></div><div class="tiny">Drivers: ${o.drivers.map(d=>d.name).join(', ')||'Self-pickup'} · Delivery paid by client to driver(s).</div><div class="tiny">Prep ${$('prepInput').value||'--:--'} · Pickup ${$('pickupInput').value||'--:--'} · Arrival ${$('arrivalInput').value||'--:--'}</div><div class="txActions"><button class="btn gold" data-driverdone="${o.id}">${o.driverConfirmed?'Driver confirmed':'Driver confirms delivered'}</button><button class="btn gold" data-clientdone="${o.id}">${o.clientConfirmed?'Client confirmed':'Client confirms received'}</button></div></div><div class="chatLog" id="chatLog">${msgs.map(m=>`<div class="msg"><b>${m.who}:</b> ${m.text}</div>`).join('')}</div><div class="chatInputRow"><input class="field" id="chatInput" placeholder="Message client/vendor/driver"><button class="btn" id="chatSend">Send</button></div>`;openDrawer('panelSheet');$('panelBody').querySelector('[data-driverdone]').onclick=()=>{o.driverConfirmed=true;DATA.messages[o.id].push({who:'Driver',text:'Delivered. Waiting client receipt confirmation.'});maybeClose(o)};$('panelBody').querySelector('[data-clientdone]').onclick=()=>{o.clientConfirmed=true;DATA.messages[o.id].push({who:'Client',text:'Received. Thank you.'});maybeClose(o)};$('chatSend').onclick=()=>{const v=$('chatInput').value.trim();if(v){DATA.messages[o.id].push({who:'User',text:v});renderTransaction(o)}}}
function maybeClose(o){if(o.driverConfirmed&&o.clientConfirmed){o.status='closed';DATA.messages[o.id].push({who:'System',text:'Order closed. Daily owner-fee ledger updated.'});toast('Order closed')}renderTransaction(o)}
function showAccounting(){$('panelTitle').textContent='ACCOUNTING OFFICE';$('panelBody').innerHTML=DATA.ledger.length?DATA.ledger.map(l=>`<div class="ledgerLine"><span>${l.type}<br><span class="tiny">${l.from} → ${l.to}</span></span><b>€${l.amount.toFixed(2)}</b></div>`).join(''):'<div class="tiny">No transactions yet.</div>';openDrawer('panelSheet')}
function editProduct(i){if(!DATA.vendorMode)return;const p=DATA.currentVendor.products[i];const name=prompt('Product name',p.name);if(name===null)return;p.name=name;p.desc=prompt('Description',p.desc)||p.desc;p.price=parseFloat(prompt('Price',p.price)||p.price);p.kg=parseFloat(prompt('kg/L',p.kg)||p.kg);p.img=prompt('Photo URL',p.img)||p.img;renderProducts();updateRibbon()}
function voice(){const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){toast('Voice unavailable. Use command buttons.');return}const rec=new SR();rec.lang=navigator.language||'en-US';rec.onresult=e=>{const t=e.results[0][0].transcript.toLowerCase();if(t.includes('greece'))openNational(COUNTRIES[0]);else if(t.includes('account'))showAccounting();else if(t.includes('rhodes'))openPersonal(COUNTRIES[0].cities[1]);else if(t.includes('space'))setView('space');else toast(t)};rec.start();toast('Listening…')}
function boot(){makeStars();initGlobe();setBrightness(localStorage.getItem('as_brightness')||0);$('brightnessInput').value=localStorage.getItem('as_brightness')||0;$('brightnessInput').oninput=e=>setBrightness(e.target.value);$('brand').onclick=()=>{openDrawer('commandPanel')};document.querySelectorAll('[data-close]').forEach(b=>b.onclick=()=>closeDrawer(b.dataset.close));document.querySelectorAll('[data-cmd]').forEach(b=>b.onclick=()=>{const c=b.dataset.cmd;if(c==='voice')voice();if(c==='greece')openNational(COUNTRIES[0]);if(c==='rhodes'){DATA.country=COUNTRIES[0];openPersonal(COUNTRIES[0].cities[1])}if(c==='accounting')showAccounting();if(c==='vendor'){DATA.vendorMode=!DATA.vendorMode;setBodyMode(DATA.view);toast(DATA.vendorMode?'Vendor editing on':'Vendor editing off')}if(c==='global')setView('global');if(c==='space')setView('space')});$('destSelect').onchange=e=>{if(e.target.value==='other')startDestPick();else{DATA.selectedDest=null;updateRibbon()}};$('assignSelect').onchange=updateRibbon;$('driverSelect').onchange=()=>{DATA.selectedDriver=DATA.drivers.find(d=>d.id===$('driverSelect').value)||null;updateRibbon()};['kgInput','prepInput','pickupInput','arrivalInput'].forEach(id=>$(id).oninput=updateRibbon);$('orderButton').onclick=placeOrder;$('ribbonToggle').onclick=()=>{$('checkoutRibbon').classList.toggle('expanded')};$('vendorHead').onclick=e=>{if($('vendorSheet').classList.contains('collapsed')&&!e.target.dataset.close)$('vendorSheet').classList.remove('collapsed')};document.querySelectorAll('.drawer').forEach(d=>{d.addEventListener('touchmove',e=>e.stopPropagation(),{passive:true});d.addEventListener('wheel',e=>e.stopPropagation(),{passive:true})});/* no startup toast in zero-UI mode */}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',boot);else boot();
})();
</script>
</body>
