<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Astranov</title>
  <style>
    :root { --electric: #16d9ff; --electric-strong: #9ff6ff; --electric-soft: rgba(22, 217, 255, 0.12); --text: #edf2f7; --muted: #97a9bb; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; font-family: system-ui, sans-serif; color: var(--text); background: #000; }
    body { background: radial-gradient(circle at 50% 20%, rgba(22, 217, 255, 0.06), transparent 50%), linear-gradient(180deg, #010206 0%, #02060c 60%, #000 100%); }
    canvas { display: block; }
    #top-strip { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); background: rgba(0,10,25,0.92); padding: 8px 40px; border-radius: 30px; border: 1px solid var(--electric); box-shadow: 0 0 25px var(--electric); font-size: 20px; letter-spacing: 4px; z-index: 100; opacity: 0; transition: all 1.4s cubic-bezier(0.23,1,0.32,1); }
    #top-strip.visible { opacity: 1; }
    #ai-bar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,10,25,0.95); padding: 12px 40px; border-radius: 50px; border: 2px solid var(--electric); width: 460px; text-align: center; z-index: 100; opacity: 0; transition: all 1.4s ease; }
    #ai-bar.visible { opacity: 1; }
    #ai-input { background: transparent; border: none; color: var(--electric); font-size: 17px; width: 100%; text-align: center; outline: none; }
    #add-btn { position: absolute; bottom: 100px; right: 30px; width: 56px; height: 56px; background: linear-gradient(#16d9ff, #00aaff); border-radius: 50%; border: none; color: #000; font-size: 28px; box-shadow: 0 0 30px var(--electric); z-index: 100; opacity: 0; transition: all 1s ease; }
    #add-btn.visible { opacity: 1; }
    #radar { position: absolute; bottom: 100px; left: 30px; width: 68px; height: 68px; border: 2px solid var(--electric); border-radius: 50%; z-index: 100; opacity: 0; transition: opacity 1.2s ease; }
    #radar.visible { opacity: 1; }
  </style>
</head>
<body>

  <canvas id="globe"></canvas>

  <div id="top-strip">ASTRANOV <span style="color:#0af">v1.0.2</span></div>

  <div id="ai-bar">
    <input id="ai-input" type="text" placeholder="Command the robot or post a signal...">
    <button id="send-btn" style="background:var(--electric);color:#000;border:none;padding:10px 22px;border-radius:6px;font-weight:bold;">SEND</button>
  </div>

  <button id="add-btn">+</button>

  <div id="radar"><canvas id="radar-canvas" width="68" height="68"></canvas></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script>
    const SUPABASE_URL = "https://kzlabcrlrpbnfiiyrjvl.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt6bGFiY3JscnBibmZpaXlyanZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxNjg3OTAsImV4cCI6MjA4OTc0NDc5MH0.TyshChfsIkc-k357FGME-8TnZn-zxeD74jL-GYRVlkg";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 2000);
    const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('globe'), antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    const earth = new THREE.Mesh(new THREE.SphereGeometry(5, 64, 64), new THREE.MeshPhongMaterial({ map: new THREE.TextureLoader().load('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg'), shininess: 2 }));
    scene.add(earth);
    scene.add(new THREE.Mesh(new THREE.SphereGeometry(5.2, 64, 64), new THREE.MeshBasicMaterial({ color: 0x2288ff, transparent: true, opacity: 0.18, side: THREE.BackSide })));

    const starsGeo = new THREE.BufferGeometry();
    const verts = [];
    for(let i=0; i<15000; i++) verts.push(THREE.MathUtils.randFloatSpread(2000), THREE.MathUtils.randFloatSpread(2000), THREE.MathUtils.randFloatSpread(2000));
    starsGeo.setAttribute('position', new THREE.Float32BufferAttribute(verts,3));
    scene.add(new THREE.Points(starsGeo, new THREE.PointsMaterial({color:0xaaaaaa, size:0.6})));

    camera.position.set(0, 4, 19);
    scene.add(new THREE.AmbientLight(0x404060, 0.7));
    const sunLight = new THREE.DirectionalLight(0xffffff, 1.2); sunLight.position.set(12,10,18); scene.add(sunLight);

    const robotGroup = new THREE.Group(); scene.add(robotGroup);
    const torso = new THREE.Mesh(new THREE.BoxGeometry(0.85,1.5,0.55), new THREE.MeshPhongMaterial({color:0xcccccc, emissive:0x112233, shininess:80})); torso.position.y = 1.3; robotGroup.add(torso);
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.48,32,32), new THREE.MeshPhongMaterial({color:0xaaaaaa, emissive:0x334455})); head.position.y = 2.55; robotGroup.add(head);
    const armMat = new THREE.MeshPhongMaterial({color:0xbbbbbb, shininess:60});
    const leftArm = new THREE.Mesh(new THREE.BoxGeometry(0.32,1.2,0.32), armMat); leftArm.position.set(-0.75,1.45,0); robotGroup.add(leftArm);
    const rightArm = leftArm.clone(); rightArm.position.x = 0.75; robotGroup.add(rightArm);
    const leftLeg = new THREE.Mesh(new THREE.BoxGeometry(0.38,1.25,0.38), armMat); leftLeg.position.set(-0.38,0.35,0); robotGroup.add(leftLeg);
    const rightLeg = leftLeg.clone(); rightLeg.position.x = 0.38; robotGroup.add(rightLeg);
    const wingMat = new THREE.MeshPhongMaterial({color:0xdddddd, emissive:0x6688aa, shininess:100});
    const leftWing = new THREE.Mesh(new THREE.PlaneGeometry(2.4,1.25), wingMat); leftWing.rotation.set(0,0.7,-0.85); leftWing.position.set(-1,2.2,-0.3); robotGroup.add(leftWing);
    const rightWing = leftWing.clone(); rightWing.rotation.set(0,-0.7,0.85); rightWing.position.x = 1; robotGroup.add(rightWing);
    const goldMat = new THREE.MeshPhongMaterial({color:0xffdd44, emissive:0x664400});
    const goldL = new THREE.Mesh(new THREE.BoxGeometry(2.5,0.1,0.1), goldMat); goldL.position.copy(leftWing.position); goldL.rotation.copy(leftWing.rotation); robotGroup.add(goldL);
    const goldR = goldL.clone(); goldR.position.x *= -1; goldR.rotation.y *= -1; robotGroup.add(goldR);
    const thrustMat = new THREE.MeshBasicMaterial({color:0x00ddff});
    const leftThrust = new THREE.Mesh(new THREE.CylinderGeometry(0.14,0.2,0.7,16), thrustMat); leftThrust.rotation.x = Math.PI/2; leftThrust.position.set(-0.45,0.25,0.4); robotGroup.add(leftThrust);
    const rightThrust = leftThrust.clone(); rightThrust.position.x *= -1; robotGroup.add(rightThrust);
    const particles = [];
    const pGeo = new THREE.SphereGeometry(0.07,8,8);
    for(let i=0;i<120;i++){ const pMat = new THREE.MeshBasicMaterial({color:0x00ffff,transparent:true}); const p = new THREE.Mesh(pGeo,pMat); p.userData={life:0,vx:0,vy:0,vz:0}; p.visible=false; robotGroup.add(p); particles.push(p); }
    const antMat = new THREE.MeshPhongMaterial({color:0x00ffff,emissive:0x00aaff});
    const ant1 = new THREE.Mesh(new THREE.CylinderGeometry(0.04,0.04,0.8,8),antMat); ant1.position.set(0.35,2.9,0); ant1.rotation.z = 0.45; robotGroup.add(ant1);
    const ant2 = ant1.clone(); ant2.position.x = -0.35; ant2.rotation.z = -0.45; robotGroup.add(ant2);

    robotGroup.position.set(8,5,2);
    robotGroup.scale.setScalar(0.55);

    let time = 0;
    let speed = 0.35;
    function animate() {
      requestAnimationFrame(animate);
      time += 0.016;
      earth.rotation.y = time * 0.04;
      const radius = 8.5;
      const angle = time * speed;
      robotGroup.position.x = radius * Math.cos(angle);
      robotGroup.position.z = radius * Math.sin(angle) * 0.6;
      robotGroup.position.y = 4.5 + Math.sin(time * 1.8) * 1.2;
      const bank = Math.sin(angle * 2) * 0.35;
      robotGroup.rotation.z = bank;
      robotGroup.lookAt(0, 2.5, 0);
      renderer.render(scene, camera);
    }
    animate();

    function showPanels() {
      document.querySelectorAll('#top-strip,#ai-bar,#add-btn,#radar').forEach(el => el.classList.add('visible'));
    }
    document.addEventListener('click', showPanels, {once:true});

    const rctx = document.getElementById('radar-canvas').getContext('2d');
    let rAngle = 0;
    function drawRadar() {
      rctx.clearRect(0,0,68,68);
      rctx.strokeStyle = '#16d9ff'; rctx.lineWidth = 2;
      rctx.beginPath(); rctx.arc(34,34,28,0,Math.PI*2); rctx.stroke();
      rctx.save(); rctx.translate(34,34); rctx.rotate(rAngle);
      rctx.beginPath(); rctx.moveTo(0,0); rctx.lineTo(28,0); rctx.stroke(); rctx.restore();
      rAngle += 0.12;
      requestAnimationFrame(drawRadar);
    }
    drawRadar();

    console.log("%cASTRANOV v1.0.2 — globe + robot live", "color:#16d9ff; font-size:15px");
  </script>
</body>
</html>
