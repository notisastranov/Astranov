<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Astranov Internet Operating System</title>
<link rel="preconnect" href="https://cdn.babylonjs.com" />
<link rel="preconnect" href="https://cdnjs.cloudflare.com" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<style>
:root{
  color-scheme:dark;
  --bg:#020711;
  --panel:rgba(6,14,28,.62);
  --panel-strong:rgba(7,16,32,.84);
  --line:rgba(0,201,255,.24);
  --line-strong:rgba(0,201,255,.48);
  --cyan:#00c8ff;
  --cyan-soft:#8defff;
  --blue:#118dff;
  --green:#18d77a;
  --red:#ff4965;
  --yellow:#ffd54a;
  --text:#eaf7ff;
  --muted:#8fb8cf;
  --shadow:0 18px 50px rgba(0,0,0,.35),0 0 24px rgba(0,200,255,.12);
  --safe-top:max(env(safe-area-inset-top),8px);
  --safe-bottom:max(env(safe-area-inset-bottom),10px);
  --hud-size:clamp(108px,19vw,138px);
  --hud-btn:clamp(30px,6.2vw,40px);
  --helper-size:clamp(72px,14vw,96px);
  --bubble-size:clamp(58px,12vw,74px);
  --composer-h:clamp(66px,11vh,84px);
  --radius:24px;
  --font:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:radial-gradient(circle at 50% 0%,#0a1d33 0%,#06101d 34%,#020711 100%);font-family:var(--font);color:var(--text)}
button,input,select,textarea{font:inherit}
#app{position:fixed;inset:0;overflow:hidden;background:#020711}
#world,#map{position:absolute;inset:0}
#map{display:none;z-index:5}
#renderCanvas{width:100%;height:100%;display:block;touch-action:none;background:radial-gradient(circle at 50% 24%,#173451 0%,#07101d 58%,#020711 100%)}
#topbar{position:absolute;left:10px;right:10px;top:calc(var(--safe-top) + 2px);z-index:20;display:flex;align-items:center;justify-content:space-between;gap:10px;pointer-events:none;}
#brandPill,#statusPill,#walletPill{pointer-events:auto;display:flex;align-items:center;gap:8px;min-height:34px;padding:0 12px;background:linear-gradient(180deg,rgba(8,20,38,.76),rgba(8,20,38,.42));border:1px solid var(--line);border-radius:999px;box-shadow:var(--shadow);backdrop-filter:blur(16px) saturate(130%);} 
#brandPill{min-width:0;flex:1}
#brandPill .title{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--cyan-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-shadow:0 0 14px rgba(0,200,255,.3)}
#brandPill .dot{width:8px;height:8px;border-radius:50%;background:radial-gradient(circle,#fff 0%,var(--cyan) 65%,rgba(0,200,255,0) 70%);box-shadow:0 0 16px rgba(0,200,255,.65)}
#statusPill{font-size:10px;color:var(--muted)}
#statusPill strong{color:var(--cyan-soft);font-weight:700}
#walletPill{font-size:10px;color:var(--green);font-weight:700}
.hud{position:absolute;bottom:calc(var(--composer-h) + var(--safe-bottom) + 30px);width:var(--hud-size);height:var(--hud-size);z-index:30;border-radius:50%;pointer-events:auto;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 50% 50%,rgba(0,200,255,.06) 0 30%,rgba(3,11,22,.16) 30% 46%,rgba(0,200,255,.08) 46% 48%,transparent 48%),radial-gradient(circle at 50% 50%,rgba(0,200,255,.08),rgba(4,11,24,.72) 68%);border:1px solid rgba(143,239,255,.18);box-shadow:0 18px 40px rgba(0,0,0,.32), inset 0 0 18px rgba(0,200,255,.08),0 0 20px rgba(0,200,255,.08);backdrop-filter:blur(18px) saturate(120%);user-select:none;}
.hud::before,.hud::after{content:"";position:absolute;inset:10%;border-radius:50%;border:1px solid rgba(143,239,255,.09);pointer-events:none}
.hud::after{inset:22%;border-style:dashed;opacity:.7}
#perfHud{left:10px}
#radarHud{right:10px}
.hud-title{position:absolute;top:16px;left:50%;transform:translateX(-50%);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--cyan-soft);white-space:nowrap}
.hud-ring-label{position:absolute;font-size:11px;color:var(--muted);text-align:center;line-height:1.15;max-width:42px}
#perfTop{top:30px;left:50%;transform:translateX(-50%)}
#perfBottom{bottom:20px;left:50%;transform:translateX(-50%)}
#perfLeft{left:10px;top:50%;transform:translateY(-50%)}
#perfRight{right:10px;top:50%;transform:translateY(-50%)}
#radarTop{top:30px;left:50%;transform:translateX(-50%)}
#radarBottom{bottom:20px;left:50%;transform:translateX(-50%)}
#radarLeft{left:10px;top:50%;transform:translateY(-50%)}
#radarRight{right:10px;top:50%;transform:translateY(-50%)}
.hud-center-btn{width:var(--hud-btn);height:var(--hud-btn);border:none;border-radius:999px;display:grid;place-items:center;cursor:pointer;background:radial-gradient(circle at 50% 32%,rgba(125,238,255,.46) 0%,rgba(0,149,255,.28) 38%,rgba(5,14,28,.98) 74%);color:var(--text);box-shadow:0 0 18px rgba(0,200,255,.22), inset 0 0 10px rgba(255,255,255,.08);transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease;}
.hud-center-btn:hover,.hud-center-btn:active{transform:scale(1.06);box-shadow:0 0 22px rgba(0,200,255,.34), inset 0 0 12px rgba(255,255,255,.12)}
.hud-center-btn svg{width:18px;height:18px;display:block}
#perfButton.ready{outline:1px solid rgba(24,215,122,.42)}
#perfButton.loaded{outline:1px solid rgba(255,73,101,.42)}
#perfButton.loaded .open-hand{display:none}
#perfButton.ready .closed-hand{display:none}
#radarButton.zoomed-in .zoom-in-icon{display:none}
#radarButton:not(.zoomed-in) .zoom-out-icon{display:none}
#helper{position:absolute;left:10px;bottom:calc(var(--safe-bottom) + 8px);width:var(--helper-size);height:calc(var(--helper-size) + 12px);z-index:42;border:none;background:none;padding:0;cursor:pointer;display:grid;place-items:center}
#helper svg{width:100%;height:100%;filter:drop-shadow(0 16px 24px rgba(0,0,0,.34)) drop-shadow(0 0 18px rgba(0,200,255,.12));transition:transform .16s ease}
#helper:active svg{transform:translateY(1px) scale(.98)}
#composerWrap{position:absolute;left:88px;right:86px;bottom:calc(var(--safe-bottom) + 8px);z-index:40;display:flex;justify-content:center;pointer-events:none}
#composerShell{width:min(720px,100%);pointer-events:auto;border-radius:28px;background:linear-gradient(180deg,rgba(7,17,34,.82),rgba(7,17,34,.58));border:1px solid var(--line);box-shadow:var(--shadow);backdrop-filter:blur(20px) saturate(135%);overflow:hidden}
#chatDrawer{max-height:0;overflow:hidden;transition:max-height .22s ease;display:flex;flex-direction:column;background:linear-gradient(180deg,rgba(8,18,34,.84),rgba(8,18,34,.58));}
#chatDrawer.open{max-height:38vh}
#chatLog{padding:10px 12px 6px;display:flex;flex-direction:column;gap:8px;overflow:auto;max-height:38vh}
.msg{max-width:88%;padding:10px 12px;border-radius:16px;font-size:12px;line-height:1.45;box-shadow:inset 0 0 10px rgba(255,255,255,.02)}
.msg.ai{align-self:flex-start;background:rgba(0,200,255,.08);border:1px solid rgba(0,200,255,.16);color:#dff9ff}
.msg.user{align-self:flex-end;background:rgba(17,141,255,.14);border:1px solid rgba(17,141,255,.18);color:#eaf8ff}
.msg.sys{align-self:center;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:var(--muted);font-size:11px}
#composer{min-height:var(--composer-h);display:grid;grid-template-columns:auto minmax(0,160px) auto minmax(0,1fr) auto;align-items:center;gap:8px;padding:10px 12px}
#micBtn,#channelAdd,#sendBtn{width:42px;height:42px;border-radius:16px;border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--cyan-soft);display:grid;place-items:center;cursor:pointer;box-shadow:inset 0 0 12px rgba(0,200,255,.05)}
#micBtn.active{border-color:rgba(24,215,122,.44);color:#bfffe2;box-shadow:0 0 20px rgba(24,215,122,.22)}
#channelWrap{min-width:0;display:flex;align-items:center;gap:8px;height:42px;padding:0 10px;border-radius:16px;border:1px solid var(--line);background:rgba(255,255,255,.04)}
#channelArrow{font-size:12px;color:var(--cyan-soft);line-height:1;flex:0 0 auto}
#channelSelect{appearance:none;border:none;background:transparent;color:var(--cyan-soft);width:100%;min-width:0;outline:none;font-size:12px}
#cmdInput{height:42px;border-radius:16px;border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--cyan-soft);padding:0 14px;outline:none;min-width:0;box-shadow:inset 0 0 14px rgba(0,200,255,.05)}
#cmdInput::placeholder{color:rgba(141,239,255,.56)}
#sendBtn{width:48px;background:linear-gradient(180deg,rgba(0,200,255,.16),rgba(0,200,255,.08))}
#sendBtn svg,#micBtn svg,#channelAdd svg{width:18px;height:18px;display:block}
#addBubble{position:absolute;right:10px;bottom:calc(var(--safe-bottom) + 8px);z-index:42;width:var(--bubble-size);height:var(--bubble-size);border-radius:50%;border:1px solid var(--line-strong);background:radial-gradient(circle at 30% 24%,rgba(132,241,255,.52),rgba(11,141,255,.26) 36%,rgba(6,14,28,.96) 72%);color:#f4fbff;display:grid;place-items:center;cursor:pointer;box-shadow:0 18px 36px rgba(0,0,0,.34),0 0 24px rgba(0,200,255,.18)}
#addBubble svg{width:24px;height:24px}
#radialLayer{position:absolute;inset:0;z-index:32;pointer-events:none}
.radial-node{position:absolute;width:90px;height:90px;border-radius:50%;display:none;align-items:center;justify-content:center;flex-direction:column;gap:6px;padding:10px;border:1px solid rgba(141,239,255,.22);background:radial-gradient(circle at 30% 22%,rgba(0,200,255,.24),rgba(7,16,30,.92) 72%);box-shadow:0 18px 40px rgba(0,0,0,.28),0 0 16px rgba(0,200,255,.12);color:#eaf9ff;text-align:center;pointer-events:auto;cursor:pointer;backdrop-filter:blur(16px)}
.radial-node.show{display:flex}
.radial-node strong{font-size:12px;line-height:1.1}
.radial-node span{font-size:10px;color:var(--muted);line-height:1.15}
#listingPanel{position:absolute;right:10px;top:calc(var(--safe-top) + 54px);width:min(320px,calc(100vw - 20px));max-height:38vh;overflow:auto;z-index:25;display:flex;flex-direction:column;gap:8px;pointer-events:auto}
.listCard{background:linear-gradient(180deg,rgba(8,18,34,.86),rgba(8,18,34,.58));border:1px solid var(--line);border-radius:20px;padding:12px;box-shadow:var(--shadow);backdrop-filter:blur(18px)}
.listCard h4{margin:0 0 4px;font-size:14px;color:#f2fbff}
.listMeta{font-size:11px;color:var(--muted);display:flex;gap:8px;flex-wrap:wrap}
.listDesc{margin-top:6px;font-size:12px;color:#d6f6ff;line-height:1.4}
.listActions{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap}
.pillBtn{min-height:34px;padding:0 12px;border-radius:999px;border:1px solid var(--line);background:rgba(0,200,255,.08);color:var(--cyan-soft);cursor:pointer}
.pillBtn.hot{border-color:rgba(24,215,122,.24);color:#bbffe0}
#modal{position:absolute;inset:0;z-index:50;display:none;align-items:flex-end;justify-content:center;padding:12px;padding-bottom:calc(var(--composer-h) + var(--safe-bottom) + 18px);background:linear-gradient(180deg,rgba(2,7,17,0),rgba(2,7,17,.38) 55%,rgba(2,7,17,.48))}
#modal.open{display:flex}
#modalCard{width:min(520px,100%);max-height:72vh;overflow:auto;background:linear-gradient(180deg,rgba(8,18,34,.94),rgba(8,18,34,.78));border:1px solid var(--line);border-radius:28px;box-shadow:0 28px 80px rgba(0,0,0,.42),0 0 26px rgba(0,200,255,.12);backdrop-filter:blur(22px);padding:16px}
.modalHead{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}
.modalHead h3{margin:0;font-size:18px;color:#f0fbff}
#closeModal{width:40px;height:40px;border-radius:14px;border:1px solid var(--line);background:rgba(255,255,255,.04);color:#fff;cursor:pointer}
.formGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.formGrid .full{grid-column:1/-1}
label{display:grid;gap:6px;font-size:11px;color:var(--muted)}
input[type="text"],input[type="number"],input[type="tel"],input[type="url"],textarea,select,input[type="time"]{min-height:44px;border-radius:16px;border:1px solid var(--line);background:rgba(255,255,255,.04);color:#ebfaff;padding:10px 12px;outline:none}
textarea{min-height:100px;resize:vertical}
#saveListing{margin-top:14px;width:100%;min-height:46px;border-radius:18px;border:1px solid var(--line-strong);background:linear-gradient(180deg,rgba(0,200,255,.16),rgba(0,200,255,.08));color:#f3fcff;font-weight:700;cursor:pointer}
.smallNote{font-size:11px;color:var(--muted);line-height:1.45}
.leaflet-container{background:#05111e}
.leaflet-control-container{display:none}
.mapMarker{filter:drop-shadow(0 0 8px rgba(0,200,255,.6))}
@media (max-width: 560px){#brandPill .title{font-size:10px;letter-spacing:.12em}#statusPill,#walletPill{display:none}#listingPanel{left:10px;right:10px;width:auto;top:calc(var(--safe-top) + 52px);max-height:24vh}#composerWrap{left:84px;right:80px}#composer{grid-template-columns:auto minmax(86px,110px) auto minmax(0,1fr) auto}#composerShell{border-radius:24px}#perfHud,#radarHud{bottom:calc(var(--composer-h) + var(--safe-bottom) + 18px)}.radial-node{width:82px;height:82px}.formGrid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="app">
<div id="world"><canvas id="renderCanvas"></canvas></div>
<div id="map"></div>
<div id="topbar"><div id="brandPill"><span class="dot"></span><span class="title">Astranov Internet Operating System</span></div><div id="statusPill"><strong id="viewState">Globe</strong><span id="statusText">Babylon shell online</span></div><div id="walletPill">€<span id="walletValue">0.00</span></div></div>

<script>
(()=>{
const APP={state:{view:'globe',handsFree:false,drawerOpen:false,radialOpen:false,perfLoaded:false,userLoc:{lat:36.434,lng:28.217},currentPick:{lat:36.434,lng:28.217},listings:[],wallet:0,activeChannel:'Astranov Collective Intelligence',mapReady:false},keys:{offers:'astranov.local.offers.v333',wallet:'astranov.wallet.v1'},world:{},map:null,mapLayer:null,recognition:null};
const REMOTE={shops:'/api/shops_list.php',products:'/api/products_list.php',drivers:'/api/drivers_state.php',news:'/api/news_top.php',users:'/api/users_list.php'};
const $=id=>document.getElementById(id);
const clamp=(v,min,max)=>Math.max(min,Math.min(max,v));

function resizeWorld(){if(APP.world.engine)APP.world.engine.resize();}
function drawStars(ctx,w,h){ctx.fillStyle='#030813';ctx.fillRect(0,0,w,h);for(let i=0;i<2400;i++){const x=Math.random()*w,y=Math.random()*h,r=Math.random()<.92?Math.random()*1.1:Math.random()*2.2,g=ctx.createRadialGradient(x,y,0,x,y,r*6),a=.35+Math.random()*.65;g.addColorStop(0,'rgba(255,255,255,'+a+')');g.addColorStop(.35,'rgba(141,239,255,'+(a*.55)+')');g.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,r*6,0,Math.PI*2);ctx.fill();}}
function drawEarth(ctx,w,h){const g=ctx.createLinearGradient(0,0,0,h);g.addColorStop(0,'#102f56');g.addColorStop(.5,'#0b2341');g.addColorStop(1,'#09172d');ctx.fillStyle=g;ctx.fillRect(0,0,w,h);ctx.fillStyle='rgba(28,124,198,.24)';for(let i=0;i<1200;i++){ctx.beginPath();ctx.arc(Math.random()*w,Math.random()*h,Math.random()*1.8,0,Math.PI*2);ctx.fill();}const continents=[[[180,240],[260,180],[380,170],[460,200],[520,290],[490,360],[430,380],[360,340],[290,390],[220,350],[180,280]],[[520,180],[600,140],[740,120],[850,160],[940,220],[980,320],[940,390],[860,430],[760,450],[660,400],[600,330],[540,260]],[[910,550],[990,500],[1080,500],[1170,560],[1210,650],[1170,730],[1080,760],[1000,720],[930,650]],[[1240,260],[1360,200],[1500,230],[1580,320],[1540,440],[1430,480],[1310,430],[1240,350]],[[1450,620],[1570,590],[1670,640],[1710,730],[1660,820],[1540,860],[1450,800],[1410,700]]];continents.forEach(poly=>{ctx.beginPath();poly.forEach(([x,y],i)=>i?ctx.lineTo(x,y):ctx.moveTo(x,y));ctx.closePath();const cg=ctx.createLinearGradient(0,0,0,h);cg.addColorStop(0,'#3dd99d');cg.addColorStop(.6,'#1a8d61');cg.addColorStop(1,'#10614a');ctx.fillStyle=cg;ctx.fill();ctx.strokeStyle='rgba(186,255,231,.12)';ctx.lineWidth=6;ctx.stroke();});ctx.fillStyle='rgba(255,214,74,.22)';for(let i=0;i<250;i++){ctx.beginPath();ctx.arc(Math.random()*w,Math.random()*h,Math.random()*2.5,0,Math.PI*2);ctx.fill();}}
function drawClouds(ctx,w,h){ctx.clearRect(0,0,w,h);for(let i=0;i<420;i++){const x=Math.random()*w,y=Math.random()*h,r=18+Math.random()*50,grad=ctx.createRadialGradient(x,y,0,x,y,r);grad.addColorStop(0,'rgba(255,255,255,.42)');grad.addColorStop(.55,'rgba(180,210,230,.14)');grad.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=grad;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();}}
function latLngToVector3(lat,lng,r){const phi=(90-lat)*Math.PI/180,theta=(lng+180)*Math.PI/180;return new BABYLON.Vector3(-(r*Math.sin(phi)*Math.cos(theta)),r*Math.cos(phi),r*Math.sin(phi)*Math.sin(theta));}
function renderWorldMarkers(){if(!APP.world.scene)return;APP.world.markers.forEach(m=>m.dispose());APP.world.markers=[];APP.state.listings.slice(0,80).forEach(item=>{if(item.lat==null||item.lng==null)return;const marker=BABYLON.MeshBuilder.CreateSphere('m'+item.id,{diameter:item.kind==='driver'?.09:.07,segments:10},APP.world.scene);marker.position=latLngToVector3(Number(item.lat),Number(item.lng),1.96);marker.material=item.kind==='driver'?APP.world.driverMat:APP.world.markerMat;marker.actionManager=new BABYLON.ActionManager(APP.world.scene);marker.actionManager.registerAction(new BABYLON.ExecuteCodeAction(BABYLON.ActionManager.OnPickTrigger,()=>{ai(item.title+'. '+(item.description||label(item))+'.');if(item.kind==='product')routeOrder(item);}));APP.world.markers.push(marker);});}
function animMap(){if(!APP.world.camera)return;BABYLON.Animation.CreateAndStartAnimation('camMap',APP.world.camera,'radius',60,30,APP.world.camera.radius,4.35,0);}
function animGlobe(){if(!APP.world.camera)return;BABYLON.Animation.CreateAndStartAnimation('camGlobe',APP.world.camera,'radius',60,30,APP.world.camera.radius,6.5,0);}
function startup(){seed();loadWallet();createWorld();initMap();wire();installVoice();installInputDrag();APP.state.listings=loadOffers();renderListings();renderWorldMarkers();guessLocation();loadLiveData();setWallet(15);ai('Astranov Collective Intelligence online. The world is live. Use the radar to zoom, the add bubble to list, and the map to place things precisely.');}
startup();
})();
</script>
