<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Astranov</title>
<link rel="preconnect" href="https://unpkg.com">
<link rel="preconnect" href="https://tile.openstreetmap.org">
<link rel="preconnect" href="https://router.project-osrm.org">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<style>
  :root{
    --text:#eaf7ff;--muted:#91b8d4;--good:#4ef2b4;
    --glass:rgba(6,20,38,.58);--glassStrong:rgba(7,18,34,.82);--shadow:0 10px 38px rgba(0,0,0,.38);
  }
  *{box-sizing:border-box} html,body{margin:0;height:100%;overflow:hidden;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--text);
    background:radial-gradient(circle at 50% 20%, #10386a 0%, #05111f 28%, #03070f 60%, #02050a 100%)}
  #app{position:relative;height:100%;width:100%;overflow:hidden}
  #stars{position:absolute;inset:0;width:100%;height:100%;display:block}
  #spaceGlow{position:absolute;inset:-12%;background:radial-gradient(circle at 26% 22%, rgba(56,153,255,.15), transparent 28%),radial-gradient(circle at 74% 18%, rgba(105,225,255,.12), transparent 18%),radial-gradient(circle at 55% 78%, rgba(91,150,255,.12), transparent 22%);pointer-events:none;filter:blur(20px)}
  .brand{position:absolute;top:12px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:2px;z-index:9;text-align:center;pointer-events:none}
  .brand .title{font-weight:800;letter-spacing:.22em;text-transform:uppercase;font-size:13px;color:#fff;text-shadow:0 0 16px rgba(76,200,255,.46)}
  .brand .sub{font-size:11px;color:var(--muted)}
  #modeHint{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);z-index:9;max-width:min(90vw,520px);padding:11px 14px;border-radius:999px;background:rgba(9,25,45,.64);backdrop-filter:blur(16px);border:1px solid rgba(118,220,255,.24);font-size:12px;color:#d9f5ff;box-shadow:var(--shadow);transition:opacity .4s ease}
  #orbitScene{position:absolute;inset:0;display:grid;place-items:center;z-index:2;transition:transform .7s ease, opacity .55s ease}
  #orbitScene.hidden{opacity:0;transform:scale(1.08);pointer-events:none}
  .earth-wrap{position:relative;width:min(72vw,430px);height:min(72vw,430px);display:grid;place-items:center}
  .earth-glow{position:absolute;inset:-10%;border-radius:50%;background:radial-gradient(circle, rgba(73,176,255,.06) 0 40%, rgba(73,176,255,.13) 48%, rgba(73,176,255,.08) 55%, transparent 70%);filter:blur(20px);animation:pulse 7s ease-in-out infinite}
  .earth{position:relative;width:100%;height:100%;border-radius:50%;overflow:hidden;background:radial-gradient(circle at 28% 30%, rgba(255,255,255,.55), transparent 18%),url('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg') center/cover no-repeat;box-shadow:inset -26px -26px 70px rgba(0,0,0,.52),inset 18px 18px 45px rgba(255,255,255,.12),0 0 0 1px rgba(255,255,255,.07),0 0 26px rgba(76,200,255,.35),0 0 70px rgba(76,200,255,.18);cursor:pointer;transform:translateZ(0);animation:earthTurn 50s linear infinite}
  .earth::after{content:"";position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle at 65% 35%, rgba(255,255,255,.18), transparent 18%),radial-gradient(circle at 50% 50%, transparent 60%, rgba(0,0,0,.45) 95%);pointer-events:none}
  .earth-ring{position:absolute;inset:-14%;border-radius:50%;border:1px solid rgba(146,231,255,.14);box-shadow:0 0 0 1px rgba(76,200,255,.06) inset}
  .stationOrbit{position:absolute;inset:-12%;animation:orbit 18s linear infinite;pointer-events:none}
  .station{position:absolute;left:50%;top:0;transform:translate(-50%,-50%);width:40px;height:16px;border-radius:18px;background:linear-gradient(90deg,#7bf0ff,#1ca7ff);box-shadow:0 0 22px rgba(76,200,255,.55)}
  .station::before,.station::after{content:"";position:absolute;top:50%;width:18px;height:3px;background:#aef4ff;transform:translateY(-50%);border-radius:999px;opacity:.92}
  .station::before{left:-12px}.station::after{right:-12px}
  #orbitalLayer{position:absolute;inset:0}.orbital-dot{position:absolute;width:14px;height:14px;border-radius:50%;background:radial-gradient(circle at 35% 35%, #fff, #54d2ff 38%, #2f72ff 90%);box-shadow:0 0 14px rgba(76,200,255,.75);cursor:pointer}
  .dot-card{position:absolute;min-width:112px;max-width:150px;padding:10px 12px;border-radius:16px;background:rgba(7,18,34,.78);backdrop-filter:blur(14px);box-shadow:var(--shadow);border:1px solid rgba(124,222,255,.22);font-size:12px;line-height:1.25;cursor:pointer}.dot-card b{display:block;color:white;margin-bottom:2px}.dot-card small{color:var(--muted)}
  #mapStage{position:absolute;inset:0;z-index:3;opacity:0;pointer-events:none;transform:scale(1.02);transition:opacity .55s ease, transform .55s ease}#mapStage.active{opacity:1;pointer-events:auto;transform:scale(1)}
  #map{position:absolute;inset:0}.mapMask{position:absolute;inset:0;pointer-events:none;background:radial-gradient(circle at 50% -8%, rgba(75,194,255,.13), transparent 25%),linear-gradient(to bottom, rgba(4,10,18,.16), transparent 26%, transparent 70%, rgba(4,10,18,.12));z-index:401}
  #backToEarth,#voicePulse{position:absolute;top:14px;z-index:500;padding:11px 14px;border-radius:999px;background:var(--glass);backdrop-filter:blur(16px);border:1px solid rgba(124,222,255,.22);box-shadow:var(--shadow);font-size:13px;color:var(--text)}
  #backToEarth{left:14px;font-weight:700} #voicePulse{right:14px;display:flex;align-items:center;gap:8px}
  #voicePulse .dot{width:10px;height:10px;border-radius:50%;background:var(--good);box-shadow:0 0 12px rgba(78,242,180,.7);animation:pulse 1.6s ease-in-out infinite}
  #assistantWave{position:absolute;left:50%;bottom:18px;transform:translateX(-50%);z-index:500;max-width:min(90vw,520px);padding:12px 16px;border-radius:18px;background:var(--glassStrong);border:1px solid rgba(124,222,255,.2);backdrop-filter:blur(14px);box-shadow:var(--shadow);font-size:13px;color:#e9f7ff;display:none}#assistantWave.show{display:block}
  #manualDock{position:absolute;left:50%;bottom:14px;transform:translateX(-50%) translateY(110%);width:min(92vw,560px);padding:12px;border-radius:22px;background:rgba(7,18,34,.88);border:1px solid rgba(124,222,255,.24);backdrop-filter:blur(16px);box-shadow:var(--shadow);z-index:600;transition:transform .35s ease}#manualDock.open{transform:translateX(-50%) translateY(0)}
  #manualDock .row{display:flex;gap:10px}#manualInput{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(124,222,255,.16);color:white;border-radius:16px;padding:14px 16px;font-size:15px;outline:none}
  #manualSend,#manualClose{border:none;background:linear-gradient(180deg,#53d5ff,#1e9cff);color:#001b2f;font-weight:800;border-radius:16px;padding:0 16px;font-size:14px;min-width:82px}#manualClose{background:rgba(255,255,255,.07);color:#dff6ff;border:1px solid rgba(124,222,255,.16)}
  #manualHint{font-size:12px;color:var(--muted);padding-top:8px}.statusChip{position:absolute;bottom:66px;right:14px;z-index:500;padding:10px 12px;border-radius:999px;background:var(--glass);border:1px solid rgba(124,222,255,.18);backdrop-filter:blur(14px);box-shadow:var(--shadow);font-size:12px;color:#dff6ff}
  .leaflet-container{background:#020814}.leaflet-control-attribution{display:none}.leaflet-popup-content-wrapper,.leaflet-popup-tip{background:rgba(7,18,34,.94);color:var(--text);border:1px solid rgba(124,222,255,.2);box-shadow:var(--shadow)}.leaflet-popup-content{margin:0}
  .world-card{padding:12px 12px 10px;min-width:220px}.world-card h4{margin:0 0 4px;font-size:14px}.world-card p{margin:0 0 8px;font-size:12px;color:var(--muted);line-height:1.35}.world-card .metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0}.world-card .metric{padding:8px;border-radius:14px;background:rgba(255,255,255,.04);font-size:12px}.world-card .metric b{display:block;color:white;font-size:13px}.world-card .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
  .world-card button{border:none;border-radius:14px;padding:9px 11px;font-weight:700;font-size:12px;cursor:pointer;background:linear-gradient(180deg,#5edcff,#249fff);color:#032037}.world-card button.secondary{background:rgba(255,255,255,.06);color:#dff6ff;border:1px solid rgba(124,222,255,.18)}
  .price-label{background:rgba(7,18,34,.84);color:#fff;border:1px solid rgba(124,222,255,.26);border-radius:999px;padding:7px 10px;font-size:12px;font-weight:800;box-shadow:0 0 22px rgba(76,200,255,.26);white-space:nowrap}
  .shape-label{background:rgba(10,26,46,.84);color:#dff6ff;border:1px solid rgba(124,222,255,.22);border-radius:16px;padding:8px 10px;font-size:12px;font-weight:700;box-shadow:var(--shadow);white-space:nowrap}
  @keyframes earthTurn { from{background-position:0 0, center 0} to{background-position:0 0, -1024px 0} }
  @keyframes orbit { from{transform:rotate(0)} to{transform:rotate(360deg)} }
  @keyframes pulse { 0%,100%{transform:scale(1);opacity:.78} 50%{transform:scale(1.06);opacity:1} }
  @media (max-width:560px){.earth-wrap{width:min(82vw,360px);height:min(82vw,360px)}.brand .title{font-size:12px}.brand .sub{font-size:10px}#voicePulse,#backToEarth{font-size:12px;padding:10px 12px}}
</style>
</head>
<body>
<div id="app">
  <canvas id="stars"></canvas>
  <div id="spaceGlow"></div>
  <div class="brand"><div class="title">Astranov</div><div class="sub">Earth-first world interface</div></div>
  <div id="orbitScene"><div class="earth-wrap"><div class="earth-glow"></div><div class="earth-ring"></div><div class="stationOrbit"><div class="station"></div></div><div id="orbitalLayer"></div><div class="earth" id="earth" title="Enter your map"></div></div></div>
  <div id="modeHint">Tap Earth to enter your world. Voice starts first. Hold anywhere to type only if needed.</div>
  <div id="mapStage"><div id="map"></div><div class="mapMask"></div><button id="backToEarth">Earth</button><div id="voicePulse"><span class="dot"></span><span id="voiceStatus">voice-first</span></div><div id="assistantWave"></div><div class="statusChip" id="statusChip">client • vendor • driver • circles</div></div>
  <div id="manualDock" aria-hidden="true"><div class="row"><input id="manualInput" type="text" placeholder="Type only if voice is unavailable or you prefer manual input" /><button id="manualSend">Send</button><button id="manualClose">Hide</button></div><div id="manualHint">Manual input is fallback. Astranov stores interaction signals locally until your live backend is connected.</div></div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
(() => {
  const state = {mode:'earth',user:{lat:36.4344,lng:28.2176,role:['client','vendor','driver'],name:'You'},weatherBad:false,scarcity:0.35,manualVisible:false,mapReady:false,map:null,layers:{},speech:{recognition:null,supported:false,active:false},data:{interactions:JSON.parse(localStorage.getItem('astranov_user_data')||'[]')}};
  const els = {stars:document.getElementById('stars'),orbitScene:document.getElementById('orbitScene'),mapStage:document.getElementById('mapStage'),earth:document.getElementById('earth'),orbitalLayer:document.getElementById('orbitalLayer'),modeHint:document.getElementById('modeHint'),backToEarth:document.getElementById('backToEarth'),voicePulse:document.getElementById('voicePulse'),voiceStatus:document.getElementById('voiceStatus'),assistantWave:document.getElementById('assistantWave'),manualDock:document.getElementById('manualDock'),manualInput:document.getElementById('manualInput'),manualSend:document.getElementById('manualSend'),manualClose:document.getElementById('manualClose'),statusChip:document.getElementById('statusChip')};
  const worldSeeds = [
    {title:'Blue Harbor Shop',top:'18%',left:'68%',copy:'Tap to open your shop tile on the map.',target:'vendor'},
    {title:'Driver lane',top:'70%',left:'66%',copy:'Tap to follow a live route and driver economics.',target:'driver'},
    {title:'Social Circle',top:'61%',left:'23%',copy:'Tap to open a living circle on the map.',target:'circle'},
    {title:'Client drop',top:'27%',left:'20%',copy:'Tap to enter your delivery view.',target:'client'}
  ];
  function saveFeedback(type,payload={}){state.data.interactions.push({type,payload,ts:Date.now()});state.data.interactions=state.data.interactions.slice(-500);localStorage.setItem('astranov_user_data',JSON.stringify(state.data.interactions));}
  function speak(text,keepVisible=false){els.assistantWave.textContent=text;els.assistantWave.classList.add('show');if(!keepVisible){clearTimeout(speak._t);speak._t=setTimeout(()=>els.assistantWave.classList.remove('show'),4200)}if('speechSynthesis'in window){const u=new SpeechSynthesisUtterance(text);u.rate=1;u.pitch=1.02;u.volume=.9;window.speechSynthesis.cancel();window.speechSynthesis.speak(u)}}
  function showManualInput(show=true){state.manualVisible=show;els.manualDock.classList.toggle('open',show);if(show)setTimeout(()=>els.manualInput.focus(),180)}
  function setupStars(){const canvas=els.stars,ctx=canvas.getContext('2d');const resize=()=>{canvas.width=innerWidth*devicePixelRatio;canvas.height=innerHeight*devicePixelRatio;canvas.style.width=innerWidth+'px';canvas.style.height=innerHeight+'px';ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);draw()};function draw(){ctx.clearRect(0,0,innerWidth,innerHeight);for(let i=0;i<180;i++){const x=Math.random()*innerWidth,y=Math.random()*innerHeight,r=Math.random()*1.8+.2,a=Math.random()*.9+.1;ctx.fillStyle=`rgba(255,255,255,${a})`;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill()}for(let i=0;i<24;i++){const x=Math.random()*innerWidth,y=Math.random()*innerHeight,g=ctx.createRadialGradient(x,y,0,x,y,90);g.addColorStop(0,'rgba(76,200,255,.12)');g.addColorStop(1,'rgba(76,200,255,0)');ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,90,0,Math.PI*2);ctx.fill()}}addEventListener('resize',resize);resize()}
  function buildOrbitScene(){worldSeeds.forEach(seed=>{const dot=document.createElement('div');dot.className='orbital-dot';dot.style.top=seed.top;dot.style.left=seed.left;const card=document.createElement('div');card.className='dot-card';card.style.top=`calc(${seed.top} + 10px)`;card.style.left=`calc(${seed.left} + 12px)`;card.innerHTML=`<b>${seed.title}</b><small>${seed.copy}</small>`;const open=()=>enterMap(seed.target);dot.addEventListener('click',open);card.addEventListener('click',open);els.orbitalLayer.append(dot,card)})}
  function requestLocation(){if(!navigator.geolocation)return;navigator.geolocation.getCurrentPosition(pos=>{state.user.lat=pos.coords.latitude;state.user.lng=pos.coords.longitude;saveFeedback('geolocated',{lat:state.user.lat,lng:state.user.lng});if(state.mapReady)centerOnUser()},err=>saveFeedback('geolocation_denied',{code:err.code}),{enableHighAccuracy:true,maximumAge:15000,timeout:7000})}
  function setupVoice(){const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){state.speech.supported=false;els.voiceStatus.textContent='manual fallback';return}state.speech.supported=true;const rec=new SR();rec.lang='en-US';rec.interimResults=false;rec.continuous=false;rec.onstart=()=>{state.speech.active=true;els.voiceStatus.textContent='listening';saveFeedback('voice_start')};rec.onend=()=>{state.speech.active=false;els.voiceStatus.textContent='voice-first'};rec.onerror=e=>{els.voiceStatus.textContent='manual fallback';saveFeedback('voice_error',{error:e.error})};rec.onresult=e=>{const text=e.results[0][0].transcript.trim();saveFeedback('voice_message',{text});handleIntent(text)};state.speech.recognition=rec}
  function tryVoiceStart(){if(!state.speech.supported||!state.speech.recognition||state.speech.active)return;try{state.speech.recognition.start()}catch(e){}}
  function buildMap(){if(state.mapReady)return;const map=L.map('map',{zoomControl:false,attributionControl:false,preferCanvas:true}).setView([state.user.lat,state.user.lng],13);state.map=map;const light=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19});const dark=L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{subdomains:'abcd',maxZoom:19});light.addTo(map);state.layers.baseLight=light;state.layers.baseDark=dark;state.layers.user=L.circleMarker([state.user.lat,state.user.lng],{radius:11,weight:2,color:'#baf5ff',fillColor:'#35b8ff',fillOpacity:.95}).addTo(map);const vendorLatLng=[state.user.lat+.012,state.user.lng+.009],driverLatLng=[state.user.lat-.011,state.user.lng-.006],circleCenter=[state.user.lat+.004,state.user.lng-.016],thirdStop=[state.user.lat+.014,state.user.lng-.004];state.layers.vendor=L.circleMarker(vendorLatLng,{radius:10,weight:2,color:'#d2faff',fillColor:'#00d7ff',fillOpacity:.92}).addTo(map);state.layers.driver=L.circleMarker(driverLatLng,{radius:10,weight:2,color:'#cbfff0',fillColor:'#25d9a7',fillOpacity:.92}).addTo(map);state.layers.circle=L.circle(circleCenter,{radius:680,weight:2,color:'#62c6ff',fillColor:'#299cff',fillOpacity:.13}).addTo(map);state.layers.triangle=L.polygon([vendorLatLng,driverLatLng,thirdStop],{color:'#ffd166',weight:2,fillColor:'#f9c74f',fillOpacity:.09}).addTo(map);state.layers.group=L.polygon([[state.user.lat+.008,state.user.lng+.018],[state.user.lat+.018,state.user.lng+.022],[state.user.lat+.02,state.user.lng+.005],[state.user.lat+.01,state.user.lng-.002],[state.user.lat+.003,state.user.lng+.007]],{color:'#8f9eff',weight:2,fillColor:'#6d7cff',fillOpacity:.08}).addTo(map);attachMapObjectEvents();drawGeometryLabels();buildRoute();state.mapReady=true}
  function attachMapObjectEvents(){const vendor=()=>renderWorldCard({title:'Blue Harbor Shop',desc:'Vendor tile. Edit menu, availability, prep load, and live offers here on the map.',metrics:[['Role','vendor'],['Menu source','Sheets or app'],['Availability','on'],['Load','balanced']],actions:['Open menu','Toggle shop','Harvest feedback']});const driver=()=>renderWorldCard({title:'Driver lane',desc:'Driver tile. Earnings respond to scarcity, hour load, and route geometry.',metrics:[['Role','driver'],['Availability','on'],['Scarcity boost',`${Math.round(state.scarcity*100)}%`],['Load cap','33 kg/L']],actions:['Toggle work','View route','Harvest feedback']});const user=()=>renderWorldCard({title:'Your live position',desc:'Client anchor. Tap objects to manage the world through the world.',metrics:[['Roles','client / vendor / driver'],['Voice','first'],['Manual','fallback'],['Data','local harvest']],actions:['Manual input','Harvest feedback','Zoom home']});const circle=()=>renderWorldCard({title:'Social Circle',desc:'A live map circle for teams, friends, work, or games. Zoom out and it recedes.',metrics:[['Type','circle'],['Visibility','contextual'],['Chat','geometry-bound'],['Discovery','map-native']],actions:['Open circle chat','Adjust circle','Harvest feedback']});const triangle=()=>renderWorldCard({title:'Triangle task',desc:'Three-party relation. Task data belongs inside the shape, not in a menu forest.',metrics:[['Type','triangle'],['Parties','3'],['Dispatch','assisted'],['State','active']],actions:['Open task chat','Adjust triangle','Harvest feedback']});const group=()=>renderWorldCard({title:'Moving group polygon',desc:'Large collaborations become polygons. Tap the shape to enter the shared context.',metrics:[['Type','polygon'],['Parties','5+'],['Chat','shared'],['State','live']],actions:['Open group chat','Adjust group','Harvest feedback']});state.layers.vendor.on('click',e=>L.popup().setLatLng(e.latlng).setContent(vendor()).openOn(state.map));state.layers.driver.on('click',e=>L.popup().setLatLng(e.latlng).setContent(driver()).openOn(state.map));state.layers.user.on('click',e=>L.popup().setLatLng(e.latlng).setContent(user()).openOn(state.map));state.layers.circle.on('click',e=>L.popup().setLatLng(e.latlng).setContent(circle()).openOn(state.map));state.layers.triangle.on('click',e=>L.popup().setLatLng(e.latlng).setContent(triangle()).openOn(state.map));state.layers.group.on('click',e=>L.popup().setLatLng(e.latlng).setContent(group()).openOn(state.map));state.map.on('popupopen',wirePopupActions)}
  function renderWorldCard({title,desc,metrics,actions}){return `<div class="world-card"><h4>${title}</h4><p>${desc}</p><div class="metrics">${metrics.map(([k,v])=>`<div class="metric"><span>${k}</span><b>${v}</b></div>`).join('')}</div><div class="actions">${actions.map(name=>{const s=/Harvest|Zoom home|Adjust/.test(name)?'secondary':'';return `<button class="${s}" data-act="${name}">${name}</button>`}).join('')}</div></div>`}
  function wirePopupActions(){document.querySelectorAll('.world-card button').forEach(btn=>{btn.onclick=()=>{const act=btn.dataset.act;saveFeedback('popup_action',{act});if(act==='Manual input')showManualInput(true);else if(act==='Zoom home')centerOnUser();else speak(act,false)}})}
  function centerOnUser(){if(state.map)state.map.flyTo([state.user.lat,state.user.lng],14,{duration:.9})}
  function computeDeliveryQuote(km,extras={}){let price=km;const reasons=[`€${km.toFixed(2)} for ${km.toFixed(2)} km`];if(extras.night){price+=1;reasons.push('+ €1 night')}if(extras.badWeather){price+=1;reasons.push('+ €1 weather')}const load=extras.loadKg||0;if(load>13){price+=1;reasons.push('+ €1 load>13');const bands=Math.floor(Math.max(0,Math.min(load,33)-13)/13);if(bands>0){price+=bands;reasons.push(`+ €${bands} extra volume`)}}const scarcityBoost=1+(state.scarcity*.25);price*=scarcityBoost;reasons.push(`× ${scarcityBoost.toFixed(2)} scarcity balance`);const platformFee=price*.03;return {customer:+price.toFixed(2),driverShare:+(price-platformFee).toFixed(2),platformFee:+platformFee.toFixed(2),reasons}}
  async function buildRoute(){const a=[state.user.lng,state.user.lat],b=[state.layers.vendor.getLatLng().lng,state.layers.vendor.getLatLng().lat];let km=haversine([a[1],a[0]],[b[1],b[0]]),coords=[[a[1],a[0]],[b[1],b[0]]],liveRoute=false;try{const url=`https://router.project-osrm.org/route/v1/driving/${a[0]},${a[1]};${b[0]},${b[1]}?overview=full&geometries=geojson`;const res=await fetch(url);const json=await res.json();if(json.routes&&json.routes[0]){coords=json.routes[0].geometry.coordinates.map(([lng,lat])=>[lat,lng]);km=json.routes[0].distance/1000;liveRoute=true}}catch(e){}state.layers.route=L.polyline(coords,{color:'#3ec3ff',weight:5,opacity:.92}).addTo(state.map);const h=new Date().getHours(),quote=computeDeliveryQuote(+km.toFixed(2),{night:(h>=21||h<9),badWeather:state.weatherBad,loadKg:19}),mid=coords[Math.floor(coords.length/2)];state.layers.priceLabel=L.marker(mid,{interactive:true,icon:L.divIcon({className:'',html:`<div class="price-label">${liveRoute?'Route':'Estimate'} €${quote.customer}</div>`})}).addTo(state.map);state.layers.priceLabel.on('click',()=>{L.popup().setLatLng(mid).setContent(`<div class="world-card"><h4>${liveRoute?'Live route quote':'Estimated route quote'}</h4><p>${liveRoute?'OSRM live route distance.':'Fallback distance estimate until live routing responds.'}</p><div class="metrics"><div class="metric"><span>Customer</span><b>€${quote.customer}</b></div><div class="metric"><span>Driver</span><b>€${quote.driverShare}</b></div><div class="metric"><span>Platform</span><b>€${quote.platformFee}</b></div><div class="metric"><span>Distance</span><b>${km.toFixed(2)} km</b></div></div><p>${quote.reasons.join(' • ')}</p><div class="actions"><button data-act="Harvest feedback" class="secondary">Harvest feedback</button></div></div>`).openOn(state.map)});state.map.on('popupopen',wirePopupActions)}
  function drawGeometryLabels(){state.layers.triangleLabel=L.marker(state.layers.triangle.getBounds().getCenter(),{icon:L.divIcon({className:'',html:`<div class="shape-label">Triangle task • 3 stops</div>`})}).addTo(state.map);state.layers.groupLabel=L.marker(state.layers.group.getBounds().getCenter(),{icon:L.divIcon({className:'',html:`<div class="shape-label">Polygon group • live chat</div>`})}).addTo(state.map);state.layers.circleLabel=L.marker(state.layers.circle.getBounds().getCenter(),{icon:L.divIcon({className:'',html:`<div class="shape-label">Social Circle</div>`})}).addTo(state.map)}
  function haversine(a,b){const R=6371,toRad=d=>d*Math.PI/180,dLat=toRad(b[0]-a[0]),dLng=toRad(b[1]-a[1]),lat1=toRad(a[0]),lat2=toRad(b[0]);const s=Math.sin(dLat/2)**2+Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLng/2)**2;return 2*R*Math.atan2(Math.sqrt(s),Math.sqrt(1-s))}
  function enterMap(focus='user'){state.mode='map';els.orbitScene.classList.add('hidden');els.mapStage.classList.add('active');els.modeHint.style.opacity='0';buildMap();centerOnUser();if(focus==='vendor')state.map.flyTo(state.layers.vendor.getLatLng(),15,{duration:.8});if(focus==='driver')state.map.flyTo(state.layers.driver.getLatLng(),15,{duration:.8});if(focus==='circle')state.map.flyTo(state.layers.circle.getBounds().getCenter(),14,{duration:.8});setTimeout(()=>{speak('Welcome to your live map. Tap any line, tile, circle, triangle, or polygon to work inside the world.',false);tryVoiceStart()},280);saveFeedback('enter_map',{focus})}
  function backToEarth(){state.mode='earth';els.mapStage.classList.remove('active');els.orbitScene.classList.remove('hidden');els.modeHint.style.opacity='1';saveFeedback('back_to_earth')}
  function handleIntent(text){const t=text.toLowerCase();if(t.includes('type')||t.includes('keyboard')){showManualInput(true);speak('Manual input opened.',false);return}if(t.includes('map')||t.includes('earth')||t.includes('shop')||t.includes('driver')||t.includes('circle')){enterMap(t.includes('shop')?'vendor':t.includes('driver')?'driver':t.includes('circle')?'circle':'user');return}if(t.includes('dark')){if(state.mapReady){if(state.map.hasLayer(state.layers.baseLight))state.map.removeLayer(state.layers.baseLight);state.layers.baseDark.addTo(state.map);speak('Dark map on.',false)}return}if(t.includes('city')||t.includes('light')){if(state.mapReady){if(state.map.hasLayer(state.layers.baseDark))state.map.removeLayer(state.layers.baseDark);state.layers.baseLight.addTo(state.map);speak('City map on.',false)}return}speak(`I heard: ${text}`,false)}
  function boot(){setupStars();buildOrbitScene();requestLocation();setupVoice();speak('Welcome to Astranov. Tap Earth to enter your world. Voice is first. Hold anywhere to type only if needed.',true);els.earth.addEventListener('click',()=>enterMap('user'));els.backToEarth.addEventListener('click',backToEarth);els.manualSend.addEventListener('click',()=>{const v=els.manualInput.value.trim();if(!v)return;saveFeedback('manual_message',{text:v});handleIntent(v);els.manualInput.value=''});els.manualClose.addEventListener('click',()=>showManualInput(false));document.addEventListener('pointerdown',()=>{if(state.mode==='earth'||state.mode==='map')tryVoiceStart();clearTimeout(document._holdTimer);document._holdTimer=setTimeout(()=>showManualInput(true),700)},{passive:true});document.addEventListener('pointerup',()=>clearTimeout(document._holdTimer),{passive:true});document.addEventListener('pointercancel',()=>clearTimeout(document._holdTimer),{passive:true});document.addEventListener('visibilitychange',()=>{saveFeedback('visibility',{hidden:document.hidden});if(document.hidden&&'speechSynthesis'in window)speechSynthesis.cancel()});els.voicePulse.addEventListener('click',tryVoiceStart)}
  boot();
})();
</script>
