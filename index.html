<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
<meta name="theme-color" content="#030a24" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Astranov — Internet Operating System</title>
<script>
  window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
<script defer src="/_vercel/insights/script.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  /* =====================================================================
     ASTRANOV — Astranov Law v0.1
     Single-file Internet Operating System. Mobile-portrait first.
     Globe-first macro. Environment-first interaction. Voice-first input.
     Dormant module discipline. Truth before theater.
     ===================================================================== */

  :root {
    /* Palette — luminous, commercial, alive */
    --space-0: #02061c;
    --space-1: #05102f;
    --space-2: #0a1e4d;
    --deep:    #0f2a5e;
    --ocean:   #1550a6;
    --ocean-bright: #2a7cd8;
    --land:    #49d8ff;
    --land-bright: #9cf2ff;
    --atm:     #4fc5ff;
    --sun:     #ffd870;
    --warm:    #ff8a3d;
    --coral:   #ff5d87;
    --ok:      #42e8a6;
    --text:    #e9f3ff;
    --text-dim: #8fb2da;
    --line:    rgba(143,178,218,.28);

    --font-ui: 'Outfit', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    --font-dis: 'Fraunces', Georgia, serif;
    --font-mono: 'JetBrains Mono', ui-monospace, Menlo, monospace;

    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bot: env(safe-area-inset-bottom, 0px);

    --r-soft: 14px;
    --r-med: 20px;
    --r-big: 28px;

    --shadow-blue: 0 0 24px rgba(79,197,255,.45), 0 0 60px rgba(79,197,255,.22);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    height: 100%; width: 100%;
    background: radial-gradient(ellipse at 50% 30%, #081a4a 0%, #030a24 55%, #01030f 100%);
    color: var(--text);
    font-family: var(--font-ui);
    overflow: hidden;
    overscroll-behavior: none;
    touch-action: manipulation;
    -webkit-font-smoothing: antialiased;
    user-select: none;
  }
  body { position: fixed; inset: 0; }

  /* ============ LAYERS ============ */
  .layer {
    position: absolute; inset: 0;
    pointer-events: none;
  }
  .layer.interactive { pointer-events: auto; }

  #stars, #globe {
    display: block;
    width: 100%; height: 100%;
    position: absolute; inset: 0;
  }
  #stars { z-index: 1; }
  #globe { z-index: 2; }

  .atmosphere {
    position: absolute;
    z-index: 3;
    pointer-events: none;
    border-radius: 50%;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    filter: blur(28px);
    opacity: .55;
    background: radial-gradient(circle,
      rgba(79,197,255,.75) 0%,
      rgba(79,197,255,.35) 40%,
      rgba(79,197,255,0)   70%);
    transition: opacity .6s ease;
  }

  #hotspots {
    z-index: 4;
    position: absolute; inset: 0;
    pointer-events: none;
  }
  .hot {
    position: absolute;
    width: 44px; height: 44px;
    transform: translate(-50%, -50%);
    pointer-events: auto;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform .25s ease;
  }
  .hot::before {
    content: "";
    position: absolute;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--land-bright);
    box-shadow:
      0 0 8px rgba(156,242,255,.9),
      0 0 22px rgba(79,197,255,.9),
      0 0 48px rgba(79,197,255,.55);
  }
  .hot::after {
    content: "";
    position: absolute;
    width: 10px; height: 10px;
    border-radius: 50%;
    border: 1.5px solid rgba(156,242,255,.85);
    animation: pulseRing 2.3s ease-out infinite;
  }
  .hot .hot-label {
    position: absolute;
    top: 26px; left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    letter-spacing: .08em;
    color: var(--land-bright);
    background: rgba(3,16,47,.7);
    padding: 3px 8px;
    border-radius: 10px;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity .2s ease;
    border: 1px solid rgba(79,197,255,.35);
    text-transform: uppercase;
    font-weight: 500;
  }
  .hot:hover .hot-label, .hot.touched .hot-label { opacity: 1; }
  .hot.home::before { background: var(--sun); box-shadow: 0 0 10px rgba(255,216,112,.9), 0 0 24px rgba(255,216,112,.6); }
  .hot.home::after  { border-color: rgba(255,216,112,.8); }
  .hot.home .hot-label { color: var(--sun); border-color: rgba(255,216,112,.45); }
  @keyframes pulseRing {
    0%   { transform: scale(.8);  opacity: 1; }
    80%  { transform: scale(3.6); opacity: 0; }
    100% { transform: scale(3.6); opacity: 0; }
  }

  /* ============ FIRST-RENDER BRAND MARK (tiny, honest) ============ */
  #brand {
    position: absolute;
    top: calc(var(--safe-top) + 18px);
    left: 0; right: 0;
    text-align: center;
    z-index: 8;
    pointer-events: none;
    font-family: var(--font-dis);
    font-weight: 500;
    font-size: 20px;
    letter-spacing: .3em;
    color: rgba(233,243,255,.86);
    text-shadow: 0 0 18px rgba(79,197,255,.7);
  }
  #brand .dot { color: var(--sun); text-shadow: 0 0 12px rgba(255,216,112,.9); }
  #brand .sub {
    display: block;
    font-family: var(--font-ui);
    font-size: 9.5px;
    letter-spacing: .32em;
    color: var(--text-dim);
    text-shadow: none;
    margin-top: 3px;
    font-weight: 400;
  }

  /* ============ GREETING / AI BUBBLE ============ */
  #greet {
    position: absolute;
    left: 50%;
    bottom: calc(var(--safe-bot) + 98px);
    transform: translateX(-50%);
    max-width: 82vw;
    z-index: 9;
    pointer-events: auto;
    background: linear-gradient(140deg, rgba(26,60,130,.85), rgba(10,30,77,.9));
    border: 1px solid rgba(79,197,255,.35);
    border-radius: 22px;
    padding: 14px 18px 14px 48px;
    color: var(--text);
    font-size: 14.5px;
    line-height: 1.45;
    box-shadow: 0 8px 40px rgba(3,12,40,.7), 0 0 24px rgba(79,197,255,.25);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    animation: rise .7s ease .4s backwards;
  }
  #greet .ai-dot {
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    width: 22px; height: 22px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, var(--land-bright), var(--ocean-bright) 60%, var(--ocean));
    box-shadow: 0 0 14px rgba(156,242,255,.9);
    animation: breathe 2.6s ease-in-out infinite;
  }
  #greet b { font-weight: 600; color: var(--land-bright); }
  @keyframes rise {
    from { transform: translateX(-50%) translateY(16px); opacity: 0; }
    to   { transform: translateX(-50%) translateY(0); opacity: 1; }
  }
  @keyframes breathe {
    0%,100% { transform: translateY(-50%) scale(1);  box-shadow: 0 0 10px rgba(156,242,255,.6); }
    50%     { transform: translateY(-50%) scale(1.12); box-shadow: 0 0 22px rgba(156,242,255,1); }
  }
  #greet.gone { opacity: 0; pointer-events: none; transition: opacity .5s ease; }

  /* ============ VOICE INDICATOR (contextual, tiny) ============ */
  #voice {
    position: absolute;
    right: 18px;
    bottom: calc(var(--safe-bot) + 22px);
    z-index: 10;
    width: 62px; height: 62px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, rgba(79,197,255,.3), rgba(3,16,47,.9));
    border: 1.5px solid rgba(79,197,255,.55);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    pointer-events: auto;
    box-shadow: 0 0 22px rgba(79,197,255,.35);
    transition: transform .2s ease, box-shadow .2s ease;
  }
  #voice:active { transform: scale(.94); }
  #voice.listen {
    box-shadow: 0 0 0 0 rgba(255,93,135,.6);
    animation: mic 1.6s ease-out infinite;
    border-color: var(--coral);
  }
  @keyframes mic {
    0%   { box-shadow: 0 0 0 0 rgba(255,93,135,.55); }
    100% { box-shadow: 0 0 0 22px rgba(255,93,135,0); }
  }
  #voice svg { width: 26px; height: 26px; }
  #voice .vstate {
    position: absolute;
    bottom: -16px;
    left: 50%; transform: translateX(-50%);
    font-size: 9.5px;
    letter-spacing: .18em;
    color: var(--text-dim);
    text-transform: uppercase;
    white-space: nowrap;
  }

  /* ============ BACK-TO-GLOBE (contextual, only on map) ============ */
  #backglobe {
    position: absolute;
    top: calc(var(--safe-top) + 12px);
    left: 14px;
    z-index: 11;
    width: 46px; height: 46px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, rgba(26,95,168,.9), rgba(5,16,47,.95));
    border: 1px solid rgba(79,197,255,.5);
    box-shadow: 0 0 18px rgba(79,197,255,.4);
    display: none;
    align-items: center; justify-content: center;
    cursor: pointer;
    pointer-events: auto;
  }
  #backglobe.show { display: flex; animation: rise .5s ease; }
  #backglobe svg { width: 26px; height: 26px; }

  /* ============ MAP LAYER ============ */
  #map {
    position: absolute; inset: 0;
    z-index: 5;
    opacity: 0;
    pointer-events: none;
    background: radial-gradient(ellipse at 50% 70%,
      #0e2a6a 0%, #061642 50%, #020928 100%);
    transition: opacity .7s ease;
  }
  #map.on {
    opacity: 1;
    pointer-events: auto;
  }
  #map-svg {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    display: block;
  }

  /* subtle grid under the map */
  .grid-bg {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(79,197,255,.07) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,197,255,.07) 1px, transparent 1px);
    background-size: 40px 40px;
    mask-image: radial-gradient(circle at 50% 55%, #000 40%, transparent 85%);
    -webkit-mask-image: radial-gradient(circle at 50% 55%, #000 40%, transparent 85%);
    pointer-events: none;
  }

  /* ============ CONTEXT PANEL (appears near objects) ============ */
  .ctx {
    position: absolute;
    z-index: 20;
    min-width: 210px;
    max-width: 78vw;
    background: linear-gradient(160deg, rgba(21,54,120,.96), rgba(8,22,62,.98));
    border: 1px solid rgba(79,197,255,.45);
    border-radius: 18px;
    padding: 14px 16px;
    color: var(--text);
    font-size: 13.5px;
    line-height: 1.4;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    box-shadow: 0 12px 40px rgba(0,0,0,.55), 0 0 28px rgba(79,197,255,.3);
    pointer-events: auto;
    animation: rise .35s ease;
    transform-origin: center top;
  }
  .ctx h4 {
    margin: 0 0 6px 0;
    font-family: var(--font-dis);
    font-weight: 600;
    font-size: 16px;
    color: var(--land-bright);
  }
  .ctx .muted { color: var(--text-dim); font-size: 11.5px; letter-spacing: .05em; }
  .ctx .row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px dashed rgba(143,178,218,.2);
  }
  .ctx .row:last-child { border-bottom: 0; }
  .ctx .price {
    font-family: var(--font-mono);
    color: var(--sun);
    font-weight: 500;
  }
  .ctx button, .ctx .chip {
    background: linear-gradient(180deg, rgba(79,197,255,.2), rgba(79,197,255,.05));
    border: 1px solid rgba(79,197,255,.55);
    color: var(--text);
    border-radius: 999px;
    padding: 7px 14px;
    font-size: 12px;
    font-family: var(--font-ui);
    letter-spacing: .05em;
    cursor: pointer;
    transition: transform .15s ease, background .15s ease;
  }
  .ctx button:active, .ctx .chip:active { transform: scale(.94); }
  .ctx button.go {
    background: linear-gradient(180deg, var(--ocean-bright), var(--ocean));
    border-color: var(--land);
    color: #fff;
    box-shadow: 0 0 18px rgba(79,197,255,.5);
  }
  .ctx button.warm {
    background: linear-gradient(180deg, var(--sun), var(--warm));
    color: #3a1e00;
    border-color: rgba(255,216,112,.8);
    font-weight: 600;
  }
  .ctx .x {
    position: absolute;
    top: 8px; right: 8px;
    width: 28px; height: 28px;
    border-radius: 50%;
    background: rgba(5,16,47,.7);
    border: 1px solid rgba(143,178,218,.35);
    color: var(--text-dim);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    cursor: pointer;
    padding: 0;
  }
  .ctx .prodlist { max-height: 40vh; overflow-y: auto; margin: 4px -4px 0 -4px; padding: 0 4px; }
  .ctx .prod {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 6px;
    border-radius: 10px;
  }
  .ctx .prod:active { background: rgba(79,197,255,.1); }
  .ctx .prod .pn { font-size: 13px; }
  .ctx .prod .pp { font-family: var(--font-mono); color: var(--sun); font-size: 12.5px; }
  .ctx .qty { display:flex; gap:8px; align-items:center; margin-top:8px; }
  .ctx .qty b { font-family: var(--font-mono); min-width: 20px; text-align:center; }

  /* ============ ROLE RADIAL ============ */
  .radial {
    position: absolute;
    z-index: 25;
    width: 180px; height: 180px;
    transform: translate(-50%, -50%);
    pointer-events: none;
    animation: rise .3s ease;
  }
  .radial .slot {
    position: absolute;
    width: 60px; height: 60px;
    border-radius: 50%;
    background: linear-gradient(160deg, rgba(21,54,120,.95), rgba(8,22,62,.98));
    border: 1px solid rgba(79,197,255,.5);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: var(--text);
    font-size: 10px;
    letter-spacing: .05em;
    pointer-events: auto;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(0,0,0,.5), 0 0 20px rgba(79,197,255,.25);
    transition: transform .15s ease, border-color .15s ease, box-shadow .15s ease;
  }
  .radial .slot.active {
    border-color: var(--sun);
    box-shadow: 0 0 18px rgba(255,216,112,.8);
    color: var(--sun);
  }
  .radial .slot svg { width: 22px; height: 22px; margin-bottom: 2px; }
  .radial .slot:active { transform: scale(.9); }

  /* ============ STATUS CHIP ON USER ============ */
  .roletag {
    position: absolute;
    top: -34px; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 4px;
    pointer-events: none;
  }
  .roletag span {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: .1em;
    padding: 3px 7px;
    border-radius: 999px;
    background: rgba(3,16,47,.7);
    border: 1px solid rgba(79,197,255,.45);
    color: var(--land-bright);
    text-transform: uppercase;
  }
  .roletag span.off { opacity: .25; }
  .roletag span.on-vendor { border-color: var(--sun); color: var(--sun); }
  .roletag span.on-driver { border-color: var(--ok); color: var(--ok); }

  /* ============ CORNER BADGE (system state) ============ */
  #corner {
    position: absolute;
    top: calc(var(--safe-top) + 12px);
    right: 12px;
    z-index: 12;
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(3,10,30,.55);
    border: 1px solid rgba(79,197,255,.35);
    border-radius: 999px;
    padding: 5px 11px 5px 8px;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: .08em;
    pointer-events: auto;
    cursor: pointer;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  #corner .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--ok);
    box-shadow: 0 0 8px var(--ok);
  }
  #corner b { color: var(--text); font-weight: 500; }

  /* ============ SYSTEM STATE PANEL ============ */
  #sys {
    position: absolute;
    z-index: 30;
    top: calc(var(--safe-top) + 50px);
    right: 10px;
    width: 280px; max-width: 90vw;
    background: linear-gradient(160deg, rgba(14,38,92,.96), rgba(5,16,47,.98));
    border: 1px solid rgba(79,197,255,.5);
    border-radius: 18px;
    padding: 14px 16px;
    color: var(--text);
    font-size: 12px;
    display: none;
    box-shadow: 0 16px 50px rgba(0,0,0,.6);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  #sys.on { display: block; animation: rise .3s ease; }
  #sys h5 {
    margin: 0 0 8px 0;
    font-family: var(--font-dis);
    font-weight: 600;
    font-size: 14px;
    color: var(--land-bright);
    letter-spacing: .03em;
  }
  #sys .kv {
    display: flex; justify-content: space-between;
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 3px 0;
    color: var(--text-dim);
  }
  #sys .kv b { color: var(--text); font-weight: 500; }
  #sys .mod {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 6px;
    margin: 2px 3px 2px 0;
    border: 1px solid rgba(143,178,218,.3);
  }
  #sys .mod.active { border-color: var(--ok); color: var(--ok); background: rgba(66,232,166,.1); }
  #sys .mod.dormant { opacity: .55; }
  #sys .tri {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid rgba(143,178,218,.2);
  }

  /* ============ TRANSCRIPT BUBBLE ============ */
  #trans {
    position: absolute;
    bottom: calc(var(--safe-bot) + 96px);
    right: 18px;
    max-width: 200px;
    z-index: 9;
    background: rgba(3,10,30,.85);
    border: 1px solid rgba(255,93,135,.45);
    color: var(--text);
    font-size: 12.5px;
    padding: 8px 12px;
    border-radius: 14px;
    display: none;
    box-shadow: 0 0 18px rgba(255,93,135,.3);
  }
  #trans.on { display: block; animation: rise .3s ease; }

  /* ============ MANUAL FALLBACK INPUT (hidden by default) ============ */
  #fallback {
    position: absolute;
    bottom: calc(var(--safe-bot) + 16px);
    left: 16px;
    right: 90px;
    z-index: 11;
    display: none;
  }
  #fallback.on { display: flex; animation: rise .3s ease; gap: 8px; }
  #fallback input {
    flex: 1;
    background: rgba(3,10,30,.85);
    border: 1px solid rgba(79,197,255,.5);
    color: var(--text);
    border-radius: 999px;
    padding: 12px 16px;
    font-size: 14px;
    font-family: var(--font-ui);
    outline: none;
  }
  #fallback button {
    background: linear-gradient(180deg, var(--ocean-bright), var(--ocean));
    border: 0;
    color: #fff;
    border-radius: 50%;
    width: 44px; height: 44px;
    cursor: pointer;
    font-size: 18px;
  }

  /* ============ ROUTE PRICE BUBBLES (on map geometry) ============ */
  .price-on-line {
    position: absolute;
    z-index: 15;
    background: linear-gradient(180deg, var(--sun), var(--warm));
    color: #351500;
    font-family: var(--font-mono);
    font-weight: 600;
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 999px;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 14px rgba(255,216,112,.7);
    pointer-events: auto;
    cursor: pointer;
    letter-spacing: .03em;
    animation: rise .4s ease;
  }
  .price-on-line small {
    display: block;
    font-family: var(--font-ui);
    font-weight: 400;
    font-size: 9px;
    opacity: .7;
    letter-spacing: .05em;
    margin-top: -2px;
  }

  /* ============ CIRCLE MINI CHAT ============ */
  .circle-chat {
    position: absolute;
    z-index: 22;
    width: 240px; max-width: 78vw;
    transform: translate(-50%, -50%);
    background: linear-gradient(160deg, rgba(14,38,92,.96), rgba(5,16,47,.98));
    border: 1px solid rgba(79,197,255,.45);
    border-radius: 22px;
    padding: 12px 14px;
    color: var(--text);
    font-size: 12.5px;
    box-shadow: 0 12px 40px rgba(0,0,0,.5), 0 0 24px rgba(79,197,255,.25);
    animation: rise .3s ease;
  }
  .circle-chat h5 {
    margin: 0 0 6px 0;
    font-family: var(--font-dis);
    font-size: 14px;
    color: var(--land-bright);
  }
  .circle-chat .msgs {
    max-height: 120px;
    overflow-y: auto;
    margin: 6px 0 8px 0;
    padding-right: 4px;
  }
  .circle-chat .msg {
    padding: 4px 0;
    font-size: 12px;
    line-height: 1.3;
  }
  .circle-chat .msg b { color: var(--land-bright); }
  .circle-chat .in {
    display: flex; gap: 6px;
  }
  .circle-chat input {
    flex: 1;

<script>
/* =====================================================================
   ASTRANOV KERNEL

   ===================================================================== */

(function(){
  'use strict';

  // ---------- 1. CONFIG ----------
  const CONFIG = Object.freeze({

  // ---------- 2. STATE ----------
  const STATE = {

  // ---------- 3. EVENT BUS ----------
  const BUS = (function(){
    const subs = {};

      on(evt, fn) {

        return () => {
          subs[evt] = (subs[evt] || []).filter(f => f !== fn);
        };
      },
      emit(evt, payload) {

  // ---------- 4. MODULE REGISTRY (dormant discipline) ----------
  const MODULES = {};
  function register(id, mod) {
    MODULES[id] = Object.assign({ id, _active: false }, mod);
    if (!mod.bootCritical) STATE.dormant.add(id);
  }
  function activate(id) {
    const m = MODULES[id];
    if (!m) return console.warn('[mod] unknown', id);
    if (m._active) return;
    m._active = true;
    STATE.dormant.delete(id);
    STATE.active.add(id);
    if (m.activate) try { m.activate(); } catch(e) { console.warn('[mod activate]', id, e); }
    BUS.emit('module:activated', { id });
    renderSys();
  }
  function deactivate(id) {
    const m = MODULES[id];
    if (!m || !m._active) return;
    m._active = false;
    STATE.active.delete(id);
    STATE.dormant.add(id);
    if (m.deactivate) try { m.deactivate(); } catch(e) { console.warn('[mod deactivate]', id, e); }
    BUS.emit('module:deactivated', { id });
    renderSys();
  }

  // ---------- 5. UTILITIES ----------
  const U = {
    $: (s) => document.querySelector(s),
    $$: (s) => [...document.querySelectorAll(s)],
    clamp: (v, a, b) => Math.max(a, Math.min(b, v)),
    lerp: (a, b, t) => a + (b - a) * t,
    // haversine distance in km
    km(lat1, lng1, lat2, lng2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI/180;
      const dLng = (lng2 - lng1) * Math.PI/180;
      const a = Math.sin(dLat/2)**2 +
                Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180) *
                Math.sin(dLng/2)**2;
      return 2 * R * Math.asin(Math.sqrt(a));
    },
    toast(msg, dur = 2000) {
      const t = U.$('#toast');
      t.textContent = msg;
      t.classList.add('on');
      clearTimeout(U._tt);
      U._tt = setTimeout(() => t.classList.remove('on'), dur);
    },
    hash(s) {
      let h = 0;
      for (let i = 0; i < s.length; i++) h = (h*31 + s.charCodeAt(i)) >>> 0;
      return h;
    },
    rand(seed) {
      let s = seed | 0 || 1;
      return () => {
        s = (s * 1664525 + 1013904223) >>> 0;
        return (s >>> 8) / (1 << 24);
      };
    }
  };

  // ---------- 6. ROUTING & PRICING MODULE ----------
  // Astranov delivery pricing law implementation.
  const PRICING = {
    computeDelivery(opts) {
      const { km, hour = new Date().getHours(), badWeather = false, loadKg = 0 } = opts;
      const p = CONFIG.pricing;
      const base = Math.max(1, Math.round(km * p.basePerKm * 10) / 10);
      const breakdown = [{ tag: 'base', label: `${km.toFixed(1)} km @ 1€/km`, value: base }];
      let extra = 0;
      const isNight = hour >= p.night.startHour || hour < p.night.endHour;
      if (isNight) { extra += p.night.fee; breakdown.push({ tag: 'night', label: 'Night hours', value: p.night.fee }); }
      if (badWeather) { extra += p.badWeatherFee; breakdown.push({ tag: 'weather', label: 'Bad weather', value: p.badWeatherFee }); }
      if (loadKg > p.loadBaseKg)  { extra += 1; breakdown.push({ tag: 'load+13', label: `Load > 13 kg/L`, value: 1 }); }
      if (loadKg > p.loadBaseKg + p.loadStepKg) {
        extra += 1; breakdown.push({ tag: 'load+26', label: `Load > 26 kg/L`, value: 1 });
      }
      const splitNeeded = loadKg > p.driverMaxKg;
      const driversRequired = splitNeeded ? Math.ceil(loadKg / p.driverMaxKg) : 1;

      let total = base + extra;
      // Apply dynamic balance multiplier (economic balancing law).
      const mult = STATE.balance.multiplier;
      total = Math.round(total * mult * 100) / 100;

      const platform = Math.round(total * p.platformShare * 100) / 100;
      const driverShare = Math.round((total - platform) * 100) / 100;

      return {
        km, base, extra, breakdown, total, platform, driverShare,
        coin: total, // 1€ = 1 Astran
        splitNeeded, driversRequired,
        balanceMultiplier: mult,
        isNight, badWeather, loadKg
      };
    },
    // Economic balancing: when drivers scarce, multiplier rises, incentivizing supply.
    rebalance() {
      const b = STATE.balance;
      const ratio = b.driversDemanded / Math.max(1, b.driversAvailable);
      let m = 1.0;
      if (ratio > 1) m = 1 + Math.min(0.6, (ratio - 1) * CONFIG.balancing.scarcityBoost * 2);
      else if (ratio < 0.7) m = 1 - CONFIG.balancing.abundanceRelief * (1 - ratio);
      b.multiplier = Math.round(m * 100) / 100;
      BUS.emit('balance:updated', b);
      renderSys();
    }
  };

  // ---------- 7. ADAPTER LAYER (truthful: connection-ready, not faked) ----------
  const ADAPTER = {
    // Vendor products via Google Sheets (connection-ready architecture)

  /* =====================================================================
     MODULE: stars (boot-critical: first-render law)
     ===================================================================== */
  register('stars', {
    bootCritical: true,
    canvas: null, ctx: null, pts: [], raf: 0,
    activate() {
      this.canvas = U.$('#stars');
      this.ctx = this.canvas.getContext('2d');
      this.resize();
      this.build();
      this.loop();
      window.addEventListener('resize', () => this.resize(), { passive: true });
    },
    resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      this.canvas.width = innerWidth * dpr;
      this.canvas.height = innerHeight * dpr;
      this.canvas.style.width = innerWidth + 'px';
      this.canvas.style.height = innerHeight + 'px';
      this.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      this.build();
    },
    build() {
      const rnd = U.rand(42);
      const n = CONFIG.globe.starsCount;
      this.pts = [];
      for (let i = 0; i < n; i++) {
        this.pts.push({
          x: rnd() * innerWidth,
          y: rnd() * innerHeight,
          r: rnd() * 1.3 + 0.2,
          a: rnd() * 0.6 + 0.3,
          t: rnd() * Math.PI * 2,
          s: rnd() * 0.02 + 0.005,
          hue: 200 + rnd() * 40,
        });
      }
    },
    loop() {
      const c = this.ctx;
      c.clearRect(0, 0, innerWidth, innerHeight);
      // subtle nebula haze
      const g = c.createRadialGradient(innerWidth*.5, innerHeight*.25, 30, innerWidth*.5, innerHeight*.25, Math.max(innerWidth, innerHeight)*.85);
      g.addColorStop(0, 'rgba(46,100,190,0.18)');
      g.addColorStop(.5, 'rgba(10,30,80,0.12)');
      g.addColorStop(1, 'rgba(0,0,0,0)');
      c.fillStyle = g;
      c.fillRect(0,0,innerWidth,innerHeight);
      for (const p of this.pts) {
        p.t += p.s;
        const a = p.a * (0.6 + 0.4 * Math.sin(p.t));
        c.beginPath();
        c.fillStyle = `hsla(${p.hue}, 85%, ${70 + Math.sin(p.t)*10}%, ${a})`;
        c.arc(p.x, p.y, p.r, 0, Math.PI*2);
        c.fill();
      }
      // a few brighter stars with cross-glint
      for (let i = 0; i < 8; i++) {
        const p = this.pts[i*11 % this.pts.length];
        const a = 0.7 + 0.3 * Math.sin(p.t*1.5);
        c.save();
        c.globalAlpha = a;
        c.strokeStyle = 'rgba(180,230,255,.6)';
        c.lineWidth = .7;
        c.beginPath();
        c.moveTo(p.x - 6, p.y); c.lineTo(p.x + 6, p.y);
        c.moveTo(p.x, p.y - 6); c.lineTo(p.x, p.y + 6);
        c.stroke();
        c.restore();
      }
      this.raf = requestAnimationFrame(() => this.loop());
    }
  });

  /* =====================================================================

     Rotating Earth with simplified real continent polygons.
     ===================================================================== */

  const CONTINENTS = {

    ca: [[-110,16],[-103,15],[-97,17],[-88,16],[-83,9],[-77,8],[-82,11],[-86,14],[-94,17],[-103,19],[-110,16]],

  // Cities = activity hotspots
  const CITIES = [
    { k: 'ath', name: 'Athens',    lat: 37.98, lng: 23.73, live: 128, home: true },
    { k: 'lon', name: 'London',    lat: 51.50, lng: -0.13, live: 542 },

  register('globe', {
    bootCritical: true,
    canvas: null, ctx: null, raf: 0, rot: 0, tilt: 0,
    cx: 0, cy: 0, R: 0, t0: 0,
    activate() {
      this.canvas = U.$('#globe');
      this.ctx = this.canvas.getContext('2d');
      this.tilt = CONFIG.globe.tiltDeg * Math.PI / 180;
      this.resize();

      setTimeout(() => { U.$('#ie').classList.add('gone'); }, 350);
      this.loop();
      window.addEventListener('resize', () => this.resize(), { passive: true });
    },
    deactivate() { cancelAnimationFrame(this.raf); },
    resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      this.canvas.width = innerWidth * dpr;
      this.canvas.height = innerHeight * dpr;
      this.canvas.style.width = innerWidth + 'px';
      this.canvas.style.height = innerHeight + 'px';
      this.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      this.cx = innerWidth / 2;
      this.cy = innerHeight / 2;
      this.R = Math.min(innerWidth, innerHeight) * 0.36;
      // Atmosphere size
      const atm = U.$('#atm');
      const s = this.R * 2.3;
      atm.style.width = s + 'px';
      atm.style.height = s + 'px';
    },
    // Orthographic projection with tilt.
    project(lon, lat) {
      const latR = lat * Math.PI/180;
      const lonR = (lon - this.rot) * Math.PI/180;
      // 3D on unit sphere
      let x = Math.cos(latR) * Math.sin(lonR);
      let y = Math.sin(latR);
      let z = Math.cos(latR) * Math.cos(lonR);
      // Apply tilt around X-axis
      const ct = Math.cos(this.tilt), st = Math.sin(this.tilt);
      const y2 = y * ct - z * st;
      const z2 = y * st + z * ct;
      y = y2; z = z2;
      if (z < 0) {
        // Back-facing: snap to horizon so polygons don't swim across
        const len = Math.sqrt(x*x + y*y) || 1;
        return { x: this.cx + (x/len) * this.R, y: this.cy - (y/len) * this.R, z, back: true };
      }
      return { x: this.cx + x * this.R, y: this.cy - y * this.R, z, back: false };
    },
    drawContinent(poly, fill) {
      const c = this.ctx;
      // Compute centroid visibility
      let czSum = 0;
      for (const [lon, lat] of poly) {
        const p = this.project(lon, lat);
        czSum += p.z;
      }
      if (czSum < 0) return; // too far back
      c.beginPath();
      let moved = false;
      for (let i = 0; i < poly.length; i++) {
        const [lon, lat] = poly[i];
        const p = this.project(lon, lat);
        if (!moved) { c.moveTo(p.x, p.y); moved = true; }
        else c.lineTo(p.x, p.y);
      }
      c.closePath();
      c.fillStyle = fill;
      c.fill();
      c.strokeStyle = 'rgba(156,242,255,0.55)';
      c.lineWidth = 0.7;
      c.stroke();
    },
    loop() {
      const now = performance.now();
      const dt = (now - this.t0) / 1000;
      this.t0 = now;
      this.rot += CONFIG.globe.spinDegPerSec * dt;
      if (this.rot > 360) this.rot -= 360;
      this.draw();
      this.raf = requestAnimationFrame(() => this.loop());
    },
    draw() {
      const c = this.ctx;
      c.clearRect(0, 0, innerWidth, innerHeight);

      // Ocean sphere with spherical shading
      c.save();
      c.beginPath();
      c.arc(this.cx, this.cy, this.R, 0, Math.PI*2);
      c.clip();

      // Base ocean gradient (sun from upper-left)
      const sx = this.cx - this.R * 0.35;
      const sy = this.cy - this.R * 0.45;
      const oc = c.createRadialGradient(sx, sy, this.R * 0.12, this.cx, this.cy, this.R * 1.2);
      oc.addColorStop(0,   '#3fa8ff');
      oc.addColorStop(0.4, '#1550a6');
      oc.addColorStop(0.8, '#0a2757');
      oc.addColorStop(1,   '#041126');
      c.fillStyle = oc;
      c.fillRect(this.cx - this.R, this.cy - this.R, this.R*2, this.R*2);

      // Latitude grid (soft)
      c.strokeStyle = 'rgba(156,242,255,0.08)';
      c.lineWidth = 0.5;
      for (let lat = -60; lat <= 60; lat += 20) {
        c.beginPath();
        let first = true;
        for (let lon = -180; lon <= 180; lon += 6) {
          const p = this.project(lon, lat);
          if (p.back) continue;
          if (first) { c.moveTo(p.x, p.y); first = false; }
          else c.lineTo(p.x, p.y);
        }
        c.stroke();
      }

      // Continents
      for (const key in CONTINENTS) {
        this.drawContinent(CONTINENTS[key], 'rgba(73,216,255,0.85)');
      }

      // Terminator shadow (soft night overlay on right-ish side)
      const tgrad = c.createLinearGradient(
        this.cx - this.R * 0.2, this.cy,
        this.cx + this.R, this.cy
      );
      tgrad.addColorStop(0, 'rgba(0,0,0,0)');
      tgrad.addColorStop(0.6, 'rgba(0,0,0,0.15)');
      tgrad.addColorStop(1, 'rgba(0,0,0,0.55)');
      c.fillStyle = tgrad;
      c.fillRect(this.cx - this.R, this.cy - this.R, this.R*2, this.R*2);

      // Edge fresnel
      const edge = c.createRadialGradient(this.cx, this.cy, this.R*0.85, this.cx, this.cy, this.R);
      edge.addColorStop(0, 'rgba(79,197,255,0)');
      edge.addColorStop(1, 'rgba(79,197,255,0.4)');
      c.fillStyle = edge;
      c.fillRect(this.cx - this.R, this.cy - this.R, this.R*2, this.R*2);

      c.restore();

      // Hotspot layer: DOM elements driven by projection
      this.syncHotspots();
    },
    syncHotspots() {
      const holder = U.$('#hotspots');
      if (!holder._built) {
        CITIES.forEach(city => {
          const el = document.createElement('div');
          el.className = 'hot' + (city.home ? ' home' : '');
          el.innerHTML = `<span class="hot-label">${city.name} · <b>${city.live}</b></span>`;
          el.addEventListener('click', () => MODULES.navigator.zoomIntoCity(city));
          el.addEventListener('touchstart', () => el.classList.add('touched'), { passive: true });
          el.addEventListener('touchend', () => setTimeout(() => el.classList.remove('touched'), 1400), { passive: true });
          holder.appendChild(el);
          city._el = el;
        });
        holder._built = true;
      }
      for (const city of CITIES) {
        const p = this.project(city.lng, city.lat);
        if (p.back) {
          city._el.style.display = 'none';
        } else {
          city._el.style.display = 'flex';
          city._el.style.left = p.x + 'px';
          city._el.style.top = p.y + 'px';
          // z-based dimming
          const depth = 0.35 + 0.65 * p.z;
          city._el.style.opacity = depth;
        }
      }
    }
  });

  /* =====================================================================
     MODULE: drivers — moves driver icons along their paths.
     Dormant unless in map view.
     ===================================================================== */
  register('drivers', {
    raf: 0, last: 0, _on: false,
    start() {
      if (this._on) return;
      this._on = true;
      this.last = performance.now();
      this.tick();
    },
    stop() { this._on = false; cancelAnimationFrame(this.raf); },
    deactivate() { this.stop(); },
    tick() {
      if (!this._on || STATE.view !== 'map') return;
      const now = performance.now();
      const dt = Math.min(.05, (now - this.last) / 1000);
      this.last = now;
      for (const d of STATE.drivers) {
        const path = d.path;
        const target = path[d.pi + d.dir];
        if (!target) { d.dir *= -1; continue; }
        const dx = target[0] - d.x, dy = target[1] - d.y;
        const dist = Math.hypot(dx, dy);
        const speed = d.available ? 7 : 2; // units/sec
        const step = speed * dt;
        if (dist < step) { d.x = target[0]; d.y = target[1]; d.pi += d.dir; if (d.pi >= path.length - 1 || d.pi <= 0) d.dir *= -1; }
        else { d.x += dx/dist * step; d.y += dy/dist * step; }
        if (d._body) { d._body.setAttribute('cx', d.x); d._body.setAttribute('cy', d.y); }
        if (d._glow) { d._glow.setAttribute('cx', d.x); d._glow.setAttribute('cy', d.y); }
        if (d._nm)   { d._nm.setAttribute('x', d.x);   d._nm.setAttribute('y', d.y - 3.5); }
      }
      // also nudge any active order geometry
      MODULES.orders && MODULES.orders.redrawGeometries && MODULES.orders.redrawGeometries();
      this.raf = requestAnimationFrame(() => this.tick());
    }
  });

  /* =====================================================================
     MODULE: marketplace — cart, orders, vendor logic.
     ===================================================================== */
  register('marketplace', {
    cart: {},  // shopId -> { products: [{...p, qty}], shop }
    addToCart(shop, prod) {
      const bucket = this.cart[shop.id] = this.cart[shop.id] || { shop, items: [] };
      const existing = bucket.items.find(i => i.n === prod.n);
      if (existing) existing.qty += 1;
      else bucket.items.push({ ...prod, qty: 1 });
      MODULES.ui.refreshShopPanel(shop);
      MODULES.orders.ensureQuote(shop);
      U.toast(`+ ${prod.n}`);
    },
    removeFromCart(shop, prod) {
      const bucket = this.cart[shop.id];
      if (!bucket) return;
      const it = bucket.items.find(i => i.n === prod.n);
      if (!it) return;
      it.qty -= 1;
      if (it.qty <= 0) bucket.items = bucket.items.filter(i => i.n !== prod.n);
      if (!bucket.items.length) delete this.cart[shop.id];
      MODULES.ui.refreshShopPanel(shop);
      MODULES.orders.ensureQuote(shop);
    },
    cartFor(shop) { return this.cart[shop.id] && this.cart[shop.id].items || []; },
    async importSheet(shop, url) {
      const res = await ADAPTER.loadVendorSheet(url);
      if (!res.ready) {
        U.toast('Sheet import is connection-ready');
      }
    }
  });

  /* =====================================================================
     MODULE: orders — geometry-on-map (line, triangle) for active orders.
     ===================================================================== */
  register('orders', {
    active: {},   // shopId -> { quote, driver, pin (delivery pt), svgNodes }
    ensureQuote(shop) {
      const items = MODULES.marketplace.cartFor(shop);
      if (!items.length) { this.clear(shop); return; }
      const loadKg = items.reduce((a, it) => a + it.kg * it.qty, 0);
      const goodsEur = items.reduce((a, it) => a + it.eur * it.qty, 0);
      // Convert map distance to km heuristically: 1 map unit = .08 km (city scale)
      const dx = shop.x - 50, dy = shop.y - 50;
      const mapDist = Math.hypot(dx, dy);
      const km = Math.max(.5, mapDist * 0.08);
      const quote = PRICING.computeDelivery({
        km, loadKg,
        badWeather: STATE.weather === 'bad'
      });
      const order = this.active[shop.id] = this.active[shop.id] || { shop };
      order.quote = quote;
      order.goodsEur = Math.round(goodsEur * 100)/100;
      order.loadKg = loadKg;
      this.drawGeometry(order);
    },
    assignDriver(shop) {
      const order = this.active[shop.id];
      if (!order) return;
      const available = STATE.drivers.filter(d => d.available);
      if (!available.length) { U.toast('No drivers nearby'); return; }
      const near = available.map(d => ({
        d, dist: Math.hypot(d.x - shop.x, d.y - shop.y)
      })).sort((a,b) => a.dist - b.dist);
      order.driver = near[0].d;
      STATE.balance.driversDemanded = Object.keys(this.active).filter(k=>this.active[k].driver).length;
      STATE.balance.driversAvailable = STATE.drivers.filter(d=>d.available && !Object.values(this.active).some(o=>o.driver===d)).length;
      PRICING.rebalance();
      this.drawGeometry(order);
      U.toast(`${order.driver.name} accepted the route`);
      MODULES.voice.speak(`Driver ${order.driver.name} accepted. Total ${order.quote.total} euro.`);
    },
    checkout(shop) {
      const order = this.active[shop.id];
      if (!order) return;
      const total = order.goodsEur + order.quote.total;
      const platform = Math.round(total * CONFIG.pricing.platformShare * 100)/100;
      if (STATE.wallet.eur < total) { U.toast('Wallet too light — topup needed'); return; }
      STATE.wallet.eur = Math.round((STATE.wallet.eur - total) * 100)/100;
      STATE.wallet.astran = Math.round((STATE.wallet.astran + order.quote.coin) * 100)/100;
      STATE.orders.push({
        shop: shop.id, total, platform, driver: order.driver && order.driver.id,
        at: Date.now()
      });
      // Adapter call (connection-ready)
      ADAPTER.splitPayment({ total, platform, vendor: shop.id, driver: order.driver && order.driver.id });
      U.toast(`Paid ${total.toFixed(2)}€ · Earned ${order.quote.coin.toFixed(1)} Ⱥ`);
      MODULES.voice.speak(`Order placed. Platform kept ${platform.toFixed(2)} euro, driver earns ${order.quote.driverShare.toFixed(2)} euro.`);
      // Complete: clear cart + geometry
      delete MODULES.marketplace.cart[shop.id];
      this.clear(shop);
      MODULES.ui.closeContext();
      renderCorner();
    },
    clear(shop) {
      const o = this.active[shop.id];
      if (!o) return;
      if (o._line) o._line.remove();
      if (o._t) { o._t.forEach(n => n.remove()); }
      if (o._priceEl) o._priceEl.remove();
      delete this.active[shop.id];
    },
    drawGeometry(order) {
      const svg = MODULES.map.svg;
      if (!svg) return;
      // Clear old
      if (order._line) order._line.remove();
      if (order._t) order._t.forEach(n => n.remove());
      if (order._priceEl) order._priceEl.remove();
      const user = { x: 50, y: 50 };
      const shop = order.shop;
      if (!order.driver) {
        // Straight line user ↔ shop
        const line = MODULES.map.el('line', {
          x1: user.x, y1: user.y, x2: shop.x, y2: shop.y,
          stroke: 'url(#gradLine)', 'stroke-width': .45,
          'stroke-dasharray': '1 1', 'stroke-linecap': 'round'
        });
        // ensure gradient defined
        this.ensureDefs(svg);
        svg.appendChild(line);
        order._line = line;
        // price on line
        const mx = (user.x + shop.x)/2, my = (user.y + shop.y)/2;
        this.placePriceOnLine(order, mx, my, 'Pending driver');
      } else {
        // Triangle: user ↔ shop ↔ driver ↔ user
        const drv = order.driver;
        const pts = `${user.x},${user.y} ${shop.x},${shop.y} ${drv.x},${drv.y}`;
        this.ensureDefs(svg);
        const tri = MODULES.map.el('polygon', {
          points: pts,
          fill: 'rgba(255,216,112,.08)',
          stroke: 'rgba(255,216,112,.85)',
          'stroke-width': .35,
          'stroke-linejoin': 'round'
        });
        svg.appendChild(tri);
        order._t = [tri];
        // price at centroid
        const cx = (user.x + shop.x + drv.x)/3;
        const cy = (user.y + shop.y + drv.y)/3;
        this.placePriceOnLine(order, cx, cy, order.quote.driver ? '' : '');
      }
    },
    ensureDefs(svg) {
      if (svg.querySelector('defs')) return;
      const d = MODULES.map.el('defs');
      d.innerHTML = `
        <linearGradient id="gradLine" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%"  stop-color="#9cf2ff"/>
          <stop offset="100%" stop-color="#ffd870"/>
        </linearGradient>`;
      svg.appendChild(d);
    },
    placePriceOnLine(order, svgX, svgY, sub) {
      const scr = MODULES.map.svgToScreen(svgX, svgY);
      let el = order._priceEl;
      if (!el) {
        el = document.createElement('div');
        el.className = 'price-on-line';
        el.addEventListener('click', (ev) => {
          ev.stopPropagation();
          MODULES.ui.openQuote(order);
        });
        document.body.appendChild(el);
        order._priceEl = el;
      }
      el.innerHTML = `${order.quote.total.toFixed(2)}€ · ${order.quote.coin.toFixed(1)} Ⱥ
                      <small>${order.driver ? 'via ' + order.driver.name : (sub || 'tap to assign driver')}</small>`;
      el.style.left = scr.x + 'px';
      el.style.top = scr.y + 'px';
    },
    redrawGeometries() {
      for (const id in this.active) {
        const o = this.active[id];
        this.drawGeometry(o);
      }
    }
  });

  /* =====================================================================
     MODULE: voice — Web Speech API, with synthesis + recognition.
     Manual fallback only on tap or when speech unavailable.
     ===================================================================== */
  register('voice', {
    bootCritical: true,
    rec: null, synth: null, _listening: false, _greeted: false,
    activate() {
      this.synth = window.speechSynthesis || null;
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (SR) {
        try {
          this.rec = new SR();
          this.rec.lang = CONFIG.voice.lang;
          this.rec.interimResults = false;
          this.rec.maxAlternatives = 1;
          this.rec.continuous = false;
          this.rec.onresult = (e) => this.onResult(e);
          this.rec.onerror = (e) => this.onError(e);
          this.rec.onend = () => this.stopListen();
        } catch (err) {
          console.warn('[voice] recognition init failed', err);
          this.rec = null;
        }
      }
      U.$('#voice').addEventListener('click', () => this.toggle());
      // First greeting — speak after a moment so TTS voices load.
      setTimeout(() => this.firstGreet(), 1200);
      // Ask permission softly: not with a modal, but by attempting mic on first user tap.
    },
    firstGreet() {
      if (this._greeted) return;
      this._greeted = true;
      this.speak('Welcome to Astranov. Earth is your surface. Tap any glowing city to enter.');
    },
    toggle() {
      if (this._listening) { this.stopListen(); return; }
      if (!this.rec) {
        // Manual fallback
        const fb = U.$('#fallback');
        fb.classList.add('on');
        U.$('#fallback-in').focus();
        U.$('#vstate').textContent = 'TYPE · NO MIC';
        U.$('#trans').classList.remove('on');
        return;
      }
      try {
        this.rec.start();
        this._listening = true;
        U.$('#voice').classList.add('listen');
        U.$('#vstate').textContent = 'LISTENING…';
      } catch (e) {
        console.warn('[voice] start error', e);
        U.$('#fallback').classList.add('on');
        U.$('#fallback-in').focus();
        U.$('#vstate').textContent = 'TYPE · FALLBACK';
      }
    },
    stopListen() {
      this._listening = false;
      U.$('#voice').classList.remove('listen');
      U.$('#vstate').textContent = 'TAP TO SPEAK';
    },
    onResult(ev) {
      const r = ev.results[0][0].transcript;
      STATE.voice.transcript = r;
      const tr = U.$('#trans');
      tr.classList.add('on');
      tr.textContent = '�� ' + r;
      setTimeout(() => tr.classList.remove('on'), 4500);
      this.route(r);
    },
    onError(ev) {
      console.warn('[voice] error', ev.error);
      this.stopListen();
      if (ev.error === 'not-allowed' || ev.error === 'service-not-allowed') {
        U.toast('Mic blocked — manual fallback available');
        U.$('#fallback').classList.add('on');
      }
    },
    route(text) {
      MODULES.ai.handle(text);
    },
    speak(text) {
      if (!this.synth) return;
      try {
        const u = new SpeechSynthesisUtterance(text);
        u.lang = CONFIG.voice.lang;
        u.rate = CONFIG.voice.synthRate;
        u.pitch = CONFIG.voice.synthPitch;
        // prefer a softer voice if available
        const voices = this.synth.getVoices();
        const pref = voices.find(v => /en.*(?:Google|Samantha|Joanna|Serena|Allison)/i.test(v.name + ' ' + v.lang))
                  || voices.find(v => v.lang && v.lang.startsWith('en'));
        if (pref) u.voice = pref;
        this.synth.cancel();
        this.synth.speak(u);
      } catch (e) { console.warn('[voice] synth', e); }
    }
  });

  /* =====================================================================
     MODULE: ai — lightweight intent router (connection-ready to an LLM)
     Interprets voice/text and drives the app. For internet-connected
     research, calls ADAPTER.research (which is connection-ready).
     ===================================================================== */
  register('ai', {
    bootCritical: true,
    signalBuckets: {},
    activate() {
      U.$('#fallback-go').addEventListener('click', () => this.submitFallback());
      U.$('#fallback-in').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') this.submitFallback();
      });
    },
    submitFallback() {
      const v = U.$('#fallback-in');
      const t = v.value.trim();
      if (!t) return;
      v.value = '';
      U.$('#fallback').classList.remove('on');
      this.handle(t);
    },
    track(kind) {
      // Triangle loop: user signals.
      this.signalBuckets[kind] = (this.signalBuckets[kind] || 0) + 1;
      STATE.triangle.signalCount++;
      if (this.signalBuckets[kind] >= 3) {
        // Repeated signal, compatible with foundations -> draft refinement
        const already = STATE.triangle.signals.find(s => s.kind === kind);
        if (!already) {
          STATE.triangle.signals.push({ kind, count: this.signalBuckets[kind], at: Date.now() });
          STATE.triangle.implementationCycle += 1;
          U.toast(`Signal "${kind}" reached 3× · law refinement drafted`);
        }
      }
      renderSys();
    },
    async handle(text) {
      const t = text.toLowerCase().trim();
      MODULES.voice.stopListen();
      // Router
      if (/^(hi|hello|hey|yo|γεια|hola)\b/.test(t)) {
        MODULES.voice.speak('Hello. I am Astranov. Say a city to enter it, or tap Earth.');
        return;
      }
      if (/(back|home|zoom out|globe|earth)/.test(t)) {
        if (STATE.view === 'map') MODULES.navigator.zoomOut();
        return;
      }
      // City entry
      for (const c of CITIES) {
        if (t.includes(c.name.toLowerCase())) {
          MODULES.navigator.zoomIntoCity(c);
          return;
        }
      }
      // Roles
      if (/(become|be|enable|start).*vendor/.test(t)) { STATE.user.roles.vendor = true; renderRoleTag(); renderSys(); MODULES.voice.speak('Vendor mode on.'); return; }
      if (/(stop|disable|off).*vendor/.test(t)) { STATE.user.roles.vendor = false; renderRoleTag(); renderSys(); MODULES.voice.speak('Vendor mode off.'); return; }
      if (/(become|be|enable|start).*driver/.test(t)) { STATE.user.roles.driver = true; renderRoleTag(); renderSys(); MODULES.voice.speak('Driver mode on.'); return; }
      if (/(stop|disable|off).*driver/.test(t)) { STATE.user.roles.driver = false; renderRoleTag(); renderSys(); MODULES.voice.speak('Driver mode off.'); return; }
      // Shops
      if (STATE.view === 'map' && /(find|show|open).*(shop|store|bakery|grocer|taverna|food|pharmacy)/.test(t)) {
        const shop = STATE.shops[0];
        if (shop) { MODULES.ui.openShop(shop); return; }
      }
      // Price query
      if (/(price|cost|charge|delivery)/.test(t) && STATE.view === 'map') {
        const any = Object.values(MODULES.orders.active)[0];
        if (any) {
          MODULES.voice.speak(`Your delivery is ${any.quote.total.toFixed(2)} euro, or ${any.quote.coin.toFixed(1)} Astran coins.`);
          return;
        }
      }
      // Research (connection-ready)
      if (/^(search|research|tell me about|what is|who is|explain)/.test(t)) {
        MODULES.voice.speak('Researching. This path is connection-ready in this build.');
        await ADAPTER.research(t);
        this.track('research-query');
        return;
      }
      // Weather toggle (for demo of bad-weather surcharge)
      if (/(set weather bad|bad weather)/.test(t)) {
        STATE.weather = 'bad';
        MODULES.voice.speak('Bad weather logged. Delivery prices will adjust.');
        Object.values(MODULES.orders.active).forEach(o => MODULES.orders.ensureQuote(o.shop));
        return;
      }
      if (/(weather good|clear weather)/.test(t)) {
        STATE.weather = 'clear';
        Object.values(MODULES.orders.active).forEach(o => MODULES.orders.ensureQuote(o.shop));
        return;
      }
      // Signal tracking: unknown queries become signals
      this.track('unknown:' + t.slice(0, 40));
      MODULES.voice.speak('I heard you. I haven\'t learned that yet — it\'s now a signal for the next cycle.');
    }
  });

        div.style.left = (90 + Math.cos(a)*60 - 30) + 'px';
        div.style.top  = (90 + Math.sin(a)*60 - 30) + 'px';
        div.innerHTML = `${s.icon}<span>${s.label}</span>`;
        div.addEventListener('click', (e) => {
          e.stopPropagation();
          STATE.user.roles[s.k] = !STATE.user.roles[s.k];
          renderRoleTag();
          renderSys();
          div.classList.toggle('active', STATE.user.roles[s.k]);
          MODULES.voice.speak(`${s.k} ${STATE.user.roles[s.k] ? 'on' : 'off'}`);
          MODULES.ai.track('role-toggle-' + s.k);
        });
        r.appendChild(div);
      });
      document.body.appendChild(r);
      this._radial = r;
    },
    openCircle(ci) {
      this.closeContext();
      // Position near the circle center
      const scr = MODULES.map.svgToScreen(ci.cx, ci.cy);
      const c = document.createElement('div');
      c.className = 'circle-chat';
      c.style.left = scr.x + 'px';
      c.style.top  = scr.y + 'px';
      c.dataset.circle = ci.k;
      this._renderCircleChat(ci, c);
      document.body.appendChild(c);
      this._chat = c;
    },
    _renderCircleChat(ci, c) {
      c.innerHTML = `
        <button class="x" style="position:absolute;top:6px;right:8px;background:transparent;border:0;color:var(--text-dim);font-size:14px;cursor:pointer">×</button>
        <h5>${ci.name}</h5>
        <div class="muted" style="font-size:11px">${ci.members} members · social circle</div>
        <div class="msgs">${ci.msgs.map(m => `<div class="msg"><b>${m.u}:</b> ${m.m}</div>`).join('')}</div>
        <div class="in">
          <input placeholder="say something…" />
          <button>↑</button>
        </div>
      `;
      c.querySelector('.x').addEventListener('click', () => this.closeContext());
      const inp = c.querySelector('input');
      const send = () => {
        const v = inp.value.trim();
        if (!v) return;
        inp.value = '';
        MODULES.circles.postMessage(ci, v);
      };
      c.querySelector('button').addEventListener('click', send);
      inp.addEventListener('keydown', (e) => { if (e.key === 'Enter') send(); });
    },
    refreshCircleChat(ci) {
      if (this._chat && this._chat.dataset.circle === ci.k) this._renderCircleChat(ci, this._chat);
    }
  });

  /* =====================================================================
     RENDER HELPERS
     ===================================================================== */
  function renderCorner() {
    U.$('#corner-view').textContent = STATE.view;
    const liveTotal = CITIES.reduce((a,c) => a + c.live, STATE.livePeople);
    U.$('#corner-live').textContent = liveTotal.toLocaleString();
  }
  function renderRoleTag() {
    // Role tag sits above user icon on map
    const svg = MODULES.map.svg;
    if (!svg) return;
    let existing = svg.querySelector('#roletag-g');
    if (existing) existing.remove();
    const g = MODULES.map.el('g', { id: 'roletag-g' });
    const roles = ['client','vendor','driver'];
    const active = roles.filter(r => STATE.user.roles[r]);
    active.forEach((r, i) => {
      const x = 50 - (active.length - 1) * 3 + i * 6;
      const color = r === 'client' ? '#9cf2ff' : r === 'vendor' ? '#ffd870' : '#42e8a6';
      const rect = MODULES.map.el('rect', {
        x: x - 2.3, y: 43.5, width: 4.6, height: 1.8, rx: .9,
        fill: 'rgba(3,16,47,.8)', stroke: color, 'stroke-width': .15
      });
      const txt = MODULES.map.el('text', {
        x, y: 44.8, 'text-anchor':'middle',
        fill: color, 'font-size': 1.2,
        'font-family':'Outfit','font-weight':600,
        'letter-spacing':'.1'
      });
      txt.textContent = r.toUpperCase();
      g.appendChild(rect); g.appendChild(txt);
    });
    svg.appendChild(g);
    renderSys();
  }
  function renderSys() {
    U.$('#sv').textContent = CONFIG.version;
    U.$('#sview').textContent = STATE.view;
    U.$('#swallet').textContent = `${STATE.wallet.eur.toFixed(2)} € · ${STATE.wallet.astran.toFixed(1)} Ⱥ`;
    const roles = Object.keys(STATE.user.roles).filter(k => STATE.user.roles[k]);
    U.$('#sroles').textContent = roles.length ? roles.join(', ') : 'none';
    const mod = U.$('#smod');
    if (mod) {
      mod.innerHTML = Object.keys(MODULES).map(id => {
        const on = MODULES[id]._active;
        return `<span class="mod ${on ? 'active' : 'dormant'}">${id}${on ? '' : '·'}</span>`;
      }).join('');
    }
    U.$('#stri1').textContent = 'v' + STATE.triangle.lawVersion;
    U.$('#stri2').textContent = 'cycle ' + STATE.triangle.implementationCycle;
    U.$('#stri3').textContent = STATE.triangle.signalCount;
  }

  /* =====================================================================
     BOOT KERNEL
     ===================================================================== */
  function boot() {
    console.info('%cASTRANOV' + '%c · Internet OS · Astranov Law ' + CONFIG.lawVersion,
      'font-weight:700;color:#9cf2ff;text-shadow:0 0 8px #4fc5ff',
      'color:#8fb2da');

    // Show greeting
    U.$('#greet').hidden = false;

    // Boot-critical modules in strict order
    activate('stars');
    activate('globe');
    activate('navigator');
    activate('voice');
    activate('ai');
    activate('ui');

    renderCorner();
    renderSys();

    // Expose a careful surface for AI autonomy (scoped, versioned, auditable)
    window.ASTRANOV = Object.freeze({
      version: CONFIG.version,
      law: CONFIG.lawVersion,
      // read-only view
      snapshot: () => JSON.parse(JSON.stringify({
        view: STATE.view, user: STATE.user, wallet: STATE.wallet,
        orders: STATE.orders, triangle: STATE.triangle,
        balance: STATE.balance, dormant: [...STATE.dormant], active: [...STATE.active]
      })),
      // bounded commands
      say: (text) => MODULES.ai.handle(text),
      pricing: PRICING,
      bus: { on: BUS.on },    // subscribe only
      adapter: ADAPTER,
    });
  }

  // Boot when DOM ready
  if (document.readyState === 'complete' || document.readyState === 'interactive') {
    requestAnimationFrame(boot);
  } else {
    document.addEventListener('DOMContentLoaded', boot);
  }
})();
</script>
</body>
</html>
