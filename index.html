/*
ASTRANOV · MYRMIDON FRONT-END CORE
One HTML file is the front-end shell and law carrier, not the full business/backend.
Official altitude spine: GLOBAL → NATIONAL → PERSONAL.
GLOBAL: full unclipped Earth, real 24-hour drift, controlled trackball drag, round country beacons only.
SPACE: visible only when zooming out from Global; celestial bodies are named fixed corner anchors inside the viewport, never fake planets revolving around Earth.
NATIONAL: real Leaflet country map centered on the selected country. No fake boundary circles. No menus masquerading as geography.
PERSONAL: city/user map. Shops, menus, drivers, friends, circles, video posts, route lines, transaction triangles.
ZERO UI: only ASTRANOV title and a small voice orb are persistent. Controls appear from intent.
VENDOR MENU: product menu contains the checkout ribbon at the top. It wraps. It never truncates. Product quantity can be typed.
DELIVERY LAW: delivery charge is transparent and paid by the client directly to the driver(s) for now. €3 fixed for the first 3km, then €1/km after 3km, plus €1 per 13 kg/L band above 13 kg/L. One driver is required for every 13 kg/L or part thereof. Basket first requests driver assignment; payment happens only after driver acceptance.
TIMING LAW: every order carries preparation time, pickup time, and arrival time. Vendor, driver, and client may adjust and confirm these times in the shared transaction office.
TRANSACTION ICONS: active orders appear as small round transaction circles in a spiral around the vendor on the city map. Tapping a circle opens the shared transaction office with time controls and instant messaging for client/vendor/driver.
ACCOUNTING OFFICE: confirmed orders create transparent ledger entries/invoices for goods, client-to-driver delivery payout, and platform fee.
*/

function renderVendor(){renderRibbon();const list=$('productList');list.innerHTML='';state.vendor.items.forEach(it=>{const qty=+(state.cart[it.id]||0);const row=document.createElement('div');row.className='productRow';row.innerHTML='<div class="productInfo"><img class="productPhoto" src="'+esc(it.photo)+'" alt=""><div class="productText"><div class="productName">'+esc(it.name)+'</div><div class="productMeta">'+esc(it.desc)+' · '+it.kg+' kg/L</div><div class="productPrice">'+money(it.price)+'</div></div></div><div class="qtyCtl">'+(state.vendorAccount?'<button class="editProduct" data-edit="'+it.id+'" type="button">✎</button>':'')+'<button class="qtyBtn" data-dec="'+it.id+'" type="button">−</button><input class="qtyInput" data-qty="'+it.id+'" type="number" min="0" step="1" value="'+qty+'"><button class="qtyBtn" data-inc="'+it.id+'" type="button">+</button></div>';list.appendChild(row);});list.querySelectorAll('[data-inc]').forEach(b=>b.onclick=()=>setQty(b.dataset.inc,+(state.cart[b.dataset.inc]||0)+1));list.querySelectorAll('[data-dec]').forEach(b=>b.onclick=()=>setQty(b.dataset.dec,Math.max(0,+(state.cart[b.dataset.dec]||0)-1)));list.querySelectorAll('[data-qty]').forEach(i=>i.onchange=()=>setQty(i.dataset.qty,Math.max(0,Math.floor(+i.value||0))));list.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>editProduct(b.dataset.edit));}
function setQty(id,qty){state.cart[id]=qty;if(qty<=0)delete state.cart[id];state.orderState='basket';renderVendor();}
function renderRibbon(){const c=calcOrder();const t=times();const hasItems=c.count>0;let action='↓ ADD ITEMS',disabled=true,need=' needItems';if(hasItems&&state.orderState==='basket'){action=c.mode==='pickup'?'SELF PICKUP':'REQUEST '+driverNeedText(c.requiredDrivers).toUpperCase();disabled=false;need='';}if(state.orderState==='offered'){action='WAITING '+driverNeedText(c.requiredDrivers).toUpperCase();disabled=true;need='';}if(state.orderState==='accepted'){action='CONFIRM & PAY';disabled=false;need='';}if(state.orderState==='paid'){action='ROUTE LIVE';disabled=true;need='';}const driverCell=c.mode==='choose'?'<div class="ribCell wide"><div class="ribLabel">Lead driver</div><select id="driverChoice">'+state.drivers.map(d=>'<option value="'+d.id+'" '+(state.driver&&state.driver.id===d.id?'selected':'')+'>'+d.emoji+' '+d.name+'</option>').join('')+'</select></div>':'';const loadNote=c.parts.loadExtra?'<small> +'+money(c.parts.loadExtra)+' load</small>':'';const driverWarn=(hasItems&&c.mode!=='pickup'&&c.requiredDrivers>1)?'<small class="driverNotice">'+c.requiredDrivers+' drivers required</small>':'';const edit=state.vendorAccount?'<div class="ribCell"><div class="ribLabel">Vendor</div><button class="ribAction" id="vendorEditHelp" type="button">EDIT</button></div>':'';$('checkoutRibbon').innerHTML='<div class="ribCell wide"><div class="ribLabel">From</div><div class="ribVal">'+state.vendor.emoji+' '+esc(state.vendor.name)+'</div></div><div class="ribCell wide"><div class="ribLabel">To</div><select id="destChoice"><option value="user">📍 My location</option><option value="other">⌖ Other address</option></select></div><div class="ribCell"><div class="ribLabel">Km</div><div class="ribVal">'+c.dist.toFixed(1)+'</div></div><div class="ribCell"><div class="ribLabel">Delivery</div><div class="ribVal">'+money(c.clientDelivery)+loadNote+'</div></div><div class="ribCell"><div class="ribLabel">Basket</div><div class="ribVal">'+money(c.basket)+'</div></div><div class="ribCell"><div class="ribLabel">Kg/L</div><input id="loadKg" type="number" min="0" step="0.1" value="'+c.kg.toFixed(1)+'"></div><div class="ribCell"><div class="ribLabel">Drivers</div><div class="ribVal">'+(hasItems&&c.mode!=='pickup'?driverNeedText(c.requiredDrivers):'—')+'</div>'+driverWarn+'</div><div class="ribCell time"><div class="ribLabel">Prep</div><input id="prepTime" type="time" value="'+esc(t.prep)+'"></div><div class="ribCell time"><div class="ribLabel">Pickup</div><input id="pickupTime" type="time" value="'+esc(t.pickup)+'"></div><div class="ribCell time"><div class="ribLabel">Arrive</div><input id="arrivalTime" type="time" value="'+esc(t.arrival)+'"></div><div class="ribCell"><div class="ribLabel">Total</div><div class="ribVal">'+money(c.total)+'</div></div><div class="ribCell wide"><div class="ribLabel">Assignment</div><select id="assignMode"><option value="auto">Automatic</option><option value="choose">Choose lead driver</option><option value="pickup">Self-pickup</option></select></div><div class="ribCell pay"><div class="ribLabel">Delivery paid</div><div class="ribVal">Client → Driver(s)</div></div>'+driverCell+edit+'<div class="ribCell action"><button id="ribbonAction" class="ribAction'+need+'" '+(disabled?'disabled':'')+' type="button">'+action+'</button></div>';$('destChoice').value=state.destinationMode;$('destChoice').onchange=()=>{if($('destChoice').value==='other'){startDestinationPick();}else{resetDestination();state.orderState='basket';renderRibbon();}};$('assignMode').value=c.mode;$('assignMode').onchange=()=>{if($('assignMode').value==='choose'&&!state.driver)state.driver=state.drivers[0];state.orderState='basket';renderRibbon();};['prep','pickup','arrival'].forEach(k=>{const el=$(k+'Time');if(el)el.onchange=()=>{times()[k]=el.value;state.orderState='basket';if(state.activeOrder){const o=state.orders.find(x=>x.id===state.activeOrder);if(o){o.times=o.times||defaultTimes();o.times[k]=el.value;saveOrders();}}renderRibbon();};});const lk=$('loadKg');if(lk)lk.onchange=()=>{state.loadOverride=Math.max(0,+lk.value||0);state.orderState='basket';renderRibbon();};const dc=$('driverChoice');if(dc)dc.onchange=()=>selectDriver(dc.value,false);$('ribbonAction').onclick=handleRibbonAction;const ed=$('vendorEditHelp');if(ed)ed.onclick=()=>toast('Tap ✎ beside a product to edit name, description, price, kg/L and photo.');}
function selectDriver(id,fromMap){const d=state.drivers.find(x=>x.id===id);if(!d)return;state.driver=d;if(state.vendor){const mode=$('assignMode');if(mode)mode.value='choose';state.orderState='basket';restoreVendor();renderRibbon();}state.drivers.forEach(x=>{if(x.marker){x.marker.setIcon(divIcon('<div class="mapPin driver '+(x.id===id?'selected':'')+'">'+x.emoji+'</div>',38));}});if(fromMap)toast(d.name+' selected as lead driver');}
function handleRibbonAction(){const c=calcOrder();if(!c.count)return;if(c.mode==='pickup'){state.orderState='accepted';orderForActive(c,'accepted');renderRibbon();toast('Self-pickup ready. Confirm to route.');return;}if(state.orderState==='basket'){state.orderState='offered';orderForActive(c,'offered');renderRibbon();const msg=c.requiredDrivers>1?'Client notice: '+driverNeedText(c.requiredDrivers)+' required for '+c.kg.toFixed(1)+' kg/L.':'Driver request opened.';toast(msg+' Waiting for acceptance…',4200);setTimeout(()=>{const cc=calcOrder();const ds=driversForOrder(cc);state.assignedDrivers=ds;if(!state.driver)state.driver=ds[0]||nearestDriver();const o=orderForActive(cc,'accepted');o.status='accepted';o.driverIds=ds.map(d=>d.id);o.driverNames=ds.map(d=>d.name);o.driverId=ds[0]?.id||'';o.driverName=o.driverNames.join(' + ');o.messages=o.messages||[];if(cc.requiredDrivers>1)o.messages.push({who:'System',text:'Client notified: '+driverNeedText(cc.requiredDrivers)+' are required for '+cc.kg.toFixed(1)+' kg/L.',at:new Date().toISOString()});o.messages.push({who:'Driver team',text:(o.driverName||'Driver team')+' accepted the delivery time window.',at:new Date().toISOString()});saveOrders();state.orderState='accepted';renderRibbon();drawOrderSpiral();toast((o.driverName||'Driver')+' accepted. Confirm and pay.');},900);return;}if(state.orderState==='accepted'){confirmOrder();}}
function nearestDriver(){if(!state.vendor||!state.drivers.length)return null;return state.drivers.slice().sort((a,b)=>km(a.lat,a.lng,state.vendor.lat,state.vendor.lng)-km(b.lat,b.lng,state.vendor.lat,state.vendor.lng))[0];}
function editProduct(id){if(!state.vendorAccount)return;const it=state.vendor.items.find(x=>x.id===id);if(!it)return;const name=prompt('Product name',it.name);if(name===null)return;const desc=prompt('Description',it.desc);if(desc===null)return;const price=prompt('Price €',it.price);if(price===null)return;const kg=prompt('kg/L',it.kg);if(kg===null)return;const photo=prompt('Photo URL',it.photo);if(photo===null)return;it.name=name.trim()||it.name;it.desc=desc.trim()||it.desc;it.price=Math.max(0,+price||it.price);it.kg=Math.max(0,+kg||it.kg);it.photo=photo.trim()||it.photo;renderVendor();toast('Product updated locally');}
async function osrm(a,b){const key=a[1]+','+a[0]+';'+b[1]+','+b[0];try{const ctl=new AbortController();setTimeout(()=>ctl.abort(),6500);const r=await fetch(CONFIG.osrm+'/'+key+'?overview=full&geometries=geojson',{signal:ctl.signal});const j=await r.json();if(j.code==='Ok'&&j.routes&&j.routes[0])return{coords:j.routes[0].geometry.coordinates.map(x=>[x[1],x[0]]),km:j.routes[0].distance/1000};}catch(_){}return{coords:[a,b],km:km(a[0],a[1],b[0],b[1])};}
async function confirmOrder(){
  const c=calcOrder();
  if(!state.vendor||!c.count)return;
  state.orderState='paid';
  const ds=c.mode==='pickup'?[]:driversForOrder(c);
  state.assignedDrivers=ds;
  const o=orderForActive(c,'paid');
  o.status='paid';
  o.driverIds=ds.map(d=>d.id);
  o.driverNames=ds.map(d=>d.name);
  o.driverId=ds[0]?.id||'';
  o.driverName=o.driverNames.join(' + ');
  o.messages=o.messages||[];
  o.messages.push({who:'System',text:'Order confirmed and paid. Delivery charge is client → driver(s) direct. Tap the glowing chat bubble on the route/polygon for live coordination.',at:new Date().toISOString()});
  if(c.requiredDrivers>1)o.messages.push({who:'System',text:driverNeedText(c.requiredDrivers)+' assigned because load is '+c.kg.toFixed(1)+' kg/L.',at:new Date().toISOString()});
  saveOrders();
  renderRibbon();
  const vendor=state.vendor;
  state.routes.forEach(r=>{try{r.remove()}catch(_){}});
  state.routes=[];
  const dest=c.dest||currentDestination()||state.city;
  const route=await osrm([vendor.lat,vendor.lng],[dest.lat,dest.lng]);
  const clientLeg=L.polyline(route.coords,{color:'#00d7ff',weight:7,opacity:.96,className:'astranov-client-leg'}).addTo(state.cityMap);
  clientLeg.on('click',()=>openOrderOffice(o.id));
  state.routes.push(clientLeg);
  for(const driver of ds){
    const pickup=await osrm([driver.lat,driver.lng],[vendor.lat,vendor.lng]);
    const driverLeg=L.polyline(pickup.coords,{color:'#d6aa3a',weight:6,opacity:.92,dashArray:'10 8',className:'astranov-driver-leg'}).addTo(state.cityMap);
    driverLeg.on('click',()=>openOrderOffice(o.id));
    state.routes.push(driverLeg);
  }
  const polygonPts=ds.length?[[dest.lat,dest.lng],[vendor.lat,vendor.lng],...ds.map(d=>[d.lat,d.lng])]:[[dest.lat,dest.lng],[vendor.lat,vendor.lng]];
  if(ds.length){
    const poly=L.polygon(polygonPts,{color:'#d6aa3a',weight:4,fillColor:'#00d7ff',fillOpacity:.12,opacity:.94,dashArray:'8 7',className:'astranov-order-polygon'}).addTo(state.cityMap);
    poly.on('click',()=>openOrderOffice(o.id));
    state.routes.push(poly);
  }
  const center=polygonPts.reduce((a,p)=>[a[0]+p[0],a[1]+p[1]],[0,0]).map(v=>v/polygonPts.length);
  const chat=L.marker(center,{icon:divIcon('<div class="orderChatPin">💬</div>',48),zIndexOffset:950}).addTo(state.cityMap).bindTooltip('Order chat · '+o.id,{direction:'top',className:'cleanTip'});
  chat.on('click',ev=>{L.DomEvent.stopPropagation(ev);openOrderOffice(o.id);});
  state.routes.push(chat);
  const bounds=L.latLngBounds(route.coords.concat(ds.map(d=>[d.lat,d.lng])).concat([[vendor.lat,vendor.lng],[dest.lat,dest.lng]]));
  state.cityMap.fitBounds(bounds,{padding:[90,90],animate:true,duration:.7});
  createInvoices(c,ds);
  drawOrderSpiral();
  $('routeBadge').textContent=ds.length?(ds.length>1?ds.length+' DRIVER POLYGON LIVE · TAP 💬':'TRIANGLE LIVE · TAP 💬'):'SELF-PICKUP ROUTE LIVE · TAP 💬';
  $('routeBadge').style.display='block';
  setTimeout(()=>$('routeBadge').style.display='none',4200);
  toast('Order live. Bouncing circle and glowing chat bubble are active.',4200);
}
function createLedger(type,from,to,amount,meta){state.ledger.push({id:'INV-'+Date.now()+'-'+Math.random().toString(16).slice(2,6),type,from,to,amount:+amount.toFixed(2),meta,at:new Date().toISOString()});}
function createInvoices(c,drivers){drivers=Array.isArray(drivers)?drivers:(drivers?[drivers]:[]);createLedger('GOODS','Client',state.vendor.name,c.basket,'Products basket');if(c.clientDelivery>0&&drivers.length){const share=+(c.clientDelivery/drivers.length).toFixed(2);drivers.forEach((d,i)=>createLedger('DELIVERY','Client',d.name,i===drivers.length-1?+(c.clientDelivery-share*(drivers.length-1)).toFixed(2):share,'Client pays delivery directly to driver '+(i+1)+'/'+drivers.length));}if(c.platform>0)createLedger('PLATFORM FEE','Transaction','Astranov',c.platform,'3% platform fee');saveLedger();}
function openAccounting(){closeVendor();$('panelSheet').classList.add('on','ledgerSheet');$('panelTitle').textContent='Accounting Office';const rows=state.ledger.slice().reverse().map(x=>'<div class="ledgerRow"><div class="ledgerTop"><span>'+esc(x.type)+'</span><span>'+money(x.amount)+'</span></div><div class="ledgerMeta">'+esc(x.from)+' → '+esc(x.to)+' · '+esc(x.meta)+'<br>'+new Date(x.at).toLocaleString()+' · '+esc(x.id)+'</div></div>').join('')||'<div class="panelCard"><b>No ledger entries yet.</b><br>Confirm an order to issue invoices.</div>';$('panelBody').innerHTML=rows;}
function closePanel(){$('panelSheet').classList.remove('on','ledgerSheet');}
function openCommand(){const p=$('commandPanel');p.classList.toggle('on');if(p.classList.contains('on'))setTimeout(()=>$('cmdInput').focus(),80);}function runCommand(txt){txt=(txt||'').trim().toLowerCase();$('commandPanel').classList.remove('on');if(!txt)return;if(txt==='back'){goBack();return;}if(txt.includes('space')){setSpace(true);return;}if(txt.includes('account')){openAccounting();return;}if(txt.includes('vendor login')||txt==='vendor'){state.vendorAccount=true;localStorage.setItem('astranov_vendor_account','1');toast('Vendor mode on');if(state.vendor)renderVendor();return;}if(txt.includes('vendor logout')){state.vendorAccount=false;localStorage.removeItem('astranov_vendor_account');toast('Vendor mode off');if(state.vendor)renderVendor();return;}const countryHit=Object.entries(countries).find(([k,c])=>txt===k||txt.includes(c.name.toLowerCase())||txt===c.code.toLowerCase());if(countryHit){enterNational(countryHit[0]);return;}for(const country of Object.values(countries)){const city=country.cities.find(c=>txt.includes(c.name.toLowerCase()));if(city){state.country=country;enterCity(city);return;}}if(txt.includes('pizza')&&state.level==='city'){openVendor(state.vendors.find(v=>v.id==='pizza'));return;}toast('Command not found');}
function goBack(){if(state.level==='city'){closeVendor();if(state.country)enterNational(Object.entries(countries).find(([,c])=>c===state.country)?.[0]||'greece');else setLevel('global');return;}if(state.level==='national'){setLevel('global');return;}if(state.space){setSpace(false);return;}setLevel('global');}
function startVoice(){const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){openCommand();toast('Voice unavailable. Text command opened.');return;}try{const rec=new SR();state.voice=rec;rec.lang=navigator.language||'en-US';rec.continuous=false;rec.interimResults=false;rec.onstart=()=>$('voiceOrb').classList.add('live');rec.onend=()=>$('voiceOrb').classList.remove('live');rec.onerror=()=>{toast('Voice blocked. Text command opened.');openCommand();};rec.onresult=e=>runCommand(e.results[0][0].transcript);rec.start();}catch(_){openCommand();}}
$('title').onclick=openCommand;$('voiceOrb').onclick=startVoice;$('backOrb').onclick=goBack;$('closeVendor').onclick=e=>{e.stopPropagation();closeVendor();};$('vendorSheet').querySelector('.sheetHead').onclick=restoreVendor;$('closePanel').onclick=closePanel;$('brightRange').value=state.brightness;$('brightRange').oninput=applyBrightness;$('cmdInput').onkeydown=e=>{if(e.key==='Enter')runCommand(e.target.value);};document.querySelectorAll('.hintBtn').forEach(b=>b.onclick=()=>runCommand(b.dataset.cmd));document.addEventListener('keydown',e=>{if(e.key==='Escape'){closePanel();closeVendor();$('commandPanel').classList.remove('on');}});

function protectDrawerScroll(){
  ['vendorSheet','panelSheet','commandPanel'].forEach(id=>{
    const el=$(id); if(!el||el._scrollProtected)return; el._scrollProtected=true;
    ['pointerdown','touchstart','wheel'].forEach(evt=>el.addEventListener(evt,e=>e.stopPropagation(),{passive:true}));
    el.addEventListener('touchmove',e=>e.stopPropagation(),{passive:true});
  });
}
async function boot(){protectDrawerScroll();progress(18,'LOADING LEDGER');loadLedger();loadOrders();progress(36,'WAITING ENGINES');let tries=0;while((!window.THREE||!window.L)&&tries<70){await new Promise(r=>setTimeout(r,100));tries++;}progress(62,'BUILDING EARTH');initGlobe();progress(100,'ONLINE');setTimeout(()=>{$('loader').classList.add('gone');setTimeout(()=>$('loader').remove(),700);},220);toast('Myrmidon build online. Tap a country beacon.',3200);}boot();
window.Astranov={state,countries,enterNational,enterCity,openVendor,openAccounting,openOrderOffice,runCommand};
})();
</script>
