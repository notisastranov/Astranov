<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Astranov Internet Operating System</title>
  <style>
    :root{
      --bg:#020812;
      --bg2:#061523;
      --panel:rgba(6,18,32,.26);
      --panel-2:rgba(9,24,40,.52);
      --line:#00c8ff;
      --line-soft:rgba(0,200,255,.22);
      --text:#d8efff;
      --dim:#7fa0bf;
      --green:#00e87a;
      --orange:#ff9d2e;
      --red:#ff5e7a;
      --shadow:0 0 28px rgba(0,200,255,.16);
      --font:Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:radial-gradient(circle at 50% 30%, #0a1b31 0%, #05101d 45%, #020812 100%);font-family:var(--font);color:var(--text)}
    #app{position:fixed;inset:0;overflow:hidden}
    #scene{position:absolute;inset:0}
    #hudOverlay{position:absolute;inset:0;pointer-events:none}
    #signalLayer{position:absolute;inset:0;pointer-events:none}
    #connectorSvg{position:absolute;inset:0;width:100%;height:100%;overflow:visible;pointer-events:none}

    #topGlass{
      position:absolute;left:0;right:0;top:0;height:72px;pointer-events:none;
      background:linear-gradient(180deg, rgba(2,10,18,.56), rgba(2,10,18,0));
    }
    #brand{
      position:absolute;top:14px;left:50%;transform:translateX(-50%);
      padding:10px 16px;border:1px solid rgba(0,200,255,.15);border-radius:999px;
      background:rgba(4,14,26,.18);backdrop-filter:blur(12px);
      box-shadow:var(--shadow);pointer-events:none;
      text-align:center;
    }
    #brand .name{font-size:12px;letter-spacing:.24em;color:#00baff;text-shadow:0 0 14px rgba(0,186,255,.55);font-weight:700}
    #brand .sub{font-size:10px;color:var(--dim);margin-top:2px}

    #bottomBar{
      position:absolute;left:10px;right:10px;bottom:10px;height:58px;display:flex;gap:8px;align-items:center;
      padding:8px;border-radius:20px;background:linear-gradient(180deg, rgba(7,18,32,.68), rgba(7,18,32,.42));
      border:1px solid rgba(0,200,255,.14);backdrop-filter:blur(18px);box-shadow:0 18px 48px rgba(0,0,0,.28), 0 0 22px rgba(0,200,255,.08);
      z-index:60;
    }
    .barBtn{
      width:42px;height:42px;border-radius:14px;border:1px solid rgba(0,200,255,.14);background:rgba(255,255,255,.04);
      display:flex;align-items:center;justify-content:center;color:#bde7ff;cursor:pointer;flex:0 0 auto;
      transition:.18s transform,.18s border-color,.18s background,.18s box-shadow;
    }
    .barBtn:active{transform:scale(.96)}
    .barBtn:hover{border-color:rgba(0,200,255,.36);background:rgba(0,200,255,.08);box-shadow:0 0 16px rgba(0,200,255,.12)}
    #searchWrap{position:relative;flex:1;display:flex;align-items:center;height:42px}
    #query{
      width:100%;height:100%;padding:0 16px;border-radius:14px;border:1px solid rgba(0,200,255,.15);background:rgba(255,255,255,.05);
      color:var(--text);font-size:15px;outline:none;box-shadow:inset 0 0 0 1px rgba(255,255,255,.02);
    }
    #query::placeholder{color:#88a6c2}

    .wheel{
      position:absolute;top:88px;width:104px;height:104px;border-radius:50%;pointer-events:auto;
      background:radial-gradient(circle at 50% 50%, rgba(0,200,255,.12), rgba(0,200,255,.03) 48%, rgba(0,0,0,.08) 68%, rgba(0,0,0,0) 72%);
      border:1px solid rgba(0,200,255,.15);backdrop-filter:blur(10px);box-shadow:0 0 22px rgba(0,200,255,.12);
      display:flex;align-items:center;justify-content:center;
    }
    #perfWheel{left:10px}
    #navWheel{right:10px}
    .wheel svg{position:absolute;inset:0;width:100%;height:100%}
    .wheel .ringText{position:absolute;font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em}
    .wheelCenter{
      width:44px;height:44px;border-radius:50%;border:1px solid rgba(0,200,255,.24);background:rgba(4,18,32,.75);
      color:#dff6ff;display:flex;align-items:center;justify-content:center;text-align:center;font-size:9px;font-weight:700;line-height:1.05;
      box-shadow:0 0 18px rgba(0,200,255,.18), inset 0 0 16px rgba(0,200,255,.08);cursor:pointer;padding:6px;
    }
    .wheelMeta{
      position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--dim);white-space:nowrap;
    }

    .card{
      position:absolute;min-width:220px;max-width:min(76vw, 300px);pointer-events:auto;
      background:linear-gradient(180deg, rgba(9,22,38,.92), rgba(6,16,30,.82));
      border:1px solid rgba(0,200,255,.22);border-radius:18px;box-shadow:0 18px 48px rgba(0,0,0,.32), 0 0 18px rgba(0,200,255,.12);
      overflow:hidden;backdrop-filter:blur(18px);transform-origin:50% 50%;
      animation:cardIn .42s cubic-bezier(.2,.9,.2,1);
    }
    @keyframes cardIn{from{opacity:0;transform:translateY(10px) scale(.8)}to{opacity:1;transform:translateY(0) scale(1)}}
    .cardHero{height:76px;background:
      radial-gradient(circle at 80% 20%, rgba(0,200,255,.28), transparent 30%),
      linear-gradient(135deg, rgba(0,200,255,.18), rgba(4,12,22,.8));position:relative}
    .chip{position:absolute;left:12px;top:12px;padding:5px 10px;border-radius:999px;border:1px solid rgba(0,200,255,.16);background:rgba(255,255,255,.06);font-size:10px;color:#d8f4ff;letter-spacing:.08em;text-transform:uppercase}
    .chip.cloud{color:#ffd38a;border-color:rgba(255,173,46,.28);background:rgba(255,157,46,.1)}
    .chip.anchored{color:#8ff3c2;border-color:rgba(0,232,122,.24);background:rgba(0,232,122,.1)}
    .cardBody{padding:12px}
    .cardTitle{font-size:15px;font-weight:700;line-height:1.2}
    .cardSummary{font-size:12px;color:#b9d2e8;line-height:1.45;margin-top:6px}
    .cardMeta{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .metaPill{padding:5px 9px;border-radius:999px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);font-size:10px;color:var(--dim)}
    .cardActions{display:flex;gap:8px;margin-top:12px}
    .cardBtn{
      flex:1;border:1px solid rgba(0,200,255,.18);border-radius:12px;padding:10px 12px;background:rgba(0,200,255,.08);color:#e9fbff;
      cursor:pointer;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
    }
    .cardBtn.secondary{background:rgba(255,255,255,.04);color:#cfe6f8}

    #toastStack{position:absolute;left:50%;top:82px;transform:translateX(-50%);width:min(90vw, 420px);display:flex;flex-direction:column;gap:8px;z-index:62;pointer-events:none}
    .toast{
      padding:12px 14px;border-radius:16px;background:linear-gradient(180deg, rgba(8,20,35,.92), rgba(7,17,30,.78));border:1px solid rgba(0,200,255,.18);
      box-shadow:0 18px 40px rgba(0,0,0,.22);backdrop-filter:blur(16px);font-size:12px;line-height:1.45;color:#dff7ff;
      animation:toastIn .35s ease-out;
    }
    @keyframes toastIn{from{opacity:0;transform:translateY(-8px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
    .toastTitle{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#00c8ff;margin-bottom:2px}

    .hint{
      position:absolute;left:50%;bottom:82px;transform:translateX(-50%);padding:8px 12px;border-radius:14px;
      background:rgba(7,17,30,.56);border:1px solid rgba(0,200,255,.12);font-size:12px;color:#bdd8ef;backdrop-filter:blur(12px);pointer-events:none;z-index:55;
    }

    .pinDot{
      position:absolute;width:10px;height:10px;border-radius:50%;background:#00c8ff;box-shadow:0 0 12px #00c8ff,0 0 26px rgba(0,200,255,.5);pointer-events:none;transform:translate(-50%,-50%);
    }
    .pinDot.cloud{background:#ffb14f;box-shadow:0 0 12px #ffb14f,0 0 26px rgba(255,177,79,.5)}

    #searchPanel{
      position:absolute;left:12px;right:12px;bottom:78px;display:none;z-index:58;
      background:linear-gradient(180deg, rgba(7,17,30,.88), rgba(7,17,30,.68));
      border:1px solid rgba(0,200,255,.14);border-radius:18px;padding:8px;backdrop-filter:blur(18px);
      box-shadow:0 18px 44px rgba(0,0,0,.28);
    }
    .result{padding:10px 12px;border-radius:14px;cursor:pointer;border:1px solid transparent;display:flex;justify-content:space-between;gap:10px;align-items:center}
    .result:hover{background:rgba(0,200,255,.08);border-color:rgba(0,200,255,.16)}
    .resultTitle{font-size:13px;font-weight:700}
    .resultSub{font-size:11px;color:var(--dim);margin-top:2px}
    .resultTag{padding:5px 8px;border-radius:999px;border:1px solid rgba(0,200,255,.14);font-size:10px;color:#d2f3ff;white-space:nowrap}

    #voiceBadge{
      position:absolute;left:18px;bottom:76px;padding:8px 10px;border-radius:12px;border:1px solid rgba(0,232,122,.24);
      background:rgba(0,232,122,.1);font-size:11px;color:#8ff3c2;display:none;z-index:56;
    }

    @media (min-width:900px){
      #bottomBar{left:50%;right:auto;transform:translateX(-50%);width:min(740px, calc(100vw - 20px))}
      #searchPanel{left:50%;right:auto;transform:translateX(-50%);width:min(740px, calc(100vw - 24px))}
    }
  </style>
</head>
<body>
<div id="app">
  <div id="scene"></div>
  <div id="hudOverlay">
    <svg id="connectorSvg"></svg>
    <div id="signalLayer"></div>
    <div id="topGlass"></div>
    <div id="brand">
      <div class="name">ASTRANOV</div>
      <div class="sub">Internet Operating System • World-first signal search</div>
    </div>

    <div id="perfWheel" class="wheel">
      <svg viewBox="0 0 100 100" aria-hidden="true">
        <circle cx="50" cy="50" r="40" fill="none" stroke="rgba(0,200,255,.12)" stroke-width="1"/>
        <circle cx="50" cy="50" r="33" fill="none" stroke="rgba(0,200,255,.16)" stroke-width="1" stroke-dasharray="3 5"/>
        <path d="M50 10 A40 40 0 0 1 90 50" fill="none" stroke="rgba(0,232,122,.56)" stroke-width="3"/>
        <path d="M90 50 A40 40 0 0 1 72 84" fill="none" stroke="rgba(255,157,46,.56)" stroke-width="3"/>
        <path d="M72 84 A40 40 0 0 1 28 84" fill="none" stroke="rgba(255,94,122,.46)" stroke-width="3"/>
        <path d="M28 84 A40 40 0 0 1 10 50" fill="none" stroke="rgba(0,200,255,.46)" stroke-width="3"/>
      </svg>
      <div class="wheelCenter" id="droneButton">LOAD<br>OUT</div>
      <div class="wheelMeta" id="perfMeta">device mode</div>
    </div>

    <div id="navWheel" class="wheel">
      <svg viewBox="0 0 100 100" aria-hidden="true">
        <circle cx="50" cy="50" r="40" fill="none" stroke="rgba(0,200,255,.12)" stroke-width="1"/>
        <circle cx="50" cy="50" r="33" fill="none" stroke="rgba(0,200,255,.16)" stroke-width="1"/>
        <line x1="50" y1="12" x2="50" y2="88" stroke="rgba(0,200,255,.18)" stroke-width="1"/>
        <line x1="12" y1="50" x2="88" y2="50" stroke="rgba(0,200,255,.18)" stroke-width="1"/>
        <circle cx="50" cy="50" r="10" fill="rgba(0,200,255,.07)" stroke="rgba(0,200,255,.16)"/>
      </svg>
      <div class="wheelCenter" id="homeButton">ZOOM<br>ME</div>
      <div class="wheelMeta">my location / globe</div>
    </div>

    <div id="toastStack"></div>
    <div class="hint">Search businesses, channels, teams, booking signals, or floating cloud nodes.</div>
    <div id="voiceBadge">Hands-free mode listening…</div>

    <div id="searchPanel"></div>

    <div id="bottomBar">
      <button class="barBtn" id="voiceBtn" aria-label="Hands-free mode">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      </button>
      <div id="searchWrap">
        <input id="query" type="text" placeholder="Search the planet: hotels, pizza, Astranov Racing, development team, booking cloud…" />
      </div>
      <button class="barBtn" id="sendBtn" aria-label="Send search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(() => {
  const sceneEl = document.getElementById('scene');
  const connectorSvg = document.getElementById('connectorSvg');
  const signalLayer = document.getElementById('signalLayer');
  const searchInput = document.getElementById('query');
  const searchPanel = document.getElementById('searchPanel');
  const toastStack = document.getElementById('toastStack');
  const perfMeta = document.getElementById('perfMeta');
  const droneButton = document.getElementById('droneButton');
  const homeButton = document.getElementById('homeButton');
  const voiceBadge = document.getElementById('voiceBadge');

  let width = window.innerWidth;
  let height = window.innerHeight;
  let pointer = {x:0,y:0};
  let activeSignalId = null;
  let hoveredSignalId = null;
  let droneMode = false;
  let showLocalTarget = true;
  let toastCounter = 0;

  const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.setSize(width, height);
  sceneEl.appendChild(renderer.domElement);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(42, width/height, 0.1, 1000);
  camera.position.set(0, 0.45, 8.8);

  const earthGroup = new THREE.Group();
  scene.add(earthGroup);
  const starGroup = new THREE.Group();
  scene.add(starGroup);

  const ambient = new THREE.AmbientLight(0x88bfff, 0.82);
  scene.add(ambient);
  const keyLight = new THREE.DirectionalLight(0x9fd9ff, 1.15);
  keyLight.position.set(5, 3, 7);
  scene.add(keyLight);
  const rimLight = new THREE.PointLight(0x00c8ff, 0.95, 30, 2);
  rimLight.position.set(-8, -2, 5);
  scene.add(rimLight);

  const globeRadius = 2.45;

  function makeEarthTexture(){
    const c = document.createElement('canvas');
    c.width = 2048; c.height = 1024;
    const x = c.getContext('2d');
    const g = x.createLinearGradient(0,0,0,c.height);
    g.addColorStop(0,'#1a5588');
    g.addColorStop(.35,'#1e6da0');
    g.addColorStop(.72,'#15466e');
    g.addColorStop(1,'#0b2742');
    x.fillStyle = g; x.fillRect(0,0,c.width,c.height);

    // oceans bands
    for(let i=0;i<20;i++){
      x.fillStyle = `rgba(255,255,255,${0.015 + Math.random()*0.02})`;
      x.fillRect(0, Math.random()*c.height, c.width, 12 + Math.random()*36);
    }

    function blob(cx,cy,rx,ry,rot,pts,color){
      x.save(); x.translate(cx,cy); x.rotate(rot); x.beginPath();
      for(let i=0;i<pts;i++){
        const a = (i/pts)*Math.PI*2;
        const rr = 0.82 + Math.random()*0.38;
        const px = Math.cos(a)*rx*rr;
        const py = Math.sin(a)*ry*rr;
        if(i===0) x.moveTo(px,py); else x.lineTo(px,py);
      }
      x.closePath(); x.fillStyle=color; x.fill(); x.restore();
    }

    const land = '#66a05a';
    const land2 = '#4f8649';
    blob(370,330,160,115,-0.3,22,land);   // N America-ish
    blob(520,520,90,150,-0.12,20,land2);   // S America-ish
    blob(1020,290,120,88,0.12,20,land);    // Europe-ish
    blob(1130,430,160,210,0.06,26,land2);  // Africa-ish
    blob(1420,330,270,155,-0.03,28,land);  // Asia-ish
    blob(1640,720,98,64,0.2,16,land2);     // Australia-ish
    blob(930,860,420,52,0,18,'#e7eef5');   // Antarctica-ish

    // clouds
    for(let i=0;i<70;i++){
      x.beginPath();
      x.fillStyle = `rgba(255,255,255,${0.015 + Math.random()*0.05})`;
      x.ellipse(Math.random()*c.width, Math.random()*c.height, 20+Math.random()*90, 8+Math.random()*24, Math.random()*Math.PI, 0, Math.PI*2);
      x.fill();
    }
    return new THREE.CanvasTexture(c);
  }

  const earthMaterial = new THREE.MeshStandardMaterial({
    map: makeEarthTexture(),
    roughness: 0.82,
    metalness: 0.04,
    emissive: new THREE.Color('#05243a'),
    emissiveIntensity: 0.42
  });
  const earth = new THREE.Mesh(new THREE.SphereGeometry(globeRadius, 96, 96), earthMaterial);
  earthGroup.add(earth);

  const atmosphere = new THREE.Mesh(
    new THREE.SphereGeometry(globeRadius*1.05, 64, 64),
    new THREE.MeshBasicMaterial({color:0x00c8ff, transparent:true, opacity:0.12})
  );
  earthGroup.add(atmosphere);

  const glow = new THREE.Mesh(
    new THREE.SphereGeometry(globeRadius*1.18, 64, 64),
    new THREE.ShaderMaterial({
      transparent:true,
      blending:THREE.AdditiveBlending,
      side:THREE.BackSide,
      uniforms:{c:{value:0.3}, p:{value:2.8}, glowColor:{value:new THREE.Color(0x00c8ff)}, viewVector:{value:camera.position}},
      vertexShader:`uniform vec3 viewVector; uniform float c; uniform float p; varying float intensity; void main(){ vec3 vNormal = normalize(normalMatrix * normal); vec3 vNormel = normalize(normalMatrix * viewVector); intensity = pow(c - dot(vNormal, vNormel), p); gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }`,
      fragmentShader:`uniform vec3 glowColor; varying float intensity; void main(){ gl_FragColor = vec4(glowColor * intensity, intensity * 0.48); }`
    })
  );
  earthGroup.add(glow);

  // stars
  const starGeo = new THREE.BufferGeometry();
  const starCount = 2000;
  const positions = new Float32Array(starCount * 3);
  for(let i=0;i<starCount;i++){
    const r = 35 + Math.random()*130;
    const theta = Math.random()*Math.PI*2;
    const phi = Math.acos((Math.random()*2)-1);
    positions[i*3+0] = r * Math.sin(phi)*Math.cos(theta);
    positions[i*3+1] = r * Math.cos(phi);
    positions[i*3+2] = r * Math.sin(phi)*Math.sin(theta);
  }
  starGeo.setAttribute('position', new THREE.BufferAttribute(positions,3));
  const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({color:0xb7dfff, size:0.15, transparent:true, opacity:.95}));
  starGroup.add(stars);

  function latLngToVector3(lat, lng, radius){
    const phi = (90 - lat) * (Math.PI / 180);
    const theta = (lng + 180) * (Math.PI / 180);
    return new THREE.Vector3(
      -(radius * Math.sin(phi) * Math.cos(theta)),
       radius * Math.cos(phi),
       radius * Math.sin(phi) * Math.sin(theta)
    );
  }

  const signals = [
    {id:'s1', title:'Blue Harbor Rooms', summary:'Anchored booking signal for a sea-view hotel. Tap to open booking fields and availability.', kind:'booking', mode:'anchored', category:'hotel', visibility:'global', lat:36.4431, lng:28.2278, action:'Book now'},
    {id:'s2', title:'Rhodes Marina Bites', summary:'Food ordering signal with delivery routing capability and menu flow.', kind:'shop', mode:'anchored', category:'food', visibility:'local', lat:36.4519, lng:28.2272, action:'Order'},
    {id:'s3', title:'Astranov Racing', summary:'Floating cloud channel for vehicle diagnostics, racing alerts, and ECU interpretation workspace.', kind:'channel', mode:'cloud', category:'racing', visibility:'global', lat:38.1, lng:23.72, altitude:0.72, action:'Open channel'},
    {id:'s4', title:'Development Team', summary:'Cloud workspace for Astranov build coordination, issue triage, and launch planning.', kind:'channel', mode:'cloud', category:'team', visibility:'team', lat:35.3387, lng:25.1442, altitude:0.62, action:'Join chat'},
    {id:'s5', title:'Booking Engine', summary:'Service cloud businesses can attach for time slots, reservations, dynamic fields, and customer flows.', kind:'service', mode:'cloud', category:'booking', visibility:'global', lat:41.9028, lng:12.4964, altitude:0.9, action:'Attach module'},
    {id:'s6', title:'Aegean Dive School', summary:'Anchored activity signal with lessons, timed slots, and real location routing.', kind:'activity', mode:'anchored', category:'diving', visibility:'global', lat:36.4344, lng:28.2167, action:'Reserve slot'},
    {id:'s7', title:'Global Support Cloud', summary:'Floating support signal for ideas, bug reports, and community guidance.', kind:'channel', mode:'cloud', category:'support', visibility:'global', lat:48.8566, lng:2.3522, altitude:1.05, action:'Open support'},
    {id:'s8', title:'YouTube Harbor Post', summary:'Media signal linked to a real marina location. Content floats from the exact spot it belongs to.', kind:'media', mode:'anchored', category:'media', visibility:'global', lat:37.9838, lng:23.7275, action:'View post'}
  ];

  const signalState = new Map();
  signals.forEach(sig => {
    const anchor = latLngToVector3(sig.lat, sig.lng, globeRadius + (sig.mode==='cloud' ? (sig.altitude || .65) : .06));
    const pulse = new THREE.Mesh(
      new THREE.SphereGeometry(sig.mode==='cloud' ? .055 : .042, 12, 12),
      new THREE.MeshBasicMaterial({color:sig.mode==='cloud'?0xffb14f:0x00c8ff, transparent:true, opacity:.95})
    );
    pulse.position.copy(anchor);
    earthGroup.add(pulse);

    const halo = new THREE.Mesh(
      new THREE.SphereGeometry(sig.mode==='cloud' ? .11 : .082, 12, 12),
      new THREE.MeshBasicMaterial({color:sig.mode==='cloud'?0xffb14f:0x00c8ff, transparent:true, opacity:.14})
    );
    halo.position.copy(anchor);
    earthGroup.add(halo);

    const dom = document.createElement('div');
    dom.className = 'card';
    dom.style.display = 'none';
    dom.innerHTML = `
      <div class="cardHero">
        <div class="chip ${sig.mode}">${sig.mode === 'cloud' ? 'cloud signal' : 'anchored signal'}</div>
      </div>
      <div class="cardBody">
        <div class="cardTitle"></div>
        <div class="cardSummary"></div>
        <div class="cardMeta"></div>
        <div class="cardActions">
          <button class="cardBtn actionBtn"></button>
          <button class="cardBtn secondary">Notify me</button>
        </div>
      </div>`;
    dom.querySelector('.cardTitle').textContent = sig.title;
    dom.querySelector('.cardSummary').textContent = sig.summary;
    dom.querySelector('.actionBtn').textContent = sig.action || 'Open';
    const meta = dom.querySelector('.cardMeta');
    [sig.category, sig.visibility, sig.kind].forEach(v => {
      const m = document.createElement('div'); m.className='metaPill'; m.textContent=v; meta.appendChild(m);
    });
    dom.querySelector('.actionBtn').onclick = () => pushToast(sig.title, sig.action + ' flow would open here.');
    dom.querySelector('.secondary').onclick = () => pushToast('Notification armed', 'You will be notified about changes on ' + sig.title + '.');
    signalLayer.appendChild(dom);

    const dot = document.createElement('div');
    dot.className = 'pinDot ' + (sig.mode==='cloud' ? 'cloud' : '');
    dot.style.display = 'none';
    signalLayer.appendChild(dot);

    signalState.set(sig.id, {
      sig, anchor, pulse, halo, dom, dot,
      orbitOffset: Math.random() * Math.PI * 2,
      phase: Math.random() * 1000,
      visible:false
    });

    dom.addEventListener('pointerenter', () => hoveredSignalId = sig.id);
    dom.addEventListener('pointerleave', () => hoveredSignalId = null);
  });

  function frontFacing(vector){
    const world = vector.clone().applyMatrix4(earthGroup.matrixWorld);
    const camDir = camera.position.clone().sub(world).normalize();
    const normal = vector.clone().normalize().applyQuaternion(earthGroup.quaternion);
    return normal.dot(camDir) > 0.18;
  }

  function project(worldVector){
    const v = worldVector.clone().applyMatrix4(earthGroup.matrixWorld).project(camera);
    return {
      x:(v.x * 0.5 + 0.5) * width,
      y:(-v.y * 0.5 + 0.5) * height,
      z:v.z
    };
  }

  function signalCardPosition(screen, state){
    const isLeft = screen.x < width * .5;
    const dx = isLeft ? 42 : -262;
    const dy = state.sig.mode === 'cloud' ? -54 : -28;
    return {x:screen.x + dx, y:screen.y + dy};
  }

  function updateSignalUI(t){
    connectorSvg.innerHTML = '';
    signalState.forEach((state, id) => {
      const sig = state.sig;
      let anchor = latLngToVector3(sig.lat, sig.lng, globeRadius + (sig.mode==='cloud' ? (sig.altitude || .7) : .06));
      if(sig.mode === 'cloud'){
        const bob = Math.sin(t*0.0017 + state.phase)*0.08;
        const swirl = Math.sin(t*0.001 + state.orbitOffset) * 0.02;
        anchor = latLngToVector3(sig.lat + swirl*22, sig.lng + swirl*50, globeRadius + (sig.altitude || .7) + bob);
      }
      state.anchor.copy(anchor);
      state.pulse.position.copy(anchor);
      state.halo.position.copy(anchor);

      const facing = frontFacing(anchor);
      const pulseScale = 1 + Math.sin(t*0.004 + state.phase) * 0.22;
      state.pulse.scale.setScalar(pulseScale);
      state.halo.scale.setScalar(1.2 + Math.sin(t*0.0025 + state.phase)*0.2);
      state.pulse.material.opacity = sig.mode === 'cloud' ? 0.86 : 0.95;
      state.halo.material.opacity = facing ? 0.18 : 0.03;

      const isActive = activeSignalId === id || hoveredSignalId === id;
      const shouldShow = facing && (isActive || activeSignalId === null && id === 's3');
      state.visible = shouldShow;
      if(!shouldShow){
        state.dom.style.display = 'none';
        state.dot.style.display = 'none';
        return;
      }
      const screen = project(anchor);
      const cardPos = signalCardPosition(screen, state);
      const depthScale = THREE.MathUtils.clamp(1.16 - screen.z*0.12, .82, 1.12);
      state.dom.style.display = 'block';
      state.dot.style.display = 'block';
      state.dot.style.left = screen.x + 'px';
      state.dot.style.top = screen.y + 'px';
      state.dom.style.left = Math.max(12, Math.min(width - 320, cardPos.x)) + 'px';
      state.dom.style.top = Math.max(80, Math.min(height - 230, cardPos.y)) + 'px';
      state.dom.style.transform = `scale(${depthScale})`;

      const cardRect = {x:parseFloat(state.dom.style.left), y:parseFloat(state.dom.style.top), w:state.dom.offsetWidth || 260, h:state.dom.offsetHeight || 180};
      const targetX = cardRect.x + (screen.x < width*.5 ? 0 : cardRect.w);
      const targetY = cardRect.y + cardRect.h * .45;
      const lineColor = sig.mode === 'cloud' ? '#ffb14f' : '#00c8ff';
      connectorSvg.insertAdjacentHTML('beforeend', `
        <defs>
          <linearGradient id="grad-${id}" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="${lineColor}" stop-opacity="1"/>
            <stop offset="100%" stop-color="${lineColor}" stop-opacity=".12"/>
          </linearGradient>
        </defs>
        <path d="M ${screen.x} ${screen.y} C ${(screen.x+targetX)/2} ${screen.y-20}, ${(screen.x+targetX)/2} ${targetY+20}, ${targetX} ${targetY}" stroke="url(#grad-${id})" stroke-width="2.4" fill="none" stroke-linecap="round" filter="url(#f-${id})" />
        <circle cx="${screen.x}" cy="${screen.y}" r="5.5" fill="${lineColor}" fill-opacity=".95" />
      `);
    });
  }

  function openSignal(sig){
    activeSignalId = sig.id;
    focusSignal(sig);
    pushToast(sig.title, sig.summary);
    searchPanel.style.display = 'none';
  }

  function focusSignal(sig){
    const target = latLngToVector3(sig.lat, sig.lng, globeRadius).normalize();
    const lon = Math.atan2(target.z, -target.x);
    const lat = Math.asin(target.y);
    targetRotation.y = -(lon - Math.PI / 2);
    targetRotation.x = lat * 0.28;
  }

  function scoreSignal(sig, q){
    const hay = `${sig.title} ${sig.summary} ${sig.kind} ${sig.category} ${sig.visibility} ${sig.mode}`.toLowerCase();
    const terms = q.toLowerCase().trim().split(/\s+/).filter(Boolean);
    let score = 0;
    terms.forEach(term => {
      if(sig.title.toLowerCase().includes(term)) score += 8;
      if(sig.category.toLowerCase().includes(term)) score += 5;
      if(hay.includes(term)) score += 2;
    });
    if(q.toLowerCase().includes('team') && sig.category === 'team') score += 5;
    if(q.toLowerCase().includes('booking') && (sig.kind==='booking' || sig.category==='booking')) score += 6;
    if(q.toLowerCase().includes('racing') && sig.category==='racing') score += 8;
    return score;
  }

  function renderResults(query){
    const q = query.trim();
    if(!q){ searchPanel.style.display = 'none'; return; }
    const results = [...signals]
      .map(sig => ({sig, score:scoreSignal(sig, q)}))
      .filter(x => x.score > 0)
      .sort((a,b) => b.score - a.score)
      .slice(0,6);
    if(!results.length){
      searchPanel.style.display = 'block';
      searchPanel.innerHTML = `<div class="result"><div><div class="resultTitle">No matching signal</div><div class="resultSub">Try terms like “hotel”, “booking”, “racing”, “support”, or “development team”.</div></div></div>`;
      return;
    }
    searchPanel.style.display = 'block';
    searchPanel.innerHTML = '';
    results.forEach(({sig}) => {
      const row = document.createElement('div');
      row.className = 'result';
      row.innerHTML = `<div><div class="resultTitle">${sig.title}</div><div class="resultSub">${sig.summary}</div></div><div class="resultTag">${sig.mode}</div>`;
      row.onclick = () => openSignal(sig);
      searchPanel.appendChild(row);
    });
  }

  function submitQuery(){
    const q = searchInput.value.trim();
    if(!q) return;
    const best = [...signals].map(sig => ({sig, score:scoreSignal(sig,q)})).sort((a,b)=>b.score-a.score)[0];
    if(best && best.score > 0){ openSignal(best.sig); }
    else pushToast('No match yet', 'This demo index is wired for signals, clouds, and anchored business nodes.');
  }

  function pushToast(title, body){
    const id = 't' + (++toastCounter);
    const node = document.createElement('div');
    node.className = 'toast';
    node.innerHTML = `<div class="toastTitle">${title}</div>${body}`;
    toastStack.prepend(node);
    setTimeout(() => {
      node.style.transition = 'opacity .3s ease, transform .3s ease';
      node.style.opacity = '0';
      node.style.transform = 'translateY(-8px)';
      setTimeout(() => node.remove(), 320);
    }, 3400);
  }

  // Search wiring
  searchInput.addEventListener('input', e => renderResults(e.target.value));
  searchInput.addEventListener('keydown', e => {
    if(e.key === 'Enter') submitQuery();
  });
  document.getElementById('sendBtn').addEventListener('click', submitQuery);

  // Voice button
  const voiceBtn = document.getElementById('voiceBtn');
  let recognition = null, listening = false;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(SR){
    recognition = new SR();
    recognition.lang = 'en-US';
    recognition.interimResults = true;
    recognition.continuous = false;
    recognition.onresult = (ev) => {
      let text = '';
      for(let i=ev.resultIndex;i<ev.results.length;i++) text += ev.results[i][0].transcript + ' ';
      searchInput.value = text.trim();
      renderResults(searchInput.value);
      if(ev.results[ev.results.length-1].isFinal) submitQuery();
    };
    recognition.onend = () => { listening = false; voiceBadge.style.display='none'; };
  }
  voiceBtn.addEventListener('click', () => {
    if(!recognition){ pushToast('Hands-free unavailable', 'Speech recognition is not supported in this browser.'); return; }
    if(listening){ recognition.stop(); listening = false; voiceBadge.style.display='none'; }
    else { recognition.start(); listening = true; voiceBadge.style.display='block'; }
  });

  // Wheel buttons
  droneButton.addEventListener('click', () => {
    droneMode = !droneMode;
    droneButton.innerHTML = droneMode ? 'UNLOAD' : 'LOAD<br>OUT';
    perfMeta.textContent = droneMode ? 'drone mode' : 'device mode';
    pushToast(droneMode ? 'Drone control mode' : 'Device mode', droneMode ? 'Performance wheel is now reserved for drone characteristics and load/unload control.' : 'Performance wheel returned to device mode.');
  });

  document.getElementById('homeButton').addEventListener('click', () => {
    showLocalTarget = !showLocalTarget;
    if(showLocalTarget){
      homeButton.innerHTML = 'GLOBE';
      activeSignalId = 's1';
      focusSignal(signals.find(s => s.id === 's1'));
      pushToast('Zoom to me', 'Camera moved toward your local operational zone.');
    } else {
      homeButton.innerHTML = 'ZOOM<br>ME';
      activeSignalId = 's3';
      targetRotation.x = 0.12;
      targetRotation.y += Math.PI * 0.4;
      pushToast('Global view', 'Camera eased back into world scanning mode.');
    }
  });

  // Globe interaction
  const raycaster = new THREE.Raycaster();
  const ndc = new THREE.Vector2();
  let dragging = false, lastX=0, lastY=0;
  const currentRotation = {x:0.16, y:0.45};
  const targetRotation = {x:0.16, y:0.45};

  renderer.domElement.addEventListener('pointerdown', e => { dragging = true; lastX=e.clientX; lastY=e.clientY; });
  window.addEventListener('pointerup', () => dragging = false);
  window.addEventListener('pointermove', e => {
    pointer.x = e.clientX; pointer.y = e.clientY;
    if(!dragging) return;
    const dx = e.clientX - lastX;
    const dy = e.clientY - lastY;
    targetRotation.y += dx * 0.006;
    targetRotation.x += dy * 0.0032;
    targetRotation.x = Math.max(-0.72, Math.min(0.72, targetRotation.x));
    lastX = e.clientX; lastY = e.clientY;
  });

  renderer.domElement.addEventListener('click', (e) => {
    if(dragging) return;
    ndc.x = (e.clientX / width) * 2 - 1;
    ndc.y = -(e.clientY / height) * 2 + 1;
    raycaster.setFromCamera(ndc, camera);
    const hit = raycaster.intersectObject(earth)[0];
    if(hit){
      pushToast('Signal creation point', 'Map click detected on the globe. This is where a new anchored business, post, or booking signal would be created.');
      searchPanel.style.display = 'none';
    }
  });

  // demo notifications
  setTimeout(() => pushToast('Global posting system', 'Signals can be anchored to real locations or float as cloud channels above the planet.'), 900);
  setTimeout(() => pushToast('Booking engine cloud', 'Businesses can attach the booking engine as a capability instead of living in giant menus.'), 2800);
  setInterval(() => {
    const pool = [
      ['Trending nearby', 'Rhodes Marina Bites is pulsing near your active region.'],
      ['Team cloud ping', 'Development Team cloud has new activity and can be opened from the planet.'],
      ['Booking event', 'Blue Harbor Rooms pushed a new reservation slot update.']
    ];
    const pick = pool[Math.floor(Math.random()*pool.length)];
    pushToast(pick[0], pick[1]);
  }, 14000);

  function resize(){
    width = window.innerWidth; height = window.innerHeight;
    camera.aspect = width/height; camera.updateProjectionMatrix();
    renderer.setSize(width, height);
  }
  window.addEventListener('resize', resize);

  function animate(t){
    requestAnimationFrame(animate);
    starGroup.rotation.y += 0.00018;
    earth.rotation.y += 0.00125;
    currentRotation.x += (targetRotation.x - currentRotation.x) * 0.06;
    currentRotation.y += (targetRotation.y - currentRotation.y) * 0.06;
    earthGroup.rotation.x = currentRotation.x;
    earthGroup.rotation.y = currentRotation.y;
    updateSignalUI(t);
    renderer.render(scene, camera);
  }

  activeSignalId = 's3';
  focusSignal(signals.find(s => s.id === 's3'));
  animate(0);
})();
</script>
</body>
</html>
