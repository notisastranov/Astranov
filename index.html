/*
ASTRANOV · MYRMIDON FRONT-END CORE
One HTML file is the front-end shell and law carrier, not the full business/backend.
Official altitude spine: GLOBAL → NATIONAL → PERSONAL.
GLOBAL: full unclipped Earth, real 24-hour drift, controlled trackball drag, round country beacons only.
SPACE: visible only when zooming out from Global; Sun, Moon, Mars and ISS are named and visible.
NATIONAL: real Leaflet country map centered on the selected country. No fake boundary circles. No menus masquerading as geography.
PERSONAL: city/user map. Shops, menus, drivers, friends, circles, video posts, route lines, transaction triangles.
ZERO UI: only ASTRANOV title and a small voice orb are persistent. Controls appear from intent.
VENDOR MENU: product menu contains the checkout ribbon at the top. It wraps. It never truncates. Product quantity can be typed.
DELIVERY LAW: delivery charge is transparent by default and paid by the customer unless split rules say otherwise. €3 fixed for first 3km, then €1/km after 3km, plus €1 per 13 kg/L band above 13 kg/L. Basket first requests driver assignment; payment happens only after driver acceptance.
ACCOUNTING OFFICE: confirmed orders create transparent ledger entries/invoices for goods, delivery responsibility shares, driver payout, and platform fee.
*/

function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function money(n){return '€'+(+n||0).toFixed(2);}function km(a,b,c,d){const R=6371,p=Math.PI/180;const x=(c-a)*p,y=(d-b)*p;const z=Math.sin(x/2)**2+Math.cos(a*p)*Math.cos(c*p)*Math.sin(y/2)**2;return R*2*Math.atan2(Math.sqrt(z),Math.sqrt(1-z));}
function progress(p,t){$('loaderFill').style.width=p+'%';$('loaderState').textContent=t;}function toast(msg,ms=2400){const t=$('toast');t.textContent=msg;t.classList.add('on');clearTimeout(toast.t);toast.t=setTimeout(()=>t.classList.remove('on'),ms);}function saveLedger(){localStorage.setItem('astranov_ledger',JSON.stringify(state.ledger.slice(-80)));}function loadLedger(){try{state.ledger=JSON.parse(localStorage.getItem('astranov_ledger')||'[]');}catch(_){state.ledger=[];}}

function setLevel(level){state.level=level;document.body.classList.toggle('global',level==='global');document.body.classList.toggle('national',level==='national');document.body.classList.toggle('personal',level==='city');$('globalLayer').classList.toggle('on',level==='global');$('nationalLayer').classList.toggle('on',level==='national');$('cityLayer').classList.toggle('on',level==='city');$('backOrb').classList.toggle('on',level!=='global');if(level!=='city')closeVendor();if(level!=='global')setSpace(false);}
function initGlobe(){if(!window.THREE){toast('Three.js did not load');return;}const canvas=$('globeCanvas');const scene=new THREE.Scene();const camera=new THREE.PerspectiveCamera(42,innerWidth/innerHeight,.1,100);camera.position.z=3.25;const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});renderer.setPixelRatio(Math.min(devicePixelRatio||1,2));renderer.setSize(innerWidth,innerHeight,false);const light=new THREE.DirectionalLight(0xfff3d6,1.25);light.position.set(-3,1.5,3);scene.add(light);scene.add(new THREE.AmbientLight(0x82cfff,.42));const tex=new THREE.TextureLoader().load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg');const earth=new THREE.Mesh(new THREE.SphereGeometry(1,96,64),new THREE.MeshPhongMaterial({map:tex,shininess:10,specular:0x1b3f73}));earth.rotation.y=-21.8243*Math.PI/180;earth.rotation.x=.26;scene.add(earth);const atm=new THREE.Mesh(new THREE.SphereGeometry(1.035,96,64),new THREE.MeshBasicMaterial({color:0x00bfff,transparent:true,opacity:.12,side:THREE.BackSide}));scene.add(atm);state.globe={scene,camera,renderer,earth,drag:false,x:0,y:0,targetZ:3.25};window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight,false);},{passive:true});canvas.addEventListener('pointerdown',e=>{state.globe.drag=true;state.globe.x=e.clientX;state.globe.y=e.clientY;canvas.setPointerCapture(e.pointerId);});canvas.addEventListener('pointermove',e=>{if(!state.globe.drag)return;const dx=e.clientX-state.globe.x,dy=e.clientY-state.globe.y;earth.rotation.y+=dx*.0032;earth.rotation.x=Math.max(-.82,Math.min(.82,earth.rotation.x+dy*.0022));state.globe.x=e.clientX;state.globe.y=e.clientY;});canvas.addEventListener('pointerup',e=>{state.globe.drag=false;try{canvas.releasePointerCapture(e.pointerId)}catch(_){}});canvas.addEventListener('wheel',e=>{e.preventDefault();if(state.level==='global')setSpace(e.deltaY>0);},{passive:false});let last=performance.now();function loop(now){const dt=(now-last)/1000;last=now;if(state.level==='global'&&!state.globe.drag&&!state.space)earth.rotation.y+=(Math.PI*2/86400)*dt;camera.position.z+=(state.globe.targetZ-camera.position.z)*.05;renderer.render(scene,camera);syncBeacons();requestAnimationFrame(loop);}requestAnimationFrame(loop);buildCountryBeacons();}
function vecFromLatLng(lat,lng){const p=Math.PI/180;return new THREE.Vector3(Math.cos(lat*p)*Math.sin(lng*p),Math.sin(lat*p),Math.cos(lat*p)*Math.cos(lng*p));}
function projectPoint(lat,lng){const g=state.globe;if(!g)return null;const v=vecFromLatLng(lat,lng).applyEuler(g.earth.rotation);if(v.z<-.08)return{visible:false};const p=v.clone().multiplyScalar(1.045).project(g.camera);return{visible:true,x:(p.x+1)*innerWidth/2,y:(1-p.y)*innerHeight/2,depth:v.z};}
function buildCountryBeacons(){const host=$('beaconLayer');host.innerHTML='';Object.entries(countries).forEach(([key,c])=>{const b=document.createElement('button');b.className='countryBeacon'+(c.home?' home':'');b.type='button';b.dataset.country=key;b.innerHTML='<span>'+esc(c.code)+'</span>';b.onclick=e=>{e.stopPropagation();enterNational(key);};host.appendChild(b);c.el=b;});}
function syncBeacons(){if(state.level!=='global'||state.space||!state.globe)return;Object.values(countries).forEach(c=>{const p=projectPoint(c.lat,c.lng);if(!p||!p.visible){c.el.style.display='none';return;}c.el.style.display='flex';c.el.style.left=p.x+'px';c.el.style.top=p.y+'px';c.el.style.opacity=Math.max(.35,Math.min(1,(p.depth+1)*.78));});}
function setSpace(on){state.space=!!on;document.body.classList.toggle('space',state.space);if(state.globe)state.globe.targetZ=state.space?5.4:3.25;}
async function ensureLeaflet(){let tries=0;while(!window.L&&tries<60){await new Promise(r=>setTimeout(r,100));tries++;}return !!window.L;}
async function enterNational(key){const country=countries[key];if(!country||!(await ensureLeaflet()))return;state.country=country;setLevel('national');$('nationalTitle').textContent=country.name+' · NATIONAL AIRSPACE';if(!state.nationalMap){state.nationalMap=L.map('nationalMap',{zoomControl:false,attributionControl:false,minZoom:3,maxZoom:18});L.tileLayer(CONFIG.lightTiles,{subdomains:'abcd',maxZoom:20}).addTo(state.nationalMap);}state.nationalMap.setView([country.lat,country.lng],country.zoom,{animate:false});state.nationalMap.eachLayer(l=>{if(l._astranovPin)l.remove();});country.cities.forEach(city=>{const m=L.marker([city.lat,city.lng],{icon:L.divIcon({className:'',iconSize:[44,44],iconAnchor:[22,22],html:'<div class="nationalPin"><span class="cityLabel">'+esc(city.name)+'</span></div>'})});m._astranovPin=true;m.addTo(state.nationalMap).on('click',()=>enterCity(city));});setTimeout(()=>state.nationalMap.invalidateSize(true),70);setTimeout(()=>state.nationalMap.invalidateSize(true),420);}
async function enterCity(city){if(!city||!(await ensureLeaflet()))return;state.city=city;state.vendors=vendorsFor(city);state.drivers=driversFor(city);setLevel('city');if(!state.cityMap){state.cityMap=L.map('cityMap',{zoomControl:false,attributionControl:false,minZoom:3,maxZoom:19});state.cityDark=L.tileLayer(CONFIG.darkTiles,{subdomains:'abcd',maxZoom:20,className:'cityDarkTile'}).addTo(state.cityMap);state.cityLight=L.tileLayer(CONFIG.lightTiles,{subdomains:'abcd',maxZoom:20,opacity:0}).addTo(state.cityMap);state.cityMap.on('click',()=>{if($('vendorSheet').classList.contains('on')&&!$('vendorSheet').classList.contains('min'))minimizeVendor();});}state.cityMap.setView([city.lat,city.lng],city.zoom,{animate:false});applyBrightness();drawCity();setTimeout(()=>state.cityMap.invalidateSize(true),70);setTimeout(()=>state.cityMap.invalidateSize(true),420);}
function clearCity(){state.markers.forEach(m=>{try{m.remove()}catch(_){}});state.markers=[];state.routes.forEach(m=>{try{m.remove()}catch(_){}});state.routes=[];}
function divIcon(html,size=38){return L.divIcon({className:'',iconSize:[size,size],iconAnchor:[size/2,size/2],html});}
function drawCity(){clearCity();if(!state.cityMap||!state.city)return;const c=state.city;state.markers.push(L.marker([c.lat,c.lng],{icon:divIcon('<div class="mapPin user">YOU</div>',44),zIndexOffset:800}).addTo(state.cityMap).bindTooltip('You',{direction:'top',className:'cleanTip'}));state.vendors.forEach(v=>{const m=L.marker([v.lat,v.lng],{icon:divIcon('<div class="mapPin shop">'+v.emoji+'</div>',38),zIndexOffset:500}).addTo(state.cityMap).bindTooltip(v.name,{direction:'top',className:'cleanTip'});m.on('click',ev=>{L.DomEvent.stopPropagation(ev);openVendor(v);});state.markers.push(m);});state.drivers.forEach(d=>{const m=L.marker([d.lat,d.lng],{icon:divIcon('<div class="mapPin driver" data-driver="'+d.id+'">'+d.emoji+'</div>',38),zIndexOffset:560}).addTo(state.cityMap).bindTooltip(d.name+' · '+d.cap+'kg',{direction:'top',className:'cleanTip'});m.on('click',ev=>{L.DomEvent.stopPropagation(ev);selectDriver(d.id,true);});d.marker=m;state.markers.push(m);});[['Friends','👥',.002,.001],['Circle','◯',-.0025,-.002],['Video','▶',.0015,-.003]].forEach(x=>{state.markers.push(L.marker([c.lat+x[2],c.lng+x[3]],{icon:divIcon('<div class="mapPin friend">'+x[1]+'</div>',38)}).addTo(state.cityMap).bindTooltip(x[0],{direction:'top',className:'cleanTip'}));});}
function applyBrightness(){const v=+($('brightRange').value||state.brightness);state.brightness=v;localStorage.setItem('astranov_brightness',String(v));if(state.cityLight)state.cityLight.setOpacity(.08+v*.0088);if(state.cityDark&&state.cityDark.getElement){document.documentElement.style.setProperty('--unused','0');}}
function cartItems(){if(!state.vendor)return[];return state.vendor.items.map(i=>({...i,qty:+(state.cart[i.id]||0)})).filter(i=>i.qty>0);}function cartTotals(){const items=cartItems();return{count:items.reduce((a,i)=>a+i.qty,0),basket:items.reduce((a,i)=>a+i.price*i.qty,0),kg:items.reduce((a,i)=>a+i.kg*i.qty,0)}}
function deliveryParts(dist,mode,kg){if(mode==='pickup')return{base:0,after:0,loadExtra:0,total:0};const after=Math.max(0,dist-3);const loadExtra=kg>13?Math.ceil((kg-13)/13):0;const total=+(3+after+loadExtra).toFixed(2);return{base:3,after:+after.toFixed(2),loadExtra,total};}
function splitPercent(split){return split==='vendor'?0:split==='half'?50:split==='vendor25'?75:split==='vendor75'?25:100;}
function calcOrder(){if(!state.vendor||!state.city)return{dist:0,delivery:0,basket:0,total:0,kg:0,clientDelivery:0,vendorDelivery:0,platform:0,mode:'auto'};const mode=$('assignMode')?.value||'auto';const split=$('deliverySplit')?.value||state.deliverySplit;state.deliverySplit=split;localStorage.setItem('astranov_delivery_split',split);const totals=cartTotals();const dist=km(state.city.lat,state.city.lng,state.vendor.lat,state.vendor.lng);const parts=deliveryParts(dist,mode,totals.kg);const clientPercent=splitPercent(split);const clientDelivery=+(parts.total*clientPercent/100).toFixed(2);const vendorDelivery=+(parts.total-clientDelivery).toFixed(2);const total=+(totals.basket+clientDelivery).toFixed(2);const platform=+(total*.03).toFixed(2);return{...totals,dist,parts,delivery:parts.total,clientDelivery,vendorDelivery,total,platform,mode,split};}
function openVendor(v){state.vendor=v;state.cart={};state.orderState='basket';state.driver=null;$('vendorTitle').textContent=v.emoji+' '+v.name;renderVendor();$('vendorSheet').classList.add('on');$('vendorSheet').classList.remove('min');closePanel();}
function closeVendor(){$('vendorSheet').classList.remove('on','min');state.vendor=null;}function minimizeVendor(){$('vendorSheet').classList.add('min');toast('Vendor minimized. Tap a driver or tap the strip to reopen.',2300);}function restoreVendor(){if(state.vendor)$('vendorSheet').classList.remove('min');}
function renderVendor(){renderRibbon();const list=$('productList');list.innerHTML='';state.vendor.items.forEach(it=>{const qty=+(state.cart[it.id]||0);const row=document.createElement('div');row.className='productRow';row.innerHTML='<div class="productInfo"><img class="productPhoto" src="'+esc(it.photo)+'" alt=""><div class="productText"><div class="productName">'+esc(it.name)+'</div><div class="productMeta">'+esc(it.desc)+' · '+it.kg+' kg/L</div><div class="productPrice">'+money(it.price)+'</div></div></div><div class="qtyCtl">'+(state.vendorAccount?'<button class="editProduct" data-edit="'+it.id+'" type="button">✎</button>':'')+'<button class="qtyBtn" data-dec="'+it.id+'" type="button">−</button><input class="qtyInput" data-qty="'+it.id+'" type="number" min="0" step="1" value="'+qty+'"><button class="qtyBtn" data-inc="'+it.id+'" type="button">+</button></div>';list.appendChild(row);});list.querySelectorAll('[data-inc]').forEach(b=>b.onclick=()=>setQty(b.dataset.inc,+(state.cart[b.dataset.inc]||0)+1));list.querySelectorAll('[data-dec]').forEach(b=>b.onclick=()=>setQty(b.dataset.dec,Math.max(0,+(state.cart[b.dataset.dec]||0)-1)));list.querySelectorAll('[data-qty]').forEach(i=>i.onchange=()=>setQty(i.dataset.qty,Math.max(0,Math.floor(+i.value||0))));list.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>editProduct(b.dataset.edit));}
function setQty(id,qty){state.cart[id]=qty;if(qty<=0)delete state.cart[id];state.orderState='basket';renderVendor();}
function renderRibbon(){const c=calcOrder();const hasItems=c.count>0;let action='↓ ADD ITEMS',disabled=true,need=' needItems';if(hasItems&&state.orderState==='basket'){action=c.mode==='pickup'?'SELF PICKUP':'REQUEST DRIVER';disabled=false;need='';}if(state.orderState==='offered'){action='WAITING DRIVER';disabled=true;need='';}if(state.orderState==='accepted'){action='CONFIRM & PAY';disabled=false;need='';}if(state.orderState==='paid'){action='ROUTE LIVE';disabled=true;need='';}const driverCell=c.mode==='choose'?'<div class="ribCell wide"><div class="ribLabel">Driver</div><select id="driverChoice">'+state.drivers.map(d=>'<option value="'+d.id+'" '+(state.driver&&state.driver.id===d.id?'selected':'')+'>'+d.emoji+' '+d.name+'</option>').join('')+'</select></div>':'';const loadNote=c.parts.loadExtra?'<small> +'+money(c.parts.loadExtra)+' load</small>':'';const vendorNote=c.vendorDelivery?'<small> vendor '+money(c.vendorDelivery)+'</small>':'';const edit=state.vendorAccount?'<div class="ribCell"><div class="ribLabel">Vendor</div><button class="ribAction" id="vendorEditHelp" type="button">EDIT</button></div>':'';$('checkoutRibbon').innerHTML='<div class="ribCell wide"><div class="ribLabel">From</div><div class="ribVal">'+state.vendor.emoji+' '+esc(state.vendor.name)+'</div></div><div class="ribCell wide"><div class="ribLabel">To</div><select id="destChoice"><option>📍 My location</option><option>⌄ Other address</option></select></div><div class="ribCell"><div class="ribLabel">Km</div><div class="ribVal">'+c.dist.toFixed(1)+'</div></div><div class="ribCell"><div class="ribLabel">Delivery</div><div class="ribVal">'+money(c.clientDelivery)+loadNote+'</div></div><div class="ribCell"><div class="ribLabel">Basket</div><div class="ribVal">'+money(c.basket)+'</div></div><div class="ribCell"><div class="ribLabel">Total</div><div class="ribVal">'+money(c.total)+vendorNote+'</div></div><div class="ribCell wide"><div class="ribLabel">Assignment</div><select id="assignMode"><option value="auto">Automatic</option><option value="choose">Choose driver</option><option value="pickup">Self-pickup</option></select></div><div class="ribCell wide"><div class="ribLabel">Delivery paid</div><select id="deliverySplit"><option value="client">Client 100%</option><option value="vendor">Vendor 100%</option><option value="half">50 / 50</option><option value="vendor25">Vendor 25%</option><option value="vendor75">Vendor 75%</option></select></div>'+driverCell+edit+'<div class="ribCell action"><button id="ribbonAction" class="ribAction'+need+'" '+(disabled?'disabled':'')+' type="button">'+action+'</button></div>';$('assignMode').value=c.mode;$('deliverySplit').value=c.split;$('assignMode').onchange=()=>{if($('assignMode').value==='choose'&&!state.driver)state.driver=state.drivers[0];state.orderState='basket';renderRibbon();};$('deliverySplit').onchange=()=>{state.orderState='basket';renderRibbon();};const dc=$('driverChoice');if(dc)dc.onchange=()=>selectDriver(dc.value,false);$('ribbonAction').onclick=handleRibbonAction;const ed=$('vendorEditHelp');if(ed)ed.onclick=()=>toast('Tap ✎ beside a product to edit name, description, price, kg/L and photo.');}
function selectDriver(id,fromMap){const d=state.drivers.find(x=>x.id===id);if(!d)return;state.driver=d;if(state.vendor){const mode=$('assignMode');if(mode)mode.value='choose';state.orderState='basket';restoreVendor();renderRibbon();}state.drivers.forEach(x=>{if(x.marker){x.marker.setIcon(divIcon('<div class="mapPin driver '+(x.id===id?'selected':'')+'">'+x.emoji+'</div>',38));}});if(fromMap)toast(d.name+' selected for assignment');}
function handleRibbonAction(){const c=calcOrder();if(!c.count)return;if(c.mode==='pickup'){state.orderState='accepted';renderRibbon();toast('Self-pickup ready. Confirm to route.');return;}if(state.orderState==='basket'){state.orderState='offered';renderRibbon();toast('Driver offer sent. Waiting for acceptance…');setTimeout(()=>{if(!state.driver)state.driver=nearestDriver();state.orderState='accepted';renderRibbon();toast((state.driver?state.driver.name:'Driver')+' accepted. Confirm and pay.');},900);return;}if(state.orderState==='accepted'){confirmOrder();}}
function nearestDriver(){if(!state.vendor||!state.drivers.length)return null;return state.drivers.slice().sort((a,b)=>km(a.lat,a.lng,state.vendor.lat,state.vendor.lng)-km(b.lat,b.lng,state.vendor.lat,state.vendor.lng))[0];}
function editProduct(id){if(!state.vendorAccount)return;const it=state.vendor.items.find(x=>x.id===id);if(!it)return;const name=prompt('Product name',it.name);if(name===null)return;const desc=prompt('Description',it.desc);if(desc===null)return;const price=prompt('Price €',it.price);if(price===null)return;const kg=prompt('kg/L',it.kg);if(kg===null)return;const photo=prompt('Photo URL',it.photo);if(photo===null)return;it.name=name.trim()||it.name;it.desc=desc.trim()||it.desc;it.price=Math.max(0,+price||it.price);it.kg=Math.max(0,+kg||it.kg);it.photo=photo.trim()||it.photo;renderVendor();toast('Product updated locally');}
async function osrm(a,b){const key=a[1]+','+a[0]+';'+b[1]+','+b[0];try{const ctl=new AbortController();setTimeout(()=>ctl.abort(),6500);const r=await fetch(CONFIG.osrm+'/'+key+'?overview=full&geometries=geojson',{signal:ctl.signal});const j=await r.json();if(j.code==='Ok'&&j.routes&&j.routes[0])return{coords:j.routes[0].geometry.coordinates.map(x=>[x[1],x[0]]),km:j.routes[0].distance/1000};}catch(_){}return{coords:[a,b],km:km(a[0],a[1],b[0],b[1])};}
async function confirmOrder(){const c=calcOrder();if(!state.vendor||!c.count)return;state.orderState='paid';renderRibbon();const vendor=state.vendor,driver=c.mode==='pickup'?null:(state.driver||nearestDriver());state.routes.forEach(r=>{try{r.remove()}catch(_){}});state.routes=[];const route=await osrm([vendor.lat,vendor.lng],[state.city.lat,state.city.lng]);state.routes.push(L.polyline(route.coords,{color:'#00d7ff',weight:5,opacity:.92}).addTo(state.cityMap));if(driver){const pickup=await osrm([driver.lat,driver.lng],[vendor.lat,vendor.lng]);state.routes.push(L.polyline(pickup.coords,{color:'#d6aa3a',weight:4,opacity:.86,dashArray:'8 7'}).addTo(state.cityMap));state.routes.push(L.polygon([[state.city.lat,state.city.lng],[vendor.lat,vendor.lng],[driver.lat,driver.lng]],{color:'#d6aa3a',weight:1,fillColor:'#d6aa3a',fillOpacity:.06,dashArray:'5 6'}).addTo(state.cityMap));}state.cityMap.fitBounds(L.latLngBounds(route.coords),{padding:[80,80],animate:true,duration:.55});createInvoices(c,driver);$('routeBadge').textContent=driver?'TRIANGLE LIVE · '+driver.name+' ASSIGNED':'SELF-PICKUP ROUTE LIVE';$('routeBadge').style.display='block';setTimeout(()=>$('routeBadge').style.display='none',3400);toast('Order confirmed. Accounting entries issued.',3400);}
function createLedger(type,from,to,amount,meta){state.ledger.push({id:'INV-'+Date.now()+'-'+Math.random().toString(16).slice(2,6),type,from,to,amount:+amount.toFixed(2),meta,at:new Date().toISOString()});}
function createInvoices(c,driver){createLedger('GOODS','Client',state.vendor.name,c.basket,'Products basket');if(c.clientDelivery>0&&driver)createLedger('DELIVERY','Client',driver.name,c.clientDelivery,'Client delivery responsibility');if(c.vendorDelivery>0&&driver)createLedger('DELIVERY',state.vendor.name,driver.name,c.vendorDelivery,'Vendor delivery responsibility');if(c.platform>0)createLedger('PLATFORM FEE','Transaction','Astranov',c.platform,'3% platform fee');saveLedger();}
function openAccounting(){closeVendor();$('panelSheet').classList.add('on','ledgerSheet');$('panelTitle').textContent='Accounting Office';const rows=state.ledger.slice().reverse().map(x=>'<div class="ledgerRow"><div class="ledgerTop"><span>'+esc(x.type)+'</span><span>'+money(x.amount)+'</span></div><div class="ledgerMeta">'+esc(x.from)+' → '+esc(x.to)+' · '+esc(x.meta)+'<br>'+new Date(x.at).toLocaleString()+' · '+esc(x.id)+'</div></div>').join('')||'<div class="panelCard"><b>No ledger entries yet.</b><br>Confirm an order to issue invoices.</div>';$('panelBody').innerHTML=rows;}
function closePanel(){$('panelSheet').classList.remove('on','ledgerSheet');}
function openCommand(){const p=$('commandPanel');p.classList.toggle('on');if(p.classList.contains('on'))setTimeout(()=>$('cmdInput').focus(),80);}function runCommand(txt){txt=(txt||'').trim().toLowerCase();$('commandPanel').classList.remove('on');if(!txt)return;if(txt==='back'){goBack();return;}if(txt.includes('space')){setSpace(true);return;}if(txt.includes('account')){openAccounting();return;}if(txt.includes('vendor login')||txt==='vendor'){state.vendorAccount=true;localStorage.setItem('astranov_vendor_account','1');toast('Vendor mode on');if(state.vendor)renderVendor();return;}if(txt.includes('vendor logout')){state.vendorAccount=false;localStorage.removeItem('astranov_vendor_account');toast('Vendor mode off');if(state.vendor)renderVendor();return;}const countryHit=Object.entries(countries).find(([k,c])=>txt===k||txt.includes(c.name.toLowerCase())||txt===c.code.toLowerCase());if(countryHit){enterNational(countryHit[0]);return;}for(const country of Object.values(countries)){const city=country.cities.find(c=>txt.includes(c.name.toLowerCase()));if(city){state.country=country;enterCity(city);return;}}if(txt.includes('pizza')&&state.level==='city'){openVendor(state.vendors.find(v=>v.id==='pizza'));return;}toast('Command not found');}
function goBack(){if(state.level==='city'){closeVendor();if(state.country)enterNational(Object.entries(countries).find(([,c])=>c===state.country)?.[0]||'greece');else setLevel('global');return;}if(state.level==='national'){setLevel('global');return;}if(state.space){setSpace(false);return;}setLevel('global');}
function startVoice(){const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){openCommand();toast('Voice unavailable. Text command opened.');return;}try{const rec=new SR();state.voice=rec;rec.lang=navigator.language||'en-US';rec.continuous=false;rec.interimResults=false;rec.onstart=()=>$('voiceOrb').classList.add('live');rec.onend=()=>$('voiceOrb').classList.remove('live');rec.onerror=()=>{toast('Voice blocked. Text command opened.');openCommand();};rec.onresult=e=>runCommand(e.results[0][0].transcript);rec.start();}catch(_){openCommand();}}
$('title').onclick=openCommand;$('voiceOrb').onclick=startVoice;$('backOrb').onclick=goBack;$('closeVendor').onclick=e=>{e.stopPropagation();closeVendor();};$('vendorSheet').querySelector('.sheetHead').onclick=restoreVendor;$('closePanel').onclick=closePanel;$('brightRange').value=state.brightness;$('brightRange').oninput=applyBrightness;$('cmdInput').onkeydown=e=>{if(e.key==='Enter')runCommand(e.target.value);};document.querySelectorAll('.hintBtn').forEach(b=>b.onclick=()=>runCommand(b.dataset.cmd));document.addEventListener('keydown',e=>{if(e.key==='Escape'){closePanel();closeVendor();$('commandPanel').classList.remove('on');}});
async function boot(){progress(18,'LOADING LEDGER');loadLedger();progress(36,'WAITING ENGINES');let tries=0;while((!window.THREE||!window.L)&&tries<70){await new Promise(r=>setTimeout(r,100));tries++;}progress(62,'BUILDING EARTH');initGlobe();progress(100,'ONLINE');setTimeout(()=>{$('loader').classList.add('gone');setTimeout(()=>$('loader').remove(),700);},220);toast('Myrmidon build online. Tap a country beacon.',3200);}boot();
window.Astranov={state,countries,enterNational,enterCity,openVendor,openAccounting,runCommand};
})();
</script>
